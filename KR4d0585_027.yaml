body:
  text: 東維子文集卷之二十七㑹稽銕厓楊維楨廉夫著書與同年索廉使書古者天子之於諸侯入其疆土地闢田野治養老尊賢俊傑在位則有慶入其疆土地荒無遺老失賢掊尅在位則有讓然天子之耳目不能遍觀而盡察也故每一州置一伯焉以位天子之耳目而行其慶讓得一賢伯而所統諸侯不敢有侵虘之政無侵虐而民無有不得其所者此古之賢伯係扵時者重如是也今之守令古之諸侯職也今之肅政使古之州伯職也守令之在位者恣掊尅也賢者失也老者遺也土地者不治也而朝廷不知肅政者不察問有一二自强於職土之所當慶者不得譽于左右則覆得所讓是非皂白傎亂其真於是民有訴其冤者如訴于又不得巳而謁其所欲者如謁之於鬼神遂致民氣欝而不伸小則乖于一邑大者乖於天下長慮君子其不爲之慄懔哉伏惟閣下出身以天子之賜進士閣下之任官以天子之寄耳目士有握抱不得展布者以爲不得其時與地也今閣下之任得其時矣得其地矣而不以古賢伯之任廵行州郡入其疆宜得慶與讓者不知所慶讓焉民之鬰不知所伸焉則閣下之得其時者與無時同閣下之得其地者與無地等而閣下之出身曽亦何優于旁𡵨雜進之人入閣下之受官又何優於一州一邑之濫而勿治哉某于閣下雲泥異途而名則同年也棄官以來已無意于時事而僑居錢唐當北南之㑹人有自南來談肅政便者之政厯厯如指掌聞閣下行部福興已若干日而父老之望閣下未有所聞覆有所指議流言者亦可畏也時吾同年故輒有布于閣下幸閣下察焉上有以佐明天子耳目之寄而下有以閾塞南北行者之言也不勝幸甚投秦運使書某聞私門塞者公道逹私亊息者公事明公之與私隂陽水火勢也伸道之公者無他能自屈其私而巳矣伏惟閣下清德茂望由臺憲表臣當監漕之寄乎兩浙臨政以來事之損益因革黜涉用罷一以公為遺包苴請謁無所容徑窬私門塞矣持三尺平桀黠吏不得挽骩之私事息矣私門私事一無以于甚之公屬宜之吏效職而弗欺江之商海之民皆願出于塗而服役於其上大課連流宿垢剗刮最稱一專除命遍下自官漕者來未之或聞也然而倉塲屬吏厄逋課者前後凡數十百人豈無是非枉直其中朝廷遣使廉問而訖不得其是非之公何也私之不自屈者公之不伸于天下也故其抱柱受抑之人咸願决之于閣下者以公之道在閣下也其得脱荆禁與省部文符而去者已凡數十人而枉之大抑之乆則莫如某也某以父憂去司令之職而司令之課曽無一二虧欠而吏持文深者猶枝蔓其罪不使其文符而去使公道不在閣下則吏者之言或得以移聽公道而在閣下則吏持文深之過也或謂彼數十人之去勢力使之也閣下不以勢刀屈公道則或者之言又過也故某其不避僣罪輒敢自明一言于閣下惟閣下察之使移之大者伸抑之乆者奮則閣下大道之公不以某一人而累不然或者得以其病公道閣下其能亡所累耶惟閣下以大道之公自任有以絶文深更之過而解或人之疑且以恕某自問之罪幸甚幸甚上樊參政書某謹再拜奉書于大參相公先生閣下某聞士有鼓琴於汾停而釣書聴之曰美哉琴意在山澤而有廊庿之志夫聲𬒳于琴枯木之器也而意之所存聽者得焉而况士之意發而成聲聲發而成文者乎萬一遇知已之聽則其洞見所在者宜有過于釣者之聴琴也已伏惟閣下以中州間氣出為當代之英不事舉子學而為天下文章之宗士之相指數于下者曰許夫子而後有子姚子子元子姚元之後而有子樊子而已耳士不志于見天人君子則已如有志也其不趨下風而求出門下者則其自棄者也某幸早職閣下於任公敬叔之門閣下佐司于中書時敬叔嘗遣某持書幣不逺數千里請見閣下而以病不果行今閣下在行垣去某之居不百里也某嘗僕僕趨下風而又以闇禁之嚴艱于見也則某惟有退處于野與田叟野老為任耳然力不任負來而又竊食于吳教授市中兒以為妻子之養同年之士有舉某於錢唐典市之官使苟食于市猶勝于挾筴小兒去家僅一水隔猶勝于調邊數千里其相知無踰于同年而所舉如此則某之不受知於當世而切切於知已者之求蓋可知矣傳曰隐雷自天而昆蟲巳听隂而在漢而桂礎先覺幾之先動於物類者如此某之於閣下懸隔若相絶而心動于閣下見于先覺則恒目睫之近故敢不以再進為凟而懷抱所著曰平鳴集者二十卷古樂府辭者十卷謹上獻閣下葢将托知已于閣下也閣下倘賜之聽覧則某之心所存者将有自為其不愈知音于汾渟者之琴吾不信矣謹書上寳相公書某謹再拜奉書於復齋司憲相公先生閣下嘗聞士屈於不知已而伸干知已者遇知已而不訕則亦與不知已者等耳有本於此懐抱利器而以世之流言中傷不得與時之君子者列必急于求知已非急於未知也急於伸志也僕自棄官以終二親之養養既終而吏部不調者十年然十年之中服近文章砥礪廉隅未嘗敢一日叛吾教也世之自謂英傑之士往往有不逺數千里考德問業于僕者則僕又以自信決非明世棄才也僕所著三史統論禁林巳韙余言而司選曹者顧以流言葉余謂楊公雖名進士有史才其人志過矯激署之筦庫以勞其身忍其性亦以大其器也杭四務天下之都務也俾提舉其課而後俆以清華處之未晚也僕之不遇如此屈於不知已者也士遇不知己雖孔孟聖且辨不能白於人矧又蔽以流言者歟伏惟閣下以高等進士賜出身號龍虎之榜不二十年敡厯清要爲明天子耳目才賢所在雖仇必舉雖草野必訪矧又屬知已者乎而僕未嘗伸吭鳴一言于閣下則仆之自棄罪也僕在吳興時固嘗執筆以登載閣下之治績在錢唐時又嘗偕歐陽生以侍筆櫝于閣下則謂之舊知已可也久必待逺必致者儒行之言舉舊者如此仆离閣下也久去閣下也逺閣下在高要舉舊而不改儒行信其賢而不信人之流言則僕之不避瀆而鳴知己于閣下者不得免也庸自輒敢有布于閣下惟閣下賜之覧察焉則仆之伸于知已者在閣下而不在他人也決矣代宋無逸工省都事書去秋攀餞舜江伏承教誨與誘意甚勤懇若将推而納諸古學者之後公卿不接晚生久矣何幸親承其寵是以惑激忖度至忘寝食思所以報知已孔子曰才難某始讀此猶以爲疑以爲人苟有志何才不可成矣難之有更涉七八載志雖不變而其學視之古人奚翅霄壤之殊然後知才之成信乎其難也蓋某自九歲知讀書陋邦之中無良師友誦習數載雖訓詁莫曉年十六歳去學吏時家作益落先人没六年矣十日讀言行錄至范文正公事悚然如有所發頗如古人所以立志然猶未知所以用力今年春游暨陽從銕厓先生學春秋方其欲往親戚謫其迂鄉里哂其狂幸而楊先生遇之如骨肉不然不能一朝居也幸粗聞為學之方則循序漸進供其心而盜其功者為庶幾也以故絶去狂妄躁急之心掃洒一室寂寞自若宜五六年而才亦不知其成與否也自顧蓬萆之家累從産薄生母年近六十恣嗟太息以某雖從事於學而不能略有所補於是奮不知恥西見公明嗚呼不有知已如明公者何以成其志哉某扵明公其分甚遼絶一旦拜下風即謂可教心待之以禮其後數進見恩意㣂篤伏語之曰人以貴盛而逰于卑汚者多矣生微賤而能卓然自立未必不互貴盛也勉之哉某立志之迂雖親戚不見閔而明公惓惓若是則世之知已者未有深于明公者也遇知已者而不求所以自伸則與自弃者宁有異乎故復陳其坎坷之状達于左右伏惟終曩日玉成之賜為之留意使上有以寛親之憂下有以安己之志得致其材之所進而無難成之歎不勝感恩之至罄意而言不覺繁委惟少垂察焉與吳宗師書僕讀傳至孔子稱老子通禮樂明道德之周遂師老子則知先王之禮樂道德老子者未墜而孔子師焉孔子師老子則老子道與孔子道弗殊且老子周蔵室之史也又知其學有資於時君不徒五千言道德之𫐠也後之道家宗老氏太史公取其言約而易􅍾事少而功多故西京賢君資之為南面之術而成清浄寕一之治其效不誣巳迨效者宗其傳而欲滅絶禮樂搥提仁義曰虛無可以為治吐細可以長生則吾未知其説也我朝抑點百家尊上孔氏而老氏之宗仍俾其徒申教章以稗治化故今孔老氏之學竝行而不爐火老氏之傳至後漢實為輔漢氏之術其數能使上之人恭已垂衣裳而治而庶類之繁幽而百靈之袐罔不從今而受職以驚動之古初之所無而實吾先聖師之所不能有也宜上人攸崇之呼為天人之師法屬國不得私懐劍章而俾得懷之王公大臣無不名而拜者而俾得不名不拜其恩隆數吳人絶古之所無也天既昌其身姓以壽其術必昌其徒以衛其道如今桂堂氏與足下後先出乎其間蓋不偶然矣今天子留志史學以館閣之才為不足遣使草野以聘處士之良而於足下濶去㢘陞賜之燕坐訪問至道以及乎厯代圖史成敗禍福之跡足下片言又足以了􅐁可否雖一時稱良史才者不能過比之鼻祖職蔵室益有光矣傳曰學老子者絀儒學儒學亦拙老子某儒者徒也孔子不能不師老子某其敢絀老子而以足下之道為異而不資求其所至者欤某蚤年以試藝工春官識足下於京師足下還山而某亦去官又與足下㑹于錢唐湖上然未能獲一議論交一文字之往復近因足下高徒某南歸蕃陽庸是上淑孔子師老子之原而知足下之道未嘗余悖者書之以逹掌記惟足下不以儒學爲絀而有以先王禮樂道德之未墜者教余則幸甚三火統辨若干言大禹觀銘仁清觀碑二通隨此録上不宣說鈍之字說雲間郁生父名之曰鋭請字於子子字以鈍之鋭必鈍鋭不鈍養鋭者摧矣三尺之鋒出削示人曰孰敢攖我而敵有折之者鋒不蔵也鋒鋭而蔵于不鋭其孰能禦我之鋭哉故曰鋭以鈍飬老子曰大辨若訥大巧若拙老子之辨養於訥天下之辨莫能勝老子之巧養于拙天下之巧莫能爭生之鋭養於鈍則天下之鋭莫能敵矣庖丁之刄十九年所解千牛而鋒若新發硎者何也其投刄於虚者鈍以養其鋭耳鈍之勉哉以鋭用鋭二下有攖之者以鈍用鋭千牛之解者恢恢乎其餘地也鈍之勉哉母輕用鋭數説贈吳鍾山子讀吾志觀趙達九宫一算之術其計飛蝗推鹿肉算某年月日時中之類其應如神公孫滕事之為師欲得其術而為此術父子不相授受也夫聖賢道學固有授受而術者之本雖父子不能相授受也學不難于聖賢乎松江吳鍾山以大一九宫諸算之術鳴江湖間自謂其學傳之父竹所君竹所有傳之其父一峰君趙逹父子不能傳其傳而傳鍾山之傳祖父孫三世非其天授之性呉於庸衆人逺甚能之乎故公卿士庶咸知推尊其術而鍾山亦自閟其術不輕以語人余在姑胥時鍾山持助教宇文氏詩來見予不知其能鍾山亦不言也余逰松鍾山又見余璜溪之上乃曰先生棄官已十年數盈十必變數豈有往而不復詘而不信哉截自四十九而往為余下著蓬萊之事某年日起某官某年日移其所某年日當調内某年日年來數事而先生已在水之南山之北矣余為之莞爾曰日中則移月滿則虧天地之恒數也進退盈縮與時變化君子之用數也故君子得時則義衍失時鵲起數之一定者在天而用之隨變者在人故君子以理占數也予徒能縣吾以一定之數其能之乎用數之道不為數禍福窮亨者乎鍾山謝曰吾能知吾之所知時不能知先生之所能也請書其説豻循海而歸見予方外有道原衍禪師禅師静閲物之盛衰而其所傳之道有不物之者在與吾不異也出余言以質之余説贈夫容子客有夫容子者過余談壽富貴人之命曰某不道也而算踰大老至某不仁也而貲連鉅萬不學無術也而官極隆品吁德之不勝乎命也奈何予莞爾曰甚矣夫容子之不讀書也予不讀郭先生之議北宫西門二子之厚薄歟則知命有亡瘉乎德者西門子之達非智得也北宫子之窮非愚夫也皆天也西門以命厚自務北宫以得厚自愧皆夫固然之理也先生之言一出西門不敢言達北宫退而衣裼有狐貉之温食榖有膏梁之膄蓬廬有廣厦之廕蓽輅有文軒之飾終身卣然不知有榮辱之在人在我也此德勝命説也夫容子談富貴人命屢矣未見譚德人之徳浮于命者子游東州金華有鹿皮子武夷有清碧君㑹稽有梅梁道人皆窶而有隐徳不願乎人之食肉衣繡連欐之居結駟之騎者也子徃見之誠以吾言扣之其識徳命勝不勝之辨已夫容子行書其説以去折字説贈陳相心拆字之術原出于蒼頡而得説於子華子頡之制字象形諧撃各有其義子華子於制字之破嘗推其説曰韋革雖柔擴之則裂礦石雖堅攻之則碎以此知物之剛柔雖不同而同於一也盡使字之寓意義一一若是揚雄許慎之説不亦闇哉永嘉相心生以拆字術鳴于公卿間其推原禍福考索成敗亦既騐矣生亦能以子華子之所推之乎子華子曰無數無有隆庳無形無有成虧生能泯其數形勿使庳有隆之因成有虧之漸吾且許子得迶於頡之初而游于河未圖洛未書之天已字之制拆何有哉䄂鍳説贈薜生嘉禾相者薛氏以神鍳自命装潢名公卿所贈鍳卷訪余雲間次舍自乞一言余莞爾笑曰生知夫人鍳乎物之善監若鏡若珠若髹若靈石若止水若白明月而鑑之神至人之莫能洞物之微其鑑之神者大無外小無内前無古後無今遁説莫之遁廋說莫之廋此人之鍳之至也君子談柳鍳者曰升向氏之於伯有也子輿氏之于益括也郭泰氏之於史淑賓許邵氏之於曹阿暪也又高而神之圖澄之鋻可龜也辛有之鍳被髪也延陵子鑑國姬公旦之鑑世也已至乙鑑愚愈推而愈神若是者斯可與語神鑑也已嘻是豈許負氏之細伎乎生之神鍳其亦識是乎生逡廵拜手于額曰車馬走于賢聖之鍳乎吾知願字焉庶先生大人之大余鑑不啻許負氏之細伎也請書卷首為薛氏月錢誌説相贈王生子史鉞之言曰牧天下之士而亂天下之亊者相者之言也相韓信者當背而後貴啓信之叛者相也相鄧通者當貧而餓死繳帝之富通相也相英布者曰當黥而後王縱布之為過坐法者相也相韋昭達者曰貌魁而後貴縦章之毁厚遺體者相也劉侯相桓元子曰子仲謀晋宣王之流亞也啟温之懐吴而卞軀者非惔之言歟来和相晋王廣曰眉上骨隆貴不可言也啓隋文之廢嫡而喪國者非和之言歟故曰敗天下之士亂天下之事者相者之言也客有術唐許之術者曰王生松溪來訪余睦州談其術於廣坐中曰某人下吏也術經業可封侯某人存心孝恭當享遐算某人夙有隐徳當及上弟子義之曰善哉生之言相也異乎吾史鉞之所陳者乎吾聞嚴君平之卜也語於人以忠孝得曽子之教若生之語相于人不得曽子之教者乎主別余上京師求一言叙行卷故引余史鉞而復有取于生之言者書以為贈仁醫贈劉生仁人不得為良相願為良醫則伎之仁而善濟世者莫如醫也及讀扁鵲倉公傳則怪其方術之仁而鵲不能令終倉匿迹當刑惟少女幾不兔焉何也史謂美好者不祥之器子觀鵲祕所傳方時昭名譽於諸侯此取媚得死之道倉挾鵲祕書決人死不為人療病使病家冤之此又取怨得刑之道何尤於器不祥耶倉之師陽慶公孫光也慶亦屑理人病光屬倉積方勿令教人嘻師弟子一何不仁之甚耶河閒醫師劉本仁壮負逺志北上京師不得志輒放遊名山至廬阜遇至人授以肘後書洞究醫家微遂以其伎翺翔吴中吾喜其視人病疾若已有之施醫不以貴賤富貧二厥志其蓄竒祕不異於扁倉而施方伎職理病實上於㧂倉者若本仁者可稱仁醫知本仁而謂之器不祥可乎若至仁者授鵲之祕又孰愈授袐本仁乎蓋本仁儒家子臨江教授之孫宜其得實之仁而又能廣仁之施如此本仁字起元既自號其樂室同仁而求言于余故為作仁醫贈云論馭将論将國之爪牙也馭之善則得其利不善亦足以致吾害蓋驍武勇鷙鷹搏而虎噬者其素所蓄積也乂况有挾切而驕恃恩而放者乎故臨時馭之以智術而不勝者不若平日束之以威令之愈也蓋嘗觀漢高祖以術御韓彭者不幸不勝則殆矣當時如韓王信陳豨盧館者皆號恩眤親黨亦逺起而為亂髙祖倉皇犇驅而僅勝之吁一有不及天下非漢事矣然則漢之有國不幾幸乎及觀周世宗之馭下也而後知髙祖之勞扵智術不如世宗之逸于威令也世至五季将之驕惰者甚矣梁唐晋漢大率以是喪主成而至於亡也世宗掘起獨秉威令以下陵上替之後何樊愛能不用命兩人一誅而後世宗抌于不臣之将王景韓通輩收其瓜牙之力如獵者之役鷹犬耳其去髙祖以術御将幸而勝不幸而幾敗者不亦優乎令淮吳府之僚將也皆一時昆弟交也蓋有親眤恩黨過於漢者大抵以權利相合則亦以爟利相暌慎于利害之際不能無疑則隙之所失矣馭之稍失其道則有快怏恥于北面者不可不慮也慮而後結之以恩之不朦籠之以智智不勝則将若之何吾為比懼嗚呼高祖之術世宗之法惟善馭将者審其勢之利鈍而為之所也故作馭将論人心論夫人心者天地命之所係國脉之所闋也劉文叔之中興也民見者曰不圖今日復見漢官威儀此人心之思漢而文叔收之以中興也郭子儀李光弼之匡難也民見者曰不圖今日復見官軍此人心之思唐而李郭収之以匡難也故曰人心者天命之所係國脉之所關收人心者要常使之如父兄子弟之親親出于天情之固結而不可一日離而去也人心一歸天下事無不可為人心一去天下之事解體矣載論全蜀之人心在於関江漢之人心在于城一關失則三蜀皆無以自存一城破則江漢無以自守此無他人心所固者在關與城也二廣之人心在於嶺兩浙之人心在于江一夫越嶺則二廣之民皆憂惺而不可禁一舟渡江則江左之民皆潰發而不可支此無他人心之所固者在江與嶺也善用兵者必先有以收天下之人心乂有以固天下之要害天下之要害固天下之人心固矣今日之人心閣下所知也其收之固之之術閣下所行也然有離而去者何也宫軍所之先以花猫金鎗之黨蕩覆我民舍離拆我人心使之荷擔以待襁負而去吾之屋廬皆爲彼之營皆吾之牛羊皆爲彼之膾炙妻妾子女皆爲彼之奴婢金寳財物皆爲彼之褁囊城郭之民養卒如養虎田埜之民避軍如避㓂今日人心離而去者以此尚能爲閣下守要害乎閣下以誅討賊虜恢復王土尊奨王室爲已任則請以收人心固人心爲第一義也吾故斷之曰人心者天命之所係國脉之所關也作人心論緫制論吾聞兵法在古有五乗之制五乗者寕法之根本而人心之所由以一者也人心不一而欲守之固戰之克者無也僅語曰十人一心有利貿金十人十心無利買針夫使百人操兵而攻虎者虎勝使父子三人荷鋤而攻虎者人勝何也百人之心殊父子之心一也此言慶小可以喻大緫制之所以名者一衆心以制敵者也非徒一號令一服色一旂幟一金鼓七投虎龍八陳之法也夫一衆心以制敵則非律以五乗之法不可也人心有所不一維十萬百萬之衆而心各心於百萬則固不如十人一心之為利也故戰之勝負不在士之多寡而在于心之一不一也秦誓有億萬人離心離德予有亂臣十人同心同德是商民之衆心不一雖衆無所用之周臣之心一雖千人而可以敵億萬人之衆也後世五乗之法廢士心既不一而将帥乂無所統至於忌能争功一麾之下自分疆界一捷之中妄分𬒳我諸物之心如此况可一知士之心乎吾求矣将帥于三代而下如春秋郤克士燮欒書者亦可稱賢将帥矣于鞌之捷克之言曰君之訓曰二三子之力也臣何力之有焉燮之言曰庚所命也克之制也夑何力之有焉書之言曰變之詔也克之用命也書何力之有焉二三將帥更相推讓不自有其功而中軍統屬未嘗紊也今秣陵之喪帥者衆心不一也建徳金華之維喪者衆心不一也各帥之出鎮東鹵者曰漢曰淮曰猫曰䅮部落衆矣而衆心果能一之乎總制者果能盡制之乎諸部之心未能如周之亂臣又未能如于鞌之諸将吾恐維為秣陵建德金華者可畏也故以古者五乗之制周亂臣與晋三帥之事為總制論求才論可綴而不必求者天下之常才不可緩而必求者天下之竒才也蓋事變出不測者非常才之所能才而必濟之以竒才竒才不可咄嗟而得也必求之至蓄之素也譬之醫家之蓄物也蟲魚草木之劑出于市之所易得者不必蓄也至於山海之竒産非市之可常得者則固旁搜素蓄而為吾卒急之用也今㓂之窺釁于我患有不測而起者吾猶夫常才以處之以為其人易得也其術易曉也其需易應也譬之治竒疾而欲用草木蟲魚之當劑其不誤而敗者幾希矣今夫提市井之衆以與悍敵抗出竒謀祕術以應其變而制其勝或單辭片檄而下其城於帶甲百萬之衆則必用夫不常之才乃可耳其人於千百人中或一人焉千萬人中或一人焉不可朝取而暮得也必先君以求之至蓄之素而應吾不測之用如山海之竒産然後有以應天下之竒疾也於乎天下之竒才王伯之佐乎聞之謀主也代未嘗乏求之而不得者以求者非其道求得其道而乂用之或非其所也急竒才者不咎吾求云非其道用之非其所而咎天下之無竒才也不亦過乎劉備符堅嘗知竒才於葛亮王猛故求之急而任之為語主周亞夫亦知竒才于劇孟求之緩幾資謀於蕭寳寅亦知竒才于蘓湛用之光其所而乞錢以去李宻亦知竒才于徐洪容用之失于緩而其人已在泰山之矣惟閣下立賓賢之館於竒才也亦知所求矣然求之非其道用之非其所則孰愈安坐而不知求者哉吾以為閣下圖伯必得謀主欲得謀主必求竒才故作求才論守城論城以保民為之也城不保民則不固不如恃民之為固也故曰衆心成城城以恃誠不如恃民也苟得人心雖畫一地而守植表而限可也不然崇城到天巖扉重閉我之民心内㩦而外叛曽不若折桞之樊吾圃也昔梁伯亟城而而不處罪而不堪則曰某於㓂将至楚囊瓦城郢而沈尹戍戒之曰苟不能衛能城無盖是皆恃城不如恃民之説也今錢唐新城雉堞既定地隍俱備人度作者之少難吾猶慮守者之不易也南翁之言曰居城者不築築城者不居姑以近事明之四明之城不曰禦方㓂乎而方㓂居之新安之城不曰禦㓂而冦居之睦州之城入以禦胡冠也而胡冦卒居之豈非前轍之騐卒稽諸圖志臨安之城死一百二十里宋人興築厯十有三年而不能完其半今之板幹取於時月之間雖有神工鬼役吾不之許不至牽架以成鹵莾滅裂之功今兵疲食盡不以此時為討虜復城之舉而為此自疲自困之計此虜之竊笑吾禦敵者為無術矣昔齊王任枟子者守南城而楚人不敢彎弓而南下任盻子者守高唐而趙人不敢漁于河是二子為國長城不啻金山鐵壁之固者不優于一百二十里之雉堞也耶今閣下之守土惟知城而不知恃民與恃守将也興築巳還五郡之民則窮矣力竭矣小變怨而叛大變冦乗而至矣此時雖有泰山之城江海之池恐非閣下所能有也惟閣下省之慮之此吾占於人子者又有占于天變者六月十九日火不七日地震此天變之驚于閣下土石之疲也至矣閣下不知牧人心以回天意吾未知其可也惟閣下以吾言省之慎之東維子文集卷之二十七

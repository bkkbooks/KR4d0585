body:
  text: 會稽鐵崖楊維楨廉夫著記竹林七賢畫記右七賢畫一局四明梅氏之作施景芳氏之藏也七人落茟而書一閣筆而思者二撚髭者二擁鼻者一背胡床而面仰空者一非逰心于嶰谷君山則湘水之斑淇澳之漪漪者歟按史七人者譙國嵇康河南山濤琅琊王戎陳留阮籍阮咸河內向秀沛國劉伶也共為竹林之遊世所謂竹林七賢者是也子嘗約史評之顯用于時者濤與戎也濤司人物之銓者十年粗稱得人然所甄拔隨上意向後先則未為忠直戎徒苦論談于子房季禮之間揔鼎司而惟務苟媚及醫乨乃欲慕蘧伯玉之為人至于握牙籌鑽李核其鄙有不足言者他如秀始有箕山之志而之洛為時主所機伶專以酒為務酒德之頌乃其失德之自著也咸又縱情越禮有不忍言者惟康以才俊氣豪而不免東市之及海內之士無不痛之籍廣武之嘆蓋以英雄自命不在劉項之下慨然有濟世之志者也使二子誠德時行志顧未知其究者何如耳然吾又悲夫典午氏之養賢不在朝而在林也夫國無仁賢則國空典午氏之國不亦虛矣乎而後世又使李孔韓裴之徒相與迹其遺于竹材之後其果竹之而樂見者歟賢之而樂聞者歟嘻至正八年春二月三日志聽雪齋記金華戴君良過睦謁余官次明旦復持卷來曰良所齋室鄉先生柳道傳公嘗書聽雪以顔之未得記而公卒且令良有請于吾子幸吾子賜之言子重違柳公契濶意而且喜良之切切于雪為之言曰雪一也聽有不一焉僵而聽卧户之士羈而聽被鐵之夫業而聽又甕牖之儒蓬廬之漁耳戴君氣盛志廣而才甚長見時顯貴人成喜而與之進出鄉逰通都且將北上京國有風雲之會而于雪也奚能效前所陳者聽邪抑聽雪以聲固不如聽雪以理者之為聽之深也今夫雪也出玄而生白似化藏于密而散彌六合似道將集而霰先焉似幾隂涸而合見暘而消似時匿瑕藏疾似量無論穹卑夷險一稱物以施狀似平治若是者雪之具德廣矣戴君反之在已不在雪也則其取數于聽者不既多矣乎不然吾懼之所聽者卧户之飢士被鐵之戊夫牖之窮儒蓬之寒漁而已耳何取柳先生之屬于雪者哉君起謝曰良固知聽雪以聲固不若聽雪以吾子之教也五泄之麓敝廬在焉逰將歸矣請書為記蔣氏凝碧軒記吳興蔣君廷實屏居大湖之陽築室數楹開小軒為遊息之所軒瞰翠竹之林林外湖水縈帶湖上之勝于是為最遂以水竹故名軒曰凝碧徴余記余謂水之為物止而通竹之為物虛以直惟有德者肖之君為吳興望族不以資為樂而隱於寂寞之濱如野夫田叟更種竹千個列于讀書之軒軒外日見鴟夷子所遊三萬六千頃之渺茫仰觀湖中山七十二峯之秀風帆沙烏雲煙變態集為一几案之具而君潮遊于此夕息于此水竹之姿凝于一碧者蓋野夫田叟不足以知之而盡在君之肺腑矣其見於筆墨為詩為畫者一凝碧之所發也雖然凝碧之樂於耳日者淺也吾意蔣君之所慕者凝碧之所性也方其開軒見湖與天上下萬頃一碧撓之不濁澄之不清甚而流注之潤綿亘三洲于數百里外其及物之澤不可算也矣君子體之止而通者不于是而得乎坐軒而對竹本固未茂貫四時而不改柯易節千仭而不回不撓君子用之虛而能直者不于是而得之乎吾嘗過軒所愛君年方妙而好學弗倦軒中左右陳列皆古今書史又日與士大夫切劘講肆周旋于水竹之間據幽發粹是宜行益髙道益茂既宏乎其內必揚乎其外吾懼其間居之樂不果于凝之地矣若夫留連光景于几席之間放肆詩酒于禮法之外則非豫之所望于蔣者也石林茅屋記維揚劉士衡有宅區在井邑之中而扁其燕處之室曰石林茅屋客抵其所咸訝其矯誣曽無異乎索車水中求魚末也士衡則曰吾井邑其居山林其心也太原趙子期既為作小篆書其顔而又因武夷蔣思文來吳求志于豫豫謂世之人于可欲所在未嘗不奔而遂遂而得或至決性命而後厭正山林枯寂非哉之在掇之弗去非心逰于遂物之外者不能取人之所不取也士衡宅市井爭奪之場而獨取人之不取于爭奪之外吁若士衡者豈誠市井之人哉豫士衡之逰心將以誘夫見欲而未化者也夫石林茅屋在大山硐谷之所其去士衡之居計其道里之勞莫知其若干舍也而士衡以一遊心得之若身倚枯株首載斷茨不知華吾堂者為金碧朱紫逺吾亭池者為珍木異卉也嘻使移是心于玉山珠海則玉山珠海入吾帑移是心於玉堂金馬則玉堂金馬列吾舍是揭鑑松紫開谷納聽之象也而士之能悟士衡之悟者或寡矣故豫重言也使見欲而未化者知天下之尤松足以易吾之境者皆士衡之石林茅舍也書其言為記至正八年春二月初吉蒼筠亭記毗陵路義道由鄉選司櫝史豫姑蘇會府年勞滿而因家焉舍東築亭為宴遊所亭前樹竹數十挺蒼翠几按翛然林下風也吳興趙雍為書蒼筠名其顔義道屢觴豫亭之所遂徴記余謂竹之為物草木耳然有異于草木登聖賢之經傳者其德也故詠於詩者曰瞻彼淇澳緑竹漪漪有斐君子如切如磋此衛之詩人以竹之色興武公切磋之德也記於禮者曰如竹箭之外之德也竹之見於詩禮者如此則古之君子取於竹者有在矣世之取於竹者異乎君子之取宜玩物之私爾若晉之七賢唐之六逸是也甚至遺落世事蔑棄禮法相與沈湎景光以為曠達是竹亡資于人人覆纍乎竹也吁竹之所見如此世道之幸抑甚矣今義道之取于竹也抑取詩禮之所取者歟抑徒聚其七賢六逸之逸遊者歟吾間義道自其祖以來三世以詩禮傳其家義道方延海內師以訓其子于是亭也左右圖史客至相與談道義顧瞻筠之蒼然者出于條蕬榮瘁之外不啻若友然則知其取於竹者在詩禮之所記録而詠歌者諗矣凡今之人一庭一户有取於竹者皆如義道焉其不為世道之幸乎哉書諸亭為記至正八年春二月初吉李氏全歸菴記昆昜李靖民氏既葬其考蒙齊公于鹿山先塋之附其家舍曰全歸蓋取公垂終語以名繂石且既銘顧全歸未有記者以之屬豫曰吾子辱與某友慈幸而卑之言不唯其不肖孤之光先子有之將不憚其齡不六十也子唯曾子之言曰父母全而生之子全而歸之可謂孝矣又曰不虧其體不辱其身可謂全矣然其全有二焉全體也性行也性行弗全而謂體全其全弗當也曾子之啓手足全也而慎五孝以恐恐乎慮辱其身哉及其親者全之至也按銘者言公生宋末年十三丁改物之會不幸大軍掠之以北遂為帥者偉兀氏家兒服其巾裳習其語言文字越七年始獲南旋而母夫人逝矣公泣血追服葬祭皆如禮甚又十年朝廷開國字學諸郡公以通國字首為本郡學教授居官六年記試絃之史譯實創於公書上吏部將改調而公無仕志且尋隱竹林期盡其餘齡屬纊不亂語諸子不及家事惟誦曰鳶飛戾天魚躍于淵又曰全吾生以歸之期從先人於九京也公之始末如此或者病其出與處忤行於性乖謂之全果合子輿氏之訓乎余曰有孝幸不幸父母俱存室家胥慶服勤以終養不服暗不臨危以保其遺體此人子之至願及變故猝至不獲保有其身而隔截其親此人子之不幸也丁膚身樂正子之不幸丁創足也公之不幸曾何傷於孝乎追服葬祭之盡其禮曾何慚於性之全乎君子道貫精粗行周隱顯公之史譯成而身退仕止久速之各適其可也又何慚於行之全乎若是則公之奉身兢兢獲歸全於地下從先人者非徒以全體為幸也矣靖民聞言起再拜曰吾先子之全歸徴斯文幾不免父母既沒慎行其身不遺父母惡名不肖孤敢不重幸請勒諸石為尚有以警吾後之全世世無忝云至正八年九月已未記張氏瑞蘭記蘭王者香也其生或與神明通晉羅咸家其庭或生蘭史因以為德行之感然則蘭不期而生自生者非偶然也必矣吳人張雲景氏葬其親于武丘靈夀岡之原軒草治壙見業蘭一種獨秀于荒葟茅棘之間實青烏氏點穴之所也亦豈非孝感所及天有以假之為牛眠馬踣之兆耶蓋吳中土風無論貴賤家親死悉棄于火夫火尸乃三代治惡逆之罪以示陵遲而絶之人類也奈何吳之人子舉惡逆之刑以待其親而曾無天誠之痛耶景雲氏獨能痛其親拔去惡習營善地以藏其親躬負土成墳廬墓者三月而不忍去其情有不合於天者耶宜天有以托諸草木以表之也父老謂余曰蘇之有蘭皆市之於他所靈巖天平雖名山皆無蘭茁其中雖植之不生也信其言則景雲氏得蘭于藏親之地其為孝感之符然信矣哉其友從倫圖其蘭于卷又請余記于是乎書至正八年四月四日怡雲山房記有詩山中雲間物也而未始間也自其間而觀之則貞白子之所謂秪可自怡悅不堪持贈君者是已自其不間者觀之則釋子萬之所謂雲去作霖雨不似老僧間者是已昆昜魯倫甫居有東山之勝自其王父糧料院公為園池甲其里東山之雲英英然被林壑者倫甫又取而為几案之物其怡然自悅不翅世之所樂乎金玉朱紫婦女狗馬之有乎其前者也于是自命其山房曰怡雲而謁記於余余固未知魯甫氏之雲其貞白子之所云者乎釋子萬之所云者乎魯甫氏曰範也聞物之有性太極也物之有動靜隂陽也而其徴莫顯於雲惟雲根於極也故其體有消滅有斂叢也而互動靜乎隂昜故其神用有膚寸之合不崇朝之雨也儋崕之人以儲芋生熟識周歲流求之人以月生死識晦朔取于物者粗爾余以雲之根識極動靜識隂昜則余之怡然有得者豈徒積金山中宰相之為怡者哉豫聞其言而知魯甫氏之聞道于雲也道在是而雲之怡不必間也雲之不必也遂登其語為記而復繫之以詩曰東山之雲英英叶汪兮積白雪偫曽冰叶邦兮吾與雲靜時行而藏兮東山之雲靈靈兮友風伯子雨工兮吾與雲動時止而通兮村樂堂記吳人朱仲明氏居閶關三橋之西面大河官檣賈舶日憧憧故乎其前堂之背則又退為園堂與甲更接保社時時秋履可往還也於是名其堂為村樂既自蒙書其顔而又張古碑墨于四壁曰臨江張仲氏之記也仲明以仲記非本室語屢觴余堂之所集姻合友以樂其所樂者樂余而請為之記余惟君子非造道不足以言樂非知樂之有在不足以得道樂可以聲音笑貌云乎哉今夫富貴利達之為樂順而易貧賤之為樂逆而難也不知富貴利逹之樂其樂也以人材之樂也以天以人樂夫人而能樂也以夫樂非與同我者弗能也惟其樂與天相似也則君子之樂不獨在村已窮而樂以村者此樂也達而樂天下者此樂也故樂之有在不在窮與通也吁村樂之樂又豈村而已哉仲明嘗遣其子奎遊于門以問道父子之樂乎村者知協以天則吾必謂之知道也已矣書諸堂以為記善慶堂記有詩至利在天為一元在人為百善故善必有慶和之致也然庸人為善與君子異君子安處善而慶自至庸人徼慶而為善慶非彼徼而得之也徼者慶之叛也二者公私相去不能以取故天下之慶不得于庸人一時窮取之私而得于君子日用善行之積也孔子於坤之言文曰積善之家必有餘慶君子不以善小而不為惟善小而必為故其積也日登焉若山日待焉若海積之厚者慶之長也故曰有餘慶崑之張君景罡築室兵之隂夏駕之易歲聘顧師教子弟其中日交接賢相友治酒事必升堂講古飲禮黃髮番番文衷斑斑青紳翠丱沓列後前自以為宋獻魏國公後百年餘澤尚演為四世相望之慶故名其堂曰善慶番昜周伯溫父為大書顔之而未有記之者景罡既觴豫堂之所且遂徴記豫以崑古疁邑也其俗競節物信機祥雖世家大姓咸尚物佛鬼徼福田為利未見有以詩書禮義為務而得餘慶之長合孔子之言者也今於張氏之門見之於乎張氏之慶必復其始當有子孫名世者作矣故于樂卑之文鐵江泥沉其流長深奕奕新堂有書有琴有橋在髙有梓于隂君子慶只少伊氏之覃宜爾家屋和樂且湛鐵江湯湯其流深長奕奕新堂鳳鳴于陽左書右琴其椅其桐君子居止嘉賓式燕以慶叶子孫樂只夀考不忘嘉樹堂記吳之練坼有隱君子家為恕齋強氏其先八世祖某自汴居吳遂為吳人手樹嘉木一本于中庭在志曰雖栖子俗云皂莢者其根抵母堂背蓋囷囷然蔽風暑色理堅緻不為螻蟻所近其閲歲已二百幹益碩大枝葉亦華實益美茂於是強氏子姓繁衍亦且二百餘指而有食君之祿者矣余過其家見其樹而知其先德之覃於後者未已也恕齋持觴為豫夀且請記于聞諸傳季孫宿有嘉樹為韓宣子所美吾不知其樹何樹宿曰何不封植此樹以無忘角乃之詩遂賦甘棠夫季氏子孫為魯公室斧斤樹之封植其德敢比召南哉宣子蔑魯媚季其嘉季者果樹乎世澤如甘棠之後若孔子之檜田氏之荆王氏之槐是已此非其子孫一時封植之功也一本之深百世之下固有若神明護恃者在焉非偶然也嘻孔子之檜吾不得而見之得見如田氏王氏爾可矣曰氏王氏不得而見之若今強氏之植非田氏之荆王氏之槐也歟非所謂嘉樹有而光傳記者歟夫前人所種斯收于後人後人所培又以固前人之本恕齋伯仲皆清修好學尊德而尚義周人之意髙至于捐金粟以助國費而利祿之心未嘗入焉其於樹所培者厚矣前人植之後人培之一元之氣雖母百世而可也豈直八世十世而已抑余聞梁甘露降皂英樹世有幽宜書載虞晚折枝事施報尤捷果信也強氏義施之報吾將慶甘露之降是樹小桃源記隱君顧仲英氏其世家在谷水之上既與其仲為東西第又稍為園池西第之鹵仍治屋廬其中名其前之軒曰問湘中之室曰芝雲東可詩齋西曰讀書舍文後之館曰文會亭曰晝畫舫合而稱之則曰小桃源也仲英才而倦仕樂與賢者居而適以賢君余余抵崑仲英必迎余桃源所所清絶如在壺天四時花木宴溫常如二三月時殆不似人間世也余既預宴落室仲英且出文木板求余志榜屋顔余聞天下稱桃源在人間世者武陵也天台也而伏翼之西洞文有小者云據傳者言武陵有父子無君臣天台有夫婦無父子也方外士好引其可以為髙而不可以入中國聖人之訓矧其象也暫敝亟閟其接也昜示而隂諱之使人想之如恍惚幻夢然不能倚信雖曰樂土若彼吾何取乎哉若今桃源之在顧氏居非時託之引諸八荒外也入有親以職吾孝也出有弟以職吾友也交有朋儕戚黨以職吾任與姻也子孫之出仕于時者乂有君臣之義以職吾忠與愛也桃源若是豈傳所述武陵天台者可較劣哉然而必桃源名者留侯非不知赤松子之恍惘也而其言曰吾將棄人間事從之遊知之者以為假之而去也仲英氏亦將假之焉云爾仲英齒雖強而志則休矣其桃源其休之所寄乎而猶以為小云如伏翼者小寄云耳固不能大絶俗而去已或曰崑俗信仙鬼甚貴富家有駕航冀風一引至殊島見瑶池母東方生乞千歲果啖之而顧氏家弗能從此小桃源之名于崑也仲英聞豫前説喜中其志又聞後説而喜人之億其中也并書為記至正八年秋七月甲子玉山佳處記崑隱君顧仲瑛氏其世家在崑之西界溪之上既與其仲為東西第又稍為園池別墅治屋廬其仲名其前之軒曰桃源中之室曰芝雲東曰可詩齋西曰讀書舍後之館曰碧梧翠竹亭曰種玉合而稱之則曰玉山佳處也豫抵崑仲瑛氏必君子佳之所且求諗榜屋顔按郡至崑山縣華亭陸氏祖所窆生機雲時人因以玉出崑而名山崑邑山本號馬鞍出竒石似玉煙雨晦明時有佳氣如藍田焉故人亦呼曰玉又曰崑而仲氏之居去玉是舍逺奚以佳名哉山之佳在去山之外者得之山中之人未知也如唐之終南隱者與司馬道人指山之佳身固在山數百異之外也雖然終南之嘉終南之隱者未知也借佳為捷仁之途千古慙德至于今山無能掩焉若仲氏之有仕才而素無仕志幸有先人世祿生産又幸遭逢盛時得與名人韻士日相優遊於山西之墅以琴尊文賦為吾弗遷之樂則玉山之佳非仲瑛氏弗能領而有之吁與鍾南隱者可以辨其佳之誣不誣矣豫嘗論山不能重人而人重之耳望以剡子重荆以卞和重峴以平叔子重紫金以八公氏重他日崑之重既以陸氏玉之重又不以仲瑛氏乎不然山以玉名者衆矣若鄜若灌若龍城若中已若滇也霅水上饒山隂星沙橫浦皆未嘗無無玉之稱也求佳之賴人而重者如仲瑛氏則玉之稱山者母亦土石之阜焉爾君子有何取乎哉仲瑛􅒜曰瑛何修而得比古哲人竊勉焉以無辱先生之云也遂録諸堂為志書者泗水楊某篆者京兆杜本也至正八年春正月既望之三日記書畫舫記隱君顧仲瑛氏居婁江之上引婁之水入其居之西小墅為桃花源厠水之亭四楹髙不踰墻仭上蓬下板旁櫺翼然似艦囱客坐卧其中夢與波動蕩若有繿而走者豫嘗醉吹鐵笛其所客和小海之歌不異扣舷者之為中無他長物唯琴瑟筆研多者書與畫耳近以米芾氏所名書畫舫命之而請志於豫豫喟然曰自人文潔於有態氏後世變不已而有書又不已而有繪事書一形而鬼夜哭繪一著所采色盲人之目矣子欲還治古則唯恐書日煩繪日密又何顓之為以名與米芾氏爭途于江淮上乎聖人取易之之漁刳木為舟將以利天下之通耳又豈為子輩好名者設資之以侈書與畫哉求書于晝求晝于畫固不若求書畫于象先也君試與客仰以觀星文之經緯俯以察地理之脈絡是太寶書也逺以眺三神山之出沒乎海濤近以鑑五湖之煙霏七十二峯之空翠四時朝暮景狀一同又大畫苑也書耶畫耶屬之芾耶我之屬也隱君笑曰書畫若是舫將安屬曰大地表裏皆水也大羅竟界一渣之浮急旋水中央而人不悟悟者必在旋之外也吁天一大瀛也地一大舫也至人者以道為身人乎無窮之門迢乎無初之垠斯有以見大舫于舫之外子能從之乎隱君謝曰甚矣子之言幾于道豫知居舫而不擬聞大道于舫之外也書諸舫為記信齋記吳下張生本既以信呼于人又字其所居室而求記于豫豫謂信之為義大矣天地一月不信日月星辰不順行隂昜寒暑舛差錯盩而生之之類息嗟夫天地不能一日外大信人參天地而不信得乎孔子論信嘗以之重食人一日不食百骸未廢一日不信百行終身廢矣故君子寧一日無食不一日無信秦法吏立百金木南門示信立而後今有以行秦法吏不能外夫信矧不為秦吏者乎今之吏以聖賢自謂而有不能信於人者謂非秦吏罪人得乎生治春秋學吾聞春秋以斷事為信之符也生將有位以治民矣惟春秋之斷民信之用大矣豫懼生之視信者輕也故孔子之言春秋之教參乎天地不能以外夫信者語之生之父子之友也請豫以説質之東維子文集卷之十八

front:
  text: 東維子文集卷之二十三
  hash: sha256:efd5a35692365468fd3869283999ce44a93f897aca1468a3d18c9138db57252a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_023-1a}
body:
  text: 會稽鐵崖楊維楨廉夫著碑兩浙鹽使司同知木八刺沙侯善政碑至正十三年春正月杭之監檢校官劉某將監商嚴峻等來見余東門次舍請文以記使司同知木八刺沙侯之善政余驚疑曰當未氏冦亂之餘而監漕官有政可紀非官之祥也歟余嘗官於海濱矣見歲之分漕官挾悍吏二傔㚢一校卒數十至分所必先震刑威而以售沓墨於其後下視亭民吏如圈置兔狼殘隼虐無毫毛隱痛其啖噬滿然後民吏始得垂展手足官給工楮大亭與亭吏必撙捐過其半謹而儲之以俟分漕為故常若輪公租奉公養者吁民其有不病乎朝廷憫之為減額數三之一署監漕者皆輟以臺憲老臣及州郡之良二千石今沙侯之同知兩浙監漕事其應是選歟峻曰自侯下車即攬轡慨然有激揚志分漕嘉禾先問亭黎老貧艱孤苦聽以狀聞取其損數與大亭垂除之豪民故犯推與吏作姦市鈞逮富人及仇家不論情實侯一理已犯弊立革桀吏舞文敗吾法誅其尤而餘皆有警任指使者皆恂恂然謹行於冥恆若侯視聽之及亭工楮毫釐皆到民無異時撙捐民咸抃手叫嗺以為非工楮之惠沙使君之惠也故在嘉禾未嘗一箠及亭之民服力歲課不啻如子職比還司而漕使長且驅馳兵事亭之商散轉漕之利幾格侯於此時兼伯長之政招㣣客商不減平昔先是倉史與網兵相為姦雜監以偽惡侯申令禁止又其所藏監悉多纍年不發較常數虧十之三四侯驗商人所給數俾新間故以與之且不便強有力者越先後次不數月商舶押至流運不絶足課於常數以充軍國之需於此是侯之才有大過人者無負國家選用之料矣吾聞君子論祥以政不以物商人談侯之善政如此亭家被其澤者可知已非吾所謂官之祥也歟是宜書其蒞官行事刻諸真石永示後軌侯西夏人字某平章某公之孫也記銘曰惟海殖利利民利邦謹政厥策懼民有創法苛亭困法慢困商官不理法墨敗我常爰選才德以量漕綱惟我沙侯良二千石下車求言民我休戚指使循良抉去蟊蠈刑罰不乖爾亭我力關石不頗爾商我役惟侯治法廉厚秉心其履怛怛其德惜夕展我謳歌易爾呻吟昭然冰鏡溉若旱霖轉運大利出納弗僣君子論祥以政以德矧丁冦亂官失守職我侯守官乃建成績盍踐公輔以禎王國我作銘詩昭示政則長興知州韓侯去思碑吳之長與范元禮致其州父兄之言曰州之良二千石為韓侯侯起身濮陽同知州事厯汝同知州事得民譽甚四命為今職長興吳壯邑也其地邉具區農艱食其土俗浮囂好盤逰大家喜氣勢多訐爭素號難理雖老財察者病弗遑惟侯之來也本之以仁明決之以剛而行之以直也盡刮去舊時積蟊話焉為令筆焉為晝一出豫奪是非之公長二或以各意爭豫敓侯既以正持大綱其中雖上下有矛盾其不順而治者寡矣民始有不便安其為者形諸誹傷􅏒未幾則咸識其意樂其利而歌其休也邑役素不均由資産弗辨也侯下令産漏資匿者許若干日自陳即不陳許人撿役焉不三月得列簿悵役無不平曩貧凶視戒石勒因去之侯至作新石益大書其詞且名其紀令書曰不欺天云由是大家悉無敢姦以私者白鳥鄉者悖弟周福斫死其兄而誣訴於他日者侯得其情出他冤反厥坐下箬寺僧某為仇人誣姦狀中傷吏有仇相為根株僧某下獄室幾死侯辨其衣物差牙即伸其枉民情大悅服其明決類此侯奉太夫人且八十矣太夫人教侯仁且賢侯朝出視民事歸必告其母事當理喜而飲即否不飲食且愠見於色故侯政之休者多出母教也侯視事期月繇賦平姦慝屏流離還關市通墾闢廣而庠序之教興矣民謹然誦之為良二千石往者未嘗有也今秩滿去吾民有什百為群相與涕泣遮馬首于東門不聽去者願子體民意卑之以文刻諸州亭之石不惟使民懷德不忌庶幾候來者亦有所述也豫客吳興者二年諗侯之政與州父兄言不誣故為之序而且繁之詞侯名約字彥禮博齋其自號真定人其家世勛望有家乘在兹不復詳也長興雖湖州之支邑曰吳長城悍若易闢義亦易興惟民師師慎簡其人其人伊何曰剛且仁侯來自西維父維師且視其民夕奉母慈母訓爾聽與民爾政俾爾民康寧俾爾無爾病惟牧保若保赤子我哺我衣惟恐子駭汝疇汝闢汝蠺汝織勿奪汝時矧迫汝役汝有痛生我其恤之汝有枉罰我其出之政用大和臬用不辜若旱得澍若渴得蘇侯今去我誰與活我迫我冤我誰復拔我惟湖有石其石漸漸刻侯去德後來具瞻富陽縣尹曹侯惠政碑皇帝踐祚既久念海內外土地之廣生齒之繁仁義禮樂之澤有所未周乃召丞相議政化之得失繫於郡縣之寄由是簡牧伯以惠黔愚多周儒術為理仁厚循良之吏往往得以紓其藴抱而窮山異谷之民皆沐其惠休若富陽之有曹侯亦其一也前守有不期月而去者侯獨留五年而民惜其去去之日邑士民馮某等來謁余錢唐乞文以紀侯之惠續馮之言曰富陽杭支邑當東南要衝枕山帶江無沃土美植以當大府之需故民勞而貧俗訐而澆侯下車首以敦本厚俗為先務屬孔子廟壞乃捐田之入率士籍之優饒者以逮立為事廟既成又為之聘名師招俊民而教養之不數月弦歌禮讓之風達于郊鄙繼新三皇氏之宫社稷之祀壇壝皆煥然可觀下至郵驛河梁百廢具興而民未嘗以勞告巡行畎畝躬説桑田耕深條柔而民無失時惰事之罰阡陌既闢民食其土而庭無盜賊獄頌之聲良田賦役均一而徵科弗亂吏無並緣之姦而民始知以有生為樂也歲六月不雨禾將稿死侯走祈山川甘雨隨注馬山有虎白晝傷居人侯投檄山靈虎尋蹎若憂告詔而去者侯之感于鬼神禽獸有如此者公退輒閉户讀書或行山水間時為歌詩以紓其清曠超越之懷其自治有如此者其是政也明而決其下士也恭而禮其馭吏卒也嚴以恕蓋侯以兼人之質以丞其家學有尚書誰一郡侯運使通議公為之祖州伯奉議公以為文其忠君惠民之教耳熟而心飫之故其設施章章如是前倅湘潭録嘉興既去而民思之今見富陽者吾民之思蓋過之豫聞儒之為德和平而靖深寬簡而粹密故發之於事業多惠愛子諒非徒長裾濶帶以取侮於庸妄者也若曹侯者其亦古之循良吏也歟誠無負吾君與吾相卑豫之重矣曹侯往焉日躋顯庸展其文以施天下益信夫儒者之有為非世之俗吏所能輩行也余也蚤以儒術食君之祿而老與時違聞曺侯之風未嘗不發愧焉故重馮之請而未書之侯名忠字惟良燕人云於潛縣張侯禦冦碑有虎眉叟數人來自於潛山谷間偕其邑大姓曰章和徐瑀等若干人言其縣令張公傑之為保鄣有狀至元乙未夏五月賊起安吉東抵縣外境謀縣署所宅之縣以兵守者先遁初侯慮賊以義結民為伍乘法民無窮富老稚皆樂受命修門隍理器械立旗邑號凡若干伍侯以至師自命矣于民田令今日與民共死生吾死若輩偷生令以五乘法殺若輩吾偷生若輩亦以五乘法殺令即夜統衆二千人迹賊所往搗賊虛殺其魁一人從十人賊望風崩潰越明年春正月賊又自微突昱嶺陷曷化昌化去縣治僅三十里所居民皆荷擔謀徙侯餔牛酒呼民後以五乘法矢如𥘉賊素聞侯名且有兵略皆迂去冦他邑句縣訖按堵如故仍調鄉夫守禦四門晝理縣事夜巡縣境以為常民之倚侯蓋柱石矣夏四月淫雨窮晨夕不止凡十日二麥垂稔而腐且過半侯疏詣嶽祠痛自責者三而天大霽民之倚侯又神明矣他如分振窮敬教勸學飱老疾宥孤寡此又收人心以助皆可書者吁若張侯者非今之保障臣哉侯丞揚子縣有治聲邑民為樹碑著善績令尹吾於潛捍災禦患力政益過之潛父兄亦將樹石西門以為吾人紀去之思聞吾子文足以傳後自有以第而登諸石豫嘗以紅冦滋熾往往易吾官軍官軍覆不敵者以主兵者無能主兵無能以五乘之法七也誠便小而長千夫大而統六師者能守古伍乘去如張侯者吾未信兵不利冦不殄也吁秣陵之潰武丘潰視至將如淦人非惟棄甲而去或有倒戈而仇者誠誰咎哉吾宜有述以諷主兵之不如張侯者庶有瘳乎余未識侯迹其治行若是不啻如心交其人也於是乎書侯名傑字漢臣濟南濱之世家云至正十六年春正月七日記重建海道都漕運萬戶府碑海漕古未有也古者天子千千里而都公侯中百里為都天子都漕而入者地不過五百里公侯都漕而入者地不過五十里禹貢所載入謂亂何乃級節轉輸之次其輸止於方貢之物蓋畏時兵木有餉任未有廪何有於漕運哉春秋時國各有兵事則始講求其法亦不過師行之餉國都之漕猶未講也秦罷侯置郡令天下飛芻挽粟負海之郡轉輸比河率三十鍾致一石漕之為役始勞而泥海之漕亦未講也國象定都於燕控制萬里外軍國百司之調度皆仰給於江之南漢仰漕山東唐仰曹江淮皆無道里遼絶之阻也今京師去江南相望水陸數千里西軍國百司之調度欲朝夕供億如取諸左右吁使無良法以致之則民勞國弊又可勝言也哉此江南海道漕運之法開實天運之所啓也乃至元十有二年天兵下江南丞相白顔公悉收犀藏圖籍上之京師屬將朱清張塇自崇明徑海達於燕而海道實開於此繇是東南入餫者浮遊大舶絶海西行發陵倉踰成山歷萊洋入界河抵直沾以灌於天庾海若受職洋飈逆順龍驤北指僅旬日程耳兹非曠古以來所未有之大利捷便乎故曰漕運之開天運之啓也越裳氏謂海無烈風意中國之有聖人也證之于今不信已乎初漕之署開三府于平江置萬夫長六員僚屬若干人虎符金節兼點軍旅秩數視他萬夫長府弗得儷其筆且重焉大德癸卯併府歸一長二及幕僚凡九員隸屬凡八所糧餫歲增至三百餘萬每起漕必行中書官親臨督調吁漕運之功大則漕府之職隆勢使然也至正丁亥夏萬户買木丁公來顧府治痺陋土木弗之無以副朝廷設司授職之重乃謀諸僚友付萬户鄭公泊定僧公協乃心力各出俸金以率僚屬助以營運子本之嬴明年九月某日始獲徹弊而新規制視昔益宏而壯閲三月某日告及幕元僚孫君來謁配且謂自創府來七十有餘年未有名言垂諸金石惟子其言之豫既為推言海漕之關於天而又有名於人者天既啓之人克佐之斯萬世萬全利也不然萬一魚龍之國阻為巢穴天有不可恃君子之所慮者亦逺矣居是司省知天人交應之道則知其責愈不薄也巳可不勉哉買术公字永錫西夏人起身宿衛連佐省臺有風節今以資善大夫為府之監鄭公用和字彥禮三衢人定僧字平叔浚儀人皆以近侍輟居漕選經厯孫震知事鄧繪照磨衛權董役者千户楊元正府吏湯文修馮謙章復也銘詩曰朔方聖人啓中天天府之國宅幽燕帝車回旋統幅員南海北海無中邊海陵餫餉至領顓龍驤萬斛誰開先神人手執鯨鯢鞭朝發扶桑暮成淵清明風生五兩縣不周風起人南還炮雲不作揚不顛神燈在天大珠圓帝曰開府具區堧出臺入省居才賢將軍來自西子􅞔髙明大屋重翬騫十風五雨熟大田天倉如泉積陳身武夫翼艘挾飛仙天人交贊利萬全漕臣奏功帝曰然囷星煌煌千萬年至正八年十二月某日撰大中祥符禪寺重興碑秀郡庠西個有古伽藍曰大中祥符主僧曰曇師持寺之重興狀來謁于庠次曰寺之棟宇象設其來久矣廢興紀録敢以請豫之名能文庶後有考且以夀吾教按狀創於東晉興寧間哀帝詔剡山法師潛講般若禁中師還山道由擕李舍于安撫大卿魏公知其有道行遂舍地為寶坊延之至梁普通盛行水陸法事故稱水陸院廢于唐之會昌大中天子復天下寺院寺得故宋大中祥符元年改賜今額羣疏于朝作御前崇奉所至今寺之坊字曰華封云獲賜城西蕩田若干畝元豐間有市民魯性忠者烈地五文充寺之河歲令祝聖放生者是也建炎寺燬紹興乙卯主僧法瑜募有力者建佛殿山門雨廡及五鳳樓縣鐘有虡度經有藏沙門先者繼成無量夀佛殿三聖等像二十五年太守林衡奏改禪院乾道辛卯大府丘某奏賜華亭沒官田九百畝籍入寺我朝王林琪公始領寺事又置新田若干畝寺之養稍瞻絶照光公來理法堂鑑湖澄公繼之適颶仆後殿三聖像之存若有神獲者未及興復而寂梅屋常公至僇力經理僅成明樓及歸雲寮至元戊寅江浙相府舉叢林碩德充各寺法席而我曇師在選中願頽圯狼籍如逆旅舍寢食遙安遂盡鉢棄資及募諸檀經營者十餘年始克鼎建後大彌陀殿中嚴無量壽佛像左右十八應真仍翻理前殿左右廡裝靈山會境方丈寢室咸就嚴邃下及庖庫圊湢一一完美方之前後廢興若此余惟寺之廢興以人不以時而人之興也不以土木之績而以硯德髙風也若肇基者之潛師與今曇師之復興者是已然則碩德髙風又豈在于禪哉水陸法事哉吁象教化濁世而後有水陸之其世可悼也佛法離而有禪禪益離而有南北教可悼也已吾怪今之言禪者不根祖始隱語以相蒙誕言以相勝使其徒悵悵然捕風索影訖無自而入大雄氏之道則往往祖狂而失守吾喜曰雲師師身禪而心則儒嘗與吾語道已以性善為法喜以敬尊愛親為上義以安貧居易為極樂以作善降祥為因果以言百師代行師千種為不壞身殆有與吾儒合者非禪門氏率其徒於悵悵然捕聲而索影者也柳子曰吾於浮屠氏之言取其與吾儒合者吾於師亦云師周姓字竺芳郡之儒家子嗣于淨慈之靈石芝禪師其銘曰大道支九流泄西鹿興華軌跲禪亦竒道益愜各户牗示鈍捷蕩真性執忘涉一既離萬曷攝秀之西宫嶪嶪般若宗登載牒考禪奧訌異諜惟曇師我道協南之車渤之楫推離宗返伽葉咨後人廣白業我立言厯萬劫玄妙觀重建玉皇殿碑吳興玄妙觀在子城西北一百五十步為郡官寮祝釐禱雨暘之所本梁大同二年所建玄風觀也唐神龍改龍興天寶改開元宋初改元通大中祥符改天慶我朝改今名崇建聖殿以居昊天玉皇之帝至正六年殿災主觀師聞人得人攬其敗瓴斷礎不無愴然者乃與其徒施道清一乃心力勇發弘願既各竭已資且募檀施得里之大家葉德榮劉道坦等又久捐若干緡錢於是首建聖殿經始于七年秋越明年夏六月告成肥楹傑棟翬飛嶽持繚以朱闌覆以重櫩規制雄大氣象森寒凡慕帝供張之具黃金丹砂璀璨芬郁之錦視昔有加若天上良常化出人世川祇地媪咸大歡喜奴隸婦女瞻仰贊歎誠足以侈廟貌昭神休矣工徒竣事士民相與共落之䆉稏在野歌舞在滁休氣布濩無有災害人康物阜薰為大和則又相與伐石以紀其成知觀事者錢道元介萬户教化公來謁記豫悼吾儒之教岐而為老釋釋氏以滅絶倫理示人以險絶機之而生生之造幾熄惟老氏之道原乎大易大易吾聖人憂患之作老氏者其無患乎閔文法之煩稱也機譎之互角也百疾俱作萬怪橫生晝冥宵光夏霜冬雷罔不繆蟄其故立教以自然為宗以無為為有本返治古於容城天時田不侵畔漁不爭隈訊嬰兒於巢上棲餘糧於畝首虎豹可尾蛇虺可蹍而不知為之者此老氏旨也宋其教者又隆以昊天上帝之居巍巍觀闕與時王等而王法無所於禁亦以廣好生之仁充玄默之化也得為其徒者將推其教以極衰世之苦則祖師之聖又豈直祝釐以夀皇圖宫闕壇墠之崇又豈徒靡吾民力以侈外觀而已哉方今聖天子追治道于黃唐之上好生之德與天同流瘳痍煦殘以恬熙民有含哺而嬉鼓腹而遊老死而不知帝力之加於我者老氏之教可以因之而廣矣既敘其事復為銘詩曰神鼇載辨青浮紅水晶宫闕神人宫金鋪雕礎固且崇參差珠閣當天中仰瞻倍扆天人客天威只赤下地通白雲之鄉帝乘龍翩然大荒靈下降彩煙綺霧陛九重靈鶴萬舞來從東五方之人叩吉凶帝愍下土叩輒從物不疵癘歲屢豐十日一雨五日風聖人體天上帝同好生之德天同功祝聖人夀生聰聰倥侗至德還古蒙彌天萬年天無終杭州龍翔宫重建碑龍翔宫繇宋理皇潛邸改沂靖惠王府為之以奉感生帝山門曰龍翔中門曰昭符殿曰正陽咸淳間又改命南真之館南斗殿曰夀元土曜曰景緝鐘樓曰如應經樓曰近真之章藏殿曰琅函寶藏凡宫門扁揭皆宸翰也撥賜免糧土田山蕩若干頃淳祐六年賜元靜先生一菴胡公住持宫事不有粟道院在湖西栖霞之北天台葉公召某分主之寶祐初又撥賜長州崑山縣田以贍不足承之者為古泉胡公我朝崇重玄教璽書護持今公執以奉修祀典不幸胡僧璉陵轢教門改宫為寺公力於匡復有詞于上獲歸土田者半殿宇不可復則有私資置宋楊和王府基在今城西北隔大德丁酉創造殿宇門廡倉庫以次而舉田有三莊在仁和平江湖州大德已亥公被旨授白麻命語提點所印章公為一菴猶子仙風道貌拔塵俗又以役丁甲之法呼雨退潮致宰官之敬故其成功速而有以光前往裕後來也已巳天師留國公主領宫事後有石田鄭公某松瀑黃公某鴈蕩林公某相繼而出皆有㓛於教事者而林公又克寬展隘途增廣聖殿創建道城於霞山元統癸酉天師太玄公選請洞霄史公景仁提本宫事席朱溫而鄰燎延宫公前及曰石泉已夢下於我矣我不興復天其厭之郡與副宫陳德安止座李與榮一乃心刀議土木事副宫朱慶申都監毛君錫監宫貝景凡為之佐而太玄公亦施舍助二木費繇是大殿法堂山間北應制益窮而大廊廡庫道堂客館凡若干楹無不一一完美三清聖像莊麗雄偉父老瞻仰嘖嘖稱慶以為前此無有也公又捐私資建大方丈疊石為山鑿泉為沼蒔花種木鶴飛鹿走恍若世外扁之曰小蓬山翰林陳公旅嘗為之記後至元丁丑被旨玄真人住持同領本路諸官觀公字元甫號玄圃美丰儀其氣岸凝重時貴人皆屈膝禮之蓋有公輔之望而在為山林之主者也暮年舉太乙宫黃公崇大以自代遂告老公當戎馬劻勷之際扶植教門安於按堵亦可謂善守成者追念史公於宫門有再遂功而廢興歲月未有紀遣監宫葉文誠備事狀顛末來徴文既為約狀書之又繫以辭曰二馬渡江一馬龍東邸觀闕森開張穆將祀余感生皇渡以熛怒威靈卬十一景緯生寒芒天人南下南斗傍朝與龍飛暮龍翔翠蓬三度黃塵揚靈宫特立天中央湖眉海眼東西望地柱不頃天乳長黃須仙伯古冠裳龍腦寶藏聲琅琅上清淨掃赤尾六龍在天天下昌山君海孤紛來王南極上夀日重光碑畢銘寶儉堂銘有序寶儉堂者雲間吕輔之氏之祖室也或謂輔之去其祖之創家不逺祖之創家由儉得之草衣蔬食汙尊壞飲之所為也故輔之命堂以寶儉云楊子辨之曰不然也昔子華子嘗與晏子論古昔聖之儉不以堯之居土階舜之不用塗髹之器為儉也而以儉在內不在外推其至極于心居中虛以治五官精氣動薄而神化為潏節其所受而嗇其所以出然後神宇泰定而精幹不搖此聖人之所以為儉而為聖人之室也然則輔之者傳其先之儉也將以草衣蔬食汙尊壞飲之為乎抑將以聖人之節所受出取嗇神宇泰定而精幹搖之者為乎輔之求聖人之道者也將有擇於斯矣不然計口而食視入而去操贏而制餘以庾氏商賈子之所為之寶儉也則子華子之所斥矣輔之問辨曰善哉先生之言吾儉也徴先生吾為夷貊之人烏得造聖人之域也其請銘之曰草衣蔬食儉之粗嗇出節受儉之精叶疽我思古人居中以虛五官既治萬物受奴是為大寶金玉弗如小天之志不出里閭又何拔異乎計口而食操盈而制餘者乎彀齋銘有序孟子之言彀致知力行之律令也射命中致知事志於彀力行事也致知力行為兩輪車不得偏而廢也唐處敬甫命其子之淳修業之室曰彀蓋以知行並進之功鞭之求銘於鄉先生楊維楨為之銘曰一拙失百巧廢知不可以不厲百中滿一中闕力不可以不竭也巧之精貫虱力之滿飲石豈推飲石彎弧落日於唐生彀其率裘生裼齋銘有序古者衣制凡裘必有裼裼以抑裘之露而見乎美者也裘而無裼與反衣䝖白者等犬羊之裘不裼以其無文則裼主有文飾之事故曰君在則裼謂施於君所也吾門裘生某韜晦于一室而以楊名齋母乃不類歟蓋有志於事君之文者矣雖然裼非徒表文也表敬也敬有二父也君也而體異也子於父以質為敬故父母之所不裼臣於君以文為敬故君之所裼某人父母俱蚤亡質之以為敬者痛無所於施而文之以為敬者將移之於君焉耳抑又間裼必家裘文裘狐白則裼以錦之素裘狐青則裼以緇之方喻諸內也有大人之文則大人文裼之有細人之文則細人之文裼之由中達外各以象比不可誣也然則裼也者其又由外以卜內之歟君母輕肆其裼也銘曰錦而絅非文之屏惟絅而後文益炳裘而裼非文之的惟裼而後文彌穡惟的日亡惟穡日章惟裼齋氏敬之勿忘自然銘有序雲間沈仲參氏名其燕處之室曰自然又以自然道人自號也乞言於逍遙叟逍遙叟曰老𥅆談自然以理有至分物有至定極甘莊生推之為逍遙小大任小大長短任長短而物無不得其所其然者皆莫知其所以為自然也無為者與化為體上知造物之無物下知有物物之自造也非此無以明自然故老莊祖自然使世之沓婪躁妄一安乎自通而詣乎定極此自然雖然知效一官德微一國者亦有自然故堯舜與許由雖異其得於自然一也參由自然而得堯舜於塵垢粃粳之外其詣極如藐姑射之神人則可使戎之人脫出疵癘而躋乎春臺含哺而治鼓腹而嬉國忘乎忠烈家忘孝慈子之自然者至矣參曰吾方有志於是願從先生逰庶見堯舜於塵垢粃粳之外子無所軍戎事為逍遙叟信其志為之銘曰理無小大物無長短理與物付物與我忘推其極也物不疵厲我不天殤子不信者謂吾言狂子將信者吾將與汝訪四子於藐之椒汾之陽也莊子逍遙篇堯治天下之民平海內之政往見四子藐姑射之山汾水之陽四子王傀齧缺被衣許由甕牗銘有序隴西耕者李氏中其先宗三省幹之後中去其先之髙門閭退築草堂松之七里涇為耕讀室室凡十楹蓽户繩樞北東西垣皆甕牗中每風起引東方明於甕次讀古先聖人遺書書已出理耕事日為常有過而哂者曰中弗光先廬而甘為甕牗繩樞之子歟中聞而益喜遂自號繩樞子仍以甕牗命其室介其友錢鼒來見曰古者户牗必有銘今辭弗古若不足以起警幸先生有以銘豫異其人曰繩樞子今之人而有古之道者歟七幸生華夏有宫室之後又幸生髙門縣簿之家而逺返古初甕牗是居非悠然有德遺物而立於獨者不能一日安于自如惟其然故豨韋氏之囿軒轅之囿有夏氏之宫湯武氏之室彼且能使我欣欣然而足歟不也世之傾宫室危臺榭直昧者逆旅焉耳豈徒逆旅府怨階禍雖滅身覆族不窹豈不哀哉此甕牗之可銘也銘曰隴之耕兮草之堂甕之牗兮朝之陽暾之入兮煌煌月之燭也陽洸天之刑民兮峻宇雕牆天之牗民兮壺室之白泰宇之光心太平銘有序豫自壬辰兵興來遭罹死地者凡四五然今年以淞府長顧公之招客豫于府庠退處一室顔之曰心太平人怪之顧公是之曰昔香山居士之詩自謂我是羲皇代先從心太平居士嘗厯險難身獲平太而未獲平先生厯險難身不太平而心實平焉豫謝之曰他人有心豫忖度之子謂之也因銘室曰嘻割爭絶揖讓爾一身天地長心獨遊在羲上安順齋銘有序杭之城東隅有鄭老人號虗原年八十餘時過豫諸子百氏取研極乎漆園氏之旨故其燕處室委順屢徵豫文􅃮不能不委而况於人乎又曰安時處順哀樂不能入也此吾人之委順也敷其旨為銘曰地不洛橘天不逢蓮順不吾委違地違天順一吾委萬物自然初齋銘為復𥘉鄭茂才作水初惟清濁焉以撓木作惟直屈焉以拗水復其初其清可澄木復其初其直可繩維榮易子反求厥初旁岐勿惑下流勿居上智下愚天淵遼分里欲之隔不能以寸止齋銘為至善王茂才作兩生皆俞參門士忠以事君孝以事父朋友有信長幼有序各極其止是曰至善舉類以推其則不逺惟文中氏明爾明德爾修必清爾踐必力書曰安止詩曰敬止繇敬而安希聖在之不心不佛銘有序豫嘗與師論心師曰儒以道言心乂以人言心是二心也不如吾釋氏言心以法吾曰汝祖言即心是佛又何有法師曰吾祖又云非心非佛則心亦無有天台師不云乎任汝非心非佛我只即心即佛吾曰天台尚與佛工我固曰任汝即佛我却不心不佛師因時起曰鐵冠長老於我祖具一隻眼遂命其禪所曰不心不佛而俾豫銘之銘曰佛莫名心莫名與道冥冥無名我曷銘近浮屠有以左道鼓世俗號天界某者士大夫安其志而不之攻勢且稱緇相國師危坐至前元呼某師在一人上者此不可杜其秋漸也不心不佛師疏於上必斥絶而後也故吾以師廣長舌有回天之力奚止昔人推倒回頭趨翻不化者也陸道士息踵齋銘南華真經謂真人之息以踵取其息者深而細也深而細者必從根極中出踵是也此古真人心齋郊也方伎之流習閉氣為胎息者未矣圓覺經云息調心淨蓋亦得而旨者茅山外史弟子陸中氏以是名燕處之室鐵笛道人為之銘曰氣導和體引柔心貞白息靖幽盎焉春凄焉秋一喜一怒四時遊是曰真人流惟踵之求尚德齋銘為胡道士浮休子作爾祖著經尊九流一德授受長春丘長春丘後為計籌雅南容計籌弟子今浮休玄牝有得天同遊五千之言俱贅疣幽關相見西貴牛維子文集卷之二十三

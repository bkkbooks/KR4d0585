body:
  text: 會稽鐵崖楊維楨廉夫著記吕氏樓真賞記淞之樓居者以萬數而獨吕氏之樓為髙等松之山以可數而獨凡山之峰為特秀樓去九山數千里近而青出樓者堇尺寸耳吕氏之子恂從豫遊峕節觴豫必於樓是登請名於豫豫名之曰真賞且併求言以記陶處士於南山非日日見之而一日忽見於籬落之間其曰悠然者真賞也王馬曹於西山非日日得之而一日忽得于柱頰之頃其曰致爽者亦真賞也真賞貴於偶會固不貴于常得也山之賞有女色之賞耳自其真而言解佩饋漿之頃蓋有慕之而不足者自其厭而言則朝越白而暮趙黛而有為之前者矣故曰真賞貴于偶會而不貴于常得也世之愛山一也在陶王為真賞在謝康樂則荒矣康樂于山愛之屢而厭之至其伐山開徑自始寧至臨海汲汲焉求之如弗得是今日之得無以饜于前日也天下之名山無所不有是謝然之嗜無往而不足計其一生山水間敝敝焉不得一日以休則謝公之勞無以償其得矣是真賞不得之效也吁陶之悠然王之爽然也使日而得之人人而知之又何以為真賞不傳之祕哉客登吕氏樓者猶嫌樓之未盡有山也豫以其求山者謝耳而未知陶王之真賞也故書其樓為賞而又為之志其説云移春亭記吳之練川強彥栗氏治水亭于何之莊雜蒔花木其間諸卉未花而有先春而拆者羣花巳翻而有逗春而留者吾嘗領客造彥粟必飲食豫其所且俾侍觴者侍硯徴亭名而并記之請豫命之曰移而客有辨者曰黃金白璧珠綺女婦一切玩好之具世有權力者可不趾而移也春非黃金白璧珠綺女婦玩好之物而曷以移云哉豫為莞爾曰客何見之暗乎自催花有檄春不在春而在人也久矣春來而來春去而去四時代謝之春也春移而移春留而留吾司之于花木之間固有出于天時物候之外者春不在春而在我也子何見之暗乎彥栗起觴豫酒曰某嘗患春不易得又患得之易失也聞先生之言吾之患蔑豫曰未也憂年夀者恆懼去日之速而來日之無幾也則將遊之外取大椿之年為吾春也且徂之易春暮而朝也曾何益乎春未至也我將至之春盡也我將遲之至之遲之春暮移而有移者若是則年莫之引而有引者不是如乎彥栗謝曰吾因移春而得養生之道請録其説為記竹近記物之近于人者亦衆矣而近之物有媺惡則善敗隨之故君子慎所近也世之溺于近而敗者聲色也貨財也博奕餘酒也禽獸草木妖及竒伎巧官之物皆是也近愈甚敗愈不可勝言聖人於小人女子誡其近餘類可推也嘻近哉近哉不慎哉吾里姚生智獨以其近者在于竹而名其讀書齋竹之為物見於禮詠于詩而配德于君子者也生近於君子之物則與世之近而敗者異矣吾固未占生之善效何知也吾見生之執謙問道似行之虛心也孝義根于心而道生似竹之不撥其本也險夷不二其行似竹之厯寒暑而不改柯易葉也其為詞賦鏘然有金石聲似竹之著鳯鳥而叶于律者也則生之取于竹而善其德也有矣宜其于竹也左之右之以為近而一日不可以諼也雖然竹特有似于君子之德者耳生于似君子之德者近之如是而向其人真有君子之德者乎生遊四方求君子之人而邇密之其進德又可量也乎書竹近之扁者實南臺御史李公好古與生為忘年友之書也李公蓋吾所謂君子之德之人生與之逰得其近已李公由南端業羽儀于天朝生階而上之吾且見生之獲近清光于明天子已竹得已久稽乎生也哉書諸室為記至正八年十一月草八日來德堂記莊子正氏吳興之衣冠舊族也蚤年嘗逰于張息堂龍鱗洲甘梅坡諸先生之門極其學之所究學成而連試有司連黜之乃喟然曰吾學之利果不得施於人乎君子存心于愛人不得為良相願為良醫遂又遊藝于岐黃氏之家而名其醫室為來德之堂吳人感其德者既為歌詠之而又徵記于余余謂十年之討種之以木百年之計來之以德木未有不種而植德未有不施而來者木計歲以近德計歲以逺計近者庸衆人之所能知而計逺者非知道君子不能至也子正氏蒼髯皓髮已為五六十歲人不得於仕而借施於醫德果報以百年之逺也則莊氏子孫其有食其報者歟雖然豫聞宋許叔微氏取科名于陳樓之間喝六作五以符神人之夢者以醫有㓛德耳叔微之德施於人而來即在其身是醫之來不俟有年之後也叔微之事信則子正氏之來德速矣喝六作五之報吾其無望于子正乎哉子正尚以吾言勉之清如許記去姑蘇西北一百里所其聚為虞山文三十里為釜山釜山之昜曹氏世居焉曹氏繇武惠王後六世孫某扈駕南渡其五世孫為今南沙處士文貴始居釜昜南沙不仕善治資居而復散鄉之人匹賴焉子孫食指于千數占仕籍者十有二三有名某者為武略三世孫生三歲而父喪母夫人張氏力教育底于成某日奉觴豆夀其母髙節堂上又稍為園池以娛其親以及其宗戚賓客之宴樂名其池亭曰清如許門客自眉山師餘永嘉鄭采而下賦詩若干人持其成卷來重請豫記豫惟清如許考亭朱氏之詩語以興夫學者之心源也人之賢不有天下事理亂成敗皆係之心源故君子之學先焉心源之所自來為墝不濁為不舍晝夜此源之所為清而逺也某也學朱氏學先治源則清如許之契要蓋得之矣源益治流益清推諸行事在隱為夷齊之聖在仕為伯夷之賢曹氏之澤不益衍乎哉曹氏自武惠德被四海南沙不仕善猶及其鄉節堂之行義又有以光繼前武而淑及後人其澤五世至于十世雖百而不替者固亦有其來之自矣豫既得曹氏之學於清如許因知曹氏之澤清且逺者方來而艾也於是乎書若其一亭臺之工一禽魚木石之珍怪賦詠者能言之抑未爾故略不書某字志明幼以孝聞長博古喜文雅善為歌詩仕至江隂州同理云熙春堂記長洲縣繇金浮崦東南行四十里抵六直甫里其地為吳王茂苑也至今民樂耕釣居有水木園池之勝鄰里相望雞狗之音相聞民至老死不識市區官寺者張氏彥明之家在焉彥明氏日晉髙士翰至大流處士士居是者若干世矣彥明豈弟樂易孝友之風行于家重於里余嘗入吳訪天隨子故宅因與天隨孫廣過其里彥明治酒食觴余于熙春堂上余既為賦熙春詩明日以記請豫聞老氏言治古之民熙熙然君登春臺蓋至德之世君民之分雖卞而情未嘗不與民並也故其君南面之樂民有春臺之娛耕而食鑿而飲含哺而嘻鼓腹而逰不知帝力之加於我此春臺熙熙之效也余猶及于彥明氏之家見焉熙春既名遂使延頸舉踵指甫里曰某所樂土也樂土有某賢士也吏食君祿而治民使民不得其熙然者不愧張氏乎吾方怪吏近民使民日畏畏而怒焉人大畏傷陽大怒毗隂隂毗陽傷四時不至寒暑之和不成熙然之春無時而得矣徒蹩焉求其迹以治也摘羣以為禮蕩溫以為樂又頡滑解垢以為之教不知熙然之情其離也逺矣誠使近民者得張氏其人以熙然之風雅之民也則熙然之治其獨為一家之春乎故余為張氏記春併以識有民社者之愧云至正已丑春三月三日存拙齋記山東麴子益因余友方仲仁來請曰走不佞少輒有大志以為取功名取地芥已而落魄不偶嘗薄仕於宣政屬曹不能與世之巧宦者相追逐故歸而求諸拙采社拾遺之句自號曰存拙且以顔于齋居之室敢乞先生一言曰余所存者余曰少陵非存拙也因拙以存道耳子益之所存者在拙乎在道乎苟在道則雖愚必明拙為不拙之拙而大巧出矣故老氏子之言曰大巧若拙老氏子之所謂拙非壯少陵之所謂拙乎豫嘗慨世之功人深中而險側秉外而便佞以笑為怒以諛為詈以恭為嫚以信為欺姦偽橫流不知紀極豈知巧之極者拙之階與吾觀世之善仕善賈善醫五善百工竒伎大抵巧之弄而拙之成其效至于已軀老家而曽無怨父是知拙之存者道之在道在而四體無不喻萬物無不備其為效也孰多孰寡哉子益之拙愈存而道愈明則知聖人之道得于顔子之愚曽子之魯者愚非真愚魯非真魯也顔曽之道果在子益子益之拙又豈真拙哉書諸室為記青雲髙處記檇李北去四十里所為青雲橫涇大陸漁梁農舍星分而棋布東鳯山九點與西楊諸峰出沒于煙霏之空中雨晴暮且慘舒異狀臨之以層樓可一覽而有者實為李氏青雲髙處也李氏觀復以里為青雲而其大父又號雲岩故樓以名豫友茅山外史張君雨嘗為書其扁而又以其弟佐從豫遊介之以徴記豫謂雲之為物多變已而名亦隨之外頳而內青謂矞具五色而昭瑞于靈臺之上謂之卿沛然而雨謂之油突然而作示揚風之兆謂之炮舒卷無心使人望之而不肯從龍以雨天下謂之白至其脫林石升天衢通鴛鴻之羽翼近日月之光華栝稿之士仰之以為不可及者則始謂之青雲雲岩公有志澤物而不偶于世其所謂雲不過陶靖節之無心弘景之自怡者耳某雖不敏竊有志于與世驅馳安知吾異日不凌晉直上副吾居之髙也邪然則是樓也李氏言志養也匪徒據勝覽之要以為髙也雖然君子身居朝廷則思利其民者在家則思仁其族與其鄉者觀復登斯樓也見竟有秋啼飢冬號寒官府鬱塞而無所白者使之有以得其生而抒其情是即青雲之覃物也乂何必髙有其位始得為青雲之澤邪觀復未任以余言勉之可也素行齋記邢臺張生叔溫氏以素行顔其讀書之齋叔溫天資廉靖古茂雖侍父宦南方為六品秩公子而朝虀暮鹽讀書不少輟從師取友恂恂然退謹如鄒魯者諸生以常情論之叔溫當華齡為貴介公子宜其衣狐腋裘日棄金馬挾彈平康間與代之河朔少年相追逐不以為過而叔溫不爾曰吾讀書未舉有司一布衣生耳一言一動奚敢放而僻以于大戾以貽其親之憂此其素行之一也叔溫侍父在淞以嘗從遊于豫且命舟五湖上招豫至素行所見其室中所蓄惟折腳九藉破琴一床經史子凡若干卷耳敗壁間他無長物以為族者豫駭之曰生侍父典大縣食厚祿而素行若是是誠能行已之素者已中庸言素位而行以見君子之道泛應曲當無時而不在無往而不違故其道也易然世而無存已易地而無得喪非聖哲不能故曰民鮮久矣今叔溫行貧賤於父典大縣之時非希賢希聖自信之篤者不至是抑素行之目有富貴貧賤則夷狄患難之不同舜之貧賤飯糗茹草若將終身及富貴則被袗鼓琴若固有之孔子欲居九夷則曰何陋之有及遭患難則曰天之未喪斯文也若是者皆素行之至的也舜人也孔子人也有為者亦若是叔溫尚勉之而異峕以公卿之器達而在上也行乎富貴之素者亦今日素行之推耳吾未老尚及見之筆耕所記吳興錢德鉉流寓淞上揭讀書之室曰筆耕所余客淞至其所見其一室如穿破舟上穿下洳折腳鐺鬻若無出煙之竇豫為之啞焉笑曰目不容辨黍麥乎不操橐耜不踐畎畝之塗泥恃三寸穎以代耕所亦非其所已德鉉起而對曰吾筆之不停猶農之耕不輟也所非吾所且不輟吾耕所苟得所其敢輟吾耕乎所弗得所是農之不幸過石田用力多而得報寡所得其所是農之幸而遇汶昜之腴用力寡而得報多矣吾其敢以所非所而廢一日之耕乎豫韙之曰鹵而莽耕者鹵莽而報蔑裂而藝者蔑裂而報耕患不刀爾何患不得其所哉抑子之耕也筆不如目目不如心目以耕乎外大地之謂心以耕乎內寸地之謂也放而大斂而寸而後耕之筆以耕哉筆耕得其所哉者得其所無往而非吾託筆之地又何小大肥磽之辨哉抑記禮者有曰禮以耕之義以植之學以耨之仁以聚之樂以安之耕之外曰植曰耨曰聚曰安皆筆耕道也豫尚勉之德鉉起拜手曰鼒之耕也倘得其所又得其道豈惟妻子無飢雖使天下無莩夫其可也四月八日在雲間陳氏邸寫改過齋記至正九年春豫遊淞之明日邢臺張叔溫携數客來見中一人昂然長癯然清言議風發可畏問為誰則曰袁景文氏也明日景文來請曰凱先世繇錦城僑兹之先子可潛翁以以詩鳴於淞先子蚤世而凱尚幼力自樹立頗知讀書屬文既長益有志于學然偏質剛慎不齪齪與里閭浮沉且又不能隱人善惡時時立物論為臧否于是與俗寡諧人亦以此相詆若有所不容者令年歲已強矣欲改是過故自顔其燕居之所曰改過而日自省焉敢求先生一言以戒吾過引吾不及以底于聖人之道豫駭然異之曰人以過自諱者滔滔是也而未有過自揭而求改者聖如仲尼而幸聞過子路告人之以有過則喜古之聖賢未嘗以過自諱此其所以為聖為賢也書曰沈潛克剛克髙宗柔克又曰褻友剛克強弗友柔克若子過之非沈潛也非褻友也其過于髙明強弗友者乎以柔克之剛二者之過無過矣然柔闒茸頽隨之謂執雌牧卑轉剛而善之謂也謝上別程子十年而能不矜劉忠定别溫公七年而不能妄子信能知過而改異持復見子松陵之上昔之剛復者柔矣減否者默矣是子之信能改過也由此而之顔子不二過之域是不難景文起謝曰疚疾者多矣藥石我者惟先生一人敢不再拜如先生教遂書諸齋為記敬聚齋記雲間衛子剛扁其藏修之所曰敬聚齋余客兹土子剛首謁見明日以敬聚卷來請記豫曰昔臼季贊卻缺之言曰敬德之聚也能敬必有德子剛慕卻缺之敬臼季之言足以修身也故以名之吾聞剛王大父山齋以言德著稱官至永嘉別駕晚年讀易有得著書若干卷行于時子剛大父立禮公隱德不仕閉户養髙者二十餘年人慕而不可見如冉崖青壁子剛之敬之德之聚蓋有所本矣而又以敬聚名齋曰修習其中且從儒先生治書詩經學著之筆櫝蔚然有章此非德之所以聚于德而發為英華者歟然子剛貴介子弟也一日之間聲色過乎前便佞隨乎後狗馬珠玉之好驟然集乎中所謂以應之者或不能不顛冥于造次之頃則敬以欲而敗者不少矣子剛益能疏瀹而心澡雪而精神視而牽色聽不牽聲談不牽味芳不牽臭日引而月長之其所以聚其德者尚可量也哉卻缺子一田丁也因敬而階乎仕滅其先惡為晉國軍大夫矧子剛素承先德以積敬又當國家文明之運異時不遇知已則已苟一遇焉其不居髙位食祿為時名卿乎區區春秋一國之士又曷足儷子剛乎子剛尚以吾言勉之而已安雅堂記去淞之西一舍近田泖去泖之西三里近曰蒸溪蒸溪之上有世家曰曹繼善氏其先自宋文恭公後五世孫其繇溫之許琒家于淞今子姓有稱貞素處士者余未識之其從子繼善繼善且邀余至其所居堂堂以安雅名蓋侍書學士虞公集之大書也應奉陳公旅既為堂文而猶以其言未竟復徵豫言余讀荀卿子因論君子小人注錯之當與過也遂有越人安越楚人安喻楚以喻君子之安乎雅以是為非知能材恁然也注錯習俗之節異焉耳君子之安於雅非習之專且素能爾乎繼善博雅君子也非雅不言非雅不􅏒非稚不視聽蓋亦習而專專而素而于注錯之間當而安矣不然吾懼繼善之於雅強越兒而安楚強楚兒而安越其得謂之安乎哉帝堯之史曰安安臯陶之謨曰安止論者以聖人安於目然志君子之雅學者使注錯之當而安如越楚人之安越楚也去聖人之安其隔幾何哉抑豫觀郭謝之事而有以明習俗之節林宗之中偶然為雨墊而人效之為墊角石鼻不幸病塞而人效之為擁吟彼非不知中之雨墊而鼻之病寒亦安於名流之習焉耳繼善出仕于首教之地矣安雅之雅不唯淑已且將反人誠能使其人之慕繼善如人慕郭謝則繼善之雅所漸者易矣所覃者廣矣豈獨以之名堂哉惟繼善勉之邵氏享德堂記松之西折而南曰釣灘釣灘之南大泖大泖之支流又南趍而東曰楊港邵氏之族居焉踞居之北一里所水四面合中起林阜者實郡公翠岩處士之兆也公生前自營竁仍築家舍而搆亭其前為薦祼之地且誡諸子曰家舍地卑濕林木疏理易朽壞找百歲後必亟葺之及兹未四十年而亭已弊某且老痛念父言在耳重以本支日蕃展拜之地隘於是一撤其弊而新之凡若下楹視舊規加閎且崇如於某年某月某日迄是年某月某日告成取古語隂德享榮以及子孫者名堂享德焉公之曾孫煥以嘗與豫遊遂將文命來請記言禮者墓下廬不祭必反虞于廟自廟制廢而上冢之禮實重于漢之人余嘗議之矣禮不墓祭者體魄為無知虞而反廟者以魂之爽者在焉夫蓍株龜甲朽有年歲而狎者出焉謂體魄為無知可乎孔子之家孔里魯子孫世世祠之不廢則知漢人展墓之禮為愛之切厚之至也吾聞邵氏自翠岩公而始大公天質深厚不事表襮雖善理生致富饒而絶去侈靡之習敦行孝謹而仁及乎宗族姻友里稱為德人長者無間嘗建書院瑁湖上祠先聖像其中立義孰于鄉割已田若干畝教養里中兒搆三徑橋以濟病涉公之修德于已而覃于人者如此宜堂以享德名德厚流長而澤及乎子孫公之德也豈止榮享一已而止哉傳曰盛德者必百世祠吾知邵氏之德施于前子孫食其報于後享有世德者逺矣雖然人之種德如藝樹然老人種之少者用之然少者不又為後人種之吾知其用有時而為之矣人之孫者其可視先澤自怠自修乎公之子某既克家如公而孫某又尊德樂義光于前聞人曾孫某且篤孝明經嘗選于里矣使益勤不怠則世種其德而世之享焉邵氏之後益昌而大蓋可占矣詩曰詔厥孫謀以燕翼于邵氏之先以之又曰無念爾祖聿修厥德邵氏之子孫以之不礙雲山樓記豫嘗北渡楊子訪金山之勝而不知淞之南又有所謂大金小金出沒於雲海之中如壺嶠之在弱流外也至正九年春余抵淞之張溪溪之東有大族為楊竹西氏居之南偏其樓曰不礙雲山竹西宴于樓之上囱户四闢萬頃之雲雨鼇之島皆自獻于眉睫之下其所名也固宜竹西且舉酒屬豫以記請豫謂雲山之竒觀不得於近而得於逺逺非至髙至明之境無以得之有其境矣而非至髙至明之人則亦無以得之也竹西脫去仕纍歸討幽事稍為園池亭榭以自娛以及其客之好事者是境人髙人副地勝雲山之觀雖然逺在萬島之外猶將有之况去不五十里者乎然覽雲山以是阻也而覽雲山以微則小是也今夫雲之大也膚寸而起塞乎六合不崇朝而雨天下及其細也退藏于密莫得而迹焉是雲􅏒未嘗無靜也今天山之小也一拳石之多及其大也草木生焉寶藏興焉是山之靜未嘗無􅏒也此非會之于心不能竹西風日佳時岸巾樓上手揮五絃之餘與一二解人談至理既以八囱不礙者闢于目復以八荒不礙者洞于心雲山之觀盡矣備矣竹西撫然若有得起舉酒而自歌曰海之雲兮油油雨我田兮有秋海之山兮離離障我疏兮東之乂歌曰雲之動兮躚躚吾與雲動兮動而不遷山之靜兮層層吾與山靜兮靜而不停併録其歌以為記東維子文集卷之十九

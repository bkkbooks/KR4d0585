body:
  text: 㑹稽鐵厓楊維楨廉夫著記吕氏樓真賞記淞之樓居者以萬數而獨吕氏之樓為髙等松之山以可數而獨凡山之峰為特秀樓去九山數千里近而青出樓者堇尺寸耳吕氏之子恂從予游峕節觴予必於樓是登請名於予予名之曰真賞且併求言以記陶處士於南山非日日見之而一日忽見於籬落之間其曰悠然者真賞也王馬曹於西山非日日得之而一日忽得扵柱頰之頃其曰致爽者亦真賞也真賞貴於偶㑹固不貴扵常得也山之賞有女色之賞耳自其真而言解佩饋漿之頃蓋有慕之而不足者自其厭而言則朝越白而暮趙黛而有為之前者矣故曰真賞貴扵偶會而不貴扵常得也世之爱山一也在陶王為真賞在謝康樂則荒矣康樂扵山愛之屢而厭之至其伐山開逕自始寕至臨海汲汲焉求之如弗得是今日之得無以饜扵前日也天下之名山無所不有是謝然之嗜無往而不足計其一生山水間敝敝焉不得一日以休則謝公之勞無以償其得矣是真賞不得之効也吁陶之悠然王之爽然也使日而得之人人而知之又何以為真賞不傳之祕哉客登吕氏樓者猶嫌樓之未盡有山也予以其求山者謝耳而未知陶王之真賞也故書其樓為賞而又為之誌其説云移春亭記呉之練川强彦栗氏治水亭扵何之庄雜蒔花木其間諸卉未花而有先春而拆者羣花巳翻而有逗春而留者吾嘗領客造彦粟必飲食予其所且俾侍觴者侍硯徴亭名而并記之請予命之曰移而客有辨者曰黄金白璧珠綺女婦一切玩好之具世有權力者可不趾而移也春非黄金白璧珠綺女婦玩好之物而曷以移云哉予為莞爾曰客何見之闇乎自催花有檄春不在春而在人也乆矣春來而來春去而去四時代謝之春也春移而移春留而留吾司之扵花木之間固有出扵天時物候之外者春不在春而在我也子何見之闇乎彦栗起觴予酒曰某嘗患春不易得又患得之易失也聞先生之言吾之患蔑予曰未也憂年夀者恒懼去日之速而來日之無幾也則将游之外取大椿之年為吾春也且徂之易春暮而朝也曾何益乎春未至也我将至之春盡也我将遲之至之遲之春暮移而有移者若是則年莫之引而有引者不是如乎彦栗謝曰吾因移春而得養生之道請録其説為記竹近記物之近扵人者亦衆矣而近之物有媺惡則善敗隨之故君子慎所近也世之溺扵近而敗者聲色也貨財也博奕餘酒也禽獸草木妖及竒伎巧官之物皆是也近愈甚敗愈不可勝言聖人於小人女子誡其近餘類可推也嘻近哉近哉不慎哉吾里姚生智獨以其近者在扵竹而名其讀書齋竹之為物見於禮詠扵詩而配德扵君子者也生近於君子之物則與世之近而敗者異矣吾固未占生之善效何知也吾見生之執謙問道似行之虚心也孝義根扵心而道生似竹之不撥其本也險夷不貳其行似竹之厯寒暑而不改柯易葉也其為詞賦鏘然有金石聲似竹之著鳯鳥而叶于律者也則生之取扵竹而善其德也有矣宜其扵竹也左之右之以為近而一日不可以諼也雖然竹特有似扵君子之德者耳生扵似君子之德者近之如是而向其人真有君子之德者乎生㳺四方求君子之人而邇宻之其進德又可量也乎書竹近之扁者實南臺御史李公好古與生為忘年友之書也李公蓋吾所謂君子之德之人生與之逰得其近已李公由南端業羽儀扵天朝生階而上之吾且見生之獲近清光扵明天子已竹得已乆稽乎生也哉書諸室為記至正八年十一月廿八日来德堂記荘子正氏呉興之衣冠舊族也蚤年嘗逰扵張息堂龍鱗洲甘梅坡諸先生之門極其學之所究學成而連試有司連黜之廼喟然曰吾學之利果不得施於人乎君子存心扵爱人不得為良相願為良醫遂又游藝扵岐黄氏之家而名其醫室為來德之堂吳人感其德者既為歌詠之而又徵記扵余余謂十年之討種之以木百年之計來之以德木未有不種而植德未有不施而來者木計歳以近德計歳以逺計近者庸衆人之所䏻知而計逺者非知道君子不能至也子正氏蒼髯皓髪已為五六十歳人不得於仕而借施於醫德果報以百年之逺也則荘氏子孫其有食其報者歟雖然予聞宋許叔微氏取科名扵陳樓之閒喝六作五以符神人之夢者以醫有㓛德耳叔微之德施於人而來即在其身是醫之來不俟有年之後也叔微之事信則子正氏之來德速矣喝六作五之報吾其無望扵子正乎哉子正尚以吾言勉之清如許記去姑蘇西北一百里所其聚爲虞山文三十里爲鬴山鬴山之昜曹氏世居焉曹氏繇武惠王後六世孫某扈駕南渡其五世孫爲今南沙處士文貴始居鬴昜南沙不仕善治貲居而復散鄉之人疋賴焉子孫食指扵千數占仕籍者十有二三有名某者爲武略三世孫生三歳而父喪母夫人張氏力教育底于成某日奉觴豆夀其母髙節堂上又稍爲園池以娛其親以及其宗戚賓客之讌樂名其池亭曰清如許門客自眉山師餘永嘉鄭采而下賦詩若干人持其成㢧來重請予記予惟清如許考亭朱氏之詩語以興夫學者之心源也人之賢不有天下事理亂成敗皆係之心源故君子之學先焉心源之所自來爲墝不濁爲不舍晝夜此源之所爲清而逺也某也學朱氏學先治源則清如許之契要蓋得之矣源益治流益清推諸行事在隐為夷齊之聖在仕為伯夷之賢曹氏之澤不益衍乎哉曹氏自武惠德被四海南沙不仕善猶及其郷節堂之行義又有以光繼前武而淑及後人其澤五世至于十世雖百而不替者固亦有其來之自矣予既得曹氏之學於清如許因知曹氏之澤清且逺者方來而艾也於是乎書若其一亭臺之工一禽魚木石之珍怪賦詠者能言之抑未爾故畧不書某字志明㓜以孝聞長博古憙文雅善為歌詩仕至江隂州同理云熙春堂記長洲縣繇金浮崦東南行四十里抵六直甫里其地為吳王茂苑也至今民樂耕釣居有水木園池之勝鄰里相望鷄狗之音相聞民至老死不識市區官寺者張氏彦明之家在焉彦明氏日晋髙士翰至大流處士士居是者若干世矣彦明豈弟樂易孝友之風行扵家重於里余嘗入吳訪天隨子故宅因與天隨孫廣過其里彦明治酒食觴余扵熙春堂上余既為賦熙春詩明日以記請予聞老氏言治古之民熙熙然君登春臺蓋至德之世君民之分雖卞而情未嘗不與民並也故其君南面之樂民有春臺之娛畊而食鑿而飲含哺而嘻皷腹而逰不知帝力之加於我此春臺熙熙之效也余猶及扵彦明氏之家見焉熙春既名遂使延頸舉踵指甫里曰某所樂土也樂土有某賢士也吏食君禄而治民使民不得其熙然者不愧張氏乎吾方怪吏近民使民日畏畏而怒焉人大畏傷陽大怒毗隂隂毗陽傷四時不至寒暑之和不成熙然之春無時而得矣徒蹩焉求其迹以治也摘羣以為禮盪温以為樂又頡滑解垢以為之教不知熙然之情其離也逺矣誠使近民者得張氏其人以熙然之風雅之民也則熙然之治其獨為一家之春乎故余為張氏記春併以識有民社者之愧云至正已丑春三月三日存拙齋記山東麴子益因余友方仲仁來請曰走不佞少輒有大志以為取功名取地芥已而落魄不偶嘗薄仕於宣政屬曹不能與世之巧宦者相追逐故歸而求諸拙采社拾遺之句自號曰存拙且以顔于齋居之室敢乞先生一言曰余所存者余曰少陵非存拙也因拙以存道耳子益之所存者在拙乎在道乎苟在道則雖愚必明拙為不拙之拙而大巧出矣故老氏子之言曰大巧若拙老氏子之所謂拙非壮少陵之所謂拙乎予嘗慨世之功人深中而險側秉外而便佞以笑為怒以諛為詈以恭為嫚以信為欺奸偽横流不知紀極豈知巧之極者拙之階與吾觀世之善仕善賈善醫五善百工竒伎大抵巧之弄而拙之成其效至扵已軀老家而曽無怨父是知拙之存者道之在道在而四體無不喻萬物無不備其為效也孰多孰寡哉子益之拙愈存而道愈明則知聖人之道得扵顔子之愚曽子之魯者愚非真愚魯非真魯也顔曽之道果在子益子益之拙又豈真拙哉書諸室為記青雲髙處記檇李北去四十里所為青雲横涇大陸漁梁農舍星分而棋布東鳯山九點與西楊諸峰出沒于煙霏之空中雨晴暮且慘舒異状臨之以層樓可一覧而有者實為李氏青雲髙處也李氏觀復以里為青雲而其大父又號雲岩故樓以名予友茅山外史張君雨嘗為書其扁而又以其弟佐從予游介之以徴記予謂雲之為物多變已而名亦隨之外頳而内青謂矞具五色而昭瑞扵靈臺之上謂之卿沛然而雨謂之油突然而作示颺風之兆謂之砲舒卷無心使人望之而不肎從龍以雨天下謂之白至其脱林石升天衢通鴛鴻之羽翼近日月之光華栝槁之士仰之以為不可及者則始謂之青雲雲岩公有志澤物而不偶扵世其所謂雲不過陶靖節之無心弘景之自怡者耳某雖不敏竊有志扵與世驅馳安知吾異日不凌晋直上副吾居之髙也邪然則是樓也李氏言志養也匪徒據勝覧之要以為髙也雖然君子身居朝廷則思利其民者在家則思仁其族與其鄉者觀復登斯樓也見竟有秋啼飢冬號寒官府鬱塞而無所白者使之有以得其生而抒其情是即青雲之覃物也乂何必髙有其位始得為青雲之澤邪觀復未任以余言勉之可也素行齋記邢臺張生叔温氏以素行顔其讀書之齋叔温天資廉靖古茂雖侍父宦南方為六品秩公子而朝虀暮鹽讀書不少輟從師取友恂恂然退謹如鄒魯者諸生以常情論之叔温當華齡為貴介公子宜其衣狐腋裘日棄金馬挾彈平康間與代之河朔少年相追逐不以為過而叔温不爾曰吾讀書未舉有司一布衣生耳一言一動奚敢放而僻以于大戾以貽其親之憂此其素行之一也叔温侍父在淞以嘗從游扵予且命舟五湖上招予至素行所見其室中所蓄惟折脚九藉破琴一床經史子凡若干卷耳敗壁間他無長物以為族者予駭之曰生侍父典大縣食厚禄而素行若是是誠能行已之素者已中庸言素位而行以見君子之道泛應曲當無時而不在無往而不違故其道也易然世而無存已易地而無得喪非聖哲不能故曰民鮮乆矣今叔温行貧賤於父典大縣之時非希賢希聖自信之篤者不至是抑素行之目有富貴貧賤則夷狄患難之不同舜之貧賤飯糗茹草若将終身及富貴則被袗鼓琴若固有之孔子欲居九夷則曰何陋之有及遭患難則曰天之未喪斯文也若是者皆素行之至的也舜人也孔子人也有為者亦若是叔温尚勉之而異峕以公卿之器達而在上也行乎富貴之素者亦今日素行之推耳吾未老尚及見之筆耕所記呉興錢德鉉流寓淞上揭讀書之室曰筆耕所余客淞至其所見其一室如穿破舟上穿下洳折脚鐺鬻若無出煙之竇予為之啞焉笑曰目不容辨黍麥乎不操橐耜不踐畎畝之塗泥恃三寸穎以代畊所亦非其所已德鉉起而對曰吾筆之不停猶農之耕不輟也所非吾所且不輟吾耕所苟得所其敢輟吾耕乎所弗得所是農之不幸過石田用力多而得報寡所得其所是農之幸而遇汶昜之腴用力寡而得報多矣吾其敢以所非所而廢一日之耕乎予韙之曰鹵而莽耕者鹵莽而報蔑裂而芸者蔑裂而報耕患不刀爾何患不得其所哉抑子之畊也筆不如目目不如心目以耕乎外大地之謂心以畊乎内寸地之謂也放而大歛而寸而後畊之筆以畊㢤筆畊得其所哉者得其所無往而非吾託筆之地又何小大肥磽之辨哉抑記禮者有曰禮以畊之義以植之學以耨之仁以聚之樂以安之畊之外曰植曰耨曰聚曰安皆筆畊道也予尚勉之德鉉起拜手曰鼒之畊也倘得其所又得其道豈惟妻子無飢雖使天下無莩夫其可也四月八日在雲間陳氏邸寫改過齋記至正九年春予游淞之明日邢臺張叔温携數客來見中一人昂然長癯然清言議風發可畏問為誰則曰袁景文氏也明日景文來請曰凱先世繇錦城僑兹之先子可潛翁以以詩鳴於淞先子蚤世而凱尚㓜力自樹立頗知讀書屬文既長益有志扵學然偏質剛慎不齪齪與里閭浮沉且又不能隐人善惡時時立物論為臧否扵是與俗寡諧人亦以此相詆若有所不容者令年歳已强矣欲改是過故自顔其燕居之所曰改過而日自省焉敢求先生一言以戒吾過引吾不及以底于聖人之道予駭然異之曰人以過自諱者滔滔是也而未有過自揭而求改者聖如仲尼而幸聞過子路告人之以有過則喜古之聖賢未嘗以過自諱此其所以為聖為賢也書曰沈潛克剛克髙宗柔克又曰褻友剛克强弗友柔克若子過之非沈潜也非褻友也其過扵髙明强弗友者乎以柔克之剛二者之過無過矣然柔闒茸頽隨之謂執雌牧卑轉剛而善之謂也謝上別程子十年而能不矜劉忠定别温公七年而不能妄子信能知過而改異持復見子松陵之上昔之剛復者柔矣减否者嘿矣是子之信能改過也由此而之顔子不貳過之域是不難景文起謝曰疚疾者多矣藥石我者惟先生一人敢不再拜如先生教遂書諸齋為記敬聚齋記雲間衛子剛扁其蔵脩之所曰敬聚齋余客兹土子剛首謁見明日以敬聚㢧來請記予曰昔臼季贊卻缺之言曰敬德之聚也能敬必有德子剛慕卻缺之敬臼季之言足以脩身也故以名之吾聞剛王大父山齋以言德著稱官至永嘉別駕晚年讀易有得著書若干㢧行于時子剛大父立禮公隐德不仕閉户養髙者二十餘年人慕而不可見如冄崖青壁子剛之敬之德之聚蓋有所本矣而又以敬聚名齋曰脩習其中且從儒先生治書詩經學著之筆櫝蔚然有章此非德之所以聚于德而發為英華者歟然子剛貴介子弟也一日之間聲色過乎前便佞隨乎後狗馬珠玉之好驟然集乎中所謂以應之者或不能不顛㝠扵造次之頃則敬以欲而敗者不少矣子剛益能䟽瀹而心澡䨮而精神視而牽色聽不牽聲談不牽味芳不牽臭日引而月長之其所以聚其德者尚可量也哉卻缺子一田丁也因敬而階乎仕滅其先惡為晋國軍大夫矧子剛素承先德以積敬又當國家文明之運異時不遇知已則已苟一遇焉其不居髙位食禄為時名卿乎區區春秋一國之士又曷足儷子剛乎子剛尚以吾言勉之而已安雅堂記去淞之西一舍近田泖去泖之西三里近曰蒸溪蒸溪之上有世家曰曹繼善氏其先自宋文恭公後五世孫其繇温之許琒家扵淞今子姓有稱貞素處士者余未識之其從子繼善繼善且邀余至其所居堂堂以安雅名蓋侍書學士虞公集之大書也應奉陳公旅既為堂文而猶以其言未竟復徵予言余讀荀卿子因論君子小人注錯之當與過也遂有越人安越楚人安喻楚以喻君子之安乎雅以是為非知能材㤛然也注錯習俗之節異焉耳君子之安於雅非習之專且素能爾乎繼善博雅君子也非雅不言非雅不􅏒非稚不視聽蓋亦習而專專而素而扵註錯之間當而安矣不然吾懼繼善之於雅強越兒而安楚强楚兒而安越其得謂之安乎哉帝堯之史曰安安臯陶之謨曰安止論者以聖人安於目然志君子之雅學者使注錯之當而安如越楚人之安越楚也去聖人之安其隔幾何哉抑予觀郭謝之事而有以明習俗之節林宗之中偶然為雨墊而人効之為墊角石鼻不幸病塞而人効之為擁吟彼非不知中之雨墊而鼻之病寒亦安於名流之習焉耳繼善出仕扵首教之地矣安雅之雅不唯淑已且将反人誠能使其人之慕繼善如人慕郭謝則繼善之雅所漸者易矣所覃者廣矣豈獨以之名堂哉惟繼善勉之邵氏享德堂記松之西折而南曰釣灘釣灘之南大泖大泖之支流又南趍而東曰楊港邵氏之族居焉踞居之北一里所水四面合中起林阜者實郡公翠岩處士之兆也公生前自營竁仍築家舍而搆亭其前爲薦祼之地且誡諸子曰家舍地卑濕林木疎理易朽壞找百歳後必亟葺之及兹未四十年而亭已弊某且老痛念父言在耳重以本支日蕃展拜之地隘於是一撤其弊而新之凡若下楹視舊規加閎且崇如於某年某月某日迄是年某月某日告成取古語隂德享榮以及子孫者名堂享德焉公之曾孫煥以嘗與予遊遂将文命來請記言禮者墓下廬不祭必反虞扵廟自廟制廢而上冢之禮實重扵漢之人余嘗議之矣禮不墓祭者體魄為無知虞而反廟者以魂之爽者在焉夫蓍株龜甲朽有年歳而狎者出焉謂體魄為無知可乎孔子之家孔里魯子孫世世祠之不廢則知漢人展墓之禮為愛之切厚之至也吾聞邵氏自翠岩公而始大公天質深厚不事表襮雖善理生致富饒而絶去侈靡之習敦行孝謹而仁及乎宗族姻友里稱為德人長者無間嘗建書院瑁湖上祠先聖像其中立義塾于鄉割已田若干畝教養里中兒搆三徑橋以濟病涉公之脩德于已而覃于人者如此宜堂以享德名德厚流長而澤及乎子孫公之徳也豈止榮享一已而止哉傳曰盛德者必百世祠吾知邵氏之德施于前子孫食其報于後享有世德者逺矣雖然人之種德如藝樹然老人種之少者用之然少者不又為後人種之吾知其用有時而為之矣人之孫者其可視先澤自怠自脩乎公之子某既克家如公而孫某又尊德樂義光于前聞人曾孫某且䔍孝明經嘗選于里矣使益勤不怠則世種其德而世之享焉邵氏之後益昌而大蓋可占矣詩曰詔厥孫謀以燕翼于邵氏之先以之又曰無念爾祖聿修厥德邵氏之子孫以之不礙雲山樓記予嘗北渡楊子訪金山之勝而不知淞之南又有所謂大金小金出没於雲海之中如壺嶠之在弱流外也至正九年春余抵淞之張溪溪之東有大族為楊竹西氏居之南偏其樓曰不礙雲山竹西讌于樓之上囱户四闢萬頃之雲雨鼇之㠀皆自獻于眉睫之下其所名也固宜竹西且舉酒屬予以記請予謂雲山之竒觀不得於近而得於逺逺非至髙至明之境無以得之有其境矣而非至髙至明之人則亦無以得之也竹西脱去仕累歸討幽事稍為園池亭榭以自娛以及其客之好事者是境人髙人副地勝雲山之觀雖然逺在萬島之外猶将有之况去不五十里者乎然覧雲山以是阻也而覧雲山以微則小是也今夫雲之大也膚寸而起塞乎六合不崇朝而雨天下及其細也退藏扵宻莫得而迹焉是雲􅏒未嘗無靜也今天山之小也一拳石之多及其大也艸木生焉寳蔵興焉是山之靜未嘗無􅏒也此非會之于心不能竹西風日佳時岸巾樓上手揮五絃之餘與一二解人談至理既以八囱不礙者闢于目復以八荒不礙者洞于心雲山之觀盡矣備矣竹西撫然若有得起舉酒而自歌曰海之雲兮油油雨我田兮有秋海之山兮離離障我䟽兮東之乂歌曰雲之動兮躚躚吾與雲動兮動而不遷山之靜兮層層吾與山靜兮靜而不停併録其歌以爲記東維子文集卷之十九

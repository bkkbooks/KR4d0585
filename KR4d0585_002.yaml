front:
  text: 東維子文集卷之二
  hash: sha256:6d1a27c7f671f516f157bd1d6238406db519e07215164507ed97963ca95f6e52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_002-1a}
body:
  text: 會稽鐵崖楊維楨廉夫著序送帖山提舉序天下之仕之難於司杭征也歲一辨額賦十巨萬雖輦轂地宣諫者不贏是無母錢以為之本無旁司以為之俠歲無論風雪隂雨水旱兵燹懋遷民通不通臨制者月鉤季校額稍褪即戮辱其人不啻罪姦偽且不得以他故訴其法外無漏內始獲于是密立關纂使亡賴遊徼絡緯而鉤攔之其故脫而漏籍為遊徼資者殆且過半蓋制無課吏祿食俾就食其征則不可貴其人之不盜也又其漏者多勢要者不幸一敗獲不一日二日用官令追呼脅持不從句挾衙校羣小竟排户撒其推去如取寄物賦之陷而不登類此間有不畏強圉誓以文法律人人即中傷之且入官五日職輪課綱一署其帳䐏勢不得登醇白自引于亡過之地故吏是者潔入汙出號投墨海完來殘去號入火獄故曰天下之仕之難莫難於司杭征也今幸肆大之恩若洞見其難狀舊之積陷既一日而蠲除新之日賦又據實而取焉使墨海火獄而復有潔白清涼之日於是舊官如帖山氏者始尋與吾徒給解而去吾既酌之酒為彼此賀而又過求余文故道其不幸於難仕而又幸其得殊恩而墨海火獄有潔白清涼之慶也於是乎書送關寶臨安縣長序北庭關寶氏擢春官弟天子賜進士出身往監臨安縣以嘗從余遊且余同年德流公之子也過錢塘乞一言為別余告曰方今盜起淮穎間挺禍于江浙民耗於兵興罷於奔命者四三年弗復休民之良胥陷於盜招之而未歸嘻豈吾民之樂為盜哉撫字乖而飢寒之逼也水旱相仍而田不減賦婁子相流而農不息徭其秋害之原懸于州與縣州縣不聞之府府不聞之省臺借或聞而不信以至吾民財竭力窮財已竭力巳窮而賦徭愈急徴求愈繁民死道路者相藉幸而生者其不去盜也幾希生時百里已為試政之初當推其情曰上恤乎民則民吾亦子上不恤之則民吾寇盜也不可畏哉邇者皇帝下明詔哀痛遺民誠以民為邦本而本不可使我而耗也蠲之以賦寬之以征裕之以力凛乎若朽索之遇六馬且甲誡守牧者務在康濟生其上承明天子之德意下軫吾赤子之困窮招寇于民慎勿驅民於盜吾將見疲者蘇流者復休養生息以還中統至元之治必自臨安始也生以余言勉之送龍孔昜序士有行年六十而強力如三二十人居貧困不支而恆如富盛人曰番之龍孔昜也今年客錢唐吾嘗與之往來見其才氣學識甄綜天人議論古今要害以節量天下之成敗治亂如鏡照蓍卜如孔鑰勘而左劵合也蓋可附諸古豪傑者而與今之豪傑盜虛聲以誤天下者蓋異日道也然而急材者弗之舉也使之蓄其有而無所於施則取文墨氏聿櫝以代司寇之斧鉞誅伐右之儉人諛子以警今之似者吁此孰使之然哉乃至正乙未秋八月中書兵部黃公昭承天子明命出吊民江之左采天下之言以選天下之才更其於豪傑之遺去者意氣足以徠之權力足以振之吾將賀孔昜氏之有賢知已也無幾孔昜來別也余不時與子相嬉娛矣余槖鉛槧巳偕黃公計史卜明日行子何以贈我吾偉黃公之能得孔昜而孔昜之為黃公得也則為之言曰天下無事中材奉三尺而有餘天下多故則雖豪傑應變而不足安危優劣之相縣而一時人才之所值者真有幸不幸哉今天下亦多故矣人才非幸之特矣行矣孔昜母自幸也重為我告黃公曰拔一者孔昜拔類者亦孔昜蘭悴而蕙傷舉而鴻悅類不類吾將問諸黃公黃公問諸孔昜送慶童公翰林承旨序承旨非古官始唐以文學士備顧問出入侍從因時參謀議納諌諍署以翰林遂號內相惟承旨尊為東閣第一人誠以其人老孰故常練達當世之務凡天子機命內外密奏朝廷有大議擬廢置不時豫他人者承旨得専受專對而安危成敗之決在焉吁仕之重若是而世以承旨為安老置散不誤設官意乎至正十五年冬江浙省平章慶公拜翰林承旨東之人驚相謂曰朝廷以江浙為東南大方面寇盜日橫楮幣日塞民日不聊生天子授公密命賜五絞龍衣金虎雙珠之苻俾專理東方以便宜行事假以歲月期其克有成功遂陟相位已日乃今一旦挈而置之散地于公優也東人何恃耶會稽楊維楨為之解曰朝廷以公世臣且負重名天下出釐東土島夷革心貓兵受令文恬武熙折重千里于笑談尊爼之外吳越遺民不見兵革者幾三年可謂無負明天子東方之寄今天子內治益切歸公於東閣蓋有寄之重於東方者已庸詎知承旨非安老而置散承旨非安老而置散則有任天子之重者公知之天子知之固非安老而置散也的矣公之行也傳提舉生本而下為歌詩凡若干者推余為敘余不辭亦欲使公知東南之士有知公之深者固異於東南之人也公燕見天子時天子或問公以承旨於東南士論為何如則吾文可出矣於是乎書送髙都事序傳稱子産為政其所能者亡他句能材彼其人焉而巳耳材彼其人句人各能其所能而子産之能無不能矣裨諶能謀子太叔文而能行馮簡子能斷大事公孫揮能知四海之為且一辨其人之族姓班位能否又善于辭令子産間四海之為於子羽使禆諶謀而簡子斷然後授太叔行之是以鄭無敗事子産善于材使之力也江浙平章左畣納失公徂征涖夷總制於金陵急以材使人才為首務曰善謀曰善斷曰善行而善辭令者皆禮羅於幕府使各竭其所能此子産氏之善於能人之能也髙子令之秀而文者也又善知四國之為與其人之族姓班位能否而善于辭令者也是高子一人而兼古者二人之為此總之者之選於子如子産之選於太叔公孫揮也宜其有補于總制而總制右無有敗事都之以幕府元僚不為過已抑余有詰于高子者今日之兵有田貓曰鶬者罔測甚於虜人知以貓鶬禦虜不知以虜待貓鶬既有烈於虜者叫知四國之為而辨其人之族姓班位能否者其有不察於此乎不察不智察不言不忠言不力不勇總制之稱善于材使者疑不若是故於高子申以問之送魏生德剛序庠序師有主教其次有正有録正録而下有訓導訓導出主教自辟或提學官以物論推擇之位若卑而其人之德行文學則主教者之副相也主教其人或下之非宜副相實賔師已故庠序不得賢主師得一賢賔師亦足以重學校也吾同年同知安慶公之子關國用氏以明經擢第來監杭之臨安以守令治本莫先於學校每朔望下學憫其教非所教養非所養弟子員多闕之人材無所成就大懼無以畣聖天子崇傳責效之意于是走吏不遠百里外捧檄幣于同門魏德剛氏禮為庠序大學師德剛戒行來別余求一言今盜起淮泗挻禍於天下郡縣為郡縣者方以募兵調賦造弓矢器械為急務奚暇治學哉而國用以書謂余曰天下不可一日而無教赩衣赤幘色城絡野翦以斧鉞而不勝者有司之教衰而禮義之維缺也吾其可以廢學校一日之教哉魯邑絃歌不以劉項攘搶而暫廢今盜狗鼠爾吾又可以魯邑絃歌之裕棄其民也哉余既喜而復其書於魏生之行也必敘以送之且期其納民于禮義而還太平於今日當自臨安始送司農丞杭公還京詩序余友曹文炳過余次舍談大司農丞杭公之履厯行事公當儒塗世家鍾峨眉之秀負殊才遇今主上開國金陵以青年經術取法史以法史取郡邑牧以郡邑牧取相幕賓踰月而御翰親除今職不十年自下史至九卿進取捷速才之不負人也如是出使吳松經理僧道故官田土曽無苛察徼僥以話言為期會訖不刑一箠而事集于兩月之間今還京報命郡人士贈言未有當公意者望吾子一言出庸衆人右且不為投之暗也余復之曰農國本也少吳氏以扈設正倉姬氏以稷開國秦漢以來曰治乘曰大農曰春卿曰司稼皆所以崇本也今稽古建官以大司農首列九卿可謂知天下之本矣而杭公方以才諝當御選之筆言聽計從非農之福耶其經理而歸也與人誦之考功書之吾人何敢以老羸而辭于一言遂為序而又係以古風人之辭曰十年農星晦無光太史昨夜占五潢國家大本重榖祿曰奎曰胃明天倉中書垣次大司農署秩列九卿尊大府春耕籍畝冬藏氷六十五官分九扈杭公均輸少卿屬賦足國家民亦之農田漕運一時了文如錦繡人知玉歸來奏議帝曰俞詔書寬大賜民租太平治象今日見不用再講貞元宰相均田圖又代馮縣尹送序司農在周官為太府掌九賦九貢秦為治粟內史屬官兩史屬官兩丞漢有司農丞謂之中丞唐置丞六人敘主上開國金陵他府寺有未遑立而農正司先之蓋以錢榖金帛委積所在天子籍田耒耜京師百官祿廩朝會祭祀賞賚之取給其務農重榖實為富國強兵之本故職司者非康成之文學牟融之達務不以授之元年冬十月大司農丞杭公仲玉奉命來淞經理田賦功成朋上無漏無溢其用法不礉馭下不煩不越三月而事集郡縣稱美其人曰無杜中立繩吏之急而有鄭莊千里不齎糧之效嘻其治行可知矣抑余有告于仲玉者主上新收浙地官民田土風有成籍然仰人租額歲為地主有增無滅阡陌日荒莊佃日貧至于今蓋窮極無所措乎足矣農丞之秩上亞大卿而司吾庶土之生者歸覲主上主上問吳民疾苦倘有以言之三吳之農幸矣是為序送淞江同知李侯朝京序有明受天新命開基金陵百辟效職百將效忠實君臣千載一時之會所以創大業臣妾天下皆國家善於用人也寶定李侯浩字師孟材足以任重智足以撥亂淞歸附𥘉奉命來為二守蓋以股肱心腹之舊授以勞來安集之寄厯政甫期賦役髙下以均倉庾出內以平功過黜陟以明利害典除以當關梁啓閉以嚴獄訟審録以寬淞士庶拜頌為古循吏今年春中使銜命下郡取為機近法從侯不稅冕行郡士民攀挽不可得乃行什伍伍相與餞之西關之郊舉爵於余乞一言為贐余舉爵酌侯曰天子任股肱復之臣如侯者不幾也侯慎之再酌曰侯厯民間往當以生靈之憂為已憂以答天子之大寵命三酌曰海宇尚有未賓服者願侯佐天子平定之無久勞金革為也侯反爵謝余曰某不武敢忘先生之規已而上海祝大夫持縹軸來求書為餞於是乎書送檢校王君蓋昌還京序士生亂世不以窶而苟售必遲遲堅忍俟其人焉而後興此非志之逺識之卓毅然大丈夫不能若今中書檢校王君蓋昌者是已余歸老淞學君與富春吳毅桐廬章水會乩張憲山東馬成吳門楊􅊹減在髙才生之列時秦郵張氏據有六州憸佞明進欋椎碗脫謡於市者弗可計或有車君往者君曰咄哉醜爾秦郵豈王郎之主哉吾非惡仕也顧仕有時吾方慎俟其人也已而君辭余客泗水轉徙下邳囍苦窮厄人有所不堪君方彈鋏自哦泰然無幾微見顔面皇明受天明命君自賀曰天下定矣任有吾生矣徐守臣薦其所其于相國見主上於謹身殿敷奏頃上偉其儀度礧其論裁大器之特授中書檢校嘻非其慎仕得時訖於真主之遇其能戾契致是哉吾謂志之逺識之卓者非其人歟今以使事至淞首謁大成宫釋奠先聖繼訪余草玄邸次展師友拜留若干日行郡守盛升宴之泮堂諸客咸賦詩為君侈且為淞學校侈又必推余為首敘余重舉酒租之曰宰相佐天子以治天下者也檢校拾遺舉缺又贊宰相以治天下者也天子倚治於相相資失於檢校檢校相之弼友也任重矣哉任重矣哉以為序送馮侯之新昌州尹序二首余曩過田野見父老四三人聚首相與言縣令馮侯之賢者或泣或歎扣其故則曰自侯下車將二期民沐其福者不可枚計其馭事也簡其調役也均其徴賦也仁其理獄也雪而明民聽其令無有捍格自公自平若出鈞石之制者二期所行殆如一日而執臬者以毛髮細故裁之吾民疾苦顛連無告者三月不啻失父母余聞其言而識之今夕年春天子遣使行各道核郡縣吏名實審侯之行為至忠績為上最使復於上上曰馮公者出吾御選宜其政之不負吾法也於是嘉其功升新州守民又咸涕泣曰吾以侯為吾大官會府中今不得天何敓吾父母思以恩彼人哉吾嘗論吏之良否為民之戚休得一良則一郡喜失之則一郡憂故漢吏重良二千石今侯自縣升郡推華亭之治為新昌之政吾知其為中朝良二千石矣昊日復來蘇吾民余日生望之又華亭為松江望邑貢稅財賦當浙之什伍編户至百萬迄乎兵燹而之繁富者百不一二為邑者亦難乎其治矣丁未春烏江馮侯尹是邦以勞徠安集為已任流離者返之瘡痍者起之閲兩期而邑始成署所民欣然如痿者之紀行執熱者之濯清風弱裘者之歸故鄉見父母也是年夏四月海寇作詿誤逮華亭者幾百數侯誓死力辨于統兵曰華亭素善地古二陸文物之邦民非畔法軌而從人于逆者統兵允其請而郡之生靈更生於聖代者皆馮父之力也民為建生祠頌其德不忘其愍民之窮凡可為民所者無不為上聞其人識其姓氏以為可吾之良二千石者遂升守新州民父老幼稚奔餞于四關之外遮馬首而泣曰吾田之賦侯均之吾丁之役侯節之吾訟之鬱而不平者侯伸以理之今去也均吾節吾而伸以理吾者將誰望歟其遑遑之情不啻子之失慈父而立于頭無人之境余為解之曰杜甫氏有言元使君得結單如十公落落參錯天下為邦伯萬物吐氣今使馮使君輩參錯天下列郡豈有萬物不吐氣者哉新昌之生息皆鋒鏑之餘吾想民不未復地荒未闢者望吾侯父母之至如望歲然將見頌聲作其田里而無嘆息愁恨之聲者真我朝良二千石之慶也他日秩滿歸贊中書政堂其澤天下者可勝計哉吾民其侯之又復何憾送楊明歸越覲親序二月八日仕與親孰重曰親仕有時乎為親則仕非重乎曰祿足以逮親則仕祿不足以逮親則仕無愈乎啜菽飲水之為親樂也仕又何重乎宗姪子明辭烏府檄而歸里為堂有垂白之母也身雖居闕下凡耿耿乎定省之前東睡斗山之北白雲之思常在心目今年春自白下理舟楫過淞謁余草玄閣次急以別告問何之曰白雲之思日夕在倚門之廬矣今乃行請翁一言以為教余以明在閭里時十歲以孝悌稱洎長豪爽不羈侍親強健又孝婦善事姑遂起宦情欲伸所抱兵變備涉險患志不直遂而親且老矣庭前風木寧不有感乎宜且歸之晚也於其歸也序以送之又係之詩曰天西白雲天東飛烏臺春之烏依依髙堂遊子歸未歸堂前春草生春暉行行舟發彭郎磯勿遺霜霜露露沾人衣送斷事官李侯序大梁李侯文彬氏以世居執法有決讞才簡知于今天子天子親賞拔為中書斷事轉都督斷事克于其職凡邊民有詿誤郡牧有不白案出使推覆咸以平允取信朝廷今年春旨以田畜覆實事至淞旬沃間得成帳報于上淞官吏父老喜侯勾檢得失不苛優而一辨羣來乞言於會稽楊維楨維楨聞侯任天子耳目寄者已期年大明之古遺直也則為之言曰斷事在古為士客周為寇晉為理秦漢為廷尉今為大理斷事天下事有不平者平於君君以平於斷事斷事之寄不輕也較然矣獄必以果而斷斷必以明而審明果俱至又必不為上所敓旁所撓則其法始伸職斯究矣有其明有其果而又無其旁撓上􅐁者其稱譽比古漢于張用是占侯之峻躋華要內中書部使者郡二千石不俟龜蔡證矣吾與天下之民共望之洪武二年九月十日序東維子文集卷之二

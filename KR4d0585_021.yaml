  text: 東維子文集卷之二十一
  hash: sha256:782e7412136264d5b672b27a2f31c98cb16bcdd6103af68c9a10d89d87cbab60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_021-1a}
body:
  text: 會稽鐵厓楊維楨廉夫著記天風海濤樓記呉閶關之而其地清曠平衍去海僅若干里有築層樓與海湧峯之小呉軒相埓者其主或招海内豪客燕處其上八忩洞闢近見風濤汹湧在足底樓若浮而逝也全酌客以酒曰景若是䏻無言乎客亦酢酒扵主人樓惡名主曰未有以名敢請客遂稱天風海濤主以為然并以記請客曰壮天聲者風也而不知大塊之噫者聖也壮地險者濤也而不知曾瀾之積者信也故聖於隂昜莫如風信扵晝夜莫如濤風之生扵天執之而不得逐之而不及惡究乎聖哉濤之岀於海禦之而不止激之而不回惡察夫信哉天地噫而為風隂陽以之鞲萬物也江海積而為濤晝夜以之凖萬古也風之聖濤之信大矣至矣及風天與海濤相薄也蓬蓬然起歙乎上嚢填乎太空不終日而萬里若一磅礴相射與激水之濤相軋吞天沃日走貔貅而吼犀兕獸駭于野龍拔于淵極天下之神觀無出此吁海濤不揚而安乎淵静大風不振而安順乎和委天下之神觀曷有焉惟人亦然厄扵窮巷逃于深谷患難奸其外煩懣忍其中然而厄與鬱相遭而激諸意氣之頡頑發諸悲歌之感慨而天下稱竒曰丈夫士固不可以無竒也而竒不生於竒生於變故不鋧變無以知其竒不鋧竒無以見神也嗚呼戶牗之錫老堂記華亭環南六十里為西川有老人曰殷純父氏者年八十餘無衰憊態老人失子而得女二其長債曰顧審之氏居老人甥舘以終養且名老人燕處之堂曰錫老蓋私賀老人之年髙而假魯人煩燽之詞以為意也吁養外甥舅氏若審之氏者亦可謂恭也已矣審之以老人之姪孫奎受業予門遂因奔請錫老記予讀魯頌泮水之章其詞曰永錫難老順彼長道難老者難若出於天錫不知固有難老之道而有以為錫之耳故曰順彼長道老人寔以之老者既無多男子以怵其愛憎家又饒樂素無服食窘其寒飢又求清靜術樂之遺棄夫嗔喜愛慾朝市之勢要聲利也皆其難老之繇而詩人所謂長道者抑吾於老人之錫者有感焉者昔者宓戲晨辳氏之民暝之􆇈蹎不知所以然而然是以永年黄帝堯舜氏之民職職植弗天是以難老後世之俗不然􅋿文之煩稱也機譎之互确也百状俱作萬怪横生水竭山崩宵光畫㝠石言大疴夏霜冬雷同不繆盭是以有父終其子兄終其弟者求老人之善自飬夫長道謂黄帝堯舜氏之民兆歟今聖天子疾民之偷偽還淳思納斯民於春臺熙曍之域以黄唐玄恵格于上下旁通于四裔四裔之民不言而自化錫老之福且家至而户達何啻老人氏一堂而止哉吾将與人聫茵並几酌春酒堂上彈琴吹竹歌上古大庭氏之風以待逐俾奎復于老人刻諸堂為記江聲月色樓記浙江秋濤之壮秋月之英相上下月之英至秋分而極盛濤之聲亦至秋分而極壯濤與月一氣之得故江聲月色為天下兩竒絶也江反流溢而東南行其溺為湘湖湖之陽岐夀諸峰㦸而筆立腋江肘湖而襟諸峯之秀者則韓氏惟新之樓有焉元統元年秋惟新氏嘗觴于樓之上請予名樓予命之為江聲月色而記則未遑也惟新氏去世且十有餘年而其孫奕來從予游猶知致祖初志以記請嗚呼世之言聲色之樂者有矣楚眉衛殖春韶月秀狎憑而眤茵爭憐而競悦悲絲烈筦朋從旅進鳳鸞嘯而鶯燕鳴引霓而諧調者若出金石此世之所謂聲色而人人之甚欲者不知甚欲必有甚惡故曰狂夫樂焉智士哀焉然則聲色之寄於俄然漠然之物而元其甚欲甚惡之累不為樂之至也哉今夫江之聲實以潮嗚乎天下其疾而哀也如風雨其突怒如雷霆其却而逺也如松風笙鶴人不以為聲而為聲之至也月之與潮相得而勝也其動如銀汞其起如金城其鋪而平也如積雪千里人不以為色而為色之絶也兹非悟其妙之微殆未可與耳遇目觸者同日道也吾留吳下久不見江月雄觀秋且分矣業将與生買舟大泖口泝呉江抵海門夜泊湘南據胡床樓上以攬有樓之竒觀曰聲曰色探天地之大祕藏也則凡天籟之有聲皆吾韶釣天文地象之有色皆吾之西子南威也嗚呼樓之聲色若是取之無竭用之无禁而嗜之无荒是真樓之大祕藏而爾祖之樂以終其身而且以遺爾子孫傳世之玩於無窮期者乎生歸試誦吾言於父兄間爾祖有靈必以予言爲信舒嘯臺記雲間謝仲允氏甥館在石湖之隂館之左个植花木爲築治園堂其中命之曰舒嘯名客至允必延致于是今年春嘗觴于軒所酒酣爲予作蘇門之音且以志請按說文嘯者蹙口成聲也古詩人以嘯與歌亦言則知嘯亦蹙口之歌耳不無五音之協五音協則金石絲竹可𬒳時允出名姬童鸞者佐酒吾将以玉笛尋其聲座客擬馬相如為樂府命之曰紫鸞回然采其音付童鸞歌之以備晋成氏子嘯聴之闕也雖然吾聞宫為君商為臣角為民宫荒則君驕啇陂則宫壞角亂則民其怨嘯協於宫使子聞之温舒而廣大協於商於角使予聞之方正而好義惻隐而好人吁此允之心聲也不知代之君驕宫壞而民怨也苐未知聞蘇門鸞者亦有是否人不知其心聲之得則乂烏知其嘯之舒者闓敝和平不媿晋處士者聊抑予聞劉越石在晋陽清嘯胡騎聞之悽然而退嘯之感人者又如是今西北之冦閉塞關梁允能以越石之嘯慷慨激烈者使風雲動揺煙塵猝起又孰畏乎關梁之孽哉允勿靳是擬相如者又當作為出塞入塞以繼短簫鐃之曲也嘯之舒哉不亦韙哉讀書堆記予入淞首慕顧野王讀書堆者在亭林蒼翠間未果往也上海釋慧自稱野王氏后介其師去東老人來請曰居之左个闢室蓄古今書數千百㢧貽其嗣達妙襲名於讀書堆敢丐一言以記記未及今年予逰鶴沙順流下黄龍江抵滄海觀濤泊舟古精藍下主僧出肅客廼慧也見其二子即妙達也夜分張燈敘舊話遂為援筆誌書堆夫書之能蔵者不難能讀者難能讀者不難能用者難也書蔵而不讀與無等書讀而不用與不讀等張茂先蔵書至世乗而茂不善厥終李賛華載書數萬卷亦無捄於僇身非有書而不善讀讀而不善用者與代之衣冠家有積書如祕府至再世三世懵與書隔甚至售為聲伎資吁可悼也已若慧之書堆髙潔亭林磨水火而堆不毁經兵革而堆不遷使達也妙也又能翺翔於堆窮探力取以為脩業地非書之善藏而有善讀者歟苐未知達與妙之善讀讀之善用者何如耳宋聰道師善讀書一覧即書人叩則曰書貴行復何讀此方外士讀書法也惟二子以之至正二年夏四月卄六日夢蜨軒記有客三人者過夢外夢道人談夢一客吾夢為玄駒一客曰吾夢為蜩唐一客曰吾不夢達魔而為達魔者所以夢起目歌曰巴中老人􅗜仙橘化為達魔無處覔隨風一夜到漆園果入南華鬼無迹蜩唐者亦歌曰腹育出尸出宫風為食芳露為飲月令老翁候我占識侯能鳴復能瘄玄駒者亦歌曰大槐王臺臺九㳫充州一怒成烏合有時東海去觀鼇焉䏻死我鯪鯪甲道人曰夢玄駒者志富貴者也不知縁几登至尋人飲食而有焚如之􅍾富貴何在哉夢蜩唐者志清高者也不知吉羌執翳而搏其後黄鵲又從而利之使漆園丈人捐彈而返走清髙何在哉惟達魔夢我者亦不知我夢達魔則志於物化與物忘彼我殆與造化游與大道㝠者也古之人得之者惟南華真人也予弟子文璧氏持縹文冊來曰此某夢蝶軒集也請先生一語遂書此以遺之夢外夢道人者㑹稽楊維楨也真仁堂記雲間陸和伯自其先公某五世為良醫其藥區為真仁之堂未得儒先生之言以記和伯因予友吕輔之氏見且請記夫仁一惻隐之良心出於天而素無偽者也然世之行仁者則有誠不仁辨也梁惠王移民移粟非不仁而其心在於闢土地則非飢民為也宋襄公不禽二毛非不仁而其志在於求諸侯則非老人為也若是而言仁君子謂之偽可也仁之誠者必若禹稷湯武而後可禹視人溺如已溺稷親人飢如已飢湯不忍人之塗炭武不忍四海之荼毒此誠於仁者也吁此聖人達而在上事也和伯不仕者也不有顔子之仁乎顔子願得明主而輔相之其曰願無伐善無施勞此顔子之仁未達禹稷也故孟子曰禹稷顔子易地則皆然陸氏世隐于醫而其仁之真積者當厚矣使繼之者有一念之偽則豈得為真仁也哉和伯學岐黄之外習吾聖人書能充之以顔子之學善無伐則善無偽矣勞無施則勞無偽矣無偽而仁有以同乎天下矣老人之老無以異乎吾之老㓜人之㓜無異乎吾之同胞兄弟也吁其為人也誠矣至矣雲間之疲癃殘疾困而無吿於人者尚有出於陸氏之仁之外歟夫子語顔淵曰天下與仁吾亦将屬和伯云書諸室為記海峯亭記吾鐵門有貞秀峰者其為人爽朗有竒氣玄格髙情恒在物外每登髙逺跳若見東方生所稱三神山厯厯在眼底築亭鳯洲上名之曰海峯余遊海巫山生邀過鳳洲登其亭與之談仙家久視事因以記請按東方朔書謂海之東有三神山曰蓬萊方文瀛洲周廻五千里隔弱水三萬里非蜚仙不能到審是則三山不惟不可到亦非世眼所能覿也錢惟演賦逺山詩有秀出海三峯之句亦想像而賦之耳惟演不能有諸自貞秀顧欲有諸亭亭果有海峰乎無也秀曰吾得海外三峯竒覲於眼之所無者求於神而不求於迹也此非道與神合心與化并者不能得之得之則海峯不在海而在吾亭不在吾亭而在吾方寸蔵宻之地耳奚知有三萬弱水之隔哉予韙其言而録之座客有謌海峰之謡而被之琴者歌曰神峯在何處雲在東海虚下負六鼇首上托羣仙居世人尋地脉弱水墊輕羽高人坐燕上天游以蜚車揮斤九清表飄然隘中區咲呼一蓬粒貯在壷公壺幷録為記生名沐姓錢氏自號瓊臺仙史云靜學齋記吳人張氏性之以岐黄氏之術為學而東陽柳先生扁其燕處之齋為靜學閱三年自予宗伯振君求余文為記予叩靜之説於岐黄氏之書性之曰為懼懼無為欣欣婉然從物與時偕行譚而不治是謂至治非靜無以得之也予曰此非君子之靜學也諸葛武矦之言非靜無以致逺又曰躁不䏻以理性此靜學旨也靜句躁君也性之其有意於理性舍躁之君治之以何哉性無有不善理之則從亂之則凶性從必生性惡必殃自然理也性之以岐黄氏之術務於生人靜學之地其必有得生之本者歟木得則道無不生矣雖無抑吾又有進於是者人生而靜天之性也靜之之初不容說也愚者昧之聖人復之爲大道之宗萬物之本也非虚無之境寂滅之鄉窈窈㝠㝠之物也感而通之靜之微也動之機也嘻使靜而不機動也奚以資生動而不根靜也奚以資始老氏之言歸根曰靜是謂復命蓋與吾言性者近矣性之既知靜學以理之復知靜根以機之黄老氏養生之道尚有大於是者乎唯遂書諸齋以為張氏靜學志至正七年冬十月初吉記游菴記古者四民各有所處士處閒燕工處官府商處市井農處田野母使雜居見異物而遷焉此四民之居有定止而業有顓能也後代民始有出於四業之外者則曰游民游民不得客於先王之世而後世縱焉此四民之有專能者寡矣子方唶於是而客有以游菴為名且徴文於予者曰劉子與氏也子輿以居無定止而名菴曰游其子輿之不幸不生於先王之世乎抑幸而不生於先王之世得不專四民之業而由於游也子與氏好學之士也以游自由而不得比於先王之民是棄人也烏得為士乎子與之游游其居未嘗游其業也蓋子輿幼時侍大父居其所長而侍父居某所親殷而廬灾今又徙秀之廣陳所未知老而歸也迄今于何所望望乎如浮屠人之寄四方仲尼固曰東西南北之人也此游菴説也嗚呼戚施直鎛蘧蒢蒙璆侏儒扶盧曚瞍脩聲聾曠司火古者疾人猶不致於游而且為官師所材而職其能若是子輿氏鍾美天質懷抱利器而又敏扵問學其官師之所不裁者乎不得比夫先代之游民而棄之也諗矣惜吾位下官弗遑稱似其人也故重言之五湖宅記海虞繆仲素新治鉅艦列几格置琴書其中茟床茶竈相左右容客可數十人時時遨湖海間且命其名曰五湖宅吾嘗與之讌是宅于具區之上仲素将觴有請曰吾宅五湖倐東忽西動而未嘗動止而未嘗止實玄真子之隣也曽不知世間有百萬買宅之宅先生既止予宅得無言乎予笑曰異哉子之宅其宅也今夫一畝之宫一區之宅必相陰昜度原隰未聞卜以吾因子宅有感矣王侯邸第之相甲也其穹焉如天深焉如海食客數千百指粉黛之人填樓而牣國風雨不動安若泰山自謂享於身傳及於後之人無窮也而近不十年二十年逺不二世三世宅已姓於他矣豈若子之宅若動而能静若危而能安若邇而能逺而且免傳舍之累也哉然物莫大於宇宙而尤莫大於心善論心者謂之寸宅坧寸而大天地不能容太虚吾室也八荒吾庭也日月吾扃牗也視子之宅五湖一粟而已耳子之四海一區而己耳能由五湖以卒返斯宅也居其居如鈞天廣居下睇地間渠渠夏屋真殻哉況湖之一粟乎仲素憮然若有所得釃酒臨風起而自歌曰水之國兮秋秋水之宅兮浮浮招玄真以友兮鴟夷之與逰又歌曰太虚兮吾序八荒兮吾隅居丹臺之廣居兮吾不知宅之所如併録為記書題附書烏馬沙侯德政記後契世則以所著烏侯梅前州政績碑示余中敘禦畬冦一事尤詳余未識烏侯而世則之文可徴也因撫㢧嘆曰自罷侯置守而吏之識守土義者尠矣古者諸侯分土受之於君傳之於祖國存與存國亡與亡郡縣一裂吏卒三歳一易疆場有變輟望風引去閒有與城社共存亡者非出於其人之天性則學問之力也烏侯奉天子命守梅城教千里外衆委敵而奔而矦獨誓與城社共存亡外攘虎狼卒完其竟往來羅李二冦弄兵南徼至動三省兵禽獮草薙而後已使守汀漳吏有烏侯者在焉則又何致狼籍城保為吾民荼毒哉子思居武城有越冦至盍去諸子思曰伋去君誰與守烏侯䏻為子思之所為其亦有得於學間者不誣矣推此節也為晝邑之蠋睢陽之張平原之顔扶竪世教以利國家者固同一義也烏乎烏侯之志節其可畏巳哉文士頌其績者衆矣而守土之義未有發焉余故特發之至正十年六月廿日書書錢氏世科記後爵位之禪有延於數世者而文藝之傳及三葉者寡矣豈非爵位固本於世澤而文藝之濟美尤得於世德之至難者乎通川錢氏在宋淳熙迄于咸淳四世以經學領鄉薦者昔干人擢春官第者二人世科之盛猶未艾也而又有經學領延祐丁已之薦於是入本朝且五十年矣錢氏之澤何其長也歟吾聞鄉人俞日華氏曰錢氏之先曰聲逺公曰景髙公者皆能當冦盜時守衛其鄉又力城通川民免渡江避兵之患其鄉民到于今思之嗚呼此固錢氏之世德歟有世德者子孫必顯理之常也雖然今觀世之顯子孫顯以貴富不知務德而蓄于身以及其家者多矣則固不若子孫之文且賢爲顯爲可人也此余讀錢氏世科記而慕之又爲之署其說云東維子文集卷之二十一

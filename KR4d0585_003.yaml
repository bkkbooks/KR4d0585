front:
  text: 東維子文集卷之三
  hash: sha256:a510f406be9784fc5d8d94d00aca00df49cb8b3bc81e26652eb5416996ecbd17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_003-1a}
body:
  text: 會稽鐵厓楊維楨廉夫者序曹氏世譜後序廣陵曹時復以祖父世譜來告曰復以兵變去其鄉已十有七年幸祖宗坟域先人某水某丘尚在兵息将挈家還鄉得先生一言敘其譜庶吾某與後之人不忘其先之所出卒葬之歳月也按譜曹氏譙國人自幾世祖某徙居于汴曽祖成之又自汴遷廣陵之蜀岡大父某浙行省儤使妣周繼王宣使君卒王以盛年守節考某翊正司照磨贈爵奉議汴梁路治中妣霍氏太康縣君太康君善理家考㳺宦於外子六人皆太康君力教而有立長子時升廣師府奏差蚤世次時泰爵奉議留守司經歴至正癸已某相奉詔招討江淮海道相擇從者以時泰行泰奮然無讓厯險涉海鯨浪猝作舟覆而没相閔其死忠贈某官妻鄭氏子一次時益翰林院典書蚤有文名三淮兵梗奉母及孥脫難出虎口辟地于杭以疾卒妻李氏子三次時晋海道府掾起漕抵京師工多其功賞官嘉禾照磨道海還呉值風舟没萊州洋妻舅氏霍仲臯女通書史喜讀古孝義傳時貴人有聞其才欲敚其志誓曰曹氏世稱志孝門妾敢如庸婦人畔教茍夫兩姓以辱其門乎卒謝絶之妯氏鄭與李聞其志節相率守嫠而忘他志李氏一子力紡績資之出就外傳使勵學罔隊前聞人世冑諸子亦相率有成三節氏胥有請於復曰願歸故鄉守吾舅姑坟墓且使諸子有耕稼地吾屬死首丘無纎毫憾復之歸計逐决行舟泊吾門霍氏持茗丘為吾老妻壽後再有啓曰某不幸三伯氏天命而丘嫂三氏同一守節先生秉錢史筆傳信避國史倘昇餘論奨重之非直三節有恩曹氏一門其有光矣鐵史論曰歐陽史著五代死節臣不多見得王凝氏斷臂妻一人恃表以愧男子之不如者今曹氏一門男有没王氏婦有守貞節非一人得於喪亂流離中皆不愧凝妻代有歐太史其不在列傳乎萬一遺史氏則吾録之以繫諸曹氏譜亦使亡國臣有不如三節氏者愧云送經理官黄侯還京序今天子龍飛金陵奄有四海版圖歸職方者過唐越漢兵興以來土田阡陌無定籍可稽田是五大司農堂庶土九賦九貢又遣使行天下以經界為重務也而北庭黄侯萬里氏在選中分披華亭履出事事畢還京邑士朱輝為繪田間竿尺圖以見侯勤扵王事而敏有成功也持其卷來謁東維先生於草玄閣求一言以重其行先生器其人品才氣為相門之後辭不獲為敘其事于圖尾又採民謡為詩一章章八句侯前朝中書右相國孫大參也速公之嗣也讓門廕子弟自起身儤直厯太和縣監濟寕行垣官勾皆有休察今以才幹履畝于松其報最于上所優賞爵秩苟又分待三吳之地呉民之所望也侯尚以子言勉之詩曰天子龍飛定兩都山川草木盡昭蘇三呉履畝難為籍四海均田喜有圖海市魚鹽開斥鹵泖鄉䆉稏熟膏腴賞功行見承殊渥此地重分漢以符送山西省參知政事陳公序參政起北魏而厯代因之我朝經論草昧之初設天下省署凡若干所各以叅相主之名丞相而實則行丞相事地嘻方面之寄重矣荼陵陳公由兵部尚書輟為松江郡守未期月政成天子又選陞山西參知政事瀕行索別於會稽楊某某餞之言曰唐蕭瑀參相事太宗稱曰瑀言事不以利怵死懼真社稷臣魏徴參相爭天下米斗三錢太宋謂羣臣曰此徵勸我行仁義之効也今公在吳元初以鯁正諍朝廷天事不以死懼參議朝章詔令律書糾正切劘垂一代之大典以平日聖賢之學談仁履義匡弼帝躬務致堯舜此瑀徵之才之志也天子簡知天下想望風采也久矣山西剙立方面統州六十有三為南北京腹地天子時廵之所首選重臣行丞相事公當其選吾見其益厲忠藎以荅重寄勞徠流移薦進遺逸弓切遺俗咸襲衣冠入朝宿衛羣元仰給至外户不閉旅不齎粮使洪武之治出唐貞觀之上公稱社稷臣不在瑀徴之下非某一人之望天下人之望也洪武二年九月二十六日敘是日淞江通判方從善推官孔道原經厯石宗亨祖帳西門外舉酒為公列而令門生朱芾録于文為贐送都督府指揮龔使君序予友濠梁龔君希魯以文武才屢奉天子命出使思播峒蠻等絶域得其要領還報天子天子多其功授中順大夫京畿漕使秩未滿轉指揮大都督昉于唐行軍征討在其本道者曰人都督大都督帶使持節者謂之節度使外任之重無比焉今制革拒使節度使在朝立大都督府指揮正副凡三十有六員鏚鉞彫戈山元朱組視古班儀為有加非智足以參朝美勇足以總師于􅈴勞夙著者不得居是選也天子耳目官有不言者指揮出使得言之指揮之鯁正强直且為天子信近臣非侍掌嚴環衛而已也希魯以布衣不十年處宥宻地位益崇心愈下兢兢焉無一毫倨氣矜色君子占其人為右資之原德重器而况足迹所厯博覧天下之民風吏弊他日術術論奏徐吐吾民不平事知無不言言無不當稱天子信近臣是在希魯矣希魯行索言㠯贈于是乎書兩浙運判王侯分漕序聖天子以南服之土地人民未復版圖不忍加兵選通經練時事者喻威德使歸諸正於是王侯某以大司農司都事在選忠馳傳至呉浙省大臣謂蕞爾之㓂首鼠之乆懼辱天子信使留弗遣又明年省大臣承制授侯判兩浙鹽運事分司海上竈萌滷挿聞侯名皆手額慶㩦提老稚讙呼羅拜願受其條教退則更相告戒惟今之共修牢盆積薪草維法程石益招池盪相時率化無愆隂奔湍少一戾期則各知赴㓛以登歳課鞭笞愁苦之聲不聞猜旤吏窟倉場者奸無所宿好譁者或設誣辭汚衊侯侯行愈厲焚香矢于神曰某行負朝廷欺民庶神不吾祐否則有以直吾枉粤晉而譁者死民益駭嘻凡為天子命吏惟誠可以格天微而至於昆蟲草木其感應捷若影響況於逆虜乎况於醝丁乎侯以中原世禄家為朝廷風紀臣不幸不楊聲虜庭喻禍殉固難及司海王之賦究治本而力行之又不幸為猜旤者所害遂矢于神神報之若響嘻民可欺也天其可誣哉吾悼世之横吏受方伯連率之寄者欺公罔上鍜錬民以遂其妍天若罔聞者未定故也定則寕有遺噍乎吾嘉王侯之能以誠任諸巳又能格諸神録其治行為他吏勸云送華亭縣丞盛侯秩滿序昔西門豹為鄴令魏文侯誨以就功成名之術無他使其取諸人以為善而巳耳鄉邑先受坐之士必敬而禮爭之又使求其掩美揚醜者参驗之蓋以幽莠似禾驪牛似虎白骼似象武夫似玉此物以似而亂真者取人亦然其得不審虖廣陵盛侯彦思二尹于華亭下車之初首詢邑士之先受坐者以師禮事之其次可友者以友義待之又必於掩羙楊醜者覆而信其人其人之翻覆傾危者逺而去之如避仇敵故其取諸人以為善者不可數計旁及乎方外之士亦所不遺故其為治最績徹上府民之頌聲不歸令長而歸之二尹一考之内二易令長如閱過客而侯安於佐位覆如令長民恃之如慈親戀戀焉惟恐其秩滿而去也嘻二尹之賢于令長也可知矣探其治本則聰明不作智數不自用而為吾聰明智數者取諸人如西門豹而已耳彼三易如過客者其道相反故其優劣之判如此上府才其䏻賢其德陞以佐大郡賓省幙又何過耶其去也方外士自延慶而次凡十人徴吾文以餞别故吾樂書其治為侯之贐且為他吏之勸云送團結官劉理問序至止廿六年秋七月東藩吳主行郡縣團結之政選便之郡大參周公躬至嘉禾諸郡而理問劉矦至淞江侯集民高年用酒食禮推擇為泉所綱者萬夫長若干人下至隊長若千甲夫小相維叟贈以言歸為國主告古者團結之政蓋已見於管仲之理丘丘矣仲之軍令始於五家之軌卒伍定十室軍政成乎郊禍福相共綆急相死此霸國團結民兵之法也然王家之兵莫壮於臨淄蘇秦曰臨淄之户七萬計下户亦三男丁三七可二十一素富而實其俗鬪雞走六六轉喻鞠車聲擊而人肩摩也故齊之國以臨淄而强天下莫䏻當世降五季則團結禦冠者適以長㓂民有所謂白甲軍者又皆不受令於公家者也梁真明五年吳團結民兵徙保衛鄉里今侯以文武才畧輔國主之政為國理兵管氏之令其有不可奉行者乎君将印侯以呉藩屬郡之民如齊臨淄者有幾哉不則吾懼所結者大抵五季之白甲而已耳於乎後世霸國不患世無功而患無臨淄之民也吁安得民如臨淄者無侯論伯國團結之政也哉余公參政序參政不見官於周起於後魏隋唐因之亦職相者或有不及故使參焉職雖下相一等而抗其職者在焉則貳台衡燮武化蓋亦行相事矣参之位也不亦重已㢤非老成有謨議堅疑匠勁正者弗足以居之淮行有在呉門太尉張公實領之參預其政者或出自辟而自辟者非一已好惡之利亦公論之出也秦陵俞公希賢嘗以正諌居參諮幙府諫有不從輒求去凡上府有大刑政大與禮必先預其議反覆裁訂至當其可而後止府中稱骨鯁臣予聞昔忠肅魯公參大政權貴人憚其骨鯁自為魚頭參政公以參諮府骨然參政相垣其不為魚頭魯公乎然昔之魚頭内忠於天子昇平之朝今公匡救於藩國及正之日其糾撥亂邪風力􅏮􅏮焉者不又難於昔之魚頭乎於戲一邪正之進退一國之安危繫焉惟公之系安危者至以身之去就爭之吾見上公府之有人而淮之民蒙利利及以江浙之民者於公是已予辱與公友樂公有操而期公之有為故敘以言之公必有以證吾言之不人妄也送提控案牘李君秩滿序府控牘官視大郡照磨官不出吏部選而二十石以實禮禮其人者為其贊治於二華亭以户口之庶升松江㑹府賦稅輸四十萬自淮兵度江駐呉為方而松以近輔雄緊為呉大牙地初以将官帶二千石事馬步帶法曹邇者兵革稍戢郡府還牧守而別篤判推尚多缺焉幕言提控案牘二其分寄者豈帷文案哉官民僧道及海塗土舊之賦加舊十六户口徭役獄訟聽斷營造供億亦倍蓰於曩時雖府長得人而幕佐之材長亦不能主辨故其選也必擇才具絶人者居之其責比古長史司馬而功居半刺其罷軟不勝任者不敢覬而處焉邗城李君實氏輟淮東憲史居控牘千松户口徭役獄訟聽斷營造供億加以一時濬河築城漕饟之劇皆能相其府長了於從容談咲之頃上不失責而下不寡恩野無怨聲府有坐嘯宜為長所賓禮異於罷軟不勝任者今秩滿去長如失其友寮如失其師民父老如失其蓍蔡衛石其行也張子西關之外父老談道其能且賢者謁文於會稽楊某以祖之予客松耳目其贊治者與父老之言合於是乎書九月初四日其交承維揚秦文繹彦思求書上軸送張先生赴河南幕府序昔孔門諸子言志有勇士有辨亾有聖士之分而聖士始可為王佐才也子路願得白羽如月赤羽如火鐘鼓者震天力槊者連理将而攻之前無敵國夫子許以勇士者其人也子貢欲素衣縞冠使於兩國之間不持尺寸之兵升斗之糧使兩國相親如弟兄夫子許以辨士者其人也惟顔淵異二子之撰願相明王使城郭不治溝池不鑿陽和調人物繁阜鑄庫之兵化為農器夫子許其聖士者此也余為之嘅然曰聖門諸子不幸生於亂世而有可以强兵可以排難可以宰天下而安百姓者其才無不備由賜之强兵排難者隨才以見矣大不幸顔淵之相業不見於時也吾嘆今世果無其人乎抑有而無國君以主之乎吾不得而知也廼者河南省察罕公以天下天将軍佐天子中興不逺數千里起張先生某于天台鴈宕之間先生隐居避世學顔淵之學者也學顔淵之學則志顔淵之志今赴河南繇之見明天子将以顔淵子之望望其王佐之治已吾聞河南公幕府有君子營者五千人奮長戰盈三軍如由之能者有其人矣謄辨古伐甲兵加賜之能者亦有其人矣顧未知銷兵爲農器撥亂還王道者有其人乎無也果無也吾扵先生屬之先生能展顔子之所能使由賜其人無以施其能則河南之業成矣先生之志行矣慎勿曰蘭茝不與鮑魚同肆臯夔不與遂比同時送張憲之汴梁序會稽張憲與奉元趙信俱游吾門二人者各負忠義之氣經濟之才而未過大知已以施諸行事也至正甲午憲嘗以布衣上書辨章三旦公公竒之列置三軍之上出竒料敵言一一中表為某官非其志弗就乙未春㓂復陷常湖又以策千苗部之總兵者不能聼輒去嗚嗚泣下釃酒祝期偉人佐世太尉張公聞憲名辟以行人俾游説江東且輸平干淮安來別曰憲行必見察大将也得吾師一言之敎憲有以藉扵察公矣予聞唐相臣裴度之佐主中興也延攬遺傑恢復失土入縣瓠者以愬之勇獻德棣者以耆之辨一武一文各適其用此所以成功之易也今大将人期為唐之度也豪傑歸之唯恐後顧一得一耆愬巳乎倘得昇㓂不足平矣信既行予以愬期之子復踵往耆之所長當厲子巳子勉之使大将之門三千客中十九人内稱有趙張兩寄士豈帷光吾門也哉送倪進士中㑹試京師序華亭倪中字德中予在璜溪時嘗從予游於學有異能解行修志立一時行輩推服之至正壬寅浙省貢士三十有二人中名上游明年㑹試以病不行今年丙午㑹試于京優其蹈海而來者即奉天對倫魁又不限南士天子親以制科英子大夫詢以時政之急中以極言骨骾應之其為漢南弟一人必矣自兵興來士氣不振将二十年朝廷貢舉未有卓然輩出追隆延祐泰定之盛授牒以出者類亡治状至是羾牒換繻更晋取逢呼吸折節以賣其所自出若是者豈徒辱科其辱國甚矣自漢舉賢良榮以仲舒而辱以公孫宏唐舉進士榮以陸䞇韓愈而辱于皇甫鏄王涯之流宋舉進士榮以韓琦歐陽脩而辱於丁謂王介甫之輩於乎士之出於一日場屋言辭俯仰之頃遂為天下後世成敗毁譽之繫如此此今天子之厲精發情而親䇿子大夫務得真材之用也甲上苐句科以之榮國以之華者吾有屬於中矣中尚以予言勉之期無負于師無負子明天子也送華亭主簿張侯明善序天下錢粮計所百萬而吳為㝡呉州辟計所百所而松為甲淞兩邑華亭上海歳亦一百五十餘萬自張氏來兵賦繁興民力單矣重罹錢氏之禍弹萌凋喪流走者十六七今逢聖明統有南北首立司農經理上畝慎選守今申以農事所重在乎國賦也守令于淞者往往如履陷穿則以民賦劇律之簿責者甚嚴而恐恐乎咎之及也郡守林公下車未遑他事首以國賦爲第一義攸屬之官與以期㑹申以賞罸而華亭主簿張侯明善所分堡社督力有旨獨奏先集之功堡父老無怨言且羣謁錢史先生乞文以送之予喜侯爲曹濮公卿之冑青年敏學有治才盍侈之言而况重以羣公之命遂爲敘其事而以詩四章淞租一百五十萬比似他邦十倍過不是乗除嬴縮妙傕科下下穽人多白紅鮮百萬艘張侯三法獨稱優黄堂賞罰明懲勸綵帳旌功第一籌道不拾遺户不關田菜盡闢驛橋完金陵天使如相問此是蓱郷好宰官風雲有路開騏驥枳棘無巣宿鳯凰東閣相君為座主便從玉筍立朝班送譚知事赴河南省掾序濟南譚君清叔由奎章閣屬史授儒教再轉而為平江路知事於幕員在經厯左然吏抱牘進不涉其筆長不敢先事故府中事無鉅細得持可否君參幕員以來議可贊不咸一一當理府疑此未决輒就諮訪吏伏民隐未露雪又能發白之同列風㦲以君振長官賓對以君肅然猶以不得行平生志為慊慊年考未滿而河南行省辟為屬掾濱行呉人士為祖帳西風門而乞余言以為君贈予惟今之負才而仕者往往限資格以為進退而吏部以恒格外榮選用之科或一輒遷甚近者月四三月未嘗有及考者吁用賢法富爾也今譚君暴起身閣史不二十年躋七品秩贊留守佐行其才名操行足以於時而行丞相府又推中朝選用之利急之務曷是乎夫河南為省控要㑹於四方禮樂文物海内之所贍而尚為者也君出賛重裨政今以成行丞相方面之功亦可以少伸所用矣用彌天聲彌振中朝急者又以選用法拔而進之由是以佐相府者上佐當守以大流惠于天下豈不在譚君乎哉惟君益勉所至以畣所選而己耳至正七年十月廿有二日序送陳汝嘉漕掾秩滿序國朝入仕之門莫尚進士科然士之懐抱才藝者不能入由科而進也轉科之業入司積吏為起身者制書亦許之者以司櫝更櫝勞而階于宰輔者亦往往有焉不必其於進士科也華亭陳汝嘉世業儒始以文學自奮躓於場屋於是周毗陵郡侯薛公之辭為司櫝吏及考漕府復以汝嘉之才復辟為案櫝之司今復書考又将轉之於師閫過此則陞省垣入流品官州縣而有民社之寄矣吾聞汝嘉之吏于郡也亷而克勤佐其守以行者厯厯可稱道居漕府也屢駕風涉洋海周之以智慮濟之以忠誠故調栗至京如履砥道而往功捷而數折明上所眷其勞而賚之者甚厚嗚呼以汝嘉既往之行觀之則将來之績蓋有可言者已汝嘉年方强而志甚速循格而進都窮秩食厚禄可指日俟况其材實益茂聲猷益大執政者一汲引之踰資級而上則世之吏起身階至宰輔者吾不敢之期汝嘉乎惟汝嘉之母曰吾不得上賜進士出身為儒者詬病吁彼進士出身庸詎知其踣而不得峻躋其格極者又豈少也哉其行也呉之大夫士咸賦詩以餞之而取余言為敘首云至正七年秋八月廿有一日送陳仲剛龍頭司丞序番昜陳君仲剛由貴溪主簿遷浙之龍頭鹽司丞見余錢唐以余嘗令於亭請曰君獨無言教我乎余曰治莫難於亭也乆矣治農者農出租税視旱澇有所蠲置治事者異是歳集盈數約以三伏伏計以旬旬虧則簿貴歳虧則禄奪爵貶其著為令甲雖飢饉之年雨澇之月不得以妨工控愬此職於亭者之難為也漕府飛符蚤夜下督責吏火急如律零更鷹擊毛摰徴其私者甚於公而亭益憊矣亭官出語為亭地即以格令甲坐之即坐又不得損職去𬒳繫徽纒如胥靡之徙故職於亭者往往不得不蛟蜃其性牛羊其民人苛誅趣辨以為竒功且可擅名聲資進取豈弟仁厚務爲善政覆不足爲賢而重得咎旤然則鹺無善政勢端使然也君豈弟仁厚人也善政施于貴溪之民而移之于亭得無法乖其政勢格其志耶然而君子爲政與其不得譽於上或者苛誅趣辦爲竒功不知其下之病而上之累益甚矣故鹺病至今日而極非亟理其本雖筦桒不能善其後也大司農方思治病之本減佑直以通民食蠲羡額以紓亭方截目更新吏專選亷良勿俾竒刻者重病之君新吏也奉法順率與亭更始善政之行適㑹其時矣司之令豫章胡君余所善更以余言講求其本末異日課浙鹺最者不與龍頭第一将誰與東維子文集卷之三

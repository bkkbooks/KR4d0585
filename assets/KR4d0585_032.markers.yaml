  - {type: variant, offset: 1, length: 0, content: '', WYG: 忠勇西夏侯穆爾古蘓公墓銘跋曰春秋引天下之譽褒之賢者不敢私引天下之義貶之奸人不敢亂余讀鐵史穆爾古蘓傳信民之以為賢賢之民之以為奸奸之此鐵史之春秋也臺憲者天子之法臣也法臣不立法而鐵史立之嗚呼悕矣至正乙亥秋程文謹識}
  - {type: variant, offset: 5, length: 76, content: 後余嘗結廬城南日與柳風梧月竹韻松濤挈爲良友陶然長嘯若不知有人閒者雅好吟咏尤嗜袁景文詩業已刻而新之矣而楊廉夫又羨景文白燕諸作自以爲不及今讀其集博極羣書自成, WYG: 巻三十}

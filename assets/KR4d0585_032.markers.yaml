  - {type: variant, offset: 82, length: 142, content: 家言想不在袁下第篇章零脫未鏡其金誠竊恨之辱承太冲袁老素號藏書工于製作一言相慨然見投慰我夢寐如獲珍寶維汗雨滛滛不妨校勘葢清時暇日與先輩表揚風雅自是樂事遂忘其勞也雖然摛辭吐句精會神流白雪陽春商彛周鼎作者苦心識者具眼倘遇知音千古一快哉兹因完刻以廣其傳漫識于此後學王俞書萬厤十七年已丑孟秋既望, WYG: ''}

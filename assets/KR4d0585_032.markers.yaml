  - {type: line-break, offset: 0, content: '', id: KR4d0585_SBCK_032-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 附録琅玕子來詩六絶句李杜文章萬丈光並驅今見㑹稽楊幾時過我華陽洞銕笛一聲吹鳳凰句曲山中張外史與君湖海結詩盟可憐遺劒隨長夜今日誰同並世名義熈處士歸來早千古髙風今尚存夫子風期正相似東山花下醉清尊問竒未到揚雄宅羽馭飈車縂不靈㑹向山隂具舟楫載將肴酒過華亭嵇公蕭散七不堪彭澤歸來雪滿簮見説枋頭無真筆董狐大史在江南草罷𤣥經不美新萬言書已上楓宸新詩題遍琅玕所亦念丹丘有羽人學生徐固次韻新詩隨手寫銀光逺寄江南鐵史楊自説蕭郎善吹笛不知孰與驂鸞凰徐固又次四絶一溪流水碧桃花云是茅山道士家我欲相從問丹訣赤城五色茹朝霞道人曉起天鼔罷石盆换水種菖陽詩成寫滿白籙紙春江人來能寄將春江陳曉山也不向王門曳我裾秋風江上釣鱸魚仙官乞與青藜杖夜照龜文緑字書鸚潮潮上琅玕所渾似浣花溪上庄風前起舞鐵如意雙鶴飛來秋滿床學士吴毅次韻四絶三茅兄弟舊遊處萬箇琅玕隠者家雲氣團空圓似葢丹光井出赤於霞與君别來十日强日日憶爾鳳山陽霜林橘子大如斗書尾須君逺寄將雪色吴綾裁道裾鵝黄美酒换金魚詩成速向沈東老不惜榴皮醉後書南泖津頭買野航鸚湖便似瀼西庄琅玕主者雅好客應遣麻姑掃石床羽儀和韻蠟色濤箋寫寄詩玉壺氷鑑識容儀法言願卒諸生業家學深慚帝者師江月夜涼聞鐵笛海雲秋盡捲朱旗文章絶似相如筆好為題詩諭逺夷𤣥霜子作道人苦寒不可出焚香白晝髙齋眠繁華過眼不足惜造物戲人真可憐何如適興飲美酒未信服藥能長年人生天地一逆旅流光瞬息難留連魯隂饒介錢王城亂山青惟有江聲繞驛亭萬姓瘡痍勞撫字諸侯風化在儀刑圍碁别墅花連屋覔句芳池草滿汀座是東南待君久翩翩五馬不須停淮海秦約宛丘陳肅賦東南帝者之所都山川龍鳳相縈紆離宫别館三百區紫金鬱鬱今有無府中逶迤謝太守少年玉節黄金符民食在簞漿在壺飢餔渴飲歌咿嗚華車細馬左右趨使君歸來香滿途鐵鷂子一解鐵厓先生作黄將軍歌殆絶唱也絶唱不可和門生徐固賦鐵鷂子一解先生讀之曰可續吾貂僭書入卷鐵鷂飛犵猿披鐵鷂鳴牧犢平鷂栖在長城長城鎮南國渴飲長城水飢食長城粟獬豸不敢觸貔貅不敢蹴毒蟒何來吹黑風南國長城一朝覆鐵鷂怒裂眥毒蟒拆骨死朝食毒蟒心暮食毒蟒髓嗚呼食蟒之髓心始已東海大鰌銜宿恥華陽巾歌鐵厓老仙冠華陽巾制作竒古喜而為之歌吴東野褐陸居仁賦鐵厓頭骨如鐵堅髙冠不肯著進賢華陽新巾制作古倒垂一幅披兩肩醉來箕踞松下眠白眼不受天子宣自稱臣是詩中仙掉頭乗風頂忽露墊角得兩人爭傳有時錦袍淋墨涴鶴氅冷看兠鍪帶血汚貂蟬賦歸來占叢竹下索笑長岸梅花邊狂歌撃節自有鐵如意何須白羽指使三軍前老夫緇撮上戴天與爾老仙相周旋學生徐章次華陽巾歌鐵史文章金石堅鐵史賢書草聖賢談遷父子未可稱筆削枋頭直筆當齊肩草𤣥亭上枕書眠不貴世間玉堂供奉之皇宣世人識不識盡呼鐵笛仙烏紗新製華陽傳七客聮翩冠似蟬或攜妓東山下或駕大舫西湖邊百年三萬六千日日日玉山醉倒春風前不知鶴書在青天黄麻一道昨夜天東旋學生謝思順賦黑鐵龍氣如虎光如虹黄金意氣結國士勾踐臺上長城公黑鐵龍心何雄誓為國掃煙塵空長城何巍巍砥柱東南維龍兮龍兮長城歸飢推食兮寒解衣日日龍遶長城飛光抱日月聮清輝維南有猫虎最怒夜穴長城翻赤土龍兮食猫如食鼠維東有犢獷以奔日觸長城嘘大雲龍兮食犢如食豚盲老烏啄人屋賣我長城殱我屬烏乎長城覆不可復黑鐵龍誓三為長城滅仇族玉笥山為我樹長城碑鑑湖水為我洗長城恥直欲聞之聖天子㑹稽先生楊鐵史}

  - {type: variant, offset: 5044, length: 0, content: '', WYG: 書負蝂傳後可繼隼鷄録縞凰議作一類余讀桞子厚負蝂傳而未見其人及讀元魏志胡太后幸絹藏從者百餘人使人各稱力取之尚書令李崇章王融負之過重顛仆於地崇傷腰融損足太后奪其負使空去若崇融二子非魏之負蝂也耶若胡后者盖愚弄兩蝂虫豈非桞傳之明證哉予在睦見金倉氏破睦有李淵郁者首入睦庫腰負白金若干錠過重交道上屢仆不能起人知其負也遂砍腰􅟃其負去吁若李氏者又桞傳之大癡蝂者與}

  - {type: variant, offset: 4978, length: 1, content: 卷, WYG: 中猝未能辨也蓋仲虞純明篤茂博極文而多識當朝典故雖在布衣憂君愛國}
  - {type: variant, offset: 4980, length: 0, content: '', WYG: 識時見於詠歌之次其資甚似杜者故其為詩不似之者或寡矣吾求丁公之詩似杜者或未之過則知仲虞之詩列乎家數者不得於其師而得於其資也諗矣雖然觀杜者不唯見其律而有見其騷者焉不唯見其騷而有見其雅者焉不唯見其騷與雅也而有見其史者焉此杜詩之全也仲虞資近杜矣尚於其全者求其備云至正戊子九月丙辰序張北山和陶集序詩得於言言得於志人各有志有言以為詩非迹人以得之者也東坡和淵明詩非故假詩於淵明也其觧有合於淵明者故和其詩不知詩之為淵明為東坡也涪翁曰淵明千載人東坡百世士出處固不同氣味乃相似蓋知東坡之詩可比淵明矣天台張北山著和陶集若干巻蔵于家其孫師聖出其親手澤求余一言以傳世蓋北山宋人也宋革當天朝收用南士趨者瀾倒徵書至北山北山獨閟關弗起自稱東海大布衣終其身嘻正士之節其有似義熈處士者歟故其見諸和陶蓋必有合者觀其胸中不合乎淵明者寡矣步韻倚聲謂之迹人以得詩吾不信也雖然世之和陶者不止北山也又豈人人北山哉吾嘗評陶謝愛山之樂同也而有不同者何也康樂伐山開道入數百人自始寧至臨海敝敝焉不得一日以休得一於山者觕矣五栁先生斷轅不出一朝於籬落間見之而悠然若莫逆也其得於山者神矣故五栁之詠南山可學也而於南山之得之神不可學也不可學則其得於山者亦康樂之役於山者而已耳吾於和陶而不陶者亦云至正八年夏五月}

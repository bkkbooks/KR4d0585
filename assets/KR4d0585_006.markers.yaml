  - {type: variant, offset: 4981, length: 0, content: '', WYG: 日剡韶詩序或問詩可學乎曰詩不可以學為也詩本情性有性此有情有情此有詩也上而言之雅詩情純風詩情雜下而言之屈詩情騷陶詩情靖李詩情逸杜詩情厚詩之狀未有不依情而出也雖然不可學詩之所出者不可以無學也聲和平中正必由於情情和平中正或矢於性則學問之功得矣或曰三百篇有出於匹夫匹婦之口而豈為盡知學乎曰匹婦無學也而逰於先王之澤者學之至也發於言辭止於禮義與一時公卿大夫君子之言同録於聖人也非無本也我元之詩虞為宗趙范楊馬陳揭副之繼者疊出而未止吾求之東南永嘉李孝光錢唐張天雨天台丁復項烱毗陵吳恭倪瓚蓋亦有本者也近復得永嘉張天英鄭東姑蘇陳謙郭翼而吳興得郯韶也韶詩清麗而温重無窮愁險苦之態蓋其强力於學未止探其本之所出極其作之所詣蓋得騷之聲得雅之情則雅之聲矣又豈直在元詩一人之數追逐李張丁項軰而止乎韶勉之而已其成帙者若干巻兩淛作者序曩余在京師時與同年黄子肅俞原明張志道論閩淛新詩子肅數閩詩人凡若干軰而深詆余两淛無詩余憤曰言何誕也詩出情性豈閩有情性淛皆木石肺肝乎余後歸浙思雪子肅之言之寃聞一名能詩者未嘗不躬候其門採其精工往往未能深起人意閲十有餘年僅僅得七家其一永嘉李孝光李和其一天台項烱可立其一東陽陳樵君采其一元鎮其二老釋氏曰句曲張伯雨雲門思斷江也昔王劉二子能重河朔矧七家者不足以重兩浙乎惜不令子肅見之嘗論詩與文一技而詩之工為尤難不專其業不造其家冀傳於世妄也蓋仲容季和放乎六朝而歸凖老杜可立有李騎鯨之氣而君采得元和鬼仙之變元鎮軒輊二陳而造乎晉漢斷江衣鉢乎老谷句曲風格夙宗大厯而痛釐去纎艷不逞之習七人作備見諸體凡若干什目曰兩浙作者集非徒務厭子肅之言實以見大雅在浙方作而未已也若其作者繼起而未已也又豈僅僅七人而止哉衞子剛詩録序余入淞見世家子弟凡十數人能去裘馬之習以文墨為事者蓋寡矣城西衛子剛蓋山齋别駕公之孫也首贄詩見余既而復出敬聚齋詩稿一編讀其古詩如秋夜曲白苧詞其排律如九山讌集五言律如江水深深碧棃花淡淡明九農勞畚臿三泖足風波七言律如亞夫舊是將軍子賈誼初傳太傅官玉人嬌列錦步陣銀筆醉調金縷衣醉吹銀笛五老洞閒拾瑶草三神山其絶句如消寒圖一首音節興象皆造盛唐有餘地非詩門之顓主者不能至也昔人論詩謂窮苦之詞易工驩愉之詞難好子剛之工不得於窮苦而得於驩愉可以知其才之髙出等軰不得以休戚之情限也子剛之年未踰壯而其詞之工已如此使復益之以春秋才愈老茂而詞愈髙古又豈止今日所覩而已哉至正九年夏四月廿有九日序玉山草堂雅集序崑山顧仲瑛裒其所嘗與逰者往還唱和及襍賦之詩悉鋟諸梓編帙既成求余一言以引諸首余來吳見吳之大姓家友於人者往往市道耳勢要耳聲色貨利耳不好聲利而好雜流者寡矣矧好儒流乎不好儒流而好書數者寡矣矧好文墨章句為不朽之事乎仲瑛嗜好既異於彼故其取友亦異其首内交於余也築亭曰其亭以尊余之所學也設榻曰其榻以殊余之所止也余何脩而得此哉蓋仲瑛之慕義好賢將以示始於余示始於余而海内之士有賢於余者至矣故其取友日益衆計文墨所聚日益多此草堂雅集之出於家而布於外也集自余而次凡五十餘家詩凡七百餘首其工拙淺深自有定品觀者有不待余之評裁也其或䕶短憑愚持以多上人者仲瑛自家權度又輙能是非而去取之此次其有可觀者焉攬之者無論其人之貴賤穉宿及老釋之異門總其條貫若金石之相宣也鹽梅之相濟也蓋必有得於雅集者矣得於雅}

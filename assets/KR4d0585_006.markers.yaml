  - {type: variant, offset: 4976, length: 0, content: '', WYG: 集巻六欽定四庫全書東維子集巻七元楊維禎撰序吳復詩録序古風人之詩類出於閭夫鄙𨽻非盡公卿大夫士之作也而傳之後世有非今公卿大夫士之所可及則何也古者人人有士君子之行其學之成也尚已故其出言如山出雲水出}
  - {type: page-break, offset: 4976, content: '', id: KR4d0585_WYG_007-1a, image: WYG1221/WYG1221-0436a.png}
  - {type: page-break, offset: 4976, content: '', id: KR4d0585_WYG_007-1b, image: WYG1221/WYG1221-0436b.png}
  - {type: variant, offset: 4977, length: 0, content: '', WYG: 草木之出華實也後之人執筆呻吟模朱擬白以為詩尚為有詩也哉故摹儗愈偪而去古愈逺吾觀後之橅儗為詩而為世道感也逺矣間嘗求詩於摹儗之外而未見其何人富陽吳復見心持詩來讀其古什凡若干首决非摹儗而成者知學有古風人之㫖矣吁使復達而有位為朝廷道盛徳製雅頌復之作不為古公卿大夫士之作乎吁又使人人如復不以摹儗為詩古詩不復作者吾其無望於後乎復益勉之以徵吾言焉可也趙氏詩録序評詩之品無異人品也人有面目骨骼有情性神氣詩之醜好髙下亦然風雅而降為騷騷降為十九首十九首而降為陶杜為二李其情性不埜神氣不羣故其骨骼不庳面目不鄙嘻此詩之品在後無尚也下是為齊梁為晚唐季宋其面目日鄙骨骼日庳其情性神氣可知已嘻學詩於晚唐季宋之後而欲上下陶杜二李以薄乎騷雅亦落落乎其難哉然詩之情性神氣古今無間也得古之情性神氣則古之詩在也然而面目未識而謂得其骨骼妄矣骨骼未得而謂得其情性妄矣情性未得而謂得其神氣益妄矣吾友宋生無逸送其鄉人趙璋之詩來曰璋詩有志于古非錮於代之積習而弗變者也是敢晉于先生求一言自信余既訝宋言而覆其詩如桃源月蝕頗能力㧞于晚唐季宋者它日進不止其於二李杜陶庶亦識其面目識其面目之久庶乎情性神氣者併得之璋父勉乎哉毋曰吾詩止於是而已也至正丁亥九月望在姑蘇錦秀坊寫李仲虞詩序刪後求詩者尚家數家數之大無止乎杜宗杜者要隨其人之資所得爾資之拙者又隨其師之所傳得之爾詩得於師固不若得於資之為優也詩者人之情性也人各有情性則人有各詩也得於師者其得為吾自家之詩哉天台李仲虞執詩為贄見予於姑蘇城南且云學詩於鄉先生丁仲容氏明旦則復謁出詩一編求予言以序予夜讀其詩知其法得於少陵矣如五言有云湛露仙盤白朝陽虎殿紅詔起西河上旌隨斗柄東西北干戈定東南杼軸空置諸少陵}

  - {type: variant, offset: 4385, length: 0, content: '', WYG: 欽定四庫全書東維子集巻三十元楊維楨撰歌盤所歌并叙孟子稱大丈夫曰居天下之正位行天下之大道富貴不能滛貧賤不能移威武不能屈李愿稱大丈夫曰坐廟堂則進退百官在外則武夫前呵從者夾道喜有賞怒有刑材畯者譽其徳粉白黛緑者爭寵妍孟子之所謂大丈夫者也李愿氏之所謂大丈夫人之稱大丈夫者也其賢不肖固有間矣及愿稱大丈夫之所不遇者又曰與其有譽孰若無毁與其有樂孰若無憂車服不維刀鋸不加理亂不知黜陟不聞此我之所行愿蓋亦潔身而徃之流也亦豈得稱大丈夫哉然此於處穢汚觸刑辟徼倖於萬一老死而後止者則猶賢耳故昌黎韓子之未遇也亦欲膏車秣馬以從愿於盤之樂也去之六百餘年而猶有裔孫曰秀之南牕公某為宋和公之七世孫宋革不言仕國朝以名節强起之辭以疾歸隠於淡滄之上名其居曰盤所盤在太行去淡滄不知其若干道里而南牕名之葢所同其隠而不必同其地也南忩克己風節重其所則愈於愿之徒以不遇而樂其所者也南牕諸孫為恕又能復盤所於先廬壊棄之餘遷其所於海甸之東丘而南牕之故扁在焉固賢矣吾聞恕自幼有大志惟用力於當世者又自知不可為則為不遇於時者之為而不為處穢汚觸刑辟倖於老死而後止者也於愿之賢亦庶乎其近之昌黎氏賢愿而為叙余亦賢恕而為昌黎之歌以歌之曰盤之宫東丘之樂盤之土耕者讓畝叶盤之泉漁不竭囦盤之阻外禦其侮盤之深内潛我心盤之禳實繁我族嗟盤之樂兮樂而安風雨不震兮燹澇弗奸孝以致其養兮義以廣夫急難居饒安矣體愈胖心無憂兮奚有患叶歌兮樂女盤女將和兮攷吾槃杵歌七首杭築長城賴辨章仁令兩郡將美政洽於衆心以底不日之成然役夫之記有不免凄苦者東維子錄其詞為杵歌亟亟城城城亟成小兒齊唱杵歌聲杵歌傳作睢陽曲中有哭聲能陷城自古衆心能作城五方取土不須蒸蒸土作城城可破衆心作城城可慿疊疉石石石㠂嶆立竿作表齊竿旄阿誰造得雲梯子剗地過城百丈髙羅城一百廿里長東藩恃此作金湯舊基更展三十里莫剰西門一樹樟蘇州刺史新令好不用西山取石勞拆得鳳山楊璉塔南城不日似雲髙南城不日似雲髙城脚愁侵八月濤射得潮頭向西去錢王鐵箭泰山牢攻城不怕齊神武玉璧堪支百萬兵不是南朝誇玉璧闗西南子是長城江西饒歌二章陳友諒起兵殺倪蠻子據龍興辨章阿爾威沙公憲僉察伋公合兵破之龍興始平江右諸郡無不欵附至此而武功成作龍興平繄龍興藩西江土昄章國駿龎江有砥柱胡為鴻流降𠞰蠻效尤蟊賊内訌三台映太微國士俱無雙王旅嘽嘽鉦鼓摐天威震赫羣兇􅋏八郡望風咸來降武功既成毋從從聖人南面殿萬邦右龍興平十五句龍興陷日憲史劉䕫懐印埋土中土生瑞木一本察伋被命為僉憲丞購印於瑞木下掘得印來歸伋得印施諸移文遂成恢復功為銀章復維白金有章維國之光九鼎既峙翕元化以張大治范金吐景耀鋩蟠螭細龜鸞翥鳳翔官臣實司之植我皇綱孰亟且藏啓發禎祥操絜係政柄繄徳是將符節允合人文昌蕩攘兇頑時乃康與國咸休萬年膺天慶右銀章復二十句用韻復雲松老人華陽巾歌君不見獬豸不識字髙柱削鐵堅白簡孰辨賢不賢又不見鵕䴊偏尚武髙屋壓虎肩五兵不理長酣眠鐵崕老狂者强項如董宣小巾製子夏正要江東傳人間緋紫揎已蛻風中蟬脫巾漉酒東籬邊吴淞老褐來賀我倒冠共醉春風前我歌此歌君拍手東壺西閬開洞天洞天之鶴為我雙回旋次韻省郎蔡彦文觀潮長歌錄呈吴興貳守雲間先生舞海鳳跳天吴八月十八壯觀天下無蓬婆之山突兀眼前見有如祖龍萬鐸來東驅婆留一箭氣相敵强弩不用三千夫雲蜃成樓不可斬火銕揺識誰能屠招潮小兒不畏死面螯蹋浪心何麤搏桑爛若木枯革瓢古憤無時蘇東維子驚相呼長風破浪未歸去一葉欲事寰瀛圖馮誰之一疋素中有萬里河漢乗吾桴題清閟堂雪蕉圖洛陽城中雪㝠㝠袁家竹屋如箳篂老人僵卧木偶形不知太守來扣扄輞川畫得洛陽亭千載好事圖方屏寒林脫葉風寥冷胡為見此芭蕉青花房倒抽玉膽缾鹽華亂㸃青鸞翎階前老石如秃丁銀瘤玊癭魦星星嗚呼妙筆王右丞隕霜不殺譏麟經右丞執政身彤廷燮理無乃迷天刑胡笳一聲吹羯腥血瀝勁草啼精靈嗚呼爾身如蕉不如蓂凝碧池上先秋零大樹歌為馮淵如賦東柯溪頭三大樹水深土厚厓石牢一株古茶粲冬蘤紅若火鏡鎔氷濤兩株老檜挺霜幹青如連弁翹雙鰲不知人間富貴楦青紫草亡木卒紛如毛漢家根株歴千嵗當時大將誇人豪只今子孫仗大義昧始尚薄巾車勞三槐風雲慶有待二荆湯火死已逃金鴉倒立海底景白鳳夜燄風中膏蟠柯骨露黑石虎竒幹手接蒼山猱惡氛西起白日翳恍惚大將排旌旄東柯東柯濟時具豈無兵家文武韜摩挲大樹日酣卧不肯即偽從鞬櫜始知后皇受命乞獨正神明扶植氷霜操我來飲我中山醪脫巾掛樹三花髙大槐太守夢楚國大梅美人臨漢臯大槲老雄侍我酒長筝亦即金絲槽醉歌寫入嘉樹傳竊比橘頌騷人騷}

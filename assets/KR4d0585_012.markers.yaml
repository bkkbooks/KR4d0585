  - {type: variant, offset: 0, length: 507, content: 東維子文集卷之十二會稽鐵厓楊維楨廉夫著記新建都水庸田使司記天地位而水為之脉絡運而天地之功成古者水病民神禹民治之功與天地等代之職水者雖小大不侔其得一日廢耶此周之匠人稻人漢之水衡水司空之官所由著而今之都水使者之司所由立也大德初司置平江曰行都水監泰定年改庸田遷松江以置不常人視為疣舍故棟其署寄署于它所至正元年重置司平江秩隆三品轄江東浙東西道官與風紀重臣交調御兼行工部事掾屬亦皆税司樂吏遴選郡縣守今咸受節制司之權崇勢重視昔有加八年都水使者左答納失里公來謂今聖天子切切焉以東南租税之出重在三吳而三吳水國也故署都水司平江而官吏寄署地所事體弗稱先是請於朝得給官錢四萬緍仍得撥地羣治西財賦府故基若干畝於是鳩工庀材經始於是年十月八日不三月告完中堂弘敞挾室靜宻幕司曹舍鱗次翼張旁爲繚垣前爲崇閎氣勢炎兀規模備具吳父老咸扶黎仰瞻嘖嘖稱贊以爲不自意垂白復見是司之新也既而郡工竣事長貳率僚屬位正新守相與舉酒落成幕元僚沙君來請于維楨頤有以記維楨考中呉水患自宋季兵部韓殿省郟亶父子經營規畫亦詳矣其漂陽五堰江隂十四瀆宜具大呉等瀆松江曰塘曰浦者凡一百三十有二志籍尚可稽也然未若我朝知力足以興除其利害而德足以消其震盪漂忽之變也大德間三江陻塞平章徹里氏濾, WYG: ''}

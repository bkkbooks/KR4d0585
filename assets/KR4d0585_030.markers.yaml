  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4d0585_krp_030-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4d0585_SBCK_030-1a01}
  - {type: variant, offset: 0, length: 1523, content: 東維子文集卷之三十㑹稽鐵厓楊維楨廉夫著歌盤所歌并序孟子稱大丈夫曰居天下之正位行天下之大道富貴不能淫貧賤不能移威武不能屈李愿稱大丈夫曰坐廟堂則進退百官在外則武夫前呵從者失途喜有賞怒有刑材俊者譽其德粉白黛緑者爭寵妍盖子之所謂大丈夫者也李愿氏之所謂大丈夫人之稱大丈夫也其賢不肖固有間矣及愿稱大丈夫之所不遇者又曰與其有譽孰若無毁與其有樂孰若無憂車服不維刀鋸不加理亂不知黜陟不聞此我之所行愿蓋亦潔身而往之流也豈亦得稱大丈夫哉然比於處穢汚觸刑辟徼倖于萬一老死而後止者則猶賢耳故昌黎韓子之未遇也亦於膏車秣馬以從應于盤之樂也去之六百餘年而猶有裔孫曰秀之南自公某為宋和公之七世孫也宋革不忘仕國朝以名節强起之辭以疾歸隱于淡滄之上名其居曰盤所盤在太行去淡滄不知其若干道里而南囱名之盖所同其隐而不必冋其地也南囱克已風節重其所則愈於愿之徒以不過而樂其所者也南囱諸孫為恕乂能復盤所于先廬瓌棄之餘遷其所於海甸之東丘而南囱之故扁在焉固賢矣吾聞恕自㓜有大志唯用力于當世者又自知不可為則為不遇于時者之為而不為處穢污觸刑辟倖於老死而後止者也於愿之賢亦庶乎其近之昌黎氏賢愿而為序余亦賢恕而為昌黎之歌以歌之曰盤之宫東丘之樂􅌉之土耕者讓畝叶盤之泉漁不及因盤之阻外禦其侮盤之内潜我心􅌉之禳實盤繁我族嗟盤之樂兮樂而安風雨不震兮燹澇弗奸孝以致其養兮義以廣夫隐難居燒安兮體愈胖心無憂兮奚有患叶歌兮樂女盤女将和兮致吾槃杵歌七首杭築長城賴辨章仁令兩羣美政洽于衆心以底不日之成然彼失之記有不免悽苦者東維子録其辭為杵歌亟亟城城城亟成小兒齊唱杵歌聲杵歌傳作睢陽曲中有哭聲能陷城自古衆心能作城五方取土不須蒸蒸土作城城可破衆心作城城可憑疊疊石石石㟼嶆立竿作表齊竿旄阿誰迼得雲梯子剗地過城百尺高羅城一百廿里長東藩恃此作金湯舊基更展三千里莫剰西門一樹樟蘇州刺史新令好不用西山取石勞拆得鳳山楊漣塔南城不日似雲高南城不日似雲髙城脚愁侵八月濤射得潮頭向西去錢王鐵箭泰山牢攻城不怕齊神武玉璧堪支百萬兵不是南朝誇玉壁關西南子是長城江西鐃歌二章陳友諒起兵殺倪蠻子據龍興辨章阿里温沙公憲倉察伋公合兵破之龍興始平江右諸郡無不欵附至此而武功成作龍興平繄龍興藩西江二皈章國駿厖江有砥柱胡為鴻流降剿蠻効尤蟊賊内訌三台映太嶶國士俱無雙王旅嘽嘽鉦鼔摐天威震赫羣兇􅋏八郡望風咸來降武功既成母從從聖人南面殿萬邦右龍興平十五句龍興陷日憲史劉䕫懷印埋土中土生瑞木一本察伋被命為僉憲丞購印於瑞木下掘得印來歸伋得印施諸移文遂成恢復功為銀章徭維白金有章維國之光九鼎既峙翕元化以張大冶范金吐景耀鉈蟠螭細龜鸞翥鳯翔官臣實司之楨我皇網孰至且藏啓發禎祥標絜係政柄繄德是将符節允合人文昌蕩攘兇頑時乃康與國咸休萬年膺天慶用韻復雲松老人華陽巾歌君不見獬豸不識字髙桂削鉄堅白簡孰辨賢不賢又不鷄䴊偏尚武高屋壓虎肩五兵不理長酣眠鉄崖老狂者强項如董宣小巾製子夏正安江東傳人間緋紫揎已蜕風中蟬脱巾漉酒東籬邊吳淞老褐来賀我倒冠共醉春風前我歌此歌君拍手東壺西䦘開洞天洞天之寉為我雙回旋次韻省郎蔡彦文觀潮長歌録呈吳興二守雲間先生雙海鳯跳天吴八月十八觀天下無篷婆之山突兀眼前見有如祖龍萬鋒來東驅婆留一箭氣相敵强努不用三千夫雲蜃成樓不可軒大鉄摇識誰能屠招潮小兒不畏死兩螯蹋浪心何粗搏桑爛若木枯草瓢古憤無時蘇東維子驚相呼長風破浪未歸去一葉欲事寰瀛圖馮誰之一疋素中有萬里河漢乗吾桴題清閟堂雪蕉圖洛陽城中雪㝠㝠袁家竹屋如笄篁老人僵卧木偶形不知太守來扣扃輞川畫得洛陽亭千載好事圖方屏寒林脱葉風寥泠胡見爲此芭蕉青花房倒抽玉胆缾監華亂點青鸞翎階前老石如秃丁銀瘤玉癭魦星星嗚呼妙筆主右丞隕霜不殺譏麟經石丞執政臭彤庭燮理無乃迷天刑胡笳一聲吹羯腥血􅅹勁草啼精靈鳴呼爾身如蕉不如蓂凝碧沱上先秋零大樹歌爲馮淵如賦, WYG: ''}

  - {type: line-break, offset: 6194, content: '', id: KR4d0585_SBCK_010-14b10}
  - {type: variant, offset: 6194, length: 11, content: 孫如會稽道師致用父者其, WYG: 集巻十}
  - {type: variant, offset: 6206, length: 435, content: 也致用不持以世家稱于人尤以好古博雅稱以清修敏學稱其燕處之室曰讀易所蓄書有先秦之祕文有峋嶁篆刻桐棺隸蹟有古器皿漢司馬坡谷諸名公手書帖昔代之故家所罕有入其室者不問可知其為文獻故家子孫也求文獻之後如致用之博雅之清修而又敏學不勌殆亦難其人巳而致用不用於世延為道壬錢唐吾始甚惜之別去數年與朝昜薛公伯而張公為師友學益晋行益髙道益大也重為之意而畏焉顧視鄉之出而仕者離親戚棄坟墓将以大榮身及家也不知世變者可畏名一掛牒書者如牒臬籍錮而禁可也放竄可也斧質而奴而族可也思一返其故鄉非其君哀其老而憊憊而瀕於死乞與休告則法亡得而去也今致用道遵於身心泰於世進退自如駕一葉舟絶江而東也歸拜其鄉之父兄師友塗迎門候獲見風采者如見神仙吁其得歸而求之乎放而逐之乎斧質孥族而僇之乎於其歸也其不􅋏而慕之乎抑吾聞鄉之穉老人民非者已過半而城郭之一新者亦非舊矣致用於風露之夕馭鶮於小蓬閣上賦海嶠之詩得無有同聲而應過城頭詰甲子詔時人以學仙而去者為我志之漆書者為何人夢道士而飛鳴者又為何人至正十三年青龍集癸已七月七日老鄉客, WYG: 元}

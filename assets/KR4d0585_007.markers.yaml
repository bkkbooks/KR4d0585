  - {type: line-break, offset: 0, content: '', id: KR4d0585_SBCK_007-1a01}
  - {type: variant, offset: 0, length: 2404, content: 東維子文集卷之七㑹稽鐵厓楊維楨廉夫著序呉復詩録序古風人之詩類出於閭夫鄙隸非盡公卿大夫士之作也而傳之後世有非今公卿大夫士之所可及則何也古者人有士君子之行其學之成也尚已故其出言如山出雲水出文草木之出華實也後之人執筆呻吟摸朱擬白以為詩尚為有詩也哉故摹儗愈偪而去古愈逺吾觀後之撫儗為詩而為世道感也逺矣間嘗求詩於摹儗之外而未見其何人富昜呉復見心持詩來讀其古什凡若干首决非摹儗而成者知學有古風人之㫖矣吁使復達而有位為朝廷道盛德製雅頌復之作不為右公卿大夫士之作乎吁又使人人如復不以摹儗為詩古詩不復作者吾其無望於後乎復益勉之以徴吾言焉可也趙氏詩録序評詩之品無異人品也人有面目骨體有情性神氣詩之醜好髙下亦然風雅而隆為騷而降為十九首十九首而降為陶杜為二李其情性不埜神氣不羣故其骨骼不庳面目不鄙嘻此詩之品在後無尚也下是為齊梁為晚唐季宋其面目日鄙骨骼日庳其情性神氣可知巳嘻學詩於晚唐季宋之後而欲上下陶杜二李以薄乎騷雅亦落落乎其難哉然詩之情性神氣古今無閒也得古之情性神氣則古之詩在也然而面目未識而得其骨骼妄矣骨骼未得而謂得其情性妄矣情性未得而謂得其神氣益妄矣吾友宋生無逸送其鄉人趙璋之詩來曰璋詩有志于古非錮於代之積習而弗變者也是敢晋于先生求一言自信余既訝宋言而覆其詩如桃源月蝕頗能力拔于晚唐季宋者它日進不止其於二李杜陶庶亦識其面目識其面目之乆庶乎情性神氣者併得之璋父勉乎哉母曰吾詩止於是而巳也至正丁亥九月望在姑蘇錦秀坊寫李仲虞詩序刪後求詩者尚家數家數之大無止乎杜宗杜者要隨其人之資所得爾資之拙者又隨其師之所傳得之爾詩得於師固不若得於資之爲優也詩者人之情性也人各有情性則人有各詩也得於師者其得爲吾自家之詩哉天台李仲虞執詩爲贄見予於姑蘇城南且云學詩于鄉先生丁仲客氏明旦則復謁出詩一編求予言以序予夜讀其詩知其法得于少陵矣如五言有云湛露仙盤白朝陽虎殿紅詔起西河上旌隨斗柄東西北干戈定東南杼軸空置諸少陵集中猝未能辨也葢仲虞純明䔍茂愽極文而多識當朝典故雖在布衣憂君憂國之識時見于詠歌之次其資甚似杜者故其爲詩不似之者或寡矣吾求丁公之詩似杜者或未之過則知仲虞之詩到乎家數者不得于其師而得于其資也諗矣雖然觀杜者不唯見其律而有見其騷者焉不唯見其騷而有見其雅者焉不唯見其騷與雅也而有見其史者焉此杜詩之全也仲虞資近杜矣尚于其全者求其備云至正戊子九月丙辰序張北山和陶集序詩得于言言得於志人各有志有言以為詩非迹人以得之者也東坡和淵明詩非故假詩于淵明也具解有合于淵明者故和其詩不知詩之為淵明為東坡也涪翁曰淵明千載人東坡百世士出處固不同氣味乃相似蓋知東坡之詩可比淵明矣天台張北山著和陶集若干卷藏于家其孫師聖出其親手澤求余言以傳世蓋北山宋人也宋革當天朝收用南士趨者淵倒徴書至北山北山獨閟關弗起自稱東海大布衣終其身嘻正士之鄭其有似義熙處士者歟故其見諸和陶蓋必有合者觀其胸中不合乎淵明者寡矣步韵倚聲謂之迹人以得詩吾不信也雖然世之和陶者不止北山也又豈人人北山哉吾嘗評陶謝爱山之樂同也而有不同者何也康樂代山開道入數百人自始寕至臨海敝敵焉不得一日以休得一於山者觕矣五柳先生斷轅不出一朝於籬落間見之而悠然若莫逆也其得於山者神矣故五柳之詠南山可學也而於南山之得之神不可學也不可學則其得於山者亦康樂之役於山者而巳耳吾于知陶而不陶者亦云至正八年夏五月六日剡韶詩序或問詩可學乎曰詩不可以學為也詩本情性有性此有情有情此有詩也上而言之雅詩情純風詩情雜下而言之屈詩情騷陶詩情靖李詩情逸杜詩情厚詩之状未有不依情而出也雖然不可學詩之所出者不可以無學也聲和平中正必由於情情和平中正或失於性則學問之功得矣或曰三百篇有出于疋夫疋婦之口而豈為盡知學乎曰疋婦無學也而遊於先生之澤者學之至也發於言辭止於禮義與一時公卿大夫君子之言同録於聖人也非無本也我元之詩虞為宗趙范楊馬陳揭副之繼者疊出而未止吾求之東南永嘉李孝光錢唐張天雨天台丁復項炯毗陵呉恭倪瓉蓋亦有本者也近復得永嘉張天英鄭東姑蘇陳譁郭翼而呉興得郯韶也韶詩情麗而温重無窮愁險苦之態蓋其强力于學未止深其本之所出極其作之所詣蓋得騷之聲雅之情則雅之聲矣又豈直在元詩一人之數追逐李張丁項輩而止乎韶勉之而巳其成帙者若不下卷兩淛作者序曩余在京師時與同年黄子肅俞原明張志道論閩淛新詩子肅數閩詩人凡若干輩而深詆余兩淛無詩余噴曰言何誕也詩出情性豈閩有情性淛皆木石肺肝乎余後歸浙思雲子肅之言之冤聞一名能詩者未嘗不窮候其門採其精工往往未䏻深起人意閲十有餘年堇堇得七家其一永嘉李孝光季和其一天台項炯可立其一東昜陳樵君采其一元鎮其二老䆁氏曰句曲張伯雨雲門思斷江也昔王劉二子能重河朔矧七家者不足以重兩浙乎惜不令子肅見之嘗論詩興文一技而詩之工為尤難不専其業不造其家冀傳于世妄也蓋仲容季和放乎六朝而歸凖老杜可立有李騎鯨之氣而君采得元和鬼仙之變元鎮軒輕二陳而造乎晋淡斷江衣鉢乎老谷句曲風格風宗大厤而痛釐去纎艶不逞之習七人作備見諸體凡若干什目曰兩淛作者集非徒務厭子肅之言實以見大雅在淛方作而未巳也若其作者繼起而未已也又豈足七人而止哉衛子剛詩録序余人淞見世家子弟凡十數人能去裘馬之習以文墨為事者蓋寡矣城西衛子剛蓋山齋別駕公之孫也首䞇詩見余既而復出敬聚齋詩稿一編讀其古詩如秋夜曲白苧詞其排律如九山讌集五言律如江水深深碧棃花淡淡明九農勞畚挿三泖足風波七言律如亞夫舊是将軍子賈誼初傳太傅官玉人嬌列錦歩陣銀筆醉諷金縷衣醉吹銀笛五老洞聞拾瑶艸三神山其絶句如消寒圖一首音節興象皆造盛唐有餘地非詩門之顓主者不能至也昔人論詩詩窮苦之詞易工驩愉之詞難好子剛之二不得於窮苦而得於驩愉可以知其才之髙出䓁輩不得以休戚之情限也子剛之年未踰壮而其詞之工已如此使復益之以春秋才愈老茂而詞愈髙古又豈止今日所覩而已哉至正九年夏四月廿有九日序玉山草堂雅集序崐山顧仲瑛裒其所嘗與游者往還唱和及雜賦之詩悉鋟諸梓編帙既成求余一言以引諸首余來呉見呉之大姓家友於人者往往市道耳勢要耳聲色貨利耳不好聲利而好雜流者寡矣矧好儒流乎不好儒流而好書數者, WYG: ''}

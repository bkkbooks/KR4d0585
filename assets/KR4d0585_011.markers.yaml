  - {type: variant, offset: 6661, length: 0, content: '', WYG: 欽定四庫全書東維子集巻十二元楊維楨撰記新建都水庸田使司記天地位而水為之脉絡運而天地之功成古者水病民神禹氏治之功與天地等代之職水者雖小大不侔其得一日廢耶此周之匠人稻人漢之水衡水司空之官所由著而今之都水使者之司所由立也大德初司置平江曰行都水監㤗定年改庸田遷松江以置不常人視為郵舍故棟其署寄署于它所至正元年重置司平江秩隆三品轄江東浙東西道官與風紀重臣交調御兼行工部事掾属亦皆視司臬吏遴選郡縣守令咸受節制司之權崇勢重視昔有加八年都水使者闕公來謂今聖天子切切焉以東南租稅之出重在三呉而三呉水國也故署都水司平江而官吏寄署他所事體弗稱先是請於朝得給官錢四萬緡仍得撥地羣治西財賦府故基若干畝於是鳩工庀材經始於是年十月八日不三月告完中堂􅊼敞掖室静宻幕司曹舍鱗次翼張旁為繚垣前為崇閎氣勢突兀䂓模備具呉父老咸杖藜仰瞻嘖嘖稱賛以為不自意垂白復見是司之新也既而羣工竣事長貳率僚属位正新守相與舉酒落成幕元僚沙君來請于維禎願有以記維禎考中呉水患自宋李兵部韓殿省郟亶父子經營規畫亦詳矣其溧陽五堰江隂十四瀆宜具大呉等瀆松江曰塘曰浦者凡一百三十有二志籍尚可稽也然未若我朝知力足以興除其利害而德足以消其震盪漂忽之變也大德間三江陻塞平章闕氏濬治功成民到于今稱之邇者洪河暴央折而西北流天子一念動坤載遣使沈璧而河復故道吁官都水者上以聖天子之心為心下以闕氏之功為功三呉之民尚有昏墊而無訴者乎抑相水之職本諸順天之理世未有順於理而利不興亦未有逆諸理而害能除者孟子曰禹之行水也行其所無事也行其所無事者順理也鯀之反是則以方命命者何即理也以水為職者職與理應雖湯湯可又不則天下之治水者皆鯀也可不慎哉左公字廷憲居憲府使雲南岩岩有風采奮髯之頃奸膽盡落到官視民飢溺猶已是年十二月除浙東閫帥大使尚公有用字繼賢是年九月九十於官副使闕字質卿康公若㤗字魯瞻是年五月除國子監司業僉事官闕公字國賔是年十二月除福建憲僉事王公仲温字輔卿照磨李嘏字公錫分事董者掾史錢璛奏差蔡琳李報也繫之辭曰邈哉法象頖𤣥與黄坎德流長雷雨在上江河在下吐内隂陽維坎之徳惠廸維吉從逆惟殃帝憫下上具區芒芒忽焉震盪周官稻人漢司水衡利脩干農叶爰設司存保彼東方臬臣之良為天子使材貞且幹不呉不揚相彼天時以順地理恩肥海邦水居其壑土反其宅昆蟲墊蔵畊食鑿飲男樂其作女修其紅叶年榖屢登順成八方其蜡悉通叶職臣報功曰我水庸長發農祥作郎反常湖等處茶園都提舉司記禹貢九州方物而茶不在列盖古之茶在藥品而未為食品也至唐茶飲始盛不惟華人嗜之囬鶻氏亦驅馬相市言利者不得不與鹽筴同科故始稅於趙賛增於王播𣙜於王涯茶遂為}

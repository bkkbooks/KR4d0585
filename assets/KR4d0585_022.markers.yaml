  - {type: line-break, offset: 625, content: '', id: KR4d0585_SBCK_022-2a11}
  - {type: variant, offset: 631, length: 498, content: 桑生之名志桑生為主司所忌有觀其不舉進士者生鐵鑄為硯自警之曰研弊則吾業改也卒舉進士及第吁志之不可已也如是吾未論其人而尚其志孟子曰士尚志士尚志士而無志尚足以為士哉雲聞吕生恂從余授春秋五傳學名其脩業之齋曰鐵硯且鑄青州之鐵為淬頴之具生非尚其器尚音人之志也志不移吾見生之業成矣故曰志之所存雖逖而親雖缺而成彊裂壞斷不吾聞也吾觀者間得於貧窶之人而貴富大姓之子弟未聞也間有者大率以名始厪而未忽卒於不䏻竟成非此師父之罪也子弟之志不立也今生年踰冠矣妻妾矣子女矣父兄將以門事委之矣而且乞歳月之暇於父兄曰間志無地嗜之惟在文藝耳使恂得卒業於其師者幸矣於是屏逐妻子敕斷家事而朝焉夕焉於是齋脩其業不以祈寒盛暑少輟也生之志不有竟成而光于桑氏者乎桑不幸生五代雖擢巍科登相垣蓋無足觀者生際盛代志一成事業蓋将過之吁君子非學之難學而無立志之患非志之難志而無令名之患生勉之生之門友曰馮生濬吳生毅盍亦以吾言警諸心樂齋志喜怒哀樂爱惡欲人之七情也樂居情一而聖賢之教每樂言乎心何也孔子稱回也其心三月不違仁又曰回也不改其樂是是非樂不足以語仁人之心心得其樂凡哀怒愛惡無有失其節者益未嘗有以損吾之樂也世俗不知仁人之樂仁人之樂也内世俗之樂也外外者物而已矣, WYG: ''}

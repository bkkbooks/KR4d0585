  - {type: variant, offset: 1319, length: 388, content: 勝負其亦有以自决已歟不然吾懼希顔之樂者商而已耳希顔得為顔之徒也哉希顔惕然避席曰甘言疾也苦言藥也先生之言某之藥也幸奉教於先生願書諸室以為志養浩齋志孟子戰國之士也而得稱代之大丈夫小六國之君相者一浩然之氣也是氣也天地至剛至大之物也人得其浩然者山嶽不足為其雄也風雷不足為其厲也羆熊乕兕不足為其勇也秋之肅肅不足為其清春之生生不足為其富也千歳之日至不足為其逺也蘇子所謂不依形而至不恃力而行不隨存殁而有亡者推其盛至於参天地關盛衰之運豈不誠浩然已乎然其浩也必有養也孟子曰我善養吾浩然之氣得其養則浩極其用與天地凖失則暴矣故又曰志一則動氣氣一則動志又曰其為氣也配義與道無是餒也至哉浩乎或暴也或餒也顧其養之善不善者何如耳此孟子之浩然獨稱善養也吾嘗觀艨艟之舟放于大水而致千里之逺者必乗載之人得其用舟之道又得其制載之具然後駕乎風清肆行千里而不虞乎溺不然制之之具苦用之之道踈舟不役於人而覆為再役也是覆溺道, WYG: 瞽儒}

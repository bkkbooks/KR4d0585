  text: 東維子文集卷之二十五
  hash: sha256:bfe3cdf39c6d22d9afff83aa38a8c9535408ba5e7e44f63bdc1c8992d46a0943
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_025-1a}
body:
  text: 會稽錢厓楊維楨廉夫著墓誌銘馮進卿墓誌銘富春馮堅氏衷衰來拜予姑胥舍次曰堅不孝先子以某年某月日猝亡堅忍死将以某月某日葬先生以異姓弟先子亡無先生銘與草木役役也堅不孝益甚予為之泣哭堅歸而卑之志與銘使刻諸碣云君名士升字進卿其先陳留人自其曹大父志學徙家杭之富春山遂為富春人大父從周宋承事郎華亭縣鹽場提幹伯父驥宋武康主簿宋亡死節于獨松關公革不仕及長跅􅕟不羈而有大志通律令圖籍及九丘之書以時舉子業爲俗學棄弗習然負器畧喜㓛名慕溥介于班定逺之爲人嘗欲走京師吐其磊磈者于執政貴臣以爲世之爵禄可俯而拾也至正𥘉漳徼賊作朝廷聚湖江浙之兵相持不即殄滅君欲獻䇿招誘不煩一矢之遺可繫弗行曉乃與羣弟拓祖廬起大門宅誓同居不分宅成而君卒矣享年五十有一嗚呼君之器可謂竒矣志可謂大矣而訖無所就以卒嗚呼天既生人之才以爲用然又天開不使直遂者不可得而知也君生于大德丁酉至正丁亥五月四日卒以明年某月葬某地弟四人士頤士晋士豫士仁娶裘氏生男堅女貞孫男二人允邵允文婿爲同里諸國用嗚呼以君才之志之縮而卒也則其有後者可知已銘曰已乎進卿有才以為庸有志以為衷天既信其始而又絀其終彼蒙者從我明獨則凶已乎進卿貴也者吾不知其所以已通賤也者吾不知其所以窮虞隐君墓誌銘吳郡海虞山之隂其溪曰東蘆有隐君焉為虞仲死氏生于前至元甲午十月十有三日殁于至正戊子三月二日是年十月某日葬于虞山西麓小澗之原先生葬之一月其孤德懋來拜余吳門曰先君生無仕績襮于世死不得文可傳者銘草亡木卒耳不孝孤惟是惧且今奎章學古虞公集游吳謂君曰吾渡江派有在海虞而海虞之隐德賴有君焉於是與公通譜牒吾子公之上第門生幸有以銘諸按状君名安垕字仲元其系實岀虞仲氏自唐文懿公世南陪葬昭陵始為雍人後十有一世某從僖宗入蜀又為蜀人八傳而為宋太師雍國公兄文扈駕渡南子姓有尋周讓王之隐跡于海虞者故隐君為吳人曽大父某弗仕宋将仕郎父某弗仕母郎氏君生而性靜深長有器局謹事其親如禮甚親殁事其長如父家政必承其出又必相其審于義沃于三力也故舉無過差時節祀先必哭泣君初喪時歳延碩師過子姪以道義學将招其私墊籍私田其中以為先氏虞仲學官事未集而殁兄弟同居者五十年鄉黨以友孝聞婣戚朋舊服其交久而敬後至元間行丞相府聞其人才且賢嘗檄授福寕州路都監税官君不茍進曰使某有任官情吾官不在筦庫家矣遂謝病傅事家督不入官府不事鄉里請謁自號野齋然郡有名公卿往往以客禮見之垂終呼德懋無他語惟曰吾幸生承平時竊師友之教安富尊榮優游以卒世得爲一世全人吾復何憾爾曹勉㫋不爲吾不爲爲吾所能爲而已娶同里望族周氏恭儉慈惠克相于内子二人長德懋也娶同里沙溪故宋楊察推女孫次德賢居㓜女一人贅同郡于尚書孫德濶孫男一人寳住天德有所助雖賤必書春秋法也樹石立銘固不得顓諸六服官政者若君引迹自晦上德有先于虞仲得穪隐君爲是得銘已銘曰繄海虞氏繇隱南犇迨雍國公南派又分式忠式孝在爾子孫相爾子孫既才實蕃才而弗用用野自文觀其事親出可事君夫豈筦庫而可屈身為世全人闇然而晦年若弗永永德于聞大海奫奫小澗沄沄我丈著隐勿崩其墳吳君見心墓銘至正八年十月二十六曰余友富春吳君卒家貧無以葬閲明年十一月某日賴同里友馮士頤葬某地其孤毅來求銘余悲不忍銘往哭其墓毅申前請嗚呼又何忍不銘君諱復字見心生有異禀四歳能誦書千餘言弱冠失怙刻苦讀書不以貧難少置生無偽言行與人約雖千里外不失期刻性喜吟哦善効白長慶歌謡衿詩有諷切貪奸其人諱者欲以危法中之不爲屈予讀書大桐山中時君道長書願與弟子及予寓居錢唐太湖間遂舍妻子從予遊學古文歌詩始君持所作詩來自夸穢同列詩屏棄如棄涕吐余攬詩笑曰子欲輩李唐伎亦至髙欲追古必焚減舊語君變色不敢言徐取楮筆銀余琴􅍾及春俠辭二十餘首去越一月復來謝曰先生詩法得矣吾舊詩亦樊矣苐出語猶吾前日詩也奈何余曰姑歇汝哦事靜讀古風雅騷及古樂府幾再又退而閲三月來出所作曰余舊語忘新語出矣賴先生教幸而或馴致於古遂編次余古詩凡十卷加以評註能道余所欲言余詩有逸者君輒能補之觀者謂可亂余真自後下筆必出人意表嘗雪夜與余逰東西洞庭徒步登七十二弁之峰其語益厓㧞皆竒氣所鍾世人莫之識也去年約余逰廬山觀瀑布馴至岳陽訪鐵笛亭未行而以病告病三月而逝矣臨終告其陳倫曰天守死我矣使加吾數年吾詩不後二李吾文不遜吾師嗚呼君死矣吾愛遊大山長谷孰余相耶吾唱古歌詩孰余和耶吾性急卒未能寡過君執直敢議又孰余議耶吾見君之學也如宋頓積不訾江河之傾不可休其立志如匙勘鑰矢破的為文如大将旗鼓建而三軍所指無不如意蓋具來日登而未止迺今止于斯耶前年夢逰天漢探天孫支機石穴為研池遂自歸雲槎秋客而所擕研旦號㙨石云嗚呼君也生而食不給禄不及也蓋不以外者為憾矣其不五十而卒也又豈以為憾哉大父某父某皆貧學而不仕娶李氏子教穆女一人適同里余驥世傳其雲槎集凡十卷第山張外史雨為之序云銘曰嗟吳子雕龍貴麟賊天其天所嗔子之道宜鬱屯嗟吾子忽已淪文不死于萬春孝友先生秦公墓誌銘孝友先生既没五年其嗣子約因其友袁華謁予雲間而致其辭曰約不幸先人學而貧貧而又不得高年死又得能名文者鉊重不孝先人事業不用亡得稱仁義著述有不得不白者已賴楊東溪氏状其詳敢丐吾子屬比之余始來吳聞昆太倉為貨居地不為習屈挺然以文行自立者二人焉曰東溪老人楊公譓洎先生也予皆不及識矣而獲見東溪老人楊公听洎先生也予皆及識笑而獲見東溪所為先生状蓋若識於目睫間故不辭論次其事而銘之先生諱玉字德卿姓秦氏其先鹽城人世以儒學顯宋紹興間由某祖徙居崇明之東沙與袁陸謝為望族而秦氏尤以衣冠文物稱重其鄉曽祖棟祖傑皆宋太學上含生父庚從蛟蜂方先生學咸淳未以詩試通州第一國朝不仕漕萬户玉溪劉公聞其隐徳延致于館因又徙昆之太倉家焉君四歳即巋然不羣能屬句對五歳䏻暗誦孝經論語八歳而喪父哀墓如成人母顧氏日夜躬織紝資先生亦感奮曰吾家世有聞人其可自我斬乎益刻苦自力比長通五經尤邃於詩會貢舉法行州長踵其舉先生先生曰子學豈爲決科計哉遂辭性至孝友事母與兄無違禮事大小悉稟以行母有疾藥食必親甞累旬日不解帶每卒哀泣至血執喪過禮終喪不沐浴不盃酩人以爲難𥘉居喪鄰有火熾不可捄家人收貲爲出走計獨先生伏棺慟不去火止及屋壁遂自滅州長上其孝行将得旌寵輒謝止之憲史張公揆行部閲其行義見其所著文論薦之且約偕詣闕弗行居常晦默如愚人見貴人益自閉匿然衣冠器服必整整與弟子講解音吐洒然而娓娓無倦教授鄉里二十年嘗曰士讀書将以惠天下不幸不及仕而教人爲文行經術亦惠耳里之貧不能學者爲給饘粥筆札教之嘗行道間得遺金訪其主還之封職如故有盜入室竊布帛去明日復来僕覘執之使縦之去舊有土田在東沙族人據有之遂不問并以舊書歸之後其人感化皆歸於善類先生之於孝友于蹈義執禮至此亦可謂之篤行君子者巳先生前殁之歳嘗夢爲詩禮記其末句曰五湖四海一閑人及覺悟曰合五與四一爲十五十月疾騐矣四而虚其一爲三明年三月吾疾殆不起矣乎至期果符其言屬纊神色不變時至正四年二月二十四日也得年五十有三其徒私謚曰孝友先生君娶顔氏子男二長約次壁壁先卒約能世其學女二先生讀書之舍自名曰迂濶所著有詩經纂例大學中庸探説宋三朝摘要齋居襍録并詩文若干卷蔵于家葬某所銘曰人之機也我曰愚我之達也人曰迂嗟先生愚不如迂自居四一以虚卒允符誠使狃愚以好用侕迂以利趨道弗信而畫于途孰愈孝與友之謚于徒元故樂閒先生墓誌館公諱錫珪字君玉其先出唐學士亮亮遂良由河南遷錢唐子孫所居號禇家塘其後有徒居苕城者亦以禇姓其巷今聚族南潯之西芣塢庄者即自苕城來有起身科第者為宋迪功郎淮安縣丞士登公曽大父也宋将仕郎管元吉公大父也宋将仕郎國史實録院檢閱文字天祐公考也公性沉靜寡言自幼有識量檢閱君嘗夜遇盜盜認君巾服欲刺之公潜以他衣冠易之於庸皂而免長究心經史游庠序間獵獵有俊聲安定書院舉之儒臺授求縣孝公曰吾親老且病忍一日去側耶雖不仕得朝夕養我親吾志周滿借有髙位違孝而往不為也矧縣學師不能信所志者乎遂辭朝夕躬上食親前親有疾衣不解帶者累月藥餌必親嘗乃進居喪哀而毁有常情所不堪既葬追慕右将見之至老弗渝篤孝之行人無間言里父老馴其子弟之事親必指公為則云族有貧不自給者則之粟貸不償者焚其劵又多蓄善藥以濟人平居雖然燕必冠對客則風流談論務使之盡驩晩歳鑿地築圃蒔花竹以自娛創樂閒堂因身號樂閒居士其在鄉閭平率人物比漢陳博古而尤善知今事人比唐齊幹行游城中邦大夫候其車音爭相迎致問時政善不尊而稱之焉樂閑先生公生于宋德祐五月二十二日卒于今至元庚辰六月二十九日年六十有六娶張氏四男長嗣良次嗣英出繼叔後次嗣後嗣賢女一適董汝華孫男六應椿應桂應松應杓應雄應樞以至正三年正月六日葬于烏程永新郷大舍降塢之原傳曰施嬙女衣褐天下稱妍貫諸赤手天下稱勇士之美者又豈籍區區爵位耶吾觀樂閒先生者是已先生郤仕而問為孝子為義士其卒也不應銘法歟銘曰孝為則兮義不頗仕則少兮德則多先生之樂兮陰陽爭知先生之則兮爭紀於瀆與河南之潯可竭金之岡兮可陂我銘其人兮不可磨元故用軒先生墓誌銘番有隐君子爲用軒韓先生先生役十年所其嗣先璧即充彛尚啣哀弗置走余錢唐次舍拜有請曰先生生有輔世忠訖不得禄位以亂片言觭行有幾古人死又不得文而可可傳者銘是與草亡木卒等不孝孤罪益甚吾子婁銘德人義士賢公卿先子世次言行具在歳志吾子哀而賜之銘非真不孝孤貫罪先世世逺有耀已余嘗觀扼圖志見有宋韓左廂者以進士起身由臨安令以嚴明陞臨安府左廂官臨安剽民財者白擎子間公至皆屏迹謡曰韓廂明無擎白韓廂死白擎未嘗不起慕其人問元壁曰即先生五世祖也按家乗韓為番著姓其先南陽人唐末徙徽之黄㻻復遷饒之樂平歷宋擢科者代不乏絶靖康間諱屏者中武舉尋自恥悔再㳺太學登文弟官至臨安左廂者即治白擎者也諱仲尨丞相趙忠定公之壻以詩五中待補者先生之祖也諱如璋遭宋革隐居讀書於里之北山號菜山先生者先生之考也先生諱思恭字德用學者尊之曰用軒克生先生㓜不習羣弄蚤悟書數學長負器備好善惡惡甚邑鳬里有不平事掀髯一言折于稠衆中衰者屈鬱者吐氣或為非義惟恐先生聞之若畏王彦方者邑大夫史公夢龍豪傑士也事先生如師先生嘗語之曰土敞不藩水煩者魚不育守令者民之土水也又白廉而不諒直而不決糊塗皂白以從事其敝甚跖吏公書其言子座右訟有不決者馳状質先生憑一言舉置為曲直饒有貢國初以大姓督陶先生嘗領其事有獻榮者某室之墓在陶某田之畔在沃即依榮毁室廬壊溝計百十家立待先生不從曰損民利國非國福矧利有誣民乎既而室若田者或來謝復拒之水旱疾疫必露香籲天為衆告急告必有應歳飢率有力者食餓至藥病掩骼自奉薄甚碩師教子弟歳金節弊窮窮惟恐後事親至孝妣李孺人没水漿不入口者三日因致重疾菜山公年垂八袠晚多病侍藥膳不少懈病革不交睫至搯掌代痛居喪一遵朱氏禮喪祭之具獨任不以綴伯仲氏配曰程夫人同里程剛愍公孫女也克相無違先生資以修于家先生卒子男四璧璠璿女二壻為王恭簡公孫與善王知録孫惟澤先生生于宋咸淳丙寅六月二十有八日没于今至順壬申七月八日享年六十又七先是里之石龍岡有龜蛇交集勢秀峯離列下走兩阜為陂陀若雙蚌然兩源挾蜯出循龜蛇而東去龜之有二石筍若相距尋丈間術青烏者以為古人宅兆也先生嘉之嘗挾筞止此語元璧曰吾百歳後必藏此於是八月某日葬于龍岡之觜用治命曰吾聞士有隱德者必享其榮以及其子孫先生德人也享榮不于身使不禄位以没荷其及者不在後之人乎元璧清明好學有仕才吾見左廂氏之重榮可必也銘曰龍支之兮為蛇為龜叶鳩龜之筍兮相捔相繆下走隻蜂兮兩源挾流小鍾草石兮大鍾俊髦德之人兮悶于丘故張君子墓銘吳人張天祥既克葬先孝君被服斬絰謁予門拜有請曰吾子以文章銘世之賢公卿善人先孝君雖賤雅亡惡吳之人識不識咸稱曰君子人見先世多繇進士起幸子立一言信者惇史非直不肖孤幸先世世逺有耀已世次言行謹偹壻馬良状余至蘓讀蘇郡乗知張吳顧陸為四顯姓而張氏蔓衍為獨盛今又聞其後有君子人者張氏之澤曷其逺也㢤按良状君諱必成字舜卿曽大父廵大父浩父愷俱隐德不仕其先自晋廣州刺史彭祖後于姓至宋齊彌昌遂為吳大家遂前朝登皇祐進士第者僑僑後顔顔後敏功敏功後攀四世皆第進士君攀八世孫也生至正乙酉八月十七日卒至正戊子正月八日年六十有四配陳氏子男三嫡天祥天徳庶天祐女三人長適馬良仲適程可大季適曹維宋仲適出也孫男女八人人卒之年二月三月十日葬長洲縣武丘鄉靈夀南之原君生不好㺯長簡厚甚年十四喪父哀如四禮養母以孝聞事其伯氏若父既冦娶自立盡讓田廬諸兄旁建宅一區客亭師舍靡不完好外養市徒埋生産日當畜蔵必推其羡以及人弗悋兒婦人諫止則日積弗散不有天灾有人禍緩急扣門者應如不及佛老家榮大士未亦樂予之惟不樂貲遣子孫習吏術尋仕階以為棄今誤人之仕寕弃道路吾非不欲仕也仕而弗利人人覆我病不若不仕兩忘失云平居氣貌和霽扵物無忤雖家人妾僕未嘗識其病疾聲怒色有以横逆加之必自反久之其人意自消晩年病痿痺弗接人事誡諸子曰予少自奪鍳延方伎士郤病而病速施財非鬼覬福報報邈如惟寡欲迺大藥擇師傅教子孫乃樹福本若輩識之故三子有仕才類弗奸禄天祥且維志築書樓購未見典籍蔵之厚禮碩師以淑子姪及里中兒君聞其為喜曰天祥為吾所未及為非生孝乎吾雖卧為廢人無憾又諸誡子誓弗以婦言分異書田氏荆本事視曰無知如木尚識所托况人乎若輩思之罔隊吾訓吾門其大矣其言確乎應君子之教且過未嘗弗知知未嘗復為君子之仁也吾聞古者有諸侯大夫之位雖無德稱君子稱其位也有諸侯大夫之德雖無位君子稱其德也一介之賤稱君子法不當得銘乎銘曰位振人德振身振人者民㱕之而尊弗親振身者天下歸仁日以尊親無羣君子哉若人視予銘詩詩可信蔣生元家銘生名元字亨之吴興安化鄉陳瀆里人也祖慶先主簿必直父宣政院掾克明先生質機警五歳入小學日誦書數千言十歳善屬文二十學明經義試有目不競輒自忿曰吾學經無師説吾黜宜也乃歸告其父曰會稽楊先生某東南㖟經之師吾將不逺千里執摯而北面之父憂其素病羸止之曰天其蔣門之幸先生從吾聘汝學可已不頃犇走千里學未可望而我憂先為汝學之成不成卜于先生之來不來也予嘉其又子心往焉時至正四年十一月某日也閲三年元學成蔣氏之族咸相慶曰元以先生之來不來卜學之成不成某等又以元之成卜蔣氏之盛衰焉元成矣先生之賜不㣲矣蔣氏之慶長矣嗚呼又豈科元學成而娶娶而即死乎始余至元家元婦家催元娶速予語其父曰元娶學無成理遲吾業可授父力卻婦家娶期期三年而通媾元得卒學婦家申娶期適相者又言曰元娶早早亡娶遲十年可免爾元父弗信娶焉娶未月而元病未期而元死矣於戯相者之言其得天歟得人歟元學吾春秋者也春秋之法以人合天不以天任天元之卒受教予其以人合天歟其取而即死抑以天任天者歟嗚呼人歟天歟吾不得而知之矣元生于泰定元年四月二十七日死至正七年八月初六日也閱二十日無赴又閲二十日夜夢元衣其所常服來拜曰元死矣元幸遵先生教不娶而學僅有成不幸而符相者言急娶而速死也吾父兄将以某月某日葬元車注之原元學于先生無毫毛表世死無先生一言以表吾埋土吾其迄與黄土同腐乎予聞其言怛而警亟諾之明旦有叩門者乃蔣氏伻赴也予為之哭慟遂俾學子呉毅書其志復銘曰生以人得天死不得天以人吁嗟元乎睿而病而厪未宦而昏力天厥身人耶吾不知其所因華亭縣主簿王佳母夫人李氏墓誌銘華亭縣主簿王佳母夫人李氏名淑貞處州教授某之女教授君博極羣書而傳業在其女嘗曰吾女心嫁竒士年既算適同郡遂曷邑西平王氏廸功君之子進洪洪負卓越才以青年逰京師華衣奴馬從名貴之逰得逰徼官于湖西鬱林州未幾没官所時夫人年方艾鞠飬三子長學次佳次海擇以傳就學學回必親試其所誦書探其課對工拙為賞罸故三子克有成立天人之教也至正戊戍鄉民乗亂為椎理剽􅐁夫人挈奴屬辟地松陽之眷家所長子學死於兵故廬燬于火夫人憂悸成疾辛丑冬十二月卒于眷家所明年春藁葬遂昌月山之麓龍鳳乙已江表呉王延攬英俊凡鉅室子弟有竒才者不次登用丙午秋佳在選中丁未春授官華亭縣主簿明年冬始獲歸葬于先塋西亭之原先逺日佳以其友葉徴所著行状來乞銘予客華亭親見佳健于趣辦浚蘇河領夫丁若干萬無失所慢役者漕粮四十餘萬至京城無後期繼漕麥五十餘萬淞参以澇失獲折銀估大家藉其稱貸鉅豪濟所急佐邑長聴獄訟先燭其欺後翦其蔓民自以為無冤滯得佐邑循吏稱岂非母夫人之教澤耶故樂扄之銘曰婦艾矢夫子㓜失父婦訖完其節子訖以才舉焚黄薦哀亦榮爾母我銘不已爰示來後叶户王母李氏墓誌銘江陰王孝子作逢去其母逝已十餘年猶作嬰兒謁于會稽楊維楨曰逢藉有立母教也傳見野史沈蒙氏未得名能文如韓愈氏者誌親逝不得韓公銘不孝今以屬先生先生幸哀而賜之銘辭不獲按扶夫人姓李氏諱靖真宋獄同郡潤之女杭庫使王惠之妻生子一即逢也庫使君善律已起身憲漕果遷至永豐縣暮致事杭庫副使初始徐氏庫使君之為人求可與齊者姻里皆賢李舊族教子女不違古訓求偶莫李氏若妁告宜算五年歸于王婦道甚飭庫使君在吳時李侍姑就養姑清閱一紀若一日舉族唶以為難其訓子嚴有法日給膏燭誦書約丙夜止或逾約輟誦至旦罸餘食就外傳之䞇師物躬紡績以資之且多市古竒書廣其聞見逢齒壮所還往皆海内一時名俊隂自懌曰兒不負我矣天厤飢民相引䑕偷率女奴夜績更寝盗不敢闕巷以為之歌曰東家辟纑西家穿窬其内治類此至正五年秋八月三日疾卒于天官下夀五十九逢䕶櫬旋葬黄山原逢齒今四十以才諝顯東州諸侯争欲致門下浙憲使舉丘園俱不就風節益烈焉君氏稱王母氏有子矣是可銘銘曰于以母教者臧母以子留者背長益後歐陽歐陽謝句嘻句以王先生自註曰以字旌也不可作助語辭故鄒元銘妻金氏墓碣銘吳常熟鄒元銘之妻金氏諱玉字孟姬寕國路旌徳縣稅務大使辟之冢婦衛路輝管氏長官司總管謙之長女廣德路道録善信之孫漳州路龍與縣尹煥之曾孫也姬從㓜慧齊性孝謹日在父母傍不忍頃刻離去撫婢御未嘗見迕氣其織紝組紃及音律書算皆不習而工有過人者諷詩書即通大義讀烈女傳見有孝于親事舅姑盡苦節者必識之信踐之及歸鄒氏執職如禮甚育子若女自襁褓有法相其夫急人以義睦婣任恤無不適宜焉舅姑皆稱賢無間言然慕父母未嘗一日替傢凡十歳三㱕寕及辭去戚戚如初嫁時今年遂以歸寕終父母家訃聞夫族齊望門哭曰某婦死無以成吾鄒氏家矣得年僅二十有七生于至治辛酉十二月初五日卒於至正丁亥三月二十五日女一人升奴男一人夀童元銘卜是年四月初一日祔于武丘鄉半塘祖塋之原閲十日來請銘余住吳久之聞沙湖金氏為有禮法之家往往所適女多賢行都人士之詩曰彼君子女謂之尹吉尹吉者周大族有禮法之家也女有君子行必推自尹吉孟姬出大家而閑于禮法如此謂尹吉女非歟尹吉女為詩人所著而予為銘詩著孟姬閔其令質不永年使名氏有傳豈過乎銘曰梓共而秀而天抱株驥墮地走而躓中途彼惡終天齡跛運長衢吾壹不知其所如嗟嗟乎孟女宜鄒大家孰長短扵短之不足而長有餘誦我銘詩不人誣東維子文集卷之二十五

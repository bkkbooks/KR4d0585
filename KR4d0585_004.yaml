body:
  text: 會稽鐵崖楊維楨廉夫著序送張從德之湘鄉州判序保定張君從德自其先僑居吳中有年矣君以門廕初倅漂陽再轉諸暨皆以憂不赴制閲倅湘鄉其行也吳士大夫悉知其世德與其為人先大夫省齋公博極經史勵志立行官登三品秩名實布于中外君蚤學不倦晚志操愈髙為克紹所基者故皆樂為歌詩以餞之而屬余有以序諸顛豫聞而喜之曰自昔寓公子弟之居吳者類以馳馬走狗擊踘博戲為事否則甘色嗜聲淫寄豭而亡其歸先人之業蕩然矣豈復有以學為事志操為先者及其廕仕也鮮克其任而斬其世澤者有矣吾嘗親視張君在貧賤而有休色於富貴則不無戚然者非有學者能爾乎夫行潔則可以聞道志一則可以立功道聞而功立豈直倅一州而可哉湘鄉古熊湘之屬邑也地有三江五湖之壯且險其民往往湍悍難治而其士也則清而文為可善也國初以其户齒之繁而升州君倅于彼以吾所謂聞道立㓛者理之吾未見湍得之難治而且見清文之易為化也况省齊公平日治道之講者君聞之稔矣豈得悖吾言哉於君之行遂書焉敘而吳人士之詩係于后云至正七年秋八月十有八日送錢伯舉衢州録頖序國家懲前朝守令顓城之弊止設監長次及副二並出制命又非異時私辟使有主客勢嘻顓弊去矣不知窮州下邑民日貧户日耗聚羣行吏待之又弗免十羊九牧之撓唯郊關之內㕓處之民領之者曰録司司設官堇二爾官弗冗事亦釐録判者雖秩卑員未職下旁于逰徼而一司之政得彼此待可不議短長録監守行弗率頖所守貞所出直而達遂為民儀嚮類覆上監守嘻官豈可以崇卑正副計哉吳中錢君伯舉以故家台州通守之津屢試仕管庫民休戚情悉矣吏成敗事諗矣今登秩為衢頖官伯舉年益增學益增學益優又以其熱民情吏事者佐理千録吾見衢之民慶其來之莫矣况衢之君子類好文墨而敏於義事市人出郭而娭登前山臨背水飄飄然有神仙之思其習嚚姦者寡矣苐未知監與守與伯舉同志乎不也果同焉吾將慶伯舉之佐理益易易也豈曰録頖顓職遊徼而止哉伯舉勉之以徵吾言可也至正七年秋九月𥘉吉送王茂實慈利州同知序談州縣職者以同知比縣之氶上監守長焉下通倅李焉同知者得便文自營其中故勢權劣訾詬輕黠胥姦民率制之者寡矣其人之悅崖撿者往往樂居之嘻此豈國家肇建守佐之意哉守令之選其淆也久矣同知其事者苟能以吾民為念一貞其身而左右後前靡不正未有不行乎顧行而推利下人者也發政施令覆出監守上固不得以地為限矣昆昜王公茂實簽者齋公之孫也初承世澤為下砂今考滿轉同知慈利州所與逰者咸為之慶以其驟加秩三等為優又不居守將責望之地而在其二焉可以便文自營矣豈不優甚哉余嘗交茂實吳中知其志甚遠每每悼民窮疾官敗則知茂實之材將有為於時而伉其宫不以同知為逭貴地喜也吾所論同知發政施令覆出監守上者將於茂實焉徴之抑吾間慈利乃赤松隱遁之鄉其山多隱君子以詞章出仕者有騷人之遺風焉故為慈利者甚易易吾見茂實之得治民早而其退之暇又得水山之樂於騷人羽客之儔也是則茂實之優者巳於其行也豫既與客崇酒以別之潤餘賦詩者若干首而遂以余言為敘引云至正七年秋九月序送蘆􅅹巡檢范生序反生白子昭為余言欒城范生廉卿之為人欒風堅忍隱厚其人廉節而好禮貞信而少文廉卿本其風之微而習經術于南中儒先生術成無所於試乃俯就門廕官巡檢蘆􅅹亷卿雅士巡檢引弓民長也以雅士長引弓職大盩若才今佩武器雍邏士領職其所與遊者則既為慷慨歌詩相與張飲西津重徼一言以序其去余既聞亷卿雅士而樂之及聞職蘆􅅹則不寧盩才之愳蘆􅅹鹽榷之司在焉鹽萌依私榷為命雖流死此交迹不以屬心右令巡榷官一失其覺分其罪罪官不幸再三失小輟祿大貶爵而其夫或逺出所邏外波聫蔓牽莫之雪白漕府猜禍吏聚櫝如牛腰明漕長不曲直即有曲直吏輒以律雌黃其明嗟乎榷之逮不辜法端使然哉故余於廉卿之巡檢蘆􅅹不寧盩才之愳也雖然國家于鹺病之劇方議更而新之求天下之善言鹽策者是諏是採廉鄉試以其得於所學者為採風者言之使法不逮不辜余之愳也庶幾其或免矣夫送郭公知事還湖州序杭江以南望郡也在宋為行都今為行垣所郡治領州一縣八録事司四其俗具五氏而不一其民習􅏥爭巧偷而不和厚故姦伏易乘獄市滋起吏重應上取下什百于它郡非長以能材佐以良幹之屬捷應辨工發擲者不能得治名乃者總管某去經厯某又去兩知事坐不任廢府事麻沸狼籍無與理者推今湖州知事河中郭公仲敏以佐治令聞徹省府相君簡識其人而傷杭治之難無與承之者乃特移職于兹知事位在經厯下其識贊三尺平以左右二千石者也公至則既鞚轄屬曹而裁決豫奪實又兼二千石之職時未期月而府事僨者起滯者疏破者輔又牙齟齬者無不妥帖順易相府而下察憲漕所疾呼急諾又罔不周旋如意於是攝職稱治民歡然誦之為良幹官今復政而去也杭官吏相與張飲西亭以餞而乞餞言於維楨維禎念民無賴於吏久矣以吏苟於公而急於私而已矣有能移其私於友與親者鮮矣矧能移其私于官乎能物其官於本位者鮮矣矧又能物其官於他之位乎故維楨聞杭吏無治狀至於廢而去未嘗不悲其才之窮及聞杭人談郭公之政又未嘗不嘆其才微而無私之治足及人之廣如此也李經厯治績序經厯古郡功曹之官功曹太守所自辟也經厯今出吏部選用七品印章奏三尺平鞚吏牘進退上以齊二千石長吏之異同而下以內群書佐于成執此其體益隆而責亦重矣朝廷慎其選與守令同以廉明者有操尚者居之故郡不得良二千石幸而得一良經厯郡可治徽州路經厯李君其代滿歸廬陵其從子出其郡人士所書治迹求余文敘以送之豫惟李君之政班班可書徽人士侈紀載者皆能之抑今之稱良經厯者蓋末有君之職其職也君之簡訟詞草濫卒吏未足稱良于經厯也平質劑于市明爰書于獄盡委輸之法而州縣之官便安之朱足稱良于經厯也惟其政有弗正于上必務引其人去弗正以就正如曲木之就繩悍馬之就馭吁此真良經厯矣余聞徽之羾金也歲監官取其羡為已有君還羡於民以準他歲羾之數徽之祿廩也留不足而取諸山山不毛則白取諸佃君故實入而蠲白取為久久定則鄉之宿豪餌官府為姦也抑之不得行土胥相為根柢持短長於官也格之無所置手足所謂土之異同有所齊而下之成軌有所內經厯至此信可以稱良也余閲郡經厯凡若干人往往陷於隨而不立未見職職如李君者其能已于言乎故為約其政件言之且視人以吏師非徒紀載也送海鹽知州賈公秩滿序天下公論不在公府而恆在閭巷之民若甚愚而是非之心則甚白也邦大夫之政其失者議於市謗於道而其善者亦嘖嘖不容口故欲稽守令善惡不察守令而察閭巷之言得之矣余過海鹽田間往往逢伯格長頌其州太守之治問守為誰則宛丘賈八禧也余已心賢之未幾州人土張玉集其餞行歌詩凡若干首來請曰自海鹽升州置守其得民譽來有若今霣公之最者也曩時廉吏郡形迹仇視吾大姓家訟多不獲其乎公廉無嫌是避即理真大姓必舉即不直雖貧弱誅不少借故獄者積歲不決者部使者多以屬公而得其平亭吏罷軟者撓察佐庸闒者蔽吏胥雖令出無私有不能以直遂者公一施令群佐虔若卑苐生之聽嚴傅老胥順流其風旨又肅然若家老之奉其尊行之以正限之以信故令有司可于上而惠無不逮於下也先是吏卒巡田里如蟻不絶公至立削迹上府聞之因檢戒左右無姦州以其非令者又州民與亭族交其習蜂馬焉易生事公申以條教悉改心歸化無異時剽輕之風此其得譽於民而布之州府士之詠歌實有徴焉幸子一言敘詩首余以其言與其伯格長之頌合又以今之為守令者往往課米鹽奉期會不復知有伸民情消民隱􅈤􅈤然以厚民成俗為事者遂樂為之敘以風告他吏云送監郡觀閭公秩滿序劉子曰忠孝不修他善無取吁臣子之職無他忠與孝而已耳韓非子曰親之孝子君之背臣吁忠孝固不能兩美也今有人焉於子不為悖而於臣不為背也豈非臣子之全美乎吾於錢唐守將見之者閭公是已公下車以來先問民利害伙戚而務去其害與戚者郡有猜禍吏與夫強宗世家不仁於人必痛鉏治之猶之牧羊去其害群而群始蕃猶之理疾劀殺其病本而病始平民之怙法者必刑詿誤者必思出之即不出如梗在咽必吐乃巳此公理法也紅巾賊陷杭凡扞城守土之臣不微遁即賣降爾公獨佐監憲某官監兵某官與賊持者十有三日帖危于矢石數四城池破毁而復完者公之雄謀大莭作於人者矣時則髙堂太夫人屏居密所公猶衷戎衣朝夕覲如平時不貽其親有一日憂故出不稱背臣入不稱悖子吁若公之忠之孝吾所謂臣子之美非歟今代而去郡之民如去其父僚吏如去其師去之日民父老若千人走豫次舍謁父志去思又持其謡送之卷請序以為郭西門供帳豫親見公之忠孝治狀有為世道勸者於是乎書至正十四年六月三日送旌德縣監亦憐真公秩滿序國朝監官郡邑咸設達魯赤於宫屬為最長其次有令有丞有簿尉久有案牘官以首領夫六曹之吏凡事會之來吏與令丞得相可否議論然後白之達魯赤其署事也亦然其職秩為甚尊而職任為甚優朝家近令以大事責守令達魯赤任與令等昔之尊而優者令轉煩劇矣宣之旌德縣亦憐真公始由省署而典符印纍監望縣三調至於今職且四載宣上德以及民而使民無愁嘆之聲山林草澤咸知向化大府藉之以集事同寅恃之以取則民有所賴而不恐史有所憚而不肆大事之備固無可議而於學校尤加之意焉延師儒廣生徒月書季考凡邑之人士咸囿於教養樂育中弦誦之聲相聞是又知所本矣往年淮寇渡江列城殘毁延及旌德而公首奮忠勇尅復之百里之命於兹有寄是以兼資文武而才足以有為者也今年夏政成上考余學徒馬某職教于縣承公勉勵作興之力於其行也求余文以贈馬生之言有信於是乎書使他日之史館傳循吏者有所采云至正十三年九月草有四日王學録秩滿序至正八年夏四月平江學録王君達卿書滿去自教授而下洎郡之大夫士與君經遊者咸詩賦歌以錢而屬豫為首敘豫方遊於蘇視蘇學之廢也甚矣提學者非不薄責教也而教無以教鈞稽養也而養非所養郡膠庠之大句覆不如一齊民之家熟有程有則也幸而官於是事有憂而有為焉學之祿王君是也蓋王君有孝有行人也曩之養非材者王君有以去之材失養者王君有以引之養之非其斆斆之非其術者王君又有以糾而正之它人日從其失王君日修其勤故蘇學之廢而稍正伊王君是賴於是壬之議者曰學校不得良校官得一録足以興教猶之郡不得良二十石得一録亦足以興治也以王君之克官于祿若是則積階為郡幕官不能佐治于二千石者吾弗信也雖然以王君之學愈修行愈力志愈逺大也又豈藉一文學之掾積為資級而起哉君應進士舉余嘗視君大易之義矣深微而潔淨又嘗視其賦也麗而則其代言也溫潤而簡古連不幸未售主司則主司之未明也一遇明主司君之未售者售矣售則道山壁水其選也尚暇為人司二十石吏牘之榮哉嘻哲之久者伸必逺懷之大者發必洪吾言有侯於君矣送徐州路總管雷侯序至正八年夏天子以徐州之域風氣悍徑固以飢饉多寇盜民困于昏墊八年遂統有四州七縣之境為會府一時僚吏艱厥選守長為尤艱于是海道都漕府萬户雷公某以首選為總管陛見其人申之以丁寧訓戒而後往嗚呼以徐州為中原創府當公為其開府守將非其人之才賢負宿望一時且簡在上心者曷當此哉余聞雷公之為隸州也棣寇盜之衝厯能守若千人無以為禦公不持善禦具有以化遣之至今棣人稱雷防禦嘖不去口其師于海漕而去者多直魚龍之淵剽盜之巢藪人銷舶解公起漕凡一百八十萬不十日每湊直沽道鯨濤如坦途萊無升合遺若公者可稱朝廷幹臣無負上選任者矣吁以棣州之化道海之庸惟而大之於徐州也其有不稱重選畣上訓旨者乎雖然吾方有感於地氣之王衰者矣楚為古要荒蔡放之所逮今為衣冠玉帛之鄉徐豫為中土而鞠為􅋄莾者十六七一邑生齒有弗敵江以南一旅之聚民望南而流如水之欲東司牧者弗能禁也今二千石以地闢户羡為著今公之為徐州也治最對著今吾見中土之富庶與今吳楚地同又豈憂赤子弄兵者本末止哉公尚以余言勉之徐州之人日夜望之是年九月之三日吳人士咸賦歌詩以餞而會稽楊某為之序送平江路推官馮君序平江路推官許下馮君秩滿蘇父老留不可則相與述為歌謡以送之求豫言登載其所善以為之序豫客蘇未久不識其所善詢之父老則曰由東嘉經厯治最任高等升任刑官于蘇蘇煩劇郡也獄訟繁與姦偽百方出上遊之署有行丞相府監漕官都水使司海道都司或所為政不直則賣直者乃聲于上受謗責在須臾間而况二推者闕君獨任大府獄事其視犴獄常欲為陷死者求生路惟恐失附十律成案具吏多受獄貨欺情偽於君者在署審成案未察退參所疑於父老賓客故月朔作鄉約於父老賓客使之過有以告君之於刑官敬事類此豫曰獄者天下之大命也推官又命死生決也何可以不之敬乎孔子於言偃之宰首以得人為問欲其資於人者施于首政也矧獄之不自用而審取諸人以為明者乎明智如皋陶淑問如臯陶之疑猶有資于神羊之所決者馮君任推訊而能取諸人以裕諸已忠信清明見諸歌謡不必資於神物以為聰則馮君不賢於臯陶已乎夫臯陶舉而不仁者逺馮君舉而在髙位吾見其民之有賴其仁者矣故書至正八年冬十月送理問所知事馬公序行中書省古之蕃國力伯連率之寄也地大任重故其法揆嚴體統峻宣布政條于百司庶府惟大綱是張是主凡細之務不至于執政之堂乃署理問所于恆內若法曹議府焉所以發姦伏伸抑在平允治法也官其所者非才且賢莫勝其任而幕府之員又議法之所起也東平馬公某為江浙行省理問所幕府官剛毅有為善持法才每詳刑決政上其議於相府六曹莫不韙之而百司庶府仰之以為凖由是知所官之才且賢又莫急於幕府員之才且賢也豫唶代之居髙位享厚祿者車多世勛中貢之曹奴隸其部屬牛羊其人民以好惡決是非以喜怒行賞罰願指奔走孰敢少拂其情為其部屬而又執筆居幕府員獨能持議不屈與巍巍赫赫者相抗而求歸於口是若焉公者豫所謂才且賢者非歟公之所以持平曹取重政府者決非聲音笑貌之所得也蓋公自公卿子弟練習朝章起身憲府吏為大郡從事遂以廉能擢相府掾由掾為今職其能明庶事決大議者可知已秩滿上名春官明天子方急法則之臣以理天下之幽枉必有以處之矣于其行也敘以為別送馬彥逺旌德教諭序百里之治有長長選於吏部而承命於天子百里之教有師師選於學而承檄於丞相洹師若輕於長然長不教民無以為治教民必使專出於師則師之道實甚重于長也故師道尊者百里之長禮之為賓不敢以勢上之吁主百里之教者其可自待之微乎錢唐馬生彥逺由明經舉為儒之官初去為晉陵縣教師人以彥逺才德受貢于鄉大夫宜逹于天子以為通都大邑之吏而低徊偃蹇為教師於十室之邑疑其自視有悶然者又豈知縣教師之保有重于縣長者乎吾聞旌德山水邑也地不肥沃而多出秀民昔之擢高科為大儒者往往有焉今厯歲大比者凡十數而士未有占貢籍者豈人才之異於昔哉亦職教者亡狀之過也彥逺居家者于親與朋友交信義自立而講藝于晉陵者皆聖賢之遺者當世之要務也今去為旌德師以其修於家者與其人之孝悌忠信以其講于道者作其人之經濟才略吾見旌德之士以行藝歌鹿鳴而來者皆推言其自於教師則彥逺之道行有以佐一邑之治矣有何計百里之吏窮卑彼此哉况彥逺道益大聞益彰其躐峻資取高位與通都大邑之吏祖頡頏特跬步地耳十室之邑果足以又稽彥逺乎長旌德者亦憐公楊實公皆石文以為治也必以豫言為然送孔漢臣之邵武經厯序國法楨守令之職號曰選用幕而元僚亦不委之鈐專常格以其司守令出內之喉舌也今天子既申明守令之制而尤重幕元僚之選選必以廉靖有風才者居之雖閩蜀二廣去天萬里逺三歲必遺使者抵其方面用天子命以署置其官慎選守令與其幕元僚同一中書吏部之嚴也奔競者往往爭入其選以利轉階之速而不知司選者其如此才而賢者升而不才不賢者其黜多矣襄國公孔君漢臣始由胄監伴讀出從事徽州丞相府聞其賢也辟為屬掾年勞滿而司閩選者有署為經厯邵武蓋孔君之廉足以寡欲知足以察微剛而易以鬪故以武名然小人勇於惡君子亦勇於為善也君先聖之五十四代孫也胄監之秀也丞相府之素推擇也推其善以及君子而化覃於小人吾見邵武咸以道義相高而人人有鄒魯之風不必擊斷􅋧猛以成二千石之理者非君而孰與于此乎君往哉母從謂入官逺徼利而轉階之速云邇其行也取道吳淞之士咸為歌詩以餞而余適會于其鄉人張彥明所且介彥明徴余序故序之卷首云至正九年四月四日送江浙都府吏倪光大如京師序自成周選士之法廢士有逸而他出焉者吏道滯於儒者目吏為俗流於吏者目儒為迂二者始相兵而不相謀矣漢唐士有起自書佐卒吏至名宰相如曹蕭輩者固不可望十一于千百且以今吏言之例限七品秩復開以四品而不次登顯融者往往列八位而不斟也若者起恪守陳編刻畫章句執一自用不達時宜其於修身齊家治國平天下之道非講之不詳一旦在官顛倒悖亂全與道戾故由科苐取官者其政績不能不愈于史櫝起身者則亦有愧于古之士矣然吾亦有惑於今之吏者揣摩狙伺深詆巧文力制長牧氣壓豪􅡦稱為能吏苟偷刻薄恃以為治具而欲望其國理民安是亦知行而求前矣虎林倪君光大蚤年讀經史欲由儒進志伸弗遂試吏于江浙都府周行推之為儒史栁子厚曰士之習吏恆病于少文故給而少文不肆飾於華者人病於無斷故放而不制倪君以術飾吏治吾知其給而能肆放而能制者也况其事七十之親以孝聞友明友以信自任夫孝與信忠君愛民之所出也君推之於吏治以日涉穹位食祿上列八位以任國家之大事非君誰望哉又豈得與州邑俗吏循資格為進級者同日語哉今赴京師上計錢糧事來列子吳門而吳之士君子又為詩以壯其行且推于為序遂引于卷首若此時見豫望光大者逺云至正八年十月甲子序東維子文集卷之四

front:
  text: 東維子文集卷之十六記
  hash: sha256:4ef98b9ff577e055681056fac29af3203736d24d6e7813d1f2b183957365ad89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_016-1a}
body:
  text: 養浩齋記淞之南陸氏代為衣冠望族有佳公子彥章者生而有氣節讀孟子書至養之論深有概於心輒自命其齋曰養浩介其友郁彥學來見余璜溪次舍求一言為志豫竒其人而為之言曰戰國之士以氣雄者多矣而未有言浩然者獨孟子言之其氣即天地之氣也善養之則吾之氣也至大至剛可塞乎天地其視北宫孟舍之役於氣者僅匹夫之雄耳孟子之言是氣也卒然遇之王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨蓋有不依形而立不恃力而行可以參天地而關盛衰者吁此聖人之能事也閲三百餘年人又疑其言之夸而彥章氏首信彥之章不敢暴是氣而又得其氣養也故能處富貴而不淫居患難而不攝則彥章氏之用是氣又豈北宫孟舍之雄匹夫者可以同日論哉養之充也無一日之餒雖聖人之能事不為難彥章聞豫言而喜曰大吾養浩者先生之言也請書諸室為記且有以告人之疑吾夸者云書聲齋記余客淞遊亭林尋所謂野王讀書臺者已夷為遂隴化為草棘去臺之西北十里近為璜溪溪有義門夏士文氏歲聘文行之儒為子弟師六籍子史下及百氏之書凡數千卷皆架插下頓為廡西之齋童冠鴈次蚤夜諷誦聲徹行路因名其齋曰書聲而求志於豫余聞魯恭王入孔子宫聞金石聲而宫不壞漢髙皇過魯聞絃歌不廢而邑不殘書之聲感人也如此孔子之武城莞爾絃歌亦為子遊喜夏氏書聲聞于承平之日未為竒也而聞于兵戈格鬪之頃非一家之曲阜歟吾為吾道在東之廢慶已雖然士之讀書也內以治身外以治人沈潛其中之所得以究觀道德之微性命之咨以極夫禮樂教化之著胥於書乎出也豈直務聲而已哉不然誦習之日積極詠之弗知則其書之有聲聲於出口入耳者雖土於洛生之詠吾無取乎爾矣士文尚以余告勉諸弟子師師以余言勉諸弟子云至正庚子秋八月初吉記著存精舍記璜溪吕孝子曰恆曰恂葬其考君來德公于溧水之原治冢域如法冢前甃文石壇及隧道樹以椿桂栝柏又並冢為精舍以奉春秋祭祀祀必親眂牲器不以屬人俯仰齋慓如親見其先之享者雖歲月去逺為之悲慕不已名其舍曰著存參政周公琦為篆諸扁以記請於余世宜墓祭非古然孔子冢孔里魯子孫世祠其冢不廢則墓祭有其所祖自廟制廢而上冢之禮重乎漢人史傳書以為孝子之榮近代卿大夫官擬王者而祖禰神明之舍則漫不加意至有即宦上以為家遂棄墳墓千里外過家上冢者亦罕矣淫昏之思則祀之如其先不以為怪烏乎俗之壞而士大夫之不振若是幸有神位主於冢舍時節不失其所祀援古祭義致愛致慤以存著其所不忘如吕氏兄弟者蓋寡矣又懼其易世而著存者替籍恆産以垂其規於逺久俾勿壞豈非世教民彝之在猶有所繫哉是冥著存之可書而吕氏兄弟之事可為録也豫方提學傳司禮之廢者將與士大夫講行之吕氏兄弟嘗從豫學者也尚以豫言力返廟制使四方觀禮者於吕氏乎取法而士大夫之復禮者自吕氏始豈非豫之所望乎至正庚子正月八日記西雲樓記雲間李氏以而雲銘其讀書樓求志于豫豫爾家騎鯨公夢長庚而生長庚西方白虎七宿也故名白字太白太白以星言今不以星而雲言何也則亦有説在易之小畜曰密雲不雨自我西郊彖曰密雲不雨尚往也自我西郊施未行也雲之積不厚不足以澤物小畜為卦以風行天上一隂亢五陽所畜既寡施何自而行耶西郊之雲施雖未及於物尚往而不可止也故上九曰既雨既處尚德載物德積而施行如上九之積厚而雨降事業蓋未易量也抑余於天人之事有感於西雲者西雲儒而通天之學者也今太白食昴西方事也天狼獨步東南白虎伏而不動九斿掩旗七將斂手縣弧服矢不敢東向而射者十年豫兹矣妖氛奪奎壁熒惑守井鬼太隂宿室畢之墟太陽食已未之月亦西方事也下民所不忍仰視西雲計何出撫髀嘆曰願以先王之學上從六龍以飛庶有以霈洗天之澍於東南也先生姑俟之至正庚子立春日戊戌記野亭記有詩雲間沈鉉氏世家為郊關之外其聚為溪之上皆壙垠之野于先廬東介披蓁薉蒔花竹集亭四楹中置文竹榻白木几筆床茶竈棋枰書庋雜聚其次峕與一二同志友觴詠其中顔其亭曰野集賢趙公雍為作篆書之又介吾友陳柏謁余七者寮求記豫謂野非直郊外名也聖人嘗以比仲由而又欲從先進之野蓋野而畔教聖人所嫌野而勝華聖人所取鉉之野何居鉉曰某之野郊外之名耳烏知聖人之去取哉雖然聖人論野為質鉉將論野于趣乎趣乎非樂處於壙垠者能知乎唐丞相裴公嘗堂於午橋而名野矣是厭政於朝思野於野豈真知野之趣哉知野之趣莫孟真曜氏魏仲先氏若也鉉不敏將尚友於孟魏氏云豫韙其言又重柏之請録諸亭為記繫之詩曰孟郊得野趣野有真曜廬魏先得野趣野有野堂居雲間沈東氏草衣野夫東屯田可種西壤水可漁門無索祖吏家有種樹書野亭開草樹野具集明徒試問朝市宅傳舍不須臾朝懸奉鐵劵莫死已屬鏤始知野亭野願堂如不如野政堂記淞張中氏海道相門參政公之三葉孫學優而不仕自號一村又顔其所居堂曰野政豫過淞中有請曰唐陳弘嗣嘗歎漢王丹之化行農野舉聖人之言曰是亦為政奚其為為政弘嗣隱居武山歲辟良田時乘平肩輿訪田更餉田畯白露時降新榖既登則崇禮教九族歡鄉黨有偷衣苟食佩刀劍從事乎推埋胠笠者皆恥而弗為弘嗣氏之化蓋亦不小於丹矣豫切慕之故於耕舍扁野政幸先生有以言之豫聞中父仲甫公能以孝友理家而中有克以野政相之君子之談政者豈必被三公服坐政事堂彂號施令然後為政乎政之出於野者覆優於彼之失者告官失官而失士失士而失民遂至於失身其於無葬地也而中之優者無間於昆弟之言無遺於宗族鄉黨之舉委貺于後之嗣而益光于前聞人潔諸執政之失者其相越豈不萬萬乎陳子昻推弘嗣于龎德公鄭子真之流為作者五人之列若中者吾又將問之于五人者非當歟中謝曰吾志弘嗣敢望龎鄭請書諸舍以警云至正二十年二月初吉記尚志齋記有辭孟子曰志者氣之帥也氣之猖狂暴悖人不得而制者唯志足以制之其闒䢆衰退不能自立者亦唯志足以率之故乂曰士尚志士而不尚志其不為猖狂暴悖載而遷闒䢆衰退靡而沒者幾希矣訓詁者曰尚如尚服尚車之尚蓋尊而主之之詞也然人之志有不一也論者以志道德賢人之志上也志功名壯士之志次也志貴富鄙夫之志其下也然則志貴于尚而志不可以卑之而下也夫多岐百出而南車一志之趍也萬物俱流尚金石獨止志之定也志失其趨何以尚為不失其趨然而弗底于定又何以尚為吾北門之外有青年而好學者曰施用和生長市闤不與其習俱而獨從儒先生遊博習文藝修省履行且以尚志名其讀書之齋豫嘗領客邸齋所市聲在門市言在肆而用和秉志弗遷修習于其齋者自如也非其志之不失其趨而底于其定者哉吾知用和之克尚志不卑而下也信矣弟未知賢人壯士之所決何如耳用和曰功名時來則應之人無豫我無取也道德者聖人之能事吾所為志之始而終為者也吾為之交手在額曰懋我用和推是志以往然而不入於聖賢之域則吾不知也用和出紙取識齋遂書為記復繫之辭曰氣易我移匪志曷持道雖我志匪志曷之既持其移卒造其至尚其有大於斯者乎朱氏德厚菴記華亭縣朱涇西其里曰大興有林麓魁然秀北帶乎九山前襟泰川葺泖之流環連璧合鬱蔥之氣不沉不越而物省鍾美朱明仲之祖塋實在焉自大父誠父顯忠祖妣沈氏妣丘氏庶母氏氏皆合葬其所明仲既奉大事子其復立冢舍若干楹捐田若干畝命廬冢者掌之以供歲祀事祠曰昭明昭其物也齋曰肅敬敬其事也又所聖人終逺之訓總命其冢曰德厚尚書公泰不花氏既為篆而顔之而又介豫韓生奕來謁記豫為之喟然曰淞國也無髙陵燥壤為民之終管子陵為之終往往人終其親不諸水火則寄請浮圖氏之室雖衣冠仕族或有不免豈復以先德為念而戎懼於其終與於逺耶間有權力家知治丙舍以為薄俗之惇大抵文有餘而敬不足至閟其珠王華其藏不惟亡益于教句誨人以姦貽神以戮吾不知其為厚也仲明儒者也知聖之教而奉以罔墜終易忽也必慎以存焉逺易絶也必追以屬焉欲報之德矣天罔極吾心以之怵惕以之焄蒿悽愴者皆天也吾心之天不沒于是則吾親亦不沒于是朱氏之慎也追也天於已而持以為訓也天于人朱氏之德吾知其可以惇俗之薄矣抑聞朱氏之先理家以義方為首故每焚香禱天不願子孫富願讀書而賢仲明又喜聚書不逺千里聘顧師教二子雖盡傾橐金弗以計其心可以對其先矣而修德弗倦德益厚而福潭益潤朱氏子孫其有名世者作矣矧其教之力乎立身揚名以圖其孝之大者以報德厚是在朱氏子孫吾未老尚及見之以徴豫言之不誣也已丑春三月記碧雲軒記四明俞南浦氏僑居霅上有才氣而不仕讀書彈于軒一若無心于世者而聞天下之魁人傑士則不逺道里願納交焉其所居軒自號曰碧雲嘗得待制清碧松公所隸古書一紙而又謁豫為之志夫雲天地潤氣也神龍挾之以飛不崇朝可以雨天下然其慘舒消息不恆肖象而變幻者不一如輪如騎如旒如蓋如流水積石如赤舄白鵠蒼龍玉虹之狀萬萬不可究極自其忽而逝倐而還翩然而揚凝然而止則人且目之曰間雲突焉如峰赤焉如大費雷霆之之軀第空林樹之傒望則目之曰旱雲至其引而自髙于風塵之表海島之間非煙非雲作為先怪以動蕩人目則又曰卿雲綵雲三素五色之稱而碧雲者則五色之一耳嘻天下蒼生顒顒焉望之作霖以蘇枯注涸也其於碧雲也何有乎何無不知世有長往志登髙跳逺俯仰今昔或有凝佇所思於交際契潤之間者必于碧雲以見之南浦氏不仕而有髙世之志而又喜交天下之魁人傑士其悠然之意不在是乎抑于聞南浦有道術二十八宿􅏅胸窟者時出而化為麒麟鳳凰蛟龍貔貅狐狸烏雉之物逰戲碧雲光怪中為人談天下之吉凶悔吝聞之者推為神人則知南浦之碧雲非塊然天外物也今之士有食人之食而怠若事惟便利其私圖自冒誅堅穴固而不知天羅及焉又有奮草萊自粥大言亡治狀冒儋圭組以充醢具者其紛起未巳南浦氏見之其亦俾二十八齋飛而語之於碧雲萬仭之下其可也南浦笑而援琴于軒曰吾目且送吾雲矣焉矣焉知許事松月寮記去秀之西門外州里所其聚為濮市濮公子仲溫氏之世居焉居有前後邸第義莊孰以教養里之才子弟仲溫自幼從師學明經既通尚書後學易又從余學春秋兩充鄉試連不售適又丁時變遂去道士冠裳尋山澤間欲挈妻子為鹿門之奉事未遂則闢寮一所植松數章髙秀蒼古若深山木客之出在市㕓仲溫與之俯仰嘯詠若友焉天清氣明月在松嶺仲溫彈獨絃琴松下琴餘讀道書作逰仙吟不知身世在黃㕓市在白玉宫闕也遂以松月道人自號雲間盛懋氏既為圗之而又寄自作松月詩一解於余徴文以為記豫為論積隂之氣者而久者在天為月麗月之清于物之秀者在木為松桃之得於月也清而妖柳之得於月也清而湯梧之得于月也清而棲梅與竹之得于月也清而癯惟清而秀秀而已野者松之得月以此然得松月之得而見諸名人者自唐常建後未聞其人焉建之詩曰松際露徹月清光應為君嘻此建之得於松月者未易與俗人道也去之五百年而仲溫氏復得見之得而其詩有曰丈人夜開關涼月在松頂此其得于松月之得者奚減建也哉嚮使仲溫氏蚤時壅宫或至五年十年即不壅不過汝趨隸惟以奉所氏志不達直而性先有損其及人竟兩泰哦松哦月而有得哉嘻仲溫氏之彼此矣得其有能辨者已書諸寮為記至正十三年七月七日七者寮諸叟記有竹人家記安易韓君諤築室于所居之浴鵝沱上左右皆植竹因顔其室曰有竹人家一時名士大夫咸擇行輩友其人至或載酒酒肴以抵其所吳興趙雍為作小篆之書又為作人家有竹之圖余既賦詩圖之上復遣書再四以記請宋蘇公軾曰不可居無竹無竹令人俗至拄杖尋門尋有竹人家吾不知有竹之家皆能真有其竹而免于俗者不也嘻公之得在竹耳固不計人家之俗不俗之能有不能有也今韓君之家自命曰有竹吾知其能有竹矣一妄庸夫曰有竹居而竹不為有有也吾試詰其所有則謾言曰吾擊竹而歌不啻擊珊瑚也披竹而笑不啻披琅玕也簟筠而卧不啻茵虎豹煮萌而食不翅庖羔豕也嘻有竹如是夫人而能有也吾觀韓君虛中抱道有竹其心貞標絶俗有竹其性善建不拔有竹其本離立不軋有竹其朋德音協鳳凰或思沾霜霜又有其應律之聲格瑞之靈也韓君之有竹若此其亦異乎人之有者乎不然韓君之家與妄庸人者同曰有竹而竹不為其有也雖渭川千畝之富徒以等燕秦之栗林齊魯麻枲而已耳竹有於家家而家又何有於竹哉然則韓君之有竹不徒在其家也諗矣書諸室為記至正十三年九月十二日春逺軒記余曩居會稽于清明之春登秦望蓬萊諸峰望數千里廣輪際海而止一鱗介一條繇與多人士女靚裝麗服生長太平山川間孰有荒陬逺鄙之間因憮嘆春春之逺後計偕上京師得歸逰覽度居庸陟龍虎臺下視齊魯晉宋荆秦吳越之虛民物熙然如在春臺了者無畔岸余後嘆春之尤逺殆與皇元教同一逺也自淮汝兵興南北旌旗相望於千里百里斥候之次給繻而行即抵牆壁恩昔之周四方躋八表窮目視之力弗既者不可得已雖然不逺者提封之迹也一氣為春者豈不逺哉知春一氣之逺則心之有春者未嘗不與之逺也雲間鍾和伯溫築室千山之東麓顔曰春逺請記於余其亦有感於今日之春而不計其地之逺近者歟不然杜少陵嘗言春逺矣何獨於柴荆見之歟是為記至正庚子五月朔旦東維叟書叟者李忠介公榜賜第二甲進士今奉訓大夫江南等處儒學提舉楊維楨也春水船記滄水主人杜年桴于海晚家居結樓滄水之上蓬然若舟海水時抵階下放目樓上一白萬頃人眠其蓬然者一葦耳因命曰春水船主人垂釣于枕濯足于床波與天上下渚鳬汀鴈之相困依不知船在水耶陸也酒酣仰卧其上家童數千善為超人擁楫之歌主人又自歌小漆為舉足扣舷以節之水光天影飛動几席籟聲與潮汐作殷殷在足底滄洲仙有駕凌風舸以徴水如箭者彼徒以舸為舸而未知若居之以不舸為舸也以為舸則未嘗去家以為居則嘗有行色也朝吳編莫越户心無造而不可又孰知吾船之纜之而住負之而走也昔有太公嘗以漁釣欺天下而天下施知之其舍魚也欲蓋而彰也嘻以為非漁則持竿五十年矣以為真漁則未嘗得一漁焉嘻太公固得於漁不隆之間者客詰主船以為真船則居陸以為非船非箬笠之前皆漁樵推罵之地云知吾之在樓非長乘舴艋也今夫天一大春水地一大船也人在不悟悟者必在船之外吾悟船獨不在外也嘻此不可與家人道也春水如天船在天也水邪而况在樓邪認吾船在樓又何異認劍在舟刻耶其扣舷之歌曰滄之水兮如天叶滄之屋兮如船叶水滔天兮以春船之載兮薄夫天津索吾船於津之表兮吾得與泰初而為鄰客和之曰若有人兮舟為家叶著土不住兮養空不驅泰如我海兮鴻龎我潮吾不知貫月槎之徒兮夫倪舟之徒歎主人為汝南殷德父氏客為鐵􅐟道人會稽楊維楨也至正十年三月三日記松月軒記有詩積隂之氣清而久者在地為水在天為月也木得水而清之象滋焉得月而清之氣麗焉月一也木之麗其清者其材品則有不能不異者也桃之得於月也清之而妖栁之得於月也清而蕩竹之得於月也清而臞梅之得於月者清而孤荼䕷海棠之得於月也清而怨惟清而野而文秀也松之得月以此吳郡西門之外其聚為吾閶闔之間天差王夏駕之所也吾方大佑咸輳焉為積居之家者比比耳獨吾鄉人吳彥升氏居不離市而門有散地數十弓上有青松數十挺髙秀疏朗若深山客將儔挈侣出飲乎市而盤礴于此也天空氣清月在松頂彥升或領客坐松下仰見閻摶根株盤而玉兔臼人世斧斤不可斸已而顧影在地籟籟在空鈞韶鳴而龍鸞舞也不知身在此玉闕中黃塵市説有得松松月者名于其軒少蓬李公嘗為圖之大蓬泰野公又為篆額之而又求文於豫豫以素里閈重違其情而彥升之人品才氣可以仕而不仕者與夫尊師樂友化龍斷之俗翕然於禮義之趨者又吾之素與故為之記且復哦以詩曰文人愛青松手植西門內風聱度玉笙林影翻朱鷺仙鬼夜讀騷衣客秋吟句文人燕坐餘海月生東樹水竹亭記吾里白湖方義門子弟咸秀傑名仕版而于泳道父其尤者也始泳道未遇貢舉時實以才志自奮于京師貴人咸品之連延譽上所即被內選出司牢盆民奏最典大縣細滿歸創水竹亭先廬奉親之隙出與賓客接幅巾野服命僮抱琴尊之亭所相與把酒説詩父為事窮亨淹速一不以屬意一時文章家多為記詠卷既充又索敘引於友人楊維楨維楨嘗聞其論曰某讀南史書稱會之不必在逺臀然於未即有豪濮之趣未嘗不嘆以為閥閲豪族大官揖千金買佳園池崇美屋屋其中肓以珍禽竒獸樹以名卉異木論其一時侈盛平息侯之甲第無以喻其雄河陽梓澤之形勝無以喻其浥也然欲求一日之安於是不能得也故豫一亭費甚約規甚素取諸水竹者甚廉而其適安之樂自謂過之不倍不翅也人有志于適安者不敢如是耶余以泳道之言似矣又將有進於是者何居夫髙上于野以草木水泉驕其君而不出者狷者之為也既得志而患失之追以窮狷者之樂以為樂又偷者之為耳偷與狷皆中行所不與泳道於道務中行則狷與偷不足告泳道者今天之散也有雨之德焉積而厚也有負戴之功焉君子觀于水也思夫施於物者竹有貫歲之節不易地之性焉君子觀于竹也思夫貞一於已者若是則泳道之登髙也取諸物以贊乎也以及乎物至矣又豈徒草木水泉之通云乎却泳道尚竹余言澤之以為何如也東維子文集卷之十六

front:
  text: 東維子文集卷之二十四
  hash: sha256:d9f17b5c367acc946108237b67733fb3c9fd6567f0c3dde441f94b46916ed3a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_024-1a}
body:
  text: 㑹稽鐵厓楊維楨廉夫著神道碑元故中奉大夫浙東慰楊公神道碑公諱字元誠姓楊氏系出漢震後五祖某自婺遷杭遂爲杭人祖榮祖宋承信郎鎮江都統司帳前提舉父昌宋邳州萬戸府經厯今贈奉議大夫樞宻院判官驍騎衛追封錢塘縣子公生而警頴長而玉立長身紫髯如畫天厤間自奮如京師受知於中書平章政事沙刺班大司徒之父文貞王偕見上于奎章閣論治道及藝文事因命公篆洪禧明仁璽文稱㫖使備宿衛署廣成局副使特賜牙符珮出入禁中寵遇日渥擢中瑞司典簿繼改廣州路清逺縣户上愛其廉慎有深沉之思留之嘗謂廷臣釋迦班曰楊瑀有謀事必咨之行時秦王伯顔柄國一日挾太子縱獵上林上嘿㫖竄陽春惟資公宻謀禁近臣皆不預聞㧞去大憝如剔朽蠧朝端動色至求識其面以爲異人以功超授奉議大夫太史院判官繼升同僉院事賜金帶一貂鼠𫀆一公在史院曹局有以景星見請上聞公持不可曰使天下共見則爲不欺越九日太白經天奏衆如服其有見上嘗從容詢公南土所居公對以西湖葛嶺之勝爲洒宸翰書山居字未幾給告以樹勅賜贈考樞宻公墓碑即日歸歸山掃迹城府者十年人不堪其淡泊而自𥙿如至止乙未中書奏公舊勞起公行宣政院判官時江東浙西盜羣嘯乃改建德路總管建德古嚴州州在萬山中屬邑淳安又連歙境賊田歙闚我界而還者疑長樂鄉民為盜諜者執以歸諸獄連數百家民益詾主師者謀往捕公不可曰虚諜者知倘因疑枉鼔衆亂賊得乗釁突來悔焉及我請撫之果不測當任其咎遂肩輿從數隸直抵淳安邑人嘗厄官軍抄掠已皇皇散匿山谷間公載米二百石聲言賑濟使縣令馳以諭明日師調兵來公禁正之使侍命乃動擅動者如軍法長樂去邑二百里今至布公意民皆歡呼持牛酒來拜公公喜曰吾固知民不吾負即日偕師者還公莅郡視之如家民亦視公如父母自江淮驛廢嚴為通道窘於供頓公信今晝之用給而人不優将戍過軍之跋扈者皆服公信今田里不聞叫呼隳突於是像而祠碑而煩者凡十有四所前良二千未有也時公年已七十有三累請老丞相達識公數使勞之公卒謝事去是年行省承制邑浙東師起公辭去淞江之隺砂行省最公功上中書升浙東道都元帥進階中奉大夫公不起則以半俸攸者焉所著有山居新話山居要覧行于世公生于至元乙酉四月某日殁于至正辛丑七月十八日公長物琴劍書外無銖金斗粟貧無以為葬閲八月六日兩浙漕使憂公敦友義力賙其喪獲返柩杭之葛嶺先瑩之次公娶某氏次娶高麗氏子男六人長埴次坰垍培墀垓公卒女三人長適鄉貢進士應才次適瞿彦俊次適懷逺大将軍同僉浙江等處行樞宻院事俞忠孫男六人孫女四人某於公為同姓昆弟詳其出處行實諸孤衷衰詣邸次泣拜請銘義不容辭銘曰人疑弗決我以籌人懼弗前我以趨叶彼争前競決我止我糾去權奸如贅由由兮物泊乎其不留於乎今之人古之求我銘其人孰與儔墓碑故處士殷君墓碑殷子姓以國士逮宋避宣祖諱別族太史為戴氏者君之先也及君而宋亡遂復姓殷氏諱澄字公原華亭人宋朝請君某之孫節幹君某之子司法君某之弟也君家素饒財節幹君所好施著于其鄉每大雪淫雨必載薪米遍乞寒餒人死無所歸者為具衾槥窆之衆目之曰殷佛子娶鄉邑迮氏女得丈夫子二君其季也君狀貌魁梧美鬚髯性介特平生無宿諾人有急不一計親疎周之唯恐後衆有所爭來直于君得一言明曲直即謝去不復詣吏有田若干畮終歳所入盡以賙人事茍涉大義雖委身不問至元間天兵下江南将軍號楊掃地者帥偏師入華亭君時避地南錢南錢犹保聚未肯下楊怒業以共殱之君奮曰我其可無一言而死乎我死今日否亦今日遂扣軍門求見大言曰夫民猶水也水順則流逆則激民順則寕逆則亂矧郡縣新附民心未安将軍獨不能撫綏招徠以稱上神武不殺之德顧欲盡勦斯民何辜楊怒甚手劍斥君君復正色曰殺我一人活千萬人我死猶生也語益激烈􅏒人其裨将有感君語者起而阻之而楊亦慴服于時民全活者以萬計咸涕泣羅拜曰公於我生死而肉骨也願歳時伏臘祀公于杜以報事聞丞相伯顔公義之遂用便宜授君華亭都總管使守其地君即棄去曰大宋氏亾吾以親不七獨不能逸乎遂服野服隐居胥浦上時時領客放浪九峯三泖間忼愷懷古日夕忘返慕其人者目為泖南浪翁君聞之曰甚善名我因亦自謂泖南浪翁云烏乎代之強仁暴義者不少也而多逸于野太史氏又缺焉不書是為善者終無以勸也君没幾五十年而未有表白其事者猶幸其概在人耳目者卓卓未冺余因著諸所聞為論次之使後有過其墓者得以知君之為人若此庶幾為强仁暴義者之勸哉君娶會俞氏女賢而無子先君一年卒又娶永嘉陳氏女生子四人曰實曰厚曰誠曰諲側室生一人曰某孫男五尚質尚節尚白尚㓛尚賢生女五婿曰吳郡顧諟吳興沈斯干宋諸王孫宜樞同邑倪乗吳郡章禮曽孫男八陞奎壁堂埜塾堅聖女七玄孫男二君生於宋紹定已丑六月二日享年七十有七卒于國朝大德乙已九月某日葬于華亭縣胥浦鄉五保謝家原合祔俞夫人之封後十四年而葬陳夫人于其域又二十二年諲乃樹石墓門而會乩楊公為敘而銘之其辭曰仁之言利既博叶仁之行聞卓卓天一死貿萬殤棄爵秩不以償北強以兵叶南義剛若斯人者殆南方之強非歟嗚呼斯人吾言不亡改危素桂先生碑信之龍虎山為漢天師張氏之學者恒千餘人其卓犖瑰竒之士亦間見其間若桂先生者是已先生諱義方字心淵世為信貴溪人母先生時夢李淳風寄宿因名李寄長從上清宫熊尊師學元貞元年従天師張公朝京授蘄州道官歸而散其衣資飄然有逺志周覧名山由武至廬夜宿太平興國宫龍出屋後無犯先生居蜿蜒辟易而後去數飛躡曽崕與豹同行好事莫能蹤跡之樵人有見之山南同日又有見之山北者山中人酒熟曰願安得桂先生飲之俄先生至欣然就飲所飲者家以為吉徴尊官顯人過江上者咸願見先生先生見不見人莫測也江州守某乞詩惟書一閑字與之踰月以事去官先生率意成詩書座右多儆世絶俗語有金蓬頭者居聖井山先生致書封題甚謹登之白紙耳金大嘆曰至此果無説説矣道士吳季誠作渾淪菴迎先生居之先生嘆曰明年吾當歸矣明年至正元年正月朔翛然而逝越三日山南北道士奉遺蛻葬諸聖治峯麓道士方從義為予言先生之族有公武者號抱甕先生得仙術卒葬分領中夜家聞有聲詰旦視之但空棺耳有仲勛者號閑閑子通内外典與丞相陳福公為布交先生之死與信號黙黙子學道終南山緘口不言升座而化三日容色不變豈其山川之所鍾然也耶予昔游潯陽見先生聽其言無過高難行之論吁有道之士哉銘曰柱史度關騎青牛五千遺言増隐憂更秦逮漢習益瘉燕齊方士相呀噍道人隐居恒内修漆園尚友天同游一朝委蜕去莫留太史作銘表其坵墓誌銘故忠勇西夏侯邁公墓銘君諱邁里古思字善卿西夏人也曽祖月忽難祖也失迷俱不仕父別古思官於杭生君自幼有竒氣善擊搏技既而自悔曰伎勇有敵聖賢之學無敵也遂從師通詩易二經以詩登進士第官紹興録事長搶氏市馬紹興挾苗兵爲佐白取餘食市間不問苗真偽咸拘囚之傳其爰上省李官時苗長虐令如火莫孰何文有省府千夫長與羣攝師者根株爲奸利抱苗長文告鉗結束徒大姓家且縦苗白日什伍鈔民君下約民曰人怖狼狼亦怖人狼勿殺食人爾録長無玉帛狗馬身及赤口四耳誓以家狥殺根株鈔民者民皆俯地雷應曰惟録長君命夜交乙君躬率民兵殺苗不遺一噍盜起婺牧溪洞君以大夫命領所部抵洞賊問官軍姓曰邁某也皆倒戈請罪君收撫之不血一刃府命㩀蕭邑私聚民粮黷民貨􅐁民土田聞君到邑怖而匿去又明年西冦犯浦江君率兵至諸暨冦望風遁領臺命守諸暨召借粮扵民下令會府民無受令者君班師郡城諭以文告民輸粮者繦屬不絶功無堅敵宇民如子令無不行被首經厯江東憲府事瀕行民哭泣擁馬首不得行時海冦勢横甚虎踞娥江君奮不顧身為士卒先追廹其人於數百里外大卿在南端覆石海勢洋浮宴君隂畜徤兒戸下袖金字羅擊死之屍瘞戒珠僧院民皆麻衣跣慟從以萬計贈官中大夫僉江浙樞宻院事謚忠勇封西夏侯君嘗謂曰吾死使君子題其冡曰義烈墓文必賴直筆者傳傳無出會稽抱遺先生也若識之今不幸陷死地先生嘗以其人入銕史編收吾名足矣予為之泫然溳涕曰大将滅乎枉醜也使長城君也生天未滅乎狂醜也長城君溘先其死死又非地也天之生才其有以乎無以乎吾無從而吁也悲哉銘曰吁嗟乎善卿生也者吾不知胡為而生死也者吾不知胡為而死生不卌音集棄仕不四年而名長方記嗚呼獬豸折角兮麒麟路趾豕突西嶽兮鯨翻東海已乎善卿爾果胡為而生又果胡為而死故翰林侍講學士金華先生墓誌銘先生諱縉字晋卿姓黄氏其先自宋太史庭堅之後父昉繇雙井家浦江後遷義烏遂占籍焉曰伯姓者先生之高祖己曰夢炎淳祐進士仕朝散大夫行太常丞兼樞宻編脩官者曾祖也曰聘以進納恩補承節郎令以推思贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯者大父也曰鑄今贈中奉大夫江淛等處行中書省參知政事追封江夏郡公者父也中奉公元出朝散公外孫女王氏歸丁應復之後嘉議公疾廢育之為子也妣童氏追封江夏郡夫人夫人任先生時綉湖水清厯世有四日夜夢大星煜煜然墜于懐公始生至元十四年之冬十月一日也比成童不妄踰户閾授以書矢口即成誦年十三屬文作弔諸葛武侯文為郷先生劉公應亀所竒因留受業大德五年舉教官舉憲史已而復棄之多忤上官去延祐元年貢舉法行縣大夫以生充賦古賦以太極命題古賦以極命題場屋士不能為獨先生以楚聲為之遂㝴場明年奉大對授仕郎寕海縣丞江浙省臣承制遷石堰場監運事秩滿陞從仕郎諸暨州判官至順初用薦入為翰林應奉進階儒林郎丁外憂去秩服關轉承直郎國子博士閲六年請補外換奉政大夫江浙儒學提舉時先生年始六十有七不俟引年以侍親疾絶江徑歸俄有㫖預脩遼金宋三史丁内憂不赴服除以中順大夫祕書少監致仕久之又被上㫖落致仕仍歸階除翰林直學士至京中書傳旨擢兼經筵官召見慈仁殿薦陞中奉大夫侍講學士同知經筵事明年歸田里不俟報而行上聞遣使者追復前職又明年始獲南還閱七年而薨享年八十有一葬縣東北三里東埜之原娶王氏将仕郎桂之女封江夏郡夫人未一年卒男粹用廕入官忠顯校尉同知餘姚州事女清適惠州學正陳克讓先生位至法從蕭然不異布衣時又寡嗜欲年四十即獨榻于外給侍左右者兩黄頭而已遇佳山水竟日忘去形于篇什多冲淡簡逺之情然性剛中觸物或弦急不可犯少時即泮然無復停礙與同鄉柳太常貫為文友風節文章在栁上人呼黄柳其論著依㩀義例攷授的切在禁林三史惜以憂輟其修后妃㓛臣傳士類服其精審經筵處講文皆切于治道之大者晩年喜為浮屠亦研極其閑盪之説請者盈門厭亦麾之去其為文表箋書序傳記賛説誌銘凡若干篇曰損齋藁若干卷義烏志若干卷賦若干首於乎我朝文章雄唱推魯姚公再變推蜀虞公三變而為金華兩先生也五峯李孝光嘗與予為兩先生評余白柳太常如東魯杜翁課閨閫子弟言言有遺事黄太史如獨繭遺絲𥘉不諧衆響至趣往縆弦激絶之音出於天成者亦非衆音可諧也孝光以吾言為然太史攷文江浙時余辱與連房卷有不可遺落者必決于予在杭提學時謁文者填至必取予筆代應且又不掩于人曰吾文有豪縱不為格律囚者此非吾文乃楊廉夫文也自京南歸時予見于天竺山謂予曰吾老且休矣子宋紀辨已白於禁林宋三百年綱日屬之子矣嗚呼今亡矣吾終不得為公史臣徒矣悲夫因其鄉生浙西道廉訪司僉事鄭公深出其徒宋濓状求予銘遂忍而銘且悼喪亂未得謚于朝與其徒私謚曰文貞先生銘之辭曰大之星煜煜兮繡之水穆穆兮文之毓兮大星翳兮繡水㙪兮文之逝兮惟文之鳴兮大音在廷爾鏞爾筦兮我瑟我笙柝之甹兮會之咸兮氣一并兮有元氏之聲兮吁嗟今嘿嘿兮孰見古人之渢渢㳯響以上駝兮膏吾車其曷從有元文靜先生倪公墓碑銘代歐陽先生作玄聞房山高公克恭在南端時薦天下士五人曰敖公繼翁鄧公文原陳公康祖倪公淵姚公戎天下謂之办雋鄧公官至法從敖與姚卒官文學倪公晚始以縣大夫引年然皆以文行相高論五雋者不以位之崇卑優劣焉玄慕五儁如慕古人而倪公之孫璨奉公之門生鄭汝原所状行來謁鉊其墓玄忝論選之職銘公何慊亦何幸哉公諱淵字仲深其先浚儀人出漢御史寛裔五世祖南金以武弁仕宋從其君南遷因家錢塘四世祖某又從家烏程故今為湖州人曽祖俊民弗仕祖椿年路分兵馬監押父守貞自號愛山處士以公貴贈承務郎松江府判官母濮氏贈恭人公生而卓異精敏絶人讀書過目輟成誦嘗則前人之勤以自課命其書舍曰經鋤長遂通五經尤精于易三禮𥘉用薦者言為本郡學録及髙公以五儁並薦於朝未報而行省調公杭州儒學正江浙孛憐吉䚟平遣子從公受學且移文中書舉公可教國子而中書已擬臺章所薦五儁各𥙷郡文學乃升公為杭教授在杭學復田之曽没于勢家者若干畝新學舍造祭器撤上丁俗樂訪得宋太常樂工兩人俾以雅樂教諸生胄監聞之因招致两學工為國子樂師今諸郡學皆作登歌樂者實自公倡之中書左丞髙公昉又舉公編修官以親老辭乃授本郡教授以便養未上丁外艱服除在湖學倣安定舊規列經義治事齋以惠來來者為為立生祠公移正之不得窮往撤之用累攷入流得當塗縣主簿時長官皆以故免去獨公理縣事縣版籍不明公手為分劃編次瞭若指掌二稅始如期而集歳旱民吉史慕長斥去所上状公曰錢榖國計民生國本理末而發其本可乎語不合投劾去闔府駭然遣吏遮留之一以檢覈委公民賴以蘇縣前汊沮格久之公攟得舊田立復曰為塘和州民有田在縣境猾民與交易劵成而負其直訟則勢劵折之官莫能下至是越江來訴公探得猾者情始懼卒以直歸之民立異姓為後者所後父母且十年有同姓而非族者依倚前官年其産至給帖者左驗民直于公公曰按摘其誣者數事盡灰所􅐁部使者元公永貞至郡亷公德政曰吾按太平池州得良吏僅當塗主簿而已遂薦公可上縣令而公已無復仕進意告老而歸受加思承務郎杭州路富陽縣尹致仕既老于家杜門罕與人士接益潜心於易著易集説二十八卷圖説敘例各一卷病革之夕猶置易于几案諷誦之語其子曰死期至矣夫復何言須臾修逝至正二年夏六月二十九日也年七十有八娶鄭氏先十八年卒贈恭人子男三人長驤已卒次駿松江府儒學教授次駪女二長適楊福孫亦已卒次適陸元瑾孫男六長璨用公為紹興路錢清務副使次璛琰璋瑛瓉女三曽孫男二女二公昆弟四人伯叔李俱蚤世叔有遺孤甫四歳撫而教之踰于巳子伯季皆無嗣則以駿駪為之後駿等遵治命以其年冬十月某日奉柩烏程縣德政鄉毗山先墓之次學者私謚曰文靚先生韓子曰位不稱德者有後公盛年以俊稱於時而官僅佐下邑非位不稱德者歟知其後之必大無疑也銘曰先生之氏自漢御史經鋤有堂探易諏禮吁嗟先生蚤有令聞五儁同稱争翔競奮宜位館閣歌唐頌虞大道甚夷先生徐徐白首窮經覺我後覺晚佐一縣亦展所學鄭公註禮註禮益精焦氏冶易治盜有聲位不德滿時人所惜君子處之惟謙故益益不在身在其子孫史氏有撰貽厥後昆亡兄雙溪書院山長墓誌銘君姓楊氏諱維翰字子固自號方塘越之暨昜人曾大父文脩號佛子子朱子為常平使道楓川聞其名請見與談論竟日反遇異人移所患瘤安易韓先生某為述私傳大父宓父寕皆有隐德鄉里推長者母同里劉氏君生至元甲子正月二十日父嘗目之曰是子生有神氣長必大吾宗時伯父實以倉使歸老子家禮聘名儒若東泉陳先生某桐西馮先生某為之師從父山隂縣封宏叔父賀皆喜讀史君與維楨攻學無寒暑抵夜以漏分為度睡則以水沃面君於經子能以疑難詰其師會其解而後已辨史至綮節連柱兩叔父長作文著三蘓字帖喜雙井黄氏每讀上韓太尉書擊節慷慨曰不讀此無以發人浩然之氣朝廷貢舉法行維楨中進士第君以文過其屢為有司枉遂筮仕郡文學初帥府檄為慈溪邑校在職不事瑣屑惟推經術賛縣長為治后遷天台邑校先是維楨尹兹邑稱弟子者安普大許廣氏君至先以作人為任時安許氏皆擢第歸事君猶師焉遣子弟及邑俊彦博經者百餘人邑士語曰小楊君政不忘大楊君教重光考滿陞饒之雙溪山長郡守韓公墉素聞其人一見即器重稱其文議論高古有氣燄可畏尤愛其詩有大厤體無幾保荐于江東分憲業用而以病卒官舍時至正辛卯正月十三日也君素肄直無衣㩧衣不事兼副被服恒如寒儒未嘗少降辭色希悦千人所居州里有公議句論裁可否不合中辯不休不為權力屈時人稱曰古之遺直者晚年逰戯墨蘭竹石極精妙興至即揮洒侍筆𣏌者給弗之暇人求者無貴賤悉為作時益辯博士柯九思自以為弗及推曰方塘竹去尤好覧天文及天下名山川形勢有所得則述為歌詩人爭誦之號光嶽集攷經有穉濟録書畫有藝游畧君男一善孫男二樹河女女孫一君嘗戒善曰女父玷校官女叔掇上第女母鄉先生虞雷氏之孫也女弗學振吾家聲吾弗子幸今善苦學有志操吾期其有成克應先訓君年五十有八死一千里外善能不逺水陸力䕶柩㱕舍以是年十二月甲辰克葬于長寕郷馮山祖塋之次從先志也越明年某月日善至吾錢唐官次泣且請曰先君不幸制竒數年不周六甲官卑無治状其器業文藝又不得善文言者為之章顯地下重不幸善重不孝代之善立言者善未聞幸叔父勿讓銘吾先君維楨為悽然感涕敘其概而銘之曰子将不斷堅不以稱不利騏驥不馳逺不以稱不力於乎伯也言爲世格行爲世則不大禄食以放厥我於乎伯也窮居大行蔑損與監吾與伯也講之白矣吾又何計位卑與崇夀遲與廹耶故義士吕公墓誌銘公諱良佐字輔之姓吕氏世居淞之吕港大父德謙父允恭字菜翁皆隐德不仕公早頴悟讀書輟强記了大義長儀宇魁将器識才幹尤係人望咸以輔期器之以其出太公望望嘗釣德璜又䜟其港曰璜溪號公曰璜溪處士性至孝養母謝氏養與禮不旦暮衰母疾身不脱帶者三月久不瘳禱以自代母卒哀毁終喪制闋邦大夫挽之仕弗起然政有不决者必咨之郡饑有司申明發粟公笑曰必侯明降而賑民莩矣宜先解粟富民俟降以償則富者無廢粟飢者獲全生郡善之貢舉法聘碩師教子復出厚幣為賞試曰應奎文會貧時好學者建義塾收而教之金華黄太史縉嘗記其事兵興來總兵淞者聞公才傑至枉駕公廬與語大悦即板優公華亭令公請以白衣議事却板授總兵蓋賢之置曰義士俾自集白甲保障其竟時公已散財收死士三千餘人適斥鹵羣不逞乗亂起鳥合揺毒甚公徒釋掤走不勤官徒一鋤弟指授白甲用水火舸取其魁如利獺取鯔羣從盡戢竟賴以安者數千家總兵者問竒功公曰醫恃錢砭理疾而小巫用精籍亦理覆進其魁傑于兵曰天下之物莫毒于雞而醫家珍而用之總兵是其言轉無俾為精兵不尠淮兵難渡主師者辟公幕下力拒不就維取其子恂判海鹽時浙垣首相以承制除拜遂敕授今佐鄉郡又力亂私謂其子曰時乎庸才高枕而有餘時危豪傑運籌而不足非蕭鄼侯曷治漕韓淮陰曷調兵而魯連子昌出没亂世而裕如也吾願學連子而已耳又喟然曰日月剥矣昭然有不紊者江河壅矣浩然有不竭者孺子其侯之公好義出天性里有飢周之婚喪助之四方大夫士歸之者歳無虚燕來贐往靡厭勌得美譽湖海間呼為淞上田文獨不賢異端之學緇黄者接其人而不談其實術其髙情曠識獨立物外者人又莫能窺罹世難虞謙享自若與知已飮酒率過兩夜極起自舞攷鼔吹笙復飲不亂平生少疾臨終無一語及後事但曰吾年六十有五不夭己又幸不死巨測復何憾生元真乙未殁至正已亥娶高氏征東萬户宣武公孫女也子二長恒次恂女三孫五充閭復亨恒子也宗齊宋嶽宗望恂子也冬十月辛酉葬瀆之北原先逺日恒衣衰抵于杭次舍泣而舍杖拜曰先子不樂仕無治状而義行在鄉善言在家在邦者又不得名能文屬比于志不孝在後嗣奚贖先生恒師而先子大賓也幸哀而賜之銘吾為泣哭抆淚以銘念古衛公叔文子之謚君子韙其貞惠令淞人飢而夫子有賑粟不貞乎其二善而不禄命宜謚曰貞惠云銘曰踣車無仲尼覆舟無伯夷義以勇卒全以歸曰貞曰惠匪謚予私於乎嘻莫尊乎野而位者覆卑璜之滸栗之垂有過其墓而慕其人者語吾銘詩孛元卿墓銘元卿名字顔忽都國族也泰定四年阿登赤榜賜進士出身以某官二十年官至江浙省宣政院判其爲人有氣節在官以廉直稱遇事善持論裁人倚爲平擢第後盡合所爲文博極經史諸子百家古詩人騷選樂府歌行出語務追古人至正壬辰紅巾冦亂江南元卿官歳滿以本省檄起總制浙之三關理戎職巖巖有風采薪賊有蔵草間者必游徼得七必劃殄俾無肓邑安集邑遺民民倚之爲藩衛歸之如父母閲三年忽以謗去官過杭見余無幾病風竟不能出語卒卒于召某所踰月其子武童與其門吏始訃余草葬某台山徴墓銘余與元卿同年不得辭銘曰十夫採惟婁至授機一語所畏無翼而飛卒至於犇而病病而喑喑而死也吾子元卿乎何悲歐陽彦珍墓銘君諱公瑾字彦珍其世出廬陵宋文忠公修今翰林承旨玄功從弟也祖某封某官父某不仕君自㓜警長通經術旁及書數兵刑之法試藝于有司不售憲府才其人舉為司嘗不數年掾行中書考滿都事浙東帥府任掾時執政者多仕已喜怒不以民害利為事君抱卷執議未嘗少阿法當而人利者必累請必行後已不當雖受怒罵必格事有它掾不遑行止者必行止於君其在帥幕建議以伏海冦當以長使乆算不宜試小計䂓小利以為功又某官恃文事往喻冦君力言不可喻幸小順乃大豢不順即不順喻者必死為大國辱已而果然嘗建平海策若干言主帥者不能用請辭職歸養太夫人不可鬱成疾未幾以太夫人憂去職執喪如礼法制闋遊淞中得疾友家歸卒于杭君娶閩玉氏宣文檢討餘慶女弟也子三人長太平次某女四人皆妻名士臨終謂其子曰吾結貴交多市道惟會稽楊某為吾道且為古文名東南汝往請銘平服縗來以遺命泣而請銘曰在家温温在官墳墳墳墳有法温温有文故家為孝子官為幹臣幹曰必了不了嫁婚幸終其親其又何冤趙公衛道墓誌銘公趙氏諱棨字衛遂號素軒居越之姚江宋兼懿王德昭王之十二世孫曽祖希秦宋朝議大夫知衢州軍州事贈大理寺丞祖與宣宋朝散郎溧水縣尉父孟侣宋朝散郎慶元路沿海制參贈太府寺簿母恭人董氏先係五世祖太師諱師龍長孫孟尊之第三子也寺簿無子螟之公博學于書無不讀讀必有論裁學成無所於試大德己亥江浙儒司舉為昌化教諭轉桐廬教諭由年勞陞饒之長薌書院長温之宗晦書院元統甲戍受牒命教授温州越五年教授常州在處學校有濫給廩給者必首沃之以其膳膳儒之老病殘疾及貧無依者早年微家資結交先達凡工文與琴書律厤醫薬隂陽者家皆舘食西廡不以歳月計士及告急度家即盡如所請與之致空囊不問酒懽量能倍斗酣次為古歌詩聫重沓韻對客可待嘗與友飲大醉梅花樹下曰梅花獨不能飲乎急呼酒用太白梅澆其根且為問梅辭又為代荅辭平生所為詩無慮數百什名素軒集若干与公生于某年卒于至正四年六月五日享年七十又一明年葬于姚江雙鴈鄉之原孤子􅈨持其敘叙伏詣門泣道遺命求予銘予以蚤歳托公忘年交義不得辭遂銘曰王之孫降皂閽君為孫而文詩英酒聖交有神大樹勸汝海白樽歸大樹羅之村南容教授灶公碣銘祭統云銘者論著英北德之善功烈慶賞聲名于天下予友襄貢士曰章嘗将其子杜友直來謁曰此南容教授曽孫其仲三而續文脉南容者直也閲三年直以南容公行状謁予松江次舍吾祖仕不大無功状爵名可書然德善在鄉有足示後者直太父父不獲登先生門直獲登焉而先生賜銘曾大父大父父晦先德者庶直足以贖之予閲状證之以鄉父兄之言則知南容長者也人至以三杜姓其村其教澤淑于人者淺而義行範于人者逺也初季父某無後螟莫姓子齒㓜復以公為後季父殁俟螟齒長以家産歸之而復冠娶待之不異同出皇慶間其族困于里經公倡率義役曰歳儲粟若干給之隣里姻友不能嫁娶喪葬周之各有差暍道有漿斷津有梁凡濊于急義即勇爲者類此予因喟然曰吾周遊東南大族甲姓攸爲此者不足多公以中産爲之難也淞有饒貲家利酤榷兼兄弟戕死里氓者不顧吁鄉父兄之談南容長者之不去口有以哉此宜得銘也公諱英發字俊卿蚤年逰京師以才名得學正建寕年勞升南容教授未幾即棄官歸隐于淞之西霞自號西霞道人歳延碩師教子弟裵貢士嘗客其所妻某氏男一孫一曽孫三友直友諒友聞生于宋已巳卒于今至正庚寅享年八十有二葬青龍之原附祖塋預息菴之右銘曰彼戕同氣我友螟以義彼併連阡我給征以田吾知南容義且仁出于性覃于人澤及後昆至今鄉之人襲杜固姓其村白雲漫士陶君墓碣銘天台陶孝子宗儀死其親已三年制闋猶衷衰來拜予雲間次舍泣而曰今日奮起風雲附王公大臣者其聲光赫矣然有身没名者必托之名能文家否則與腐草同盡孝子官卑志則大志粗見于厯官者無名能文書之儀坐不孝先生名能文言又足信萬古敢以墓辭不獲接遂昌鄭元祐状君姓陶氏諱煜字明逺自號逍奥山人又更號曰雲漫士從郷先生周公榮學學成逰京邑王公貴人僓其狀貌言議傾下之已而翩然來歸曰燕趙多竒士今所見仍爾家貧親且老遂屈身就禄試吏蘭溪州陞補江隂州州民有劉鐵者欲犯屠人妻屠訟鉄鉄抵罪怒縛其卒妻犯之屠捉刀刺銕君議奸殺非故比屠免之君平反部使者審讞一如君所言又豪民朱管坐戮死籍沒兩家田㱕丞相府相以無賴少年為瓜牙縱暴隔民財民被搒掠死者無冥有訴于府者府從風指莫孰何君進白府曰朝廷命尹公是邦忍坐視赤子殞命于餓虎之喫耶無賴者覆説文移省為遣使至府府賞以幣以年勞除杭州東北録典史有畏吾人與其妻生女已十歳一朝為省行人即别娶抑賤正妻且瑾一室囚之婢引女訴主母枉録長不敢受詞君曰此婢去三人俱死矣遂受詞伸理行人坐黙退果遷湖州歸去時湖州已陷賊君從主兵者劃計䇿遄復湖州乏粮君爲檄文歸安時湖州已走一介召諸艘其至無時刻違録功中書不報調紹興上虞縣嘆曰吾懷抱利器不後于今之人而浮沉大寮不得與今之攬權力者比年已莫死将至矣尚何言哉遂卒于郡都昌坊之寓舍享年七十有三戊戌九月二十七日也配趙氏故宗室孟本女也子三人長宗儀宗傳宗孺女三人銘曰其貌魁如其論魁如考功千吏秩乎不可言用不能大卒老死簿書噫嘻乎自古才而仕仕而漫者豈惟是夫兩浙轉運司書吏何君墓誌銘君姓何氏諱宗寔字誠甫其先曽大父直方由東平徒杭大父德遂占籍為杭人父祥娶周氏皆樂善好施君微時過善相者曰此子神清骨秀他日樹何氏門户者必此子也既長喜讀律䏻權衡世事料後成敗如蓍見性鯁亘弗尚外矯為義不讓人遇不義退處如怯夫㝷試吏下邑以能聲著陞杭州府史明年秋郡當慮囚檄君典獄案君窮爰書底説鞠論報發其留白李官悉決道枉者昭雪不以嫌避囚有法當劓時犯者皆阽死君曰劓雖著令民迫不得已耳上方施仁致恤肉刑鼻可以死地棄哉君以墨限劓當法而已咸謂如其仁如其仁後竟為故事格當調調者盛購大郡有賢守将足矣郡奚擇于大小卒調昆陵居無何進曰郡守行仁政必自鰥寡孤獨始矧舊制立養濟院惠民局以濟窮察病今院概非窮民處局又弗核實鰥寡孤獨何利哉郡守下其議郡轄二州邑賦役號難治田畝多為勢匿郡守選君土其地均之君詢高年究畝瘠肥及核户豐約縣賦役均榖禄平為鄰郡㝡尋富民妄訴田有灾君詰之辭窮要以賄君曰吏當守法農當守耕爾以豐為歉詔縣官我以法覈實奚敢以賄敗我法卒黜之郡守賢其大呼必以字户部尚書秦公為兩都運使道過昆陵詢能吏于郡守以君對秦公亦素聞其能因訪以鹽筴君疏上利病大竒之會丁母憂事輟服除起服為掾是年儐運判李公分漕嘉興君立條告先輸者賞後者罸民詿誤禁者岀帖者必刑時天積兩盆不成鹽君齋沐露禱明日而止鹽賦告足咸以為何君至誠能感神明年典户曹君樹格殊常式四方商旅來者如市賦用倍盈事聞上錫酒旌官吏勞官曰何掾服勤宜先我酌君以為吏箠楚民之賦羨而受上賞後必有甚焉者遂解去郡邑大夫高之日造其廬與評事君辭不可遂隐玉泉山自號一懶翁君素仁孝慈爱所得俸奉母外以覃于族母疾晝不出夜衣不解帶每于朔望夜嘗露香禱天曰富貴非吾願願吾孫事吾子亦若子吾也杭城灾四止成墟君室廬獨巋然存人皆以為孝感所致兄宗荗同居無間言怡如也妹一人適戴氏戴没君給養其家子女為嫁娶隣婦有哭其偯者君微之喪其良人貧無以治棺即賻之他日婦至請傭以償直君曰周汝急豈望報乎婦謝而去君當屬纊神色不變召其子敏及兄子敬於前命之曰凡子之事親生事以禮死葬以禮爾慎母為異端惑語終奄然而逝君娶沈氏勤儉有家法生子一人敏是也又賈氏生女在穉敏力學不倦有司辟為浦城縣學校論未上而君卒君生于前至元甲午夏正月十日卒于至正十三年正月十有九日享年六十歳是年三月壬申葬于錢塘北山玉泉松義里之原敏樹石丙金哭泣來銘銘曰展矣何居如其仁刑有劓與死淪君平施之復生存風灾屋廬無間隣君一室奉親人莫與京而獨存于天叶嗚呼何居如其仁年不踰甲禄不享天身尚嗣爾後人東維子文集卷之二十四

front:
  text: 東維子文集卷之三十
  hash: sha256:b865ec140e30543c460dec6a4f393d99d0097b301839497202639da6f492e24c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_030-1a}
body:
  text: 會稽鐵崖楊維楨廉夫著歌盤所歌并序孟子稱大丈夫曰居天下之正位行天下之大道富貴不能淫貧賤不能移威武不能屈李願稱大丈夫曰坐廟堂則進退百官在外則武夫前呵從者失途喜有賞怒有刑材俊者譽其德粉白黛緑者爭寵妍蓋子之所謂大丈夫者也李願氏之所謂大丈夫人之稱大丈夫也其賢不肖固有間矣及願稱大丈夫之所不遇者又曰與其有譽孰若無毁與其有樂孰若無憂車服不維刀鋸不加理亂不知黜陟不聞此我之所行願蓋亦潔身而往之流也豈亦得稱大丈夫哉然比於處穢汚觸刑辟徼幸于萬一老死而後止者則猶賢耳故昌黎韓子之未遇也亦於膏車秣馬以從應于盤之樂也去之六百餘年而猶有裔孫曰秀之南自公某為宋和公之七世孫也宋革不忘仕國朝以名節強起之辭以疾歸隱于淡滄之上名其居曰盤所盤在太行去淡滄不知其若干道里而南囱名之蓋所同其隱而不必坰其地也南囱克已風節重其所則愈於願之徒以不過而樂其所者也南囱諸孫為恕乂能復盤所于先廬瓌棄之餘遷其所於海甸之東丘而南囱之故扁在焉固賢矣吾聞恕自幼有大志唯用力于當世者又自知不可為則為不遇于時者之為而不為處穢污觸刑辟幸於老死而後止者也於願之賢亦庶乎其近之昌黎氏賢願而為序余亦賢恕而為昌黎之歌以歌之曰盤之宫東丘之樂􅌉之土耕者讓畝叶盤之泉漁不及因盤之阻外禦其侮盤之內潛我心􅌉之禳實盤繁我族嗟盤之樂兮樂而安風雨不震兮燹潦弗姦孝以致其養兮義以廣夫隱難居燒安兮體愈胖心無憂兮奚有患叶歌兮樂女盤女將和兮致吾槃杵歌七首杭築長城賴辨章仁令兩羣美政洽于衆心以底不日之成然彼失之記有不免悽苦者東維子録其辭為杵歌亟亟城城城亟成小兒齊唱杵歌聲杵歌傳作睢陽曲中有哭聲能陷城自古衆心能作城五方取土不須蒸蒸土作城城可破衆心作城城可憑疊疊石石石嶅嶆立竿作表齊竿旄阿誰迼得雲梯子剗地過城百尺高羅城一百草里長東藩恃此作金湯舊基更展三千里莫剩西門一樹樟蘇州刺史新令好不用西山取石勞拆得鳳山楊漣塔南城不日似雲高南城不日似雲髙城腳愁侵八月濤射得潮頭向西去錢王鐵箭泰山牢攻城不怕齊神武玉璧堪支百萬兵不是南朝誇玉壁關西南子是長城江西鐃歌二章陳友諒起兵殺倪蠻子據龍興辨章阿里溫沙公憲倉察伋公合兵破之龍興始平江右諸郡無不欵附至此而武功成作龍興平繄龍興藩西江二皈章國駿厖江有砥柱胡為鴻流降剿蠻效尤蟊賊內訌三台映太嶶國士俱無雙王旅嘽嘽鉦鼓摐天威震赫羣凶􅋏八郡望風咸來降武功既成母從從聖人南面殿萬邦右龍興平十五句龍興陷日憲史劉夔懷印埋土中土生瑞木一本察伋被命為僉憲丞購印於瑞木下掘得印來歸伋得印施諸移文遂成恢復功為銀章徭維白金有章維國之光九鼎既峙翕元化以張大冶范金吐景耀匜蟠螭細龜鸞翥鳯翔官臣實司之楨我皇網孰至且藏啓發禎祥標潔係政柄繄德是將符節允合人文昌蕩攘凶頑時乃康與國咸休萬年膺天慶用韻復雲松老人華陽巾歌君不見獬豸不識字髙桂削鐵堅白簡孰辨賢不賢又不雞鸃偏尚武高屋壓虎肩五兵不理長酣眠鐵崖老狂者強項如董宣小巾製子夏正安江東傳人間緋紫揎已蛻風中蟬脫巾漉酒東籬邊吳淞老褐來賀我倒冠共醉春風前我歌此歌君拍手東壺西䦘開洞天洞天之寉為我雙回旋次韻省郎蔡彥文觀潮長歌録呈吳興二守雲間先生雙海鳯跳天吳八月十八觀天下無篷婆之山突兀眼前見有如祖龍萬鋒來東驅婆留一箭氣相敵強努不用三千夫雲蜃成樓不可軒大鐵搖識誰能屠招潮小兒不畏死兩螯踏浪心何粗搏桑爛若木枯草瓢古憤無時蘇東維子驚相呼長風破浪未歸去一葉欲事寰瀛圖馮誰之一匹素中有萬里河漢乘吾桴題清閟堂雪蕉圖洛陽城中雪冥冥袁家竹屋如笄篁老人僵卧木偶形不知太守來扣扃輞川畫得洛陽亭千載好事圖方屏寒林脫葉風寥泠胡見為此芭蕉青花房倒抽玉膽瓶監華亂點青鸞翎階前老石如秃丁銀瘤玉癭鯊星星嗚呼妙筆主右丞隕霜不殺譏麟經石丞執政臭彤庭燮理無乃迷天刑胡笳一聲吹羯腥血􅅹徑草啼精靈鳴呼爾身如蕉不如蓂凝碧沱上先秋零大樹歌為馮淵如賦辭桂軒辭有序桂生於秋依於巖蓋隱之花也故小山之招者托焉代之誇却林美燕山者非桂本志也包陽有桂軒者為馮君無卿之所築馮君有問學且有志于當世而不屑於仕進今老矣遂築是軒之所將以終隱云夫古之君子不必以仕為賢亦不必以不仕為高仕而不得行其志之為患耳仕而不得行其志苟非時之弗遇則材之弗良也方今明天子在上側席求人如不及馮君幸生逢其時其材入非可以無用于世者方且惴馬深藏逺遁分與小山之招者同羣焉蓋與夫代之夸却林美燕山之為榮者異日道也使彼揚揚露林竊一名以自哆夫人不足不致中踣而貽故林之羞則不正者聞其風亦可少愧矣嘻桂之軒人人得有也而餐馮君者之不愧於桂則少矣是則馮君之才號實世教之所係也因其友程生之請為作桂軒辭一章其辭曰桂樹叢生兮軒之陽沐兩露兮含風霜王孫不歸兮春草歇而不芳軒中之人兮壽而康折瓊枝以為佩兮餐金粟以為根軒中之樂兮樂無央桂樹叢生兮軒之隂虬龍盤拏兮猿狖笑吟王孫不歸兮實勞我心送史才叟遷上饒吏代馮元贈一門三相兩封王見説郎美文章收拾長才青眼是黃堂柏府槐廳朝暮直披玉雪倚冰霜靈山懷玉鬱蒼蒼古城隍帶仙房瑶草紫芝隨處發天香盡道如今千外好金縷唱錦帆張調雙飛燕調十月六日雲窩主者設燕于清香亭侑巵者東平玉無瑕張氏也酒半張氏乞豫樂章為賦雙飛燕調俾度腔行酒以佐主賓之歡玉無瑕春無價清歌一曲倒齒伶牙斜簮剃髻花緊嵌凌波襪玉手琵琶彈初罷怎教他流落天涯抱來帳下黎園弟子學士人家雜大陳圖新語敘孫子論兵謂廟算者勝無算者不勝且敗又謂善守者藏於九地之下善攻者動于九天之上此全勝道也余猶怪今之主兵者類皆無算之兵攻者直撞守者急退耳比之田舍傳貌三進三退不翅也余觀奉先趙信好著陳圖新語得軒轅氏屈機之法而深中今日主兵者之弊信嘗從余遊於睦州抱文武才略而未遇知巳者江浙樞府曽官授其入言不聽則棄官去耶律氏有禮羅其人計不用亦􅰩衣行余號知已而余在澤雖竒其才而無所以用近聞中吳痛懲主兵之弊旁求天下之善兵算者有以信姓氏達荐書者而信勿應信與余乃居草堂看古莫耶談瑶水青黃虬人莫識其胸中也豫令其同逰者張憲上其圖於淮吳幕府幕府若詢曰汝師東維子曽上皇帝書淮吳府聘而未起何如憲其對曰欲招東維子請從信始鬻茶夢鐵龍道人卧石床二更月微明及紙悵梅影亦及半囱寉孤立不鳴命小雲童汲白蓮泉燃稿湘竹授以凌霄芽為飲供逍人及遊心太虛雍雍涼涼若鴻蒙若皇茫會人地之未生適隂陽之若亡忱兮勿知入夢遂坐于青圓銀輝之堂堂上香雲連拂地中著紫桂榻緑瓊兒有太初易一集集內悉呈斗文煥燁燴熠含流玉錯莫辨艾畫若煙雲日月交麗乎青天歘玉露涼目冷香冰入齒者易刻困作太虛吟吟曰道無形兮兆無聲妙天心兮一以真百家斯融太乙以清歌已光颷起林未激華氛郁郁霏霏絢爛淫艷乃有扈緑衣若仙子者從客來謁云名淡香小字緑華乃奉夭無杯酌太清神明之髓以夀余侑以辭曰心不形神以行無而為萬化清壽畢紓徐而退復令小玉環侍筆櫝遂書歌遺之曰道可受兮不可以傳天不刑兮四時以言眇乎天兮天之先天之先兮復何仙移間白雲徴銷緑衣花煙月天明余內囦余亦誤矣遂冥神合玄目光尚隱於梅花間也小雲呼曰凌霄芽熟矣四十五日約漢志有曰冬事既入婦人紡績女子所得日四十五何為日四十五一月三十日三十之夜分不息是一月之中恆得十五日也故四十五余觀古幽民男於宵索綯女於宵紡績則邠男女皆得日四十五者也嘻豈惟邠民哉宣王之庭燎曰夜何如其夜未央夜何如其夜向晨則玉者勤政亦維燎于夜也豈惟宣王哉姫公聖厪於忠則曰坐以待旦孔父至聖勤于學則曰吾嘗終夜不寢見古之聖賢未嘗不競賂于四十五日也錢唐諸生有以年過冠室而失師承者及其直賢師友也遂有失時之嘆而不知力扶輔人之功故為作四十五日約以䇿其力而陳其功日讀某經若干卷寫某書若千板夜讀某史若干卷評某史若干件者某文若干道朔望講某文義若干件遵要束為餘力者有慶違要束而力不反者有讓云毗陵行孟冬四將發勾吳彎弓誓落隻虎智謀無過史萬葉嫖姚無加李金吾前弟已作破竹及三覆乃裹含沙祖常山長蛇一斷尾即墨怒牯齊奔􅘠玉蕊孤軍呼庚癸皂鴉萬甲迷糢糊江南長枝江北無蒲牢一吼千鯨呼赤杜卓入鐵甕户鐵翅橫截丹陽湖搗虛之策不出此赤子可縛生於菟當時上將陷江都至今莫贖千金軀後來飛將慎勿疏襄王城頭啼白烏如何臨期易將犯兵器何必不讀孫吳書烏乎臨期易將犯兵器何必不讀孫吳書題子昻五花馬圖趙公馬癖如鄧公曽騎賜馬真龍驄漚波亭上風日靜想像天廄圖真龍鳥雲滿身雲滿足紫焰珠光奪雙目九花風細虬欲飛五色汲清錦初浴祗今買骨黃金台圉家豢牧皆駑材將軍臨陳托生死昭陵石馬空遺哀此圖年深神亦化後來何人誇筆亞不見真龍空見畫猶得千金索高價題謝氏一勺軒一勺水不滿斗我吸之勺在手上連天湋尾下泄海焦口主人飲小池鑿吾蔀青天納牖吾鐵崖道人韙之曰有人悟此環雲夢吞八九東維子文集卷之三十

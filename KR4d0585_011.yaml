  text: 東維子文集卷之十一
  hash: sha256:333dd6f499d7f859b924ac82fd583e7bfe7d6af319bdc51abc84bd49a399c243
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_011-1a}
body:
  text: 會稽鐡崖楊維楨廉夫著序贈杜彥清序余曩遊海上之小金山泊舟赤松溪上午夜月明如水聞水東歌聲纍纍乎如貫珠已而又聞𬗋鸞聲卒起林杪如雲端仙人挾笙鶴而去異而問其人則曰真定杜清氏之轉喉引商殺之歌間以湘竹之龍鳴也余明發開舟不及識其人今年秋再遊海上道過赤松而清來相見為余作慢辭古調及秦樓三弄遂出楮求一言以別昔賈充在落會夏統氏之客舟充以會稽土地間曲叩之統為歌大禹時朝會之歌及伍胥小海之唱其音節慷慨激烈天風雲雨為之響應又掀髯作一悲嘯沙塵煙起止之而後巳也吾後日舟還溪上約吾竹西老人當重叩爾土地間曲如伸御氏之不忘其鄉者豈無龍山朝會焉國授化之遺音乎竹西當為余協調于欏挲之禮而發余鐵龍之不平者夢寐以之周月湖今樂府序士大夫以今樂成鳴者竒巧莫如關漢卿庾吉甫楊淡齋盧蘇齋豪爽則有如馮海粟滕王霄醖藉則有如貫酸齋馬昂父其體裁各異而宫商相宣皆可被於絃竹者也繼起者不可枚舉往往泥文宋者失音節諧音節者虧文采兼之者實難也夫詞曲本古詩之流既以樂府名編則宜有風雅餘韻在焉苟專逐時變競俗餞不自知其流於街談市諺之陋而不見天錦臟繡腑之為懿也則亦何取於今之樂府可被於絃竹者哉四明周月湖文安美成也公之八葉孫也以詞家剩馥播於今日之樂章宜其於文采節音兼濟而無遺恨也間嘗今學于吳毅輯而成帙薰香摘艷不厭其多好事者又將繡諸梓以廣其傳也不可無一言以引之故為書其編首者如此至正七年十一月朔序李庸宫詞序大曆詩人後評者取張籍王建而建之宫詞非籍可能也宫掖之事豈外人所能道哉建雖有春坊才非其老璫宗氏出入禁闥知史氏之所不知則亦不能顓美于是本朝宫詞自石田公而次亡慮數十家詞之風格不下建者多而求其善言史氏之所不知則寡矣東美李庸仲常為宫詞四十首流布縉紳間不特風格似建閣有史言氏之所弗知如金合草芽胡僧扇鼓漢記琵琶興隆巢笙內苑籍田室蚤繅事是巳蓋仲常以能詩客于館閣諸老者且十有七年矣其吏于徴政父長信得間見宫掖者亦熟矣然則代之善為宫詞者豈直慎怨興象之似建為得哉觀是詞者尚以是求之至正戊子八月甲午序沈氏今樂府序或問騷可以被絃乎曰騷詩之流詩可以絃則騷其不可乎或於曰騷無古今而樂府有古今何也曰騷之下為樂府則亦騷之今吳然樂府出於漢可以言古六朝而下皆今矣又况今之今乎吁樂府曰今則樂府之去漢也逺矣士之操觚于是者文墨之遊耳其於聲文綴於君臣夫婦仙釋氏之典故以警人視聽使癡兒女知有古今美惡成敗之觀懲則出於關庾氏傳竒之變或者以為治世之音則辱國甚矣吁關雎麟趾之化漸漬於聲樂者固若是其班乎故曰今樂府者文墨之士之遊也然而媟邪正豪俊鄙野則亦隨其人品而得之楊盧滕李馮貫馬白皆一代詞伯而不能不遊於是雖依比聲調而其格力雄渾正大有足傳者邇年以來小葉俳輩類以今樂自鳴往往流於街談市諺之陋有漁樵欸乃之不如者吾不知又十年二十年後其變為何如也吳興沈子厚氏通文史善為古詩歌間亦遊於樂府記余數年前客太湖上賦鐵龍引一章子厚速和余四章皆效鐵龍體飄飄然有變雲氣心已異之今年余以海漕事往吳興者閲月子厚時時持酒肴與今樂府至至必命吳娃度腔引酒為吾夀論其格力有楊盧滕李馮貫馬白諸詞伯之風而其句字與小葉徘輩街談市諺之陋閔庾氏而有傳子厚氏其無傳吾不信也巳書成帙求一言以引重因而論次樂府之有古今為沈氏今樂府序至正十二年夏四月十四日序沈生樂府序張右史嘗評賀方回樂府謂其肆口而成不待思慮雕琢又推其極至華如遊金張之堂治如攬嬙施之袪幽潔如屈宋悲壯如蘇李具是四工夫豈可以肆口而成哉益肆口而成者情也具四工者才也情至而此賀才子妙絶一世而文章巨公不能擅其場者情之兩至也我朝樂府辭益簡調益嚴而勻蓋蓋流媚不陋自疏齊酸齋以後小山局於方黑劉縱於圓局於方拘才之過也縱於國恣情之過也二者胥矢之松江沈氏專嘗從余朔南士間聽於音往能吹余大小鐵龍作龍吟曲十二章遂遊筆樂府積以成衭求余一言重篇端披其帙見其情發於成才者亦似矣生益造其詣以小山之拘者自通黑劉之恣者自撙生之樂府不美於賀才子者吾不信矣生讀書強記有志晉人帖南唐人畫樂府特其餘耳有求生之才者勿以是掩之瀟湘集序余在吳下時與永嘉李孝光論古人意余曰梅一於酸鹽一於鹹飲食鹽梅而味常得於酸醎之外此古詩人意也後之得意者惟古樂府而已耳孝光以余言為韙遂相與唱和古樂府辭好事者傳於海內館閣諸老以為李楊樂府出而後始補元詩之缺泰定文風為之一變吁四十年矣兵興來詞人又一變往往務工於語言而古意寖矣語彌工意彌陋詩之去古彌逺吾不意得瀟湘集於四十年後尚有古詩人意也瀟湘為洮陽唐升氏字伯眘自湖湘流離越江漢厯閩嶠抵金陵過錢唐上會稽周流幾萬里無居與食然不肯少貶事王侯覔知巳顧容與於吟咏求海知言以質其所能此升之見余草玄閣也其詩多傷賢人君子不得志而不肖者合於世也其樂府古風謡平易不迫非有所記不著至憤頑嫉惡慷慨激烈者聞之足以戒而言之無罪矣三百篇以六義見諷刺瀟湘詩人不合于古風人者寡矣於是賞會之餘為之評點使覽者知我朝之詩如瀟湘者亦可刻金石流管絃豈非吾儕遺老之至望哉至正丙午三月望日序苗人備急活人方序醫莫切於對證證莫切於對藥藥投其對牛溲馬勃癩狗之寶能擅功于一時不然黃金水銀鍾乳琅玕沅之沙婆律之腦蛇之黃中無益其貴也餘姚醫學録苗君仲通論著備急活人方會粹諸家所載祖父所傳江湖所聞及親所經驗者筆成一編世有竒疾醫經所不備醫流所不識獨得於神悟理會而著為竒中之方此其難也夫人不幸抱竒疾至至醫經不備醫流不識遂謂無藥可活使病者待期以盡不亦可悼也哉妄庸者亂投藥餌以探疾重不幸速其斃是醫殺之也是書一出備醫經之未備識醫流之未識使天下不幸抱竒疾有對疾之證對證之藥不重不幸為妄庸醫之所殺是不大可慶歟昔甄權不著方書其言曰醫者意也不可以著書權蓋以意得者自祕非淑後之仁也君推其獨得喜與天下後世共其用心廣狹何何如哉鋟諸梓而過徵余序於是乎序杏林序江陽許守中氏業醫己十數世至守中名愈大施愈廣人以疾􅌽者無分貴富賤貧輒往往輒效而例不求施鄙宋清之施藥受劵為市醫而切慕董杏林之為人淞謝侯伯照嘗俾工畫者圖杏林以為贈而又求言于余子惟杏自托吾聖人為壇緇帷之林而六經之教始及天下澤覃於萬世無止噫杏之盛也蔑加此已神仙者流如董奉氏亦託杏為施成林于廬山五老之間其施雖隘杏之惠猶未絶也其不愈於羯鼓催花驕兒婦人以造化立坊碎錦刺侈客於午橋之遊衍者乎若托之卯金之帝有曰實大如梨文亦如橘食其味者可以辟榖而上仙則吾未之信而奉之杏也即嵩山之杏耳將無信乎嵩之杏以葛計其民遇飢年皆賴杏為命而奉之以杏一器易榖一器以贍飢者籍杏以為施仁亦至矣又何必神辟穀之杏乎吁此秦狡獪術也守中氏以其施為心而不藉狡獪以為神杏之植多植寡吾曽不計而况計粟之易多易寡乎此其為仁近吾聖人之仁而非狡獪之仁也使守中有計較心又何愈於宋清乎守中聞余言而謝曰擴豫仁者先生之教也贈醫士莫仲仁序淞之張涇有醫術道人名于士大夫者曰莫仲仁氏豫來淞未識其人仲仁有謁余扣其術莫能對顧相視一笑耳從者曰仲仁氏病聾余怪聾若是何以聰于五聲之醫乎易其人且疑其術異而鄰有以其病召之即療若神者始驚其術且又介馮生淵持弓謁文生為仲狀曰邑人某病蠱衆異醫莫療仲仁氏以峻劑吐蟲若干升生立愈又某病寒逾九日讝口發狂隂且縮法死仲仁氏徐以常藥理之而平又某病噤痢不食餘七日氣始絶仲仁氏投以湯飲即內食飲而起又大官某氏病療醫衆爭進藥期勝仲仁氏望之而走曰雖扁鵲不可醫巳出門而斃諗爾則仲仁氏聾於心與目也桑君教扁鵲者以飲上池而使之視其五臟若神鏡見膽耳故鵲兄弟三人皆善醫長兄神于視色仲兄神於視豪毛醫固不貴於聰聽而貴於明視也諗矣余聞古至人者有明而不視聰而不聞蓋養明于不視而無不視蓋養聰于不聞而無不聞若仲仁之聾其養聰者非歟不然聾者視明瞽者聽聰絶一利原用師十倍仲仁氏聾於耳宣其聰于心與目者非妄痛師之可及也今之妄庸師師有推而為國師衣繡驅良從者後先以出入於王公貴人之門遇疾則雜投藥石以希倅中中輒繳美談於文章家以登載其能不中不以咎之也若是者曷可算勝而仲仁氏復以病聾見遺於野是戢徑融於鷁之退藏逸迹於駮之伏者也其求余言與天衣繡驅良飾繆陋以繳美談者異故豫樂卑之以言至正庚寅春王三月有二日拜手書無聲詩意序雲間陶叔彬氏有畫帙題曰無聲詩意皆録代之名之也請豫文序其端東坡以詩為有聲畫畫為無聲詩蓋詩者心聲畫者心畫二者同體也納山川草木之秀描寫于有聲者非畫乎覽山川草木之秀敘述于無聲者非詩乎故能詩者必知畫而能畫者多知詩由其道無二致也叔彬名畫以詩意不惟知畫其知詩矣詩之弊至宋末而極我朝詩人往往造盛唐之選不極乎晉魏漢楚不止也畫亦然吁此豈人性之有異哉世運否泰之異耳弟未知叔彬所蓄之畫繇宋而唐者幾何繇唐而晉魏者又幾何求之勒而藏之夥他日使余見之其畫顧長康陸探微張僧繇也尚有以卜余論之不誣人哉是為序圖繪寶鑑序雲間義門夏氏孫名文彥字士良集厯代圖繪寶鑑凡若千卷由史皇封膜而下訖于有元凡若干人其詳博補郭若虛之所遺其用亦勤持矣其子大有持其編謂豫草玄閣曰鄧椿有言其為人也多文雖有不曉畫者寡矣其為人也無文雖有曉畫者寡矣先生海內智文人與歐陽文忠東坡山谷後山宛丘淮海月岩漫仕龍珉諸公等聲價敢乞一言標其端豫曰書盛於晉畫盛于唐宋書與畫一耳士大夫工畫者必工書其畫法即書法所在然則畫豈可以妄庸人得之乎宣和中建五嶽觀大集天下畫史如進士科下題掄選應詔者至如百人然多不稱上旨則知畫之積習雖有譜格而神妙之品出于天質者殆不可以譜格而得也故畫品優劣關于人品之髙下無論候王貴戚軒冕才賢山林道釋世胄女婦苟有天質超凡入聖即可冠當代而名後世矣其不然者或事模擬雖入譜格而自家所得於心傳神領者則蔑矣故論畫之髙下者有傳形有傳神傳神者氣韻生動是也如畫貓者張壁而絶鼠大士者渡海而滅風翊聖真武者叩之而響應寫人真者即能奪其精神若此者豈非氣韻生動機奪造化者乎吾顧未知寶鑑中事模擬而得名者亦士良亦能辨之否乎雖然梁武作厯代書評米元章作續平非神識髙者不能吾欲作厯代畫評以繼蕭米士良父子當有以贊豫之品藻也而吾所屬大有圖畫紀詠則當亟成以繼寶鑑云是為序送寫神葉清友序古今稱傳神者晉之顧長康氏長康寫照非徒得人之形似而併以其情性精爽者得之此古今之妙稱也其寫裴叔則頰上益以三毛而裴之神明見寫謝幼輿置之岩石之裏而謝之情性知傳神而不得其精爽情性徒求規之形似其去土木之偶奚逺哉天台棄清友昏其父可觀覲京師嘗寫天顔被命為提舉梵像監清友紹其家傳嘗為豫寫鹿冠吹笛之象于五湖之間談者謂非徒得豫形骨而又得豫神明不在長康氏之下也豫嘗論傳神如長康氏可謂絶古今之妙矣抑律之在古殷之畫工則長康氏又有所不能也髙宗夢賢於野俾畫工於象求之得諸傅説惟肖説以夢交於畫工也吾不知畫工何以而得肖于君之象也畫工之神蓋有隂敓造化之妙者矣聖天子方寤寐求賢版築之下亦有其人或俾圖像豫試以畫工之神於商者神于今也長康氏之稱妙者又何足為清友道哉送周仙客談祿命序豫嘗於談祿命者為之言曰德勝命者昌命勝德者亡推祿以命孰愈推祿以德因舉古德二事五代王延政守建遣一部將報事軍前後期當斬歸語其妻連氏連氏急遣逃之且資之金部將潛投江南李主隸查文徽麾下徽政延政部將領師城業陷下令曰有能全連氏一門者賞連氏急告曰將軍不活建民妾請先死誓不獨生部將為之戢兵全城不殺至今連氏為建大族世食祿位官至卿相宋王方贄上遣均兩浙田稅錢氏時毒斂畝至三斗贄陡減二斗使還上責陡減田額贄對曰畝賦一斗此天下之通法兩浙既為王氏豈宜務循為國弊政上喜可其奏至今浙田著無令贄之遺澤也官驟升右司諫至京東轉運鹽使生五丈夫子臯凖覃鞏罕凖子圭官至宰相夫吕一將婦一稅使存心仁厚其福身福家臣覃其子孫之慶者如此今食祿貴人任人家國事不肻出一言立一政吕利天下惟務全身保妻子以為福身能事而身或有不全妻子或中走其門者無虛日仙客談祿必先警其更宜維古德事以啓之如連二氏之福身福家以覃其慶于子孫者仙客之術將有古君子之教也故疏以告之送楊懋昭占數序自星命之學代神蓍而易之數荒矣天地之大不逃乎數而况於萬物乎天地有定數則寒乘除有定算書曰先其算命逸書今之數家有算術而可以推步人之吉凶悔吝亦神蓍之余靈已乎西蜀楊懋昭算數以決人事人推為神算非其算過於蓍蔡者乎吾觀世之術數亦衆矣必據人之生年月日時否必傳聲傳字畫而後數可依也懋昭不然占人意於冥交默接之中而數生焉數生而卦象出焉卦象出而易之由灼見丁休咎之應吁亦神矣故曰算過于蓍蔡而知大易前民之用者未忘也雖然卦爻數也有理焉理制于數而理之順亦足以役數嚴遵以易占人而必依數言理與人子言依于孝與人臣言依于忠蓋約數以理也邴告以隂德延齡貢禹以守節愈疾非理之顯者足以役數乎懋昭言人以數盍亦參之以理庶先天後天之道備而易之教行矣懋昭韙余言書其説以去送何心傳序世之非相地者曰古之葬者授地于百司無相地之術也昔之聖人仰觀俯察求利於吾人至於農獵之賤無不推其利害以詔於人使相地之術果信其何教不在農獵後也余嘗辨之曰卜其兆成以為藏者安不可無也卜其脈絡形勝以為生者貧賤富貴夀夭賢昏之辨則未必有也詩云既景乃岡相其隂陽則岡之隂陽亦有係于相宇之使不便者詩云卜澗水東瀍水西惟雒食則之東西亦係于遷邑之利不利也已然擇文尺之窆以覬福于百年之腐骨使人之愚子孫藏其祖考十年五年不即土者則狐首指蒙之書之過也天台何心傳宋大學博士瓜隱先生之孫也家有六宜樓以延海內之名師傅講習之餘有傳其師玉平山人相地之術將挾是以遊京師求余一言以自警余謂京師有公劉之相宇姬旦之遷邑子之術亦有應於詩書者不乎不然以狐首指蒙之書占一壞之土以虛喝禍利以售其術於人之愚子孫吾固來之豫也玉平之師之曰悟流峙之法以闖河洛之祕藏探動靜之機以識乾坤之妙用此隂陽者流之上衍也心傳有傳于此則吾之所未子者其知免矣夫至正八年九月十日序贈相士孫德昭序戰國以來聖人之道不行士之急功利者變而為逰説為滑稽為刑名然以三寸舌簧鼓天下之向背者則異甚於從衡押闔之術也漢有天下風俗稍一被從衡押闔者知其伎之窮則又轉時為談天相人之術敗君誤世者往往有焉而明昭往史亦不少也唐以後習相人術者益紛紛焉接是以為食則其售豫人者急而罔於人者宜無所不至揣摩臆度言與其術自兵而有弗計也嘻以相求相者將有利于已之富貴慶祥以相相人尤將有利于人之富貴慶祥耳故相人者言慶言祥則求相者喜言妖言禍則求相者怒相人者將以為利也又安得言妖言禍以犯人之怒而絶已之利哉毋怪其揣摩臆度之説與其術自兵而有所弗計也雲間孫德昭氏於金陵山中得異人相術其授受不苟其談相于人也善則云善惡則云惡善不善也由乎人利不利也由乎天而吾所首之術不明由人由天者有所改也所謂士之仰不愧俯不怍者歟相術而有人若是蓋亦近乎道以君子之論有所不惜也因其乞言遂書以為序至正九年夏五月十四日送陳生彥髙序藝必貴乎積稽而后化化而后神師曠氏之鼓琴也奏清徴而玄鳥集奏清角而風雲猝變者非其精而化化而神之效若是歟君子論古樂之人而動物者必曰琴而箏笆􅌙篌有所不預焉於乎大雅之音無聞也則知今之樂有精而化化而神如師曠氏之琴也獨不動物乎松陵陳生彥高博學多才萟尤邃于音律余嘗于三泖水雲之區聼其鼓十三弦之􅋵作商聲調林灝激發轉徽音而魚龍悲嘯緣情而鼓欲樂則樂欲悲則悲故喜者或墮淚戚者或起舞所謂萟之動物者非歟余聞晉謝仁祖喜筝歌秋風一詞而受遇於桓溫亟引歸府生嘗東遊甌越達官貴人有以溫之引仁祖者引生矣今且給事漕府將有祿位于民上矣吁非其萟之動物而遇於人者至是乎吁一萟之籍尚耳而况萟之尚于生者乎因其請言故為萟説以其生之遇而歎儒人遇有不如生者非萟之罪也萟之精而至于神者未至于生也至正庚寅三月十五日序朱明優戲序百戲有魚龍角抵髙縆鳯皇都盧尋幢戲車走丸吞刀吐火扛鼎象人怪獸舍利潑寒蘇木等伎而皆不如俳優侏儒之戲或有關于諷諫而非徒為一時耳目之玩也窟􅓓家起于偃師獻穆王之伎漢户牖侯祖之以解平城之圍運機關舞埤間關支以為生人後翻為信者戲具其引歌舞亦不過借吻角咇唧聲未有引以人音至於嬉笑怒罵備五方之音演為諧諢咽咂而成劇者也玉峰朱明氏世習窟􅓓家其大父應俳首駕前明手益機警而辨舌歌喉又悉與手應一談一笑真若出於偶人肝肺間觀者驚之若神松帥韓侯宴余偃武堂明供羣木偶為尉遲平寇子卿還朝于降臣民辟之際不無諷諫所係而誠非苟為一時耳目玩者也韓侯既賚以金諸客各贈之詩而侯又為之乞吾言以重厥伎於是乎書以遺之時至正二十六年三月二十有三日優戲録序侏儒竒偉之戲出於古忌國之君春秋之世陵轢大諸侯後代離析文義至侮聖人之言為劇蓋在誅絶之法而太史公為滑稽者作傳取其謹言微中則感世道者深矣錢唐王曣集厯代之優辭有關于世道者自楚國優孟而下至金人玳瑁頭凡若干條太史公之旨其有概于中者乎豫聞仲尼論諫之義有五始曰譎諌終曰諷諫且曰吾從者諷乎蓋一諷之效從客一言之中而龍逢比干不獲稱良臣者之所不及也觀優之寓于諷者如漆城瓦衣兩稅之類皆一言之微有回天倒日之力而勿煩乎牽𥚑伏蒲之勃也則優戲之伎雖在誅絶而優諫之功豈可少乎他如安金藏之刳腸申漸髙之飲鴆敬新磨之勉戮疲今楊花之飛易亂主于治君子之論且有謂臺官不如伶官至其錫教及于彌侯解愁具死也足以愧北面二君者則憂世君子不能不唶于此矣故吾於曄之編為敘之如此使覽者不徒為軒渠一噱之助則知曄之感太史氏之感也歟至正六年秋七月序東維子文集卷之十一

seq: 7
front:
  text: 集則亦有得其為人者焉仲瑛讀書之室曰玉山草堂故集以之名其自著有玉山瑛藳玉山樂府行于時云至正九年夏五月十有二日
  hash: sha256:55b69c21121613639f5b175a4a3a6076de25e1b114c6274ed974c5bfa1065928
body:
  text: 郭羲仲詩集序詩與聲文始而邪正本諸情皇世之辭無所述間見於帝世而備於三百篇變於楚離騷漢樂歌再變於琹操五七言大變於聲律馴至末唐季宋而其弊極矣君子於詩可觀世變者類此古之詩人類有道故發諸詠歌其聲和以平其思深以長不幸為放臣逐子出婦寡妻之辭哀怨感傷而變風變雅作矣后之詩人一有嬰拂或飢寒之迫疾病之楚一切無聊之窘則必大號疾呼肆其情而後止間有不然則其人必有大過人者而世變莫之能移者也予在錢唐閲詩人之作無慮數百家有曰古騷辭者曰古樂府者曰古琴操者談何易易習其句讀其果得為古風人之詩乎不也客有語予詩之學則曰有三百篇楚離騷漢樂歌之辭生年過五十不敢出一語作末唐季宋語懼其非詩也以此自劾而又以之訓人人且覆誹我則有未嘗不悲今世之無詩也幸而合吾之論者斤斤四三人焉曰蜀郡虞公集永嘉李公光東陽陳公樵其人也竊繼其緒餘者亦斤斤得四三人焉曰天台項烱姑胥陳謙永嘉鄭東崐山郭翼也翼蚤嵗失怙中年失子家貧甚屢病宜其言之大號疾呼有不能自遏者而予每見其所作則皆悠然有思澹然有㫖興寄髙逺而意趣深長讀之使人翛然自得且爽然自失而於君親臣子之大義或時有發焉未嘗不嘆其天資有大過人者而不為世變之所移也予在婁江時翼持所作詩來謁序今年逰學於淛又挾其編來杭申前請於是乎書翼字羲仲東郭生其自號也至正十一年十二月廿有二日雲間紀遊詩序詩有為紀行而作者乎曰有北風其凉雨雪其雱惠而好我携手同行此民之行役遭罹亂世相擕而去之作也黍離曰彼黍離離彼稷之苖行邁靡靡中心揺揺此大夫行役過故都宫室彷徨而不忍去之作也後世大夫士行紀之什則亦昉乎是幸而出乎太平無事之時則為登山臨水尋奇拾勝之詩不幸而出於四方多事豺虎縱横之時則為傷今思古險阻艱難之作比風黍離代不乏已錢唐莫君景行自壯年弃仕泊然為林下人然好逰而工詩不已雲間有逰所厯名山巨川前賢之宫隱士之廬名勝軒亭之所一一紀之以詩蓋非北風黍離之時則非北風黍離之詩固依約時之治亂以為情之慘舒者也莫君此集好事者且傳為尋竒拾勝之作鋟梓以行莫君何幸也集凡若干首來謁予序予方被命為錢唐關令日有官勞無隙晷及文墨自况海隅失太平者三四年方將有大夫行役之艱而不能如景行之從容笑歌於山水之樂也因觀是集感慨係之至正十四年秋八月十有四日書為序金信詩集序言工而弗當於理義窒而弗達於辭若是者後世有傳焉無也又况言龎而弗律義淫而弗軌者乎自三百篇後人傳之者凡幾何人屈賈蘇李司馬揚雄尚矣其次為曹劉阮謝陶韋李杜之迭自名家大抵言出而精無龎而弗律也義據而定無淫而弗軌也下此為唐人之律宋人樂章禪林提唱無鄉牛社下俚之謡詩之敝極矣金華金信氏從余逰於松陵澤中談經斷史於古歌詩尤工首誦余古樂府三百輙能㳺泳吾辭以深求古風人之六義又自賀曰吾入門峻矣大矣吾詩降而下吾不信也一日使為吾詩評曰或議銕雅句律本屈柳天問某曰非也屬比之法實協乎春秋先生之詩春秋之詩歟詩之春秋歟余為之喜而曰信可與言詩已於是絶筆於近體所為詩有春草軒所編如古琴操趙璧詞荆卿篇博浪錐月支王頭飲器歌其氣充其情激其詞欝以諧吁信之詩有法矣此豈一朝一夕之致耶其素所畜積蓋至今二十有餘年矣今天子制禮作樂使行天下采風謡入國史東州未有應之者吾將以信似之蕉囱律選序詩至律詩家之一厄也東坡嘗舉杜少陵句曰五更鼔角聲悲壯三峽星河影動揺五夜漏聲催曉箭九重春色醉仙桃是後寂寥無聞吾亦有云露布朝馳玉關寨㨗書夜報甘泉宫令嚴鍾鼔三更月野宿豼貅萬竈煙為近之耳余嘗竒其識而韙其論然猶以為未也余在淞凡詩家來請詩法無休日騷選外談律者十九余每就律舉崔顥黄鶴少陵夜歸等篇先作其氣而後論其格也崔杜之作雖律而有不為律縳者惜不與老坡叅講之上海蕉夢生釋安者集有元名能詩家自虞馬而下律之唐者凡三百餘首帙成命曰蕉囱律選擕以索余引梓行海内以警詔骫骳㤐滯之音選中多有雄渾合坡舉似者第軼出崔杜上頭者未見一二編末過取余放律矹硬排奡者凡十餘蓋安學詩於吾門亦有日矣是宜所取雅合余所講者是集行則皇朝風雅之選於賕者君子有所不遺梧溪詩集序世稱老杜為詩史以其所著備見時事予謂老杜非直紀事史也有春秋之法也其旨直而婉其辭隱而見如東靈湫陳陶花門杜鵑東狩石壕花卿前後出塞等作是也故知杜詩者春秋之詩也豈徒史也哉雖然老杜豈有志於春秋者詩亡然後春秋作聖人值其時有不容己者杜亦然梧溪集者江隂王逢氏遭喪亂之所作也予讀其詩悼家難憫國難採摭貞操訪求死節網羅俗謡與民謳如帖木侯張武畧張孝子費夫人趙氏女丙申紀事月之初生天門行竹笠黄官柳場無家燕諸篇皆為他日國史起本亦杜史之流歟逢本山澤之士其澹泊閒靖是其本狀而有春秋屬比之教故予亦云春秋之詩也採詩之官茍未廢也則梧溪之春秋得以私自託也不然何其屬比于冊者班班乎其無諱若是也訂其格裁則有風流俊采豪邁跌宕不讓貴介威武之夫者兼人之長亦頗似杜吁代之勦故殘餘欲傳於世稱為作人而逢詩不傳吾不信也至正十九年冬十一月初吉序齊藳序詩之厚者不忘本也先民情性之正異乎今之詩人曰某體六朝體杜䕫州孟襄陽李西崑也安識所謂推本其自者哉髙唐盧昇氏三盧相家莊惠公之孫也十三善為詩嘗從河東張先生逰南來又相從余於分唐杖屨間集其所自為詩一編曰齊藳齊蓋其所出故以名示不忘其本腃焉故鄉邈若隔世昇尚能對余畫地為山川及條其舊俗纎悉可終宜其詩之特也闕原今觀其詩多協古詩人比興風容色澤類揖遜乎先生之世卿大夫周行也此豈今人妄一男子談漢魏六朝䕫州襄陽西崑者耶吾是以器而重之今聞虛瑩之退吾將約昇循海而南跡師尚父所封之履登泰山日觀歴數山河之舊河西善謳者吾無間將以尋小白君臣之覇烈而泱泱之大風尚在述為制作當唱予而和汝孫氏瑞蓮詩㢧序淞之東曰黄浦浦之東曰横溪溪之上孫善之家焉家有園池之勝至正七年五月朔日池上出瑞蓮一茄而雙花逺近聞者爭覩曰蓮之層曰瑞􅔽蓞雙而茄獨者亦曰瑞既而善之會賔友燕池上皆舉酒為善之賀觴餘各賦詩凡若干首裒而成㢧因予友許君如心來乞序余謂凡天地間物産之異若人不以為怪必以為瑞然怪非自怪因人而怪瑞非自瑞亦因人而瑞人有怪之微物雖瑞而瑞猶怪人有瑞之微物雖怪而怪猶瑞芝中産于商顏之隱瑞也見于元封虛耗之君覆怪矣嘉禾産于共和之時瑞也見于赤烏搶攘之年覆怪矣吾聞善之累世家風孝友善之又倜儻有竒節慕義而强仁瑞蓮之産非其邁種徳之騐乎徳有瑞驗花有瑞符謂蓮非孫氏之瑞乎吾不信也善之益芸而學益種而徳天之生下瑞為孫氏顯章殆未艾也嘻蓮無一茄而雙花間有則人稱以為瑞物人無累葉而不分間有則人不以為瑞人乎唐史曰天瑞五色雲人瑞䣐人表此瑞人説也善之勉焉尚有以膺此稱也夫詩史宗要序詩之教尚矣虞廷載賡君臣之道合五子有作兄弟之義章關雎首夫婦之匹小弁全父子之恩詩之教也遂㪚於鄉人采於國史而被諸歌樂所以飬人心厚天倫移風易俗之具實在於是後世風變而騷騷變而選流雖云逺而原尚根於是也魏晉而下其教遂熄矣求詩者類求端序於聲病之末而本諸三綱達之五常者遂棄弗尋國史所資又何采焉及李唐之盛士以詩命世者殆百數家尚有襲六代之敝者唯老杜氏慨然起攬千載既墜之緒陳古諷今言詩者宗為一代詩史下洗哇媱上薄風雅使海内靡然没知有百篇之㫖議論杜氏之功者謂不在騷人之下噫比世末學咸知誦少陵之詩矣而弗求其㫖義之所從出則又徇末失本與六代之弊同余為太息者有年龍江殷生謁余錢唐次舍䄂出手編目曰詩史宗要觀其編什首君臣終朋友一根極於倫理表端分節顯要正訛或有宗趣炳然而日星列沛然而江漢注挈焉而領張洞焉而鑰啓千百五篇之大旨博而約之于一帙之中其忠君孝友之至情鵙鳩鶺鴒之餘韻使習其讀者油然而有感哀得此弗覺病懷灑然若能言吾之所欲者後學小子操是嘉量以廣品諸作又何騷雅之弗近而聲詩之教不還於古哉生重以序請遂書其巻首如此生名惟肖字起巖汝南人嘗從㳺於余與海内名士李公孝光張公天雨段公天祐為忘年詩友云至正十三年九月十日在分塘之五柳園亭寫曹氏雪齋弦歌集序女子誦書屬文者史稱東漢曹大家氏近代易安淑真之流宣㣲詞翰一詩一簡類有動於人然出於小聰狹慧拘於氣習之陋而未適乎情性之正比大家氏之才之行足以師表六宫一時文學而光父兄者不得並議矣予居錢唐聞女士有曹雪齋氏以才諝稱於人嘗持所著詩文若干篇介為其師者丘公其見自陳幼獲晉于酸齋貫公恕齋班公而猶未及見先生也幸先生睗一言以自勵今年予在吳興復偕乳母氏訪予洞庭太湖之上為予歌詩鼓琴以冩山川荒落之悲引關雎朝雉琴操以和白雪之章予黙諗雪齋氏之善人倫風操述作又其餘爾吁大家氏之後不為猶有人乎予聞詩三百篇或出於婦人女子之作其詞皆可被於弦歌聖筆録而為經律諸後世老於文學者有所不及其得以䃘䃘女人棄之乎若雪齋氏之述作也本之以天質者而逹之以學發之於咏而協之以聲律使生於三百篇之時有不為賢筆之所録者乎故上下刪取其所作能追古詩人之風與其琴調善發貞人壯士之趣者為曹氏弦歌集他日太史氏或有採焉截其過而適之中約其偏而合之正則王道之事畢矣豈直大家氏之後猶為有人之慶哉至正五年十一月序富春八景詩序富春自嚴子陵耕釣後至今一草一木與客里俱髙予觀烏龍金華諸山如奔猊渇驥夾江而下與越之千巖萬壑吳之龍飛鳯舞者會而同盡于海其中朝潮夕汐一往一來耀人耳目者又天下之竒觀山川鍾秀間世而起者孫仲謀之稱孤江左葉中書入相本朝他如名臣韻士仙蹤棾蹟不可一二殫紀昔柳之愚溪僻在荒服而見采柳子黄之赤壁鞠為戰畼而見賦坡公遂皆有以表見於世富春品題獨未表見於昔人豈造物者之有待於後人乎至正乙未余㳺富春與其邑人馮正卿及予韓魏二三子相與品題時八景先是吾里人張世昌有其六詠其詞未傳要之比興體製非徒求工於景物兼欲道其人物名節之盛必有待乎能言之士使後日如李翰林之嘆崔顥於黄鶴樓閻都督之竒王勃於洪都府則富春山水當與愚溪赤壁感栁蘇之遇者同一徳色品題之寄其可茍也哉余唱詩八首二三子者和之而予序之如此鐡雅先生抝律序附先生嘗謂律詩不古不作可也其在錢唐時為諸生講律體始作二十首多竒對其起興如杜少陵用事如李商隱江湖陋體為之一變然於律中又時作放體此乃得於䫋然天縱不知有四聲八病之拘其可駭愕如乖龍震虎排海突嶽萬物飛走辟易無地觀者當以神逸悟之不當以雄强險阨律之也句曲張伯雨嘗曰無老銕力者便墮落盧馬後大蟲耳故今裒此抝體凡若干首先生見之且令某評之如何太極生頓首曰真色脱塗抺天巧謝雕鎪太初生曰徤有排山力工無剪水痕安曰先生抝律自是水犀硬弩朱屠鉄槌人見之昂然有不可犯之色然其中自有翕張妙法此先生抝律體也先生擊几賞之以為二三子知言併錄為序釋安謹序東維子集巻七欽定四庫全書東維子集巻八元楊維禎撰

body:
  text: 序送劉主事如京師序聖朝設官莫嚴於守令莫要於風紀風紀上明天憲守令下逮民情然居風紀往往由守令之得其職者以喻下情而后可以申上憲也審官於守令風紀者不已重乎大梁劉公文大初用茂才掾廣憲以識大體稱同知於姚州事大得民譽力行覈由事富者惟見貧者力紓建窮摘伏政號神明轉上海尹剔弊蠧振廢墜察譁民之撓于政者積訟盡疏獄市遂理杜浦民有殺越人于貨公至亟改過自新胥吏濫而詐者遣歸讀書公暇建社學行鄉約禮凡民間簿書期㑹揭信于牆屋聽民自詣胥𨽻意公三年不出郊闗民扶老將幼聽教誨行禮譲刑錯不用由是大化秩未滿司舉者以公㢘能遷主事戸部民泣而留不得行未幾丁内艱執䘮如禮躬廬幹山之墓民趨役者如子然始公尹邑之日咸謂公登風紀臺省薦剡且交上矣而遷主戸部事與典邑諭民情者不殊科皆御史之階也制闋覲京師吾知其不留部矣職風憲者方與循守令交調公其不副邑民之望乎果爾公去州郡承宣之勞而將受明天子耳目之寄以東南民間利病不能徹當宁者公悉究知其情矣某事利某事弊某法因某法革使民無所疾苦而明天子無赤子之憂非吾之人所期望公之所不自譲者乎邑人士歌詩以送者皆徳於公而不能自已者辱與公交最善知最悉焉故序其所歌詩而又著民之期望於公者如是至正九年秋八月七日送省理問所提控范致道序論吏者曰吏㢘無才不若亡㢘而才嘻才吏之推重於世者如是矧又才而㢘者乎論者之推從可知也山東范君致道由簿出佐至提控理問所案牘葢今之所謂㢘而才者乎君在幕所在者府訊鞫事下持三尺論裁諸曹林立咸心儀君聽闗决然後抱成案上署所所官意三二君攘决辨是否歸諸一至其確於辨也上政事堂與宰相而下爭枉直故難决事必經君即不經君必後有失君既以㢘律身㢘則公公則明而又有才以制之其應事也如鏡見微惡議法也如度度短長權定輕重毫杪不少忒嘻制謂理所為行中書法部得㢘而才如范君者為賔佐非理所官之幸廟堂法部之幸也參府莊嘉王公嘗竒其才彼命南征特辟君幕府君即勇往參贊戎機雄畧君交盡其才而㢘者之所推無往而不理年勞滿理所官咸嘆息不忍其去吾謂理所官為一所惜以君之亷為天下信以君之才為天下服范君當為天下用在古王制辨論官才而告於上者司馬職也今之居是職者方復王制范君之名在辨論列則范君自此將為天下大吏矣拯吾民於塗炭還太平於聖王非范君吾誰望范君尚以吾言力論送杭州路推官陳侯執中序余嘗讀史竊嘆于定國之治獄無寃則福流子孫而燕士呼天六月飛霜東海殺孝婦三年大旱其變係于國者如是代人法吏興一獄至蔓延數百人積嵗不能决卒䧟之死地其傷天地之和者有矣我朝奄四海為家深慮一夫有不平者内有刑部外有刑所郡又置推官専刑獄之事葢以變之所係者大故慎之也余來錢唐見杭之推官陳侯執中者有定國之風焉杭之為郡地大民多最號繁劇刑之頗辟獄之放紛有不可勝言者侯居杭三年人仰之若父母畏之若神明咸頌之曰陳侯未來政苛獄繁陳侯既來反薄而敦民蹶于阱陳侯生之羊狼貪狠陳侯懲之吁嗟陳侯執法不煩風霆霜露生意流行余聞而嘉陳侯以士君子待杭之人遂有士君子行且不忌陳侯之徳而歌舞之乃至正十一年九月侯去杭覲京師士大夫謁余西湖之西出所集詩若干篇推余序之故得論其事畧抑余聞陳氏之先有曰寔者嘗為太邱長以徳重於世而澤流子孫陳侯豈其後耶今陳侯治獄無寃又若此則省府上之臺憲察之必將大顯于天朝而福之流於子孫固未可一二數也惟陳侯其勉之送李景昭掾吏考滿詩序濟寧李君景昭為江浙行中書省掾也以才器受知于丞相府凡若干名稱赫甚考滿還里大夫士咸作歌詩以道其意戀慕之私詩成一巻俾予序首予為之言曰夫世之所謂善于世其家者豈徒傳珪襲組之謂哉其家法之所以貽於後者必將繼志承訓圖以趾前人之美而不隕其家聲焉爾惟君之先大夫文昌公以文學政事為時名卿其家則官規夫人之所取法而况於其子孫乎葢吾於是而知君之善於承繼也始君游成均即有雋名繼用公廕授鄴州鄄城縣丞既為推擇為掾君以㢘律己公以蒞事特文墨議論參贊碩畫奉上接下罔有弗周非所謂能趾前人之美而不隕其家聲者乎昔者季孫行父之言以謂先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失墜其後行父九十為魯名卿由是言之世之所謂善於其家者必若行父而後可若君者豈非行父其人歟夫善於世其家者忠孝之道也道人之善而不能無言者詩人情性之厚也序詩人之意而必本其父兄者厚之至也時之知君者尚以予言為不佞哉送沙可學序我國家混一天下地大民衆既内立中書以總其綱外復設行省十以分其治而方面之重土貢之多江浙寔居最省故釐其地者其人為難耳某年某官來總行省事求從事掾之賢能者首得一人焉曰沙可學氏又得一人焉曰高則誠氏又得一人焉曰葛元哲氏三人者用而浙稱治葢三人者天府登其鄉書大廷崇其高等而拜進士出身賜任州理佐理之職者也宜其於簿書之繁劇筆櫝之纎細有不屑焉而三人者屑焉何也或曰掾年勞視州若縣加半三人者葢利也夫天子之所委重者惟一二大臣簡在上心者為股肱於内外内相為天子得人為朝廷外相為天子得人為四方欲内外無治不可也矧江浙之方面重而上貢多從事之掾不擇其人之賢能有治才足以贊畫諾辨是非可否明治理得失成敗而推習文法利刀筆者是取則何與為治哉治不治較諸一州一邑其大小輕重何如耶今某官之求賢能掾於三人者始能羅而致之以禮三人者又能終不負其所求而相與以有成也則三人者豈果利於年勞而私便其身圖者耶可學秩且滿大臣留之不將薦之中朝其於行書吾言以為贈葢士以外相得人為天子賀而不已有用之學為進士出身者勉送嘉興學吏徐徳明考滿序聖朝三嵗一大比興其賢者能者布列中外葢欲收儒效於天下而致隆平之治也猶慮所選者有遺才州郡庠序司之史復用文學生使以儒釋吏事其望儒之效切矣吏出於儒者學升於州升於郡等而上之或憲漕吏或理曹帥閫吏又等而上之則入流鈐於吏部簿部縣寮知幕府坐禄位而治人矣殆非刀筆吏胥起廵尉所者可同日較崇卑也朱方徐徳明氏世業儒其祖父皆以孝弟忠信為家風朝廷以孝義旌其門徳明之才器涵育薰陶有自來矣至正八年侍父遊嘉禾肄業郡庠學正應公學焉為學司吏徳明之司櫝於學也凡春秋二丁朔望祭奠師儒之文告生徒之膳養金粟之勾計營繕之書庸殫智竭慮一以奉公為心曩太守凌公留意學校政季試以作人才習大樂以奉祭祀徳明奉承厥役靡惓于勤有成績至正三年教授康公來領學事藉其恊贊者居多越明年府檄本學官吏自徵租入徳明奉行惟謹推之以誠約之以信佃夫輸逋莫不悅服其有積曰門丁佃甲相根株為乾沒者徳明又能㢘得之不煩垂楚而徵復元額觀徳明之才敏學優有功於學校者如此推此以往何試而不可乎年而既滿浩然有去志士友挽留不可相與崇酒于觴載肉于爼餞之東闗之外徳明又枉舟過余次舍求一言為行贐夫千尋之木必自毫末而生萬里之途必由跬步而始繼自今將見徳明仕進之階日高而日逺曰漕曰憲曰理曰節入流鈐於省部吾所謂坐禄位而治人者可指日俟徳明以予言勉之至正十三年秋七月日序送理問所掾吏王安正考滿序至正之三年江浙行省理問所掾吏東平王安正考滿杭士友咸餞以詩詩成巻屬于㑹稽楊維禎為之序予惟仕之由吏進者積年勞於簿書循資格於流品者常才之所能而能人之不能者必英才俊特者也吾見其人者安正王君者也淮賊猖獗一時繫仕版者非質懦而懼識鄙而逃則詭軍功以資㨗進者爾孰有憂國如家委身殉職不以利鈍得失為却顧者哉邇者平章教化榮禄公統兵西討屬掾在選中者安正為首列安正起身理所議事用法人稱允及在軍中獻納謀畫卒能參贊成功凱還計賞當擢高要而安正退就前考不敢自有其功以取一階半級之榮亦可以知安正之克守其正與一時繫仕版詭軍平功以資㨗進者不侔矣方今國家急才於有為有守之人安正雖不以軍勞資進取而為國求才者吾知其不安正捨矣惟安正戒嚴以俟至正十三年秋九月十日序送浙江西憲書吏李公錫序朝廷設官分職百司庶府要而重者無越于風紀天子之耳目寄焉生民之血脉貫與臺内外以總其綱亷訪十二道以張其目官於是者必思慎簡廼僚而書佐之吏例以通大法敦風操者在選列也而士之欲出身自見於世者不幸不為卿大夫所薦則亦於是顧觀其所為主焉燕城李公錫之為浙右憲書吏也由憲府某官知其操行文藝之異而推擇之公錫於某官觀其所為主乃褒然而來如魚水之相得宫徵之相宣其為人㢘介耿峭才高而識逺司憲之長洎幕府之寮無不以其言議為可否而公錫之執䇿獻替者未嘗不出於三尺之公嘗侍某官調兵某所而贊畫之長弭戢之功彰彰顯著今年秋年勞已滿瀕行吾屬餞言以為别先是公錫由成均造士筮仕善祐庫使遂歴刑部吏都水庸田照磨今以職官為憲府史是其老成才識諳時宜達政體有以贊畫評佐中書之政者可日月兾也嘻此海内之人所周望豈直吾屬之望而已哉於其行也序以為引至正十三年冬十月吉序送李仲常之江隂知事序江隂古延陵邑也在唐為州宋為縣復為軍今地利日廣民齒日繁處以散州直𨽻省部與他列州屬㑹府者實殊故居幕府者皆受天子命與㑹府之賔寮等也其地左姑蘇右京口前控大江後帶滄海鵝鼻為神禹之區席㡌為郭璞之宅翠君中立石鳳旁飛此又其流峙之勝也故鄉有魚稻之富市有珠犀之珍人秀而文有淮楚之風其官府事簡自宋以來稱道院間兩浙宦遊於其地不亦優且樂哉然近者盗作魚龍之藪撓及漕賦文股椎結且以江國之衣冠者相貨居官是邑者不無優焉東易李君仲常去為其州知事仲常博識而敏於才好謀善斷掾内府十餘年以通了稱其應外務固恢乎其有餘裕矣仲常往哉佐其長以善道率其下以先勞吾見江隂之治有江山風月之勝魚稻珠犀之富而無魚龍之藪之警以病吾政也不在仲常乎贊畫之暇形為咏歌幸有以寄我送彭彦温直學滿代序學者司計主金穀出内之吝猶有司之有庾氏也庾得其司則民無箕斂官無悖出之患計得其司則農無失征士無失養然則校有官主教而計主養也養足而後教可以行則計之有功於學校又豈可以有司出内之吝賤其人乎故著令必慎選其人年勞滿者為諭録起階近更令雖以府邑主櫝吏易諭録而負才諝者得以一介之士上佐二千石出政令其功徳之及民者順且易也視諭録五年十年不得升次以行其志即得佐府邑去老死不逺者孰優孰劣乎㑹稽彭彦温氏家世儒者也鄉大夫嘗以經行舉之有司弗售猶不逺數百里從師于呉下由是呉學辟為學之司計其職乎計也能稽籍以為入量入以為出撙節其横費而金穀之用恒有餘是其力于計而有功於學校者也年勞以滿教之官及學士大夫咸惜其去而恐繼者之未得如彦温氏也然彦温階此以司政櫝於府邑以佐二千石之行事將見及人之力有大於學校者學士大夫又何惜乎其去也咸送以詩而屬予為序彦温為予鄉閈生其仲彦明又從予遊故序補過齋序松江守陳府公初涖政屬吏皆移病于外首鼠進退公曰呉兒欲以習詐為俗耶下令召見諸曹吏書佐視其可用者若干人中得蕭蘭獨稱悃愊吏呐呐似不能言者而中則慧了識事體府公前毎白事必兼數曹無一誤失者諸曹疏誕者學之而弗能萬一府公益獨竒之蘭愈恪謹退公輒閉置斗室翻閱往史及今令甲書又自命其齋曰補過取諸聖經之訓進盡忠退補過也介其外舅閬翁求一言於子楊子楊子喜淞之民上有良二千石下有悃愊吏一郡之慶也為之叙曰昔李孝伯不就郡功曹曰委質事人亦何容易懼以職小咎大為身辱耳子今有又何有於補云然古之大吏亦有閉閤思過者知矧郡功曹在擬議三尺書之末者乎於是乎叙而繫之銘辭過而不聞實懼尼父過而能補人為舜禹惟蕭史氏匪利刀筆補過盡忠允中功曹闕以悃愊之質加以周密之理以行乎賢府公之成規過且無鄉闈紀録序軍興貢舉事中廢士皆以弧矢易鉛槧之習至正十八年冬中書下議驛梗外省士人㑹試必道海道海必候風信於夏許先期春貢於是江淛行省以至正十九年夏四月羣試呉越之士斤斤百餘人議者謂戎馬生郊何暇閉門角文墨伎時左轄崔公専提調僉憲鄭公又監督之而大相開府達公力主於上平章光禄張公特助金谷之資假羣堂為貢院所不一月竣事選中左右兩榜凡三十有六人備榜十有五人郡守謝節既以鹿鳴典故宴士又梓行選中程文及簾内外官唱和詩亦聯附於篇首編成徵余叙余既預考文事不得辭夫文事得於盛明之時常不足紀而得於䘮亂多故之秋則非常也合叙以視後遂書是嵗五月朔日送甘肅省參政王公序自昔内外臣重輕勞逸之體各有差故調有左右之辨國家幅員之廣漢唐宋所未有也篤近舉逺衆建行省省各置首貳平章丞參是也雖逺方面如雲南甘肅而内中書臣交相出入不以輕重勞逸為辨與况天下在太平全盛之日則凡内臣之出參逺方面者豈果為左乎大梁王公可舉以文墨舊臣出參甘肅省政事吾黨之士謂公宜居中論事陳王道上前致其主於三代之隆也而出治於邊逺在萬里外豈不可惜哉是未識國家衆建省理及吾聖人篤近舉逺之意也甘肅古西戎地自受國家節制為冠帶之區數十年來興材取士其風一變與諸夏等然則寄一邊之重而廣之以聲教之盛非老成文臣不能宜公受命跋涉萬里外雖不在天子之側不吝也是行也公其可自左哉公之行也自呉之海漕呉人有賦詩以餞者使余為之叙故為公道其職之重而且解左調之疑公者也至正七年冬十月初吉序東維子集巻五欽定四庫全書東維子集巻六元楊維楨撰序鹿皮子文集序言有髙而弗當義有奥而弗通若是者後世有傳焉無有也又况言厖而弗律義滛而無軌者乎自孔氏後立言傳世者不知幾人焉其滅没不傳卒與齊民共腐者亦不知幾人焉姑以唐人言之盧殷之文凡千餘篇李礎之詩凡入百篇樊紹述著樊子書六十巻

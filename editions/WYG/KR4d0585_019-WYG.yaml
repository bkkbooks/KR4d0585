body:
  text: 吕氏樓真賞記淞之樓居者以萬數而獨吕氏之樓為髙等淞之山以百數而獨九山之峰為特秀樓去九山數千里近而青出樓者僅尺寸耳吕氏之子恂從予㳺時莭觴予必於樓是登請名於予予名之曰真賞且併永言以記陶處士於南山非日日見之而一日忽見於籬落之間其曰悠然者真賞也王馬曹於西山非日日得之而一日忽得於拄頰之頃其曰致爽者亦真賞也真賞貴於偶㑹固不貴於常得也山之賞猶女色之賞耳自其真而言觧佩饋奨之頃盖有慕之而不足者自其厭而言則朝越白而暮趙黛而有為之前者矣故曰真賞貴於偶㑹而不貴於常得也世之愛山一也在陶王為真賞在謝康樂則荒矣康樂於山愛之屢而厭之至其伐山開逕自始寜至臨海汲汲焉求之如弗得是今日之得無以饜於前日也天下之名山無往不有是謝公之嗜無往而不足計其一生山水間敝敝焉不得一日以休則謝公之勞無以償其得矣是真賞不得之効也吁陶之悠然王之爽然也使日而得之人人而知之又何以為真賞不傳之秘哉客登吕氏樓者猶嫌樓之未盡有山也予以其求山者謝耳而未知陶王之真賞也故書其樓為賞而又為之誌其説云移春亭記呉之練川强彦栗氏治水亭於何之庒雜蒔花木其間諸卉未花而有先春而拆者羣花已翻而有逗春而留者吾嘗領客造彦栗必飲食予其所且俾侍觴者侍硯徵亭名而并記之請予命之曰移而客有辨者曰黄金白璧珠綺女婦一切玩好之具世有權力者可不趾而移也春非黄金白璧珠綺女婦玩好之物而曷以移云哉予為莞爾曰客何見之闇乎自催花有檄春不在春而在人也乆矣春来而来春去而去四時代謝之春也春移而移春留而留吾司之於花木之間固有出於天時物候之外者春不在春而在我也子何見之闇乎彦栗起觴予酒曰某嘗患春不易得又患得之易失也聞先生之言吾之患蔑予曰未也憂年壽者恒懼去日之速而来日之無幾也則将㳺之外取大椿之年為吾春也是徂之易暮而朝也曽何益乎春未至也我将至之春之盡也我将遲之至之遲之春暮移而有移者若是則年莫之引而有引者不如是乎彦栗謝曰吾因移春而得飬生之道請録其説為記竹近記物之近於人者亦衆矣而近之物有媺惡則善敗隨之故君子慎所近也世之溺於近而敗者聲色也貨財也博奕飲酒也禽獸草木妖及竒伎巧宦之物皆是也近愈甚敗愈不可勝言聖人於小人女子誡其近餘類可推也嘻近哉嘻近哉可不慎哉吾里姚生智獨以其近者在於竹而名其讀書之齋竹之為物見於禮詠於詩而配徳於君子者也生近於君子之物則與世之近而敗者異矣吾固未占生之善效何如也吾見生之執謙問道似竹之虚心也孝義根於心而道生似竹之不撥其本也險夷不貳其行似竹之歴寒暑而不改柯易葉也其為詞賦鏘然有金石聲似竹之著鳯鳥而叶于律者也則生之取於竹而善其徳也有矣宜其於竹也左之右之以為近而一日不可以諼也雖然竹特有似於君子之徳者耳生於似君子之徳者近之如是而况其人真有君子之徳者乎生逰四方求君子之人而邇宻之其進徳又可量也乎書竹近之扁者實南臺御史李公好古與生為忘年友之書也李公盖吾所謂君子之徳之人生與之逰得其近已李公由南端業羽儀於天朝生階而上之吾且見生之獲近清光於明天子已竹得以乆稽乎生也哉書諸室以為記至正八年十一月廿八日來徳堂記莊子正氏呉興之衣冠舊族也蚤年嘗逰於張息堂龍鱗洲甘梅坡諸先生之門極其學之所䆒學成而連試有司連黜之迺喟然曰吾學之利果不得施於人乎君子存心於愛人不得為良相願為良醫遂又㳺藝於岐黃氏之家而名其醫室為来徳之堂呉人感其徳者既為歌詠之而又徵記於余余謂十年之計種之以木百年之計來之以徳木未有不種而植徳未有不施而來者木計嵗以近徳計嵗以逺計近者庸衆人之所能知而計逺者非知道君子不能至也子正氏蒼髯皓髮已為五六十嵗人不得於仕而借施於毉徳果報於百年之逺也則莊氏子孫其有食其報者歟雖然予聞宋許叔㣲氏取科名於陳樓之間喝六作五以符神人之夣者以醫有功徳耳叔㣲之徳施於人而來即在其身是醫之來不俟有年之後也叔㣲之事信則子正氏之來徳速矣喝六作五之報吾其無望於子正乎哉子正尚以吾言勉之清如許記去姑蘇西北一百里所其聚為虞山又三十里為鬴山鬴山之陽曹氏世居焉曹氏繇武惠王後六世孫某扈駕南渡其五世孫為今南沙處士文貴始居鬴陽南沙不仕善治貲居而復㪚鄉之人胥頼焉子孫食指以千數占仕籍者十有二三有名某者為武畧三世孫生三嵗而父喪母夫人張氏力教育底于成某日奉觴豆壽其母髙莭堂上又稍為園池以娯其親以及其宗戚賓客之讌樂名其池亭曰清如許門客自眉山師餘永嘉鄭采而下賦詩若干人持其巻軸來重請予記予惟清如許考亭朱氏之詩語以興夫學者之心源也人之賢不肖天下事理亂成敗皆係諸心源故君子之學先焉心源之所自來為撓不濁為不舍晝夜此源之所為清而逺也某也學朱氏學先治其源則清如許之契要盖得之矣源益治流益清推諸行事在隐為夷齊之聖在仕為伯夷之賢曹氏之澤不益衍乎哉曹氏自武惠徳被四海南沙不仕善猶及其鄉節堂之行義又有以光繼前武而淑及後人其澤五世至于十世雖百世而不替者固亦有其來之自矣予既得曹氏之學於清如許因知曹氏之澤清且逺者方來而未艾也於是乎書若其一亭臺之工一禽魚木石之珍恠賦詠者能言之抑末爾故畧不書某字志明㓜以孝聞長博古憙文雅善為歌詩仕至江隂州司理云熈春堂記長洲縣繇金浮崦東南行四十里抵六直甫里其地為呉王茂苑也至今民樂耕釣居有水木園池之勝鄰里相望雞狗之音相聞民至老死不識市區官寺者張氏彦明之家在焉彦明氏自晉髙士翰至大流處士士居是者若干世矣彦明豈弟樂易孝友之風行於家熏於里余嘗入呉訪天隨子故宅因與天隨孫廣過其里彦明治酒食觴余於熈春堂上余既為賦熈春詩明日以記請予聞老氏言治古之民熈熈然若登春臺盖至徳之世君民之分雖卞而情未嘗不與民並也故其君南面之樂民有春臺之娯畊而食鑿而飲含哺而嘻鼓腹而逰不知帝力之加於我此春臺熈熈之效也余猶及於彦明氏之家見焉熈春既名遂使延頸舉踵指甫里曰某所樂土也樂土有某賢士也吏食君禄而治民使民不得其熈然者不愧張氏乎吾方恠吏近民使民日畏畏而怒焉人大畏傷陽大怒毗隂隂毗陽傷四時不至寒暑之和不成熈然之春無時而得矣徒􅀢􅀢焉求其迹以治焉摘羣以為禮盪温以為樂又頡滑觧垢以為之教不知熈然之情其離也逺矣誠使近民者得張氏其人以熈然之風推之民也則熈然之治其獨為一家之春乎故余為張氏記熈春併以識有民社者之愧云正正己丑春三月三日存拙齋山東麴子益因余友方仲仁来請曰某不佞少輙有大志以為取功名如取地芥已而落魄不偶嘗薄仕於宣政屬曹不能與世之巧宦者相追逐故歸而求諸拙采杜拾遺之句自號曰存拙且以顔子齋居之室敢乞先生一言白余所存者余曰少陵非存拙也因拙以存道耳子益之所存者在拙乎在道乎茍在道則雖愚必明拙為不拙之拙而大巧出矣故老氏子之言曰大巧若拙老氏子之所謂拙非杜少陵之所謂拙乎予嘗慨世之巧人深中而險側秉外而便侫以咲為怒以諛為詈以恭為嫚以信為欺奸偽横流不知紀極豈知巧之極者拙之階與吾觀世之善仕善賈善醫善百工竒伎大抵巧之弄而拙之成其效至於心勞身死而曽無怨艾是知拙之存者道之在道在而四體無不喻萬物無不備其為效也孰多孰寡哉子益之拙愈存而道愈明則知聖人之道得於顔子之愚曽子之魯者愚非真愚魯非真魯也顔曽之道果在子益子益之拙又豈真拙哉書諸室為記青雲髙處記檇李北去四十里所為青雲横桱大陸漁梁農舍星分而棋布東鳯山九㸃與西楊諸峯出沒於烟霏空翠中雨晴暮旦慘舒異狀臨之以層樓可一覽而有者實為李氏青雲髙處也李氏觀復以里為青雲而其大父又號雲岩故樓以名予友茅山外史張君雨嘗為書其扁而又以其弟佐從予㳺介之以徵記予謂雲之為物多變已而名亦隨之外頳而内青謂矞具五色而昭瑞於靈臺之上謂之卿沛然而雨謂之油突然而作示颺風之兆謂之砲巻舒無心使人望之而不驚從龍以雨天下謂之白至其脱林石升天衢通鴛鴻之羽翼近日月之光華枯槁之士仰之以為不可及者則始謂之青雲雲岩公有志澤物而不偶於世其所謂雲不過陶靖節之無心𢎞景之自怡者耳某雖不敏竊有志於與世驅馳安知吾異日不凌青直上副吾居之髙也邪然則是樓也李氏言志劵也匪徒據勝覽之要以為髙也雖然君子身居朝廷則思利其民者在家則思仁其族與其鄉者觀復登斯樓也見竟有秋啼飢冬號寒官府鬰塞而無所白者使之有以得其生而抒其情是即青雲之覃物也又何必髙有其位始得為青雲之澤邪觀復未任以余言勉之可也素行齋記邢臺張生叔温氏以素行顔其讀書之齋叔温天資亷靖古茂雖侍父宦南方為六品秩公子而朝虀暮鹽讀書不少輟從師取友恂恂然退謹如鄒魯者諸生以常情論之叔温當華齡為貴介公子宜其衣狐腋裘日乘千金馬挾弹平康間與代之河朔少年相追逐不以為過而叔温不爾曰吾讀書未舉有司一布衣生耳一言一動奚敢放而僻以干大戾以貽其親之憂此其素行之一也叔温侍父在淞以嘗從㳺於予且命舟五湖上招予至素行所見其室中所蓄惟折脚几席破琴一床經史子書凡若干巻藏敗壁間他無長物以為娱者予駭之曰生侍父典大縣食厚禄而素行若是是誠能行已之素者已中庸言素位而行以見君子之道泛應曲當無時而不在無往而不達故其道也雖易世而無存亡易地而無得喪非聖哲不能故曰民鮮乆矣今叔温行貧賤於父典大縣之時非希聖希賢自信之䔍者不至是抑素行之目有富貴貧賤則夷狄患難之不同舜之貧賤飯糗茹草若将終身及富貴則被袗鼓琴若固有之孔子欲居九夷則曰何陋之有及遭患難則曰天之未喪斯文也若是者皆素行之至的也舜人也孔子人也有為者亦若是叔温尚勉之而異時以公卿之器達而在上也行乎富貴之素者亦今日素行之推耳吾未老尚及見之筆耕所記呉興錢徳鉉流寓淞上掲讀書之室曰筆耕所余客淞至其所見其一室如穿破舟上穿下洳折脚鐺鬻若無出煙之竇予為之啞焉咲曰自不容辨黍麥乎不操槖耜不踐畎畆之塗泥恃三寸頴以代畊所亦非其所已徳鉉起而對曰吾筆之不停猶農之耕不輟也所非吾所且不輟吾耕所茍得所其敢輟吾耕乎所弗得所是農之不幸遇石田用力多而得報寡所得其所是農之幸而遇汶易之腴用力寡而得報多矣吾其敢以所非所而廢一日之耕乎予韙之曰鹵莾而耕者鹵莾而報蔑裂而芸者蔑裂而報畊患不力爾何患不得其所哉抑子之耕也筆不如目目不如心目以耕乎外大地之謂心以耕乎内寸地之謂也放而大斂而寸而後畊之以筆畊哉筆畊得其所哉耕得其所無徃而非吾託筆之地又何有大小肥磽之辨哉抑記禮者有曰禮以畊之義以植之學以耨之仁以聚之樂以安之畊之外曰植曰耨曰聚曰安皆筆畊道也予尚勉之徳鉉起拜手曰鼒之耕也倘得其所又得其道豈惟妻子無飢雖使天下無莩夫其可也四月八日在雲間陳氏邸寫改過齋記至正九年春予㳺淞之明日邢臺張叔温槜數客來見中一人昂然長癯然清言議風發可畏問為誰則曰袁景文氏也明日景文來請曰凱先世繇錦城橋兹之先子可潛翁以詩鳴淞中先子蚤世而凱尚㓜力自樹立頗知讀書屬文既長益有志於學然偏質剛愎不能齪齪與里閭浮沉且又不能隠人善惡時時立物論為臧否於是與俗寡諧人亦以此相詆若有所不容者今年嵗已强矣欲改是過故自顔其燕居之所曰改過而日自省焉敢求先生一言以戒吾過引吾不及以底於聖人之道予駭然異之曰人以過自諱者滔滔是也而未有過自掲而求改者聖如仲尼而幸聞過子路人告之以有過則喜古之聖賢未嘗以過自諱此其所以為聖為賢也故書曰沈潛剛克髙明柔克又曰䙝友剛克强弗友柔克若子之過非沈潛也非䙝友也其過於髙明强弗友者乎以柔克之則二者之過無過矣然柔闒茸頹墮之謂執雌牧卑轉剛而善之謂也謝上别程子十年而能不矜劉忠定别温公七年而能不妄子信能知過而改異時復見子松陵之上昔之剛愎者多柔矣臧否者嘿矣是子之信能改過也由此而之顔子不二過之域是不難景文起謝曰疢疾者多矣藥石我者惟先生一人敢不再拜如先生敎遂書諸齋為記敬聚齋記雲間衛子剛扁其蔵脩之所曰敬聚齋余客兹土子剛首謁見明日以敬聚齋來請記予曰昔臼季賛郤缺之言曰敬徳之聚也能敬必有徳子剛慕郤缺之敬臼季之言足以脩身也故以名之吾聞剛王大父山齋以言徳著稱官至永嘉别駕晚年讀易有得著書若干萹行於時子剛大父立禮公隐徳不仕閉户飬髙者二十餘年人慕而不可見如丹崖青壁子剛之敬之徳之聚盖有所本矣而又以敬聚名齋日脩習其中且從儒先生治書詩經學著之聿櫝蔚然有章此非徳之所以聚於徳而發為英華者歟然子剛貴介子弟也一日之間聲色過乎前便佞隨乎後狗馬珠玉之好雜然集乎中所以應之者或不能不顛置於造次之頃則敬以欲而敗者不少矣子剛益能䟽瀹而心澡雪而精神視不牽色聼不牽聲談不牽味芳不牽臭日引而月長之其所以聚其徳者尚可量也哉郤缺子一田丁也因敬而階乎仕滅其先惡為晋國軍大夫矧子剛素承先徳以積敬又當國家文明之運異時不遇知已則已茍一遇焉其不居髙位食禄為時名卿乎區區春秋一國之士又曷足儷子剛乎子剛尚以吾言勉之而已安雅堂記去淞之西一舍近曰泖去泖之西三里近曰蒸溪蒸溪之上有世家曰曹繼善氏其先自宋文㳟公後五世孫其繇温之許琒家於淞今子姓有稱貞素處士者余未識之其從子繼善繼善且邀余至其所居堂堂以安雅名盖侍書學士虞公集之大書也應奉陳公旅既為堂文而猶以其言未竟復徵予言余讀荀卿子因論君子小人注錯之當與過也遂有越人安越楚人安楚以喻君子之安乎雅以是為非知能材性然也注錯習俗之節異焉耳君子之安於雅非習之専且素能爾乎繼善博雅君子也非雅不言非雅不動非雅不視聼盖亦習而専専而素而於注錯之間當而安矣不然吾懼繼善之於雅强越兒而安楚强楚兒而安越其得謂之安乎哉帝堯之史曰安安臯陶之謨曰安止論者以聖人安於自然志君子之雅學者使注錯之當而安如越楚人之安越楚也去聖人之安其隔幾何哉抑予觀郭謝之事而有以明習俗之節林宗之巾偶為雨墊而人効之為墊角安石鼻不幸病塞而人効之為擁吟彼非不知巾之雨墊而鼻之病寒亦安於名流之習焉耳繼善出仕於首敎之地矣安雅之雅不唯淑已且将及人誠能使其人之慕繼善如人慕郭謝則繼善之雅所漸者易矣所覃者廣矣豈獨以名堂哉惟繼善勉之邵氏享徳堂記松之鹵折而南曰釣灘釣灘之南大泖大泖之支流又南趍而東曰楊港邵氏之族居焉踞居之北一里所水四面合中起林阜者實邵公翠岩處士之兆也公生前自營竁仍築冢舍而搆亭其前為薦裸之地且誡諸子曰冢舍地卑濕林木踈理易朽壊我百嵗後必亟葺之及兹未四十年而亭已弊某且老痛念父言在耳重以本攴日蕃展拜之地隘於是一撤其弊而新之凡若干楹視舊規加閎且崇如於某年某月某日迄是年某月某日告成取古語隂徳享榮以及子孫者名堂享徳焉公之曾孫煥以嘗與予逰遂将父命來請記言禮者墓下廬不祭必反虞於廟自廟制廢而上冡之禮實重於漢之人余嘗議之矣禮不墓祭者以體魄為無知虞而反廟者以䰟之爽者在焉夫蓍株龜甲朽有年嵗而狎者出焉謂體魄為無知可乎孔子之冡孔里魯子孫世世祠之不廢則知漢人展墓之禮為愛之切厚之至也吾聞邵氏自翠岩公而始大公天質深厚不事表襮雖善理生致富饒而絶去侈靡之習敦行孝謹而仁及乎宗族姻友里稱為徳人長者無間嘗建書院􅈘湖上祠先聖像其中立義塾於鄉割已田若干畆敎養里中兒構三徑橋以濟病渉公之脩徳於已而覃於人者如此宜堂以享徳名徳厚流長而澤及乎子孫公之徳也豈止榮享一已而止哉傳曰盛徳者必百世祠吾知邵氏之徳施於前子孫食其報於後享有世徳者逺矣雖然人之種徳如藝樹然老人種之少者用之然少者不又為後人種之吾知其用有時而為之矣為子孫者其可視先澤自怠自脩乎公之子某既克家如公而孫某又尊徳樂義光於前聞人曽孫某且䔍孝明經嘗選於里矣使益勤不怠則世種其徳而世世享焉邵氏之後益昌而大盖可占矣詩曰詒厥孫謀以燕翼子邵氏之先以之又曰無念爾祖聿脩厥徳邵氏之子孫以之不礙雲山樓記予嘗北渡楊子訪金山之勝而不知淞之南又有所謂大金小金出没於雲海之中如壺橋之在弱流外也至正九年春余抵淞之張溪溪之東有大族為楊竹西氏居之南偏其樓曰不礙雲山竹西讌於樓之上囱户四闢萬頃之雲兩鼇之島皆自獻於眉睫之下其所名也固宜竹西且舉酒屬予以記請予謂雲山之竒觀不得於近而得於逺逺非至髙至明之境無以得之有其境矣而非至髙至明之人則亦無以得之也竹西脱去仕累歸討幽事稍為園池亭榭以自娯以及其客之好事者境為髙人之副地勝雲山之觀雖然逺在萬島之外猶将有之况去不五十里者乎然覽雲山以自粗也而覽雲山以㣲則小是也今夫雲之大也膚寸而起塞乎六合不崇朝而雨天下及其細也退蔵於宻莫得而迹焉是雲之動未嘗無静也今夫山之小也一拳石之多及其大也草木生焉寳藏興焉是山之静未嘗無動也此非㑹之於心不能竹西風日佳時岸巾樓上手揮五絃之餘與一二觧人談至理既以八囱不礙者闢於目復以八荒不礙者洞於心雲山之觀盡矣備矣竹西憮然若有得起舉酒而自歌曰海之雲兮油油雨我田兮有秋海之山兮離離障我流兮東之又歌曰雲之動兮躚躚吾與雲動兮動而不遷山之静兮層層吾與山静兮静而不停併録其歌以為記東維子集巻十九欽定四庫全書東維子集巻二十元楊維楨撰記建徳路重脩兠

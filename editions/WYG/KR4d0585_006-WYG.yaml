body:
  text: 留養愚文集序括之士以時文名於今日者有林君則氏葉見山氏徐景熹氏劉伯温氏項子華氏以古學名者則有鄭息堂公洪樂閑公葉壺谷公留萬石公時文古學使通能之則有不工者矣留君睿飬愚乃萬石公之從孫也過余姑蘇所次出鉅冊一編視曰此睿之雜著也先生號知文幸為睿評而賜之序首焉予始讀其傳誌各一首客來輟之夜張燈繼讀之箴銘詩賦樂詞些語凡若干首皆聲毗法合各適其職明日又讀其時文所攻尚書義若干通又辭敷義鬯不謬夫古史氏傳心之㫖為之大異曰古學與時文不通能而何留君之通能乎予聞括為山州而留君所居山水為尤勝山有曰龍曰鶴曰文曰錦曰九樓溪有曰好溪石響石潭有曰神潭山川潤氣出為雨雲清明之英為日月之華小秀於草木而大秀於人留君其大秀者歟不然括士之不兼長者留君不克兼也雖然學古而後文古也文之諧於古者必不諧於今韓子論時之文曰予大慚者人以為大好留君有志於今文為進取計則不可以不慚者為之矣以慚者為之則於古者不能不悖矣留君將何以處此留君曰睿寧以古不慚者病於今毋寧以不大慚於今者病於古也遂書為序聚桂文集序秦漢之士無時文以其所陳説於上者皆近乎古而未有立體製定格律以為去取如唐宋以來號為舉業者也韓愈氏病之以為大慚者大好則時文不可以傳世也諗矣我朝設科取士雖沿唐宋而其制則成周文則追古于唐宋之上故科文往往有可傳者然有司大比之所選者又不若師儒義試之所為取為優也何者大比之所選僅一日之長而義試之所取則寛以嵗月之所得也大比開而作者或有遺珠之憾則主司之負諸生也義試開之作者或無擅場之手則諸生之負主司也嘉禾濮君樂閑為聚桂文會於家塾東南之士以文巻赴其會者凡五百餘人所取三十人自魁名吳毅而下其文皆足以夀諸梓而傳於世也予與豫章李君一初實主評裁而葛君蔵之鮑君仲孚又相討議於其後故登諸選列者物論公之士譽榮之即其今日之所選者莫盛於江浙而江浙之盛饒信為稱首者鄉評里校之會嵗不乏絶也今饒信之盛移於嘉禾嘉禾之賢守長實為集賢凌公顓務古文而崇化文士有名世者作不惟斯文增重而嘉禾之文風義俗從而振焉則文會之作固有補於司政者不少也斯文鋟梓濮君又求一言以叙首於是乎書曹士𢎞文集後序余生晚不及識廬陵曹先生及來錢唐獲覩與劉志善書書言劉光伯杜子美諸人之學不聞道王氏陸氏之學為無用之空談獨有志於述禮樂徵文獻余已異其為人恨不得與之共世同里閈接其言議也未幾其子希顔以南陵遺藁來則知先生抱有用之才不見於世而見者惟此耳吁編簡零脱曾無幾矣詩凡若干篇文僅二十有九首皆津津焉善言世故綜之以往史而􅀫之以聖賢之理非代之學者謬悠無邊畔蕪澁險怪以為辭者之所可及也觀其翁彦揚之譲議則范史不無佚鴻闕之悖李庚伯之孝紀則鄠人對亦不無忍薄之愧議之近於情而依理雖古之人懼焉况今之謬悠為學而蕪怪為文者邪先生之學之才如此而世不材其人利其道豈不媿當代君子乎予求生其人於今之所接者不能為愧蓋益甚矣孟子以誦其詩讀其書不知其人可乎是尚論其世也謹為之編次及正其脱訛而且志其尾以寄余尚友之心云王希賜文集序干將之器利可刜鍾然其利之司於人者有當不當焉君子以禦宼利也盗持以殺人亦利也文章大利器也而妄庸者輕用之世無時分寸利而危至於殺人吁可不慎諸故司文者不以輕屬妄庸戞戞乎難其人者誠以利器之雄偉不常而有推䧟廓清之功者也自今求其人於六籍而下斤斤鄒一人楚一人燕一人西漢三人唐二人通愈宋三人周程在焉今姚牧庵虞邵庵而次未以數斷句之數人之文實代之利器而利之當於人者也皆雄偉不常而有摧䧟廓清之功者也今之妄庸者蔓衍草積動自哆大曰吾文鄒楚而降之文也當有傳也布於今與後不必越五年十年其蔓衍草積者已與糞土同腐傳何有乎括蒼王亷氏為文凡若干篇遭兵火而失者過半今拾遺藁及續為文又若干㢧王子讀書二十年而始敢為文蓋有利器之本其為人磥砢有竒節又有利器之操者也知其利器不無用於世不無用於世則其傳於人與妄庸者異也必矣書以序之再序我朝文章肇變為劉楊再變為姚元三變為虞歐揭宋而後文為全盛以氣運言則全盛之時也盛極則亦衰之始自天厯來文章漸趨委靡不失於蒐獵破碎則淪於剽盗滅裂能卓然自信不流於俗者幾希矣吾嘗以近代律今之文僅得與曾鞏蘇轍王安石李清臣陳無已之流相追逐相亡而中衰也已不得歩武於陸㳺劉克莊三洪矧葉適陳傳良戴溪乎不得步武於葉適戴溪陳傳良矧晁張秦黄乎不得步武於晁張秦黄矧二蘇歐陽乎時則舉子之伎興矣不惟代無作者而鑑識衡定為之先者無其人也亦久矣吁吾於此求夫篤於自信不為流俗所移者東浙之士僅四三人曰王㢘氏其一也其為文不諧於人人則以鑑識衡定者屬於吾吾每為之起畏諗其追古作者則西京而上秦與燕也楚之騷也春秋之國語也班固崔駰而下弗論也若是者其時於一已之獨不以一代之氣運盛衰為髙下者也豈不偉歟吾使魏生鎮録其追於古者而告諸學古之友云楊文舉文集序文章非一人技也大而緣乎世運之隆汚次而關乎家徳之醇疵當世運之隆文從而隆家徳之醇文從而醇士以文墨為能事幸而生乎昭運之代又幸而出乎明徳之家若吾宗文舉者非其人也乎文舉通微先生之嗣也先生領臺檄主文淛闈時予實列同考聽先生言議凛然為起立知先生之學出道江張氏張氏之學出紫陽朱子故其為議論文章不一於正不出也二十年來先生之墓樹拱矣幸先生有後如文舉獲見予吳門次舍示所著碑銘叙誌箴頌論贊凡若干巻累日讀之喜其識職而各毗于律理􅊫而其言沛如也予自居吳門聞公之名能文者無慮數十家類未有及文舉者則知文舉之得其本於家而又丁乎氣運之盛於國家者非庸衆人之所同也昭昭矣抑吾臨文有感也先生入翰苑不兩月輙謝病歸髙文大冊不一二見諸史院而文舉之文亦多遐方下邑之所撰録未及鋪張乎帝畿也嘻文舉之文豈遽盡於是編也哉夫蘭臺芸舘文章之居編摩述作文章之職也居其居而書夫言職者或有矣顧有得其職而不居其居者吾不信也文舉尚以吾言俟之皇元一經業且作矣文舉尚以吾言勉之至正戊子十二月序春秋左氏傳類編序三傳有功於聖經者首推左氏以其所載先經而始事後經以終義聖人之經斷也左氏之傳案也欲觀經之所斷必求傳之所紀事之本末而後是非褒貶白也然考經者欲於寸晷之際㑹其事之本末不無繙閲之厭於是類編者欲出焉鉅鹿魏生徳剛初授春秋經學於應君之邵應君始又執經於吾吾於三傳有所考索必生焉是資其暇日以左氏所記本末不相穿貫者每一事各為始終其類編之名曰春秋左氏傳類編昔鐸椒虞卿軰各作左氏鈔撮其書蓋約言之編耳未知求經統要也生之是編豈鈔撮可以較小大哉予念其用工之勤俾繕冩成帙傳於同門之士生且求言以為序予於春秋諸家有定是之録凡十有二巻未敢傳於世也蓋經有不待傳而明者因傳而蔽者學者通其明祛其蔽而後聖人之經如日月之杲杲焉故不協者雖三家大儒言之亦黜也生尚以予言有以定是於傳家則經之如日月者不患不明矣生勉之哉是為序至正十四年秋七月朔序曹元博左氏本末序左丘明受經於仲尼故作春秋傳以為聖經之按後之傳左氏者有鐸椒嘗作鈔撮八巻虞卿作鈔撮九巻是又有功於左氏者也惜其文無傳矣至漢張蒼賈誼復傳左氏河間王進於武帝至成帝時劉歆校秘書而好之始立左氏春秋和帝時遂立其學而左傳大著又其後晉杜預復表章之而傳有注釋夫左氏為聖門弟子又身為國史纂記本末考索惟精其文或先經以始事或後經以終義大抵有以原始而要終也後之言經者舍左氏無以為之統緒故止齋陳氏謂著其所不書以見經之所書者皆左氏之功此章指之所由也雲間曹元博氏復按經以證傳索傳以合經為左氏叙事本末若干㢧類之精訂之審以博學者之觀覽其用心亦勤矣論者以左氏作傳為仲尼忠臣杜征南作注為左氏順臣非忠臣今元博序其本末抑為左氏順臣乎忠臣乎蓋左氏之失工於言而拙於理好以成敗論人妖祥計事往往傳過於註元博既序其本傳復能權衡其是非合乎筆削之大義是又愛而知其惡謂為丘明之忠臣也豈不偉哉元博尚以吾言勉諸春秋百問序六經皆有疑而莫疑於春秋疑而不决而欲得筆削之微者蓋寡矣此春秋之經有百問也予家蔵是書凡六巻嘗授之無錫孟生季成季成又傳之於華亭曹君繼善之子元朴朴以其傳之不廣也特鐫諸梓而徵予為序是書也失其首辭久不知為何人所著或以為萬孝先先又不知為何時人觀其設為問畣者往往與予補正之意合實有以釋是經筆削之疑予令孟生勿秘所授而未及板行于世今曹君父子能推所秘於人不遂吾之初心而賢於漢儒之私論衡於一已者乎雖然道學是講者謂説書不古慮學者不求諸心而惟口耳之是資夫百問之書探聖意之微而欲决之諸儒未决之論非見之卓思之精者能之乎謂資口耳之辨不可也學者於春秋茍讀而未有疑疑而未求釋于心而遽觀是書之廣傳也為病則固存乎其人焉春秋定是録序栁子曰春秋如日月不可贊也然則髙自立論者皆誕也歐陽子曰春秋如日月然不為盲者明而有物蔽之者亦不得見然則將以制盲而祛蔽則亦不能不假於詞也經不待傳而明者十七八因傳而蔽者十五六明目者祛其蔽而通其明則其如日月者杲杲矣余怪三家既有蔽焉而諸子又於其蔽者析宗而植黨爭角是非不異訟牒使求經者必由傳而求傳者又必繇諸子是非紛紛莫適所從經之杲杲者晦矣世之君子既晦於求經復於諸子求異其説是添訟於紛爭之中惡物蔽目而又自投以醫者也維禎自幼習春秋不敢建一新論以立名氏謹會諸儒之説而輙自去取之為定是録説協於經雖科舉小生之義在所不遺其不恊者雖三家大儒之言亦黜也吁予又何人敢以一人之見與奪千載之是非何僭自甚亦從其杲杲者决之焉耳後之君子倘以録猶未是改而正諸豈敢諱乎禇氏家譜序禇氏之系出自微子宋共公子叚食采於禇號曰禇師因氏焉其在衛有禇師子申定子者蓋其族之仕於衛者也漢元成間有禇先生大以行顯嘗補司馬遷史記六朝以來禇陶禇裒皆以文學名至唐禇亮博學才敏預瀛洲學士之選其子遂良為顧命大臣遂良由河南徙錢唐其子孫所居號禇家塘後有徙居苕城者亦以禇姓其巷今聚族烏程之朱塢即自苕城來也其祖為世超墓在朱塢後浜冡舍曰光逺菴云世超生世隆生大理評事琳琳生省幹溶溶生宋闕郎提幹大同大同生宋迪功郎淮安縣丞士登士登之子長宣教郎友龍次仲龍友龍無子以仲龍之子將仕郎國史實録院檢閲文字天祐為嗣焉天祐三子長錫珪善州教授次錫琦次錫瑜䝉古學正善州四子嗣良嗣英嗣俊嗣賢錫琦無子以嗣英為其後自士登以前凡十世皆以詩書起家由科舉入仕者代不乏人宋革故居遭兵燹子孫亡其實録嘉言善行不復可考矣嗣英於族叔祖桂岩公所訪得家譜令其子桂繕寫為冊冊成乞予序予謂君子之澤五世禇氏已踰十世而其來者尚未艾也桂之為伯仲者凡六人皆從碩師習舉子業里以衣冠之族稱焉嵗大比鄉大夫録以充賦者禇氏子孫居多吾卜禇氏祖之積者厚而嗣英之培其積者益至吾見禇氏之來者益衍而大以五世之澤論君子者又豈可以律於禇氏之澤哉禇氏子孫尚以予言勉之送朱女士桂英演史序錢唐為宋行都男女痡峭尚嫵媚號籠䄂驕民當思陵上太皇號孝宗奉太皇夀一時御前應制多女流也若碁待詔為沈姑姑演史為張氏宋氏陳氏説經為陸妙慧妙靜小説為史恵英隊戱為李瑞娘影戱為王潤卿皆中一時慧黠之選也兩宫㳺幸聚景玉津内園各以藝呈天顔喜動則賞賚無算此太平朝野極盛之際今當此刀鳴鏑語時故家遺老或與退璫畸㜮談先朝故事未嘗不興感隕淚也至正丙午春二月予蕩舟娭春過濯渡一姝淡粧素服貌􅈺雅呼長年艤櫂歛袵而前稱朱氏名桂英家在錢唐世為衣冠舊族善記稗官小説演史於三國五季因延致舟中為予説道君艮嶽及秦太師事座客傾耳聽知其腹笥有文史無烟闕予竒之曰使英遇思陵太平之朝如張宋陳陸史闕入登禁壼豈久居瓦市間耶曰忠曰孝貫穿經史於稠人廣衆中亦可以敦勵薄俗則吾徒號儒丈夫者為不如已古稱盧文進女為女學士予於桂英亦云東維子集巻六欽定四庫全書東維子集巻七元楊維禎撰序吳復詩録序古風人之詩類出於閭夫鄙𨽻非盡公卿大夫士之作也而傳之後世有非今公卿大夫士之所可及則何也古者人人有士君子之行其學之成也尚已故其出言如山出雲水出文草木之出華實也後之人執筆呻吟模朱擬白以為詩尚為有詩也哉故摹儗愈偪而去古愈逺吾觀後之橅儗為詩而為世道感也逺矣間嘗求詩於摹儗之外而未見其何人富陽吳復見心持詩來讀其古什凡若干首决非摹儗而成者知學有古風人之㫖矣吁使復達而有位為朝廷道盛徳製雅頌復之作不為古公卿大夫士之作乎吁又使人人如復不以摹儗為詩古詩不復作者吾其無望於後乎復益勉之以徵吾言焉可也趙氏詩録序評詩之品無異人品也人有面目骨骼有情性神氣詩之醜好髙下亦然風雅而降為騷騷降為十九首十九首而降為陶杜為二李其情性不埜神氣不羣故其骨骼不庳面目不鄙嘻此詩之品在後無尚也下是為齊梁為晚唐季宋其面目日鄙骨骼日庳其情性神氣可知已嘻學詩於晚唐季宋之後而欲上下陶杜二李以薄乎騷雅亦落落乎其難哉然詩之情性神氣古今無間也得古之情性神氣則古之詩在也然而面目未識而謂得其骨骼妄矣骨骼未得而謂得其情性妄矣情性未得而謂得其神氣益妄矣吾友宋生無逸送其鄉人趙璋之詩來曰璋詩有志于古非錮於代之積習而弗變者也是敢晉于先生求一言自信余既訝宋言而覆其詩如桃源月蝕頗能力㧞于晚唐季宋者它日進不止其於二李杜陶庶亦識其面目識其面目之久庶乎情性神氣者併得之璋父勉乎哉毋曰吾詩止於是而已也至正丁亥九月望在姑蘇錦秀坊寫李仲虞詩序刪後求詩者尚家數家數之大無止乎杜宗杜者要隨其人之資所得爾資之拙者又隨其師之所傳得之爾詩得於師固不若得於資之為優也詩者人之情性也人各有情性則人有各詩也得於師者其得為吾自家之詩哉天台李仲虞執詩為贄見予於姑蘇城南且云學詩於鄉先生丁仲容氏明旦則復謁出詩一編求予言以序予夜讀其詩知其法得於少陵矣如五言有云湛露仙盤白朝陽虎殿紅詔起西河上旌隨斗柄東西北干戈定東南杼軸空置諸少陵集中猝未能辨也蓋仲虞純明篤茂博極文而多識當朝典故雖在布衣憂君愛國之識時見於詠歌之次其資甚似杜者故其為詩不似之者或寡矣吾求丁公之詩似杜者或未之過則知仲虞之詩列乎家數者不得於其師而得於其資也諗矣雖然觀杜者不唯見其律而有見其騷者焉不唯見其騷而有見其雅者焉不唯見其騷與雅也而有見其史者焉此杜詩之全也仲虞資近杜矣尚於其全者求其備云至正戊子九月丙辰序張北山和陶集序詩得於言言得於志人各有志有言以為詩非迹人以得之者也東坡和淵明詩非故假詩於淵明也其觧有合於淵明者故和其詩不知詩之為淵明為東坡也涪翁曰淵明千載人東坡百世士出處固不同氣味乃相似蓋知東坡之詩可比淵明矣天台張北山著和陶集若干巻蔵于家其孫師聖出其親手澤求余一言以傳世蓋北山宋人也宋革當天朝收用南士趨者瀾倒徵書至北山北山獨閟關弗起自稱東海大布衣終其身嘻正士之節其有似義熈處士者歟故其見諸和陶蓋必有合者觀其胸中不合乎淵明者寡矣步韻倚聲謂之迹人以得詩吾不信也雖然世之和陶者不止北山也又豈人人北山哉吾嘗評陶謝愛山之樂同也而有不同者何也康樂伐山開道入數百人自始寧至臨海敝敝焉不得一日以休得一於山者觕矣五栁先生斷轅不出一朝於籬落間見之而悠然若莫逆也其得於山者神矣故五栁之詠南山可學也而於南山之得之神不可學也不可學則其得於山者亦康樂之役於山者而已耳吾於和陶而不陶者亦云至正八年夏五月六日剡韶詩序或問詩可學乎曰詩不可以學為也詩本情性有性此有情有情此有詩也上而言之雅詩情純風詩情雜下而言之屈詩情騷陶詩情靖李詩情逸杜詩情厚詩之狀未有不依情而出也雖然不可學詩之所出者不可以無學也聲和平中正必由於情情和平中正或矢於性則學問之功得矣或曰三百篇有出於匹夫匹婦之口而豈為盡知學乎曰匹婦無學也而逰於先王之澤者學之至也發於言辭止於禮義與一時公卿大夫君子之言同録於聖人也非無本也我元之詩虞為宗趙范楊馬陳揭副之繼者疊出而未止吾求之東南永嘉李孝光錢唐張天雨天台丁復項烱毗陵吳恭倪瓚蓋亦有本者也近復得永嘉張天英鄭東姑蘇陳謙郭翼而吳興得郯韶也韶詩清麗而温重無窮愁險苦之態蓋其强力於學未止探其本之所出極其作之所詣蓋得騷之聲得雅之情則雅之聲矣又豈直在元詩一人之數追逐李張丁項軰而止乎韶勉之而已其成帙者若干巻兩淛作者序曩余在京師時與同年黄子肅俞原明張志道論閩淛新詩子肅數閩詩人凡若干軰而深詆余两淛無詩余憤曰言何誕也詩出情性豈閩有情性淛皆木石肺肝乎余後歸浙思雪子肅之言之寃聞一名能詩者未嘗不躬候其門採其精工往往未能深起人意閲十有餘年僅僅得七家其一永嘉李孝光李和其一天台項烱可立其一東陽陳樵君采其一元鎮其二老釋氏曰句曲張伯雨雲門思斷江也昔王劉二子能重河朔矧七家者不足以重兩浙乎惜不令子肅見之嘗論詩與文一技而詩之工為尤難不專其業不造其家冀傳於世妄也蓋仲容季和放乎六朝而歸凖老杜可立有李騎鯨之氣而君采得元和鬼仙之變元鎮軒輊二陳而造乎晉漢斷江衣鉢乎老谷句曲風格夙宗大厯而痛釐去纎艷不逞之習七人作備見諸體凡若干什目曰兩浙作者集非徒務厭子肅之言實以見大雅在浙方作而未已也若其作者繼起而未已也又豈僅僅七人而止哉衞子剛詩録序余入淞見世家子弟凡十數人能去裘馬之習以文墨為事者蓋寡矣城西衛子剛蓋山齋别駕公之孫也首贄詩見余既而復出敬聚齋詩稿一編讀其古詩如秋夜曲白苧詞其排律如九山讌集五言律如江水深深碧棃花淡淡明九農勞畚臿三泖足風波七言律如亞夫舊是將軍子賈誼初傳太傅官玉人嬌列錦步陣銀筆醉調金縷衣醉吹銀笛五老洞閒拾瑶草三神山其絶句如消寒圖一首音節興象皆造盛唐有餘地非詩門之顓主者不能至也昔人論詩謂窮苦之詞易工驩愉之詞難好子剛之工不得於窮苦而得於驩愉可以知其才之髙出等軰不得以休戚之情限也子剛之年未踰壯而其詞之工已如此使復益之以春秋才愈老茂而詞愈髙古又豈止今日所覩而已哉至正九年夏四月廿有九日序玉山草堂雅集序崑山顧仲瑛裒其所嘗與逰者往還唱和及襍賦之詩悉鋟諸梓編帙既成求余一言以引諸首余來吳見吳之大姓家友於人者往往市道耳勢要耳聲色貨利耳不好聲利而好雜流者寡矣矧好儒流乎不好儒流而好書數者寡矣矧好文墨章句為不朽之事乎仲瑛嗜好既異於彼故其取友亦異其首内交於余也築亭曰其亭以尊余之所學也設榻曰其榻以殊余之所止也余何脩而得此哉蓋仲瑛之慕義好賢將以示始於余示始於余而海内之士有賢於余者至矣故其取友日益衆計文墨所聚日益多此草堂雅集之出於家而布於外也集自余而次凡五十餘家詩凡七百餘首其工拙淺深自有定品觀者有不待余之評裁也其或䕶短憑愚持以多上人者仲瑛自家權度又輙能是非而去取之此次其有可觀者焉攬之者無論其人之貴賤穉宿及老釋之異門總其條貫若金石之相宣也鹽梅之相濟也蓋必有得於雅集者矣得於雅

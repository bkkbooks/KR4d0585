front:
  text: 襍詩文凡九百餘篇今皆安在哉非其文不傳也言厖義淫非傳世之器也自今觀之孔孟而下人樂傳其文者屈原荀况董仲舒司馬遷又其次王通韓愈歐陽脩周敦頥蘇洵父子逮乎我朝姚公燧虞公集吳公澄李公孝光凡此十數君子其言皆髙而當其義皆奥而通也虞李之次復有鹿皮子者焉著書凡二百餘巻予始讀其詩曰李長吉之流也又讀其賦曰劉禹錫之流也至讀其所著書而後知其可繼李虞以達乎歐韓王董以羽儀乎孔孟子蓋公生於盛時不習訓詁文而抱道大山長谷之間其精神堅完足以立事其志慮純一足以窮物其攷覽博大足以通乎典故而其超然所得者又足以達乎鬼神天地之宜其文之所就可必行於人為傳世之器無疑也予怪言厖而義淫者往往家自摹刻以傳布于世富者怙資以為而貴者又怙勢以為意將與十一經厯代諸子史並行而無敝不知屈氏而次彼雖欲不傳不得也必藉貴冨以傳則貴冨滅而文亦滅矣嗚呼貴冨者不足怙以傳而後知文字之果足以傳世也文如鹿皮子而不傳吾不信也予以鹿皮子同鄉淛之東而未獲識其人其子季持文集來且將其命曰序吾文者必會稽楊維禎也於是乎序鹿皮子陳氏名樵字君采金華人居圁谷磵常衣鹿皮自號鹿皮子云

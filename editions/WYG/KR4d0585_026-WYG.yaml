front:
  text: 節先生墓銘先生諱侣字君友姓嚴氏子陵三十五世孫也嚴本莊姓以漢明帝諱易之子陵以髙名著史冊耕富春山釣桐水年八十終娶梅氏西京夀春尉福女生茂茂生隆隆生卓由是而降踰唐歴宋衍為四家甲家傳格為先生曽大父潤玉大父自中考也俱不仕先生生而有竒氣讀書不為覔舉計從學鄉先生漢英賈公賈公得於復齊趙公趙公得於潛室陳公陳公親授於晦菴朱子此其淵源也貴官至釣臺必訪先生勸之仕則曰漢雲臺諸將仕非不赫赫今子姓無聞吾鼻祖去之一千三百有餘年而髙風逺韻與富山桐水相為峙流士奚必以仕而貴哉某不敏願為嚴子陵賢子孫足矣居家教授生徒有裹糧自甌越來者宋相文山氏客謝翺竒士也雪夜與之登西臺絶頂祭酒慟哭以鐵如意撃石復作楚客歌聲振林木人莫能測其意也暮年建汐社為㑹取晚而有信翺卒無子與社中友買地臺南葬之築許劒亭憲使盧公摯髙其義為之書嘗遊錢唐偕石塘胡公山村仇公過孤山酹林處士岳鄂王墓卒有動於中告二人曰某常時如此親必不安亟歸及門遽有終天之别擗踊氣絶者數四治喪祭一用朱子禮廬墓三年不稅衰絰不見賓客有白燕巢墳木事母益䖍母卒哀毁成疾幾不起每至生旦服墨縗哀慟踰它時所居堂名以髙逺取郡守王祕已釣臺書院語至順辛未冬十月晦疾革呼其子淵曰吾年已踰六十不稱夭奉祖祠四十年復土田教養無沗吾死何憾平疇西地吾已買諸官死必葬是遂逝越若干年為至正丁亥始克𦵏賢者故事有易名門人黄廷玉等私諡曰髙節復請諸郡守祠於祖祠西小室娶黄氏宋榜眼進士黄蛻曾孫女子一淵也越十年丁酉余以建徳理官過釣臺淵從余謁祖祠遂登雙臺訪子陵釣跡因酹髙節君墓又訪臺南謝竒士塜余為竒士立阡表明年淵持廷玉所為狀來請曰謝竒士表於吾子若有待先子之行應銘法其待如竒士幸吾子銘之遂銘曰於古風渢乎胡可追千有百禩不畫厥岐不背厥馳瞠乎不知其後時我銘其人維髙有㙋維髙有㙋維逺有遺

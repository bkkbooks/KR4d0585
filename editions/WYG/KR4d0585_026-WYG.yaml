body:
  text: 馮處謙墓銘至正丙申秋余以建徳理官道富陽抵友馮頥家頥伯仲氏曰升與豫皆相次去世豫之子宣衷衰前拜曰宣不孝先子以蚤年殁外邸殁且六年未克葬今年冬某月日將祔吉峴祖墓次幸先生哀而賜之銘庶先子不悼不百齡不孝孤不無葢覆余與頤為昆仲交三十年嘗銘其伯考父寺丞公考仁山公伯氏升今又銘豫尚忍换筆耶君名豫字處謙宋承信郎僉嘉興府􅈦事從周孫集賢殿脩撰驥從子承信君生三子長䝉殁次革次觀革以孝義式鄉里外中書以義士旌其門義士生三子曰升曰頥曰晉觀生二子一即君次仁君於伯仲居四早喪父義士公撫之如己子君友悌長氏不翅同母出一門數百指怡怡恂恂内外無間言義士公殖生日以饒君以里之困乏者勸分援劉子曰惠君子君子得其福惠小人小人得其力利出者祿及怨徃者禍入公是其言又嘗謂人能羣者以分能分者以禮義士公逝嵗時月旦相其長氏必請合族綴食之禮惟恐不及君為人髙亢剛直讀書務通大義與人友尚氣節痛逺烏集之交狀貌魁梧美鬚髯達官要人皆折勢位交之曰君固我朝人也薦之仕則辭曰吾剛不能售以磷吾直不能售以回薦者謝而止娶李氏宋南劒知府桂孫女一子宣也君懇懇戒曰瘠地民材勞也沃地民不材饒也汝毋恃驕棄學使吾有沃地懼也宣力學訖為名士君生於大徳己酉八月八日以暑疾卒於杭至正九年五月十三日也得年四十有二銘曰不厲而剛剛不􅪤不矯而直直不跼小夫匍匍等禽犢欿然我信無不足天路中止匪不祿寄言特義聞者服矧曰有子子式糓長轂遐行續前躅姚處士墓誌銘君諱椿夀字大年其先出唐開元宰相崇曾孫秘監合嘗守睦因家焉至六世孫為祕簿宗之宗之子三人一居峨溪曰二府君是為君八世祖曾大父思晟登宋景定壬戌榜進士第階承節郎大父潼翔宋鄉貢進士父元慶隠居不仕妣王氏司諫某女君幼機敏不習羣兒弄長丰姿偉特讀書輒了大義闢樂育館嵗聘海内名師儒教子弟及里中兒君性端直平生無二言與人交始終見底裏於義利曲直必嚴其辨鄉鄰有爭者不直有司直於君得一言即解去嵗饑周人之急惟恐弗及稱貸者久則焚劵與之創世濟橋峨溪上橋置亭嵗五六月施茗飲饘粥於行者行者不勌橋西古松篁萬立築亭名深淨又搆層臺曰松麓賢士夫徃來必延致其中觴詠笑談至忘朝夕邦大夫馬公薛超吾道經桐廬聞君枉道過門以處士禮禮之邑侯周善達都等皆嘗問政於君君必以利害中民窽者鑿鑿言之民便其言者甚衆晚勉其弟同夀曰兄老病無宦情弟齒壯學裕必厮名仕版圖光其先同夀因自奮北覲得餘干校官君娶袁氏吉水教授某女也子三曰雋先卒次粲次采孫男四曰德元徳懋徳祥徳瑞君生於大徳庚子五月十三日没於至正癸巳十月十九日得年五十有四越三年十一月六日窆於桐君山北孝仁之原又一年其子粲謁余理官次再拜泣曰先子介不樂仕無功徳可書然孝友行於家任恤行於里者不得文章家一言以示不朽非先子不幸粲不孝也粲辱為先生從幸先生賜之銘按其客鄉貢進士魏鈞狀為之誌而銘曰桐之岡虯虯桐之瀨秋秋孝原一培山水相繆是為峨溪姚處士之丘故處士馮君墓誌銘君諱天瑞字通甫世居和州之馬江縣曾大父某本郡幕府長曾祖妣黄氏大父某隠徳不仕祖妣慶氏君自幼機警讀書不事章句務大義善屬文見人善必稱道不已見惡則嫉之如仇議藝不售借逕於郡史復自厭其筐篋之習竟辭歸卒業於儒築草堂青山之麓日以書史課子招延賓客為觴詠之樂兵興藩間以屢徵不應遊徼入境不敢犯處士門鄉里稱為季世之全人乙未夏六月以疾終於寢榮年五十有九娶張氏先一年卒生子一人居仁由帥府經歴調分水丞遷京城兵馬女一人適同里汪晉再娶華氏生子二人長居義後更名榮由京都鎮撫調神武清軍衛知事遷華亭知縣次居禮未仕女一人適同郡鄧英公生於大元元貞丁酉九月四日没於大明龍鳳乙未六月二日時淮甸兵梗未得返故丘權厝周家圩之原戊申冬合張氏兆歸葬於邑東東山祖塋之次是年秋居仁偕榮衰駢拜予雲間邸次乞一言銘墓石且為孝子祿養不得於事生而得先生大事於送終孝子孤之心亦揚矣是敢乞銘於先生辭不獲為之銘曰金以不祥躍兮璧以有用􅪤叶吁嗟先生兮是為全人喬山處士翟君墓誌銘君諱徳興字宗起姓翟氏喬山野人其自號也世居無為州濡須之巢縣曾大父某自巢遷和州之含山父福遂占籍焉兵變君挈家避地滁州閲三月而没藁塟全椒縣之明山娶同邑司氏君没四年後卒於太平州藁𦵏采石之麓子二人長桂次清女一人滿兒適同郡孫倌桂以才名簡知今天子於南京授千夫長部落于同僉趙公征進宣徽安慶九江等處以功升鎮撫清京城廣武衛百夫長君生於大元大徳甲辰殁於至正壬辰四月初五日享年四十有九洪武二年桂遷柩於明山復還妣柩采石合葬於巢之翟家嶠西闗之原先逺日桂來拜予草𤣥閣次曰不孝孤生齒未丁壯不幸失所恃又三年失所怙零丁孤苦藉祖考澤得以簉名仕版祿食於朝而三釡之養不能一勺及親此不孝孤終天之憾也倘死又不得當代大手筆紀其卒葬地所不孝之罪號天何以自贖是敢介先生從子明具狀以乞銘吾重違其情畀之銘曰父溘先兮無以家叶母去棄兮又以途於乎孝子之天天曷呼淮之西兮江之東歸合兆兮兆既同於乎孝子之天天終從又銘曰玉韞兮火烈木定兮風危親弗獲兮莫予追匪今兹兮我罹吁嗟翟氏之子兮我又何悲淵黙先生碣銘至正十四年三月二十日壬午淵黙先生余君卒既塟其友及門人問易名於㑹稽楊維禎維禎曰先生深靜而寡言嘗自號淵黙宜從曰淵黙皆應曰宜其子安禮又持先生門人殷奎狀來請銘先生諱曰强字産莊姓余氏其先閩之古田人十二世祖揭仕宋官至吏部尚書受知徽宗既徽宗手書余尚書祠額賜其子孫曾大父諱佑大父諱鄭父諱與可武夷書院山長自號藍溪始居崐山為崑山人先娶趙氏無子再娶陳氏生先生初藍溪為李後姓李氏至先生始復姓余云先生年十四喪父能自樹立極力於學脩習容止步趨圈豚如老成人既長學通六經百氏博貫精析退然不知有餘且善屬文根柢六經不淆異説其書有尚書補註若干巻藏於家嘗為舉子業己而厭其剽取傳註支延蔓衍其言不足傳逺遂絶意弗為居一畮之宫叱咤之聲不聞於外足跡未嘗一至庸貴富人門鄉人盡聞先生然終身有不識先生為短長瘠肥者世夀五十有二配潘氏生子二人長曰安禮次安禧女二人長適王居敬次適許淵葬州南一里先塋之左葬之日朋友逺近畢至余曩來崐山與友者纔四三人耳今余亦老矣去年一人卒先生又卒嗚呼余尚忍銘先生耶銘曰􅐒之譾而飯駿之苑麟之孌而豢兕之圈瑲鳴衝璜擇地而踐吁嗟淵黙孰云其蹇尚絅先生墓銘先生諱徳嘉字立禮姓衛氏其先渤海人七世祖文中宋朝散大夫兼侍講始居錢唐六世祖上達大中大夫禮部尚書又自錢唐徙華亭建炎初大中公從叔大中大夫禮部侍郎膚敏扈蹕南渡亦居華亭五世祖稢脩職郎國子博士髙祖端操朝奉大夫衞尉少卿曾祖僑大中大夫軍器監丞祖宗武通奉大夫資政殿大學士考謙入國初以世官後授温州路治中弗就妣黃氏繼張氏男三先生其長也在豎不好狎弄就外傅日誦經籍數千言下逮諸子百氏靡不研究性孝厚慤誠晚年以風節自持失儷二十有八年不二娶平居篤於人倫恬於勢利弱冠時左丞郝公嘗辟為儤使君辭曰吾弗能為奴𨽻也宣慰羅公舉以茂材授潮州路儒學正君又辭曰觸瘴毒以貽親憂吾弗敢也自是不出戸庭者三十年布衣菲食以終其身每戒其子曰汝不躬耒以耕佃人者及汝藉之食者宜予之以恩汝從父縛佃以督逋予解而去之逋亦終不負汝識之至正壬辰盜起剽州里解散者十室而九先生獨守祖考室曰吾舎此將何之冦至吾有抱室死先祠下耳其孝誠之篤如此甲子春疾作其子謁醫却之小差忽曰四月九日之夕吾當逝矣且曰汝父平生無以過人僅不沗所生耳父書具在汝讀之為君子毋有失徳玷吾世胄又毋徇世俗作浮圖事壊吾家法言畢而逝生至元二十四年丁亥十月十七日卒至正十四年甲午四月九日享年六十有八娶任氏中憲大夫浙東道宣慰副使任公仁發女子男二長仁近次復孫男二皆幼以是月二十九日葬余山之原距逝之六年仁近猶衷衰來拜吾淞次舍乞銘余曩來淞以友兄先生先生逝予繋官不及走喪次業將醊其墓與一二友私諡先生先生嘗自號尚絅翁宜以尚絅易名又不辭而為銘表之墓石曰曽子輿若華元娶不更管又安世年不出死不兵仲統樂志遺世榮陶子給力恩必矜嗟嗟兼徳集以成清規若訓貽厥仍我諡以絅夫何疑雪溪處士邵公墓誌銘予嘗客雲間雲間陸先生嘗稱胥水之南多世家邵吕陳陸其尤也先生自其先館邵氏幾七世歴凢一百五十年又云邵氏家老侍僮亦自髙曾曾𤣥皆世其職業祿養為一家之世臣予求世家於近代三葉而不替者尠矣矧六葉七葉乎客有持先生狀雪溪公者抵予次舍為雪溪之壻倪琦也以墓文為請即胥水邵也予欣鹽其世澤為之叙而銘公諱彌逺字子猷自號雪溪有譜為康節公十世孫也髙祖宗穆流避兵火渡江至華亭遂家焉曽大父徳隆父思聴皆儒業教子以經術父天驥以易經中宋待補國朝崇學選士就試入郡庠升賽序弗居公待補君冡子也通父經博涉羣子史為文取辭達不喜雕繪身服朴素亦不喜騎乗絶志仕宦有勸之仕者則曰仕不在吾在吾子若孫耳嘗戒其孫之仕曰古之博學深謀而不遇時者衆矣今之遇者大抵尸未腐而名已滅若輩其戒哉暮年假佛老學洗慮輕財急施至飯沙門賑飢民無算民依而聚廬者無慮百十家所居四面大渠悉建石梁治園地第宅之東風日佳時必移觴豆以燕恱其親守義塾於先軌年雖飢師生廩餼不輒廢也壯年喪偶懲閔子之寒弗繼室付妾御之慈愛者保育諸幼預營生域建精舍守以浮屠而尊吾聖人像設其中嘗慕漢東平王蒼以為善最樂又喜唐張公藝忍字為家法迺輯經傳言善與忍者為百善百忍圖州里多傳之為勸性不嗜酒客至必與飲飲輒醉醉輒放歌客亦無不樂者喪明者十年家事傳于冡子南時燕月㑹必至花竹間其衣冠濟濟然傳儀亦潦潦然如常時至正己亥夏病癰閲月餘悉召子若孫曰吾逝矣永訣不少亂或謂公直知寂滅為樂者儒而悟理者獨不然乎生宋德祐甲戌殆今至正己亥七月享年八十有六娶馮氏先卒男一南也庶三應奎應參應元女三孫五焕炳􅋫經綸女孫八曽孫五垠堮埏垓炳子也麟焕子也是年九月六日葬某丘生域銘曰􅋫言有文行有馴蒼藝之教儆後昆歴年百五十而家有世臣引夀及耄終弗亂神君子謂善之澤吉之人故處士倪君墓誌銘吴興倪處士名驤字子舉没且葬巳九年其嗣子璨猶涕泣於其父之執楊維禎曰璨不幸早孤居喪無已聞先子没若干年又不遑以名顯而墓道之石又不及求文章家者銘重燦不孝惟先子隠徳不仕其事業亡稱於世而人之知者益鮮非吾子以其及知書之何以伸先志且慰藉後人耶維禎為文靜先生門生也先生處士之父某父事先生遂與處士為弟兄處士銘何辭吴興之倪氏始顯於兵馬監押某公至文靜始大處士自幼喜讀書有逺志長與先生自為師友研極名理非世儒所能解嘗走京師以其所學千貴人不合即遂絶仕宦志人勸之仕則曰吾賴先廕免耒耜勞苦得稱處士苕中足矣去家之北三里所為毗山有園池花竹之勝先生且治冡舍其中處士時侍先生遊息於此登山臨水或坐盤石竟日無一言忽有所得則寫之於琴琴不足又寫之於畫琴最善水雲逺意無俗師趣數節族畫亦有求工於人識者謂與今髙吏部爭拙法於海岳菴至正元年處士之生四十九矣忽謂家人曰買臣五十當富貴吾明年五十當逝矣於是預為棺斂塟埋之具明年果得疾告其父曰驤平生一言一行毋欺暗室無負於大人矣惟溘先於大人不克報罔極為終天恨天實為之奈之何哉疾亟之日夕尚疏喪儀戒其子爾勿用異教俗樂問夜何其二鼓矣曰盍秉燭我坐令家人勿哭遂暝至正壬午九月六日也父文靜先生淵母鄭氏男四長璨次肅次璋皆習舉子業女三長適闗元祿次許適楊詠未行次在幼孫男一承孫是年十一月十七日葬於烏程縣昆山塋之北銘曰四十九已知非又知死生可知處士不仕非不時五十焉用富貴為長苕之曲山之昆處士之墓藏於斯視後不朽吾銘詩元故陳處士墓誌銘吴興吴淑巽公嘗以座主禮事余過余錢唐次舍談其徒之好學者陳君善曰吴人師余數學於文獨君為義理學又曰陳氏代以貨𣙜其鄉君始典學鑿鑿乎期輩古之人端木生不學孔子終貨殖耳此余稱其好學也敢以見先生後余二十年過吳興而君與吴公俱已隔世無幾趙伯陽氏將君之子嗣亨來謁銘因為之感而銘諸君名良能字善之其先自陳武皇生湖之長興白石里子孫至今蕃衍為君望姓郡城之南曰六老堂故地君之考德新號恒齋者始徙居焉曽祖世昌祖日裕皆奕世有徳行君自幼機警恒齋公意有屬輒能先事承之公喜而撫之曰大吾門者必是子也長習國子學干祿于執政者不合即退閉門讀書務求聖賢旨趣皆思吴公以躬行之要其言曰在正心心正則上合天理近當人情盡此之謂忠推此之謂恕時時誦習其語以自儆莫年治生貲業益裕復拓居之北偏剏宅一區蒔花竹設器玩奉恒齋公以老夀九袠乃終君居喪水漿不入口者三日喪紀一遵朱氏家禮嵗時祀享極於精誠親所嗜好必具薦之緇黄淫祀皆屏去不惑伯兄早世奉伯嫂以禮事仲兄情好怡如撫孤姪恩摰如子交友以信遇宗族以仁厚與同閈諸老月為鄉飲以相樂扁所居堂曰庸齋士友至者必欵留觴詠久益不勌君為人識髙量𢎞兼善論裁不茍同不詭激鄉之人受其言視其行以為則惟恐過差聞於君即有聞必陳誡勸止故其卒也咸思其人而哭之生於至元二十六年己丑閏十月二十日殁於至正十年庚寅八月十八日得年六十有二娶施氏子男一人嗣亨孫男二人惟一習舉子業惟讓尚幼是年十二月十五日葬於烏程縣三碍鄉陳彎子塢先塋之次用治命也嗚呼君孝友儀於家忠信行於州黨學不為詞章而究名理行不為厓異而趨平常是無愧於名齋且名處士者宜得書而銘之銘曰學以遵所聞孝行於厥家叶言確而人允行果而人趨祿則不足慶有餘我銘其人後不誣青門處士墓銘予讀漢唐史至公孫述黄巢脅取隠士如李業周朴輩至於餘毒渙而不免則慘至鼎鋸嗚呼隠者之生亂邦幸而免於役官寺不幸卒為人所知乃致毒其身如此不亦可哀已哉青門處士魏一愚氏非無仕才冦杭者亦不知訪其人矣而處士闕訖於市門卒溷而弗露越四三年以病卒正寢卒後三月冦復至處士之廬與堞舍同燬方諸述巢時隠人之不幸處士何幸哉是宜録其人書之不使與齊民同殆也處士性醇懿靜深恒怕外撓閉置一身密屋中如處女然雖重客至不得面周親謁請或一見即退平日危坐閱所蓄書幾萬巻然無他制作味其旨而已其言行可為人勸者疏以示諸子凢積為若干帙處士生某年死至正十六年正月七日也男六人女三人其孤本仁持其友王謙狀來謁銘予在杭時識其人遂為銘銘曰世之否無全士疾以戕兵以死吁嗟青門如處子貌之毁節之峙卒完所歸木以止木棺也出左傳挽辭附蘇先生挽者辭叙公諱大年字昌齡西澗其自號也世家廣陵性開爽亢直有碩學竒材不受公卿辟舉丰姿音吐文辭翰墨權謀智術皆絶出時輩至正癸巳兵興走徐州上大將策策天子聞而想見其人賞官編脩明年廣陵陷涉江隠吴市門又明年淮兵渡吳拜公市門起諮主句公誓一言捄砧鑕萬萬命定伯休兵公即冠竹服薜荔乞骸骨恣徃還笠澤松陵間别號林屋洞主庚子春扁舟泛三泖入鶴城訪予草𤣥閣曰子閣誦十年起攫上第如劵取物奈鼠輩方擲偃月骰死爭得失子宜蹇且退又曰竟疽􅂒肉潰腹背潰吾將與子狂酣傎蹈瞪光景􅀢之耳癸卯秋予登天平石壁入城見公大堂公出妻子闕事按棃園舊部東為予留十日别明年託抱櫝山君貽余文二百十言竒譎甚律諸古未知魁絶公者何如耳定約遊大小雷七十二弁約未赴而公逝瀕終自著墓誌文告其子曰吾年近七十無憾憾者缺靈武覲鏌鎁龍山約喬宜中死誓耳嗚呼公夢矣九京不可作矣死之後若干日與公約游成某陶某周某相承祭於淞之干將山杪各賦挽者辭予辭曰飄飄蘇仙公浩氣凌八表游戲濁世來眼底古今了却上食闕臺下視燕支沼遺書警世人翩若鶩鴻矯雙雷蒼翠開清約隨空杪髙樓舊時月照我夢皦皦見爾林屋天屋天夜知曉東維子集巻二十六欽定四庫全書東維子集巻二十七元楊維楨撰書

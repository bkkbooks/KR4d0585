body:
  text: 序送張從徳之湘鄉州判序保定張君從徳自其先僑居呉中有年矣君以門廕初倅溧陽再轉諸暨皆以憂不赴制閱倅湘鄉其行也呉士大夫悉知其世徳與其為人先大夫省齋公博極經史勵志力行官登三品秩名實布于中外君蚤學不勌晚志操愈高為克紹所基者故皆樂為歌詩以餞之而屬余有以序諸顛予聞而喜之曰自昔寓公子弟之居呉者類以馳馬走狗擊踘博戲為事否則甘色嗜聲滛寄豭而亡其歸先人之業蕩然矣豈復有以學為事志操為先者及其廕仕也鮮克其任而斬其世澤者有矣吾嘗親視張君在貧賤而有休色於富貴則不無慽然者非有學能爾乎夫行潔則可以聞道志一則可以立功道聞而功立豈直倅一州而可哉湘鄉古熊湘之屬邑也地有三江五湖之壯且險其民往往湍悍難治而其士也則清而文為可善也國初以其戸齒之繁而陞州君倅於彼以吾所謂聞道立功者理之吾未見湍悍之難治而且見清文之易為化也况省齋公平日治道之講者君聞之稔矣豈得悖吾言哉於君之行遂書為叙而吴人士之詩係於后云至正七年秋八月十有八日送錢伯舉衢州録頖序國家懲前朝守令顓城之弊止設監長次及副貳並出制命又非異時私辟使有主客勢嘻顓弊去矣不知窮州下邑民日貧戸日耗聚羣行吏持之又弗免十羊九牧之撓唯郊闗之内廛處之民領之者曰録司司設官僅三爾官弗冗事亦釐録判者雖秩卑貟末職下旁于遊徼而一司之政得彼此持可不議短長録監守行弗率頖所守貞所出直而達遂為民儀嚮類覆上監守嘻官豈可以崇卑正副計哉呉中錢君伯舉以故家台州通守之津屡試仕筦庫民休戚情悉矣吏成敗事諗矣今登秩為衢州録頖官伯舉年益増學益優又以其熟民情吏事者佐理于録吾見衢之民慶其來之莫矣况衢之君子類好文墨而敏於義事市人出郭而娭登前山臨背水飄飄然有神仙之思其習嚚奸者寡矣第未知監與守與伯舉同志乎不也果同焉吾將慶伯舉之佐理益易易也豈曰録頖顓職游徼而止哉伯舉勉之以徵吾言可也至正七年秋九月初吉送王茂實慈利州同知序譚州縣職者以同知比縣之丞上監守長焉下通倅季焉同知者得便文自營其中故勢權劣訾詬輕黠胥奸民率制之者寡矣其人之侻厓檢者往往樂居之嘻此豈國家肇建守佐之意哉守令之選其淆也久矣同知其事者茍能以吾民為念一貞其身而左右前後靡不正未有不行乎顧行而推利下人者也發政施令覆岀監守上固不得以地為限矣昆陽王公茂實簽省齋公之孫也初承世澤為下砂令考滿轉同知慈利州所與遊者咸為之慶以其驟加秩三等為優又不居守將責望之地而在其貳焉可以便文自營矣豈不優甚哉余嘗交茂實呉中知其志甚逺毎毎悼民窮疾官敗則知茂實之材將有為於時而伉其官不以同知為逭責地喜也吾所論同知發政施令覆出監守上者將於茂實焉徵之抑吾聞慈利乃赤松隱遁之鄉其山多隱君子以詞章出仕者有騷人之遺風焉故為慈利者甚易易吾見茂實之得治民蚤而其退之暇又得山水之樂於騷人羽客之儔也是則茂實之優者已於其行也予既與客崇酒以别之酒餘賦詩者若干首而遂以余言為叙引云至正七年秋九月序送蘆瀝廵檢范生序友生白子昭為余言欒城范生㢘卿之為人欒風堅忍隱厚其人㢘節而好禮貞信而少文㢘卿本其風之微而習經術於南中儒先生術成無所於試乃俯就門廕官廵檢蘆瀝廉卿雅士廵檢引弓民長也以雅士長引弓職大盩若才今佩武器擁邏士領職其所與游者則既為慷慨歌詩相與張飲西津重徼一言以序其去余既聞亷卿雅士而樂之及聞職蘆瀝則不寧盩才之懼蘆瀝鹽𣙜之司在焉鹽萌依私𣙜為命雖流死比交跡不以屬心在令處𣙜官一失其覺分其罪罪官不幸再三失小輟禄大貶爵而其失或逺出所邏外波聯蔓牽莫之雪白漕府猜禍吏聚櫝如牛腰明漕長不曲直即有曲直吏輒以律雌黄其明嗟乎𣙜之逮不辜法端使然哉故余於㢘卿之廵檢蘆瀝不寧盩才之懼也雖然國家於鹺病之劇方議更而新之求天下之善言鹽䇿者是諏是採廉卿試以其得於所學者為採風者言之使法不逮不辜余之懼也庶幾其或免矣夫送郭公知事還湖州序杭江以南望郡也在宋為行都今為行垣所郡治領州一縣八録事司四其俗具五氏而不一其民習􅏥争巧媮而不和厚故奸伏易乗獄市滋起吏重應上取下什百于他郡非長以能材佐以良幹之屬㨗應辦工發摘者不能得治名廼者總筦某去經歴某又去兩知事坐不任廢府事麻沸狼籍無與理者惟今湖州知事河中郭公仲敏以佐治令聞徹省府相君簡識其人而傷杭治之難無與承乏者乃特移職於兹知事位在經歴下其識贊三尺平以左右二千石者也公至則既鞚轄屬曹而裁決予奪實又兼二千石之職時未期月而府事僨者起滯者疏破者補乂牙齟齬者無不妥帖順易相府而下察憲漕所疾呼急諾又罔不周旋如意於是攝職稱治民歡然誦之為良幹官今復政而去也杭官吏相與張飲西亭以餞而乞餞言於維禎維禎急民無賴於吏久矣以吏茍於公而急於私而已矣有能移其私於友與親者鮮矣矧能移其私於官乎能物其官於本位者鮮矣矧又能物其官於他之位乎故維楨開杭吏無治狀至於廢而去未嘗不悲其才之窮及聞杭人譚郭公之政又未嘗不嘆其才微而無私之治足以及人之廣如此也李經歴經歴古郡功曹之官功曹太守所自辟也經歴今出吏部選用七品印章奏三尺平控吏牘進退上以齊二千石長吏之異同而下以内群書佐於成軌此其體益隆而責亦重矣朝廷慎其選與守令同以廉明者有操尚者居之故郡不得良二千石幸而得一良經歴郡可治徽州路經歴李君其代滿歸廬陵其從子出其郡人士所書治績求余文叙以送之予惟李君之政班班可書徽人士侈紀載者皆能之抑今之稱良經歴者葢未有君之職其職也君之簡訟詞革濫卒吏未足稱良于經歴也平質劑于市明爰書于獄畫委輸之法而州縣之官便安之未足稱良于經歴也惟其政有勿正于上必務引其人去弗正以就正如曲木之就繩悍馬之就馭吁此真良經歴矣余聞徽之羾金也嵗監官取其羡為己有君還羡於民以准他嵗羾之數徽之禄廪也田不足而取諸山山不毛則白取諸佃君收實入而蠲白取為久久定則鄉之宿豪餌官府為奸也抑之不得行土胥相為根抵持短長於官也格之無所置手足所謂上之異同有所齊而下之成軌有所内經歴至此信可以稱良也余閱郡經歴凡若干人往往䧟於隨而不立未見職職如李君者其能已於言乎故為約其政件言之且視人以吏師非徒紀載也送海鹽知州賈公秩滿序天下公論不在公府而恒在閭巷之民若甚愚而是非之心則甚白也邦大夫之政其失者議於市謗於道而其善者亦嘖嘖不容口故欲稽守令善惡不察守令而察閭巷之言得之矣余過海鹽田間往往逢伯格長頌其州太守之治問守為誰則宛邱賈公禧也余已心賢之未幾州人士張玉集其餞行歌詩凡若干首來請曰自海鹽升州置守其得民譽未有若今賈公之最者也曩時廉吏郡形迹仇視吾大姓家訟多不獲其平公㢘無嫌是避即理直大姓必舉即不直雖貧弱誅不少借故獄者積嵗不决者部使者多以屬公而得其平亭吏罷軟者撓寮佐庸闒者蔽吏胥雖令出無私有不能以直遂者公一施令群佐䖍若卑弟生之聽嚴傅老胥順流其風旨又肅然若家老之奉其尊行之以正限之以信故令有司可於上而惠無不逮於下也先是吏卒廵田里如蟻不絶公至立削跡上府聞之因檢戒左右無奸州以其非令者又州民與亭族交其習蠭馬焉易生事公申以條教悉改心歸化無異時剽輕之風此其得譽於民而布之州府士之詠歌實有徵焉幸子一言叙詩首余以其言與其伯格長之頌合又以今之為守令者往往課米鹽奉期㑹不復知有伸民情消民隱懇懇然以厚民成俗為事者遂樂為之叙以風告他吏云送監郡觀閭公秩滿序劉子曰忠孝不修他善無取吁臣子之職無他忠與孝而已耳韓非子曰親之孝子君之背臣吁忠孝固不能兩美也今有人焉於子不為悖而於臣不為背也豈非臣子之全美乎吾於錢唐守將見之者閭公是己公下車以來先問民利害休戚而務去其害與戚者郡有猜禍吏與夫强宗世家不仁於人必痛鉏治之猶之牧羊去其害群而群始蕃猶之理疾劀殺其病本而病始平民之怙法者必刑詿誤者必思出之即不出如梗在咽必吐乃己此公理法也紅巾賊䧟杭凡杆城守土之臣不微遁即賣降爾公獨佐監憲某官監兵某官與賊持者十有三日阽危于矢石數四城池破毁而復完者公之雄謀大節作於人者矣時則高堂太夫人屏居密所公猶衷戎衣朝夕覲如平時不貽其親有一日憂故出不稱背臣入不稱悖子吁若公之忠之孝吾所謂臣子之美非歟今代而去郡之民如去其父僚吏如去其師去之日民父老若干人走予次舍謁文志去思又持其謡送之巻請序以為郭西門供帳予親見公之忠孝治狀有為世道勸者於是乎書至正十四年六月三日送旌徳縣監亦憐真公秩滿序國朝監官郡邑達嚕噶齊於官屬為最長其次有令有丞有簿尉又有案牘官以首領夫六曹之吏凡事㑹之來吏與令丞得相可否議論然後白之達魯赤其署事也亦然其職秩為甚尊而職任為甚優朝家近令以六事責守令達嚕噶齊任與令等昔之尊而優者今轉煩劇矣宣之旌徳縣亦憐真公始由省署而典符印累監望縣三調至於今職且四載宣上徳以及民而使民無愁嘆之聲山林草澤咸知向化大府藉之以集事同寅恃之以取則民有所賴而不恐吏有所憚而不肆六事之備固無可議而於學校尤加之意焉延師儒廣生徒月書季考凡邑之人士咸囿於教養樂育中弦誦之聲相聞是又知所本矣往年淮冦渡江列城殘毁延及旌徳而公首奮忠勇剋復之百里之命於兹有寄是以兼資文武而才足以有為者也今年夏政成上考余學徒馬某職教于縣承公勉勵作興之力於其行也求余文以贈馬生之言有信於是乎書使他日之史館傳循吏者有所採云至正十三年九月廿有四日王學録秩滿序至正八年夏四月平江學録王君達卿書滿去自教授而下洎郡之大夫士與君經游者咸詩賦歌以餞而屬予為首叙予方遊於蘇視蘇學之廢也甚矣提學者非不薄責教也而教無以教鉤稽養也而養非所養郡膠庠之大句覆不如一齊民之家塾有程有則也幸而官於是事有憂焉憂而有為焉學之録王君是也葢王君有孝有行人也曩之養非材者王君有以去之材失養者王君有以引之養之非其斆斆之非其術者王君又有以糾而正之他人日從其失王君日修其勤故蘇學之廢而稍正伊王君是賴於是士之議者曰學校不得良校官得一録足以興教猶之郡不得良二千石得一録亦足以興治也以王君之克官于録若是則積階為郡幕官不能佐治于二千石者吾弗信已雖然以王君之學愈修行愈力志愈逺大也又豈藉一文學之掾積為資級而起哉君應進士舉余嘗視君大易之義矣深㣲而潔淨又嘗視其賦也麗而則其代言也温順而簡古連不幸未售主司則主司之未明也一遇明主司君之未售者售矣售則道山壁水其選也尚暇為人司二千石吏牘之勞哉嘻抑之久者伸必逺懐之大者發必洪吾言有俟於君矣送徐州路總管雷侯序至正八年夏天子以徐州之域風氣悍勁因以飢饉多冦盗民困於昏墊八年春遂統有四州七縣之境為㑹府一時僚吏艱厥選守長為尤艱於是海道都漕府萬戸雷公某以首選為總管陛見其人申之以丁寧訓戒而後往鳴呼以徐州為中原剏府雷公為其開府守將非其人之才賢負宿望一時且簡在上心者曷當此哉余聞雷公之為棣州也棣冦盗之衝歴能守若干人無以為禦公不特善禦且有以化遣之至今棣人稱雷防禦嘖不去口其帥於海漕也前漕而去者多直魚龍之淵剽盗之巢藪人銷解舶公起漕凡一百八十萬不十日舟凑直沽道鯨濤如坦途粟無升合遺若公者可稱朝廷幹臣無負上選任者矣吁以棣州之化道海之庸推而大之於徐州也其有不稱重選答上訓旨者乎雖然吾方有感於地氣之王衰者呉楚為古荒要蔡放之所逮今為衣冠玉帛之鄉徐豫為中土而鞠為山莽者十六七一邑生齒有弗敵江以南一旅之聚民望南而流如水之欲東司牧者弗能禁也今二千石以地闢戸羡為著令公為徐州也治最對著今吾見中土之富庶與今吴楚地同又豈憂赤子弄兵者本末止哉公尚以余言勉之徐州之人日夜望之是年九月之三日呉人士咸賦歌詩以餞而㑹稽楊某為之序送平江路推官馮君序平江路推官許下馮君秩滿蘇父老留不可則相與述為歌謡以送之求予言登載其所善以為之序予客蘇未久不識其所善詢之父老則曰由東嘉經歴治最任高等升任刑官于蘇蘇煩劇郡也獄訟繁興奸偽百方出上㳺之署有行丞相府監漕官都水使司海道都司或所為政不直則賣直者乃聲於上受謗責在須㬰間而况貳推者闕君獨任大府獄事其視犴獄常欲為䧟死者求生路惟恐失附于律成案具吏多受獄貨欺情偽於君者在署審成案未詧退參所疑於父老賔客故月朔作鄉約於父老賔客使之過有以告君之于刑官敬事類此予曰獄者天下之大命也推官又命死生决也何可以不之敬乎孔子於言偃之宰首以得人為問欲其資於人者施於首政也矧獄之不自用而審取諸人以為明者乎明智如臯陶淑問如臯陶其獄之疑猶有資於神羊之所决者馮君任推訊而能取諸人以裕諸己忠信清明見諸歌謡不必資于神物以為聰則馮君不賢於臯陶已乎夫臯陶舉而不仁者逺馮君舉而在高位吾見其民之有賴其仁者矣故書至正八年冬十月送理問所知事馬公序行中書省古之藩國方伯連率之寄也地大任重故其法揆嚴體統峻宣布政條于百司庶府惟大綱是張是主凡細之務不至於執政之堂乃署理問所于垣内若法曹議府焉所以發奸伏伸抑枉平允治法也官其所者非才且賢莫勝其任而幕府之貟又議法之所起也東平馬公某為浙江行省理問所幕府官剛毅有為善持法才毎詳刑决政上其議於相府六曹莫不韙之而百司庶府仰之以為凖由是知其官之才且賢又莫急於幕府貟之才且賢也予唶代之居高位亨厚禄者率多世勲中貴之曹奴𨽻其部屬牛羊其人民以好惡决是非以喜怒行賞罰頤指奔走孰敢少拂其情為其部屬而又執筆居幕府貟獨能持議不屈與巍巍赫赫者相抗而求歸于口是若馬公者予所謂才且賢者非歟公之所以持平曹取重政府者决非聲音笑貌之所得也葢公自公卿子弟練習朝章起身憲府吏為大郡從事遂以亷能擢相府掾由掾為今職其能明庶事决大議者可知己秩滿上名春官明天子方急法則之臣以理天下之幽枉必有以處之矣於其行也叙以為别送馬彦逺旌徳教諭序百里之治有長長選于吏部而承命於天子百里之教有師師選於學而承檄於丞相垣師若輕於長然長不教民無以為治教民必使専出於師則師之道實甚重於長也故師道尊者百里之長禮之為賔不敢以勢上之吁主百里之教者其可自待之㣲乎錢唐馬生彦逺由明經舉為師儒之官初去為晉陵縣教師人以彦逺才徳受貢於卿大夫宜達於天子以為通都大邑之吏而低佪偃蹇為教師於十室之邑疑其自視有懣懣然者又豈知縣教師之係有重於縣長者乎吾聞旌徳山水邑也地不肥沃而多出秀民昔之擢高科為大儒者往往有焉今歴嵗大比者凡十數而士未有占貢籍者豈人材之異於昔哉亦職教者亡狀之過也彦逺居家孝於親與朋友交信義自立而講藝於晉陵者皆聖賢之遺旨當世之要務也今去為旌徳師以其修於家者興其人之孝悌忠信以其講於道者作其人之經濟才畧吾見旌徳之士以行藝歌鹿鳴而來者皆推言其自於教師則彦逺之道行有以佐一邑之治矣有何計百里之吏窮卑彼此哉况彦逺道益大聞益彰其躐峻資取高位與通都大邑之吏相頡頏特跬步地耳十室之邑果足以久稽彦逺乎長旌徳者亦憐公楊寳公皆右文以為治也必以余言為然送孔漢臣之邵武經歴序國法慎守令之職號曰選用幕而元僚亦不委之鈐曹常格以其司守令出内之喉舌也今天子既申明守令之制而尤重幕元僚之選選必以㢘靖有風才者居之雖閩蜀二廣去天萬里逺三嵗必遣使者抵其方面用天子命以署置其官慎選守令與其幕元僚同一中書吏部之嚴也奔競者往往爭入其選以利轉階之速而不知司選者其如此才而賢者陞而不才不賢者其黜多矣㐮國公孔君漢臣始由胄監伴讀出從事微州丞相府聞其賢也辟為屬掾年勞滿而司閩選者有署為經歴邵武葢孔君之廉足以寡欲知足以詧微剛而易以鬪故以武名然小人勇於惡君子亦勇於為善也君先聖之五十四代孫也胄監之秀也丞相府之素推擇也推其善以及君子而化覃於小人吾見邵武咸以道義相高而人人有鄒魯之風不必擊斷鷙猛以成二千石之理者非君而孰與於此乎君往哉毋徒謂入官逺徼利而轉階之速云爾其行也取道呉淞之士咸為歌詩以餞而余適㑹於其鄉人張彦明所且介彦明徵余序故序之巻首云至正九年四月四日送江淛都府吏倪光大如京師序自成周選士之法廢士有逸而他出焉者吏道滯於儒者目吏為俗流於吏者目儒為迂二者始相兵而不相謀矣漢唐士有起自書佐卒吏至名宰相如蕭曹輩者固不可望十一於千百且以今吏言之例限七品秩復開以四品而不次登顯榮者往往列八位而不尠也若者起恪守陳編刻畫章句執一自用不達時宜其於修身齊家治國平天下之道非講之不詳一旦在官顛倒悖亂全與道戾故由科第取官者其政績不能不愈於吏櫝起身者則亦有愧于古之士矣然吾亦有感於今之吏者揣摩徂伺深詆巧文力制長牧氣壓豪氓稱為能吏茍媮刻薄恃以為治具而欲望其國理民安是亦却行而求前矣虎林倪君光大蚤年讀經史欲由儒進志伸弗遂試吏於江浙都府周行推之為儒吏柳子厚曰士之習吏恒病于少文故給而少文不肆飾於華者又病於無斷故放而不制倪君以術飾吏治吾知其給而能肆放而能制者也况其事七十之親以孝聞友朋友以信自任夫孝與信忠君愛民之所出也君推之於吏治以日涉穹位食厚禄上列八位以任國家之大事非君誰望哉又豈得與州邑俗吏循資格為進級者同日語哉今赴京師上計錢糧事來别予呉門而呉之士君子又為詩以壯其行且推予為序遂引於巻首若此時見予望光大者逺云至正八年十月甲子序東維子集巻四欽定四庫全書東維子集卷五元楊維楨撰

body:
  text: 辭桂軒辭有序桂生於秋依於巖葢隠之花也故小山之招者託焉代之誇郄林美燕山者非桂本志也包陽有桂軒者為馮君元卿之所築馮君有文學且有志於當世而不屑於仕進今老矣遂築是軒之所將以終隠云夫古之君子不必以仕為賢亦不必以不仕為髙仕而不得行其志之為患耳仕而不得行其志苟非時之弗偶則材之弗良也方今明天子在上側席求人如不及馮君幸生逢其時其材又非可以無用於世者方且惴焉深藏逺遁分甘與小山之招者同羣焉葢與夫代之夸郄林美燕山之為榮者異日道也使彼揚揚露才竊一名以自哆夫又不足不致中踣而貽故林之羞則不止者聞其風亦可少媿矣嘻桂之軒人人得有也而有若馮君者之不媿於桂則尠矣是則馮君之才之號實世教之所繫也因其友程生之請為作桂軒辭二章其辭曰桂樹叢生兮軒之陽沐雨露兮含風霜王孫不歸兮春草歇而不芳軒中之人兮夀而康折瓊枝以為佩兮飡金粟以為糧軒中之樂兮樂無央桂樹叢生兮軒之隂虬龍盤拏兮猨狖笑吟王孫不歸兮實勞我心送史才叟遷上饒吏代馮元贈一門三相兩封王見説郎美文章收拾長才青眼是黄堂栢府槐㕔朝暮直披玉雪倚氷霜靈山懐玉鬱蒼蒼古城隍帶仙房瑶草紫芝隨處發天香盡道如今遷外好只今朝風送玉琳琅金縷唱錦㠶張調雙飛燕調十月六日雲窩主者設燕於清香亭侑巵者東平玉無瑕張氏也酒半張氏乞予樂章為賦雙飛燕調俾度腔行酒以佐主賓之歡玉無瑕春無價清歌一曲俐齒伶牙斜簮鬀髻花𦂳嵌凌波襪玉手琵琶彈初罷怎教他流落天涯抱來帳下棃園弟子學士人家雜文陣圖新語叙孫子論兵謂廟算者勝無算者不勝且敗又謂善守者藏於九地之下善攻者動於九天之上此全勝道也余猶怪今之主兵者類皆無算之兵攻者直撞守者急退耳比之田舍摶兒三進三退不翅也余觀奉元趙信所著陣圖新語得軒轅氏屈機之法而深中今日主兵者之弊信嘗從余遊於睦州抱文武才畧而未遇知己者江浙樞府曾官授其人言不聴則棄官去耶律氏有禮羅其人計不用亦拂衣行余號知己而余在澤雖奇其才而無所於用近聞中吴痛懲主兵之弊旁求天下之善兵算者有以信姓氏達薦書者而信弗應獨與余乃居草堂看古莫邪譚瑶水青黄虬人莫識其胸中也予令其同遊者張憲上其圖於淮吴幕府幕府若詢曰汝師東維子曾上皇帝書淮吴府聘而未起何如憲具對曰欲招東維子請從信始鬻茶夢鐵龍道人卧石床二更月微明及紙帳梅影亦及半牕鶴孤立不鳴命小雲童汲白蓮泉燃槁湘竹授以凌霄芽為飲供道人及游心大虛雍雍涼涼若鴻䝉若皇芒㑹天地之未生適隂陽之若亡恍兮弗知入夢遂坐於青圓銀輝之堂堂上香雲簾拂地中著紫桂榻緑瓊几有太初易一集集内悉星斗文焕煜爚熠金流玉錯莫别艾畫若煙雲日月交麗乎青天歘玉露涼目冷香氷入齒者易刻因作太虛吟吟曰道無形兮兆無聲妙天心兮一以真百家斯融太乙以清歌已光飈起林末激華氛郁郁霏霏絢爛淫艶廼有扈緑衣若仙子者從容來謁云名澹香小字緑華乃奉大𤣥杯酌太清神明之髓以夀余侑以辭曰心不形神以行無而為萬化清夀畢紓徐而退復令小玉環侍聿櫝遂書歌遺之曰道可受兮不可以傳天不刑兮四時以言眇乎天兮天之先天之先兮復何仙移間白雲微銷緑兮化煙月反明余内囦余亦悮矣遂㝠神合𤣥目光尚隠於梅花間也小雲呼曰凌霄芽熟矣四十五日約漢志有曰冬事既入婦人紡績女子所得日四十五何為日四十五一月三十日三十之夜分不息是一月之中恒得十五日也故四十五余觀古豳民男於宵索綯女於宵紡績則豳男女皆得日四十五者也嘻豈惟豳民哉宣王之庭燎曰夜如何其夜未央夜如何其夜向晨則王者勤政亦繼燎於夜也豈惟宣王哉姬公聖厪於忠則曰坐以待旦孔父至聖勤於學則曰吾嘗終夜不寢是古之聖賢未嘗不競晷於四十五日也錢唐諸生有以年過冠室而失師承者及其直賢師友也遂有失時之嘆而不知力扶補人之功故為作四十五日約以策其力而程其功日讀某經若干巻寫其書若干板夜讀某史若干巻評某史若干件著某文若干道朔朢講某文義若干件遵要束而餘力者有慶違要束而力不及者有讓云毗陵行記十月七日事孟冬四將發勾吴彎弓誓落雙髠顱智謀無過史萬葉嫖姚無加李金吾前第已作破竹刃三覆乃裹含沙狙常山長蛇一斷尾即墨怒牯齊奔􅘠玉蕋孤軍呼庚癸皂鴉萬甲迷糢糊江南長技江北無蒲牢一吼千鯨呼赤杠卓入鐵甕戸銕翅横截丹陽湖擣虛之策不出此赤手可縛生於莬當時上將陷江都至今莫贖千金軀後來飛將慎勿疎襄王城頭啼白烏如何臨期易將犯兵忌何必不讀孫吴書烏乎臨期易將犯兵忌何必不讀孫吳書題子昻五花馬圖賓月軒家藏趙公馬癖如鄧公曽騎賜馬真龍􅍡漚波亭上風日靜想像天廏圖真龍烏雲滿身雪滿足紫焰珠光奪霜目九花風細虬欲飛五色波清錦初浴祇今買骨黄金臺圉家豢牧皆駑材將軍臨陣託生死昭陵石馬空遺哀此圖年深神亦化後來何人誇筆亞不見真龍空見畫猶得千金索髙價題謝氏一勺軒一勺水不滿斗我吸之勺在手上連天津尾下泄海焦口主人云小池鑿吾蔀青天納牖吾銕厓道人韙之曰有人悟此坏雲夢吞八九東維子集巻三十欽定四庫全書東維子集巻三十一

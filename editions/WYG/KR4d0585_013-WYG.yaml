  hash: sha256:941a6b78f2fff3156a9e3704f55050d22ad874beef480cc79b6e5d22480c64ff
body:
  text: 平江路常熟州知州王公善政記聖天子君臨天下埀二十載周知物情以守令去民為最近而不可以弗之重也乃下明詔嚴守令之選以作興治道職是者宜其讙忻鼓舞滌濯奮揚以副上德意夫何亷耻日衰奸偽日滋不幸一日有變民環視而起不受條令至殺長吏以應冦而莫之能禁朝廷又大發兵而罪有不勝窮者遂至兵連不觧彌曠歳月而民愈以病告弱者填委溝壑壯者從而汙染綿亘数千里地田菜為蕪邑里為墟雖有高才明智之士縮手鈐舌無救弊之術跡其所從來皆守令不振職之過也吁民憤之積也乆矣存千百扵一二而特異扵庸衆人職銓曹者無以旌别而司文墨者又無以表彰之嘻何以為世道勸邪知常熟州豫章王公其在任五載政平訟理民大和恱既而請老以歸則民懐其德為其立石誌云吏部侍郎貢公平糴記至正十三年春三月中書吏部侍郎貢公奉詔使江淛民䧟賊者曲宥之刑殘之家免以土賦朝廷又慮餽餉不維賑貸不給發内帑錢三十餘萬定俾公於稔地興民和糴公抵呉興諗民有儲粟者聽自陳糴凡六萬有畸於時直益其十之二先付直後納所直粟且下令曰朝廷以和為糴官不得齊刑史不得抱案差若等以三吾與若一以和為義官府始笑之曰民疲久矣悍卒扣門呌􅅝猶不即奉命今若此事其可集耶公曰民為爾給儲多矣吾今誠待之彼亦以誠應吾既而民果聼令相與議曰􅉨時物輸官而直不給雖給且垂槖而歸今公先與直豪髪不以干有司吾何幸也復與平斗斛使輸粟者自槩司庾不得高下其手縣吏與豪民有假是以漁獵者公徴得之皆置諸法父老以手加額曰公之為政吾前未之聞也廼相與詣其求書其事于石以為平糴後法余惟管仲有輕重之權李悝有地力之教而平糴之法出焉大要裒多益寡稱物平施使民適足而已歴代祖之漢曰均輸曰常平唐始置和糴使宋有愽糴便糴之科皆為美制而任之不得其人則亦無異於強取也今公以内帑錢若干不經有司之散歛親與民市告以信令民之聼之若子聼父不三日飛艄輓舶填塞津隘米積於地槩不暇給未越月廪入扵永寧泰定民不知擾而粟已盈數盖得和糴之本法而足以宣上德意也豈非朝廷任得其人之效歟不然彫城瘵郭富家豪室轉在草野救死且不瞻何所取財而云和糴哉此其事為可書也已漢耿夀昌以平糴便益賜特爵關内侯公入覲吾見公之得賜爵也雖然賜爵一己利耳吾聞公有篋中書凡一綱二十目皆切於議大政决大利害而天下資以為治者條陳于上寔吏部獻内職也嘻此其利吾人者可一二計哉又南父老之至望也公名師㤗字㤗父宣城人起身胄監嘗為名御史云時江淛行省檢校李思義以省委事相糴事而郡監伊斯罕公與有勞焉故併書之樊公廟食記至正十有二年秋冦自徽犯江浙政府參知政事樊公宿衞于省省吏皆次第引去獨公柀甲上馬率宿衞兵不滿伯什急出省攻賊從者心之公曰吾封疆之守不守而去是以私利廢臣道行至省坊口遇它遁將以兵孤且散控其馬首返公怒引佩刀斫其人曰城不守何適遂躍馬逆冦于天水橋巷戰以死公在江浙政府凡二年賛其首相興利去弊不為猜􅀈吏中格力以進賢退不肖為已任職雖恭實興提衡伯夷稱仁以將軍塟首陽天下傷之不得全尸故云將葬事見韓非子樊公稱仁以將軍塟天水東南人傷之吁又豈知其自决於義而人自畏愛有甚於生死者乎義既决雖碎首塗地無悔焉死不安於自决而出於有激出於無獲已皆非死義而義利之相去其間不能以寸凡遭禍亂有首䑕義利以奸法筴者不死司㓂幸而死疑佀吁何可以亡辨哉故伯夷死天下謂之義樊公死天下謂之忠興義不可以聲音笑貎掩而得之必决於忠安於素有而天下至尤之物不能易得也自昔死鳴甲雍門狄死徇劍楚囊死銜鬚漢温序死嚼齒張廵死嘔血陳死郢州黄從龍潭州李芾類皆若是吁若是始可與言封疆之臣社稷之鎮矣議者謂全節未必成功也吁節無增損功有成敗無增損者内有成敗者外春秋録死節亦計其内而外有不計焉岐功與節以律天下之忠非春秋義已公之死其僕曰田丁者亦徇主死人比春秋蒯瞶之僕云去公之死兩期月姚園寺僧雪率杭之人為公立祠於天水院肖公之像嵗時祀之樹石于門徴余文以書於是論次其死烈如此公名執政字時申獨杭其自號也世為鄆人其世出仕歴見别傳云聼雪舟記陵陽劉尚賢氏遭逄今天子龍興由儤直為浙垣胡公相府大賓僚自命其退公之室曰聽雪舟介吾徒金信氏致其詞云某於十年前慕先生之風於富春山中願一接見無由今幸軍旅事息鉦鼓之聼移於虚舟風雪矣幸先生屑一言為記余異之曰軒以舟名舟以雪聼此江湖漂泊之境也夜深郭索聲瑟瑟兩氷竅瘁不得熟寐非烟水之窮旅則草溪之寒漁耳尚賢身服鞬櫜者十餘年值天子偃武尚文將陟清階侍鈞天所以聼九奏之樂矣其於雪也奚暇為窮旅寒漁之聼哉抑有說聼雪以聲固不若聼雪以理者之為聼之深也今夫雪出𤣥而尚白似化藏於宻而散於六合似道將集而霰先焉似幾隂涸而合睍而消似時匿瑕蔵疾似量無論高下夷險一稱物而施似平治若是者雪之具徳廣矣尚賢於其具德反諸己而有之則聲不在雪其取數於聼者不既多矣乎不則雪舟之聼窮旅寒漁耳信以是說復命越十日尚賢馳書來謝曰某不敏始識聼雪以聲不愈於聼雪以吾子之聼為至也請録諸軒為記大樹軒記烏江馮侯仲榮氏有先人之宅一區在覇王廟東自其大父某手植三槐今皆合抱為百年舊物侯益封培之扁其軒為大樹侯來華亭治暇過余次舍談及故家喬木曰吾家節侯公軍次大樹軍中號大樹將軍吾固不知其樹為何木木居何地今予家樹出於吾祖手植吾敬之亦呼大樹敢徴先生一言以為誌侯少時以戎行侍主上其說主以除殘理寃以成湯武之業與節侯意不殊其侍主晨夜草舍上聲止也或至饑疲與節侯之豆粥麥飯亦不殊為人謙退不伐亦似之節侯在闗中得軍民譽乃召言者咸陽王之譛賴帝曠度釋其所疑侯亦以律外役櫝胥招執臬者劾賴主上蕳知有素枉隨雪而伸益大赤眉之平定安集𢎞農羣盗胥化為良鄧禹之不能者節侯能之上海之變脇以逮華亭名在死籍人不敢任者侯以百口任之轉死而生者殆萬齒此又節侯之所不能為也取前胄之號以字今日之軒孰云不可侯今去州縣勞陟中書幕府位益高施益大譽益彰又烏知不㧞於不次使秉鈞軸以賛聖主太平之治大樹之澤其必有振爾祖而大樹之號其不有光於節侯乎侯謝曰某也願力先生之言以赴先生之所期也書諸軒為記知止堂記世之高士嘗比宦坑為魚之逆鬚笱也笱一入雖有具龍之體欲翔鱗廽鬛以掉尾江湖之間烏乎難矣故淪胥而沒者滔滔是也恬而避者自陶鴟夷張赤松䟽大夫陶處士而下曾幾人哉老子之經有警人者曰知止不殆其言也可與悟者道而難與淪胥者告也雲間老人夏謙齊氏為某監漕官年未致仕也即勇退歸里名其燕處齋之堂曰知止是有味乎老氏之言哉老人去世已五十年兵燹來堂燬去其四葉孫頥貞猶能力䕶趙文敏所言之顔登於北山新堂不忘先也貞力學有仕才丁時艱而不仕知進退出處者也使其仕也宦之坑人者能坑其六尺之軀哉今年秋貞讌予於堂以落其顔之新登者且請記於是乎書知止堂記愚者不知止沓者不知止逹者知之知而不止與不逹等陶朱汎五湖留侯從赤松知止也使不知止則革屍夷族為伍韓二子而已耳此謝公伯禮名堂之義非愚沓者之所能識也謝為淞望族至伯禮始以仕籍顯官卿郡至奉訓大夫年未五十即掛冠歸隠謂其子若孫曰若知夫馬與舟乎舟之運也滿風送般㨗若流矢千里可一息逮也貪㨗不止則瞿塘灔澦在檣櫓犇􅋓之間馬之馳也星流電掣快意所乘可朝燕而暮越也貪逸不休則太行井陘在銜勒之下吾年未及致事而志已勌矣祖父之某邱某水足以耕釣師友賔客足以觴豆讌樂而一二家老足以主辦王賦茍不知止漂蹶之患將在我矣遂以知止命退處之室東藩大臣屢挽而不起至以疾謝免參政周公琦既為書其室而復求予記予為之喟然曰伯禮之賢於人也逺矣今之仕者惟患進不銳升不高孰肯先幾於赤松五湖之侣稱逹人於時乎於乎上蔡之犬華亭之鶴貽悔其身及其子孫者幾何人視謝氏之堂其亦少警乎書其說為記守約齋記淞汪氏自其曽大父敦武公由棗陽從淮安王南度至其考君澤三世皆以武符襲將門世澤至文裕始以文學換門廕教諭當塗毗陵兩邑升蘭溪州正所在有教績自名其書齋曰守約夫世俗之約與聖門之約異服破褐衣飯脫粟飯儉薄其身而一毫不以利於人非守約也陽讓隂競研極利害守䑕兩端雖大義弗勇於應非守約也蕳倫理削禮法土木形骸率性而徑發者又非守約也孟子嘗曰守約矣孟施舍之約不如曾子之約者以舍徒力於氣而曽子循諸理而持其要者也守約若曽子可矣孟子之心學盖出於此其功用極於浩然之氣塞乎天地之間吁守至約而功至大此聖門能事也雖然曽子之約必自博始不博以文不約以禮又烏知曽子之守者哉文裕心學進於是始知施之守者不足多其於三葉將祖不大有光乎文裕以吾言勉之而已一笑軒記廬陵張昱氏居南垣都司而命其寓軒為一笑求余言為志聖門言樂然後笑人不厭其笑余烏知張子之樂何樂而必為張子推笑為何笑乎張子無樂而笑則其笑為偽矣誰敢當張子之笑乎莊子以開口笑一月中不過四五日此槩常情而言魏宗室萇一生不笑宋包拯笑幾比河清一笑之難有如此者晋陸雲有笑疾梁王筠見人必笑一笑之易有如此者張子一笑不以樂必居一於此乎不然張子一笑吾不得而推也雖然陳希夷一笑而天下自此定季義父一笑而天下自此敝笑哉笑哉可畏也哉吾將質諸張子毋輕一笑三友堂記河間公子李志學氏蚤年讀書九華之山嘗結草堂於山之陽今仕虎林開元戎府客堂一所為蔵修之地一日將客渡錢湖入茅歩登鷲嶺憇客晚亭見有三人者草衣木形類木客各以辤相提唱一客曰五鬛老仙赤松裔青牛歸來已千歳仙客元是風雨師不識人間漢秦帝一客曰渭水龍孫孤竹種海波影拂珊瑚動一竿持寄蟠上公釣得雙璜六鰲重一客曰玉龍聲嘶五更了緑衣倒掛扶桑曉梅仙相見大樹間梨花夣落春雲小三人者見公子各以辭就評公子異之曰赤松氏者盖傲兀世變而不知有秦封者也孤竹氏者將仕矣治則蒼姫氏之治也梅仙者又夣覺人間世而將脫履於蠻烟蜑雨之國也赤松似吾初節孤竹似吾志梅仙又似吾末境也三客者行若異其歸一也吾將尚而有之延致於客堂遂命其堂曰三友而顔之其客鉄心道人志之道人者將進三益於公子期公子為嵗寒交也因録三友辭而為之誌雪坡記淮陽謝公既得余雪坡文曰先生為余立言殆吾座右箴矣然余視今之取富貴者真幻耳奚以異於雪之不可控摶者耶先生言蘇雪之悞於幻亦有味哉請我終其説余曰投雪於爐以閉堅者幻也至人者一體諸盈虛消息於雪也目擊道存而訖亦允所客必於其間吁雪之資於道者如是幻云幻云何哉何哉余聞今淮海之傑五人焉公存中公自㓜喜讀書一遍即了大義年踰三十不屑為章句儒而慨然有澄清天下之志杭為南大都㑹加以師旅因以饑饉雖有大才智不能善其後公守將於斯談笑而理之三軍無驕容百姓無菜色盖必有度越今之大才智者人不得而識也吁觀其寓雪於坡者則得已世之豪傑身罹䘮亂私其托於礪京於金塢於狡兎穴自謂保固厥身至若子孫無止不知人境一易如大幻物適偕之以速斃吁可哀也哉惟高識之士得於盈虛消息之外於不可控摶者是托若雪坡者是也已其友俞孚齋録吾文去曰知道於雪坡如先生者是為真知蘇雪堂之幻入於道矣雪坡能味幻其何逺於蘇也哉凝香閣記光禄大夫平章政事張公分治江淛之三年築城堡脩倉庾廣庭㙜闢田疇休兵息民於是詳延海内方聞之士談仁義講禮樂収東南遺書於賓賢之舘而名燕處之室曰凝香徴記於客鄉㑹稽楊維禎維禎喜公之厭兵樂治也遂為之言曰善乎韋應物之詩曰兵衞森畫㦸燕處凝清香吾取其詩有文武道森㦸之兵不忘武也凝香之燕不厭文也文武脩而天下之事無不理矣今士有深山長谷而出者咸曰吾聞光禄公善尊賢也善養士也善求善内諫也無不忻忻然相告曰南垣有賢相臣如此民其瘳矣乎光禄公下士如周公取友如仲山甫士友之在其席者有帷幄之籌也有樽爼折衝之道也廣厦細旃之廟謨也非是無以入其室者於是横經論道之頃投壺雅歌之餘清香之凝於一閣者不翅如道山風日穆然其舒且和也君子觀凝香之凝如大昜之論鼎可以凝乎命也凝之㫖也逺矣哉光禄公上以佐天子之太平下以安黎民之永定吾於凝香乎占之然則是香也五木百藴不論其侈矣瑞麟辟邪不論其貴矣鰲山數十仭􅅡沈沃甲聞數十里者適足以招弔民之闚也吁豈知吾凝之有其道哉豈知吾凝之有其道哉書諸室為記夀齋記論得夀之道者有三李少君謂丹砂可化為黄金金成以為飲食之噐則益夀此方技家之論夀也廣成子曰必静必清毋勞女形毋揺女精乃可以長生此道家氏之論夀也孔子曰仁者夀子思子曰有大德者必得其夀此吾儒氏之論夀也方技以術道家以智儒家以德德為上也淮隂湯公仁字夀之承㫖趙公嘗為書之於燕處之堂今年登八袠矣為其子者中書省宣使某與諸孫持酒以慶公之高年宣使某又命座客劉仲威氏不逺數百里求公夀説於予將以光其身而且埀慶於後人也予謂齒踰七十子孫目擊乎四世湯氏之福於夀也不誣矣顧未知其得夀之道出於方技乎道氏乎儒氏乎仲威曰湯公素以詩禮教子孫不逺千里延明師若劉正安之徒且將捐田若干畝立義塾以淑及里中兒矣湯公豈方技氏道家氏之習乎夫德莫大於文王文王謂武王曰我夀百吾與爾三焉是夀不出於天而果出於德也信矣公之德充則公之夀可以及其身而延子孫矣湯氏之祖若孫尚以予言勉之衍澤堂記太史公自叙司馬氏受姓所從上起顓頊子孫官居功烈文辭下及其身而上嘻世徳子孫固不嫌於自銘也明泰州孔希道氏自著宣聖五十六孫㤗州之𣲖實繇宋朝散公端朝出守㤗得賜田建家廟於州之東北地因名孔家堡朝散七葉孫瑛仕中山府教授希道瑛子也遭罹兵難挾家廟碑渡江與温衢之𣲖恭㑹不誣盖以世徳自重如此所次之舍又以衍澤二籀文顔之來淞首謁予草𤣥閣求言以為志予謂聖人歿千五百年自衍聖公襲封而下文子秀孫得試胄子監以表嫡氏者尠矣况散而四方墜在編戸稍知自㧞㳺庠序以為食或者又以譜裔不自遭黜者不免若希道氏為先聖仕裔欽欽乎恒懼世德之不嗣入呉執經於名師傳且將試有司與胄監之士角庻聖澤千五百年之衍於我者未艾也嘻聖人德厚其流光其澤隆萬世而不斬嗣其世者又克光其載徳其載德其澤不益衍矣此係希道之自期而吾儕以期希道者吾聞君子談世澤者不在累名疊爵而在行應禮義希道行脩而名至其衍澤也何以尚兹正心齋記淞江萬戸侯石伯玉氏自顔其燕居之東室曰正心伯玉嘗謙予其所在客列者皆士之卿大夫之賢或雅頌投壺或鼔琴賦詩不知伯玉之為武夫長也明日且請余文曰記正心余曰士抱豪傑才而知聖賢之學亦寡矣而况才已顯宦已成恐恐焉懼心之不正思求聖門切已之學者乎予觀代之萬户侯徃徃以少年子弟􅊞先爵伎以習武為名懵不喻於學剛愎自用侈盛自驕又幸而生於太平之世武無所於用惟務臂鷹走馬挾弓矢為畋逰已則炰羔擊鮮招無良狎徒酣歌舞為事者比比也而豈有英年老志切切乎正心之學又求儒先生之言著之座右以為警省如石侯者哉故為之言曰人之所以正者身也身之所以正者心也心之所以正者其道何繇敬而已矣請以射喻射者必正已而後發内志正外體直而後不失於其正鵠此非敬何恃哉文士之心正者占筆武士之心正者占射伯玉知射之不可以心不正也則凡臨事而懼有大於射者其可不恃正心之法哉嘻棘門之戲不如細栁之肅飛將軍之縱不如程將軍之拘此敬與不敬心正不正之效也伯玉尚以予言勉之歸來堂記予入呉首謁三高祠以其去國者非忘君還鄉者非懐土而放迹江湖者非方外敗教之士也呉人至今高三人之高而未知其繼其高者范張而後為何人也或曰上洋有章吉父氏殆其人已乎吉父少年以竒才為丞相府舍人未知乘傳遽為宣使者遂通籍貫近宦逰京師者三十年出貳尹江浙府適以内艱去制闋鎮撫海道裁數月即幡然歸曰吾髪種種矣太夫人之年且朢耄矣城南有桑麻田若干頃足以待禄飬士不知體人謂我何人謂我何扵是作歸來堂扵室西偏遂雅志也余今年東逰過青龍江吉父之宅在江上延致于堂中具聲樂酒事為余驩因得奉觴為太夫人夀明日吉父請文記歸來堂吾嘗嘅晋處士之歸來矣不知者以為耻五斗之折腰知之者以為典午氏將踣而不忍二姓之事人也今吉父生於盛時遭逄聖君賢相之明用於才也而吉父且以才選登要路年未及致仕而即退然以歸則以母故而愛日之誠有不能已者處士之歸其歸以義吉父之歸其歸以孝孝義一道也歸以義非世道之幸歸以孝實風教之榮歸來名堂又豈詭晋處士之迹以自高而求振夫䲭夷子張季鷹之後者耶雖然吉父年未老神爽峻而才識茂進賢者未肯輙遺於吉父也求忠臣於不孝門則已如以孝門則吉父其得卒志於歸來乎請以復吉父命書諸堂為記東維子集巻十三欽定四庫全書東維子集巻十四元楊維楨撰記内觀

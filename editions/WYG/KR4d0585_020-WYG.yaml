front:
  text: 率寺記寺在郡治西二百歩按圖志建於唐神龍初名中興景龍元年改龍興開元中改開元宋大中祥符元年始改今名人呼陳尊宿道塲者唐末有僧道明居之一時緇素居重加性尊宿太守陳操師尊之事見傳燈宋南渡紹興五年有兵宿於寺寺燬十七年郡守蘇公簡至天申節齋禱嵗必出郊詣烏龍寺昕夕靡便遂呼寺僧祖照者經畫土木事十九年寺復興事見龍圖學士羅汝楫記距今幾二百年幸脱冦燹而妄庸者居之視逆旅舍不翅支房别院盡化草莽惟大佛殿與宿鍾之樓僅友風雨至正十五年鳯山僧真如師來主寺席嘆曰予不遇蘇使君五百年尊宿道塲其道遂廢已乎力以起廢為己任坐役逺近大家善㪚其宿居以相吾成績經始是年之冬越二年春告成大殿鐘樓因舊之外山門兩廡法堂戒壇與夫庖庫圊湢皆出鼎建莊嚴三佛大像傔侍者六湧壁金翠供張之具一一完整師介予友童原謁文為記予方悼世梗化者伏尸至數十百里割膾醢肉餧鴟鴉狗䑕者皆基於衆生一念之烈師以棾化行三呉呉人争歸之貧者投力巧者投技貴富者投金粟土木之輸盡良材宻石金碧之區遂為一方冠可為師之化利能也而又有大者焉吾聞法王妙利延被有情不嚴而威不疾而速我朝所以殖西敎配黌廟也遲去聲其効於必世百年之乆而未得也何師能以大法王力圓融一切法性成就一切福徳消惡氛於江表除青厲於海澨使萬年皇圖有以繫中興治統非徒以兠率之龍光亦師之道有以振本教矣師聞言曰善哉大哉請勒諸石以為記師儒名氏子自㓜讀書神觧過人長從五結山佛曰襌師講道要襌師每屈且嘆曰吾道東矣繋之偈曰佛現諸王身身住百佛刹建無萬化利普遍河沙界悟此化利者是為大知識一念生豺狼父子化敵國霄光晝晦㝠生齒盡凋耗兠率世教師佐我國王化山木與魚鱉咸歸大佛道無有一兇孽非我王衆生無有一衆生非我佛眷屬而况䕶國者山君與海王我誦一切法皆隨有應現窮樓與廣殿如降兠率宫供張與飲食廼至種種有金帛競走犇天龍互旋繞我若遇天險天險自然安我若遇劫火劫火自消滅一切大功用乃至不可議我偈非強說得之毗沙尸稽首兠率尊證我說真諦

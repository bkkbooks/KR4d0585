body:
  text: 郡安寺重建佛殿記呉興郡安襌寺在子城東北按圖寺剏於唐光啓中刺史李師悅國郡人舍地而建乾寧中賜額居尼中南渡嘉泰中廢澧㳟惠王趙師揆徙之郡城東北至紹定而燬主僧清復建入國朝為至元二十一年又燬時例主僧梁溪師始買寺之南距一百歩呉氏廢宅轉為寺已而無咎師來法堂與僧廬粗完而大佛寳殿實未建也至正七年法真師來當徭煩逋積之餘齋魚不鳴法龍不吼比丘尼徒有持鉢而去者師乃力振清規大樽浮費又不憚數百里艱苦持䟽於蘇秀雲門之間而檀施以歸既而郡吏民咸有助一椽一瓦朝累暮積以至周足遂經始於是年之秋越明年春落成殿宇凡若干楹土木丹漆備極壯麗金姿寳相以及供張之具一一完好復以餘力展山門之隘起庫樓之缺山門左右重翼兩廡凡前所未及者至是而完矣師以同姓府判公由辰為其父之婭而府判嘗謂予同仕於台遂介府判孫桐生來求記辭不可則為之言曰釋之為教本以勸愚俗匹夫匹婦逃租徭以入浮屠者不難也而世家鉅族有投筓落采脱洗染着以歸於究竟非其真智正覺的若有所見其能安於是乎不則滅倫裂紀不能免世教之儀予聞師筓年即有襌性盖善根之宿植也二十遂辭親出世挿草為宫講第一義凡衆生之有知覺者莫不悲喜踊躍如弱喪有歸遂能大勸於時而化瓦礫為寳坊知其不難也夫佛之為言覺也将以覺羣生沙門之言息也将以息欲而歸於見性師演其教悉能啓羣迷為正覺轉惑見為真智而無吾世教滅倫裂紀之儀若爾非有功於衆教者乎請以是言復於師俾刻諸石為記師本郡趙氏傳心於天池信元翁悟菴其自號云至正十年十月初吉雞足山安定蘭若記去桐廬縣東三十里有山自孫天子象峰南下蜿蜒盤礴為岷為嶼嶼曰雞籠髙不過百仞蟠不過一牛鳴地中突仙人座東龍西虎闗鍵重叠盖桐廬之甲勝也至正甲申松峰襌師憶過此忽啞爾咲曰西毒國迦葉師座地有復至此耶吾自水頂趺足猶以未愜髙勝吾舎是何之遂駐錫此山還名雞足結茅四寒暑學佛者歸之如市檀施日不乏絶里人孫道富子蘭并地以歸鍾文周寧李郁孫𢎞又相與力成之由是起建大殿方丈有所講法有堂棲襌有室以及二門兩廡庫院庖湢歴不十年而以次悉舉雞足之荒峨然象王一窟矣額曰定安取雞足一飛一止義也江浙平章慶通為之書樹石廡西将有所紀必求文章家登載而未獲其人余客馮氏義門師介大馮君士頥徵記余聞古佛徒之開迹也類以垢面毁體攻吾若毄淡為之本挿草為宫擎鉢為食馴至蛇虎􅀢伏轉金碧之區鬼物悲嘯換鐘鼔之竟此豈世之庸妄人所能為哉今之庸妄者托浮屠以規兎王徭志與吾民争秋毫利髙至於樹黨王公玉食而騎逰珍寳綺繡子女狗馬過於大姓名吁其於古佛初意何如耶求其人於古佛徒如憶者宜世以為絶俗髙等之人吾徒君子亦所樂與也師袁州宜春人彭氏名法憶字無念號松峰初禮陜西藥佛山無極信復㳟江西絶學和尚識而得其道云辭曰伊彼西人教及東土布五色雲如一味雨鷄足飛來身毒國所伽黎不懐火寒氷暑廼樹法幢鷄足之剛鐘鼔孔殷棾言孔揚雲棟鱗輯風簷羽翔掲名定安赫有慧光猗無念佛為法出世我力精猛爾役聲勢然火智燈千光勿替上申國釐何千萬嵗隆福寺重脩寳塔并復田記去華亭縣之北二舎近其聚為青龍鎮鎮之南寺曰隆福剏於唐天寳間寳塔七級凡若干尺造於長慶間其徒邵文知俞文富之所募縁也重脩於宋慶厯閲二百餘年風雨之所經兵燹之所更土木殆不支矣主僧普善覽其敗瓴㫁礎不無愴然者廼發𢎞願白千里之大族宣慰使司任公仁發獲畣其請始捐貲營建實大徳之三年也致和元年公之子賢徳繼厥志至正三年公之孫士質光述其事而後締構之精莊嚴之麗日光霞景出雲雨上佛牙秘藏登崇寳輪人天鬼神瞻仰贊嘆力餘及於大佛殿東西兩廡皆徹而一新又假錢若干萬緡為復其所失田三十頃然後象設有所栖其徒有所食飲而寺之敝稍振舊觀薦復遂状顛末介其鄉士王元來請曰寺塔為一郡堆古佛牙之所寄蘇塗之顛時出光景現相載在寺紀今幸任氏三世經營而壊始復完願有言以侈之予惟先王之剏民宇也室奥以庇生竁以送死堅而為墻垣城郭髙而為臺榭覽觀之所亡聞乎累浮屠之製釋氏書謂佛滅後鉄輪王造塔八萬四千一日夜神役也中國倣之或以佛骨以舎利以金玉神像唐鳯翔法門寺塔有佛指骨在焉三十年輙一開開則嵗豐人安天子為遣中使迎之今塔為佛牙所在吾不知若干嵗可開開抑何應塔之成壊實有數靈物之開闔當有時塔之崇非徒靡吾民力以視外觀而已也余嘗悼象教之徒未有一毛利益人而蚩蚩焉惟仰於人以給吾岷之辛苦墊隘者望風而趍其徒益繁則仰於人者益廣主其教者既有以假佛之化現堅固相出大光明也以崇厥居而復有以慮其仰給者而圖長其食土教由是而展布兹非其徒不之善於彼者乎若普善者是已吾聞普善攻苦敷淡業既成而行亦有以動乎人與古佛師功勞辱而有成者相師法比今之避農賦佛逃以偷生者其賢不肖相萬萬已彼尸居素食務治其荒唐之說以為竟祖教而訖無益於教之殿最人目之為髙吾居之普善之蠧而已耳書其說畀之使其人知所懼而且勿忘其居食之自則安知後人之無致力於其所未備者如普善施徳於将來者如任氏云相其役者耆徳曰寳曰秀曰慶曰福知事曰通曰吉曰喜曰俊也任君士質元朴居家以孝義聞便利及人者不獨浮屠氏也至正元年九月八日惠安襌寺重興記秀之惠安寺在郡治西二百五十歩按郡志梁蕭王捨宅為寺以居尼唐光化賜名興善世以夏臈主寺事宋祥符元年改今額紹興七年刺史王公浚明請於朝始更十方襌刹命主僧眉山道立者來具見信安劉阜民記我朝至正戊子寺以民火延燬赤地無餘髙昌觀師領寺事道風法器素為四衆依嚮悼法筵之地一旦化為葵麥之虚徒衆或浮寄他舍觀發𢎞誓以興復為已任不跡權貴之門不役耕作之力盡棄祖父所遺資是年之秋即經始法堂方丈為芘風日地越三年而将得不募而至者檀施如千鳩工治材而大佛寳殿山門兩廊備極雄麗齋房庖庫各以序為三聖寳相十八應貞䕶法大神之像莊嚴殊特所用供張什伯之具一一完好規置堅定披攘經營者凡歴七年而汔於成其徒某状其寺之廢興本末及師之履行介予老友潛居徐公來請記予為之喟然曰天下廢式摩那之教於惠安而觀汶起其廢也數豈偶然哉吁觀貴胄青閨之秀也一誓不轉作殊勝事若此使觀為丈夫身有禄位於世其扶危起仆功之書於筴者可勝道哉抑余聞金色女之教不以祝顱髪住阿蘭若為出家而以發大精進悟佛知見一切觧脱究竟為出家盖以法界為居大空為相而土木金碧之區其成其壊闗乎世教者有不得渉吾無壊無成之舍矣余嘉觀之功能汶既廢之宫而又因其教以示佛學之本庶有以振宗風於既往衍净社於将來者不窮也觀字無相鑑空其號也吉安路達嚕噶齊呼圖克哈雅公之孫安陸府同知曼濟哈雅公之子㓜即有襌性不茹葷血元統元年授皇太后㫖賜金欄袈裟落笄髪受戒具至正七年承行院劄主本寺法席嗣於本寺隐岩静顯師云十三年秋七月六日記方丈室記儒之座云丈席釋之室云方丈仙之山亦云丈乎丈乎其三教之所度而則者乎東谷上人有室在治之惠因所而以方丈顔其名來見予姑蘇舍次出方丈圖請曰陸之天台與海之方丈並予出世幸在天台况所居山有金鰲玉几之勝黄石仙之所留題宋髙王之所托足也至今金鰲背上之詩為惠因山川草木之光故吾室以方丈名盖不自知其逃佛而仙招仙而佛也西㳺淮呉且數年一室之勝未嘗不笈其圖以行而未有列仙儒之言以志也先生愛予厚幸有以志而詠歌之方丈不在海嶠而在吾室不在吾室而在吾行槖矣予在台時嘗窮勝踐過惠因所時上人方脱胎九齡也今予髮已種種漂泊道路慨念宿竟不翅若在弱流三萬外也上人歸其得無辭訊其山川之靈乎辭曰東萬山之羅絡兮縆赤城之盤紆瓊臺方廣欝以出没兮聚仙佛之所廬薄東海之嵬岸兮架金梁之凌虚哀靈脩之播遷兮來仙伯以𨗳輿赤子兮如魚紛望思兮鼎湖嗟山川其如作兮眇風景其愁予望海屋兮渠渠輓飛飈兮以為車上下風雨兮出入太初下視弱水兮黄塵滿區仙耶釋耶吾不知其何誰兮羗從汝兮歸諸清溪亭記呉之東襌寺僧文友自號松岩道人喜讀吾儒書多識前言徃行一時士大夫樂與之㳺嘗築亭寺之西偏臨水之濆蒔花竹其傍故士大夫過寺者必訪松岩而松岩設酒茗必之乎亭之所亭之賦詠且将成巻矣然亭不以松岩名而必名清溪者盖清溪其師正一之號也予未來呉時聞清溪君以吾儒寄迹墨氏而不縛墨氏律日與士大夫飲酒賦詩以風流自命非蔬筍衲流所能窺也及來呉而清溪已逝及見其徒如松岩者能不忘其師去之十餘年而號猶存於新之亭非其學得於吾儒重本之義能若是乎宜吾徒之樂交其人而華其亭以賦詠也抑又聞寺有宋南渡僧曰林酒仙者居院不事熏脩棾唄惟酒是嗜手持鉄鍵槌日逰市間不問酒主名夜即卧酒壚底酒家争供以酒以為聖師云若清溪之為師弟子者得微猶有林聖師之遺風乎嘻吾於是而自感者已今之為浮屠氏以絶倫屏葷酒若槁項黄馘之流日誦經鈔若干萬言以為得佛之道而不知去道益逺而脱觧襌縛如林酒仙之徒乃得稱聖烏乎習浮屠氏之法者可以辯其要矣亭剏於至正丙戌夏成於是年之秋明年秋七月記竹雪齋記至正八年冬積慶主僧臻上人於顧野王讀書堆之南闢一室為燕居所環種以竹上人每讀書其中至雪夜見八忩玲瓏一室洞白上人必披五文衲戴白􅀈笠或徒倚竹下吟嘯自若遂名其居曰竹雪明年冬介友生馬琬尋予三泖之上以記請予曰竹者至剛至虚之物也剛則不屈於物虚則具道於體雪之為物又至清至白之所形也清不自蔽其惡白不受湼之緇也方天地閉塞時竹獨秉後凋之操而𤣥㝠之靈特困焉雪與竹若相軋而不知其適相得也上人於二物者又適相遭於一室宜其取諸物者有得於其剛與虛青與白也嘻竹微雪無以章其秀之特雪微竹無以比其清之敵吾聞上人貞而白者也微雪與竹則又何以表見其人哉竹雪之相軋庸衆人之所得而知竹雪之相資者非上人之協之而誰邪雖然即無於有竹也入有於無雪也春至雷作而萬角突立有於無也金烏一睍而方狀立觧無於有也無乃道之宗極之根也上人學浮屠浮屠氏之學以静虛為宗空無為體上人心不為欲囬道不為物損是能備竹之剛而虛瑕不自匿湼不是緇是能備雪之清而白矣推而極之以至於聲臭之冺然則静虛空無者将有得於二物之表上人以為何如俾琬復上人書諸室為記望雲軒記余逰海上得浮屠友三人曰静菴鎮大明煜天鏡净也净脩長書一通贄余之見於静菴所越三日又徼致其所主院净土招提入其門門草莾立棟宇吾知其有才也升其室緇徒斤斤魚貫立詔以吾聖人之書知其有學也已而燕客望雲軒上求一言白其所以望者叩其以則曰吾非王謌客之望於呉㑹者净有白髪母在黃龍之滸宁先又故廬不得迎以侍此望雲者即狄孝子之登太行而注射其目者也余聞而異之曰金仙氏之教超於萬有之外而净之有其親於天性者不得以真無誣之吾又知其性之與吾儒合也狄孝子之忠於國仁於民者孝之推也净推其孝移忠於君移敬於長移義於宗族移任恤於婣友覃乎民社則望雲者又何異於狄孝子哉宋有稱緇衣相者曰慧琳氏權至杭時宰直假清虛以資燕譚且以誤人家國又何望净於琳也哉至正二十年夏五月四日半雲軒記有詩雲間鑑上人住胥浦之無住精舍受法於金陵休居叟襌師休君命其所居軒曰半雲集賢趙公雍為之書而又介吾徒尚賢謝君來見余黄溪書舍請一言以為誌余讀宋僧顯萬詩曰萬松嶺上一間屋老僧半間雲半間三更雲去逐行雨囬頭不似老僧閒恠萬之有心於閒不如無心之雲之閒也雲之巻舒晴雨皆出於無心故雨人間其施也沛然則為出山之雲雨足而其體也悠然則為在山之雲施也體也雲何容心於其間哉萬笑雲之出而以不出之閒驕於雲也萬豈知雲者哉今上人號古心而上無住之庵是契心迹於雲者也半雲之命於其師知古心之足以朋雲於賔主間也雲豈敢以勞恥於古心而古心又豈敢以閒驕其雲也哉余以是言復古心古心曰唯唯遂書為誌又繋之詩曰我有山中屋與雲相半之雲去何所去雲歸何所歸雲静我心住雲動我意飛一動與一静隂陽互根依是為古心法我儒不能非海屋記談海屋者以海上有山山上有金銀宫闕限以黒弱水三萬麻姑云東海三變為桒田則知海屋有時而廢及觀海屋丈人掌計籌海塵籌充陳兩間弊丈人海屋又最靈而壽者乎吁吹萬物皆有弊惟幻無所與造亦無所與弊故知夸仙談道不如浮屠氏之善言幻也九峰古鼎上人以海屋自命其丈室人問九峰非海島又室非鮫室屋何贅字於海上人謂吾四大觀皆幻求吾室必海如牛渚犀見登州臺觀殆老姏尼之見焉耳何以稱丈夫佛為清逺𤣥虛之神乎晉許榮曰佛者清逺𤣥虛之神今之求浮屠道以老姏尼之見雖吾戒麄法不能竟况欲造清逺𤣥虛之界乎詣極於幻其清逺𤣥虛庶矣君其不信吾将與汝約淳芒與苑風觀於東溟小白花之岩見金沙婦出一幻相如牛渚犀見登州臺觀光景魁磊非煙非塵謂之幻乎不幻乎㑹稽大瀛於聞其言而韙之曰海屋之幻豈上人然吾纍仙伯見已乆矣上人曰何見曰麟之屋珠之宫羙人兮在中乗文魚以相從不知横波兮衝風此豈可與老姏尼輩道乎上人起作和南禮曰幸子雄文録諸海屋以告迷而詰者已而上人呼三辰酒起戞赤金鉢自歌海屋之歌曰煙飛九㸃三山覆搏桒吹灰㸃若水海籌甲子計瀛縮大溟不死尸不宿八柱靈波腐鼇足震旦東傾不動屋并録為記小蓬萊記有詩按越乗鏡水之上有山曰卧龍如海湧鼇脊郡宅據其顛唐人居之以蓬萊自侈山水樓臺之勝竊比於真宮道院是以假觀求蓬萊者也霅水之上子城之中有道士宫曰𤣥好無玉崑丹丘醴泉餌草之異聞人師構一軒其中而亦以小蓬萊自命此非假觀也而以真幻求乎蓬萊者也嘻東方生記蓬萊者幻十三竟云耳萬有形皆幻也以幻示幻所以為靈仙之教之神也子合神觀於馮閎乎方壺員嶠不啻几案物也又安有弱水三萬里之隔哉吾試與子言幻黄初平得仙金華山中之石皆羊也其兄初起眼眼未換肉見石而未見羊初平叱石石皆起成羊數萬頭此非神幻之至也耶然見師之小蓬萊者惟初平能見之不者皆初起之見金華山白石者耳見羊者小可也大可也見石者大小無一而可也師曰唯請書諸軒為記使世眼覷予小蓬萊者兹文為之大圜之鏡也且係以詩曰蓬萊在何許渺在東海虛其廽五千里上有神人居山川異百奥風俗如三呉仙官示狡獪百丈神千軀世人尋地脉弱流墊輕壺徒聞羡門徃澷役君房愚孰為靈仙府乃是尺寸廬燕坐吾玉几天㳺我非車揮斥九清表飄然隘中區豈知蓬大小不識無真無鳴鶴軒記道士徐中孚居錢塘宗陽之西廡嘗從㳺郡菴虞先生先生名其軒曰鳴鶴盖取諸易中孚之繇也而廬歐陽太史又為記之繇之義盡矣又復求余文余聞鶴之鳴亦多變也已其鳴之信則警夜分鳴之逺則聞九天鳴之竒則晝夜六時中律吕至其鳴之神則空中語纍纍之詩豈直鳴肉和外見象中孚之義哉抑余有感鶴者不能不為中孚通也唐光和詩人嘗悼鶴以飽食易天真至争腐鷄鶩前狎羣鳥鳶之内乗大夫軒遂有禄位則玉音沉乎其無闐矣嗚呼利令智昬非惟蠢物為然霛禽亦爾中孚於鶴其勿飽之過而昬其霛也浮丘伯曰鶴一千六百年飲而不食與鳯凰且共鳴聖人之盛而惜余不及諗諸千六百年之後也中孚其能以長年訣㖟予不𤣥霜臺記雲間劉煉師某築月臺於廬之西曰𤣥霜請於箕尾叟曰願先生費辭以記叟曰生物不窮以藏夫造化之母者吾取夫太隂之精太隂天地交搆之先數也在卦隂含陽坎象也坎為月中一畫真陽也萬物之生資此而後成故仙家指為𤣥霜𤣥天也天地初交生物之始猶未離夫天故稱𤣥霜見霜也如𤣥露之凝如絳雲漸積如瑞雲不流盖元氣結成純乎生生之英結之為霜化之為液㪚於萬物頼以成質是故木有三鑽則為火絞之則為水坎津也木得水以行曲直之性無水則枯矣木有三滅則化土離象也真隂存乎其中水道也土無水則地脉竭矣金有三擊則為火鎔之則成汁水象也金無水則不能從革矣天無水則不雨地無水則不雲人無水則神弊天下之物無一不資夫水水位於坎寓於月象而為𤣥霜非至精無以造是𤣥非至道無以凝是𤣥彼日繁霜則盡零炎霜夏飛損物以行肅殺者謂霜之名則可謂𤣥則不可故𤣥也惟太隂之精當之吾嘗登是臺薄筄上覆曲欄旁植空一窻以接太虛之境淡方寸以生魄之際化槁木之形如玉毫之相吾將與汝蟬蛻穢濁而㳺乎太清矣子能從之乎是為記東維子集巻二十欽定四庫全書東維子集巻二十一元楊維楨撰記

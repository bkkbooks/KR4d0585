body:
  text: 傳麴生傳麴生酒泉人也名不一或曰醇或曰盎曰需曰耳或又以其善眩勾顔狀呼之曰鬯曰是曰􅀢曰差有嫉之者則斥曰離一本自醇下名皆作酒邊皆人好惡之詞非生本名也生初降精於星乃子於麴母媒句師造於夏人儀狄氏或曰陶唐時已尊生於衢句堯祿之千鍾舜器重生亦酌之以泰尊其人嘔嘔温雅凢冠婚朝聘燕饗禮無不預號為通才尤善導引辟榖之術故其人最善夀飲其徳者可千日不食人薫漸其化無不睟而陶出其性真然以為剛則悍怒者化柔則訥者倚之有言愞者挾之有奮始生從儀狄氏進禹時先自啓其繇曰得醴于泉得祿於天實用禮節其爵世延勿用甘言至於流淪則罔不顛生得繇欲不徃狄强之禹見生於食前果惡之曰麴生之言甘後世必有以之亡國者廼與狄俱斥絶之五子遂述禹戒以作歌至商武丁舉傅説以生自喻而期説為蘖生者生名始重後受不道為深池位生時伴食生者三千人商用是亡君子始信禹戒之不入妄也商亡周人監商轍使正掌之大酋監之周旦又以戒成王王亦以誥康叔生後遊魯幾以薄徳陷公於楚生名稍減退放肆市間而先民獻酬之禮荒矣秦興苛律禁生羣聚民間漢髙皇賤時常就生民間飲王媪武負家逮定天下生在上所羣臣皆倚生晏見上至甘爭上罪生申用秦律三人以上無故飲生者罸金四鍰文帝時始賜生於民酺三日武帝晚年耗用又俾民酤𣙜民間利豪析不遺雖博陸侯第私藏生致京兆吏斧闗椎鑿鑪罌以捕漢法衰生隨好事者時時至揚子雲家以問竒為事生將隠去矣曺操枋國以年飢復罪生表上禁錮法將作大匠孔融力爭之不從君子悼生之行禮與頥養民者廼終以𣙜與錮敗哉生歴晉唐名復盛陶處士潛家無貲劉始成送錢二萬潛即轉生生受不為汰唐諫議大夫陽城所得俸錢計鹽米外餘悉送生所生亦不辭生迹若嗜利心實儻盪無校計以故不問人賢鄙貴賤老稚皆獲與接顧獨郤交老釋氏與喪服之士其人或潛致生徃者生輒能形見之其去就辭受非人取量若此惟性過和順雖樂君子宴娱亦貪與婦人俱漢司馬相如竊卓氏至臨卭人不得窺獨生得狎之壚頭晉阮公籍東鄰有美婦亦與生狎至招王安豐輩時時過生所借生熟卧婦側末與王永安婦交掌娱人則法士所羞譚也今上起生青州從事上見其貌古而中粹然問夀幾何對曰臣自農皇時至於今二萬五千四百二十有八甲子矣問夀何術對曰臣不知他術惟不死天和耳上方有事南郊及養老錫功一採生古禮生定一代儀稱上旨升從事秩歡伯又加爵醉鄉公食若干戸後歸老於鄉莫知所終太史公曰余嘗疑麴生之為人稱聖矣而溺之者亡國殺身則斥曰狂然交神明揖遜俎豆又何其唯唯耶然則生一人顧用者何如耳論者曰良將仗一簞投河上而三軍為之死一陷反間則宵遯為敗軍之將此其用善不善效也觀其生之用而卜成敗雖千世可知已氷壺先生傳宋蘇易簡欲撰氷壺先生傳而不果密溪清上人請余補之且屢奉蔓菁供遂為援毫傳曰先生姓蘇名葅字受辛始祖出蔡其後分旺蜀者名蔓菁知名於諸葛武侯亮亮嘗稱其有六利蜀子姓名於唐者曰金城土蘓先生金城後也性甚清淡生不嗜羶腥幼時在金城遇相者曰蘇生負濟民具苦無食肉相異日徒以三百罋黄為其料錢耳然士大夫欲命世者不可一日不接其旨論先生學殖滋長時出其根苗三千貴人鼎自以薦其用能使嵗不饉不然民有吾色且能咀得吾本者曷事不理貴人斥之曰賣菜傭槁項黄馘類古野逸雖釋老氏精戒行者亦與接飲食惟太學生交最密嘗相誓茍富貴毋朝夕忘人有誚者曰太學生腹彭亨五經笥實菜罌五侯食客曰淳母氏䍧氏摩氏等凢八人咸謂席上珍八賓或取猒於主者必召先生與俱主人甘豢餘若醉若寐聞先生至即爽健起立時先生拔其族種聮茹至終不與八人者爭進故八人亦無媢之者後豪侈家有想聞其風采而不可得輒呼帳下兒趣庾氏即菹及中牟令苗用大先生其風味終不似也先生嘗雪夜有故人痛飲至夜半吻燥甚不可當亟呼先生清談談皆有根依齒牙嚼嚼成宫角已而爽入臟腑清氷瀉玉壺也故人笑曰今夕啟沃之樂雖金盤瑞露無以尚此顧無以謝徳厚死諡先生為氷壺從而歌曰我心兮如酲彼美人兮獨醒載歌曰美人贈我菁瓊英何以報之玉壺氷後先生以齒終於家門人圖易名先生舍氷壺無當者遂相與諡曰氷壺先生云史臣曰東海疎姓分二族居涉鹿山者走足為東居蔡者如草為蔬東後罕有聞而疎族蔓天下至先生世次莫詳聞其先薦進楚惠王以蛭事疎去漢有名平者從華佗學方藥吐咽若蛇人以為竒先生邁種徳而以相者言不仕然殁諡氷壺天下名士大夫至今宗不衰豈以祿食哉氷壺先生葢蔓菁連根虀者是也蘇公周曰連咀數根其義可推予嘗於霜夜酒渴起詣厨中覔水鼻觀忽觸寒虀香則誤蔓菁在瓶亟取啖其根渴隨解而酒俱消矣時惟歌簡齋氷壺先生宜立傳之句與蘇公同一適而傳則同一欠事後見鐵厓先生為蘇公補傳文中所謂咀吾本所謂連茹至終所謂言必有根依者於氷壺為實錄非惟補蘇公之遺實有以慰余心之缺云中吴孟潼書傳後白咸傳白咸其先河内人河内曰鹹在夏后時有居青州者嵗貢上國未入官至周子孫有曰苦曰飴曰虎者始入官共祭祀賓客膳羞事周末子姓昌熾在齊東海島間環水以自國習夙沙氏術日以隂陽水火煉脩為事其最功者名成金筦子筴言與齊大夫管夷吾交獨密遂進筴夷吾介之通齊君自贊吾筴可用使齊富强天下夷吾力薦侯曰齊國貧且飢而使成金抱遺利不用是仲不智也知而不言是仲不仁也仲為君得利師惟君法焉齊侯喜用安車禮聘之馭千里驥服其輜裝益闢土海濱鑿井築竈葢茆比比若拂廬然使顓煉脩其中民揺手觸禁不得犯不一年功地沙土皆成白銀抱利充然而齊霸天下矣繇是齊侯請於王賜爵鼎侯封其國曰海王俾世子孫食邑若干户咸去鼎侯十世父曰潤下與母富氏媚禱於竈得咸漢青龍壬戌生月丁未日者推曰咸水命日最旺火伏壬戌大海水未月入庚伏運一轉實能贊國家闗石咸為人魯重嘗自負為席珍與庾嶺梅處士氣味同酸醎結為伯仲交而世未嘗薦進於上者㑹吴王濞取士於魚鹽東海人遂以咸充賦王見咸膚玉雪星星然笑曰咸所謂江漢濯而秋陽暴皜乎尚者用之吴富遂甲他諸侯然濞因是以驕已則亦咸有罪也武帝元封間咸用齊東郭咸陽薦職列大農其族屬名官者二十有九文鍵應前未有官時雒陽賈人桑𢎞羊南陽大冶孔僅皆併口附咸議得寵幸咸自謂遇不減鼎祖然國未富而民先病矣咸在官若干年徒縻牢廩而績用弗成廷臣有欲烹其黨𢎞羊者帝晚年亦悔用咸猶未罷遣又學士羣議咸失皆願罷咸而後化可興咸自是稍引退云太史公曰白氏本出炎帝後戰國時有圭者最喻於利昔嘗見闢孟軻氏咸一志利民覆民是病古之利民不民之利而民自利利莫大焉咸通異是故自齊管氏能用白氏斤斤使其君霸後之得其利者或寡矣嗟乎當咸遇大漢使勸其君除苛令調齊衆不損下以益上庶幾鼎鼐之佐哉璞隠者傳為海虞繆仲素譔隠者蒲氏名𤣥玉璞隠自號也上世徂徠人戰國有仕齊即墨大夫又為即墨人其始祖曰爅氏濕者隠徂徠山得煉形術初煉體赤再而青三而𤣥其面老可鑑文有五龍章涅初生時筮之繇曰震木其相離火其光非青州黄𤣥斯用章水石摩盪吸隂吐陽以相四目天下文昌厄祖龍氏𤣥用皴􅀈文塞而敝與滕氏同傷孰愈璞隠卒退於洪䝉叶厖俊捏相倉頡氏制字太昊氏著三墳五典八索九丘燦乎其有成章皆涅子姓也秦時有由即墨隠泰山始皇東封泰山遇其人爵為五大夫及坑焚禍作殃及大夫𦙍子在官襲封松滋侯惟用于刑俾議黥劓事時上愚視民曰黔視松滋上黔耳松滋之後曰瑜麋在漢書尚書令僕薦引與管城子穎同升道亦不行蜀人揚雄氏居家習𤣥學退而依雄雄上長楊賦非藉麋為客則不能見幹林主人故雄始終以客卿呼之麋遂隠於蜀子孫不聞有顯者聞浮提國有分派曰金胡氏汁灑地能幻文成字晉有九子者與二陸為文字交然亦不利大人多利隂陽婚家時祝詞曰九九子子生之松滋宜爾子孫蟄如螽斯至宋紹興而𤣥玉始以璞隠自祕不知生父氏自云繆公子稱知己繆築軒居之且以其姓姓軒權貴人詣蒲軒爭欲致璞隠璞隠終不起且曰吾祖由蒼頡氏召用佐功文明文極而僿天厭僿火嬴氏况又僿嬴後者乎予不隠其有不以吊滕氏者吊蒲氏此予璞隠亦應祖繇晚年得道自詫曰吾用物精多吾夀可以敵堅木矣入水不濡入火不爇矣得吾道者蓋鮮矣李廷珪墨可以割木入水火不壊太史氏曰上古有黑鹵氏涅出爅氏其黑鹵支乎中古孤竹君亦由台氏改墨氏至璞隠又冒蒲去墨氏其先雖爵顯于秦賤與黔等孰與無赫赫名帝皇世而功焕然在天下嗚呼璞隠用不用係天下取舍不幸殘於黥鈐窮於雕篆其命矣乎始繇之見也若璞隠者謂之隠無用文者非歟竹夫人傳夫人竹氏名筎字珍瓏自號抱節君其先為孤竹君之子曰智諫武王伐紂不聴遂不食周粟餓於首陽山且死召其族告曰吾不食死百世後當有不食飲者為吾女氏以捄世之濁熱然未嘗如鎖子婦之隳其節也越若干世為宋之元祐年果生夫人夫人生而瘠如篾器成將作匠之羅織巧慧其中玲瓏空洞無他腸又善滑稽圓轉雖與人狎其情邈然如木偶氏誚夫人者無螽斯分而善之者則無内荒長舌之禍也嘗見聘趙氏子充家奴畜之豫章黄太史庭堅聞其人作詩雪之以為憩臂體膝辱夫人而况又奴之乎夫人亦犯而不校夫人自以家世素清節終恥屈身於人鉛華絲枲弗之御雖荆釵棘簪之微一皆棄斥由王后嬪妃下至公卿百執事無不器重之召亦無不徃然所在抱節終身未嘗少汚其潔先是得長生久眎術於羿娥氏用能辟榖導引以應鼻祖氏之言其蹤跡詭秘當炎而出方秋即遁去囊括其身自比雖有甕人或謂尸解不知其終史氏曰莊周稱姑射山有神人肌膚若氷雪綽約若處子夫人豈其流亞歟惟其辟榖不食飲故老不死人疑為女仙後人有見於葛陂者與壺丈人同蛻去云學圃丈人傳丈人出蕭史氏生龍虎之阜髙居㑹稽之陽丈人生而機悟絶人長而慷慨偉風度有治天下之才而不奸於仕晚乃棄儒衣冠入道研窮至理又自理於畔以老圃為事抱罌握臿不自以為苦築室圃中既以安之人且以學圃丈人目之怪而扣者曰孔子大聖嘗吏乗田莊周大賢嘗吏漆園未聞以老圃為事如小人之樊而見絶於聖人之門丈人勃然曰有是哉彼有離絶卿相桔橰于園幾於近名攻治陳言腐滅嵗絶不窺於園幾於喪真吾幸免乎二者之累園公圃吏為社為鄰人無識我我亦無識於人烏知我不如老圃與古先之至人扣者懣然欲退丈人復止曰汝以予為圃人乎詩告若以圃道也理圃者理天下之範也圃而蔬茹出焉藥果實焉材木出焉凢地産之利無窮屈焉一日不治則利盡廢可不學乎哉噫吁嘻北客馬踐園而漆室女之為憂者長也扣者再拜謝曰始吾以丈人為鉏丁不知其為有道人也野史鐵􅐟道人為録其詞為傳而又贊之曰樊須氏之儒叛教自愚於陵子之卿盜亷自汚吾非斯人之是與其列禦冦之居列子隠居田圃四十年漢隂叟之徒也歟漢隂丈人羞用桔槹魯鈍生傳魯鈍生不知何許人或曰東魯人也六嵗善讀書日記萬餘言十嵗能為古歌詩長明春秋經學狀貌竒古人以為偉兀氏魯鈍生笑曰使余扺西域用法科才魁天下士一日之長耳不幸生江南為孤雋落魄湖海間以任縱自廢浙憲使者嘗辟生為書史生拂然也抱成案與俗胥離立大官前非吾業亦非吾志遂卻余嘗邂逅生西湖之西東湖之東與之登天目歴七十二弁之峰題詩絶壁上間逢山中異人讀之咸撃節以為人間竒才也生酒餘必歌詩詩之餘索余莫邪笛作君山古弄弄闋呼山童出陁尼錦囊中宣和賜墨研銅雀缺瓦作涪州秃翁古木石及中嶽外史雲嶠圖自謂在古無上人欲以富貴勢得之弗能或遇江海竒士不需而乞與之生剛果亷直見人過不能容或面折之有一善則又稱道不已其是非曲直之性頗與余同故余在三吴山水間多與之遊晚年著書自號金馬子有太平萬言書約余北上共余三史統辯陳天子之庭而予未果也今年春忽自葛峰來㑹余雲間曰吾將挾吾戅為太史公遊遇偉人問余為誰余嬾自陳請子作魯鈍生傳故余為之傳云楊先生曰余友海内竒士屈指不能四三人其一曰茅山外史張公雨其一曰大癡子黄公望二人老矣晚得魯鈍生生始明經不肯冒西俗舉性正矣及遇辟又不肯諂事貴官益髙矣樂從余遊山水間適酒後吹鐵笛和古歌章若狂矣而晚將獻天子書陳天下利病成敗其果狂者乎慧觀傳慧觀者東越婦也家世業儒未笄時大父異其警悟授以五行書長而益深其學推人貴賤禍福徃徃竒中中年家祚落從其夫游江海間夫亦儒家子得妻之術相與簾市肆售其術問者則皆之慧觀氏慧觀清而弱日推言數人得錢給薪米即謝客過其門者莫不目而駭之余嘗與之語而異其人蓋非婦人也慧觀之言曰吾不幸形婦人以生生而不能以婦人自處又其不幸也重不幸而以生月日為人言貴賤禍福是特以生吾之生不知生吾之生者果何言取乎不然形吾累也然天固假我以形而實無形也洩吾以言而實無言也以言求吾猶索目於影况形乎且吾之為吾亦非吾之所得吾也吾特吾之耳又不知吾之見者有以吾之不吾者觀吾否乎然則世之罪我者固不少於生我者也楊子曰婦人之言有是哉觀乎觀乎可以婦人目之乎吾聞藐姑射之山在北海中有仙人居焉肌膚若氷雪綽約若處子乗雲氣御飛龍而遊於四海之外水浸稽天而不溺大旱金石流山土焦而不熱不知溺我者又有所謂水火者焉觀室處者也千里而遊蓋無一日而不在水火中也不為其溺且熱其椉氣御飛龍而遊乎四海之外不自千里者始乎觀乎觀乎吾以姑射之仙望之矣居北海之中者彼何人哉葉政小傳政字克明姓葉氏淮隂人自幼警悟知讀書自奮拔既冠以讀律充浙省幕史善建白論裁常依名節上官竒之至正辛卯隨左丞孛羅帖木兒討海冦壬辰侍平章伯顔帖木征湖廣克池陽銅陵破蘭溪渠魁徐真一砦削平蘄水賊巢屢獲賞給丹陽縣富民束章輸漕至蘭溪見政與語莫逆即以兄禮事之未幾起粮赴沔陽泣别曰弟今濟大江涉重地死生未可知兄平生篤信義願以資囊相託政固辭弗獲俾章手緘藏之逾月章鄉友朱讓率其奴來曰章不幸入蓮臺湖遇盜死矣請其資囊政曰汝寓物於章章未嘗語我我受章託義必質束氏明以付汝朱以政匿為己有銜之明政抵京口㑹束朱氏父子坐丹陽驛門啓囊緘得錢二百五十緡黄金五十兩白金五十兩珠八千粒衣帛有差歸之束又得錢五十緡黄金五兩白金五十兩珠千粒歸之朱二氏盛具酒食以謝政不答而去政居軍中凢五年悉心金榖遇有功輒驗格言諸上官上官以其致力匡匛移文薦之授某官父季實從父蟾心前至元俱奉詔入覲季實授行宣政院都事蟾心授翰林直學士有文集傳於家云小鴉傳小鴉者錢唐人姓張氏名訥字近仁其父某鄉校君性鯁直面折人過無忌憚人呼為老鴉舌訥性如其父人又呼為小鴉游吴出長紙書一通斧鉞黄葉蔡偽王張氏欲官於𢎞文竟拂衣去大明天子遣使浙河招異等材訥在選中凢二十五人至京師見天子於謹身殿各實封獻所言訥笑曰汝輩封櫝上眡為爛紙語不若訥櫝在尺喙中竟取決於天威咫尺下從則留不則還山也他日言者出訥獨後留上問留故訥答曰請與生詳言首言太廟次千步廊城丁勞死事上首肯之放役丁生還者若干人授官斷事張氏偽官沈善夏昱除官憲府訥聞即走奉天門下白上曰沈夏亡國俘而置之法憲非惟辱法臣辱朝廷甚矣上韙其論即黜退連百餘人銓吏嫉之調訥山東縣令上嘑銓者罵曰汝輩雞狗忌訥在吾側耶復改授御史後以言中傷臺長請歸天目山弗從今轉諫議官云雪篷子傳雪篷子葉氏名以清字子澂雪篷其自號也其先京口衣冠之胄宋末大父懋地華亭父鍈遂家焉篷貧而尚氣節有古義俠風徳清尉劉昶者聞其義聲訴以三喪不舉篷貸錢五千緡資之監黟縣伯顔調兵昱領顔行囑妻子曰我死母且老當徃依華亭葉子澂顔果死一夕篷夢顔曰老幼難中請以為託越二日其妻子果奉母來歸篷老其母若已母幼其子若已子淮兵入蘇守淞苖帥某遁淮帥史文炳以鄭焕尹郡鄭欲火巨室黨苖者篷素與鄭交白以大義而免持金帛詣篷謝者旁午悉拒不取鄭辟篷尹華亭紿以父病辭及鄭以賂敗逮辜者六十餘人篷獨免初鄭獲苖遺米與篷一大舟不受轉以賑乏絶無斗升及己時避地依篷者若建徳尹楊瑀平江尹貢師泰建徳通守毛景賢篷待之如平時男女踰室家期者為擇配瑀卒囊無一錢篷殯葬如禮同門友胡方養疴同郡謝氏館方無後歸篷具藥粥踰月弗救具棺槨㑹親友籍方遺物咸歸其弟妹闗西趙友道逆旅來歸篷解衣推食閱四載病期月饋藥弗怠浙省員外王國賢以囊橐留篷所國賢死篷以完封歸其妻子凢此皆近古豪俠之為也淮南左丞史父辟篷諮議不起江浙辯章王公以省檄辟幕府亦不起應南京天使訪賢人至淞首聘其人終於不應事母極孝母亡哀毁骨立晚年搆草堂蕭之津躬耕在公田墾老圃以自食其力不入城府者若干人當路重臣識與不識皆慕之如古人云鐵史曰漢袁絲折安陵富人之言曰天下緩急所望者獨季心劇孟耳至嫚罵安陵曰陽從車騎來一旦緩急不可恃吁義俠之係於天下者如此太史氏俠傳所由作也淞之大姓民武斷其里者主之後之靡耳烏有緩急所恃如心孟者乎若篷者亦淞之人負氣俠而亦庶乎心孟之流乎故予特傳之陶氏三節傳三節者天台陶明元氏之子婦王氏淑孟女宗媛季女宗婉也淑從夫宗儒爵封宜人吴元丁未秋兵入台淑屬子於傅姆曰汝以歸其父吾誓不兵辱即赴井死年二十八宗媛適里中杜思絅思絅中流矢卒時姑喪在淺土夫又未克葬忍死䕶兩柩為㳺軍所執媛不受迫辱兵加刃脅之大罵曰我若畏殺吾已去久矣請速殺我遂遇害年四十宗婉適里中周本歸未一月兵至持一婢走池滸阽溺一卒突至引其裾曰妻我免死念無以自脫指其婢曰可先妾之俟卒擁婢不為備婉即投池死年二十二鐵史曰方氏據沿海郡十年所陽浮受明命隂禁民母送任台陷日忿兵肆戮大姓女婦辱而驅之若狗豕三節乃獨聚於陶氏一門貞白一志從容白刃之下丈夫士有不能焉吾聞明元氏嘗官有元閩檢校衣冠奕世以忠孝亷直為家行配之賢又出宋宗女趙氏也宜其教漸於窈窕諸淑者若此余傳之使采東國之風者得之足以光彤簡云跋跋君山吹笛圖華亭沈生瑞嘗從余遊得畫法於大癡道人此幅葢為予作君山吹笛圖木石幽潤水山清逺人物器具㸃綴於豪末者纎妍可喜瑞年未三十而運筆如此加之嵗月其則不在一峰丘壑者幾希矣抑余有感於是者予徃年與大癡道人扁舟東西泖間或乗興涉海抵小金山道人出所製小鐵笛令余吹洞庭曲道人自歌小海和之不知風作水横舟楫揮舞魚龍悲嘯也道人已仙去余猶墮風塵澒洞中便若此竟與世相隔今將盡棄人間事追遊洞庭儻老人歌紫藟如道人者出笛懐裏間吾取其與明猗相樂者引滿數杯據床三弄遂與紫藟者終隠十二峰瑞能從之否至正己亥秋八月中秋日東維子集巻二十八欽定四庫全書東維子集巻二十九元楊維楨撰

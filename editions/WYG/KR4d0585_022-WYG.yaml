body:
  text: 芳潤亭志君子論根源者莫大乎世澤之厚論福壽者莫大乎六藝之學也故得其學者根固而芳菲源深而潤敷前人以是始之後人以是終之芳之菲無時而歇潤之敷無時而涸矣世之言芳潤者與是異曰爵以芳其身而其芳也朝榮而夕悴曰富以潤其屋而其潤也乍濡而忽槁豈知六藝之芳潤者逺且大哉吾来呉中得所見之家證其信者曰琴虞氏也虞氏自某公至宣慰使公用六藝之學厚仁根義不食其報者已若干世宣慰始克享有榮名五十餘年而其子若孫林立頴發出典大縣者三掾史院者一以經行應賢能之書者不一而止其為芳也彰矣潤渥矣此任氏講禮樂之亭而有名芳潤者非以林池華竹之勝世澤之允蹈也主是亭者為伯璋宣慰公之第五孫也伯璋齒方壯惇行孝友又善尊師好學光於前人二時名卿賢大夫皆折行輩交之吾知任氏之芳潤方全盛而未艾也不然何其子孫之多且賢歟吾不及識宣慰公而幸伯璋與吾遊嘗觴吾亭之上講求六藝之所深得且求言以為志吾於任氏之芳之潤益培而馥使世而彌章益疏而沃使及物而彌大也實有望於伯璋故書竹西亭志客有二三子持竹西楊公子巻来見鐵崖道人者一辯曰大厦之西有嶰谷之竹斷兩節而吹之恊夫鳯凰此吾公子之所以取號也一辯曰首陽之西孤竹之二子居焉清風可以師表百世此吾公子之所以取號也一辯曰江都之境有竹西之歌吹騷人醉客之所歌詠此吾公子之所以取號也道人莞爾而笑曰求竹西者何其逺也哉伶倫協律於嶰谷未既竹之用也孤竹之子餓終於首陽亦未適乎中庸之道也廣陵歌吹又淫哇之靡竹之所嫌也地無徃而無竹不必在淇在渭在少室在長石羅浮慈姥文竹之所也公子居雲之澳篠簜之所敷箘簵䇢之所蕞結亭一所在竹之右即吾竹西也奚求諸逺哉雖然東家之西廼西家之東也竹又何分於東西界哉吾想夕陽下舂新月在庚閶闔從兊至公子鼔琴亭之所歌商聲若出金石不知恊律之有嶰谷餓隱之有西山騷人醉客之有平山堂也推其亭於兎園莫非吾植推其西於東南莫非吾美二三子何求西之隘哉三子者矍然失容惵然下意逡巡而退道人復為之歌明日公子来請曰先生之言善言余竹西者乞書諸亭為記歌曰望之娟娟兮雲之篁結氤氲兮成堂百草棼而易蘦兮孰與玩遺芳曰美人之好修兮辟氛垢而清涼豈大東之無所兮若稽首乎西皇虚中以象道兮體員以用方又烏知吾之所兮為西為東叶當芝蘭室志芝瑞草也非薫草孔子善人之論取以配蘭而言香何也葢蘭有三秀如之者目曰芝蘭芝蘭非凡物也芝葉蘭花則象山陸氏志故孔子以芝蘭對鮑為言晉人以芝蘭對玉樹言傳曰仲尼蘭鮑荀卿蓬麻亦獨以蘭言也朱子蘭辯曰古之所謂香花葉皆香燥濕無變今之所謂蘭花雖僅香葉乃無氣質又脆弱豈古君子之可刈而佩者乎為之喟然曰古之善人吾不得而見之得見古之香斯可已古之香草亦不可見則草木亦有隨時而變者乎離騷子悲於芳草豈可寓辭乎嗟未已而馬生去偽以芝蘭命室來謁求記庸詎知其寳之芝蘭皆孔子之所稱者乎抑朱子之所謂不可為君子之佩者乎生愀然變色曰離騷子悲芳草之變者傷亂世之君子某之名芝蘭之室者其與盛世之君子居也盛世君子某幸首得見某人某人者天下士也次得見某人某人者一國士也又次得見某人者一鄉士也十年不得見先生而今日見之非某之所謂盛世君子盛世芝蘭乎不幸有變者雖當吾門而必鋤况入吾室乎其不變者雖在野而必来況在吾室乎予聞其言而韙之為之歌曰芝蘭在野兮不以野而自傷芝蘭在室兮不以室而自慶叶世服艾以盈腰兮羌獨佩蘭以為常冩操兮歌吾商芳菲兮彌章虀罋志桐廬章木氏客處錢唐委巷中得一室陋而且隘自題曰虀罋既得待制杜公本書其題又移書雲間請予志予復以稗官之説窶士有三百罋為何神所請者子何樂以其請者自居乎章木曰士不可以一日而忘虀味人味乎鸞脯鳯腊者有而未有知虀味者十二日而不知虀味其道殆已予又復之曰虀又從韭青州奴作韭虀其味最天下至殺帳下奴之漏其術者子之虀亦有是乎章木曰此吾同名而異味者青州奴烏知虀味哉使知虀味金谷不墟二十四友不禽也予韙其言遂為論次曰漢禰生眼空天下士謂荀彧差可語餘皆酒罋飯囊耳世以生民脂膏養天下之酒罋飯囊民亦不幸甚哉守道息食于虀罋而出而可天下生民飽食而廣居也子之罋其得自狹而人得而過陋哉隷之辭曰罋之室子儒之宫一室之隘兮天下之容吾何隘乎兮罋而志乎高臺大墉罋之虀兮士之茹一茹之苦兮天下之腴吾何醜夫虀而志乎龍肝鳯晡漱芳齋志雲間吕生恂名其新闢書室曰漱芳取陸士衡語也而有請於余曰呉俗嗜好尚權利次貨殖婦女狗馬及方伎服食之秘也恂頼大人廕雅知有義方又頼先生教顓習在六藝時時能伸筆引舌漱其餘芳足以自腴葢不知俗有權利貨殖婦女狗馬服食之秘之嗜已願先生有以志諸室以儆予入呉雅有喜吕氏父之善教其子也又喜生之嗜好異於庸衆人而善承其教也而芳則難言也何也芳者大道之英至治之馨也世之泰其芳在天下世之否其芳在六藝天下之得之者尠矣離騷子嘗思得之曰芳菲芳而彌章至於悼時不得則曰哀衆芳之蕪穢其所以自呾於萬三千言者則亦徒得諸齒吻之膏觚櫝之馥而已耳其能沾溉全楚之國哉然其芳不溉全楚而溉於天下後世也逺矣故得其芳者皭然泥而不滓與日月爭光焉可也嘻騷之芳且爾況聖人六藝之芳乎陸氏子服膺儒術者著文三百篇葢亦有志於芳矣而實未嘗得之使其得也其能去舊鄉好新國甘即戎服敗河橋以遺華亭老鶴不勝之怨哉方今聖天子思至治之馨表章六籍以取士士有不在六藝科者不得奸時以進生於六藝能漱其芳之所獨得異於陸氏子也而又遭逢盛時以大科進焉則其芳也肯為離騷乎離騷不為也又肯為陸氏子乎生勉之父師之望生生之自期以畣父師望者不在是乎勿徒曰漱芳者自腴而已也異俗之嗜而已也至正九年夏五月十日蠢物志雲間李彬家有園池池上有卧石一其狀類怪人題其顔曰蠢物彬嘗觴之所醉踞蠢物曰爾蠢烏知不有蠢如爾者乎彬曰爾不蠢吾蠢物還有説乎余曰石氣之核也怪而以為用也貢於禹隕而以為警也書於春秋曰嘉曰肺以為乎疲而達枉也設於周官鼓也聲於桐魚鏡也鑑於月林劒也利於昆吾慿也醒酒於平泉之墅鍊也或至於補天焦也或至於縮海及其幻而不常也至羊立而人言物之靈若是而謂之蠢可乎今夫具隂陽五行之秀命之曰人與天地參而有冥頑勿靈非人類者詩曰蠢爾蠻荆書曰蠢茲有苗以其冥頑匪人類不可以王化率故詩人古史皆以蠢加之吁蠢有不蠢而不蠢者蠢也抑又有説人之逞知覺舞聰明蠢號曰通人曰知士曰巧官及其窮也通覆不如塞智覆不如愚而大巧覆不如大拙也雖欲為蠢物不能然則彼謂不物於蠢而謂兹物於蠢者孰愈孰劣哉君病夫不蠢者之勿蠢物若也故以之號而警之乎不然蠢物不蠢也濯纓亭志有三客者會於霅溪之上濯纓之亭各陳所謌詩以白所志一客歌曰桃花一實三千歲不識人間漢秦世溪上漁郎何處来溪水東流復西逝一客歌曰荷為衣兮葉為裳飲沆瀣兮餐朝陽山蒼蒼兮水泱泱懐美人兮天一方一客謌曰我所思兮思故人堯舜之主臯䕫臣箕之顛兮頴之濵飲牛豈弃巢由民又歌曰鑿則圓兮枘則方尺有所短寸有長文武之道一弛張龍伸蠖屈安厥常歌闋以質於濯纓主人主人曰一客之辭逃世之士所志也二客之辭喪居之士之所思也三客之辭一隱一顯與時推移之士所為也如用之吾從三也歟三客者退録其辭者鐵厓道人㑹稽楊維禎主人者為中臺中丞公呉鐸也癡齋志余嘗疑顧愷之稱三絶而癡當其一癡者不慧之名也使愷之果癡尚能以才絶畫絶命世耶不知其癡句㸃所寄也桓温謂其癡㸃各半吁愷之之黠果可以無惠求之耶晉士大夫徃徃用癡養慧如王述王堪之流是也老子固嘗論辨與巧矣曰大辯若訥大巧若拙此晉人用癡道也錢唐盛生修齡自蚤年得癡名於人因此自命吾不生之癡果出於無恙耶抑愷之寄之也生嘗從余遊精悍堅確日讀書數千言嘿誦如流夜課詞章若干首不以祁寒劇暑少廢其吐言揚才若雷奮河決土墳而草木發也連試有司輒不利赴二千石辟為掌櫝吏志又不信則復理詞章試有司遂售其資其才與志若此而人以無慧之名名之生又以自命其果當乎不當乎雖然世貴曲通而生獨尚直世貴狎和而生獨尚介世貴巧辨偽容而生獨樸與誠也則有類乎癡而已矣抑豈知生之癡去俗為甚反而去道為甚近世務諧俗而不務道合者不少也又烏知其癡之果為癡乎不癡乎今之人有聰明自任廼至盲妄擿埴顛隕於汙壑䧟穽招之而不反呼之而不覺終其身有形植物累之憂者則其為癡也孰大焉生偕計上京師將有為政之日其毋改乎類乎癡而未嘗癡者則其不為聰明不癡而未始不癡者的矣西齋志有詩有二客持呉興趙公子西齋巻来見會稽鐵厓道人志一客辨曰首陽之西有孤竹二子者居焉清風足以師表百世此吾公子所以取號于西也一客辨曰伏翼之西有小桃源者在焉其地如洞天邈不與世接此吾公子所以取號於西也道人莞爾而笑曰孤竹之子餓終首陽未適乎中庸道也桃源之在人間世亦方外荒唐不經之説也公子雖習隱而好高豈果至是哉吾知公子者公子素負奇氣有逺大之量思得明王以輔翼之而不果也遂宿其志於西吾相其夕陽下舂新月在庚閶闔從兊至公子與客鼓琴亭之上歌商聲若出金石無與和者而有懐夫西方之美人曽不知首陽有餓隱之高而伏翼有仙都之勝也二客於公子何求西之野哉二客者失容逡巡而退道人復為之歌明日公子来請曰先生之言善言於西者乞書諸室為誌而歌則吾將被之秋聲云歌曰物生於東成於西兮有信有屈物不齊兮彼向而笑傎為迷兮惟古有道物不羣兮大東之西孰我賔兮我所思兮西方之美人兮木齋志有詩呉下殷生奎天質古茂一言一動醇乎其無偽者也人以木歸之生遂以木名齋今禮部尚書泰不花公愛其為人為書齋額求余言誌諸室世之置椎魯不聰者類曰木鄙為棄材亡所於用必多夫不木者曰便曰給曰機曰警不知便給者蒙不仁之具而機警啓薄行之階也孔子嘗論木矣必與剛毅者同稱曰近仁仁固可以木得之而不可以椎魯不聰棄之也夫大味不和大質不雕大樸不散其惟木也乎仁者至樸而亡偽之物也故論仁惟木為近孔子之言豈欺我哉嘻木為聖人所器而論者棄之天下之能仁者寡矣抑論者之所棄則有矣士之為木有似焉而實非漢稱長者木之近仁者也惟勃近之而陽朴售至奸如周仁之流則大似而大非其為不仁也甚矣今聖人以深仁洽萬生使民剗偽還朴表民者類求長者吏若生之木固又今聖人之所器而又加之以聖賢之學使言仁者歸生生其不應表民之求乎吾聞生之王大父大父累世忠樸如生所種殆出於一家風氣之厚也殷氏四世而未昌其當昌在生無疑者故吾叙而期之而又為賦詩極木之所詣以率能詩者繼之詩曰七日混沌離穿鑿爭七竅碩果一失仁百體俱弗肖巧詐日横生售朴至深溺周仁聖人憂世心世變若原燎安得至木資與世作津橋去聲學齋取名木衆巧不同調回愚與參魯入室得道要豈是灰槁人滅心比滅爝君看記渻鷄人方詆不鷂雪巢志雪一也而苦樂之情異焉何也清也寒也者不知其清今者不知其寒此苦樂之情之辨也上古未有室廬則民有穴巢而居者至陶唐氏之世尚有巢父之流以樹為窟與羽族同栖者吾想其巢當霰雪之集與木稼同氷是有雪之寒無雪之清者也後世乃有借光於竇者謂之雪忩致爽於高者謂之雪樓而又有假屋於巢假巢於雪者謂之雪巢是有雪之清無雪之寒者也吾所謂雪巢者崑之洪用氏治其棲客之室於雪鶮堂之隂者是也用居高門縣簿者幾世矣而無華靡之習炎赫之勢堂號取於雪鶮葢富而能清者也其名屋於巢名巢於雪固宜雖然居其清於主與客接物之潔也處巢於窮隂沍寒之際一念之擴衣吾衣以及人之卒歲無以也食吾食以及人之朝夕弗謀也此又及物之仁之義也予屢辱用觴於巢人固尚其潔已擴而為仁為義者或懼弗及焉故因其請記而為之言且使賦雪巢者不徒思於古之巢寒者也藏六窩志雲間銕子雲氏慱學工文章才可用世而世不用也今老矣黄冠野服脱落世累飄飄然有神仙致退而築一窩于鴛泊之上狀蓬蓬乎浮游于澨若龜然於是命之曰藏六求予一言以為志予謂藏六本坡翁語坡以失言藏六子雲何失之可言哉嘻藏山于澤夜半有力者負之而走昧者不知也而況藏六於一甲乎見者不劂而刳則鑽杖而叩之矣是欲遁而不得其道者也是故珠假藏於蚌而蚌拆玉假藏於璞而璞剖又況假藏於身者乎此甲之靈於人而不靈於已者驗也子雲學道者吾請與子言藏曜靈畫而忽夜日之藏虚􅅎望而倐朓月之藏萬物闓於春養於夏成於秋而閉於冬是天地之大藏也天地之藏必有道焉放於六合而無外巻於一宻而無内是大道之至藏也子雲學道而欲效失者藏其六也不既愚且勞乎子雲作而謝曰吾不敏吾將從子游以闖夫大道之藏也藏道何如曰藏於一故曰藏於一萬事畢俞同知軍功志杭自宋行都来歸版籍後生齒日愈繁無兵革灾者幾三百年至正十二年七月十日庚辰强冦至自昱關紅巾赭服僣竊王號蹂躪我城池劫敓我府庫鈔掠我子女上抗天討其悖甚矣越壬辰肅政使布琳公親按重兵㑹行垣大臣戮力剪賊時俞侯亢以仁和縣尉承公令哈喇沁元帥部伍破賊於呉山癸已伏兵六部橋㨗獲兇頑若干人掩殺其部士者過半奪馬騾旗鼓器械莫勝筭甲午進兵壽安坊賊潰走追襲至明慶僧寺葢焚其窟落孛公壯侯智勇視他賞貲獨有功乙未沿井亭出衆安橋交賊鋒者三生禽渠魁一人及從黨若干人丙申追殺過北關復吾倉廩府庫之狼藉者若干所又生禽其掌記者二人獲所劫宣勑劄慿及偽命妖經之屬燒燬行寨拘截輜重賊盡北奔而杭城始復庚子復領哈必齊義兵西赴餘杭勦捕其殘孽八月辛丑朔遇賊西門交戰獲首賊某都帥某妖師某總統某賊大敗㨗書至憲府憲府論功授賞遂擬侯為杭州路同知府事閭民市夫咸手熏爐拜侯之勞之徳士之業文筆者述為歌章以頌侯徳之美開元道士徐以正又厯疏其始末来求文以誌于石予惟絳帊帕頭此神禹氏之軍容也夫何小醜敢僣其儀漢賊黄巾張角晉賊絳㡌李辰非不慿陵州郡煽行妖孽以冒奸天器皆亡不旋踵而皇甫嵩華宏之徒資為大功蠢爾獠蠻復逞左道以速鼎鑊俞侯之功又豈下於華宏皇甫嵩之徒歟宜其十有旬日位躋四品而人不以為過也自是侯將右肅政府為國家始終殄賊獻戎功於明天子天子將獲功賜秩見肅政府之善人用而侯為國家一時人才之盛也豈非杭人之望乎侯尚以予言勉之侯名元字長卿世為錢唐人是歲十月初吉誌王鎮撫軍功志鎮撫官古之軍正司律令軍中得其人則都督之在上體要而功逸部落之在下分立而情通不得人反是至正癸巳春皇帝命江浙行省平章定定沿大江以東調諸道兵討紅巾賊命至裒兵大閲謂都鎮譚汝楫曰師行千里草木不靜所過郡縣士卒將有厲吾民者君為我選公勤亷威者治士卒勿譁汝楫曰唯唯乃舉前大府監器備庫使王君顯祖自代平章視其丰儀卓犖論裁殊庸人即版授都鎮撫首陳民情次兵機地里要害已而下令申約束士卒潛相戒曰軍中今有王鎮撫剛毅人也吾輩毋譁譁者死律一張民用大恊是夏分率戎麾抵池以便宜決事率先諸將與賊相還嘬鞣建徳剜自面渡鏺木田罔掀湖口撇彭澤行􅝌盤陽城斬偽元帥者二磔賊將者二十有五從賦無筭獲其廬帳輜重器械稱是明年餘賊復冦東流君進謂平章曰東流糧道絶之危必死爭平章韙之遂引兵東下摽饒之石門㸵東流大小三十餘戰深謀宻計用之無遺筭而一時卒咸樂為之用用能屢建奇功民之犇命歸明者以萬計吾所謂官用得其人則居上者體要而功逸為下者分立而情通非歟省憲論功聞于朝士民被恩歌於道大夫士又作為歌詩以美之軍中之通歌謡者從而和焉此豈陽浮慕者哉然而大功未褒勞君不以為枉致身為所事君不以為難董子曰明其道不計其功正其義不謀其利君子達此者歟其徒葉一元以余為文章家司公論於當代且視信於後持其狀来求言於是乎言至正十四年七月初九日志東維子集巻二十二欽定四庫全書東維子集巻二十三元

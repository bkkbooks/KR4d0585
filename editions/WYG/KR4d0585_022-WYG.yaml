front:
  text: 志醉李貝仲琚自幼頴悟長有奇氣而於詩書無所不讀求天下未見書如不及題其室曰讀書自課早讀若千萬言莫記誦若千萬言葢出則於書少輟入室則又手披而口吟矣妻子責不理産及不能廢居居邑則曰我業葢是仲琚於書其頴若是而余最號不善讀書者也性未能寡欲其讀也不能静且顓即顓又性猝急茍且開即亟涉欲竟為常恨自課不能如仲琚而仲琚求余文以志室亡廼左乎重違其志則曰自瞽儒之説有臯䕫無書可讀而天下之學幾廢不知河雒之文天下之至書也帝典以前有皇墳之書大道所寄善讀者稱左史倚相斷自唐虞以下堯以是傳之舜舜以是傳之禹其炳然見於書與二曜齊明不能滅也前聖既徃後聖復起易也詩也書也禮樂春秋也皆聖人之書也善讀易者以知来善讀書者以辨事善讀詩者以正性善讀春秋者以知徃善讀禮樂者以制行和徳聖人其無餘藴矣學者幸而有聖人之書可讀則聖人之藴在我不在聖人也然有不幸詁訓之溺也詞章之隆也異端小道之亂也吁此非書之罪也讀書而不徹其藴之罪也讀書而不徹其藴則瞽儒之説勝也已斵輪扁有告於齊之君者曰臣不能以喻臣之子臣之子亦不能以受之於臣行年七十老於斵輪古之人與其不傳者死矣君之所讀其糟粕已夫吁兹非瞽儒之論也讀書而無有徹其藴之病也仲琚讀書二十年其於聖人之書盖已静而且顓者矣其所以知來則善讀易者也其所以辨事則善讀書者也其所以正性則善讀詩者也其所以知徃則善讀春秋者也其所以制行而和徳則善讀禮樂者也然則所為由聖人之書以求聖人之藴者將於是乎在吾欲藉以儆後此之瞽儒也故志之

body:
  text: 與同年索亷使書古者天子之於諸侯入其疆土地闢田野治養老尊賢俊傑在位則有慶入其疆土地荒蕪遺老失賢掊尅在位則有讓然天子之耳目不能遍觀而盡察也故毎一州置一伯焉以佐天子之耳目而行其慶讓得一賢伯而所統諸侯不敢有侵虐之政無侵虐而民無有不得其所者此古之賢伯係於時者重如是也今之守令古之諸侯職也今之肅政使古之州伯職也守令之在位者恣掊尅也賢者失也老者遺也土地者不治也而朝廷不知肅政者不察間有一二自强於職土之所當慶者不得譽於左右則覆得所讓是非皂白傎亂其真於是民有訴其寃者如訴於天不得已而謁其所欲者如謁之於鬼神遂致民氣鬱而不伸小則乖於一邑大則乖於天下長慮君子其不為之懍懍哉伏惟閣下出身以天子之賜進士閣下之任官以天子之寄耳目士有握抱不得展布者以為不得其時與地也今閣下之任得其時矣得其地矣而不以古賢伯之任巡行州郡入其疆宜得慶與讓者不知所慶讓焉民之鬱不知所伸焉則閣下之得其時者與無時同閣下之得其地者與無地等而閣下之出身曾亦何優於旁岐雜進之人閣下之受官又何優於一州一邑之濫而弗治者哉某於閣下雲泥異途而名則同官也棄官以來已無意於時事而僑居錢唐當北南之㑹人有自南來談肅政使者之政歴歴如指掌聞閣下行部福興已若干日而父老之望閣下未有所聞覆有所指議流言者亦可畏也恃吾同年故輒有布於閣下幸閣下察焉上有以佐明天子耳目之寄而下有以塞閩南北行者之言也不勝幸甚投秦運使書某聞私門塞者公道達私事息者公事明公之與私隂陽水火勢也伸道之公者無他能自屈其私而已矣伏惟閣下清徳茂望由臺憲表臣當鹽漕之寄於兩浙臨政以來事之損益因革黜陟用罷一以公為道苞苴請謁無所容徑窬私門塞矣持三尺平桀黠吏不得撓骫之私事息矣私門私事一無以干吾之公宜屬之吏效職而弗欺江之商海之民皆願出於塗而服役於其上大課運流宿垢剗刮㝡稱一專除命遄下自官漕者來未之或聞也然而倉塲屬吏厄逋課者前後凢數十百人豈無是非枉直其中朝廷遣使亷問而訖不得其是非之公何也私之不自屈者公之不伸於天下也故其抱枉受抑之人咸願決之於閣下者以公之道左閣下也其得脱刑禁與省部文符而去者已凢數十人而枉之大抑之久則莫如某也某以父憂去司令之職而司令之課曾無一二虧欠而吏持文深者猶枝蔓其罪不使其文符而去使公道不在閣下則吏者之言或得以移聴公道而在閣下則吏持文深之過也或謂彼數十人之去勢力使之也閣下不以勢力屈公道則或者之言又過也故某甚不避僭罪輒敢自明一言于閣下惟閣下察之使枉之大者伸抑之久者奮則閣下大道之公不以某一人而累不然或者得以某病公道閣下其能亡所累耶惟閣下以大道之公自任有以絶文深吏之過而解或人之疑且以恕某自明之罪幸甚幸甚上樊㕘政書某謹再拜奉書於大㕘相公先生閣下某聞士有鼓琴於汾渟而釣者聴之曰美哉琴意在山澤而有廊廟之志夫聲被于琴一枯木之器也而意之所存聴者得焉而况士之意發而成聲聲發而成文者乎萬一遇知己之聴則其洞見所存者宜有過於釣者之聴琴也已伏惟閣下以中州間氣出為當代之英不事舉子學而為天下文章之宗士之相指數於下者曰許夫子而後有子姚子子元子姚元之後而有子樊子而已耳士不志於見大人君子則已如有志也其不趨下風而求出門下者則其自棄者也某幸早識閣下於任公敬叔之門閣下佐司於中書時敬叔嘗遣某持書幣不逺數千里請見閣下而以病不果行今閣下在行垣去某之居不百里也某嘗僕僕趨下風而又以閽禁之嚴艱於見也則某惟有退處於野與田叟野老為伍耳然力不任負耒而又竊食於吴教授市中兒以為妻子之養同年之士有舉某於錢唐典市之官使苟食於市猶勝於挾策小兒去家僅一水隔猶勝於調邊數千里其相知無踰於同年而所舉如此則某之不受知於當世而切切於知己者之求蓋可知矣傳曰隠雷自天而昆蟲已聴隂雨在漢而柱礎先覺幾之先動於物類者如此某之於閣下懸隔若相絶而心動於閣下見於先覺則恒目睫之近故敢不以再進為瀆而懐抱所著曰平鳴集者二十巻古樂府辭者十巻謹上獻於閣下葢將託知己於閣下也閣下倘賜之聴覽則某之心所存者將有白焉其不愈知音於汾渟者之琴吾不信矣謹書上寳相公書某謹再拜奉書于復齋司憲相公先生閣下嘗聞士屈於不知己而伸於知己者遇知己而不伸則亦與不知者等耳有人於此懐抱利器而以世之流言中傷不得與時之君子者列必急於求知己非急於求知也急於伸志也僕自棄官以終二親之養養既終而吏部不調者十年然十年之中服近文章砥礪亷隅未嘗敢一日叛吾教也世之自謂英傑之士徃徃有不逺數千里考徳問業於僕者則僕又以自信決非明世棄才也僕所著三史統論禁林已韙余言而司選曺者顧以流言棄余謂楊公雖名進士有史才其人志過矯激署之筦庫以勞其身忍其性亦以大其器也杭四務天下之都務也俾提舉其課而後除以清華處之未晚也僕之不遇如此屈於不知己者也士遇不知己雖孔門聖且辨不能白於人矧又蔽以流言者歟伏惟閣下以髙等進士賜出身號虎龍之榜不二十年剔歴清要為明天子耳目才賢所在雖讐必舉雖草野必訪矧又辱知己者乎而僕未嘗伸吭鳴一言於閣下則僕之自棄罪也僕在吴興時固嘗執筆以登載閣下之治績在錢唐時又嘗偕歐陽生以侍筆櫝於閣下則謂之舊知己可也久必待逺必致者儒行之言舉舊者如此僕離閣下也久去閣下也逺閣下在髙要舉舊而不改儒行信其賢而不信人之流言則僕之不避瀆而鳴知己於閣下者不得免也庸是輒敢有布於閣下惟閣下賜之覽察焉則僕之伸於知己者在閣下而不在他人也決矣代宋無逸上省都事書去秋攀餞舜江伏承教誨奬誘意甚勤懇若將推而納諸古學者之後公卿不接晚生久矣何幸親承其寵是以感激忖度至忘寢食思所以報知己孔子曰才難某始讀此猶以為疑以為人茍有志何才不可成奚難之有更涉七八載志雖不變而其學視之古人奚翅霄壤之殊然後知才之成信乎其難也蓋某自九嵗知讀書陋邦之中無良師友誦習數載雖訓詁莫曉年十六嵗去學吏時家祚益落先人没六年矣一日讀言行録至范文正公事悚然如有所發頗知古人所以立志然猶未知所以用力今年春游暨陽從鐵崖先生學春秋方其欲徃親戚摘其迂鄉里哂其徃幸而楊先生遇之如骨肉不然不能一朝居也幸粗聞為學之方則循序漸進洪其心而密其功者為庶幾也以故絶去狂妄躁急之心歸栖一室寂寞自若且五六年而才亦不知其成與否也自顧蓬蓽之家累重産薄生母年近六十咨嗟太息以某雖從事於學而不能畧有所補於是奮不知恥西見明公嗚呼不有知己如明公者何以成其志哉某於明公其分甚遼絶一旦拜下風即謂可教而待之以禮其後數進見恩意彌篤伏語之曰人以貴盛而流於卑汚者多矣生微賤而能卓然自立未必不至貴盛也勉之哉某立志之迂雖親戚不見閔而明公惓惓若是則世之知己者未有深於明公者也遇知己者而不求所以自伸則與自棄者寧有以異乎故復陳其坎坷之狀達於左右伏惟終曩日玉成之賜為之留意使上有以寛親之憂下有以安己之志得致其材之所進而無難成之歎不勝感恩之至罄意而言不覺繁委惟少埀察焉與吴宗師書僕讀傳至孔子稱老子通禮樂明道徳之周遂師老子則知先王之禮樂道徳在老子者未墜而孔子師焉孔子師老子則老子道與孔子道弗殊且老子固周藏室之史也又知其學有資於時君不徒五千言道徳之述也後之道家宗老氏太史公取其言約而易操事少而功多故西京賢君資之為南面之術而成清淨寧一之治其效不誣己迨效者宗其傳而欲滅絶禮樂槌提仁義曰虚無可以為治吐納可以長生則吾未知其説也我朝抑黜百家尊上孔氏而老氏之宗仍俾其徒申教章以裨治化故今孔老氏之學並行而不悖夫老氏之傳至後漢實為輔漢氏之術其效能使上之人恭己埀衣裳而治下而庶類之繁幽而百靈之祕罔不從令而受職以驚動之古初之所無而實吾先聖師之所不能有也宜上人優崇之呼為天人之師法屬國不得私懐劒章而俾得懐之王公大臣無不名而拜者而俾得不名不拜其恩隆數異又絶古之所無也天既昌其子姓以夀其術又必昌其徒以衞其道如今桂堂氏與足下後先出乎其間葢不偶然矣今天子留志史學以館閣之才為未足遣使草野以聘處士之良而於足下濶去亷陛賜之燕坐訪問至道以及乎歴代圖史成敗禍福之跡足下片言又足以予奪可否雖一時稱良史才者不能過比之鼻祖職藏室益又有光矣傳曰學老子者絀儒學儒學亦絀老子某儒者徒也孔子不能不師老子某其敢絀老子而以足下之道為異而不資求其所至者歟某早年以試藝上春官識足下於京師足下還山而某亦去官又與足下㑹於錢唐湖上然未能獲一議論之交一文字之徃復近因足下髙徒某南歸番陽庸是上淑孔子師老子之原而知足下之道未嘗余悖者書之以達掌記惟足下不以儒學為絀而有以先王禮樂道徳之未墜者教余則幸甚三史統辯若干言大禹觀銘仁清觀碑二通隨此録上不宣説鈍之字説雲間郁生父名之曰銳請字於予予字以鈍之銳必鈍銳不鈍養銳者摧矣三尺之鋒出削示人曰孰敢攖我而敵有折之者鋒不藏也鋒銳而藏於不銳其孰能禦吾之銳哉故曰銳以鈍養老子曰大辯若訥大巧若拙老子之辨養於訥天下之辨莫能勝老子之巧養於拙天下之巧莫能爭生之銳養於鈍則天下之銳莫能敵矣庖丁之刃十九年所解千牛而鋒若新發硎者何也其投刃於虚者鈍以養其鋭耳鈍之勉哉以鋭用銳天下有攖之者以鈍用銳千牛之解者恢恢乎其有餘地也鈍之勉哉毋輕用銳數説贈吴鍾山予讀吳志觀趙達九宫一算之術其計飛蝗推鹿肉算某年月日時中之類其應如神公孫滕事之為師欲得其術而為此術父子不相授受也夫聖賢道學固有授受而術者之本雖父子不能相授受也學不難於聖賢乎松江吳鍾山以太一九宫諸算之術鳴江湖間自謂其學傳之父竹所君竹所有傳之其父一峰君趙達父子不能傳其傳而傳鍾山之傳祖父孫三世非其天授之性異於庸衆人逺甚能之乎故公卿士庶咸知推尊其術而鍾山亦自閟其術不輕以語人余在姑胥時鍾山持助教宇文氏詩来見予不扣其能鍾山亦不言也余遊松鍾山又見余璜溪之上乃曰先生棄官已十年數盈十必變數豈有徃而不復詘而不信者哉截自四十九而徃為余下箸籌前來之事某年曰起某官某年曰移某所某年曰當調内某年曰年來致事而先生已在水之南山之北矣余為之莞爾曰日中則移月滿則虧天地之恒數也進退盈縮與時變化君子之用數也故君子得時則義行失時鵲起數之一定者在天而用之隨變者在人故君子以理占數也子徒能眎吾以一定之數其能之乎用數之道不為數禍福窮亨者乎鍾山謝曰吾能知吾之所知特不能知先生之所能也請書其説將循海而歸見余方外有道原衍禪師禪師靜閲萬物之盛衰而其所傳之道有不物之者在與吾不異也出余言以質之命説贈夫容子客有夫容子過余譚夀富貴人之命曰某不道也而算踰大老至某不仁也而貲連鉅萬不學無術也而官極隆品吁徳之不勝於命也奈何予莞爾曰甚矣夫容子之不讀書也子不讀郭先生之議北宫西門二子之厚薄歟則知命有亡瘉乎徳者西門子之達非智得也北宫子之窮非愚失也皆天也西門以命厚自務北宫以得厚自愧皆失固然之理也先生之言一出西門不敢言達北宫退而衣褐有狐貉之温食菽有膏粱之腴蓬廬有廣厦之廕蓽輅有文軒之飾終身卣然不知有榮辱之在人在我也此徳勝命説也夫容子談貴富人命屢矣未見譚徳人之徳浮於命者予游東州金華有鹿皮子武夷有清碧君㑹稽有梅梁道人皆窶而有隠徳不願乎人之食肉繡衣連欐之居結駟之騎者也子徃見之試以吾言扣之其識徳命勝不勝之辨己夫客子行書其説以去拆字説贈陳相心拆字之術原出於蒼頡而説得於子華子頡之制字象形諧聲各有其義子華子於制字之破嘗推其説曰韋革雖揉擴之則裂礦石雖堅攻之則碎以此知物之剛柔雖不同而同於一也盡使字之寓意義一一若是揚雄許慎之説不亦闇哉永嘉相心生以拆字術鳴於公卿間其推原禍福考索成敗亦既驗矣生亦能以子華子之所推推之乎子華子曰無數無有隆庳無形無有成虧生能冺其數形勿使庳有隆之因成有虧之漸吾且許子得道於頡之初而游於河未圖洛未書之天已字之制拆何有哉神鑒説贈薛生嘉禾相者薛氏生以神鑒自命裝潢名公卿所贈鑒巻訪余雲間次舍自乞一言余莞然笑曰生知夫人鑒乎物之善鑒若鏡若珠若髹若靈石若止水若白日明月而鑑之神至人則莫能洞物之徵其鑑之神者大無外小無内前無古後無今遁説莫之遁庾説莫之庾此人之鑒之至也君子談神鑒者曰叔向氏之於伯有也子輿氏之於盆城也郭泰氏之於史淑賓許劭氏之於曺阿暪也又髙而神之圖澄之鑒河黿也辛有之鑒被髪也延陵子鑑國姬公旦之鑑世也已經乙鑑愚愈推而愈神若是者斯可與語神鑑也已嘻是豈許負氏之細伎乎生之神鑒其亦識是乎生逡巡拜手於額曰牛馬走於賢聖之鑒乎吾知願學焉庶先生大人之大余鑑不啻許負氏之細伎也請書巻首為薛氏月鑑誌説相贈王生予史鉞之言曰敗天下之士而亂天下之事者相者之言也相韓信者當背而後貴啟信之叛者相也相鄧通者當貧而餓死激帝之富通者相也相英布者曰當黥而後王縱布之為過坐法者相也相章昭達者曰貌虧而後貴縱章之毁傷遺體者相也劉惔相桓元子曰子仲謀晉宣王之流亞也啟温之懐異而亡軀者非惔之言歟來和相晉王廣曰眉上骨隆貴不可言也啟隋文之廢嫡而喪國者非和之言歟故曰敗天下之士亂天下之事者相者之言也客有術唐許之術者曰王生松溪來訪余睦州談其術於廣坐中曰某人下吏也術經業可封侯某人存心孝恭當享遐算某人夙有隠徳當及上第余義之曰善哉生之言相也異乎吾史鉞之所陳者乎吾聞嚴君平之卜也其語於人以忠孝得曾子之教若生之語相於人不得曾子之教者乎生别余上京師求一言叙行巻故引余史鉞而復有取於生之言者書以為贈仁醫贈劉生仁人不得為良相願為良醫則伎之仁而善濟世者莫如醫已及讀扁鵲倉公傳則怪其方術之仁而鵲不能令終倉匿跡當刑微少女幾不免焉何也史謂美好者不祥之器予觀鵲秘所傳方時昭名譽於諸侯此取媢得死之道倉挾鵲祕書決人死不為人療病使病家寃之此又取怨得刑之道何尤於器不祥耶倉之師陽慶公孫光也慶亦不屑理人病光屬倉積方勿令教人嘻師弟子一何不仁之甚耶河間醫師劉本仁壯負逺志北上京師不得志輒放遊名山至廬阜遇至人授以肘後書洞究醫家微奥遂以其伎翺翔吴中吾喜其視人疾病若已有之施藥不以貴賤富貧貳厥志其蓄竒祕不異於扁倉而施方伎職理病實上於扁倉者若本仁者可稱仁醫知本仁而謂之器不祥可乎若至仁者授鵲之祕又孰愈授祕本仁乎葢本仁儒家子臨江教授之孫宜其得仁之實而又能廣仁之施如此本仁字起元既自號其藥室曰仁而求言於余故為作仁醫贈云論馭將論將國之爪牙也馭之善則得其利不善亦足以致吾害葢驍武勇鷙鷹搏而虎噬者其素所蓄積也又况有挾功而驕恃恩而放者乎故臨時馭之以智術而不勝者不若平日束之以威令之愈也葢嘗觀漢髙祖以術御韓彭者不幸不勝則殆矣當時如韓王信陳豨盧綰者皆號恩昵親黨亦逺起而為亂髙祖倉遑奔驅而僅勝之吁一有不及天下非漢事矣然則漢之有國不幾幸乎及觀周世宗之馭下也而後知髙祖之勞於智術不如世宗之逸於威令也世至五季將之驕惰者甚矣梁唐晉漢大率以是喪主威而至於亡也世宗崛起獨秉威令於下陵上替之後何樊愛能不用命兩人一誅而後世宗猶於不臣之將王景韓通輩收其爪牙之力如獵者之役鷹犬耳其去髙祖以術御將幸而勝不幸而幾敗者不亦優乎今淮吴府之僚將也皆一時昆弟交也葢有親昵恩黨過於漢者大抵以權利相合則亦以權利相暌慎於利害之際不能無疑則隙之所開矣馭之稍失其道則有怏怏恥於北面者不可不慮也慮而後結之以恩恩之不勝籠之以智智不勝則將若之何吾為此懼嗚呼髙祖之術世宗之法惟善御將者審其勢之利鈍而為之所也故作馭將論人心論夫人心者天命之所繫國脉之所闗也劉文叔之中興也民見者曰不圖今日復見漢官威儀此人心之思漢而文叔收之以中興也郭子儀李光弼之匡難也民見者曰不圖今日復見官軍此人心之思唐而李郭收之以匡難也故曰人心者天命之所繋國脉之所闗收人心者要當使之如父兄子弟之親親出於天情之固結而不可一日離而去也人心一歸天下事無不可為人心一去天下之事解體矣載論三蜀之人心在於闗江漢之人心在於城一闗失則三蜀皆無以自存一城破則江淮無以自守此無他人心所固者在闗與城也二廣之人心在於嶺兩淛之人心在於江一夫越嶺則二廣之民皆憂惶而不可禁一舟渡江則江左之民皆潰發而不可支此無他人心之所固者在嶺與江也善用兵者必先有以收天下之人心又有以固天下之要害天下之要害固天下之人心固矣今日之人心閣下所知也其収之固之之術閣下所行也然有離而去者何也官軍所之先以花猫金鎗之黨蕩覆我民舍離析我人心使之荷擔以待襁負而去吾之屋廬皆為彼之營砦吾之牛羊皆為彼之膾炙妻妾子女皆為彼之奴婢金寳財物皆為彼之裹囊城郭之民養卒如養虎田野之民避軍如避冦今日人心離離而去者以此尚能為閣下守要害乎閣下以誅討賊虜恢復王土尊奬王室為己任則請以收人心固人心為第一義也吾故斷之曰人心者天命之所繋國脈之所闗也作人心論總制論吾聞兵法在古有五乗之制五乗者軍法之根本而人心之所由以一者也人心不一而欲守之固戰之克者無也俚語曰十人一心有利買金十人十心無利買針夫使百人操兵而攻虎者虎勝使父子三人荷鋤而攻虎者人勝何也百人之心殊父子之心一也此言雖小可以喻大總制之所以名者一衆心以制敵者也非徒一號令一服色一旗幟一金鼓七投虎龍八陣之法也夫一衆心以制敵則非律以五乗之法不可也人心有所不一雖十萬百萬之衆而心各心於百萬則固不如十人一心之為利也故戰之勝負不在士之多寡而在於心之一不一也泰誓受有億萬人離心離徳予有亂臣十人同心同徳是商民之衆心不一雖衆無所用之周臣之心一則雖十人而可敵億萬人之衆也後世伍乗之法廢士心既不一而將帥又無所統至於忌能爭功一麾之下自分疆界一捷之中妄分彼我諸物之心如此况可一知士之心乎吾求賢將帥於三代而下如春秋郤克士燮欒書者亦可稱賢將帥矣於鞌之捷克之言曰君之訓也二三子之力也臣何力之有焉燮之言曰庚所命也克之制也燮何力之有焉書之言曰燮之詔也克之用命也書何力之有焉二三將帥更相推讓不自有其功而中軍統屬未當紊也今秣陵之喪師者衆心不一也建徳金華之繼喪者衆心不一也各帥之出鎮東鹵者曰漢曰惟曰猫曰􅀈部落衆矣而衆心果能一之乎總制者果能盡制之乎諸部之心未能如周之亂臣又未能如于鞌之諸將吾恐繼為秣陵建徳金華者可畏也故以古者伍乗之制周亂臣與晉三帥之事為總制論求才論可緩而不必求者天下之常才不可緩而必求者天下之竒才也蓋事變出不測者非常才之所能丁而必濟之以竒才竒才不可咄嗟而得也必求之至蓄之素也譬之醫家之蓄物也蟲魚草木之劑出於市之所易得者不必蓄也至於山海之竒産非市之可常得者則固旁搜素蓄而為吾卒急之用也今冦之窺釁於我患有不測而起者吾猶夫常才以處之以為其人易得也其術易曉也其需易應也譬之治竒疾而欲用草木蟲魚之常劑其不誤而敗者幾希矣今夫提市井之衆以與悍敵抗出竒謀祕策以應其變而制其勝或單詞片檄而下其城於帶甲百萬之衆則必用夫不常之才乃可耳其人於千百人中或一人焉千萬人中或一人焉不可朝取而暮得也必先君以求之至蓄之素而應吾不測之用如山河之竒産然後有以應天下之竒疾也於乎天下之竒才王伯之佐乎聞之謀主也代未嘗乏求之而不得者以求者非其道求得其道而又用之或非其所也急竒才者不咎吾求之非其道用之非其所而咎天下之無竒才也不亦過乎劉備苻堅嘗知竒才於葛亮王猛故求之急而任之為謀主周亞夫亦知竒才於劇孟求之緩幾資謀於野蕭寳寅亦知竒才於蘇湛用之失其所而乞錢以去李密亦知竒才於徐洪客用之失於緩而其人已在泰山之巔矣惟閣下立賓賢之館於竒才也亦知所求矣然求之非其道用之非其所則孰愈安坐而不知求者哉吾以為閣下圖伯必得謀主欲得謀主必求竒才故作求才論守城論城以保民為之也城不保民則不固不如恃民之為固也故曰衆心成城誠以恃城不如恃民也茍得人心雖畫一地而守植表而限可也不然崇城列天嚴扉重閉我之民心内攜而外叛曽不若折柳之樊吾圃也昔梁伯亟城而不處民罷而不堪則曰某冦將至楚囊瓦城郢而沈尹戍戒之曰茍不能衞雖城無益是皆恃城不如恃民之説也今錢唐新城雉堞既完地隍俱備人度作者之少難吾猶慮守者之不易也南翁之言曰居城者不築築城者不居姑以近事明之四明之城不曰禦方冦乎而方冦居之新安之城不曰禦流冦乎而流冦居之睦州之城又以禦邊冦也而邊冦卒居之豈非前轍之驗乎稽諸圖志臨安之城凢一百二十里宋人興築歴十有三年而不能完其半今之板幹取辦於時月之間雖有神工鬼役吾不之許不至牽架以成鹵莽滅裂之功今兵疲食盡不於此時為討虜復城之舉而為此自疲自困之計此虜之竊笑吾禦敵者為無術矣昔齊王任檀子者守南城而楚人不敢彎弓而南下任盻子者守髙唐而趙人不敢漁於河是二子為國長城不啻金山鐵壁之固者不優於一百二十里之雉堞也耶今閣下之守土惟知恃城而不知恃民與恃守将也興築已還五郡之民財窮矣力竭矣小變怨而叛大變冦乗而至矣此時雖有泰山之城江海之池恐非閣下所能有也惟閣下省之慮之此吾占於人事者又有占於天變者六月十九日火不七日地震此天變之驚於閣下土石之疲也至矣閣下不知收人心以回天意吾未知其可也惟閣下以吾言省之慎之東維子集巻二十七欽定四庫全書東維子集巻二十八元楊維楨撰

seq: 25
front:
  text: 墓誌銘
  hash: sha256:1ac66613c1bc0c2408b81474e658932f2b7c755f19b72b2ba2647721f0a6ce04
body:
  text: 馮進卿墓誌銘富春馮堅氏衷衰來拜予姑胥舍次曰堅不孝先子以某年某月日猝亡堅忍死將以某月某日葬先生以異姓弟先子亡無先生銘與草木没没也堅不孝益甚予為之位哭堅歸而畀之志與銘使刻諸碣云君名士升字進卿其先陳留人自其曾大父志學徙家杭之富春山遂為富春人大父從周宋承事郎華亭縣鹽塲提幹伯父驥宋武康主簿宋亡死節於獨松闗父革不仕及長跅􅋸不羈而有大志通律令圖籍及九丘之書以時舉子業為俗學棄弗習然負器畧喜功名慕傅介子班定逺之為人嘗欲走京師吐其磊磈者於執政貴臣以為世之爵禄可俯而拾也至正初漳徼賊作朝廷聚湖江浙之兵相持不即殄滅君欲獻策招誘不煩一矢之遺可拘繋弗行晚乃與羣弟拓祖廬起大門宅誓同居不分宅成而君卒矣享年五十有一嗚呼君之器可謂竒矣志可謂大矣而訖無所就以卒嗚呼天既生人之才以為用然又夭閼不使直遂者不可得而知也君生於大德丁酉至正丁亥五月四日卒以明年某月葬某地弟四人士頥士晉士豫士仁娶裘氏生男堅女貞孫男二人允邵允文壻為同里諸國用嗚呼以君才之跼志之縮而卒也則其有後者可知己銘曰已乎進卿有才以為庸有志以為衷天既信其始而又絀其終彼䝉者從我明獨則凶己乎進卿貴也者吾不知其所以通賤也者吾不知其所以窮虞隠君墓誌銘吴郡海虞山之隂其溪曰東蘆有隠君焉為虞仲元氏生於前至元甲午十月十有三日殁于至正戊子三月二日是年十月某日葬于虞山西麓小澗之原先葬之一月其孤徳懋來拜余吴門曰先君生無仕績襮於世死不得文可傳者銘草亡木卒耳不孝孤惟是懼且今奎章學士虞公集游吴謂君曰吾渡江派有在海虞而海虞之隠徳賴有君焉於是與公通譜牒吾子公之上第門生幸有以銘諸按狀君名安垕字仲元其系實出虞仲氏自唐文懿公世南陪葬昭陵始為雍人後十有一世某從僖宗入蜀又為蜀人八傳而為宋太師雍國公兄文扈駕渡南子姓有尋周讓王之隠跡於海虞者故隠君為吴人曾大父某仕宋將仕郎父某弗仕母郭氏君生而性靜深長有器局謹事其親如禮其親没事其長如父家政必承其出又必相其審於義決於力也故舉無過差時節祀先必哭泣若初喪時嵗延碩師課子姪以道義學將招其私塾籍私田其中以為先氏虞仲學官事未集而殁兄弟同居者五十年鄉黨以孝友聞婣戚朋舊服其交久而敬後至元間行丞相府聞其人才且賢嘗檄授福寧州路都監稅官君不茍進曰使某有仕宦情吾官不在筦庫家矣遂謝病傳事家督不入官府不事鄉里請謁自號野齋然郡有名公卿徃徃以客禮見之埀終呼徳懋無他語惟曰吾幸生承平時竊師友之教安富尊榮優游以卒世得為一世全人吾復何憾爾曺勉旃不為吾不為為吾所能為而己娶同里望族周氏恭儉慈惠克相於内子二人長徳懋也娶同里沙溪故宋楊察推女孫次徳賢居幼女一人贅同郡于尚書孫徳潤孫男一人寳住夫徳有所助雖賤必書春秋法也樹石立銘固不得顓諸六服官政者若君引迹自晦上徳有光於虞仲得稱隠君焉是得銘己銘曰翳海虞氏繇隠南奔迨雍國公南派又分式忠式孝在爾子孫相爾子孫既才實蕃才而弗用用野自文觀其事親出可事君夫豈筦庫而可詘身為世全人闇然而晦年若弗永永徳於聞大海奫奫小澗沄沄我文著隠勿崩其墳吴君見心墓銘至正八年十月二十六日余友富春吴君卒家貧無以葬閱明年十一月某日賴同里友馮士頥葬某地其孤毅來求銘余悲不忍銘徃哭其墓毅申前請嗚呼又何忍不銘君諱復字見心生有異稟四嵗能誦書千餘言弱冠失怙刻苦讀書不以貧難少置生無偽言行與人約雖千里外不失期刻性喜吟哦善效白長慶歌謡襍詩有諷切貪奸其人諱者欲以危法中之不為屈予讀書大桐山時君長通書願與弟子列及余寓居錢唐太湖間遂舍妻子從予遊學古文歌詩始君持所作詩來自夸穢同列詩屏棄如棄涕唾余覽詩笑曰子欲輩季唐伎亦至髙欲追古必焚滅舊語君變色不敢言徐取楮筆録余琴操及春俠辭二十餘首去越一月復來謝曰先生詩法得矣吾舊詩亦焚矣苐出語猶吾前日詩也奈何余曰姑歇汝哦事靜讀古風雅騷及古樂府幾耳又退而閱三月來出所作曰余舊語忘新語出矣賴先生教幸而或馴致於古遂編次余古詩凢十巻加以評註能道余所欲言余詩有逸者君輒能補之觀者謂可亂余真自後下筆必出人意表嘗雪夜與余遊東西洞庭徒步登七十二弁之峰其語益厓拔皆竒氣所鍾世人莫之識也去年約余遊廬山觀瀑布馴至岳陽訪鐵笛亭未行而以病告病三月而逝矣臨終告其友陳倫曰天乎死我矣使加我數年吾詩不後二李吾文不遜吾師嗚呼君死矣吾愛逰太山長谷孰余相耶吾唱古歌詩孰余和耶吾性急卒未能寡過君執直敢議乂孰余議耶吾見君之學也如朱頓積不訾江河之傾不可休其立志如匙勘鑰矢破的為文如大將旗鼔建而三軍所指無不如意葢其來日登而未止迺今止於斯耶前年夢遊天漢探天孫支機石穴為研池遂自稱雲槎秋客而所攜研且號機石云鳴呼君也生而食不給祿不及也蓋不以外者為憾矣其不五十而卒也又豈以為憾哉大父某父某皆貧學而不仕娶李氏子毅穆女一人適同里余驥世傳其雲槎集凢十巻茅山張外史雨為之序云銘曰嗟吴子雕龍貴麟賊天真天所嗔子之道宜鬱屯嗟吾子忽已淪文不死千萬春孝友先生秦公墓誌銘孝友先生既没五年其嗣子約因其友袁華謁予雲間而致其辭曰約不幸先人學而貧貧而又不得髙年死又不得名能文者銘重不孝先人事業不用亡得稱行義著述有不得不白者已賴楊東溪氏狀其詳敢丐吾子屬比之余始來吴聞昆太倉為貨居地不為習屈挺然以文行自立者二人焉曰東溪老人楊公譓洎先生也予皆不及識矣而獲見東溪所為先生狀蓋若識於目睫間故不辭論次其事而銘之先生諱玉字徳卿姓秦氏其先鹽城人世以儒學顯宋紹興間由某祖徙居崇明之東沙與袁陸謝為望族而秦氏尤以衣冠文物稱重其鄉曾祖棟祖楳皆宋太學上舍生父庚從蛟峯方先生學咸淳末以詩試通州第一人國朝不仕漕萬户玉溪劉公聞其隠徳延致於館因又徙昆之太倉家焉君四嵗即挺然不羣能屬句對五嵗能暗誦孝經論語八嵗而喪父哀慕如成人母顧氏日夜躬織紝資先生亦感奮曰吾家世有聞人其可自我斬乎益刻苦自力比長通五經尤邃於詩㑹貢舉法行州長踵其後舉先生先生曰予學豈為決科計哉遂辭性至孝友事母與兄無違禮事大小悉稟以行母有疾藥食必親嘗累旬日不解帶母卒哀泣至血執喪過禮終喪不沐浴不鹽酩人以為難初居喪隣有火熾不可捄家人收貲為出走計獨先生伏櫬慟不去火且及屋壁遽自滅州長上其孝行將得旌寵輒謝止之憲史張公揆行部閲其行義見其所著文論薦之且約偕詣闕弗行居常晦黙如愚人見貴人益自閉匿然衣冠服器必整飭與弟子講解音吐洒然而娓娓無倦教授鄉里二十年嘗曰士讀書將以惠天下不幸不及仕而教人為文行經術亦惠耳里之貧不能學者為給饘粥筆札教之嘗行道間得遺金訪其主還之封識如故有盜入室竊布帛去明日復來僕覘執之使縱之去舊有土田在東沙族人據有之遂不問并以舊書歸之後其人感化皆歸於善類先生之於孝友於蹈義執禮至此亦可謂之篤行君子者已先生前殁之嵗嘗夢為詩猶記其末句曰五湖四海一閑人及覺悟曰合五與四一為十五十月疾驗矣四而虚其一為三明年三月吾疾殆不起矣乎至期果符其言屬纊神色不變時至正四年二月二十四日也得年五十有三其徒私諡曰孝友先生君娶顧氏子男二長約次壁壁先卒約能世其學女二先生讀書之舍自名曰迂濶所著有詩經纂例大學中庸探説宋三朝摘要齋居雜録并詩文若干巻藏於家葬某所銘曰人之機也我曰愚我之達也人曰迂嗟先生愚不如迂自居四一以虚卒允符誠使狃愚以好用偭迂以利趨道弗信而畫於途孰愈孝與友之諡於徒元故樂閒先生墓誌銘公諱錫珪字君玉其先出唐學士遂良遂良由河南遷錢唐子孫所居號褚家塘其後有徙居苕城者亦以褚姓其巷今聚族南潯之西朱塢庄者即自苕城來有起身科第者為宋迪功郎淮安縣丞士登公曾大父也宋將仕郎管元吉公大父也宋將仕郎國史實錄院檢閲文字天祐公考也公性沈靜寡言自幼有識量檢閲君嘗夜遇盜盜認君巾服欲刺之公潛以他衣冠易之於傭皂而免長究心經史游庠序間獵獵有俊聲安定書院舉之儒臺授耒陽縣令公曰吾親老且病忍一日去側耶雖不仕得朝夕養吾親吾志周滿借有髙位違孝而徃不為也矧縣令未必能信所志者乎遂辭朝夕躬上食親前親有疾衣不解帶者累月藥餌必親嘗乃進居喪哀而毁有常情所不堪既葬追慕若將見之至老弗渝篤孝之行人無間言里父老訓其子弟之事親必指公為則云族有貧不自給者則貸之粟不償者焚其劵又多蓄善藥以濟人平居雖燕處必冠對客則風流談論務使之盡驩晚嵗鑿池築圃蒔花竹以自娱創樂閒堂因自號樂閒居士其在鄉閭平率人物比漢陳實博古而尤善知今事人比唐齊幹行游城中邦大夫候其車音爭相迎致問時政莫不尊而稱之為樂閒先生公生於宋徳祐五月二十二日卒於今至元庚辰六月二十九日年六十有六娶張氏四男長嗣良次嗣英出繼叔後次嗣俊嗣賢女一適董汝華孫男六應椿應桂應松應杓應權應樞以至正三年正月六日葬於烏程永新鄉大金峰塢之原傳曰施嬙女衣褐天下稱妍賁諸赤手天下稱勇士之美者又豈藉區區爵位耶吾觀樂閒先生者是己先生卻仕而閒為孝子為義士其卒也不應銘法歟銘曰孝為則兮義不頗仕則少兮德則多先生之樂兮隂陽爭和先生之則兮爭紀於瀆與河南之潯可竭金之岡兮可陂我銘其人兮不可磨元故用軒先生墓誌銘番有隠君子為用軒韓先生先生殁十年所其嗣元璧既克葬尚銜哀弗置走余錢唐次舍拜有請曰先子生有輔世志訖不得祿位以死片言觭行有幾古人死又不得文而可傳者銘是與草亡木卒等不孝孤罪益甚吾子屢銘徳人義士賢公卿先子世次言行具在嵗志吾子哀而賜之銘非真不孝孤貫罪先世世逺有耀己余嘗觀杭圖志見有宋韓左廂者以進士起身由臨安令以嚴明陞臨安府左廂官臨安剽民財者白擎子聞公至皆屏跡謡曰韓廂明無白擎韓廂死白擎起未嘗不起慕其人問元璧曰即先生五世祖也按家乗韓為番著姓其先南陽人唐末􅑫徽之黄㻻復遷饒之樂平歴宋擢科者代不乏絶靖康間諱屏者中武舉尋自恥悔再游太學登文第官至臨安左廂者即治白擎者也諱仲龍丞相趙忠定公之壻以詩學五中待補者先生之祖也諱如璋遭宋革隠居讀書於里之北山號菜山先生者先生之考也先生諱思恭字徳用學者尊之曰用軒先生先生幼不習羣弄早悟書數學長負器備好善惡惡甚至鄉里有不平事掀髯一言折於稠衆中哀者屈鬱者吐氣或為非義惟恐先生聞之若畏王彦方者邑大夫史公夢龍豪傑士也事先生如師先生嘗語之曰土敝者草不蕃水煩者魚不育守令者民之土水也又曰亷而不諒直而不決糊塗皂白以從事其敝甚跖史公書其言於座右訟有不決者馳狀質先生憑一言舉置為曲直饒有貢國初以天姓督陶先生嘗領其事有獻策者某室之基在陶某田之畔在汰即依策毁室廬壊溝渠計百十家立待先生不從曰損民利國非國之福也可誣民乎既而室者田者或來謝復拒之水旱疾疫必露香籲天為衆告急告必有應嵗饑率有力者食餓至藥病掩骼自奉薄甚碩師教子弟嵗金節幣竊竊惟恐後事親至孝妣李孺人没水漿不入口者三日因致重疾菜山公年埀八袠晚多病侍藥膳不少懈病革不交睫至掐掌代痛居喪一遵朱氏禮喪祭之禮獨任不以綴伯仲氏配曰程夫人同里程剛愍公孫女也克相無違先生資以修於家先生卒子男三璧璠璿女二壻為王恭簡公孫與善王知錄孫惟澤先生生於宋咸淳丙寅六月二十有八日没於今至順壬申七月八日享年六十又七先是里之石龍岡有龜蛇交集勢秀峰離列下走兩阜為陂陀若雙蚌然兩源挾蜂出􅀈􅀈循龜虵而東去龜之有二石筍相距尋丈間術青烏者以為古人宅兆也先生喜之嘗挾策止此語元璧曰吾百嵗後必藏此於是明年八月某日葬於龍岡之嘴用治命也吾聞士有隠徳者必享其榮以及其子孫先生徳人也享榮不於身使不祿位以没荷其及者不在後之人乎元璧清明好學有仕才吾見左廂氏之重榮可必也銘曰龍之支兮為蛇為龜叶鳩龜之筍兮相捔相繆下走雙峰兮兩源挾流小鍾草石兮大鍾俊髦有徳之人兮閟於丘故張君子墓銘吴人張天祥既克葬先孝君被服斬絰謁予門拜有請曰吾子以文章銘世之賢公卿善人先孝君雖賤雅亡惡吳之人無識不識咸稱曰君子人先世多繇進士起幸子立一言信若惇史非直不肖孤幸先世世逺有耀己世次言行謹備壻馬良狀余至蘇讀蘓郡乗知張吴顧陸為四顯姓而張氏蔓衍為獨盛今又聞其後有君子人者張氏之澤曷其逺也哉按良狀君諱必成字舜卿曽大父巡大父浩父愷俱隠徳不仕其先自晉廣州刺史彭祖後子姓至宋齊彌昌遂為吴大家逮前朝登皇祐進士第者僑僑後顔顔後敏功敏功後攀四世皆第進士君攀八世孫也生至正乙酉八月十七日卒至正戊子正月八日年六十有四配陳氏子男三嫡天祥天徳庶天祐女三人長適馬良仲適程可大季適曺繼宗仲嫡出也孫男女八人卒之年三月十日葬長洲縣武丘鄉靈夀崗之原君生不好弄長簡厚甚年十四喪父哀毁如禮養母以孝聞事其伯氏若父既冠娶自立盡讓田廬諸兄旁建宅一區客亭師舍靡不完好外養市徒理生産日富畜藏必推其羨以及人弗懈兒婦入諌止則曰積弗散不有天菑必有人禍緩急扣門者應如不及佛老家營大土木亦樂予之貲惟不樂遣子孫習吏術尋仕階以為棄今誤人之仕寧棄道路吾非不欲仕也仕而弗利人人覆我病不若不仕兩忘失云平居氣貌和齊於物無忤雖家人妾僕未嘗識其疾聲怒色有以横逆加之必自反久之其人意自消晚年病痿痺弗接人事誡諸子曰予少自奪鑒延方伎士卻病而病速施財非鬼覬福報報邈如惟寡欲乃大藥擇師傅教子孫乃樹福本若輩識之故三子有仕才類弗干禄天祥且繼志築書樓購未見典籍藏之厚禮碩師以淑子姪及里中兒君聞其所為喜曰天祥為吾所未及為非其孝乎吾雖卧為廢人無憾又戒諸子誓弗以婦言分異書田氏荆木事視曰無知如木尚識所托况人乎若輩思之罔墜吾訓吾門其大矣其言鑿乎應君子之教且過未嘗弗知知未嘗復為君子之仁也吾聞古者有諸侯大夫之位雖無徳稱君子稱其位也有諸侯大夫之徳雖無位稱君子稱其徳也一介之賤稱君子法不當得銘乎銘曰位振人徳振身振人者名歸之而尊弗親振身者天下歸仁日以尊親無羣君子哉若人視予銘詩詩可信蔣生元冡銘生名元字亨之吴興安化鄉陳瀆里人也祖慶元主簿必直父宣政院掾克明元生質機警五嵗入小學日誦書數千言十嵗善屬文二十學明經義試有司不競輒自忿曰吾學經無師説吾黜宜也乃歸告其父曰㑹稽楊先生某東南授經之師吾將不逺千里執贄而北面之父憂其素病羸止之曰天其蔣門之幸先生從吾聘汝學可己不須奔走千里學未可望而我憂先焉汝學之成不成卜於先生之來不来也予嘉其父子心徃焉時至正四年十一月某日也閱三年元學成蔣氏之族咸相慶曰元以先生之来不來卜學之成不某等又以元之成不卜蔣氏之盛衰焉元成矣先生之賜不微矣蔣氏之慶長矣嗚呼又豈料元學成而娶娶而即死乎始余至元家元婦家催元娶速予語其父曰元娶學無成理遲吾業可授父力卻婦家娶期期三年而通媾元得卒學婦家申娶期適相者又言曰元娶早早亡娶遲十年可免爾元父弗信娶焉娶未月而元病未期而元死矣於戲相者之言其得天歟得人歟元學吾春秋者也春秋之法以人合天不以天任天元之卒受教予其以人合天歟其娶而即死抑以天任天者歟嗚呼人歟天歟吾不得而知之矣元生於泰定元年四月二十七日死至正七年八月初六日也閱二十日無赴又閱二十日夜夢元衣其所常服來拜曰元死矣幸遵先生教不娶而學僅有成不幸而符相者言急娶而速死也吾父兄將以某月某日葬元車注之原元學於先生無毫毛表世死無先生一言以表吾埋土吾其迄與黄土同腐乎予聞其言怛而警亟諾之明旦有扣門者乃蔣氏伻赴也予為之哭慟遂俾學子吴毅書其志復銘曰生以人得天死不得天以人吁嗟元乎睿而病而厪未宦而昏力夭厥身人耶吾不知其所因華亭縣主簿王佳母夫人李氏墓誌銘華亭縣主簿王佳母夫人李氏諱淑貞處州教授某之女教授君博極羣書而傳業在其女嘗曰吾女必嫁竒士年既笄適同郡遂昌邑西平王氏迪功君之子延洪洪負卓越才以青年遊京師華衣奴馬從名貴遊得徼官於湖西鬱林州未幾没官所時夫人年方艾鞠養三子長學次佳次海擇以傅就學學回必親試其所誦書探其課對工拙為賞罸故三子克有成立夫人之教也至正戊戌鄉民乗亂為椎埋剽奪夫人挈帑屬避地松陽之眷家所長子學死於兵故廬燬於火夫人憂悸成疾辛丑冬十二月卒於眷家所明年春藳葬遂昌月山之麓龍鳳乙巳江表吴主延攬英俊凢鉅室子弟有竒才者不次登用丙午秋佳在選中丁未春授官華亭縣主簿明年冬始獲歸葬於先塋西亭之原先逺日佳以其友葉微所著行狀來乞銘予客華亭親見佳健於趣辦浚蘇河領夫丁若干萬無失所慢役者漕粮四十餘萬至京城無後期繼漕麥五十餘萬淞麥以澇失穫折銀估大家藉其稱貸鉅豪濟所急佐邑長聴獄訟先燭其欺後翦其蔓民自以為無寃滯得佐邑循吏稱豈非母夫人之教澤耶故樂為之銘曰婦艾失夫子幼失父婦訖完其節子訖以才舉焚黄薦哀亦榮爾母我銘不已爰示来後叶户王母李氏墓誌銘江隂王孝子作逢去其母逝已十餘年猶作嬰兒泣謁於㑹稽楊維禎曰逢藉有立母教也傳見野史沈䝉氏未得名能文如韓愈氏者誌親逝不得韓公銘不孝今以屬先生先生幸哀而賜之銘辭不獲按狀夫人姓李氏諱靖真宋獄官同郡潤之女杭庫使王惠之妻生子一即逢也庫使君善律己起身憲漕累遷至永豐縣幕致事杭庫副使初姑徐氏器庫使君之為人求可與齊者姻里皆賢李舊旌教子女不違古訓求偶莫李氏若妁告宜笄五年歸于王婦道甚飭庫使君在吴時李侍姑就養姑清閲一紀若一日舉族皆以為難其訓子嚴有法日給膏燭誦書約丙夜止或逾約輒誦至旦罸餘食出就外傅乏贄師物躬紡績以資之且多市古竒書廣其聞見逢齒壯所還徃皆海内一時名俊隂自懌曰兒不負我矣天厯飢民相引鼠偷率女奴組績更寢盜不敢闚巷以為之歌曰東家辟纑西家穿窬其内治類此至正五年秋八月三日疾卒於夫官下夀五十九逢䕶櫬旋葬黄山原逢齒今四十以才諝顯東州諸侯爭欲致門下浙憲使舉丘園俱不就風節益烈焉君子稱王母有子矣是可銘銘曰子以母教者臧母以子留者皆長益後歐陽歐陽謝句嘻句以王先生自註曰以字旌也不可作助語詞故鄒元銘妻金氏墓碣銘吴常熟鄒元銘之妻金氏諱玉字孟姬寧國路旌徳縣稅務大使辟之冡婦衛輝路管民長官司總管謙之長女廣徳路道録善信之孫漳州路龍興縣尹焕之曽孫也姬從幼慧齊性孝謹日在父母傍不忍頃刻離去撫婢御未嘗見迕氣其織紝組紃及音律書算皆不習而工有過人者諷詩書即通大義讀列女傳見有孝於親事舅姑盡苦節者必識之信踐之及歸鄒氏執婦職如禮甚育子若女自襁褓有法相其夫急人以義睦婣任恤無不適宜焉舅姑皆稱賢無間言然慕父母未嘗一日替嫁凢十嵗三歸寧及辭去戚戚如初嫁時今年遂以歸寧終父母家訃聞夫族齊望門哭曰某婦死無以成吾鄒氏家矣得年僅二十有七生於至治辛酉十二月初五日卒於至正丁亥三月二十有五日女一人升奴男一人夀童元銘卜是年四月初一日祔於武丘鄉半塘祖塋之原閲十日來請銘余住吴久之聞沙湖金氏為有禮法之家徃徃所適女多賢行都人士之詩曰彼君子女謂之尹吉尹吉者周大族有禮法之家也女有君子行必推自尹吉孟姬出大家而閑於禮法如此謂尹吉女非歟尹吉女為詩人所著而予為銘詩著孟姬閔其令質不永年使名氏有傳豈過乎銘曰梓共而秀而夭抱株驥墮地走而躓中途彼惡終天齡跛運長衢吾壹不知其所如嗟嗟乎孟女宜鄒大家孰長短於短之不足而長有餘誦我銘詩不人誣東維子集巻二十五欽定四庫全書東維子集巻二十六元楊維楨撰墓誌銘髙

body:
  text: 序送周處士還山序余讀魯莊公之春秋未嘗不義曹劌之為人也劌非魯之在位大夫也又非魯之疇人鉅室也公將與齊戰在位者亡言而劌岀見公開説戰論劌豈懐利以要君盗名以奸世乎魯為齊弱誠不忍其君將或北而其宗社之或傎也噫使魯在位君子皆如劌之憂為其君深謀而逺計魯有不覇乎長勺勝齊之後劌遂為大夫矣君子賀魯之有劌又賀劌之言効􅀈魯非要君以奸世者也南州處士周靖氏當紅賊䧟呉興上戰守之策於統兵主將將韙其言而未用參相楊公舉其人以為可以置之樞機之地薦章數上處士又拂衣而去夫處士豈有要於君奸於時者耶參相之力舉處士也亦豈有私於處士耶將用劌於長勺之後也處士不受薦辟至拂衣去則有信其非盗名懐利也稔也處士道過杭北門出所陳策見予予喜其言已逹於時之君子也言之利不利不在已而卒返諸故山處士將不得班於曹子乎一命之榮不足為處士賀予將賀其言有效於時之君如曹子之效於魯也於是乎書送鄭處士序朝廷選用文武吏於大小無位無以稱選則下詔丘園慮有慠世而去者求之如弗及獅山處士鄭子美氏隱居山中四十年言者聞闕朝廷闕用起之中使詣門勸駕者至再而處士起就道所與㳺者自呉詢而下若干人咸為歌詩以送之又屬㑹稽楊某為之叙某辝不獲則將有詰於鄭子者嘻今之舉逸人非太平文典已國家失太平五六年吏日不遑支民日不聊生也始急俊傑於在位之外鄭子挾何術徃嘻淮之右江之左㓂之挺禍者不狹矣子能帯劍挺鈹出入戎馬轉鬬數千里使兵不知疲而敵不知禦乎曰未能也㓂無臣主阻山負海各據要害以稱孤長子能單騎至其所談笑而道之使即投戈倒幟復為良黔首乎曰未能也哀哀生齒路死鋒鏑復死征歛子能弔死存疾徕流亡安反側使復有更生之地乎曰未能也未能子與今在位吏畢為廢物縣官責名將不利處士鄭子栗然起曰贈吾言者盡頌未有如先生稱詞之危也幸先生有以教我於是舉酒申之以祝詞詞曰安危成敗料如蓍功過賞罰信若時主弗貳臣臣弗欺離以獨照驥不匹馳小人退兮君子以大来叶填九鼎豎四維狂流横潰兮仍東之持國是兮臣所職叶知臣不職兮神聼之詞畢鄭子冄拜酌酒酹軷而行曰所不知規者有如軷送王熙易客南湖序軍興仕者弗由中出多由外便宜版授版授者不時祿食則陽陽而去矣其人也進無祿仕退又或失其生産生事眄眄焉不獲置其身於有所雖賤夫賈販富人相幹屑為乂甚牙校權貴之貴依憑根穴以持郡縣短長武㫁脇制而後可以裕一身及一家之養吁此士下下之為也去盗寜幾㢤髙等者無祿則歸畒爾畮無以歸卧山蹈海為魯連子為夷齊子爾有甚不獲已挾技為門下客而技亦傳者之技也不然去賈幹而下又幾㢤東州王子熙易有仕才而無所於仕為貧而起則將有版授之者又以虚役無廪食之及則去而挾其技為宛陵南湖之客南湖盖今禮部貢公之所家也南湖給告歸休業又上覲王子之行出其招而徃也頋未知王子執所技徃何出王子曰噫吾技父師教吾以聖賢之技也將使貢公相天子不欲食於農不資兵於盗不以物估􅀈楮價於天下之民而已矣舍此求吾去賈幹而下者無幾吾為魯連子而已耳夷齊子而已耳余偉其言與其執技遂叙以别且為告南湖曰南湖不舉客則已舉客當自王子始太史印譜序予嘗悼字有戴侗六書故而四目之文始鑿矣幸不鑿者存頡之十五篇字凡百四十為篆籀本义不幸為分韻所鑿字有剏入者矣如鎊鏟鋫鋸竈入鍾鼎泀􅟘溮䭀又續入圖經隱訣諸書四目氏之法至此誠一厄矣齊郡太史子𤣥氏愽古如子産識字如子雲甞續注爰歴埤雅是編則漢魏晉唐官私印文也摹印在八體之一則是編去古為近然吾觀漢文多簡古雖篆亦與𨽻等無枝脚之蔓及觀唐文宋文皆有衍出於繆者豈漢文去古尚近而唐宋去之日逺日繆耶抑漢士識字者多而唐宋識字者少耶吾於子𤣥問之子𤣥曰馬援武材也上書言伏波印文之説下大司空正郡國印章則先生云漢傳識字者多信矣雖然有呉延陵君子之墓孔子之書僅六而已而四文剏入盖又漢人益以方篆之體假聖文以欺後人耳予於漢人不能無憾而於唐宋又何責焉遂錄以為太史印譜序西山序東陽有蔣君子者家在東晝水西峴山之間家之西又闢地理泉石華竹曰沱曰谷曰屏曰洞曰亭壇臺圃其凡十有四所總而命之曰西山别墅君時時輿太夫人者燕㳺其中或與東閭西里仕而歸者飲酒賦詩以樂其樂也其攬物為詩凡若干首自金華先生而次和其詩者又凡若干首好事者遂圖其墅裒其詩而求一言於㑹稽楊子楊子曰嘻甞品人地於西山吾有其論西山有薇食周餓夫而餓夫之特立獨行師表百代者實無負於西山周以降山出爽氣以納乎韻人之抱世以王馬曹拄頰當之然馬曹者不得為餓夫之清而徒清於譚馬爾事不料理髙視西山曾無禆於典午氏宗社之廢西山負馬曹馬曹負西山耶蔣君子者有仕才而不仕盖幸生承平之世與餓隱時異不敢詭髙於食薇頋行其素於西山耕榖蠒絲足以養吾之身華草月露足以養吾之心職於孝者以事親職於義者以奉賔視西山之為晴為雨為霏為爽皆吾之四時朝暮被吾聲歌者一草一木咸有徳色是又君子之素不必强同於拄頰者之云嘻持吾論以品人地於西山若蔣君子者西山何負於君子君子何負於西山乎予未識君子繇金華先生識之未㳺其墅繇先生之詩若㳺之於是乎叙送如一翁歸曲江草堂序曲江錢如一翁自冠年工五字詩及七言大章嘗以詩經義領鄉薦而不償于祿仕人咸稱其詩詩似杜其平生艱窶窘阨亦近似之草堂錢塘即曲江也如一應辟藩閫者二十餘年仰給升斗孔子廟草堂亦荒矣少陵避亂于鄜轉秦州流落劍南蜀錄事王司馬軰為之脩起至宋吕相鎮成都又為作草堂故址繪先生象於中翁數嘗冦亂今亂定獲歸錢唐苐未知草堂不為風雨所破則為戎馬所躒躙果無恙否吾聞今浙垣大一辨章朱公方偃武事延致舊徳碩儒爼豆於雅歌壺矢間太平有象於此乎見車騎虚左或過翁草堂問風雨無恙即有恙不有脩起於錄事司馬者其不為翁重構如成都吕相乎果爾相國之尊賢為不誣矣吾於如一之行卜之風月福人序白樂天晚年歸休洛中娯老者琴歌酒賦有鄧同韋楚元劉為唱和友蠻素容滿為樂酒具又有晉公為雅道主優㳺蔗境十有餘年身不䧟甘露禍輒自謂福人然其詩有病與樂天相伴在春隨樊子一時歸則其懐抱猶有惡者吾未七十休官在九峰三泖間殆且二十年優㳺光景過於樂天有李五峰張句曲周易痴錢思復為唱和友桃葉栁枝瓊花翠羽為歌歈伎苐池㙜花月主者乏晉公耳然東諸侯如李越州張呉興韓松江鍾海鹽聲伎髙讌余未嘗不居其右席則池㙜主者未嘗乏也風日好時駕春水宅先生舫名赴呉越間好事者招致效昔人水仙舫故事蕩漾湖光島翠望之者嘑銕龍仙伯頋未知香山老人有此無也客有小海生賀余為江山風月福人且貎余老像以八字字之又賦詩其上曰二十四考中書令二百六字太師銜魯國太師此二句本先生句也不如八字神仙福風月湖山一擔擔天年直至九十九先生四世祖楊佛子享年九十九好景長如三月三先生嘗自言遇憂不憂遇病不病遇喪亂不喪亂胷中四時長是春也故自號嬉春道人名其所居窩曰春不老有嬉春小樂章一百篇小素小蠻休比似桃根桃葉尚宜男先生八十精力不衰滴翠尚有弄瓦弄璋之嬉余和之云紅兠羅巾白􅀈衫金鑾致仕得頭銜家無撲滿誰從破世有銕枷人自擔黄白未嘗傳八八陶八傳丹與顔真卿龍蛇奚用辨三三人間黄閣在平地付與西京妄一男全不為險韻所縳先生嘗曰有才力者韻愈險句愈竒也送朱生芾蒲溪授徒序余讀漆園叟論士有六好六好繋於已亦係於時余丁時變且老矣無能為矣不能擬於朝廷士尊主强國者則亦願脩仁義為平世教誨者之歸若刻意尚行髙論怨誹為亢如鮑焦介推申屠狄之徒决弗為已吾門朱生芾與余同罹䘮亂而不得安於所好者負書劍来别曰某得七寳瞿氏為西席主庶幾以學于先生者施于人敢求一言以為别吁芾以仁義為脩處亂世而得為平世之士遂其願於吾願之未能者非吾道之幸歟芾徃㢤益慎厥脩無効尚論䧟厥亢送韓諤還㑹稽序安陽韓氏自宋魏公至今凡十世散處北南者代有賢子孫如諤者其一也諤不特以世家稱於人尤以好古愽雅稱以清脩敏學稱其燕處之室曰讀易齋云入其室者不問可知其為文獻故家子姓也廼隱居西湖之上與伯雨張公為師友學益進行益脩重為之喜而畏焉願視鄉之出而仕者離親戚棄墳墓將以榮身及家也不知他變日可畏名一挂牒書者如挂臬籍錮而禁可也放而竄可也斧鑕而孥而族可也思一返其故鄉非其君哀其老而􅉵􅉵而瀕於死乞與休告則法亡得而去也今君道尊於身心泰於世進退自如駕一葉舟絶江而東也歸拜其鄉之父兄師友塗迎門候獲見風采者如見神仙吁其得錮而束之乎放而逐之乎斧鑕而孥而族而僇之乎於其歸也其不􅌶而慕之乎抑吾聞鄉之黎老人民非者已過半而城郭亦非其舊矣君於風露之夕馭鶴於小蓬閣上賦海嶠之詩得無有同聲而應過城頭話甲子詔時人以學仙而去者為我志之書者為何人夢道士而飛鳴者又為何人老鄉客楊某在由巻之寄寄巢書贈􅌨工王輔序嘉定王輔世業七子技輔自㓜機警聰記强識能誦余古歌行百十首介其鄉閬翁先生拜余草𤣥閣下自陳曰輔承周左轄公贈以􅌨耕二大字人遂以􅌨耕道人呼輔敢乞大人先生一言以發之先生咲曰子以鑷代耒豈果知耕者乎雖然世以不耕為耕者多矣漁以釣耕賈以籌耕工以斧耕醫以鍼砭耕卜以蓍蔡耕兵者以弓刀耕胥者以聿櫝耕伶者以絲管耕㳺説者以頰舌耕浮屠氏以梵唄耕老子氏以歩虚耕神仙方士以丹田耕髙至於公卿大吏以禮樂文法耕耕雖不一其為不耕之耕則一也豈止輔之􅌨也㢤然余有詰於輔曰爾􅌨之耕耕於田叟野嫗而已耳亦嘗耕於薦紳苐一流人乎輔曰輔蟣蝨漢耳烏知苐一流人乎萬一大人指教之余曰代有中秉鈞軸外攬英俊納天下於太平之域者髪嘗一沭而三握之子以吾言徃拜其履進爾􅌨以握其所三握者為余祝曰中國有聖相越裳氏之雉其来矣輔冄拜領言去陶氏菊逸序毗陵陶氏前朝文獻家也在宣和間有為翰林檢閲者某扈駕南渡其五世孫為㙴圃君某仕常郡教授因家毗陵國初以宋遺老徴不起家延頋師竹山蔣公教子弟時石田馬中丞公實從學其家與其孫靖為同窓友馬在南端薦授之靖無仕宦志乃法陶朱治生産饒於貲禮賢飬客無所愛吝親故有急者賙之死者棺槨之鄉稱義士至是四世同居一家千有餘指孝友雍睦人無間言兵興毗陵䧟其子澤與兄和者奉母孝徙居呉下和隱迹於燒墨澤亦托菊自號曰逸民司徒隴西公聞澤才行固起為參佐不獲已應命未幾辝以歸更折莭下帷讀祖父書家無甔儲晏如也今東遊海上尋菊泉於谷洲訪余老圃更生及傳延年者酌酒賦詩為樂别去索語以贈為叙名莭而又為賦詩菊逸之歌歌曰菊之澹兮北門之秋菊之靖兮栗里之丘菊之逸兮審夫去留老余圃兮海之陬飲菊泉兮谷之洲微斯人兮吾誰與儔淮海處士夀冡募資序吾聞古不預撫墓後世有預撫者稱為逹生若夫作長室以燕客其中者范子敬也作夀蔵以圖前哲與之相主賔者趙臺卿也是則預撫墓為幽宅計者非逹生之士能爾乎然有逹生而欲效范趙之為者力無及焉吾恐未免相率為囊引鍤埋之流也淮海處士錢子材先生以光陰為百代之過客齒且老矣而不以死為諱欲買不食之地豫營夀蔵非取資人不可也昔趙秋資人之不能塟者獲他日餅金貴富之報處士受施於抔土之恩他日豈無結草之報乎吾貧無以贈故贈此以為仁人義士之告庶相與資之以成其逹云葉山人省親序客有談金華葉山人之為差者音沱曰山人方士也善公孫娘舞器又曰山人方士也工鴻寳枕中又曰山人從衡士也小年嘗挾䇿北走燕南走粤東西呉蜀也又曰山人義俠士也張呉氏以偽爵屡要之屡不應恵粟帛及門轉以散民之操乞瓢者有弟為兵所殺又掠其子山人仗劍要於途而還之此客之議其差不得名其為人也一日服道来謁東維先生於草𤣥閣自陳曰某㓜從許先生門人遊長又獲登侍讀黄先生門遭時喪亂家窶慈母逝嚴親且老出山謀祿飬而祿不可茍奸今五十其齒矣將歸故山無以見其親柰何柰何幸先生賜一言為某終身教予恠其人生許黄之鄉承師友講習之素不為無學者頋乃泛焉無歸如弱喪者吁亡羊者多岐亡術者多學宜子之書劍弗成吏隱兩廢而徒取差者之議也吁壯士者傷秋孝子者愛日傷秋已徃愛日方来子其亟歸庭前風木當有曾子之所侍者堂上菽水獨無子路之為懽者乎子其亟歸勿復孟浪蹈差人之議也予居與金華為隣邑異日聞烏傷山中有葉孝㢘名應天庭之䀻移孝作忠為大明名臣吾有望於山人山人以吾言勉之送琴生李希敏序先王作樂必有以動物而後有以恊治也其本在合天下之情情合而隂陽之和應隂陽之和應天下其有不治乎有虞氏之鼓琴也南風為之觧愠而阜財師曠氏之作清角也𤣥鶴為之長鳴而迅舞聲之動物捷矣至下鴻漸杜氏之奏羯鼓也猿鳥犬羊亦為之躑躅如其疾徐之節則具聰靈以為人而有聞樂不動者乎不然則其聲之感人者未至也余来呉中始獲聼泗水楊氏伯振之琴於無言僧舍余為之三嘆不足至於手舞足蹈歸而求之尚覺余人之流通也吁亦至矣㢤以予之有感於一日之琴者如此則知先王恊治之音動於物之捷也不誣矣後之以琴過我者無慮百數而未見有楊氏之至也晚得李氏希敏氏庶幾其近之生自喜其工之至有獲予賞識也持巻来求言遂為書先王恊治之盛者語之抑聞先王之教琴必配瑟以和隂陽也禮稱君子無故不徹琴瑟詩曰如鼓琴瑟又曰琴瑟在御知古之琴未嘗獨御也盖琴統陽瑟統隂伯牙氏鼓琴而馬仰秣瓠巴山鼓瑟而魚出聼魚隂物馬陽物也隂陽各從其類應琴瑟毗而後隂陽和陽不可獨而無佐也今之士以琴自命者多而未有以瑟鳴者吾將與子求海上師以學焉庶不畔詩禮教而先王恊治之音其或可以見也歟送墨生沈裕序墨𤣥造之以色也蔵於晦而暴於久者莫尚於𤣥而墨𤣥之用也然藝于是者有工拙焉工者𤣥之用也愈久而愈通拙者反是此墨之藝有絶稱於世也其犀利可削木其清勁可入水火而不化天下傳為寳而賞鍳者隔物手之而可以知其為天下之精絶也吁藝乎墨者其可以妄庸之工得之乎三衢沈生裕自其大父東臯子代為墨以絶藝繼古聞人之稱故裕所傳若有心法之秘者非人之所能識也李氏父子墨近来為貴至久而後黄金可得李氏父子墨不可得東臯之墨已不可得而欲所傳欲以目前賤之也豈為知墨者㢤裕以所製蒼璧贈我且乞一言以發之故為道其傳之逺工之絶者使人知裕不可以目前賤之其遊京師也且俾持余説見於同鄊黄集賢同年趙禮部則沈氏之墨不俟久而貴也必矣至正八年春二月序贈茟史陸頴貴序韓子為茟作頴傳頴莫貴中山之毫漢制天子茟皆用兎蒙恬以鹿毛為柱羊毛為被歐陽通以狸毛為主覆以兎毫則知頴不獨貴於兎也宣州諸葛氏傳茟有二等髙貴者栁公權求而與之又語其子曰學士能書當留此茟不爾請退還未幾果退還即以常茟與之盖髙貴者非右軍不能用也石晉時有竒士夜傳佳筆曉出闔戸以竹筒銜壁外人置錢其中佳筆躍出茟其筆床曰頴擅名于館閣諸公者久矣至其孫遂以頴貴名焉常以豐狐之毫或麝毛湏製以遺我且曰史錢史銕心頴也予用之勁而有力圓而善任使舍其製而用它工則不可書矣故銕心之頴人罕得之而人亦不能用也其以頴自貴何以異於唐諸葛首竒士㢤予舍其頴之可貴而又能自貴不以輕信於人也故為序以贈使世之大手筆知其自負所貴非吾溢美之也至正甲辰夏五月朔序東維子集卷九欽定四庫全書東維子集巻十元楊維楨撰

body:
  text: 記借巢記五十四借字誰借得客有號鶴巢者自杭而蘇而松率假館以居予一日過其館改命曰借巢或有咲者曰鵲有巢而鳩借之鳩之拙也鶴不能營一巢而借亦拙甚矣乎楊子啞爾咲曰子亦知夫借乎人一身外為長物物皆借也吾試與子言借衣冠借以束身棺槨借以掩胔土石借以周郭山嶽借以積土天地借以奠岳極之於大則大靈借以闢天地何莫非借也近而言之琴筑借聲綉綺借色芻豢借味鼎釜借烹刀刃借割壺豆借盛金玉借翫席借偃而䇿借扶也車借駕而馬借馳也旗幟借表而弧矢借威也印章借信而露布借令也權貴借勢而封爵借名也逺而言之丹青借圖而金石借刻載書借誓冊府借史而聖人百家諸子之文借以寓道也又何徃而非借也及其親也妻借齊子借嗣父母借生而吾六尺之軀亦借也吁借乎借乎何啻於一巢乎或者起謝曰淺矣乎吾之窺借也吾因子言借而知天地萬有之不有於我也楊子曰吾於天地萬有皆借也而有不借者在何在也曰以天地萬有之借為借者萬有之客也以天地萬有不借之借為不借者不客於萬有之客者也子徒知吾有借而庸詎知吾不借之借而不客於客者耶不客者誰曰問諸有物有物問諸有初有初問諸有無有無不可名全以名其巢居客起謝曰請書為記客為隴右邾經也營丘山房記贑之吕仲善氏早孤事母劉以孝聞長從郷先生一静謝公逰通易經以其餘力屬文賦詩頗有古人風裁方今天子一海宇招延俊乂善以異等才登選胄子學有書室在錦川之陽陽坡之下貯書數百巻題其顔曰營丘山房示不忘其義於前聞人也出使于淞謁抱遺先生於草𤣥閣曰願先生一言以白吾志先生曰營丘在虛危分埜為今濟南地太公吕尚父之食邑也太公治齊舉賢而尚功至十四世為小白主覇以管仲富國􅋌天下而太公之澤益逺且大孔子曰㣲仲吾其左袵矣多其功也太史公曰太公尊賢智尚功能而其敝則夸奢虚詐而不情傷其俗也善欲振其緒於營丘而又值夫明天子之登賢以圖治其以仲之富國􅋌天下者為勉而以俗之失不情者為戒則可謂善嗣營丘者矣善謝曰請書為記戊申冬十月朔戊辰記南漪堂記華亭葉生杞家有林塘之勝在黄龍浦西蕭公津上讀書之堂南臨之故名南漪杞謁予草𤣥閣求一言以為志至四三而不已為之言曰昔眉山蘇子嘗有是號矣而生之堂又襲之耶雖然襲其理之所得何嫌於襲耶善言漪者莫如易之渙其曰風行水上渙此漪之極觀也説者以為風與水相遭不能不為之文也此漪之說文也予以為漪之所以為漪盖有為之本者其可不知乎今夫水由地中行源深則流長其發岷峨越崖谷衝林莽傾折曲直束之為峽匯之為渦激之為湍瀑千變萬態不可踪迹然後達于江河以朝宗于海有本者如是哉茍為無本溝澮之水朝盈而夕涸求一漚之㣲不可得奚有千變萬態極觀於渙之漪者也杞也有意於漪其亦於本者求之否乎杞作曰唯唯純白窩記用聖經代老莊獨為髙出華亭縣北距六十里其聚為小萊其呉越裔孫為臯氏先廬燬臯復新作又於堂右个闢窩一所上結圓頂下方四落皆湮為雪色泥竇牖六又以雲母片羃之渾然氊穹廬也名之曰純白臯嘗宿余於窩且徴純白誌賁之上九曰白賁無咎以其反本也天下之文莫文於白文之純又莫本於反本也吾聞臯壯年通經史及國語間弧矢騎以義俠厠狐貉㳺徼問名貴人争欲致門下盗壓境臯呼郷兵甲捍于淞之隂郷頼以安又以白衣參諮賛帥越者却冦酋復䑓紀活遺黎數十萬今齒及莫矣功亦茂矣假亦可體矣故歛其神于反本之地此純白之所以名也臯有四子若孫者五皆玉立庭砌問將有賦白華稱潔白于時者又知臯之反本貽世世亦無窮也臯氏子孫尚勉乎哉至正庚子夏五月蒲莭後三日寫薌林記淞之邑帶江枕海聚為山者曰笴曰雪曰神曰小崐小金地皆平疇大陸呀淵疏川突而髙鬰而秀蟠而踞之者則喬木之林大姓之所宅也去邑之北五十里其川為蒲匯匯壯反為小菜岸小菜古屋百十楹者九齡徐氏之居也去居左介一百步鑿池數十里池上植松栢栝檜桂椒梅橘桃杏草則芝蘭菊芷荃蓀薫茝鈎連彚列四時之生香未嘗一日斷也因額池堂曰薌林予過海上九齡榻予堂者數夕臨分出楮華曰先生海上還嘻咲怒罵皆成文章醉墨所及一草一木有光於薌林獨無言乎予曰草木之香細矣因人而馨者大且逺矣哉栗里松栁以處士香晉竹林以七賢香濂溪蓮以茂叔香羅浮村梅以蘇長公香草木不以物香而以人馨也信矣不然雖梓澤平泉林木之綺交錦錯者不香也吾愛齡之人品魁壘操行極髙茂嘗與予論今人出處曰今之稱豪傑者彎弧運槊走戎馬間水出火入即可茍且頃富貴髙者揺頰鼔舌閎聲髙議以驚動所事自謂陶王鑄覇以徼其所賔而為士之大慶不知大憂者在其踵觸羅踏穽卒自跲踣而禍及其孥權不能庇勢不能掖嘻若是者懵甚而悖亦滋甚予不幸抵囏􅇖幸亟返故廬與一草一木同華而共實先人之賜先生之教也予聞其言韙之曰此吾子之徳馨也馨之被於薌林草木者也故樂為誌薌林并録其語為學之信且悖者告也固齋記新經有鄉善士戴氏父者遣其子貞從予逰一日有請曰貞承名於父承字於先生曰固而蔵修之地未得齋號以自勵敢請予又字齋曰固且求志予告之曰固非髙叟之固也亦非固我之固也乾之爻言不云乎貞固足以幹事貞不固不足以為貞固非貞亦不足以言固固而貞貞而固而後事之幹立焉故聖人許幹必於貞固而不以亨與利也生學與齒俱進將入于官而有事於政已以易之所固者植其本於不㧞本而幹幹而枝枝而花花而實伺之嵗月不患其不茂且碩也生之貞毋替於固也復有喻生於固者唐城南諸社所居號居社固以其風氣所聚也宗祖所族也子孫所完也後為妬者鑿之血流者數日而固者崩矣杜抵固從而衰矣地不可以不固如是矧君子之操行乎生力完所固毋自鑿也榆溪草堂記至正庚子夏四月余東逰鶴砂囬舟順流下黄龍浦又東抵榆溪見大榆數百章皆百年物也雨餘新緑蓊鬰若屯旌擁握樹底搆草堂一所堂主者陶中出迎客供茗飲床書充屋棟茶竈茟床環左右又將客步後圃花樹紅白刺人目折殿春玉桃花一枝供客是夜遂宿草堂明旦干余記草堂之號周顒嘗搆諸鍾山杜甫亦搆諸浣花矣然鳴騶入谷而山靈見移脱巾據床而㡬不免禍天下草堂萬萬也而享有其身者尠矣唯爾祖靖節翁自彭澤來歸門種五栁著傳以自况義熈之節良史書之五栁之徳色者厚矣今子孫不堂栁而堂榆榆視栁等也烏知異日不有傳榆溪先生在龍浦之東如傳晉處士於五栁者乎中曰某不敏烏敢望吾前之人請記為堂以為警槐隂亭記三槐見周禮有三公之象焉宋王祜氏手植三槐而三公之位應于其後文正公旦君子謂王氏之槐種徳之苻也海東王敏中氏為三槐子姪槐之樹之閭者亦三結亭樹間扁曰淮隂大叅周公琦為作篆書之又介吾門管生訥求余言為志吁王氏之子姓何其祚之逺也祚之逺者徳之長也晉大司馬府豈無手植之槐識者占其樹婆娑而生意盡則知司馬氏之槐不如文正氏之槐開其先者厚而䕃其後者長非尋常府寺之植可得而並稱也敏中席槐之隂思有以培槐之本則豈徒戒剪伐如齊人之令仁以根其生義以幹其行忠信以要其成也盛徳大業其有不光相門之植文正之堂虖敏中勉之有以徴余言之不誣也至正庚子秋記并書于挹清堂春草軒記有詩淞謝伯理氏於其正廬左介為謻􅀈軒一所命曰春草本靈運語也請予為之記予疑靈運以詩名宋而猶附麗於人以覔句何也在西堂時詩思苦甚至假夢寐見恵連而後得池塘生春草句遂以為絶竒吁此三百篇後詞人以興趣言詩者也律以六義何有焉今人一草木取以㸃綴篇翰極於雕鏤之工詩道䘮矣談興趣者猶以靈運語出於一辭直指如髙堂多悲風明月照積雪無俟雕刻而大巧存焉猶為去古未逺也伯理嘗與予論詩大惡凌跨六朝直探漢魏故於春草有得焉雖然伯理方將以詩備理教及於民豈必効永嘉詩人争工於句字間者具慶在堂上年俱髙矣朝朝下音潮焉有諭焉者夕夕焉有詰焉者於是家庭之教出焉倫理之化行焉家有悦親之堂不忍一日違其色養吏部以品推恩及其親自謂㒺極莫之報時詠孟貞曜寸草春暉之句是春草所托又有闗於倫理者惜永嘉詩人未之知也吾合以論見春之資於倫理者不獨在句字間也係之詩曰草生西堂下沱水含清漪皜髪在堂上㳺子今已歸大兒佩紫綬小兒著緋衣嚴君親受禮慈母舊斷機春草承雨露惟恐朝日晞願持此日意永報三春暉悦親堂記謝氏繇陳留徙淞者代有文行為衣冠望族至徳喜封君養髙弗仕生産益饒門第益大至正丙申苖人䧟淞封君廬亦毁明年復新作之其子伯理率其二仲奉親于一堂晨昏於斯不使析處以一日去其堂予嘗名其堂為悦親今來杭遂以記屬予世之以為悦者無大於悦親矣子夏問孝於孔子孔子曰色難父母之色間見於㡬㣲者孝子迎而順之為難迎而順之為難者必孝子有至敬至愛闗於親者切若曽子之養志者是已孟子不云乎悦親有道反身不誠不悦也誠者至敬至愛之謂也今夫備羞水陸備列聲色百拜上案於親者非悦也華服絺繡竒噐金玉寒更燠換於親者非悦也鍾畆阡連子本泉溢嵗上劵於其親者非悦也必悦之如曽子者而後可伯理事親尚友曽子悦親之道蔑有加於此矣雖然伯理方仕鄉郡出有民社之寄以其悦者身之昆弟循之而後國人因之所謂父子兄弟足法而后民法之矣理之弟曰恒曰鼎皆嘗從予㳺恂恂然有古孝犮之風吾知謝氏風教師於百世者有矣豈直國人一時之法哉異日和氣應孝之門吾見瓢水之陽風山之隂有同頴之禾併柯之木産焉田氏三荆有不能嫓其羙者吾過封君堂上尚能為子賦之至正己亥秋九月丙午記好古齋記郷友俞瓛仲桓通經術自命其讀書之堂曰好古來杭請記於予予為之喟然曰古之不諧於今者乆矣孰以古為好耶三代下嗜好百出好酒而鍤以隨好傳簊而牧以亡好勇而舉鼎以説臏好獵而隊車以隕首好㳺而賈害以利好詼諧而售辱以戱好書而汚髪以為顛好畫而竊封以為神好鍜而倨以取禍好石而拜以取䘮好鶴而乗軒以取滅國所好不同而所失亦隨以異惟好古為聖賢之學愈好愈髙而入於聖人之域而凡世之所好者不一足以動其志此好古効也今之人不古好覆以好古為野謑髁無任慆滛不道逮至毁綱裂常自謂行於今者横如也不知步跲者在户限外吁亦足省矣盖孔子嘗曰先進禮樂野人也孔子之時已待古為野而孔子豈敢以野待古哉故曰我非生而知之者好古敏以求之者也仲桓之生後孔子㡬二千年不溺於三代以下之偏好而獨追孔子以為古者而好焉非有聖賢之學不能仲桓今仕矣任民社之責矣以其好古者行於仕也吾見民之還於古而毁綱裂常者無以容於今孰敢以野議好古之古哉桓起謝曰謹受教請書諸齋以諗夫議古之野者至正己亥冬十月初吉記尚朴齋記太樸一散勢不極於文不止也殷質特尚猶本乎朴至周文郁郁吾聖人不能不從時而救弊之僿則欲從先進之野至用四代禮樂則取殷輅亦貴其朴耳使聖人得位其不返朴於古吾不信也漢大臣師盖公還治於清浄無効至寧謐三之君又當率朴為天下先㡬致刑措此朴尚之効不可誣也維揚周信甫以尚朴名其齋介松江守顧公謁記於予予未識周君而顧公稱周君篤厚古君子務以一朴存心而待物又以之佐太尉府収行蕳之効則知周君傷時之僿欲返治於古其亦慕聖人從先進者歟其亦盖公之可師於漢大臣者歟方今天子法漢治文之太尉菲食惡衣以承明天子之化周君又以朴尚賛大府之政一朴之係於天下者大矣朴名一齋固不得為周君私也故予不辭而為之記其俾淞之能詩者頌之如后云虚舟記平原生居九鳳之山以虚舟扁其一室客有過而詰之曰聖人取諸渙刳木為舟以利天下舟濟世之具也而予以虚名之亦有説乎生曰余族居海堧見鳳壽猝作佑客之舟兵人漕人之艦如山如雲胥溺沒於蛟鼉之穴徃者不可返而來者未巳也嘗作吊溺文哀之而願余之虚舟孰得而溺乎客曰子之虚舟將何載乎何適乎生曰吾舟本虚復何載吾舟本徃復何適客訾之曰子之舟殆不如丈尺之朽槎乎槎神而能引客道天漢逰牛斗間而子之舟何以自神乎生未知所對厓山鐡道人在座莞爾咲曰客欲知夫舟之神且大者乎天一氣也氣水也地一舟也地至重而浮㳺於一氣旋薄之中未嘗溺也非至虚而至神能之乎客以丈尺之室視舟亦隘已以大地之大視舟則舟之虚者六虛無以尚之若是則果老之舟鐡務相之舟土絡南公之舟葉以之稱神者末矣客退徃生出楮茟請書為記生名曠姓陸氏雲間人也鐡道人泰定間李忠介公榜第二甲進士楊維禎也五雲窩記雲天地之靈氣其興也勃焉其滅也忽焉不可以色求而色之變出焉或以青以黄以赤以黒矞以同以三素以五采而名亦隨之變偽者談五雲有以望而知帝者之止占而知賢人之居夢而文章之進兆而知名進士之出又托而為蓬萊仙境之求而未有命之於居者淞之璜溪吕希逺氏吾以五雲名其居則亦有説希逺當客杭從勾曲外史張公逰思其親不置外史為掲其所寓曰白雲取狄公思親意已而歸耕溪上養母以孝聞且廬其先墓林薄間曽見非烟非霧蕭索輪囷具五采以燭人者吁此五雲之瑞孝感之應也吾得諸璜父兄之言易其名為五雲因悼兵革以來衣冠之士逃離觧散至有遺失親而獨忍生存者若希逺氏之不忍一日去其親奉驩菽水於流離顛沛之秋此非人瑞而何有人瑞而後有天瑞或者徒以占俟夢寐賦咏山㘭求生之五雲者未為知生者也余故著其説録諸窩為記大竹軒記潼川文同氏自館職乞外調屢厯郡守有治狀官至司封員外充秘閣校理其髙情曠度類神仙人文章有丹淵集不在一時疇軰下顧以畫竹知名伎掩其人君子所惜在洋州時搆亭篔簹谷為㳺息地故於畫竹益工時作古槎老枿淡墨出神謂之墨林盖非丹青家所能匹也評其妙者謂其胸有竒氣壓十萬丈夫者非繆雲間義門夏士良氏慱雅好古蓄書萬巻外古名流墨迹舎金購之弗悋於文人才士之圖寫尤所珎重居之西偏有肅客軒名之曰大竹者有文同氏墨君之手澤也士良蓄畫凢百十家而獨名文竹於軒非文氏之墨君可貴三百年之清風雅節可詠耳雖然簹谷多偃竹同特愛之嘗畫以遺子瞻氏曰偃竹數尺而有萬尺之勢其詩曰待將一叚鵝溪絹掃取寒梢萬尺長偃竹有不可偃者如此與可以之子瞻以之士良之所蔵作於簹谷不簹谷不問顧亦問只尺之素有萬尺之勢不可偃者何如耳士良仕志未伸必有得於此者不然軒之外林林然麻生而棘立者皆篔簹物耳何獨以畫為貴哉抑吾聞夏先人止知公有義荆圖兵餘圖與堂俱燬士良更命荆以侣竹則又弗隊其先緒云五檜堂記至正庚子孟夏某日予過黄龍浦逰海上觀三神山經南北蔡蔡之北者有大族婿者徐亨肅子至其家入其門則深庭别院舉水天也已乃覽其園池之勝林木蔚蓊水石聮絡遂燕一堂亨拜手請曰堂未名惟先生名予視堂隂五檜者柬軒老人之手植也因命之曰五檜堂又請曰堂既名不可無誌惟先生是措吾聞東軒老人好修潔精於物理加之該慱文史折節待海内士必延飲五檜下人問檜則曰槐之三顯之必於天者松之七隐之必於人者栁之五又出天人隠顯之外而以綱常之隆替為進退者吾之進退未嘗必於天亦未嘗必於人也天之所以與我者果不可必乎脱吾乗化而盡五檜者鬰然於庭使後之人見之豈不求之於五檜七松之間耶是則予之命堂以五檜或者東軒之人其有待余於𡨕數者是檜也厯已百年皆森聳竒崛鬛而鱗癭而輪八臂九首而龍其身節甚貞氣甚清掌月而珠擎竅風而籟聲饕雪而鐡撑于以胚松栢之雲仍而要嵗寒之盟者乎言未畢亨起謝曰是可與五檜寫神已請書為記東維子集巻十五欽定四庫全書東維子集巻十六元楊維楨撰記

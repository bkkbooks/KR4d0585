body:
  text: 序髙僧詩集序三山雷隱禅師予以師友之者幾二十年其謝事歸隱于蓮峰也甞以本朝詩僧之作委其選輯自端而下凡若干人時詩凡若干首持来徴序孔子論詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名夫以浮屠之教棄倫理而宗空無其為書又務為宏濶勝大之言無有興觀羣怨之事鳥獸草木之情而何有於詩然自呉興沙門晝以来不以空無為師而以詩文命世者代不乏絶錯以成章非徒侈乎風雲月露而尤致君親之慕其與吾魁人碩士徃来倡和因時以悲喜隨事以比興者風雅宗焉是其人雖墨也文則吾儒非墨而空無世之大夫士招而歸諸同文之代不為異也昔歐陽子序秘演之詩以為秘隱於浮屠與吾石曼卿隱於酒皆世之竒男子也第未知雷所選之上孰為今之竒男子吾老矣於吾曼卿之軰未能見隱於浮屠者或見之吾將與雷從之遊冷齋詩集序曩余在錢唐湖上與句曲外史五峰老人軰詩推余詩為鐵雅詩雷隱震上人復原報上人傳余雅為方外别𣲖繼又得祁川行已方上人齒雖少氣則盛才則宿也持所製見余曰銕龍玉鸞二謡鏗然有金石聲余已竒之今年至祁上上人出冷齋全集求余評内有和余古樂府題其辭多警策余益竒之嘻可與震報同列吾𣲖矣余觀上人之才蓄天地蔵而又採諸歴代之載籍者日積而不已而終惜上人之才不用於邦國而用於山林與二休軰爭篇什之工也雖然余聞太保劉公沙門出也大中忻公又以文字禪動黼座一言一行皆有禆於世主吾儒流偉之上才績日懋聲華日大將簡知上所不得與二休軰較篇什工拙而與二賢者相頡頏于九天之上也余有待焉上人勉之以徴余言之不人妄也雪廬集序宋南渡後大夫無文章乃得於髙安上人圓至者方嚴陵有是言也始予恠其言之自薄及取至文覽之則於江子參􅋁軰誠有過之者其脩辞有古作者法吾中國聖人與西方聖人有合不合者二之則不是一之亦不然則必推極初之母者言也善夫至之能文也至後未有接之踵者閱七八十年而得江在外史新上人余老友劉海持雪廬一編過我徴序言觀其脩辞幾近至而論道亦似之其曰佛以神道設教以輔國君治本使民從化不俟刑驅且賛今天子以西天佛子為帝者師所以崇其治本者耳善乎新之言佛道道之返其初於母也其勉人必以問學思辯以行其道而振其教則其文非穿空鑿幻務資口吻於人我者也於是命茟胥錄其編凡若干首使與至文同梓於肆云至正丙午夏五月朔日抱遺道人書于雲鉄史蔵室竺隱集序季代儒者談浮屠氏學十八九而未見浮屠談吾儒者自晉慧琳推吾白學貶裁其本教逮唐有衣冠外臣曰一行宋有上天子書曰契嵩我朝有筠溪牧潜之集曰至秣陵蒲室之集曰忻歴千餘年僅僅四五人耳江左道上人有編曰竺隱余喜其吐辭運㫖未甞有本教濶大不經之言其雅頗近韓暢近歐而蕳白近太史公求之浮屠文中駸駸乎争駕牧潜而於蒲室也殆將過之此余較其格裁而言究其論道則其不合吾道者亦盖寡矣道甞以書来曰吾子執文柄乎鐵史寸善必賞不在人求不善而受議亦心服無憾故道以不腆之文不自知其合道與否印子一言余自離亂棄官十餘年以觚簡著作為事絶交于勢要而一時方外有文句近古亦収而錄之而况有文不畔吾道追古作者如竺隠編者乎樂為援茟而引諸首不辭一漚集序雲間釋訓師受業郡之普照寺丞事天竺如庵真公玉岡潤公入徑山得直指於元叟端公洊謁大士鷹窠僧迦淮泗尋一有於毗陵姑胥末參獅林天如子今歸老故山之化城築别室為燕休所自命曰漚隱錄其平日詩偈題曰一漚草者凡十巻求余一言傳諸其人且曰為人膾炙者元叟𣲖外有吾鉄雅𣲖焉晚年詩律益嚴礉唱余和汝者與吾門八駿爭後先吾聞東山空法師有詩入陳黄𣲖後自以為齊己貫休不得祖師圖者詩累之也從而自諱焉余亦曰師有伽陀妙天下又何必詩詩又何𣲖自其集而觀之感化齊物傷今弔古背漚之醍醐甘露探其學則讀吾軰書多於貝葉鈔故其託物比興者吾風人之情而觸物悟身者其内典之教也姑舍勿論吾與師論漚㫖漚之生何生滅何滅余甞讀師海月祖象謂月之景光在月乎在海乎海月不在海而海且何在乎知海月之無在不在則知漚之在矣師起謝曰吾之漚可一而萬萬而一矣遂書為序使人知師之上祖師圖者固自有在三境圖論序余讀經子九流之書恨有未盡而身毒國之書鞮譯于不可誥者固有未暇杭之凈性寺主僧無為師觴余東塔院談出世法初聞其説娑内蘇迷盧外為七金水為四州東為弗菩提南為閻浮提西為瞿耶尼北為欎單越地各袤數十萬由旬又曰持地山外為香山雪山寳山山上有池名阿耨逹東北山水至積石山潜流地下為黄河之源以吾聖元幅員之廣西極河源東盡震旦窮歩章永不能萬由旬而此日月世界不知在欎单越耶閻浮提耶又曰日琉璃寳廣二千四百有餘里天子天民居之月宫水晶實城其廣如日天后天女居之不知二千四百有餘里宫城之内誠有隂陽晝夜乎有則又孰為之日月乎又曰念棖者性之原即命也人天性地獄性一念别爾彈持頃見三十二億百千念念念成形形有識以吾天命之性未甞有地獄不知一念為人天為地獄可為性原乎又曰墻壁瓦礫具有佛性瓦礫又有念念不乎又曰千物出後世却乃壊天地生滅在菩薩一吹唾中未知菩薩之力有吹而成孰與不唾不滅使之為無生滅耶而又使之不能不滅於十二萬斯之後何也余時未辯所言即嘿嘿别去明日師復謁余邸次出所著三境圖論其論所演不出所言者其圖又曰因境生象因象生見生想生道余為披圖誦書盖有不得其續師且過索余言為引重余孔子徒也言不相謀得非云者有非其徒所能决回必將决於言不相謀者邪夫茍合卦體於八佛之道者易之罪人也故余為錄其言以啓折中者引于㢧之端非茍合也抑余聞中土三寳有象四十二有章實身迦景摩騰竺法蘭始今三境有章又自師始也貪佛者欲不爭傳競習而得乎嘻使三境者誠灼灼不誣其罔諸法度羣想出大允而優入乎四聖之域者當無勝矣則是書非台祖之宗子外道之金城四十二章之羽翼驂乗歟師名並學自號無為子台盤石人脱白于杭之芝皁受天台㫖于知先今主凈性寺云瑞竹圖巻序竹見於易於書於詩於周禮易言卦象書言地宜詩比徳君子禮述器於樂也而未聞以瑞言者然竹心虚虚故靈故與人心徃徃有感應之機娥皇女英哭舜於三湘之野而湘竹為之斑然漢文帝孝於母而子母筍生白虎殿唐隴西地饑而竹為結米如粳實民頼以活者百萬數盖湘野之文義所感白虎之萌孝所感隴西之實仁所感竹之靈若此謂非瑞應可乎雲間心海上人植竹於庭而有産雙莖並幹者雙莖並幹不常得於有竹之所則歸之海瑞應亦可也或曰心海為沙門之民不染於物者烏有所謂仁義孝莭之所感虖予曰人情物狀世容有偽惟天出之物不可以偽參也物不可以偽參則不可以為動物於天出者其必有以也夫其徒虚碧氏為繪竹形来求予言以記不朽上人髙徳余未知而信其動物者故為志之且使其徒之物我之相感應於理者不可以離而去也至正十年十二月朔旦序毛隱上人序客有沙門以金錫杖荷青襆槖謁余雲間次舍者問其出呉興儒氏子也問其業縳茟也余恠縳茟非沙門事則曰余祖禰業余弗忘其先也且自矜生而頴悟六嵗善讀書史日記萬餘言長而善草𨽻詩書詘於父命為浮屠而俚浮屠惟以習歌咀擊鐃考皷利人死喪為事無所用吾菩書記者遂服先業自號毛隱盖將附頴而逃吾浮屠氏之耻也且可挾以見世之賢人君子如閣老青城先生尚及見之而喜余之為且貽余以詩今幸願見夫子也竊嘗誦夫子三史統辨數千言至今口不忘余覆其流誦沛然若大江之奔决無少哽也於是異其人曰人生之初受魄於隂魄盛者多善記昌黎伯稱毛頴善記亦豈非以其明昧之裔犇月合太隂之精受魄為尤盛故爾耶上人以毛隱自號非徒欲祖頴裔而又將傳頴心至於愽纂洽記述為文章資世之賢人君子以文明昌天下乎不然何舍子浮屠事而復其先業以僕僕走文章家之門乎若是則上人之志有所欎而未信可知已用上人之伎者母徒用於字書官府市井貨泉之註記釋老巫覡之書鈔而已也抑昌黎言毛頴有時而秃不任事遂以詩老退且有中書不中之議吾將還子顛毛返子儒衣冠萬一列諸鴻生碩士聼受指畫俾免冠之際毋得以老退議子以為何如上人避席載拜曰夫子倘有意拂拭我我將加巾冠載茟以從至正九年十二月叙自跋曰余為此文后上人者遂幡然為賈浪仙故事言之不可已也如此儒之才日衰折而入浮屠家如毛隱者多矣送用上人西㳺序金僊氏之教上為坐次為遊下為誦習也滅去􅏒息歸于頑空坐而得之聞觸知覺㑹於真原㳺而得之誦習者一出一入之學耳然其㳺也不趨乎靈山勝水之聚求即夫大浮屠之神者耳目其聲光則亦㒒㒒與販丁役卒等爾四明用上人盖有志乎浮屠氏之㳺天台廬阜羅浮南嶽盖甞徧歴焉將自虎丘逹金陵馴致乎五臺之山其徒自妙聲而下凡十餘人贈之言而去又持其巻来請予一言盖上人由吾儒而學浮屠以為浮屠濶大之言以誘愚非以誘賢也故又未忘於吾儒之教盖吾儒亦有㳺矣孔子轍環天下太史公歴覽天下之名山大川孔子不㳺無以成春秋太史不㳺無以成史記吾甞見浮屠氏之文史矣擴諸外學輔諸内典者曰橘洲曰石門吾誦之予之大抵得諸㳺耳上人之學得諸㳺他日東歸有所見予語言文字足以繼石門橘洲者不屬之上人誰屬乎不然僕僕乎與販丁役卒等者固汝教之所無取也上人尚以予言勉之送照上人東歸序四明水山與天台並秀説者以比海之方丈蓬莱則其鍾為人物宜有清明俊傑者出以應時需也國家開鄉選法已三十餘年而破選之荒者僅史駉孫氏程端學氏而来者無繼焉豈其人好隱逃浮屠而去者不少耶以余交浮屠南北之秀凡數十人而明亦寥寥無聞焉晚始得㫁江恩師繼得照師覺元才之難也可知已照且不以才自止從㳺於吾門稱方外弟子連日夜記書數千言屬詩文若干首孜孜自課以為常故其行脩業進今日與昨日之不等夷也獨惜其學成終歸無所於用不得應吾盛時賢良之選以接史程氏之躅君子不獨為明之才難惜也秋髙東歸来别曰照也有母焉久不覲心慼慼焉矧先生䔍倫紀之教敢辭而歸予益歎照之性近於道而才足與有為也使照還鬚髪加冠巾有祿位民上其不䔍吾倫紀之教以行先王之政者㡬希以明得方之難而僅得如照者又逃於浮屠而未知其返也故送其去余甚惜之而申以告之送象元淑公住持南湖序予嘗論浮屠之教足以捭闔宇宙玩弄人世歆豔王公大人遂以法門位吾孔子之次非徒以閎濶不經之文亦其徒有異比丘至靈甚睿人仰之若古神明者得之皇帝既定南京奄有朔服以天下版籍不白浮屠民脱兵而遺者十不一二徴賦動力疲於上農夫斃版築以萬萬計已而髙望鴻徳者示化顯神於不可蹤跡之中天子聞之為之動色太史氏錄其人使有所考重選精進闍梨立大壇塲設人天佛事主以天界大龍象教門阽仆而一日起立吁是孰使之然哉南湖在秀當兵車使馹之衝兵燹後穹殿湧堂已入焦土其徒縮以痺盖僅如逆旅舍佳山者代難其人矣象元師由杭之大名輒以陞兹座吾聞其人於元叟雪窓古鼎之間已久頋今齒愈夙才愈老道愈神其於秀王勝地起廢補缺完而大之使文布述粲然如承平時是不難者至其妙通大知識一言一動有以上賛大明之化靈跡異迹照著一時俾王公大夫仰之為古神明如前所稱則其教也當與吾孔子之教相表裏西方聖人之道誰得而廢之吾以勉象元而還以自勉青龍集戊申冬十一月二十有二日序送蘭仁二上人歸三竺序余在富春時得山中兩生曰蘭曰仁天質機頴皆有用世才授之以春秋經史學兵興潜于釋来㳺雲間别余曰釋氏有衡台𣲖由北齊悟龍樹三觀法以授南嶽南嶽以授智者智者因悟法花之秘於是約五時張八教總括羣籍歸諸一宗復述止觀書教理既白觀行兼明以是傳之章安章安傳之法花法花傳之天宫天宫傳之荆溪而其道大脩㑹昌之厄教帙亡去呉越王求其書於海國得諸髙麗觀師四明由之而中興三竺由之而𢎞演猶孔聖之道由河洛而大振由許李而大行儒釋盛衰實相倚伏今丁世變刹毁于兵經火刦厄甚㑹昌學者觧散遺籍漫然莫從稽正某軰將叅承故老由三竺始幸先生一言為指南余謂之曰文武之道具在方冊人存政舉人亡政息汝佛之教亦然二子齒甚穉志甚宿學甚武能以宗乗與吾聖典合而為一以載諸行事以俟昭代之太平吁汝乗不隊則吾道其亦興矣乎送奎法師住持集慶寺詩序天子即位之元年於浮屠氏之教既立僧省以土賦奔命京城者以萬計而露殍者三千餘人髙徳之寂而去者十有二人上命僧統曇師傳錄之遺而得恩歸故山者數十人而㑹稽方舟奎師由旌徳新領天竺之大集慶住持事於是薦紳士及其同袍莫不謂法社之得人予聞主集慶者由宋南峰佛光而下若元之無極宗周天岸諸公皆僧中大龍象而桂子山之蟾兔尚有光也今方舟踵其躅清標古韵之所及吾見桂子之山若增而髙蟾兎之窟若闢而朗也於其行也書以贈之同盟之士歌以餞者係諸後云送儀沙彌還山序海内兵變三教之厄浮屠氏為甚壇塔資為烽燎幸存者宿為戍舍沙門之桀至有易廬改服以從山㙜野邑毁去幾與㑹昌之厄等其能卓然自立不忍僨其法門者百無一二大阿蘭若力扶象教又以徭賦同瘦編戸其暇㧞漏身譚覺路越濁悟昏以為教乎驪峰余客富春􅃇遊地也方外友雪舟尊者月一招致至則為宿留旬浹而後去時沙彌儀年甫十二三侍師左右應對進退一一中軌則余山中所為文三過即能背誦去之十餘年驪峰兩罹兵燹而雪舟亦隔世矣寺之徒日觧散儀獨結茅為盖守其故址而不去今年不逺四百里謁余雲間談山中徃事恍如雷比丘夢竟三日告别索一言歸為山靈重吁浮屠氏遭兵不改業又不自僨其法門如儀者能幾何人於其来也不無感焉其歸也不無朢焉吾老未木尚及見驪峰宿草復還􅃇觀吾復大書嵗月出窟鍾以落之有日期也儀勉之耳同袍曰仁曰蘭在雲間者當詩以繫吾巻琦上人孝飬序韓子曰人有儒名而墨行墨名而儒行者可以與之㳺乎曰揚子雲稱在門墻則退在夷狄則進盖儒焉而行墨者退可也墨焉而行儒者進可也浮屠文暢以慕吾道周㳺天下必有請於縉紳先生之教故為韓子所進焉夫彼之教以蔑君親之倫而吾之道以有人倫為教今有人焉宗浮屠之教而有一旦幡然自外其説以還吾道君臣父子之懿也又豈非君子之亟予乎琦上人呉之儒氏也自幼落髪為浮屠天平山中壯遊四明雪竇見石室禪師深器之俾職記室後浮㳺淮湘間以肆其輕世之志未幾丞相府以東土名宿所推俾主毗陵龍興禪寺留不期月忽自唶曰出家以能脱俗而去使俗髙而慕之以為不可及也奈之何又挂名官府罷送迎道路覆為俗所厭邪且余母耋矣即飄然荷包笠尋先人舊廬於蠡澤之上而先廬敝矣今將築屋一區以飬其母而終其天年計未知所出首以其事告予盖上人甞以儒行為余友者也今又還天倫之懿職其孝於母以風􅏒其儔軰呉人多孝親而義於成人之盛事聞上人之風其不有勇棄金粟如棄執鉢浮屠以佞土木偶者吾不信也已上人出予言以徃吾明年至蠡上將覩子之室突如化成堂上之親無恙且當為子奉豆觴為夀云至正八年秋七月序闕氏註道徳經序道之不明也知者過之愚者不及也聖人載道於言未甞不簡易著明自非不愚之極皆可得而白也故曰道若大路然老氏道與吾聖人之道本無二也引以為異者私知求之之過也於是乎有真無之論要非老氏之本也金人闕氏仲寛以吾聖人之學注老氏之書深諱儒者以虛無以絶滅禮樂以慘刻術數言老子而必欲證其道以同吾聖人盖其讀老之見有獨至而自信者䔍矣觀其十一章首闢虚實之論與夫真無妙有之譚十三章深折滅生脱患之説二十二章極其至精於真實信驗三十七章以天下之事相生相代為理之必至五十三章為備論修齊治平之道八十章為歴叙至治之化以還淳返朴望於後聖之治於此見老氏之學非虚無之祖而老氏之道非機謀術數者之所為也坦乎其言實訓詁諸家之所未見也吾於是感無極翁之論無即老子有生於無之㫖而惜鵝湖諸子之疑於無者未見闕氏之論也其髙第弟子為四明董自損嘗受師㫖為同歸論今將板行其師所註老氏經若干巻持其編来見予錢唐丐一言以引首予頗是其説故為之序云至正六年冬有十月望序送鄧煉師祈雨序洪武二年夏旱松陵太守陳府公初下車首詣瞿曇祠求雨十日不降守怒欲焚曇象浮屠氏拜以免六月二十日壬午移禱于鄧煉師法壇明日移壇公宇守自製心詞一章告天曰下民六月之旱無伸所求上天三日之霖有感斯應鄧為奏章上帝然後役五雷丁甲呼吸鬼物是日少女風從西北起迅霆一聲振屋瓦大雨如注一日雨二日雨三日大雨足淞民咸抃手相慶曰此府公方寸中雨而非鄧之法力則亦無以成其誠感之速也守命屬吏於琮乞一言於東維先生為鄧之勞先生為叙其事而又侈之以歌曰東海水枯沃焦神工無處尋天瓢松陵太守閔民苦疾呼鄧師誅魃妖誅魃妖役丁甲蚩尤鼓風旗倒插搜龍龍走白龍潭迅霆夜擘干將匣於乎縣令不積薪將軍不拜井爐烟一穂逹丹誠三日甘霖雲萬頃君不見漕家粮船星火急𤓰洲渡頭河水澁蒼天蒼天不悔旤海民盡作枯魚泣鄧師鬼工煩叱訶稻田粒粒真珠多松陵太守報新政和氣化作擊壌堯民歌東維子集巻十欽定四庫全書東維子集巻十一元楊維楨撰

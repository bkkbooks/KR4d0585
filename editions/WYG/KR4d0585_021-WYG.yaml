body:
  text: 天風海濤樓記呉閶闗之西其地清曠平衍去海僅若干里有築層樓與海湧峰之小呉軒相埓者其主或招海内豪客燕處其上八窻洞闢近見風濤洶湧在足底樓若浮而逝也主酌客以酒曰景若是能無言乎客亦酢酒於主人曰樓惡名主曰未有以名敢請客遂稱天風海濤主以為然并以記請客曰壯天聲者風也而不知大塊之噫者聖也壯地險者濤也而不知層瀾之積者信也故聖於隂陽莫如風信於晝夜莫如濤風之生於天執之而不得逐之而不及惡究乎聖哉濤之出於海禦之而不止激之而不囬惡察夫信哉天地噫而為風隂陽以之鞴萬物也江海積而為濤晝夜以之凖萬古也風之聖濤之信大矣至矣及天風與海濤相薄也蓬蓬然起歙乎土囊填乎太空不終日而萬里若一磅礴相射與激水之濤相軋呑天沃日走貔貅而吼犀兕獸駭於野龍㧞於淵極天下之神觀無出此吁海濤不揚而淵静天風不振而和平欲極天下之神觀奚有焉惟人亦然厄於窮巷逃於深谷患難奸其外煩懣忍其中於是激諸意氣之頡頏發諸悲歌之感慨而天下稱竒曰丈夫士固如是也雖然竒不生於竒生於變故不觀變無以知其竒不觀竒無以見神也嗚呼户牖之小萬頃寓焉可謂竒矣抱竒志者亦將於此一爽乎鍚老堂記華亭環南六十里為胥川有老人曰殷純父氏者年八十餘畧無衰憊態老人失子而得女二其長債曰顧審之氏居老人甥舒以終飬且名老人燕處之堂曰鍚老盖私賀老人之髙年而假魯人頌禱之詞以為意也吁養外舅氏若審之氏者亦可謂恭也已矣審之以老人之姪孫奎受業予門遂因奔請鍚老記予讀魯頌泮水之章其詞曰永錫難老順彼長道難老者難若出於天錫不知固有難老之道而有以為錫之耳故曰順彼長道老人實以之老人者既無多男子以怵其愛憎家又饒樂素無服食窘其寒饑晚又求清静術樂之以遺棄夫嗔喜愛慾朝市之勢要聲利也皆其難老之繇而詩人所謂長道者也抑吾於老人之錫者有感焉者昔者虙戱神農氏之民暝之蹎蹎不知所以然而然是以永年黄帝堯舜氏之民職職植植弗夭是以難老後世之俗不然􅋿文之煩稱也機譎之互确也百狀俱作萬恠横生水竭山崩宵光晝㝠石言犬疴夏霜冬雷㒺不繆盭是以有父終其子兄終其弟者求老人之善自養夫長道謂黄帝堯舜氏之民兆歟今聖天子疾民之偷􅀈偽還淳思納斯民於春臺熈皥之域以黄唐𤣥惪格於上下旁通於四裔四裔之民不言而自化錫老之福且家至而户達何啻老人氏一堂而止哉吾將與人聨茵並几酌春酒堂上弹琴吹竹歌上古大庭氏之風以待遂俾奎復於老人刻諸堂為記江聲月色樓記浙江秋濤之壯秋月之英相上下月之英至秋分而極盛濤之聲亦至秋分而極壯濤與月一氣之得故江聲月色為天下兩竒絶也江水流溢而東南行其溺為湘湖湖之陽岐壽諸峰㦸而筆立腋江肘湖而襟諸峰之秀者則韓氏惟新之樓有焉元統元年秋惟新氏嘗觴於樓之上請予名樓予命之為江聲月色而記則未遑也惟新氏去世且十有餘年而其孫奕來從予㳺猶知致祖初志以記請嗚呼世之言聲色之樂者有矣楚眉衛頰春韶月秀狎慿而眤茵争憐而競悦悲絲烈筦朋從旅進鳯鸞嘯而鶯燕鳴引吭而諧調者若出金石此世之所謂聲色而人人之甚欲者不知甚欲必有甚惡故曰狂夫樂焉智士哀焉然則聲色之寄於俄然漠然之物而無其甚欲甚惡之累不為樂之至也哉今夫江之聲實以潮鳴乎天下其疾而來也如風雨其突怒如雷霆其却而逺也如松風笙鶴人不以為聲而為聲之至也月之與潮相得而勝也其動如銀汞其起如金城其鋪而平也如積雪千里人不以為色而為色之絶也兹非悟其妙之㣲殆未可與耳遇目觸者同日道也吾留呉下乆不見江月雄觀秋且分矣業将與生買舟大泖口泝呉江抵海門夜泊湘南據胡床樓上以㰖有樓之竒觀曰聲曰色探天地之大秘藏也則凡天籟之有聲皆吾韶鈞天文地象之有色皆吾之西子南威也嗚呼樓之聲色若是取之無竭用之無禁而嗜之無荒是真樓之大秘藏而爾祖之樂以終其身而且以遺爾子孫傳世之玩於無窮期者乎生歸試誦吾言於父兄間爾祖有靈必以予言為信舒嘯臺記雲間謝仲允氏甥舘在石湖之隂館之左个植花木為蘌治園堂其中命之曰舒嘯名客至允必延致於是今年春嘗觴予軒所酒酣為予作蘇門之音且以志請按説文嘯者蹙口成聲也古詩人以嘯與歌並言則知嘯亦蹙口之歌耳不無五音之協五音協則金石絲竹可被時允出名姬童鸞者佐酒吾将以玉笛尋其聲座客擬馬相如為樂府命之曰紫鸞囬然采其音付童鸞歌之以備晋成氏子嘯賦之闕也雖然吾聞宫為君商為臣角為民宫荒則君驕商陂則宫壊角亂則其民怨嘯協於宫使予聞之温舒而廣大協於商於角使予聞之方正而好義惻隐而好仁吁此允之心聲也不知代之君驕宫壊而民怨也苐未知聞蘇門鸞鳯者亦有是否人不知其心聲之得則又烏知其嘯之舒者闓敞和平不媿晋處士者耶抑予聞劉越石在晋陽清嘯塞騎聞之悽然而退嘯之感人者又如是今西北之冦閉塞闗梁允能以越石之嘯慷慨激烈者使風雲動揺煙塵倅起又孰畏乎闗梁之孽哉允勿靳是擬相如者又當作為出塞入塞以繼短簫鐃之曲也嘯之舒哉不亦韙哉讀書堆記予入淞首慕顧野王讀書堆者在亭林蒼翠間未果往也上海釋慧自稱野王氏后介其師去東老人來請曰居之在介闢室蓄古今書數千百卷貽其嗣達妙襲名於讀書堆敢丐一言以記記未及今年予逰鶴沙順流下黄龍江抵滄海觀濤泊舟古精藍下主僧出肅客廼慧也見其二子即妙達也夜分張燈叙舊話遂為援筆誌書堆夫書之能藏者不難能讀者難能讀者不難能用者難也書藏而不讀與無書等讀而不用與不讀等張茂先藏書至世乘而茂不善厥終李贊華載書數萬巻亦無捄於僇身非有書而不善讀讀而不善用者與代之衣冠家有積書如秘府至再世三世懵與書隔甚至售為聲伎資吁可悼也已若慧之書堆髙潔亭林磨水火而堆不燬經兵革而堆不遷使達也妙也又能翺翔於堆窮探力取以為脩業地非書之善藏而有善讀者歟苐未知達與妙之善讀讀之善用者何如耳宋聪道師善讀書一覽即掛書梁上人叩則曰書貴行復何讀此方外士讀書法也惟二子以之至正二年夏四月廿六日夣蝶軒記有客三人者過夣外夣道人談夣一客曰吾夣為𤣥駒一客曰吾夣為蜩唐一客曰吾不夣達魔而為達魔者所以夣起自歌曰巴中老人蠧仙橘化為達魔無處覔隨風一夜到漆園鬼入南華鬼無迹蜩唐者亦歌曰腹育出尸出宫桂風為食芳露為飲月令老翁候我占識候能鳴復能瘖𤣥駒者亦歌曰大槐王臺臺九沓充州一怒成烏合有時東海去觀鼇焉能死我鯪鯪甲道人曰夣𤣥駒者志富貴者也不知縁几登釜尋人飲食而有焚如之慘富貴何在哉夣蜩唐者志清髙者也不知吉羗執翳而搏其後黄鵲又從而利之使漆園文人捐彈而返走清髙何在哉惟達魔夣我者亦不知我之夣達魔則志與物化與物忘彼我殆與造化㳺與大道㝠者也古之人得之者惟南華真人也予弟子文璧氏持縹文冊來曰此某夣蝶軒集也請先生一語遂書此以遺之夣外夣道人者㑹稽楊維禎也真仁堂記雲間陸和伯自其先公某五世為良醫其藥區為真仁之堂未得儒先生之言以記和伯因予友吕輔之氏見且請記夫仁一惻隐之良心出於天而素無偽者也然世之行仁者則有誠不誠辨也梁惠王移民移粟非不仁而其心在於闢土地則非饑民為也宋襄公不禽二毛非不仁而其志在於求諸侯則非老人為也若是而言仁君子謂之偽可也仁之誠者必若禹稷湯武而後可禹視人溺如已溺稷視人饑如已饑湯不忍人之塗炭武不忍四海之荼毒此誠於仁者也吁此聖人達而在上事也和伯不仕者也不有顔子之仁乎顔子願得明王而輔相之其曰願無伐善無施勞此顔子之仁未達禹稷也故孟子曰禹稷顔子易地則皆然陸氏世隐於醫而其仁之真積者當厚矣使繼之者有一念之偽則豈得為真仁也哉和伯學岐黄之外習吾聖人書能充之以顔子之學善無伐則善無偽矣勞無施則勞無偽矣無偽而仁有以同乎天下矣老人之老無以異乎吾之老㓜人之㓜無以異乎吾之㓜備萬物於吾身無以異乎吾之同胞兄弟也吁其為人也誠矣至矣雲間之疲癃殘疾困而無告於人者尚有出於陸氏之仁之外歟夫子語顔淵曰天下與仁吾亦将屬和伯云書諸室為記海峰亭記吾鐵門有貞秀生者其為人爽朗有竒氣𤣥格髙情恒在物外每登髙逺眺若見東方生所稱三神山歴歴在眼底築亭鳯洲上名之曰海峰余逰海巫山生邀過鳯洲登其亭與之談仙家乆視事因以記請按東方朔書謂海之東有三神山曰蓬萊方丈瀛洲周廽五十里隔弱水三萬里非蜚仙不能到審是則三山不惟不可到亦非世眼所能覿也錢惟演賦逺山詩有秀出海三峰之句亦想像而賦之耳惟演不能有諸目貞秀顧欲有諸亭亭果有海峰乎無也秀曰吾得海外三峰竒觀於眼之所無者求於神而不求於迹也此非道與神合心與化并者不能得之得之則海峰不在海而在吾亭不在吾亭而在吾方寸藏宻之地耳奚知有三萬弱水之隔哉予韙其言而録之座客有謌海峰之謡而被之琴者歌曰神峰在何處云在東海虛下負六鰲首上托羣仙居世人尋地脉弱水墊輕羽平聲髙人坐燕上天㳺以蜚車揮斥九清表飄然隘中區咲呼一蓬粒貯在壺公壺并録為記生名沐姓錢氏自號瓊臺仙吏云静學齋記呉人張氏性之以岐黄氏之術為學而東陽桞先生扁其燕處之齋為静學閲三年目予宗伯振君求余文為記予叩静之説於岐黄氏之書性之曰為懼懼無為欣欣婉然從物與時偕行譚而不治是謂至治非静無以得之也予曰此非君子之静學也諸葛武侯之言非静無以致逺又曰躁不能以理性此静學㫖也静句躁君也性之其有意於理性舍躁之君治之以何哉性無有不善理之則從亂之則凶性從必生性惡必殃自然理也性之以岐黄氏之術務於生人静學之地其必有得生之本者歟本得則道無不生矣雖然抑吾又有進於是者人生而静天之性也静之之初不容説也愚者昧之聖人復之為大道之宗萬物之本也非虛無之境寂滅之鄉窈窈㝠㝠之物也感而通之静之㣲也動之機也嘻使静而不機動也奚以資生動而不根静也奚以資始老氏之言歸根曰静是謂復命盖與吾言性者近矣性之既知静學以理之復知静根以機之黄老氏養生之道尚有大於是者乎唯遂書諸齋以為張氏静學志至正七年冬十月初吉記㳺菴記古者四民各有所處士處閒燕工處官府商處市井農處田野毋使雜居見異物而遷焉此四民之居有定止而業有顓能也後代民始有出於四業之外者則曰㳺民㳺民不得容於先王之世而後世縱焉此四民之有専能者寡矣予方唶於是而客有以㳺菴為名且徴文於予者曰劉子輿民也子輿以居無定止而名菴曰㳺其子輿之不幸不生於先王之世乎抑幸而不生於先王之世得不専四民之業而由於㳺也子輿氏好學之士也以㳺自由而不得比於先王之民是棄人也烏得為士乎子輿之㳺㳺其居未嘗㳺其業也盖子輿㓜時侍大父居某所長而侍父居某所親殁而廬灾今又徙秀之廣陳所未知老而歸也迄於何所望望乎如浮屠人之寄四方仲尼固曰東西南北之人也此㳺菴説也嗚呼戚施直鎛蘧蒢䝉璆侏儒扶盧矇瞍脩聲聾曠司火古者疾人猶不致於㳺而且為官師所材而職其能若是子輿氏鍾羙天質懐抱利器而又敏於問學其官師之所不裁者乎其不得比夫先代之㳺民而棄之也諗矣惜吾位下官弗遑稱似其人也故重言之五湖宅記海虞繆仲素新治鉅艦列几格置琴書其中筆床茶竈相左右容客可數十人時時遨湖海間且命其名曰五湖宅吾嘗與之讌是宅於具區之上仲素将觴有請曰吾宅五湖倐東忽西動而未嘗動止而未嘗止實𤣥真子之隣也曽不知世間有百萬買宅之宅先生既止予宅得無言乎予咲曰異哉子之宅其宅也今夫一畆之宫一區之宅必相隂陽度原隰未聞卜水吾因子宅有感矣王侯邸第之相甲也其穹焉如天深焉如海食客數千百指粉黛之人填樓而牣閣風雨不動安若泰山自謂享於身傳及於後之人無窮也而近不十年二十年逺不二世三世宅已姓於他矣豈若子之宅若動而能静若危而能安若邇而能逺而且免傅舍之累也哉然物莫大於宇宙而尤莫大於心善論心者謂之寸宅拓寸而大天地不能容太虛吾室也八荒吾庭也日月吾扄牖也視子之宅五湖一粟而已耳子之四海一漚而已耳能由五湖以卒返斯宅也居其居如鈞天廣居下睇地間渠渠夏屋真殻哉况湖之一粟乎仲素憮然若有所得釃酒臨風起而自歌曰水之國兮秋秋水之宅兮浮浮招𤣥真以友兮鴟夷之與逰又歌曰太虛兮吾序八荒兮吾隅居丹臺之廣居兮吾不知宅之所如併録為記書題附書烏巴實侯徳政記後契世則以所著烏侯梅前州政績碑示余中叙禦畬冦一事尤詳余未識烏侯而世則之文可徴也因憮然嘆曰自罷侯置守而吏之識守土義者尠矣古者諸侯分土受之於君傳之於祖國存與存國亡與亡郡縣一裂吏卒三嵗一易疆場有變輙望風引去間有與城社共存亡者非出於其人之天性則學問之力也烏侯奉天子命守梅城數千里外衆委敲而奔而侯獨誓與城社共存亡外攘虎狼卒完其竟往來羅李二冦弄兵南徼至動三省兵禽獮草薙而後已使守汀漳吏有烏侯者在焉則又何致狼藉城保為吾民荼毒哉子思居武城有越冦至盖去諸子思曰伋去君誰與守烏侯能為子思之所為其亦有得於學問者不誣矣推此節也為畫邑之蠋睢陽之張平原之顔扶竪世教以利國家者固同一義也烏乎烏侯之志節其可畏已哉文士頌其績衆矣而守土之義未有發焉余故特發之至正十年六月廿日書書錢氏世科記後爵位之襌有延於數世者而文藝之傳及三葉者寡矣豈非爵位固本於世澤而文藝之濟羙尤得於世徳之至難者乎通川錢氏在宋淳熈迄於咸淳四世以經學領鄉薦者若干人擢春官第者二人世科之盛猶未艾也而又有經學領延祐丁巳之薦於是入本朝且五十年矣錢氏之澤何其長也歟吾聞其鄉人俞日華氏曰錢氏之先曰聲逺公曰景髙公者皆能當冦盗時守衛其鄉又力城通川民免渡江避兵之患其鄉民到於今思之嗚呼此固錢氏之世徳歟有世徳者子孫必顯理之常也雖然今觀世之顯子孫顯以貴富不知務徳而蓄於身以及其家者多矣則固不若子孫之文且賢為顯為可乆也此余讀錢氏世科記而慕之又為之著其說云書負蝂傳後可繼隼鷄録縞凰議作一類余讀桞子厚負蝂傳而未見其人及讀元魏志胡太后幸絹藏從者百餘人使人各稱力取之尚書令李崇章王融負之過重顛仆於地崇傷腰融損足太后奪其負使空去若崇融二子非魏之負蝂也耶若胡后者盖愚弄兩蝂虫豈非桞傳之明證哉予在睦見金倉氏破睦有李淵郁者首入睦庫腰負白金若干錠過重交道上屢仆不能起人知其負也遂砍腰􅟃其負去吁若李氏者又桞傳之大癡蝂者與東維子集巻二十一欽定四庫全書東維子集巻二十二元楊維楨撰志讀書齋

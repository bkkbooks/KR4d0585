body:
  text: 中定齋記道至於中而定耳一越乎中譬之衡也首尾軒輊豈有定則乎道不適乎定則為仁兼愛也為義為我也為直證父也為廉離母也為敬召君也為公賣友也為不疑焚妻食子也其害道可勝言哉堯以天下傳之舜無佗言中之執而已舜之治天下也用是中而已然子莫亦執中也子莫執而無權是中而不知適乎定則者也故聖人立中之教曰君子而時中使人用中之有權度也雖然權度未易精也權度未精中固未可定也精之何如宻於惟危惟㣲而安於無思無為萬物之紛起紛伏於前者不逃吾掌指而與之釋然於兩忘之間此吾權度之至也若是雖乾坤之開闔古今之徃來亦不越吾一定之内耳矧萬物乎姑胥申屠生衡予既字曰權而又名其治業之齋曰中定衡遂始志齋故為志如此約禮齋記呉興蒋生毅予既名其讀書之齋曰約禮生遂有請曰願先生賜一言書諸室以警教也志之曰聖人之道其髙如天其浩如海泛而求之穹焉莫知其所即蕩焉莫知其所之至於老死而不得者以無繩尺為之約也禮者所以為之繩尺之所也此聖人以道教人而必正以禮所以約其歸也聖人之道髙且浩者若無紀極至約於禮則有極矣老莊氏善以閎濶之言言大道而聖人之徒無取焉形道太髙而絶禮太甚也聖門弟子稱顔子始焉求聖人之道仰之則彌髙鑚之則彌堅瞻之在前又忽焉在後已如有所立卓爾者竟以約禮得之學顔子之學以求聖人之道是在生也生勉之學詩齋記呉興陳生魯從余於雲間學經業且曰某不敏未敢學先生之春秋而詩者實與春秋相表裏也願先生學詩而復及於春秋也且名肄業所曰學詩齋請記一言以自勗孔子曰詩可以興可以觀可以羣可以怨之數者豈泥於章句文辭之末者所能得哉孟子論説詩者不以文害辭不以辭害意而以意逆志是為得之此孟子之善學詩也又曰詩亡然後春秋作盖孔子録夷王懿王之詩迄於陳靈之事而三綱五常有不忍言者矣故詩亡春秋作夫學詩者誠未得於詩又烏能得於春秋也哉士學詩於千百世下亦有理哉雖然食魚而味者不知有熊掌食熊掌而味者不知有魚夫人莫不飲食而知味者鮮矣故善學詩者不知有春秋善學春秋者不知有詩非謂二學不相通也學經貴乎為學之專也生於詩知食矣食而飽矣而味不知則謂之善學詩不可也孔子固疾夫學詩而無知味之得者矣其曰誦詩三百授之以政不達雖多亦奚以為生以予言勉之他日授之政也雖蠻貊之邦行矣奚徃而不達哉鈍齋記霅城之内有家塾為經鋤而世以詩禮傳家者為倪用宣氏即其居之西偏顔之曰鈍齋者則用宣燕處之室也用宣之太父富陽公予之舉主用宣視予猶叔也遂以鈍齋請志於予且曰某不幸早孤稍長即承門廕役於筦庫之賤者三年志不獲伸而養廢於親學廢於身一旦勇自棄去歸讀舊書以待吾豆觴母氏欲為世之趨走縣簿站站焉效鷹犬之役以圖躁競之進者吾不能已故名齋曰鈍云余疑用宣出紈綺家春秋鼎茂宦軔之發如舟縱下水鴻迅順風而遽以鈍自止豈其情也哉惟其豐於用而局於地至於寵辱不驚遲速不較此非其學力之素則天資之特也余悼世之士峩弁髙足於連嶁列埒之間尋岐闖竇病於隴斷將一以捷于進也不知足一􅀈則沒䧟穽卒不免為人僇其捷何在哉囬眎鈍齋之鈍優㳺於水之陽山之北上有垂白之親下有舞褓之僮外有賢師良黨之交際樂其樂而不知世有崇髙權貴炎冷榮悴之一去一來者其相越豈不霄壤哉用宣之師為張安國氏友為康伯齡氏以其獨到之資加之以師友之學用宣之光其先而載德乎其後者不可量已外物之一利一鈍又烏足以計吾短長也哉則齋記呉興趙生名柯字仲則又自號其讀書之室曰則齋生以大父府判公與予同仕于台而其外舅府推呉叔巽氏又子之舉主也遂以則齋求説於予予惟生之則取義於伐柯之詩中庸嘗取是詩以證道之未嘗逺乎人也夫求柯於木其柯之則在此柯矣人猶惑於彼此睨而視之以為逺也治人之道於已取之未嘗逺也以為逺者何異睨之為惑者哉聖如孔子而曰君子之道四丘未能一焉故其治已也以求乎人者反於吾身而已生能以孔子之自謂未能者不敢不勉則其在是矣傳曰能為人則不為人下君子之欲上乎民者無是則其可乎故推是則於身也則容止可觀進退可度矣推是則於民也則畏而愛之則而象之矣故曰君子動而世為天下道行而世為天下法言而世為天下則於乎此則之極功而學之能事也生以是則勉之哉至正十年冬十月二十有五日記月山記月有山乎佛氏謂月中之景大地山河謂之月有山可也山有月乎趙知㣲登天柱峰得月於隂脢之秋謂之山有月可也夫月者水之精山者石之積也水與石不相入而未嘗不相入也此彦明氏得月之山以為物之竒會也彦明昔為開化縣得此於金錢溪上孤峰突起如一弁今之顛有白章若月之弦者彦明喜之若獲拱璧曰溪名金錢而溪之神不以錢凂我而以此月之山吾烏得不拜神休以為竒也遂名之曰月山且繪為圖出以示予請月山記余咲曰此月山之假耳圖益假余何記吾將與子梯九節杖挾飛仙以遊於廣寒之宫以俯攬乎海内外之名山又將東上岱峰萬仞之頂看黄玉輪出九地底此全山之象全月之眞恍乎惚乎得諸泰初之鄰庸衆人之烏覩者也子能從之乎彦明曰吾不能吾已得之月山之月云至正十年十一月三日記小瀛洲記神仙之説八方有鉅海鉅海中有仙洲十瀛洲其一也漢武帝嘗延東方朔曲室問十洲所在及方物之名謂瀛洲在東大海中地方四千里上生神芝玉石山髙千丈出泉如酒名玉醴泉飲之令人長生洲上皆仙家其山川風俗似呉中然其所也可聞不可到也故秦王開舘選天下學士其中地位髙而人物勝天下比之登瀛洲云呉興禇壽之之居有水木花石之勝名其堂曰小瀛洲壽之宴於堂上以記請非徒以山川風俗似瀛洲也以其前之人有居瀛洲十八士之列也壽之之先出瀛洲學士亮亮子遂良居杭其後有從湖之南潯朱塢庄者遂為湖州人壽之盖瀛洲學士若干世之孫也壽之伯仲凢四人子姪凢十餘人自五世祖淮安縣丞繇科苐起身代以詩禮傳家壽之先府君棄仕侍親壽之伯仲皆有仕才而不仕其學而仕而都清髙之地以繼登瀛之榮號者不在諸子乎余又喜諸子皆聰爽善學問諸父益輕金重名師之聘師有不憚千里而至者吾知禇氏子孫光繼祖亮者的的有人今日居小瀛不為異日登大瀛之階乎問其所者又何必指神芝醴泉白玉之山乎而况山川風俗之美類呉中者不在他此也書諸堂為志至正十年冬十一月序愛日軒記予讀揚子書至孝子愛日未嘗不掩巻為嘆嗟夫孝天誠之出也惟其自知日不足者吾知孝子之天之誠也至矣吁樹欲静而風不寧子欲養而親不待此孝子愛日有不能自己非有使而然也故曰孝天誠之出也愛日誠之至也錢唐市中有金孝子鑑者築室于舎之南以養其親顔之曰愛日取揚子語也嘻金孝子之養親殆出於天之誠之至也朝於斯而省焉夕於斯而定焉出於斯而告反於斯而面焉至於問所欲推所與承所欲以行無不一於是孶孶養親惟見其日不足也謂金孝子天誠之至非歟吁愛日之書盖孝子天誠之托也昔者仲由賤食藜藿躬負米百里於親在之時其後累䄄坐列鼎食而悼其親之弗及也嘻是有愛日之誠而不能俟乎貴富以為養者也狄仁傑親在河陽登太行見白雲孤飛以為吾親舎其下而瞻望弗及嘻是有愛日之誠而有不能恒在膝下以為養者也金孝子者家有奉親之資又不肯輕仕以一日去其親盖不俟乎後時之貴富不在逺方之咨嗟而悼恨者也嘻金孝子之養親豈非人子之大幸而能乎季路仁傑之所不能使愛日之誠始終無怠如大舜之慕其親者吾為紀兹軒於後子孫耳後子孫皆以爾孝子之心為心是孝子一行純推為一家之政又使天下人聞其風而興起焉孝子之感於人而動以天者不可勝用金孝子之行為世教之係者又豈小補哉魏生本信持其巻來於是乎書為金孝子愛日軒記修齊堂記吾州諸暨有東西施家西家之秀鍾於苧羅美人而東家無聞焉至宋始為施宗聖者學行尊於里閈人稱為東丘先生東丘之後有鍔者紹興中進中興雅頌子姓繇東而西多隐處呉門吾入呉得諸閶闗之外為仁傑氏其先盖自越來者殆吾邑東丘之後已乎吾初未識仁傑氏呉中學子張守中年十四稱竒童能夜誦經史書數千百言日課大經義騷賦表章若干首貴官女及里中多田翁争壻張氏子而獨為仁傑氏所先可以識其人矣仁傑嘗招致余於所居堂顧其題顔曰修齊吳興趙魏公之所書也因擎觴拜以請記余視閶闗之居皆貨財之亭而其人皆五方商賈之伍也日出而蚤營日入而未息所與言者皆錐刀之末乾沒之計也與之語身修則曰衣被文繡耳與之語家齊則曰峻宇雕墻耳烏知吾聖賢大學之道哉而仁傑乃獨㧞乎流俗以大學之學自律仁傑盖古之椎魯長者也素孝友於家孟子推大學之教曰國之本在家家之本在身是知一身修一家斯齊矣一家齊一鄉斯善矣逺而推之千里之治廣而充之四海之均不過一修齊而已耳大學之言曰一家仁一國興仁一家讓一國興讓感應之機其捷固如此修齊之化行又豈獨善一身齊一家而已哉吾聞呉俗多好内而外尚勇有逞匹夫之鬬而殘厥軀惑於兒婦之舌而亂厥家者聞施氏之風豈不有愧哉施氏之化行則吾之記斯堂庻不為空言也矣至正十年十二月十日記南樓記信都呉公僑居呉興築樓岸霅水北枕蒼弁金盖玉几諸山拱在離嚮因命樓曰南且以自號置書萬巻樓上一時名士考經斷史及東南民事必客是樓余亦在客數而徴記於余余謂南樓在武昌於晉庾亮氏代之貴家富室髙甍峻宇偭陽而樓庋玉帛栖歌舞以都山川風物之勝者以萬萬數而亮後無名焉越數百年而呉公之名于呉興者繼之豈非樓倚於地之靈而地又倚於人之傑也耶雖然亮非人傑也亮本莊老氏學善清談之士也識闇才短徒以周公親受重顧四海惻心奸臣肆志非頼二三方岳則未度之國幾至大弊末路之窮至欲竄山遁海不獲已為蕪湖之出武昌之駐其在武昌也未聞有所經畧顧欲任猜忌黜大臣諸左吏皆東閣之物又未聞雄特其中月色横陳秋思不淺南樓之登徒與浩軰談詠光景曽無禆於中州多故越雷池一歩也其才不足與有為如此今公以方之學相家之英既出而為天子耳目剟除奸惡登進忠良遭呉䘮乱又出而身任城社之重而樓與門客寮友之所講白者皆經國之道宏濟時艱之策也今日之呉興豈與昔日武昌同一秋月哉吁秋月無古今而人物有古今庸詎知夫今人之不優於古也耶登兹樓者攬山川人物之勝又安知無善賦大夫飲酒山川之神以述大業頌隆功以鄙浩軰之所談詠光景者哉書諸樓為記公名鈞字元播平章冀國公之季子御史中丞南忩公之仲氏云至正十三年夏五月記生春堂記嘉禾謝玉淵氏名其燕處之堂曰生春取靈運西堂詩句也京兆杜伯原父既為作小篆書之而又徴記於予予嘗過其家必醼予堂之上講春秋經學嘗扣玉淵曰聖人以春一言加王正之上者非史氏文也春秋苐一義也傳經者盧周正非春則曰夏時冠周月吁寅正始春人所知也又豈知子正為春之生之始乎論三統者以十一月乾之初九陽伏於地故黄鍾為天統春之所由以生而為萬物開闢之端也使聖人假寅正於子月是天時懸隔於王正者常兩月也何以示信於人乎生春之義莫深於春秋又豈汝家容兒吟弄草木者所能知乎玉淵避席曰謹受教予曰未也吾聞幽有谷也壤美而苦寒五榖不生百草不殖工律者一吹而春氣應草木生人之相天時有如此者今深山窮谷豈無固隂沍寒歷春氣而不毛雖太陽仰煦而有不能及者使律氣均應不毛者皆生生而不已君豈無術乎即生春者推之物有被其賜者矣毋徒資之夢寐之間為吟哦之具而止也玉淵崇酒携觴鞠􅀈而謝曰某不敏不惟受生春教且受春秋教也至正十三年秋七月十八日記尚志齋記余讀陳勝傳未嘗不嘆士非志不立勝以燕雀待傭儕自待其志為鴻鵠勝之志在富貴後亦訖不誣吁勝人奴耳矧不為勝者乎聖門弟子如顔淵曽㸃季路公西華聖人必以志發之諸子之志無大於顔子顔子願得明王輔相之故其善適天下而無所伐勞過天下而無所施若顔子者所謂大人君子之志非歟孟子曰士尚志尚如尚服尚車之尚盖尊而主之之辭然尚一也而志有不同不可以辨不也崑山吕子正氏名其燕處之齋曰尚志盖其友張希顔來謁記予謂子尚易也苐未知子志安在子正曰中也學於聖門者徒切有志焉在季路氏之聞也顔何敢哉子謂之喟然曰予之志不鄙矣推是以徃不為顔子也吾不信也顔子未達陋巷之人耳使達也則春秋之伊尹也學顔子學志伊尹志吾不以朢子正其誰朢子正年方踰冠而好學不倦事承父以行其志未著也而所尚已如此異時秉志以奮吾知其無能禦者矣書齋為記至正八年夏六月記藍田山三一精舎記藍田山三一精舎者桐廬姚傑氏之所創也山去桐江北三十里北負鍾阜與周顒氏隐地伊邇其間香爐峭壁紫烟瀑布如白蜿蜒掉尾雲際西見天日南見烏龍冠停盖佇江水帶其下如玉虹在地繚山而去此藍田形勝之會也宜有仙人逸士之所都而傑以三一精舎據其會剏於至正甲午落成於明年予過桐江欲抵其所而未遑傑乃圖山水狀及其營造嵗月介予徒章木求言以為記予詰三一則曰三者孔老釋也一者道之歸也其位置中聖人尊以文昌之殿釋左之老右之予疑三一者既推尊孔氏而孔氏之左右不無徒焉何取老釋耶則又曰道之大者莫如吾聖人其岐而去者為老為釋吾將約其岐而歸之大而正者此傑意也近代縉紳大家廟制不講旁營三教之堂且以孔老翼瞿曇之尊其侮聖教大矣傑也廼於吾道陵夷之際挈而尊之彼二氏者若在弟子之列化異端歸皇極使皆知有君臣父子之倫禮樂刑政之教民之秀而出者不沒溺於虚無寂滅之歸豈非傑之用心宏而推化者廣也故予樂為之書使詔諸里以垂諸後人不終為異端如周顒氏之惑也世教之補渠曰小哉公名傑字君用裔出唐之少監今年八十耳目精明結廬於雙栢間以文酒自娯其天年學者尊為栢庭老人其養徒之田世入主奉者凡若干畆砧籍見碑隂云松月軒記呉興東去若干里其聚為南潯禇氏樂閒君之世家在焉至正甲午先廬遭兵燬其子質字彦之重剏别業朱塢溪上蒼松夾徑數百植林下石床雲磴廕以重軒時焚香讀易其下月夕則鼓琴或歌騷或與客嘯傲賦詩仰聽虚籟俯席凉影儼若物外境也遂即松月扁其軒不逺二百里走雲間請記於予予交其父兄㡬二十年彦拜予為父行予視之異姓姪義不可以老懶辭夫蟠根錯節貌風霜心鉄石閱嵗寒而不與衆草樹同腐者松之操也乾坤一氣之清鍾為太隂麗虖天而與日代明以成七政之功者月之徳也彦取託於松月松月不在松月而在吾一氣之剛方寸之明矣爾祖瀛洲學士遂良任顧命之重當逆牝萌亂之時不以萬死懼抗顔而極諌厥忠盛矣彦為其雲耳音仍甲午諸兄罹不測之禍彦捐軀歷險誓不與共天必復其讎而後已遂良稱忠彦氏稱孝嘻人之行莫大於忠與孝也使彦立人之朝當大任必能操大節又何沗爾祖哉吾所望於彦者在此其託物於剛與明者於松月見之豈果騷人墨客玩弄草木者比哉彦作而謝曰某雖不敏敢畔先生之教請書諸軒以為記龍集己酉秋七月初吉書竹月軒記詩人以月配竹者自六朝無聞焉李謫仙有何處我思君天台緑蘿月月寄於夢而不在竹也六一翁有顔侵風霜色病過桃李月月寄於桃李而不在竹也老杜竹送清溪月月又兼以溪言也惟老坡明月浸踈竹始專於竹然坡得此景於方外之虛寂堂耳而未見於士大夫之家見於士大夫之家吾今得於雲間義門夏公子益中之軒予嘗夜宿其軒少焉月出竹頂益中坐客其下仰見玉立數十挺喬秀踈朗若空谷佳人將儔挈侣訪主於虚庭蹁躚盤礴不忍去而不知清夜之徂也已而主客相與酌酒盡醉脱巾掛踈枝或鼓琴或吹匏擊石與玉立君鏘璆相舂應籟繇於天而景㪚在地鈞韶鳴而龍鸞舞也是時主客頹然就臥忽不自知其身世在白玉闕中軟紅塵裡也席上客遂各賦詩明日連書諸軒主者因以竹月名軒而推余為竹月志益中青年而才氣甚老尊師樂友化勢利之俗為禮義之郷無沗奕葉義門之後故樂為之書東維子集巻十四欽定四庫全書東維子集卷十五元楊維楨撰

front:
  text: 齋記浮屠氏嘗有内觀之偈矣其所謂内觀者役心以觀心有其説者遂謂以聰聽者聾収以氣聽則嘿而有雷霆以明視者瞽及以神視則瞑而有嵩華皆畔吾心學者也儒先生闕之儒先生所謂内觀盖聖人示人以自檢之㡬也故其教法施諸弟子者徃徃發是㡬使之返照返照而後有以自悟其所學謂之内觀之教子使漆雕開仕問子貢與囬也孰愈以從我於海屬子路皆發之以内觀而使悟其所自得者何如也至於顔子曽子則得於内觀者大矣曽子之言曰吾日三省吾身孟子推之為守約他日竟以魯得聖人之道者此曽子内觀之大者也顔子之言謂瞻前忽後而獨有見其所立卓爾子貢推之為聞一知十曽子亦指之若無若虚他日意以遇而得夫子之道者此顔子内觀之大者也學子吕恂以内觀名齋而請記於予故予示之以聖人之教要之以顔曽之學而戒之以浮屠氏之説云

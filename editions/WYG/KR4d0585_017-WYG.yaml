body:
  text: 記小桃源記淞隠君陳衡父氏世家在泖環之西既遺其子東西第又為園池東西地間仍治屋廬其中名其堂曰清暉樓曰明逺而又額其亭曰小桃源也予嘗抵桃源所所清絶如在壺天四時花木晏温常如二三月時殆不似人間世也隠君且舉酒屬余以記請余聞天下稱桃源在人間世者武陵也天台也而伏翼之西又以小云據傳者言則武陵有父子無君臣天台有夫婦無父子也方外士好引其事以為髙而不可以入於中國聖人之訓矧其象也暫敞亟閟其接也陽示而隂諱之使人想之如恍惚幻夢不能倚信雖曰樂土若樂彼吾何取乎哉若小桃源之在隠君所也非物引諸八荒之外入有親以職吾孝也出有子弟以職吾慈友也交有朋儕戚黨以職吾任與婣也子孫之出仕於時者又有君臣之義以職吾忠與愛也桃源若是豈傳所述武陵天台者可較賢劣哉然而必以桃源名者張留侯非不知赤松氏之恍忽也而其言曰吾将棄人間事從之遊知之者以為假之而去也隠君亦将假之云耳隠君齒既暮而老將休矣桃源其休之所寄乎而猶以小云如伏翼者小寄云耳固不能絶俗大去已或曰淞俗信仙鬼貴富家有駕海航翼風一引至殊島見瑶池母東方生乞千嵗果啖之而隠君弗能從此小桃源之名於淞也併書為記松室記松江朱子肎於其先廬之左治讀書之室環植以松故命室曰松今且寄居於東山氏之西廡而未見偃盖之植也則命畫史圖居之松以謁予泖上曰此其之所謂松室而讀書誦詩於其下者也願有記焉雖吾逺去其鄉得展圖􅄃記將不悼其身不在松之室也予詰子肎誠何取於松豈子受性也獨正抑有心也貫四時而不改厥撫乎将森森千丈施之明堂大厦有棟梁之材也抑産茯苓結􅂕實辟百榖而食之可以飛行如偓佺之倫乎將異時托之洒掃使家之人識其指之在也抑要乆嵗月精與化通為青蛇為赤龜以怪駭人間世乎子肎曰余孔子徒也非仙釋之流予絃誦於松室之下知聖言有松之為嵗寒物也如其心而不改柯易葉也吾烏知其他雖然余幸而生文明之代知學孔氏學而切有得於誦余之立志豈不欲淑諸人而逹天下也故嘗夢松焉吾十八年其抑將為公也邪予筭子肎明年為六十人更十八寒暑為太公望之齡夢松協於夢熊則吾將迎子於海之濵江之上矣子肎莞爾曰吾與其為十八公吾寧為主人七松至正九年十月一日記夏氏清潤堂記雲間義門夏景淵氏居同邑吕公之甥舘其舘之中奥曰清潤葢取晉人名樂衛翁壻語也予與景淵為昆弟交既得翰林學士泰野公書其額而遂求誌之文於予予惟物之清莫踰於水詩人曰清如玉壺氷是也器之潤莫踰於玉傳者曰温而澤是也故皆得以比徳君子也當典午氏之世行者方以放濁為通居者專以楊寂為記究求時君子比徳於氷之清玉之潤者鮮矣評者以樂衛當之吾嘗探其人焉誤晉天下者多清談之治術而廣與王夷甫為清談首位極於台揆竟以殞瑩然氷鏡之照人者吾不知其與澄胡母輔之軰相隔幾何衛叔寳自㓜羙風神見者以為玉人中興名士推為第一而卒無捄於名教之敗至於徙家而南再獲羙妃終夭厥生玉振江表比於金聲中朝者王輔嗣同一寂寂吾又不知永嘉之未曰正始音者何取正始哉二子之不能不愧徳於氷玉者類此吾客吕公仲氏家親識吕公之為人髙居潔已行無瑕類不與惡人交不與狎士㳺侍其坐朗然明月之照席也可謂善清也已景淵天質純雅有大器量而不茍於小仕與之交昭昭然若飲醇酎可謂能潤也已以廣玠之所名名厥居廣玠忝於時評而景淵氏之翁婿豈有醜也哉雖然清莫清於不自掩其疾潤莫潤於及物之大氷之出壑潤徹中表而瑕不自匿此其清之至也玉之在山土石草木皆䝉清輝此其潤之大也吕公之清吾知其至矣景淵氏之潤更以其物之大者推焉則光映清門於𢎞且速者非義門之傍澤歟景淵氏曰善敢不勉諸請録諸堂為記賓月軒記吕輔公之長子名恒字徳常其燕處一室在居之西偏名之曰賔月嘗觴於其所遂以記請余讀堯書命羲仲之文曰寅賔出日又曰寅餞納日以賔餞之禮禮日者謹昏旦之候未聞以月然在帝文告厯日月而迎送之則月亦在所賔矣吁此厯家説也非吾逹士之所賔也吾逹士所賔自眺蟾主人賔於景祀之上月固未受其賔也而况黄星小兒欲窺於南鵲之枝乎况苔閣塵榭欲以脂粉徼之乎又况霓裳之聲𢃄鼙鼓而欲假仙逰以即之乎是皆賔之以為主也惟庾武昌之據床劉晉陽之清嘯李騎鯨之舉杯相屬杜少陵之戀戀貂裘粗賔主之一遇耳嘻賔常有也而主不常有兹數人之後何其遇之濶如也五百餘年而賔主之交始得於徳常氏可以見遇合之難矣吾愛徳常人品光霽尤愛其為量靚深時吐章句流麗娟好吾知月之愛徳常而適以為主無疑也或有嘲曰徳常賔月月主徳常主無異情矣而賔也有雲雨之翻覆圓缺之差池奈何徳常曰爾何窺於賔主之淺也先天不稚後天不老者非全月歟而吾神未嘗不與之俱求吾賔者以神不以形以形賔在賔主在主以神則吾葢不知賔之在月而主在吾矣尚何以主客異邪或者曰然書諸軒為記春水船記滄水主人壯年桴於海晚家居結樓滄之上篷然若舟海水時抵家下放目樓上百萬頃人眠其篷然者一􅓗耳因命曰春水船主人􅂷釣于枕濯足于床酒甘輙笑歌其上家僮數十善為越人擁楫之歌主人又自歌小海為舉足扣舷以節之水光天影飛動几席籟聲與潮汐間作殷殷在足底不知船在水邪陸邪滄洲仙有駕淩風舸以激水者徒以舸為舸而未知吾居之以不舸為舸也以為行則未嘗去家以為居則常有行色又孰知吾船之纜之而住負之而走也昔者太公嘗以漁釣欺天下而天下旋知之其舍魚也欲蓋而彰也嘻以為非魚則持釣竿五十年矣以為真魚則未嘗得一魚馬嘻太公固得於漁不漁之間者客詰主船以為真船則居阯以為非船則箬笠之前皆漁樵推罵之地又安知吾之在樓非長乘風舸也耶今夫天一大春水地一大船也人在船不悟悟者實在船之外吾悟吾船獨不在外也嘻此不可與衆人道也春水如天船在天耶水耶而况在樓也認吾船在樓又何異認劍在舟刻耶其扣舷之歌曰滄之水兮如天叶滄之屋兮如船叶水滔天兮以春船之載兮薄夫天津索吾船於津之表兮吾將與泰初而為隣客和之曰若有人兮水為家叶著土不住兮養空不驅泰始我海兮鴻龎我湖吾不知貫月槎之徒兮天倪舟之徒歟主人為汝南殷徳父氏客為鉄􅂒道人㑹稽楊維禎也至正十年三月三日記碧梧翠竹堂記至正八年秋崐山顧君仲瑛於其居之西偏治别業所架石為山窽土為池層樓複舘悉就規制明年中奥之堂成顔曰碧梧翠竹廼馳數百里記於友人楊維禎曰夫堂矙金粟階映桃溪漁庄草堂相為僎介蓋予玉山佳處之尤宏而勝者也鴻生茂士為予記詠者多矣兹堂之志非名鉅手不以屬敢有請予謂仲瑛愛花木治園池位置品列曰桃溪曰金粟曰菊田曰芝室不一足矣而於中堂焉獨取梧竹非以梧竹固有異於春妍秋馥者耶人曰梧竹靈鳳之所棲食者宜資其形色為庭除玩吁人知梧竹之外者云耳吾觀梧之華始於清明葉落於立秋之頃言厯者占焉是其覺之靈者在梧而絲絃琴瑟之材未論也竹之盛于秋而不狥秋零通于春而不為春媚貫四時而一節焉是其操之特者在竹而􅇼簡笙篪之器未論也淮南子曰一葉落而天下知秋吾以淮南子為知梧記禮者曰如竹箭之有筠吾以記禮者為知竹然則仲瑛之取梧竹也盍亦徴其覺之􅂕􅍾之特者書以為取諸物者法毋徒資其形色之外云也子韓子美少傅之辭曰翠竹碧梧能守其業者也徒取形色之外而不得其􅂕與特者未必為善守仲瑛氏吳之衣冠舊族也有學而不屑於是兹堂之建將日與賢者處談道禮義以益固其守者其不以吾言取梧竹乎書以復仲瑛俾刻諸堂為記槐圃記按周禮朝士面槐三公位也槐何取於三公哉豈其晝聶宵􅀈一隂一陽之翕闢而爕理之道見焉故公所多植槐齊之君主有犯槐之樹也列公所尊異乎羣卉而不可與凡條繇植于老農之圃者比矣故宋王祐氏手植三槐于庭期其子孫曰吾子孫必有為三公者已而旦果相太宗天下謂之三槐王氏吁槐之植私庭而遇如王氏者天下亦尠矣北庭文甫氏家于杭之清波門自其祖叅政忽撒公樹槐三章于居之後苑稍治園亭其中名之曰槐圃文甫氏彈琴讀書或與客觴咏必于圃之所時時與客撫其樹曰嗟乎是吾祖之手澤也予後之人弗克負荷惟懼其敢不封植是樹如昔人之無忘角弓者以無忘吾祖者耶客至圃者愛其人必敬其樹知其祖之待文甫氏者逺且大也且咸為之賦槐圃詩吁文甫氏能思其祖愛其手植若是其孝於家者可知矣以其孝於家者移忠於國其光於祖者又可知己文甫方强年承叅政公之澤將以六品秩仕于朝矣吾嘗交其人識其負大器且執謙而好學忽氏子孫之為三公者豈下王氏哉異日文甫居髙位面庭槐若見爾祖之手植也有不惕然哉槐以人而名則圃以槐而重矣天下謂之三槐王氏者不屬之三槐忽氏惟文甫以前人之所期天下之所望者勉之而已至正己丑九月九日記光霽堂記宋黄庭堅論舂陵子周子之人品曰胸次洒落如光風霽月談人物於孟軻氏後者子周子也太極通書之著異乎荘列荀楊之撰不由師傳根極道要以接夫千載不傳之緒由其人品之髙也擬諸形容者無它風月之光霽而已耳後世不識周子而求其人於光霽可以識其人品焉雲間任公子元朴開池於廬之西偏蒔花竹其中而命其堂所曰光霽因友生馬琬求記於余余謂元朴之光霽其慕子周子歟抑自胸次式符於子周子歟嗚呼一嵗之晝夜非無風與月也而得諸光霽實難今夫蓬蓬然而發乎噫氣掉乎無方迹之而無形聽之若有鳴谷乎若盈流手乎若行者是風也而光實形之不光無以見風之至祥也晶晶乎行乎太空泰清乎天中轉之而不窮蝕之而不訌死而胸灰而朓朓而中者是月也而霽實旌之不霽無以見月之至白也風之光月之霽蓋神之至秀而時之至良也已勝人韻士韶暢髙明洒然凡塵之表者不似之乎吾於是有感矣風月光霽少而翳𡨕多也人光霽少而幽隂多也世代光霽少而屯否多也元朴光霽獨取諸造物之多得之心而應之境誦詩讀書暇而彈琴握槊與客觴咏以為樂而不知世間萬物有悴然而不適其情者嘻風月在世常也而堂獨以光霽名之是雖晦冥隂雨相尋於無窮而吾未嘗一日不光霽也吁夫人而似乎元朴也子周子不足慕而已世道之否者可以復泰和聲明之盛於古也客聞吾言有喜而為之歌者曰有光雖風有霽雖月我思其人憂心惙惙既見其人我心則悦又歌曰光之風兮英英霽之月兮庚庚風與翔兮月與萌君子之心既清且明君子之樂式和且平繄子仕子莫之與京雙清軒記華亭南去五十里為胥浦浦之東有隠君子居焉曰倪益齋氏吾嘗聞其人而不及見之今年予至胥浦而其人已隔世見其二子皆孝睦其家孫曰權者尤才賢而善接師友權之舍客次曰雙清軒以予為右客常禮予以顓席予亦時時領客造其所不問主在無一也權與父伯玉君聞予至急治茗具茗餘繼觴咏已而相與抱琴至雙清所當秋月正中八夜闢㳺塵不興草樹可數為予援琴三鼓始以長清短清申之以御風騎氣其聲汨汨如泉走絶壑如㳺雲行太空如珩瑀相觸於升降揖遜之頃疾徐髙下靡不中節盖月在琴得月而愈清軒之名雙清非此耶權既與客賡唱雙清詩而又屬余記余愛權之賢其有志於樂道者歟惟樂道者而後忘世俗之樂故其心洒然與迹俱清不徒琴與月遭而後得是清也世之層臺複舘貯粉黛芘笙竽與滛朋狎伴為留連荒亡沉溺而不悟者彼豈知天地之氣之清有託於物而存者乎而倪氏容膝之室無黝堊丹漆之麗其中惟經史圖書一二古鼎彛器皿而已方其適於清也衆喧俱息百慮皆消方寸之間湛然無世間一物之異此非誠於樂道者能之乎不然吾愳權之清也當琴與月􅇜則暫之於月落琹移之際則失之譬之泉焉渴飲而甘之而不能不為醇酎之奪於異日也可不愳哉權起謝曰權或叛先生之教有如月舉酒屬客而自為之歌曰氣之清兮魄之隂器之清兮絃之琹維軒有月清明實臨維敕有琴和樂弗滛我歌雙清實獲我心併錄之以為記邵氏有竹居記松地隷古揚域厥土卑濕沮洳自禹决水注之海然後民與草木得休養生息其土性最宜竹禹貢所謂篠簜既敷可徴也去松之南六里所有村曰同安仲謙邵氏居焉邵氏自靜山君由伊雒徙湖之長興復自長興徒兹邑仲謙即先廬斥而大之左右皆植竹因顔其室曰有竹居翰林承㫖張公夢臣嘗為大書其居太常胡公古愚既為賦詩復介吾友吕輔之請記於余余曰竹之為物詠於詩有切磋琢磨之喻載於禮有釋囬増美之喻竹蓋異於凡卉草木矣晉王子猷曰何可一日無此君宋蘇軾亦云可使食無肉不可居無竹也非竹之比徳君子又何以能有於人哉今仲謙氏居有竹亦知有得於竹而竹為我之有乎若其居有竹而吾不能以有竹也問其所有輙謾言曰吾吟竹風擊珊瑚也吾掃竹月披琅玕也雪煙氷雪蔽􅃜刻無不全於竹也好事者來引之竹所彈琴詠詩或觴酒以為樂吁有竹如是夫人而能有之也今夫虚中抱道之心貞標絶俗竹之性獨建而不㧞竹之本離立而不軋竹之羽四時寒暑不改柯易葉又其恒也聲中律吕協鳳凰之將鳴又其徳音也啼而斑泣而萌動夫嫠人孝子之思是又其應物之靈也故君子有取於竹而必將有其有也仲謙之得竹如此斯能有竹之有也不然吾懼仲謙氏居曰有竹竹不為其有也雖渭川千畆之富徒與千户侯等云爾竹何有於居居又何有於竹哉吾問輔之氏稱仲謙好徳君子也仲謙其克有其竹不徒在居之云也審矣尚以吾言勉之聚桂軒記秀在宋為文物之邦至今士多興於學處㕓者亦類皆鴻生碩彦由是㕓之坊有曰聚桂者而趙某氏世居焉其子覲尤知尚文墨氏蚤嵗尊師取友學經史談道義不間寒暑且題其脩業之所曰聚桂軒軒之前植桂成行當秋清月髙花爛熳發與客觴咏其下悠然與桂相忘若友然待制杜公本既為書其顔而又因司令濮樂間氏來見且以記請予惟春而榮秋而悴者木皆然獨桂貫四時一致不媚於春不􅇶於秋月窟清寒其根托焉風霜髙潔其英發焉豈非卉之仙者乎宜君子之比徳於桂者衆也古者以桂喻君子如淮南小山之詞蓋傷賢者不得所而招之以隠者也晉郤洗對武帝曰臣射策為天下第一猶桂林一枝則又髙自標榜而志於不隠者也余未暇論天下士即秀一郡在宋則有莫氏五桂者以一門五子皆明經擢第天子賜其親以紫衣金節之華故人比燕山之竇我朝設科取士則有若黄氏玭父子俞氏鎮兄弟泊蔡氏景行陳氏允文鮑氏陸氏景龍徐氏逹道嵗登賢書皆桂林之選也繼諸君而來者殆未巳焉覲固於諸君之文讀而知之或請業而師之已他日偕計吏上春官對䇿大廷天子賜覲進士第覲將為桂之顯者追榮莫氏以光夫士子之聲豈得為小山之隂乎聚桂文㑹方作於樂陶氏余嘗主評裁而士之與是㑹者人固以欲之桂待之矣覲其可以桂自隠哉余故記聚桂不惟朂覲耳以朂其同門同志者云桐香室記秀濮氏某府君居濮津之桐鄉始居成聚已而成市其土廣而墳無髙山大谷之深阻所植多嘉樹美箭舊説有梧桐盛大鳳凰常集其上故鄉以名余弱冠時㳺看嘗識濮氏樂間公之折節下士尤切切教子弟不逺千里而聘名師其子仲温好學不勌題其脩業之所曰桐香又取詩人李長吉語以名也後余在吳無有為典市官者日中與市者相質劑夜則歸誦書石轅且甞道書於余道其所志欲請業焉則知為仲温余訝其人生紈綺家且既仕而又志學若此非賢者能之乎已而仲温棄官還家尊師取友以卒其業時余在雲間仲温又介余友鮑君仲孚招徠予公觴余知止堂上仲温退侍余桐香室中相與榜讐經籍啇論文墨為事濵别請室記昔離騷子著書天下香草以比有徳之君子傷香草立愛而不芳者有以而未聞以桐蓋卉之弗靈於性者不穠於色則烈於香不烈於香則厚於實而已耳惟桐性靈花之拆葉之落占厯者以之而其枝之所傾有以集鳳凰材之所取又有以中琴瑟詩人者以香屬之殆不可與凡卉之臭味同議矣故曰桐之香鳳之待也嘻桐之香鳳之集徳香而爵禄聚理之所必至者仲温植其徳以植桐然自拱把之日無牛羊斤斧之􅆷勢不至干霄蔽日不止也根益深䕃益大香益逺吾見仲温膺爵禄也天子賜進士第起身以顯揚其親以展布其平日師友之學可計日而候已故余樂為記桐香使人知桐香非直為待鳳之具實濮氏之徳之符也繫之辝曰梧桐生矣在濮之陽桐之香只繄鳳之翔繄鳳之翔惟君子之鄉梧桐培只在濮之除桐之香只伊徳之符伊徳之符維君子之居明誠齋記淞之南五十里其中水曰大泖水清而土墳環泖而居者多聞家著族嵗治土田給貢賦外不逺千里聘名師教子弟最者曰朱陳邵吕有曰武叔者蓋邵氏之佳子弟也予嘗聞武叔兄文伯髙爽而好學一時功夫樂與之㳺不知又有武叔競爽焉武叔事父兄各極其道事師尤不遺於禮且聞脩業之所題曰明誠益以暇日誦書史其中所以交當世之賢人君子必此焉㳺息而聲色狗馬之好一不以經意鄉之先逹無不器許之間從外舅倪伯玉君來見且請言以著明誠余喜淞子弟多嗜學而邵氏余不無棄取然極其至而論則聖人之道一誠也天地之運一誠也天地一息不誠天地之運歇聖道一日不誠聖人之道消聖法天賢法聖明此爾誠者誠此爾聖而無不明孔子之徒是也賢明而無不誠顔曾之徒是也明則知誠則行也易曰知至至之所與幾也非明之始事乎知終終之所與存義也非誠之終事乎譬諸過都者必知道所由陸轅太行水航滄汝不惑於天下之旁岐斷港然後星行夜宿積日累月蘄于逹而後止此非明誠始終之教歟故明誠之功極于天地位萬物育聖人之道于是焉與造化同流於乎至矣武叔即予説以合中庸之論而用力焉余他日䆒子所成以徴子學之不自欺者的不予妄也大師道而光祖徳者不在武叔之祖為翠岩老人者余所愛敬也其師東岡先生余所友也武叔歸而質之以為何如溪居琴樂軒記古樂器之存惟琴琴蓋古聖人有道之器而至樂存焉故顔淵得聖人之道而託之琴也陶潛得聖人之趣亦託琴也師曠嵇康阮瞻之徒非不工於琴藝而已耳道也趣也其樂内也聲有可也無可也藝者其樂外也聲不得而無哉松陵曹某氏闢室一所前俯六溪暇日鼓琴於其口題曰溪居琴樂間從阯百經氏來謁記予惟琴雖古樂今之琴絶與古反矣古人樂於内今人樂於外也善琴者有倚蘭白雪離鸞舞鶴御夙騎古操之製也不知古操之製古道之所託也今之紈袴小生笄珥婦女以勞為學者徃徃務為新聲以悅今耳是列雅於鄭衛之音何有乎古聖人之至樂哉予嘗聽氏琴已曹氏獨好純古淡泊之音寛於内好足以舒焦衰湮欝之疾則於顔之道陶之趣其得否即於此中寓之非後世紈袴小生笄珥婦女者比也不樂於聲則於樂道似矣抑吾聞伯牙氏之學於連城是也置之絶島之間觀風水之澒洞山林之杳鳥悲獸號之慘情一移而琴遂最天下曹氏之居溪上也流水終日􅀈􅀈鳴階除聞若金石交作而清奏鈞韶也髙陵大埠烟雲晻靄在囱户外其朝夕之變不同也即物家之變而冩之於琴吾知其符連成子之教矣吁是道也又豈紈袴小兒笄珥婦女以吟猱攫醳習於工師之樂學以為樂者哉子它日拿舟過溪上聽太古之音以見聖人於穆然頎然之間尚當為汝賦其樂云桂隠記至正九年春予赴璜溪吕氏塾之賔塾與其仲氏徳昭甫隣徳昭甫闢室居之西偏植桂數十本顔之曰桂隠嘗觴予桂隠所因求記余謂山林之士托草木之芳以隠者多矣或以菊或以蒲或以𤓰或以松或以竹以梅以橘以李以槐者不一足也而以桂記隠者鮮聞徳昭甫其亦有慕於劉安氏之小山者乎安輕國位與山澤之儒㳺八公之徒為賦小山之詞其招隠有曰山氣巃嵸石嵯峨溪谷嶄嵓水増波猿狖羣嘯虎豹嘷攀援桂樹聊淹留知桂之所記在岩谷斗僻之地足以為君子隠所也今徳昭甫之居無石之嵯谷之岩猿狖羣居而虎豹曹也桂之列在庭其途人所見且引好事人抵其所得為小山之詞之隠乎徳昭曰吾取桂以徳不取桂以地故曰桂因地生不因地桂且桂月窟之産也兎公蟾母之所托以為隠者固非人間世之所得有間有在人間世者不幸為墨卿詞客資之為决科取禄計遂名為科籍豈桂本志哉歌隠于小山者必于桂是言蓋知桂者無如小山矣桂不以無人而不芳君子不以無信而改徳易行也吾有志於桂如是何暇計隠之山不山也哉抑又聞小山之詞招隠耳非有隠也徳昭甫尊徳樂義雖老而好學不倦吾見中朝之士方有續騷歌而招徳昭者徳昭其得終隠於桂乎是年九月十日記水南軒記家華亭長泖之陽其里曰胥浦世以孝友之行脩于家而以義方教子弟者曰陸宗敬氏即其居之偏而顔之水南者則其彦功燕處之所也陸氏自吳婁侯遜開迹華亭大司馬抗有平國功二子曰機曰雲又以文章著名於世且姓其小字於山川故子孫氏至今千有餘年猶魁然以人門為淞聞族士衡之詩曰髣髴谷水陽谷水即長泖也葢其生之所樂去之異鄉而不忘歸志不遂卒有感於華亭之清嘯也嘻谷水不遷亭鶴自語里人至今思而悲之今彦功有先之序在谷陽而名其軒曰水南上有􅂷白之親下有舞褓之童又有賢師良黨之際樂其樂而不知世有崇髙權貴炎冷榮悴之一去一來者倚於髙山流水之外同志相過索其人於水之南相與論道名理為事此豈紈袴少年之情哉可以稱二陸之鄉之賢俊氏賢彦功賞隨其師黃公子謁余璜溪其識其人髙朗有雅量吾已喜其為陸氏佳子弟矧又成之以賢師友之學抑余宗敬有才而不得䆒於髙年其報在子孫彦功當有以顯其先矣嘻綿華事之世澤補遐祖之初志其又不在彦功乎彦功以余言勉之而已耕閒堂記予嘗評閒矣有仕而閒有耕而閒有㳺於仕農之外而閒㳺於仕農之外者其閒不容於先王之世吾置而勿論也若既仕而丐閒者事若優而情或有未知則閒亦謾爾惟耕有餘力而後閒迹若苦而情優非世俗之間有所矯激而後得者比已雲間倪仲玉氏不仕而歸農名其所居堂為耕閒農之暇雞肥豕蕃家所釀谷作春輔㑹不閲月而熟仲玉作輔㑹必與親戚故舊相共之迨極夫琴歌咲詠之樂而後止胸中廓然無一物之留户内外熈熈然無一世故之撓非吾所謂迹若苦而情至優非世俗之間有所矯激而後得者耶仲玉且自記曰吾祖從御史大夫其亦農耳其勞至帶經而鋤計其閒不如吾之耕餘及其耕而仕也間益不得假吾之閒不廢於耕而經亦不廢於吾子孫吾非太平之幸民先徳之慶裔歟余客吕氏塾而仲玉之堂為余塾南隣且嘗與觴豆堂上遂以記請甫田之詩曰琴瑟擊鼓以御田祖以榖我士女余亦將休矣買田三泖上與子孫為耕耦暇則與子孫拊格相擊土鼓以祀先嗇之祖而且有以式榖吾之士女也豈非甫田詩人之樂哉爾祖得失吾又何議仲玉喜而起自歌曰仕而閒其志煩其情艱其情而閒其志安其體胖乎吁嗟閒先于吾豈以耕之寛易仕之慳乎舊時月色軒記松陵陸子敬氏吳大族也宋景咸間子敬之先嘗築侯老堂於分湖之北壘石為山樹梅成林日與魁人碩彦觴咏為樂没百餘年而子敬克守其業又葺所居之軒名之曰舊時月色取姜白石詞語也書來以此記請予惟古今人幾生幾滅古今月幾圓幾缺人有古今之殊而月未始有古今也月與天地一無窮之運亘古猶一日也人不與月存則謂人舊而月新月不與人生則又謂月舊而人新也白石為范石湖氏出仕于朝歸老于家也時異事改求昔日之所見者唯月在梅耳待酒相對悅如遇故人於數十年後豈不有舊月之感哉子敬是之不忘其先見月於梅如見其先宜其同一感也然草木以時計閲嵗而一新舊也堂池以嵗計閲世而一新舊也月一古今而無敝故體有盈虚而卒莫之消長時有升降而卒莫之始終也豈一草一木一池臺之新舊而得為月之新舊乎雖然天地一物也月一天地一物也其生無死葢亦有數焉朔而載明于西晦而終魄于東此月之生死候一旦暮耳先天而生明之根後天而及魄之極此月之一大生死亦一旦暮而善觀月之生死可以知屈伸之義矣吁是豈石湖氏觚墨之客所能言哉異時予將泝三江過􅂷虹訪子敬之所居呼酒酌東軒上歌長庚之詩以問月自𤣥黃判而月生者今幾年以今人而能存古月者復幾何人君當酌月而壽我我固中舊客也東阿所記按隴西志東阿谷在醉仙山隠者所棲也氣清境勝草木繁蕪此少陵杜氏屢見于歌咏而不厭也其詩有曰船人近相報但恐失桃花陵蓋以其景比之桃源矣松之南里曰璜溪溪之上馮生濬世家焉生於廬之東又治讀書室顔之曰東阿夫東阿去秦地數百里而生以之名者取景同不取地同也地有水竹之美在璜之東隩軒又東嚮謂之東阿固宜當夫朝陽方升萬景焜燿鳴雞在樹喔喔然白鵝蒼鷺與文􅀈鳥在水者泛泛然陽陂打蔬者數十品瘦地少粟者五種熟髙人逸士時過其所詬租更呌囂東西村如隔島外也未知居東阿數十家者比生何若哉昔少陵氏之咏東阿非實居也使少陵實從東阿遭世擾攘妻子流離拯死之不贍雖有東阿能一日居乎今生生於全盛之時又無仕宦東西之榮優㳺焉誦詩讀書於阿之所暇則杖䇿溪上觀片雲雙鳥其悠然自得蓋與東阿之詩人同一逺意而非衆人之所能測識矣夫彈絲有得不必琴臺流觴有水不必蘭亭東阿有隠者之東又何必曰醉仙之谷哉書諸觧為記又為賦詩曰問君讀書所我所在東阿東阿何所有水竹䕃陂陁鶯羽飛隼雉長頸鳴鴽鵝離離原上瓞濯濯池中荷桃源在人世豈必陽山阿今日有良㑹同志式相過擷我園中蔬具酒旨且多請君考吾槃和我軒中歌中山堂記秀澤國也出郭無山許可久氏居城東門外顧書其堂楣於中山介予友陳徳初見予舍次且請記惟洛為地中而嵩山天下之中山也可久家去洛凡幾何里隔嵩凡幾何山烏暏太室少室三十六之峰乎可久曰吾家許由君實隠中山繇龍門南有山髙丈四絶諸峰下立如引頸仰其峰之髙者至今字之曰許云孔子生魯稱殷人太公仕周不忘乎營丘重本也吾不居洛而稱洛中山豈徒慕中山也哉嗚呼重本若可久氏者可已雖然吾嘗病君家許由君悻悻然獨潔其歸不肯入堯舜之道非盛時所望也吾聞天地扶輿英淑之氣聚于中州而州中之山惟嵩當之王治將興嵩必為降祉生英佐故詩人歌之曰嵩髙維嶽峻極于天維嶽降神生甫及申中山之利于時若此可久追本中山其徒尚夫遯歟抑有以應詩人之歌歟是為記遂初堂記檇李東去六十里為鸚湖又航湖而南六七里為趙君初心之家君故宗正子姓也嘗以今選異等遇知天歷大臣凉國公轉官至羅羅斯甸宣慰都事循是而往躐髙㨿要可計日待君顧自畫之行年六十而以老自休稍為園池樹堂其中曰遂初因余友劉漢傑請記余既髙君之尚遂弗辝人心之良莫良於其初而有不能良者蝕其初焉耳故君子論心恒尚初雖既老而貴乎遂也晉孫興公負一時清名嘗自賦遂初詩弗克遂强預家國事取専政者嫌薄君年六十六未致事一旦若悟五十九之非執政者方倚用之而居且休矣精神志慮巻為也有視存利禄若涕唾盡分由四子而家督者受政君勝日挾侍者數人與郷之宦而歸者徃還扁舟間好事者時載酒户外君握手堂上説舊時典故辨古先名理甚慷慨激烈發為歌詩比之晉士取人嫌薄而訖不遂初葢異日道也且其言曰堂之築固以休予老而遂吾初而吾初之遂者實將以竟吾母夫人之柰何堂成而母逝矣今吾雖若顓堂以居而不知吾心之恒有母也嗟乎與生俱生者愛親之仁而初心之至也又未知晉士之初有是不也是可記已又從而歌之鸚之湖兮清且腴溉我田疇兮舄􅒾為禽出有航兮食有魚歸歟歸歟我親我娛親雖逝兮我心在廬遂吾遂兮我心之初遂兮烏知其餘晚軒記秀有苧水世家為戚秉肅以晚自命所居之軒且告予曰某之名軒非以苧水宜晚之景也某不幸㓜為膏梁兒重不幸早孤以冠齒當家督里中豪少我弱我攻取者四面至而學日與家落孔子謂三十而立今踰去其年而吾未之有立也不其晚乎故名以自儆幸先生有以教我夫物脆於早而固於晚脆則薄固則厚物之理也人之成器何獨不然故老氏有言大器晚成名言也子不觀夫藜藿與楩楠豫章乎藜藿之生煗煗然一日㧞數寸而其材不可以為櫨楩楠豫章長歴七年而後一覺而其用可舟楫梁棟速成者其功劣晚成者其功大其象已乎誠有志於器之成也何嫌於晚乎余交秉肅氏得詳其性行才質皆晚之器世之士多尚狎和而秉肅獨以介尚巧言詐行而秉肅獨以直尚險奔而汚竟而秉肅獨以夷以潔也是得晚之道也然彼以速為功者足髙於連嶁列埒之間峻躋而極誨自謂髙鳥快駿不能踰不知足一躓則盲妄擿埴顛隕於䧟穽而不知有援而救之者則其為速莫晚甚焉余之進若晚而他日功成名立訖為大器則彼之速者莫我追也已子以余言勉之余未老且將卜隣苧水上尚及見子之成於晚也顧氏永思冡舍記襄陽顧必有之六世祖宋大八將府君某與其曽大父興能府君某大父檢閲府君某暨傍親墓林在越諸暨花山鄉之文山至正六年夏四月辛酉必有又葬其妣孫夫人于域次既葬作室於墓左之南若干歩以奉其先世及妣孫夫人神主俾邑人何壽者亭之凡春秋祭祀冡舍之政皆有著式室大小凡五間既成名之曰永思冡舍葢取諸下武詩永言孝思孝思維則也而又因吳興沈自誠氏見予吳門特記惟孝之為義大矣為人子者生盡其愛敬死盡其哀戚可謂孝矣然親在則禮興親沒則哀戚之情日逺而日忘者人之常也非資如大舜為純孝之全則不能終其身而慕焉故君子設教懼其久而或忘也為墓於郊而封溝之為廟於家而嘗禘之為衰為忌而悲哀之所以致其思思存則親雖逺其能忘乎或曰墓祭之禮君子所弗予也予惟謂親之手澤口氣在器物者尚能動其思慕致其哀戚而不忍用也况冡墓親之體􅷠所在乎升髙而望松楸下丘隴而行虚墓之間榛棘凄然霜露時降君子於此其有不戚然􅏒其思者乎思之永則親之沒雖百嵗之久猶一日也吾聞顧君者親䘮不忘常廬居於冡側㑹有四方之事又治精舍以守之可謂永慕之至者其先有永慕亭在墓下思敬亭在墓南八十歩皆為祭享所嵗久傾圮今舍名永思葢亦無忘先亭而繩其義者歟嗚呼顧氏子孫雖逺去墳墓㪚處于四方也然於其親色未嘗絶乎目也聲未嘗絶乎耳也志意嗜欲未嘗忘乎心也其於永思之義庶幾其無忝已是為記思亭記姑胥王斌氏早孤事其母賈謹甚為無錫州屬吏迎其母就養毎雞鳴起温言色朝其母始出夕復夕母躬上食母扣吏事斌白所行善母説即不善母為減眠食斌母體順其行事益畏恭母病斌衣不解帶自不交睫侍藥食母没斌執䘮哀慟骨立吳俗葬其親以火斌惻然追傷其父不及營甎穴衰絰具棺葬母閶門外之原復築亭原上名曰思服踰祥酒哀泣如始䘮且跣來乞余以記其所不忘者余謂后山陳氏嘗記甄君之思矣雖然陳以目視其心之思推其戒於不肖者異思時為庸人言之爾君子者不然霜露既降君子屨而愴焉雨露既濡君子履而惕焉思其親居處思其親咲語又思其親所嗜所樂思其存存則著著存之至若將見之此君子無時而無其親者也無時而無其親雖親在九土不在九土故思非物自外至者根中出者思根中出不在登髙而望松梓下丘隴以行虚墓而後有之也夫物之係於見不見者存亡以目而存不係於見而不見者其惟思乎嗚呼此君子之孝思也斌事親有至性又志乎學古者其於君子之孝思庶矣若曰見亭始思亭去則思去思不能存終勤以慎行夫身以圖榮其親豈君子望於其親君子望於斌乎斌起拜言曰斌不肖敢不恭敬先生教以終君子之孝云東維子集巻十七欽定四庫全書東維子集巻十八元楊維楨撰

body:
  text: 詩送薛推官詩四言三章有序吾友姑胥富子明來言杭州推官鄆城薛公之人曰薛公起身國子伴讀負特名公卿間連歴縣尹掖城寧晉得民譽甚三命為今職惟杭實江以南大府也其俗囂薄喜訐爭獄市滋起大家氏闗節遷變事情奸偽百方出竒獄訟有他此所不傳雖老財察者病弗遑理推官號難職而於杭號尤難者薛公之來也斷某獄平亭疑法咸一一當葢亷為治本又明徳之恕以出之惟亷不淫明不惑而恕無文深之過故臬不頗民用不寃自時府中事無問大小咸咨薛公府長吏接之如賓師事有隔其省閱必舛差顛僨一時僚友有坐畔法者而薛公獨歌休聲於民此其賢否優劣之較然者也今將代去丞相府與御史章交上其陟清署以耳目天朝者必矣杭士歌詩鄙腐不足以侈而餞也願邀予詩予審子明言不誣為賦詩三章一章述其善於職也二章惜其去三章期敭清要以副杭人士之望也詩曰有淵有清又靜且平有照斯應有撓有澄我有疑臬伊誰質之我有枉罸伊誰出之孰奪我美心如失之雖奪我美其用則邇何以用之驄馬御史雖驄馬史羣吏之師四方之紀夀豈詩四言二章有序人情莫不欲夀而貴富人得之者尠賤且窶者多得焉何也天之授人以五福固不兩完也然賤窶者之夀而樂抑又尠矣古之賤窶夀而樂者吾聞榮啟期而樂之以三固未知所樂也此夀而豈之不易易也中吴瞿惠夫氏家崑之韓涇至惠夫益斥大其門閭而名其侍親之堂曰夀豈蓼斯之詩人敬祝頌之詞曰令德夀豈葢代之夀者不難而夀而豈者之為難也壽而豈者非令徳其人曷及爾哉謂夫世徳之家也有華宅可以居有負郭之田可以食二親皆具享遐耄惠夫朝夕率其仲上食堂上既有以樂之夀而又有以自樂焉豈之樂固非榮期之賤而窶得之賤者比矣夫恵夫之所得惠者豈非詩人所謂令德者歟惠夫求予詩故予序之而係之詩二章曰有橋有諼云有橋洋洋在堂之陽豈弟君子令徳不爽文文如璊璁衡其鏘酌以旨酒以燕樂我父兄瞿叔孝友夀豈孔臧有諼奕奕在堂之北豈弟君子令徳有赫飲御我族以及我賓客瞿叔豈弟斑裳赤舄夀具樂康由爾令徳送康司業詩四言有叙至正七年秋天子以成均司業之乏山東康公若泰以憲僉事轉是職未幾臺評奪職副庸田司使不三月轉湖南憲使未行而中書以國學公論又立挽於司業其行也吴之士大夫咸贈以言有諗於維禎者曰亷訪使天子執法之臣也司業文墨官亡益殿最者也天下執法臣得一人焉勝百什守令文墨官得百什焉亡愈執法臣一人今康公累遷亷訪使者執法之得其人者也而成均徒以文墨伎官使其人無乃非天下制乎維禎曰不然維我世祖皇帝屬統埀業於後之人不在吏持文法而在傅臣之扶植倫理也故設官分職司業為國子師民氏天子内長之非天下不居故其人得侍間於天子時賜清宴以問道即有所建白澤流四海非尺寸之細也國有不是師弟子得逕上聞捷於執法移文符以闗説差次者其育才養能一適而賢賢臯陶伊尹之徒徃徃發跡於是其為國利也厚矣薄其功豈在執法左哉嗚呼司業之人也又豈徒取具官亡益殿最者哉今天子承明經成尊師氏之位不卑於執法臣故康公之屢繇風紀以移是職也良有以也哉故余裒次吴士大夫之詩帙以送之而又序之如此復自繋詩凢五章詩曰赫赫胄監禮樂攸司祭酒長之師氏貳之明天子作我民極何以播教師氏有職惟明天子惟烈祖是因烈祖始受命肇立成均天子戾止作爾多士多士濟濟惟天子使曰若康公穆穆雍雍多士濟濟惟言來從天子問道其言如鐘天子廣化其徳如風維禎作頌配於樂工題逸樂子巻五言律煙水風塵外先生一草堂干時無戰策却老有丹方蒲葉鈔書短松花釀酒香有時歌欵乃小艇在滄浪夜坐一首五言律日落羣動息張燈坐草堂浮生百年事清坐一罏香謀拙鄰人歎幽棲世慮忘吟詩不知寐華月自流光舟過黄店五言律水㑹魚鹽市霜清蟹稻天髙橋十字港新刹四邊田樹老烏銀莢花開白玉蓮老翁誇樂嵗斗米直三錢緑隂亭詩五言十二句公子邁流俗澹然薄世榮華亭入幽邃永日有餘清髙梧羅前庭修竹被兩楹重隂閟清晝好鳥時一鳴佳辰展芳燕良㑹欣合并清歌發綺席鼔瑟更吹笙羣公盡詞客列座敬塵纓言笑遂真性觴詠暢幽情清隂與日轉不知月東生送趙季文都水書吏考滿詩五言二十句有序江浙粮賦居天下中九而蘇一都又居浙十五然蘇澤國也田皆枕湖藉江因水進退為凶慶使嵗而恒陽則窪下皆以鍾畝之利告一有淫澇之虞颺風猝作挾波浪破隄防連阡接町淪為巨浸此朝廷都水庸田之所由立也其職專以水利為務遴選重臣有才幹者居之而所調官吏遂與臺省相叅蓋朝廷視水利為重故待其官守宜重也異時官守或非其人其貽民害覆有暴於水而民益困者然則居是職者其不可不慎選其人也必矣書吏者其官之贊也吏不得人而欲其官之得職也亦難矣真定趙君季文蓋才而有風操者也徃嘗為浙中司臬史有能稱故今都水使府㸃函以書史辟於沙河尉次宜其克相其官以有成也君自奉職來隄塍益脩溝渠益浚水還故道而民受庸田之惠者君之功為多書滿例増秩七品佐貳郡縣為近民之官矣以君興除水利害之心推之吾民撫字之日民其有不受賜者乎其行也吴人士咸歌詩以餞之推予為序首而復繫以詩云勾吴水為國桑田水相爭水大連陂湖大小吞泖涇髙廬或凢墊下土孰容畊吴萌罹患久都水置司平治水亦多術害去利始興侃侃趙公子為吏有能聲弃流截髙岸蕪塞開通塍都府資治畫課最上農卿遷官到州縣穡事話田更推此澤物志聖化相流行送謝太守五言排律四十句湖秀今三郡循良第一人武林非復舊文化要圖新海嶽東南㑹湖江左右隣曽開天水國直問尾箕津府大同京尹居崇異國賓提封家萬戸易俗力千鈞惜也承平久於焉值亂頻煙華餘故市風物感殘民今日懐匡濟乗時好拊循念君多意氣滿腹貯精神别地梅凝署寒江柳孕春過船沙没屐駐斾雪埋輪黽勉猶無及窮愁不敢嗔贈言知面􅎼取醉寄情真勿袖烹鮮手須閒牧犢身推誠歸簡妙植善息頑嚚亂後無家世漁中有隠淪千年黄鶴返萬里白鷗親莫學張京兆應知召信臣貂蟬從岳牧圖畫可麒麟賦春夢婆七言絶句焚香雖老尚能歌聴夢道人樂府予因呼為春夢㜑黄柳城邊風雨多白頭宫女有遺歌東坡哨遍無知已賴有人間春夢婆小香明日履齋買姬年又大小予名為小香傳秋千春夢婆者白一塲春夢不須忙賸買春風又幾塲一丈花開紅玉蝶小香何日比花長寄沈秋淵四絶句大將軍酒誥入市貴公主鏡落田家不知有客琅玕所獨自吹笙醉碧霞句曲已無張外史道士今有沈東陽裁雲剪月三千首獨虎仙官不取將鹿皮之冠鶴氅裾軍前不肯帶銅魚花猫望鹿拜履下知有枕中黄石書鸚鵡水深蓮葉航書來約過百花庄醉披錦袍上船去倩得小姬連笛床送貢尚書入閩已後縂十二首皆七言律詩繡衣經畧南來後漕運尚書又入閩萬里銅鹽開越嶠千艘升斗貿蕃人香熏茉莉春酲重葉捲檳榔曉饌頻海道東歸閑未得法冠重戴髪如銀八月初四日雪坡太守周門拓入雲居山中復度嶺飲於水月尼寺賦詩書似太守及蘇州刺史周義卿文章太守早休牙五馬傳呼處士家好客新分朱露酒題詩近在白雲窩山中子落千年桂海上人歸八月槎水月樓頭横玉笛誤猜蕚緑是韶華用顧松江韻復理貳守并柬雪坡刺史仙客歸來隘九州身騎黄鶮記南遊烏衣故國江山在銅柱荒臺草木秋起舞劉琨空有志登髙王粲不勝愁問君蔗境今何在祇憶當年顧虎頭送謝太守朝廷遣使航東海萬里南來送璽書著屐登山良不惡分符典郡復何如白蘓事業千年後吴楚封疆百戰餘今日養民方急務肯將徵算及舟車答倪生徳中來韻綺川才子才庸峭素色成文似泖綾待詔歸來金馬客題詩寄去碧桃僧畫眉誰問張京兆多病深憐馬茂陵昨夜西堂安夢好惠連春思又新増庸峭齊魯間以人有儀矩可喜者謂之庸峭八月十日偕錢唐王觀海昌李勛大梁滑人過湖赴瑪瑙山主之招題詩雙松亭十年不踏瑪瑙石今日重登巾子峰外湖水繞玉螮蝀裏湖水浸金芙蓉崔老題詩欲招鶴生公説法善降龍浮雲富貴眼前見從此道人輕萬鍾感時一首壯志凌雲氣食牛少年何事苦淹留狂歌鳴鳳聊自慰舊學屠龍良已休臺閣故人俱屏跡閭閻小子盡封侯愁來按劒南樓坐寥落江山萬里愁至正庚子重陽後五日再飲謝履齋光漾亭履齋出老姬楚香者侍酒之餘與紫篔生賦詩滿城風雨送重陽雨後花開重舉觴仙客新來殷七七佳人老出楚香香干時嬾上平蠻策度世惟求辟榖方光漾亭中詩易老不須春夢到南堂與姜羽儀詩六韜人去無家學獨説吾鄉有羽儀太尉府中招處士湖州幕裏著賓師座分雨露黄封酒門䕶風雲赤羽旗湖上老夫詢出處扁舟一葉似䲭夷主之約詩用宇文韻我尋三十髙僧閣還有支郎夜渡舟湖上風煙留晚照山中草木帶邊秋水晶宫開碧菡萏金粟堆呼黄栗留下馬題詩紅葉寺行人有比峴山遊寄秋淵沈錬師所居號琅玕所琅玕種得三千箇箇箇瓊臺玉樹齊秋淨雙鳬青泖曲夜寒一虎大茆西長茸不著花猫獵深竹時聞翠羽啼老我所須惟鐵杖不湏太乙乞青蔾十月六日席上與同座客陸宅之夏士文及主人吕希尚希逺聨句新潑葡萄琥珀濃酒逢知己量千鍾犀柈筯落眠金鹿鴈柱弦鳴應玉龍紫蟹研膏紅似橘青蝦剥尾緑如葱彩雲吹散陽臺雨知在巫山第幾重八月五日喜雨初陽臺上作已後摠六首皆七言古風敲門空逈太史宅曳杖却上初陽臺雷從葛仙井底起雨自黄妃塔上來官軍捷報銅鉈陌山人酒瀉白螺杯慿誰得知詩句好山東李勛今有才十七日過無住菴因留題鑑上人半雲軒我訪東山丞相譜因過南墅半雲寮雉棲薜荔都蒼墓鰲補夫容大士橋萬嵗藤枝神蛻杖三花樹子癭為瓢老僧好事兼好客時作逺公蓮社招用蘓昌齡韻賦李紫篔白雲牕紫篔之篔篔滿林白雲之雲雲復深忽見南山有真意時聞好鳥流清音翻盆玉女當牕雪棋欵仙樵石几隂為子朗歌成古調寫以老鐵斛盧琴題夏氏槐夢軒何人覔得大槐國國在人間人不識五馬既赴南柯侯千金更選東床客金雞一聲呌東方蝴蝶飛來春一塲君不見緑林銅虎郎匍匐尚拜蚍蜉王寄兩道原詩二首信公今住竹林寺曽寄吴鹽道起居戴家泊上收秫米凌湖門外好鱸魚緇衣宰相日給告清客道人新著書若問西湖湖上伴竹枝零落柳枝疎老人雅趣近何如聞説移車霅上居甕口新包竹葉酒船頭學釣桃花魚雄文曽佩六國印綺語更著三家書兩家道郎我所愛何啻林間見二疏聨句書桂隠主人齋壁七言十八句至正己亥冬十月四日予偕吳興桃庭美義興髙玉牕夏長祐吳郡張學河西張吉富春吳毅東海徐子貞陽羨髙瑛雲間謝思順同遊淞之顧庄酹橘隠老仙墓因過郁聚學聚齋見桂隠主人供茶設醴席上與諸客聨七字句成一十韻十有八句書於齋之壁予為㑹稽抱遺叟楊某也九鳳山陽漂瀆隂十年曾記此登臨仙人一去橘破斗小山重招花作金勺水研池圓洗膽老蕉書葉倒抽心瞿曇像現雲生壁木客詩成風滿林白馬胡僧經寫貝青烏方士石旋針六花雪舞昆吾劒一索珠懸斛律琴出柙怒號斑額獸鎮籠解語雪衣禽掀髯自作蘇門嘯抱膝誰歌梁甫吟聨得彌明詩句就内中韶濩有遺音題朱蓮峰夢遊仙宫殿明日偕見西辨章進凝香閣詩青蓮老人青珮環自言昨夜夢遊海上天梯山天梯之山三萬八千丈瓊臺雙闕開天闗赤藤飛上最絶頂千樹琪花散晴影通明前殿上觀玉虚翁左面長眉曈炯炯玉翁元是太極仙手弄兩丸日月旋天扄地户司啓閉𤣥牝一鑰開天先青蓮老人南極裔泰華開花一千嵗大人賦奏馬文園玉藕如船澆渴肺殿前作詩明月光光采下徹下土中書堂明朝寫得凝香章蝴蝶飛來七寳床右七言長短二十句凝香閣詩七言長短二十四句有叙凝香閣者光祿大夫平章政事張公闢之以待四方賢士即漢平津侯之東閣也客卿鐵崖楊子名之曰凝香本韋蘇州語予讀楊子記云休兵息民又曰厭兵圖治引周公仲山甫為辭夫兵不為攻城乃森㦸於左右者豈非休兵乎燕寢凝香與賢者共之豈非圖治乎周公東征成王迎歸天乃反風起禾此休兵效也仲山父徂齊宣王賴其補衮出納王命此圖治効也楊子之進規者至矣杭庠典教朱庭規敷楊子之記復為歌以頌云有兵不若森於庭發天下若莊於棚汗馬不若繋於營休兵要待民力生平章政事光祿卿閣下萬巻清香凝書生香徳生馨况復爇鼎相熏蒸緑煙一縷風度􅎉光祿燕寢寢不驚蝴蝶飛來窺枕屏周公入夢話東征山甫依稀亦言并天既反風禾稼登告以補衮埀鴻名楊子進規為座銘有客如此真賢卿有客如此真賢卿廩人飽粟庖人饋鯖燕昭臺上千金輕錢唐博士起相慶有如十八學士登蓬瀛東維子集巻二十九欽定四庫全書東維子集巻三十元楊維楨撰歌盤所歌并叙孟子稱大丈夫曰居天下之正位行天下之大道富貴不能滛貧賤不能移威武不能屈李愿稱大丈夫曰坐廟堂則進退百官在外則武夫前呵從者夾道喜有賞怒有刑材畯者譽其徳粉白黛緑者爭寵妍孟子之所謂大丈夫者也李愿氏之所謂大丈夫人之稱大丈夫者也其賢不肖固有間矣及愿稱大丈夫之所不遇者又曰與其有譽孰若無毁與其有樂孰若無憂車服不維刀鋸不加理亂不知黜陟不聞此我之所行愿蓋亦潔身而徃之流也亦豈得稱大丈夫哉然此於處穢汚觸刑辟徼倖於萬一老死而後止者則猶賢耳故昌黎韓子之未遇也亦欲膏車秣馬以從愿於盤之樂也去之六百餘年而猶有裔孫曰秀之南牕公某為宋和公之七世孫宋革不言仕國朝以名節强起之辭以疾歸隠於淡滄之上名其居曰盤所盤在太行去淡滄不知其若干道里而南牕名之葢所同其隠而不必同其地也南忩克己風節重其所則愈於愿之徒以不遇而樂其所者也南牕諸孫為恕又能復盤所於先廬壊棄之餘遷其所於海甸之東丘而南牕之故扁在焉固賢矣吾聞恕自幼有大志惟用力於當世者又自知不可為則為不遇於時者之為而不為處穢汚觸刑辟倖於老死而後止者也於愿之賢亦庶乎其近之昌黎氏賢愿而為叙余亦賢恕而為昌黎之歌以歌之曰盤之宫東丘之樂盤之土耕者讓畝叶盤之泉漁不竭囦盤之阻外禦其侮盤之深内潛我心盤之禳實繁我族嗟盤之樂兮樂而安風雨不震兮燹澇弗奸孝以致其養兮義以廣夫急難居饒安矣體愈胖心無憂兮奚有患叶歌兮樂女盤女將和兮攷吾槃杵歌七首杭築長城賴辨章仁令兩郡將美政洽於衆心以底不日之成然役夫之記有不免凄苦者東維子錄其詞為杵歌亟亟城城城亟成小兒齊唱杵歌聲杵歌傳作睢陽曲中有哭聲能陷城自古衆心能作城五方取土不須蒸蒸土作城城可破衆心作城城可慿疊疉石石石㠂嶆立竿作表齊竿旄阿誰造得雲梯子剗地過城百丈髙羅城一百廿里長東藩恃此作金湯舊基更展三十里莫剰西門一樹樟蘇州刺史新令好不用西山取石勞拆得鳳山楊璉塔南城不日似雲髙南城不日似雲髙城脚愁侵八月濤射得潮頭向西去錢王鐵箭泰山牢攻城不怕齊神武玉璧堪支百萬兵不是南朝誇玉璧闗西南子是長城江西饒歌二章陳友諒起兵殺倪蠻子據龍興辨章阿爾威沙公憲僉察伋公合兵破之龍興始平江右諸郡無不欵附至此而武功成作龍興平繄龍興藩西江土昄章國駿龎江有砥柱胡為鴻流降𠞰蠻效尤蟊賊内訌三台映太微國士俱無雙王旅嘽嘽鉦鼓摐天威震赫羣兇􅋏八郡望風咸來降武功既成毋從從聖人南面殿萬邦右龍興平十五句龍興陷日憲史劉䕫懐印埋土中土生瑞木一本察伋被命為僉憲丞購印於瑞木下掘得印來歸伋得印施諸移文遂成恢復功為銀章復維白金有章維國之光九鼎既峙翕元化以張大治范金吐景耀鋩蟠螭細龜鸞翥鳳翔官臣實司之植我皇綱孰亟且藏啓發禎祥操絜係政柄繄徳是將符節允合人文昌蕩攘兇頑時乃康與國咸休萬年膺天慶右銀章復二十句用韻復雲松老人華陽巾歌君不見獬豸不識字髙柱削鐵堅白簡孰辨賢不賢又不見鵕䴊偏尚武髙屋壓虎肩五兵不理長酣眠鐵崕老狂者强項如董宣小巾製子夏正要江東傳人間緋紫揎已蛻風中蟬脫巾漉酒東籬邊吴淞老褐來賀我倒冠共醉春風前我歌此歌君拍手東壺西閬開洞天洞天之鶴為我雙回旋次韻省郎蔡彦文觀潮長歌錄呈吴興貳守雲間先生舞海鳳跳天吴八月十八壯觀天下無蓬婆之山突兀眼前見有如祖龍萬鐸來東驅婆留一箭氣相敵强弩不用三千夫雲蜃成樓不可斬火銕揺識誰能屠招潮小兒不畏死面螯蹋浪心何麤搏桑爛若木枯革瓢古憤無時蘇東維子驚相呼長風破浪未歸去一葉欲事寰瀛圖馮誰之一疋素中有萬里河漢乗吾桴題清閟堂雪蕉圖洛陽城中雪㝠㝠袁家竹屋如箳篂老人僵卧木偶形不知太守來扣扄輞川畫得洛陽亭千載好事圖方屏寒林脫葉風寥冷胡為見此芭蕉青花房倒抽玉膽缾鹽華亂㸃青鸞翎階前老石如秃丁銀瘤玊癭魦星星嗚呼妙筆王右丞隕霜不殺譏麟經右丞執政身彤廷燮理無乃迷天刑胡笳一聲吹羯腥血瀝勁草啼精靈嗚呼爾身如蕉不如蓂凝碧池上先秋零大樹歌為馮淵如賦東柯溪頭三大樹水深土厚厓石牢一株古茶粲冬蘤紅若火鏡鎔氷濤兩株老檜挺霜幹青如連弁翹雙鰲不知人間富貴楦青紫草亡木卒紛如毛漢家根株歴千嵗當時大將誇人豪只今子孫仗大義昧始尚薄巾車勞三槐風雲慶有待二荆湯火死已逃金鴉倒立海底景白鳳夜燄風中膏蟠柯骨露黑石虎竒幹手接蒼山猱惡氛西起白日翳恍惚大將排旌旄東柯東柯濟時具豈無兵家文武韜摩挲大樹日酣卧不肯即偽從鞬櫜始知后皇受命乞獨正神明扶植氷霜操我來飲我中山醪脫巾掛樹三花髙大槐太守夢楚國大梅美人臨漢臯大槲老雄侍我酒長筝亦即金絲槽醉歌寫入嘉樹傳竊比橘頌騷人騷

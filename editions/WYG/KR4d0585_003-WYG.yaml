body:
  text: 序曹氏世譜後序廣陵曹時復以祖父世譜來告曰復以兵變去其鄉己十有七年幸祖宗墳域先人某水某邱尚在兵息將挈家還鄉得先生一言叙其譜庶吾某與後之人不忘其先之所出卒葬之嵗月也按譜曹氏譙國人自幾世祖某徙居于汴曽祖成之又自汴遷廣陵之蜀岡大父某浙行省儤使妣周繼玉宣使君卒玉以盛年守節考某翊正司照磨贈爵奉議汴梁路治中妣霍氏太康縣君太康君善理家考游宦於外子六人皆太康君力教而有立長子時升廣帥府奏差蚤世次時泰爵奉議留守司經歴至正癸巳某相奉詔招討江淮海道相擇從者以時泰行泰奮然無譲歴險涉海鯨浪猝作舟覆而沒相憫其死忠贈某官妻鄭氏子一次時益翰林院典書蚤有父名三淮兵梗奉母及孥脫難出虎口辟地于杭以疾卒妻李氏子三次時晉海道府掾起漕抵京師上多其功賞官嘉禾照磨道海還呉值風舟沒萊州洋妻舅氏霍仲臯女通書史喜讀古孝義傳時貴人有聞其才欲敓其志誓曰曹氏世稱忠孝門妾敢如庸婦人畔名教夫兩姓以辱其門乎卒謝絶之妯氏鄭與李聞其志節相率守嫠而忘他志李氏一子力紡績資之出就外傅使勵學罔墜前聞人世胄諸子亦相率有成三節氏胥有請於復曰願歸故鄉守吾舅姑墳墓且使諸子有耕稼地吾屬死首邱無纎毫憾復之歸計遂決行舟泊吾門霍氏持茗且為吾老妻壽後再有啓曰某不幸三伯氏夭命而某嫂三氏同一守節先生秉銕史筆傳信過國史倘昇餘論奬重之非直三節有恩曹氏一門其有光矣銕史論曰歐太史著五代死節臣不多見得王凝氏斷臂妻一人特表以愧男子之不如者今曹氏一門男有沒王事婦有守貞節非一人得於䘮亂流離中皆不愧凝妻代有歐太史其不在列傳乎萬一遺史氏則吾録之以繫諸曹氏譜亦使亡國臣有不如三節氏者愧云送經理官黄侯還京序今天子龍飛金陵奄有四海版圖歸職方者過唐越漢兵興以來土田阡陌無定籍可稽由是立大司農堂庶土九賦九貢又遣使行天下以經界為重務也而北庭黄侯萬里氏在選中分按華亭履田事事畢還京邑士朱輝為繪田間竿尺圖以見侯勤於王事而敏有成功也持其巻來謁東維先生於草𤣥閣求一言以重其行先生器其人品才氣為相門之後辭不獲為叙其事於圖尾又採民謡為詩一章章八句侯前朝中書右相國孫大參也速公之嗣也譲門廕于弟自起身儤直歴太和縣監濟寧行垣官勾皆有休詧今以才幹履畝于松其報最于上所優賞爵秩茍又分符三呉之地呉民之所望也侯尚以予言勉之詩曰天子龍飛定兩都山川草木盡昭蘇三呉履畝難為籍四海均田喜有圖海市魚鹽開斥鹵泖鄉䆉稏熟膏腴賞功行見承殊渥此地重分漢竹符送山西省參知政事陳公序參政起北魏而歴代因之我朝經綸草昩之初設天下省署凡若干所各以參相主之名次丞相而實則行丞相事也嘻方面之寄重矣茶陵陳公由兵部尚書輟為松江郡守未期月政成天子又選陞山西參知政事瀕行索别於㑹稽楊某某餞之言曰唐蕭瑀參相事太宗稱曰瑀言事不以利怵死懼真社稷臣魏徵參相事天下米斗三錢太宗謂群臣曰此徵勸我行仁義之効也今公在呉元初以鯁正諍朝廷大事不以死懼參議朝章詔令律書糾正切劘垂一代之大典以平日聖賢之學談仁履義匡弼帝躬務致堯舜此瑀徵之才之志也天子簡知天下想望風采也久矣山西剏立方面統州六十有三為南北京腹地天子時廵之所首選重臣行丞相事公當其選吾見其益厲忠藎以答重寄勞徠流移薦進遺逸弓刀遺俗咸襲衣冠入朝宿衛羣元仰給至外戸不閉旅不齎糧使洪武之治出唐貞觀之上公稱社稷臣不在瑀徵之下非某一人之望天下人之望也洪武二年九月二十六日叙是日淞江通判方從善推官孔道原經歴石宗亨祖帳西門外舉酒為公别而令門生朱芾録予文為贐送都督府指揮龔使君序予友濠梁龔君希魯以文武才屢奉天子命出使思播峒蠻等絶域得其要領還報天子天子多其功授中順大夫京畿漕使秩未滿轉指揮大都督府使都督昉於唐行軍征討在其本道者曰大都督大都督帶使持節者謂之節度使外任之重無比焉今制革拒使節度使在朝立大都督府指揮正副凡三十有六貟鏚鉞彫戈山𤣥朱組視古班儀為有加非智足以參朝義勇足以總師干勲勞夙著者不得居是選也天子耳目官有不言者指揮出使得言之指揮之鯁正強直且為天子信近臣非特掌嚴環衛而已也希魯以布衣不十年處宥密地位益崇心愈下競競焉無一毫倨氣矜色君子占其人為右資之原徳重器而况足跡所歴博覽天下之民風吏弊他日衎衎論奏徐吐吾民不平事知無不言言無不當稱天子信近臣是在希魯矣希魯行索言以贈於是乎書兩浙運判王侯分漕序聖天子以南服之土地人民未復版圖不忍加兵選通經練時事者喻威徳使歸諸正於是王侯某以大司農司都事在選中馳傳至呉浙省大臣謂蕞爾之冦首鼠之日又懼辱天子信使留弗遣又明年省大臣承制授侯判兩浙鹽運事分司海上竈萌滷揷聞侯名皆手額慶擕提老稚讙呼羅拜願受其條教退則更相告戒惟令之共修牢盆積薪草准法程石益拓池盪相時率化無愆隂奔湍少一戾期則各知赴功以登嵗課鞭笞愁苦之聲不聞猜禍吏窟倉塲者奸無所宿好譁者或設誣辭汚衊侯侯行愈厲焚香矢于神曰某行負朝廷欺民庶神不吾祐否則有以直吾枉粤晉而譁者死民益駭嘻凡為天子命吏惟誠可以格天微而至於昆蟲草木其感應㨗若影響况于逆虜乎况于醝丁乎侯以中原世禄家為朝廷風紀臣不幸不揚聲虜庭喻禍殉國難及司海上之賦究治本而立行之又不幸為猜禍者所害遂矢於神神報之若響嘻民可欺也天其可誣哉吾悼世之横吏受方伯連率之寄者欺公罔上鍜鍊民以遂其奸天若罔聞者未定故也定則寧有遺噍乎吾嘉王侯之能以誠任諸己又能格諸神録其治行為他吏勸云送華亭縣丞盛侯秩滿序昔西門豹為鄴令魏文侯誨以就功成名之術無他使其取諸人以為善而已耳鄉邑先受坐之士必敬而禮事之又使求其掩美揚醜者參驗之葢以幽莠似禾驪牛似虎白骼似象碔砆似玉此物以似而亂真者取人亦然其得不審乎廣陵盛侯彦忠二尹於華亭下車之初首詢邑士之先受坐者以師禮事之其次可友者以友義待之又必於掩美揚醜者覆而信其人其人之翻覆傾危者逺而去之如避仇敵故其取諸人以為善者不可數計旁及乎方外之士亦所不遺故其為治最績徹上府民之頌聲不歸令長而歸之二尹一考之内三易令長如閲過客而侯安於佐位覆如令長民恃之如慈親戀戀焉惟恐其秩滿而去也嘻二尹之賢於令長也可知矣探其治本則聰明不作智數不自用而為吾聰明智數者取諸人如西門豹而已耳彼三易如過客者其道相反故其優劣之判如此上府才其能賢其徳陞以佐大郡賔省幙又何過耶其去也方外士自延慶而次凡十人徵吾文以餞别故吾樂書其治為侯之贐且為他吏之勸云送團結官劉理問序至正廿六年秋七月東藩呉主行郡縣團結之政選使之郡大參周公躬至嘉禾諸郡而理問劉侯至淞江侯集民年高用酒食禮推擇為衆所綱者萬夫長若干人下至隊長若干甲大小相維叟贈以言歸為國主告古者團結之政葢已見於管仲之理丘兵矣仲之軍令始於五家之軌卒伍定於里軍政成乎郊禍福相共緩急相死此覇國團結民兵之法也然王家之兵莫壯於臨淄蘇秦曰臨淄之戸七萬計下戸亦三男丁三七可二十一萬葢臨淄之民素富而實其俗鬪雞走犬六博蹋鞠車轂擊而人肩摩也故齊之國以臨淄而強天下莫能當世降五李則團結禦冦者適以長冦民有所謂白甲軍者又皆不受令於公家者也梁貞明五年呉團結民兵徒保衛鄉里今侯以文武才畧輔國主之政為國理兵管氏之令其有不可舉行者乎吾將叩侯以呉藩屬郡之民如齊臨淄者有幾哉不則吾懼所結者大抵五季之白甲而已耳於乎後世霸國不患世無仲而患無臨淄之民也吁安得民如臨淄者與侯論霸國團結之政也哉余公參政序參政不見官於周起於後魏隋唐因之亦以職相者或有不及故使參焉職雖下相一等而抗其職者在焉則貳台衡燮元化葢亦行相事矣參之位也不亦重己哉非老成有謨議堅凝而勁正者弗足以居之淮行省在呉門太尉張公實領之參預其政者或出自辟而自辟者非一己好惡之利亦公論之出也秦陵俞公希賢嘗以正諫居參諮幙府諫有不從輒求去凡上公府有大刑政大典禮必先預其議反覆裁訂至當其可而後止府中稱骨鯁臣予聞昔忠肅魯公參大政權貴人憚其骨鯁目為魚頭參政公以參諮府骨鯁參政相垣其不為魚頭魯公乎然昔之魚頭内忠於天子昇平之朝今公匡救於藩國反正之日其糾撥亂邪風力凜凜焉者不又難於昔之魚頭乎嗚呼一邪正之進退一國之安危繫焉惟公之系安危者至以身之去就爭之吾見上公府之有人而淮之民䝉利利及於江浙之民者於公是己予辱與公友樂公有操而期公之有為故叙以言之公必有以證吾言之不人妄也送提控案牘李君秩滿序府控牘官視大郡照磨官不出吏部選而二千石以賔禮禮其人者為其贊治於二千石也華亭以戸口之庶升松江㑹府賦稅輸四十萬自淮兵渡江駐呉為方面松以近輔雄緊為呉犬牙地初以將官帶二千石事馬步帶法曹邇者兵革少戢郡府還牧守而别駕判推尚多缺焉幕有提控案牘二其分寄者豈惟文案哉官民僧道及海塗田土之賦加舊十六戸口徭役獄訟聽斷營造供億亦倍徙於曩時雖府長得人而幕佐乏材長亦不能主辦故其選也必擇才具絶人者居之其責比古長史司馬而功居半刺其罷軟不勝任者不敢覬而處焉䢴城李君實氏輟淮東憲史居控牘于松戸口徭役獄訟聽斷營造供億加以一時濬河築城漕饟之劇皆能相其府長了於從容談笑之頃上不失責而下不寡恩野無怨聲府有坐嘯宜為長所賔禮異於罷軟不勝任者今秩滿去長如失其友寮如失其師民父老如失其蓍蔡衡石其行也張于西闗之外父老談道其能且賢者謁文于㑹稽楊某以祖之予客松耳目其贊治者與父老之言合於是乎書九月初四日其交承維揚秦文繹彦思求書上軸送張先生赴河南幕府序昔孔門諸子言志有勇士有辯士有聖士之分而聖士始可為王佐才也子路願得白羽如月赤羽如火鐘鼔者震天刀槊者連地將而攻之前無敵國夫子許以勇士者其人也子貢欲素衣縞冠使於兩國之間不持尺寸之兵升斗之糧使兩國相親如兄弟夫子許以辯士者其人也惟顔淵異二子之撰願相明王使城郭不治溝池不鑿隂陽和調人物繁阜鑄庫之兵化為農器夫子許其聖士者此也余為之嘅然曰聖門諸子不幸生於亂世而有可以强兵可以排難可以宰天下而安百姓者其才無不備由賜之强兵排難者隨才以見矣大不幸顔淵之相業不見於時也吾嘆今世果無其人乎抑有而無國君以主之乎吾不得而知也廼者河南省詧罕公以天下大將軍佐天子中興不逺數千里起張先生某於天台鴈宕之間先生隱居避世學顔淵之學者也學顔淵之學則志顔淵之志今赴河南繇之見明天子將以顔淵子之望望其王佐之治己吾聞河南公幕府有君子營者五千人奮長㦸盪三軍如由之能者有其人矣謄辯舌代甲兵如賜之能者亦有其人矣顧未知銷兵為農器撥亂還王道者有其人乎無也果無也吾於先生屬之先生能展顔子之所能使由賜其人無以施其能則河南之業成矣先生之志行矣慎勿曰蘭茝不與鮑魚同肆臯䕫不與逢比同時送張憲之汴梁序㑹稽張憲與奉元趙信俱㳺吾門二人者各負忠義之氣經濟之才而未遇大知己以施諸行事也至正甲午憲嘗以布衣上書辯章三旦公公竒之列置三軍之上出竒料敵言一一中表為某官非其志弗就乙未春冦復䧟常湖又以䇿干苗部之總兵者不能聽輒去嗚嗚泣下釃酒祝期偉人佐世太尉張公聞憲名辟以行人俾㳺說江東且輸米于淮安來别曰憲行必見察大將也得吾師一言之教憲有以藉於察公矣予聞唐相臣裴度之佐主中興也延攬遺傑恢復失土入懸匏者以愬之勇獻徳棣者以耆之辯一武一文各適其用此所以成功之易也今大尉人期為唐之度也豪傑歸之惟恐後顧得一二耆愬已乎倘得昇冦不足平矣信既行予以愬期之子復踵往耆之所長當屬子己子勉之使大將之門三千客中十九人内稱有趙張兩竒士豈惟光吾門也哉送倪進士中㑹試京師序華亭倪中字徳中予在璜溪時嘗從予遊於學有異能解行修志立一時行輩推服之至正壬寅浙省貢士三十有二人中名上㳺明年㑹試以病不行今年丙午㑹試于京優其蹈海而來者即奉大對倫魁又不限南士天子親以制科䇿于大夫詢以時政之急中以極言骨鯁應之其為漢南第一人必矣自兵興來士氣不振將二十年朝廷貢舉未有卓然輩出追隆延祐泰定之盛授牒以出者類亡治狀至是羾牒換繻更晉取逢呼吸折節以賣其所自出若是者豈徒辱科其辱國甚矣自漢舉賢良榮以仲舒而辱以公孫𢎞唐舉進士榮以陸䞇韓愈而辱於皇甫鏄王涯之流宋舉進士榮以韓琦歐陽修而辱於丁謂王介甫之輩於乎士之出於一日塲屋言辭俯仰之頃遂為天下後世成敗毁譽之繫如此此今天子之厲精發情而親䇿于大夫務得真材之用也甲上第句科以之榮國以之華者吾有屬於中矣中尚以予言勉之期無負予師無負予明天子也送華亭縣主簿張侯明善序天下錢粮計所百萬而呉為最呉州辟計所百所而松為甲松兩邑華亭上海嵗亦一百五十餘萬自張氏來兵賦繁興民力癉矣重罹錢氏之禍羣萌凋䘮流走者十六七今逢聖明統有南北首立司農經理土畝慎選守令申以農事所重在乎國賦也守令于松者往往如履䧟穽則以民貧賦劇律之簿責者甚嚴而恐恐乎咎之及也郡守林公下車未遑他事首以國賦為第一義攸屬之官與以期㑹申以賞罰而華亭主簿張侯明善所分堡社督力有方獨奏先集之功堡父老無怨言且羣謁鐡史先生乞文以送之予喜侯為曹濮公卿之胄青年敏學有治才盍侈之言而况重以群公之命遂為叙其事而以詩四章淞租一百五十萬比似他邦十倍過不是乗除贏縮妙催科下下穽人多白粲紅鮮百萬艘張侯三法獨稱優黄堂賞罰明懲勸綵帳旌功第一籌道不拾遺戸不闗田萊盡闢驛橋完金陵天使如相問此是蓱鄉好宰官風雲有路開騏驥枳棘無巢宿鳳凰東閣相君為座主便從玉筍賛當陽送譚知事赴河南省掾序濟南譚君清叙由奎章閣屬吏授儒教再轉而為平江路知事於幕貟在經歴左然吏抱牘進不涉其筆長不敢先事故府中事無鉅細得持可否君參幕貟以來議可贊不咸一一當理府疑比未決輙就諮訪吏伏民隱未露雪又能發白之同列風裁以君振長官賔對以君肅然猶以不得行平生志為慊慊年考未滿而河南行省辟為屬掾濵行呉人士為祖帳西風門而乞余言以為君贈予惟今之負才而仕者往往限資格以為進退而吏部於恒格外崇選用之科或一再嵗輒遷甚近者或七八月四三月未嘗有及考者吁用賢法當爾也今譚君暴起身閣史不二十年躋七品秩贊留守佐行垣非其才名操行足以遭於時而行丞相府又推中朝選用之科為急賢之務曷致是乎夫河南為省控要㑹於四方禮樂文物海内之所瞻而尚焉者也君出贊重俾政令以成行丞相方面之功亦可以少伸所用矣用彌大聲彌振中朝急賢者又以選用法㧞而進之由是以佐相府者上佐當宁以大流惠于天下豈不在譚君乎哉惟君益勉所至以答所選而已耳至正七年十月廿有二日序送陳汝嘉漕掾秩滿序國朝入仕之門莫尚進士科然士之懐抱才藝者不能人由科而進也轉科之業入司櫝吏為起身者制書亦許之故儒者以司櫝吏積勞而階於宰輔者亦往往有焉不必其劣於進士科也華亭陳汝嘉世業儒始以文學自奮躓於塲屋於是用毘陵郡侯薛公之辭為司櫝吏及考漕府復以汝嘉之才復辟為案櫝之司今復書考又將轉之於帥閫過此則陞省垣入流品官州縣而有民社之寄矣吾聞汝嘉之吏于郡也廉而克勤佐其守以行者歴歴可稱道居漕府也屢駕風舶涉洋海周之以智慮濟之以忠誠故調粟至京如履砥道而往功㨗而數亡折閲上所眷其勞而賚之者甚厚嗚呼以汝嘉既往之行觀之則將來之績葢有可言者己汝嘉年方強而志甚逺循格而進都窮秩食厚禄可指日俟况其材實益茂聲猷益大執政者一汲引之踰資級而上則世之以司櫝吏起身階至宰輔者吾不敢以之期汝嘉乎惟汝嘉之母曰吾不得上賜進士出身為儒者詬病吁彼進士出身庸詎知其踣而不得峻躋其格極者又豈少也哉其行也呉之大夫士咸賦詩以餞之而取余言為序首云至正七年秋八月廿有一日送陳仲剛龍頭司丞序番易陳君仲剛由貴溪主簿遷浙之龍頭鹽司丞見余錢塘以令嘗令於亭請曰君獨無言教我乎余曰治莫難於亭也久矣治農者農出租稅視旱澇有所蠲置治亭者異是嵗集盈數約以三伏伏計以旬旬虧則簿責嵗虧則禄奪爵貶其著為令甲雖飢饉之年雨澇之月不得以妨工控愬此職於亭者之難為也漕府飛符蚤夜下督責吏火急如律零吏鷹擊毛摯徵其私者甚於公而亭益憊矣亭官出語為亭地即以格令甲坐之即坐又不得損職去被繫徽纒如胥靡之徒故職於亭者往往不得不蛟蜃其性牛羊其民人苛誅趣辦以為竒功且可擅名聲資進取豈弟仁厚務為善政覆不足為賢而重得咎禍然則鹺無善政勢端使然也君豈弟仁厚人也善政施于貴溪之民而移之於亭得無法乖其政勢格其志耶然而君子為政與其不得譽於上或者苛誅趣辦為竒功不知其下之病而上之累益甚矣故鹺病至今日而極非亟理其本雖筦桑不能善其後也大司農方思治病之本減估直以通民食蠲羡額以舒亭力截日更新吏専選㢘良勿俾苛刻者重病之君新吏也奉法順流與亭更始善政之行適㑹其時矣司之令豫章胡君余所善更以余言講求其本末異日課浙鹺最者不與龍頭第一將誰與東維子集卷三欽定四庫全書東維子集卷四元楊維楨撰

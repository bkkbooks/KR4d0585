body:
  text: 養浩齋記淞之南陸氏代為衣冠望族有佳公子彦章者生而有氣節讀孟子書至養氣之論深有槩於心輙自命其齋曰養浩介其友郁彦學來見余璜溪次舎求一言為誌予竒其人而為之言曰戰國之士以氣雄者多矣而未有言浩然者獨孟子言之其氣即天地之氣也善養之則吾之氣也至大至剛可塞乎天地其視北宫孟舎之役於氣者僅匹夫之雄耳孟子之言是氣也人皆以為夸千有餘年子蘇子者始信之其曰是氣也卒然遇之王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯盖有不依形而立不恃力而行可以叅天地而闗盛衰者吁此聖人之能事也閲三百餘年人又疑其言之夸而彦章氏者信之彦章不敢暴是氣而又得其氣養也故能處富貴而不滛居患難而不懾則彦章氏之用是氣又豈北宫孟舎之雄匹夫者可以同日論哉養之充也無一日之餒也雖聖人之能事不為難彦章聞予言而喜曰大吾養浩者先生之言也請書諸室為記且有以告人之疑吾夸者云書聲齋記余客淞㳺亭林尋所謂野王讀書䑓者已夷為隧隴化為草棘去䑓之西北十里近為璜溪溪有義門夏士文氏嵗聘文行之儒為子弟師六籍子史下及百氏之書凡數千巻皆架挿下頓為廡西之齋童􅀢鴈次蚤夜諷誦聲徹行路因名其齋曰書聲而求誌於予余聞魯恭王入孔子宫聞金石聲而宫不壊漢髙皇過魯聞絃歌不廢而邑不殘書之聲感人也如此孔子之武城莞爾絃歌亦為子㳺喜夏氏書聲聞于承平之日未為竒也而聞于兵戈格鬬之頃非一家之曲阜歟吾為吾道在東之廢慶已雖然士之讀書也内以治身外以治人沈潜其中之所得以䆒觀道徳之㣲性命之懿以極夫禮樂教化之著胥於書乎出也豈直務聲而已哉不然誦習之日積極詠之弗知則其書之有聲聲於出口入耳者雖工於洛生之詠吾無取乎爾矣士文尚以余告勉諸弟子師師以余言勉諸弟子云至正庚子秋八月初吉記著存精舎記璜溪吕孝子曰恒曰恂塟其考君來徳公于漂水之原治冡域如法冡前甃文石壇及隧道樹以椿桂栝栢又並冡為精舎以奉春秋祭祀祀必親眡牲噐不以屬人俯仰齋慓如親見其先之亨者雖嵗月去逺為之悲慕不已名其舎曰著存參政周公琦為篆諸扁以記請於余世宜墓祭非古然孔子冡孔里魯子孫世祠其冡不廢則墓祭有其所祖矣自廟制廢而上冡之禮重乎漢人史傳書以為孝子之榮近代卿大夫官儗王者而祖禰神明之舎則漫不加意至有即宦上以為家遂棄墳墓千里外過家上冡者亦罕矣滛昏之鬼則祀之如其先不以為恠烏乎俗之壊而士大夫之不振若是幸有神位主於冡舎時節不失其所祀授古祭義致愛致慤以存著其所不忘如吕氏兄弟者盖寡矣又懼其易世而著存者替籍恒彦以垂其規於逺乆俾勿壊豈非世教民彛之在猶有所繫哉是宜著存之可書而吕氏兄弟之事為可録也予方提學傳司禮之廢者將與士大夫講行之吕氏兄弟嘗從予學者也尚以予言力返廟制使四方觀禮者於吕氏乎取法而士大夫之復禮者自吕氏始豈非予之所望乎至正庚子春正月八日記西雲樓記雲間李氏以西雲銘其讀書樓求志於予予曰爾家騎鯨公夢長庚而生長庚西方白虎七宿也故名白字太白太白以星言今不以星而雲言何也則亦有説在易之小畜曰宻雲不雨自我西郊彖曰宻雲不雨尚徃也自我西郊施未行也雲之積不厚不足以澤物小畜為卦以風行天上一隂亢五陽所畜既寡施何自而行耶西郊之雲施雖未及於物尚徃而不可止也故上九曰既雨既處尚徳載物徳積而施行如上九之積厚而雨降事業盖未易量也抑余於天人之事有感於西雲者西雲儒而通天文學者也今太白食昴西方事也天狼獨歩東南白虎伏而不動九斿掩旗七將歛手縣弧服矢不敢東向而射者十年于兹矣妖氛奪奎璧熒惑守井鬼太隂宿室畢之墟太陽食己未之月亦西方事也下民所不忍仰眎西雲計何出撫髀歎曰願以先王之學上從六龍以飛庶有以霈洗天之澍於東南也先生姑俟之至正庚子立春日戊戌記野亭記有詩雲間沈鉉氏世家為郊闗之外其聚為溪之上皆壙埌之野於先廬東介披蓁薉蒔花竹築亭四楹中置文竹榻白木几茟床茶竈棋枰書庋雜聚其次時與一二同志友觴詠其中顔其亭曰野集賢趙公雍為作篆善之又介吾友陳栢謁余七者寮求記予謂野非直郊外名也聖人嘗以比仲由而又欲從先進之野盖野而畔教聖人所嫌野而勝華聖人所取鉉之野何居鉉曰某之野郊外之名耳烏知聖人之去取哉雖然聖人論野為質鉉將論野於趣乎趣乎非樂處於壙埌者能知乎唐丞相裵公嘗堂於午橋而名野矣是厭政於朝思野於野豈真知野之趣哉知野之趣莫孟真曜氏魏仲先氏若也鉉不敏將尚友於孟魏氏云予韙其言又重栢之請録諸亭為記繫之詩曰孟郊得野趣野有真曜廬魏先得野趣野有野堂居雲間沈東氏草衣傲野夫東屯田可種西壤水可漁門無索租吏家有種樹書野亭開草樹野具集朋徒試問朝市宅傳舎不須㬰朝恩來鐡券莫死已屬鏤始知野亭野廟堂如不如野政堂記淞中張氏海道相門參政公之三孫學優而不仕自號一村又顔其所居堂曰野政予過淞中有請曰唐陳𢎞嗣嘗歎漢王丹之化行農野舉聖人之言曰是亦為政奚其為為政𢎞嗣隐居武山嵗辟良田時乗平肩轝訪田更餉田畯白露時降新榖既登則崇禮教親九族驩郷黨郷黨有媮衣苟食佩刀劍從事乎推埋胠篋者皆耻而弗為𢎞嗣氏之化盖亦不小於丹矣予竊慕之故於耕舎扁野政幸先生有以言之予聞中父仲甫公能以孝友理家而中有克以野政相之君子之談政者豈必被三公服坐政事堂發號施令然後為政乎政之出於野者覆優於彼之失於官者失官而失士失士而失民遂至於失身其於無𦵏地也而中之優者無間於昆弟之言無遺於宗族郷黨之譽委貺於後之嗣而益光於前聞人絜諸執政之失者其相越豈不萬萬乎陳子昻推𢎞嗣於龎徳公鄭子真之流為作者五人之列若中者吾又將問之於五人者非當歟中謝曰吾志𢎞嗣敢朢龐鄭請書諸舎以警云至正二十年二月初吉記尚志齋記孟子曰志者氣之帥也氣有猖狂暴悖人不得而制者唯志足以制之其闒冗衰退不能自立者亦唯志足以率之故又曰士尚志士而不尚志其不為猖狂暴悖載而遷闒冗衰退靡而沒者㡬希矣訓詁者曰尚如尚服尚車之尚盖尊而主之之詞也然人之志有不一也論者以志道徳賢人之志上也志功名壯士之志次也志貴富鄙夫之志其下也然則志貴於尚而志不可以卑之而下也夫多岐百出而南車壹志之趍也萬物俱流而金石獨止志之定也志失其趍何以尚為不失其趍然而弗底于定又何以尚為吾北門之外有青年而好學者曰施用和生長市闤不與其習俱而獨從儒先生㳺慱習文藝修省履行且以尚志名其讀書之齋予嘗領客邸齋所市聲在門市言在肆而用和秉志弗遷修習於其齋者自如也非其志之不失其趍而底于其定者哉吾知用和之克尚志不卑而下也信矣苐未知賢人壯士之所决何如耳用和曰功名時來則應之人無予我無取也道徳者聖人之能事吾所為志之始而終焉者也吾為之交手在額曰懋哉用和推是志以徃然而不入於聖賢之域則吾不知也用和出紙求識齋遂書為記復繋之辭曰氣易我移匪志曷持道難我至匪志曷之既持其移卒造其至尚其有大於斯者乎朱氏徳厚菴記華亭縣朱涇西其里曰大興有林麓魁然竒蔚然秀北帶乎九山前襟泰川葺泖之流環連璧合鬰䓤之氣不沈不越而物有鍾羙朱明仲之祖塋實在焉自大父誠父顯忠祖妣沈氏妣丘氏庻母氏氏皆合葬其所明仲既奉大事于其先復立冡舎若干楹捐田若干畆命廬塜者掌之以供嵗祀事祠曰昭明昭其物也齋曰肅敬敬其事也又奉聖人終逺之訓総命其冡曰徳厚尚書公泰不花氏既為篆而顧之而又介予韓生奕來謁記予為之喟然曰淞國地無髙陵燥壤為民之終管子陵為之終徃徃人終其親不諸水火則寄諸浮圖氏之室雖衣冠仕族或有不免豈復以先徳為念而戒懼於其終與於逺耶間有權力家知治丙舎以為薄俗之惇大抵文有餘而敬不足至閟其珠玉華其藏不惟亡益於教句誨人以奸貽神以􅓍吾不知其為厚也仲明儒者也知聖之教而奉以㒺墜終易忽也必慎以存焉逺易絶也必追以屬焉欲報之徳昊天㒺極吾心以之􅇶愓以之焄蒿悽愴者皆天也吾心之天不沒于是則吾親亦不沒于是朱氏之慎也追也天於已而持以為訓也天於人朱氏之徳吾知其可以惇俗之薄矣抑聞朱氏之先理家以義方為首故毎焚香禱天不願子孫富願讀書而賢仲明又喜聚書不逺千里聘碩師教二子雖盡傾橐金弗以計其心可以對其先矣今老矣而修徳弗勌徳益厚而福澤益潤朱氏子孫其有名世者作矣矧其教之力乎立身揚名以圖其孝之大者以報徳厚是在朱氏子孫吾未老尚及見之以徴予言之不誣也己丑春三月記碧雲軒記四明俞南浦氏僑居霅上有才氣而不仕静讀書於一軒若無心於世者而聞天下之魁人傑士則不逺道里願納交焉其所居軒自號曰碧雲嘗得待制清碧松公所𨽻古書一紙而又謁予為之志夫雲天地潤氣也神龍挾之以飛不崇朝可以雨天下然其慘舒消息不恒肖象而變幻者不一如輪如騎如旒如盖如流水積石如赤鳥白鵠蒼龍玉虹之狀萬萬不可究極自其忽而逝倐而還翩然而颺凝然而止則人且目之曰閒雲突焉如峰赤焉如火費雷霆之軀苐空林樹之傒望則目之曰旱雲至其引而自髙於風塵之表海島之間非烟非雲作為光恠以動盪人目則又曰卿雲綵雲三素五色之稱而碧雲者則五色之一耳嘻天下蒼生顒顒焉望之作霖以甦枯注涸也其於碧雲也何有乎何無不知世有長徃志登髙眺逺俯仰今昔或有凝佇所思於交際契濶之間者必於碧雲以見之南浦氏不仕而有髙世之志而又喜交天下之魁人傑士其悠然之意不在是乎抑予聞南浦有道術二十八㝛在胷窟者時出而化為麒麟鳯凰蛟龍􅆛犴狐狸鳥雉之物逰戱碧雲光恠中為人談天下之吉凶悔吝聞之者推為神人則知南浦之碧雲非塊然天外物也今之士有食人之食而怠若事惟便利其私圖自謂得計而不知天羅及焉又有奮草莱出大言亡治狀冐儋珪組以充醢具者其紛起未巳南浦民見之其亦俾二十八禽飛而語之於碧雲萬仞之下其可也南浦咲而援琴於軒曰吾目且送吾雲矣焉知許事松月寮記去秀之西門外州里所其聚為濮市濮公子仲温氏之世居焉居有前後邸第義庄塾以教養里之才子第仲温自㓜從師學明經既通尚書後學易又從余學春秋兩充郷賦連不售適又丁時變遂去道士冠裳尋山澤間欲挈妻子為鹿門之舉事未遂則闢寮一所植松數章髙秀蒼古若深山木客之出在市㕓仲温與之俯仰嘯咏若友焉天清氣明月在松頂仲温弹獨絃琴松下琴餘讀道書作逰仙吟不知身世在黄塵市在白玉宫闕也遂以松月道人自號雲間盛懋氏既為圖之而又寄自作松月詩一觧於余徴文以為記予為論積隂之氣清而乆者在天為月麗月之清於物之秀者在木為松桃之得於月也清而妖栁之得於月也清而盪梧之得於月也清而凄梅與竹之得於月也清而癯惟清而秀秀而已野者松之得月以此然得松月之得而見諸名人者自唐常建後未聞其人焉建之詩曰松際露㣲月清光應為君嘻此建之得於松月者未易與俗人道也去之五百年而仲温氏復得見之得而其詩有曰丈人夜開闗凉月在松頂此其得於松月之得者奚减建也哉嚮使仲温氏蚤時壅官或至五年十年即不壅不過汝趨𨽻唯以奉所氏志不直達而性先有損其及人境兩㤗哦松哦月而有得哉嘻仲温氏之彼此失得其有能辨者已書諸寮為記至正十三年七月七目七者寮諸叟記有竹人家記安陽韓君諤築室於所居之浴鵝沱上左右皆植竹因顔其室曰有竹人家一時名士大夫咸擇行軰交其人至或載酒肴以抵其所呉興趙雍為作小篆之書又為作人家有竹之圖余既賦詩圖之上復遣書再四以記請宋蘇公軾曰不可居無竹無竹令人俗至拄杖敲門尋有竹人家吾不知有竹之家皆能真有其竹而免於俗者不也嘻公之得在竹耳固不計人家之俗不俗之能有不能有也今韓君之家自命曰有竹吾知其能有竹矣一妄庸夫曰有竹居而竹不為其有也吾試詰其所有則謾言曰吾擊竹而歌不啻擊珊瑚也披竹而咲不翅披琅玕也簟筠而臥不啻茵虎豹煮萌而食不翅庖羔豕也嘻有竹如是夫人而能有也吾觀韓君虚中抱道有竹其心貞標絶俗有竹其性善建不㧞有竹其本離立不軋有竹其朋徳音恊鳳凰或思沾露霜又有其應律之聲格瑞之靈也韓君之有竹若此其亦異乎人之有者乎不然韓君之家與妄庸人者同曰有竹而竹不為其有也雖渭川千畆之富徒以等燕秦之栗林齊魯之麻枲而已耳竹何有於家而家又何有於竹哉然則韓君之有竹不徒在其家也諗矣書諸室為記至正十三年九月十二日春逺軒記余曩居會稽於清明之春登秦望蓬萊諸峰望數千里廣輪際海而止一鱗介一條繇與都人士女靚粧麗服生長太平山川間孰有荒陬逺鄙之間因憮然嘆春之逺後計偕上京師得歸逰覽度居庸陟龍虎䑓下視齊魯晉宋荆秦呉越之虚民物熈然如在春臺者了無畔岸余復嘆春之尤逺殆與我皇元聲教同一逺也自淮汝兵興南北旌旗相朢於千里百里斥候之次給儒而行即抵墻壁思昔之週四方跨八表窮目眎足力弗既者不可得已雖然不逺者提封之迹也一氣為春者豈不逺哉知春一氣之逺則心之有春者未嘗不與之逺也雲間鍾和伯温築室于山之東麓顔曰春逺請記於余其亦有感於今日之春而不計其地之逺近者歟不然杜少陵嘗言春逺矣何獨於柴荆見之歟是為記至正庚子五月朔旦東維叟書叟者李忠介公榜賜第二甲進士今奉訓大夫江西等處儒學提舉楊維禎也春水船記滄水主人壯年桴于海晚家居結樓滄水之上蓬然若舟海水時抵階下放目樓上一白萬頃人眠其蓬然者一葦耳因命曰春水船主人垂釣于枕濯足于床波與天上下渚鳬汀鴈之相因依不知船在水耶陸也酒酣仰臥其上家童數十善為越人擁楫之歌主人又自歌小海為舉足扣舷以節之水光天影飛動几席籟聲與潮汐作殷殷在足底滄洲仙有駕凌風舸以激水如箭者彼徒以舸為舸而未知吾居之以不舸為舸也以為舸則未嘗去家以為居則嘗有行色也朝呉編莫越户心無適而不可又孰知吾船之纜之而住負之而走也昔者太公嘗以漁釣欺天下而天下施知之其舎魚也欲盖而彰也嘻以為非漁則持竿五十年矣以為真漁則未嘗得一漁焉嘻太公固得於漁不漁之間者容詰主船以為真船則居陸以為非船非箬笠之前皆漁樵推罵之地又安知吾之在樓非長乗舴艋也今夫天一大春水地一大船也人在船不悟悟者必在船之外吾悟船獨不在外也嘻此不可與家人道也春水如天船在天耶水邪而况在樓邪認吾船在樓又何異認劍在舟刻耶其扣舷之謌曰滄之水兮如天叶滄之屋兮如船舷水滔天兮以春船之載兮薄夫天津索吾船於津之表兮吾得與泰初而為隣客和之曰若有人兮舟為家叶著土不住兮養空不驅泰和我海兮鴻龎我湖吾不知貫月槎之徒兮天倪舟之徒歟主人為汝南殷徳父氏客為鐵篴道人會稽楊維禎也至正十年春三月三日記松月軒記有詩積隂之氣清而乆者在地為水在天為月也木得水而清之象滋焉得月而清之氣麗焉月一也木之麗其清者其材品則有不能不異者也桃之得於月也清而妖栁之得於月也清而蕩竹之得於月也清而臞梅之得於月者清而孤荼䕷海棠之得於月也清而怨惟清而埜而又秀也松之得月以此呉郡西門之外其聚為吾閶闔之闠夫差王夏駕之所也五方大估咸輳焉為積居之家者比比耳獨吾郷人呉彦昇氏居不離市而門有散地數十弓上有青松數十挺髙秀疎朗若深山客將儔挈侣出飲乎市而盤礴于此也天空氣清月在松頂彦昇或領客坐松下仰見閻摶根株盤白玉兎臼人世斧斤不可斸已而顧影在地萬􅄜在空鈞韶鳴而龍鸞舞也不知身在此玉闕中與黄塵市訖有得於松月者名於其軒少蓬李公嘗為圖之大蓬泰野公又為篆額之又求文於予予以素為里閈不敢重違其情而彦昇之人品才氣可以仕而不仕者與夫尊師樂友化龍斷之俗翕然於禮義之趨者又吾之素與故為之記且復哦以詩曰丈人愛青松手植西門内風聲度玉笙林影翻朱鷺仙鬼夜讀騷木客秋吟句丈人燕坐餘海月生東樹水竹亭記吾里白湖方義門子弟咸秀傑名仕版而予泳道父其尤者也始泳道未遇貢舉時實以才志自奮於京師貴人咸品之連延譽上所即被内選出司牢盆民奏㝡典大縣細滿歸剏水竹亭先廬奉親之隙出與賔客接幅巾野服命僮抱琴尊之亭所相與把酒説詩父為事窮亨淹速一不以屬意一時文章家多為記詠為既充又索叙引於友人楊維禎維禎嘗聞其論曰某讀南史書稱㑹心不必在逺翳然林木即有濠濮之趣未嘗不嘆以為縉紳閥閲豪族大官捐千金買佳園池崇美屋其中育以珍禽竒獸樹以名卉異木論其一時侈盛平息侯之甲苐無以喻其雄河陽梓澤之形勝無以喻其浥也然欲求一日之安於是不能得也故予一亭費甚約規甚素取諸水竹者甚廉而其適安之樂自謂過之百倍不翅也人有志於適安者不敢如是耶余以泳道之言似矣又將有進於是者何居夫髙尚于埜以草木水泉驕其君而不出者狷者之為也既得志而患失之退以竊狷者之樂以為樂又媮者之為耳媮與狷皆中行所不與泳道於道務中行則狷與媮不足告泳道者今夫水散也有雨之徳焉積而厚也有負載之功焉君子觀於水也思夫澤施於物者竹有貫嵗之節不易地之性焉君子觀於竹也思夫貞一於已者若是則泳道之登髙也取諸物以賛乎已以及乎物至矣又豈徒草木水泉之適云乎泳道尚以余言思之以為何如也東維子集巻十六欽定四庫全書東維子集巻十七元楊維楨撰

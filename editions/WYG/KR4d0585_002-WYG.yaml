body:
  text: 序送帖山提舉序天下之仕莫難於司杭征也嵗一辦額賦十鉅萬雖輦轂地宣課者不贏是無母錢以為之本無旁司以為之倅嵗無論風雪隂雨水旱兵燹懋遷無通不通臨制者月鉤季校額稍褪即戮辱其人不啻罪姦偽且不得以他故愬其法外無漏内始獲於是宻立闗纂使亡頼㳺徼絡繹而鉤欄之其故脫而漏籍為游徼資者殆且過半蓋制無課吏禄食俾就食其征則不可責其人之不盗也又其漏者多勢要者不幸一敗獲不一日二日用上官令追呼脅持不從句挾衙校羣小竟排戸􅐰其推去如取寄物賦之䧟而不登類此間有不畏强圉誓以文法律人人即中傷之且入官五日職輪課綱一署其帳厯勢不得登醇白自引於亡過之地故吏是者潔入汙出號投墨海完來殘去號入火獄故曰天下之仕之難莫難於司杭征也今幸肆大之恩若洞見其難狀舊之積䧟既一日而蠲除新之日賦又據實而取焉使墨海火獄而復有潔白清凉之日於是舊官如帖山氏者始尋與吾徒給解而去吾既酌之酒為彼此賀而又過求余文故道其不幸於難仕而又幸其得殊恩而墨海火獄有潔白清凉之慶也於是乎書送闗寶臨安縣長序北庭闗寶氏擢春官第天子賜進士出身徃監臨安縣以嘗從余逰且余同年徳流公之子也過錢塘乞一言為别余告曰方今盗起淮潁間挻禍於江浙民耗於兵興罷於奔命者四三年弗復休民之良胥䧟於盗招之而未歸嘻豈吾民之樂為盗哉撫字乖而饑寒之偪也水旱相仍而田不減賦妻子相流而農不息徭其被害之原懸於州與縣州縣不聞之府府不聞之省臺借或聞而不信以至吾民財竭力窮財已竭力已窮而賦徭愈急徴求愈繁民死道路者相藉幸而生者其不去盗也幾希生時百里邑為試政之初當推其情曰上恤乎民則民吾赤子上不恤之則民吾宼盗也不可畏哉邇者皇帝下明詔哀痛遺民誠以民為邦本而本不可使戕而耗也蠲之以賦寛之以征裕之以力凛乎若朽索之馭六馬且申誡守牧者務在康濟生民上承明天子之徳意下軫吾赤子之困窮招㓂於民慎勿驅民於盗吾將見疲者甦流者復休飬生息以還中統至元之治必自臨安始也生以余言勉之送龍孔陽序士有行年六十而强力如三二十人居貧困不支而恒如富盛人曰番之龍孔陽也今年客錢塘吾嘗與之徃來見其才氣學識甄綜天人議論古今要害以節量天下之成敗治亂如鏡照蓍卜如孔鑰勘而左劵合也蓋可附諸古豪傑者而與今之豪傑盗虛聲以誤天下者葢異日道也然而急材者弗之舉也使之蓄其有而無所於施則取文墨氏筆櫝以代司㓂之斧鉞誅伐古之憸人諛子以警今之似者吁此孰使之然哉乃至正乙未秋八月中書兵部黄公昭承天子明命出弔民江之左采天下之言以選天下之才吏其於豪傑之遺去者意氣足以徠之權力足以振之吾將賀孔陽氏之有賢知己也無幾孔陽來别曰余不時與子相嬉娛矣余槖鉛槧已偕黄公計吏卜明日行子何以贈我吾偉黄公之能得孔陽而孔陽之為黄公得也則為之言曰天下無事中材奉三尺而有餘天下多故則雖豪傑應變而不足安危優劣之相縣而一時人才之所值者真有幸不幸哉今天下亦多故矣人才非幸之時矣行矣孔陽毋自幸也重為我告黄公曰㧞一者孔陽拔類者亦孔陽蘭悴而蕙傷鵠舉而鴻悅類不類吾將問諸黄公黄公問諸孔陽送慶通公翰林承㫖序承㫖非古官始唐以文學士備顧問出入侍從因時叅謀議納諫諍署以翰林遂號内相惟承㫖尊為東閣第一人誠以其人老孰故常練逹當世之務凡天子機命内外宻奏朝廷有大議擬廢置不時豫他人者承㫖得専受専對而安危成敗之决在焉吁仕之重若是而世以承㫖為安老置㪚不誤設官意乎至正十五年冬江浙省平章慶公拜翰林承㫖東之人驚相謂曰朝廷以江浙為東南大方面㓂盗日横楮幣日塞民日不聊生天子授公宻命賜五絞龍衣金䨇珠之符俾専理東方以便宜行事假以嵗月期其克有成功遂陟相位巳日廼今一旦挈而置之㪚地於公優也東人何恃耶會稽楊維禎為之解曰朝廷以公世臣且負重名天下出釐東土島夷革心猫兵受令文恬武熈折衝千里於笑談尊爼之外吳越遺民不見兵革者幾三年可謂無負明天子東方之寄今天子内治益切歸公於東閣葢有寄之重於東方者已庸詎知承㫖非安老而置㪚承㫖非安老而置散則有任天子之重者公知之天子知之固非安老而置散也的矣公之行也傳提舉王本而下為謌詩凡若干者推余為叙余不辭亦欲使公知東南之士有知公之深者固異於東南之人也公燕見天子時天子或問公以承㫖於東南士論為何如則吾文可出矣於是乎書送高都事序傳稱子産為政其所能者亡他句能材彼其人焉而已耳材彼其人句人各能其所能而子産之能無不能矣禆諶能謀子太叔文而能行馮簡子能斷大事公孫揮能知四國之為且一辯其人之族姓班位能否又善於辭令子産問四國之為於子羽使禆諶謀而簡子斷然後授太叔行之是以鄭無敗事子産善於材使之力也江浙平章左畣納失公徂征淮夷總制於金陵急以材使人才為首務曰善謀曰善斷曰善行而善辭令者皆禮羅於幕府使各竭其所能此子産氏之善於能人之能也高子令之秀而文者也又善知四國之為與其人之族姓班位能否而善於辭令者也是高子一人而兼古者二人之為此總之者之選於子如子産之選於太叔公孫揮也宜其有補於總制而總制者無有敗事都之以幙府元僚不為過己抑余有詰於高子者今日之兵有曰貓曰鶬者罔測甚於㓂兵知以貓鶬禦㓂不知以㓂待貓鶬既有烈於㓂者吁知四國之為而辨其人之族姓班位能否者其有不察於此乎不察不智察不言不忠言不力不勇總制之稱善於材使者疑不若是故於高子申以問之送魏生徳剛序庠序師有主教其次有正有録正録而下有訓導訓導出主教自辟或提學官以物論推擇之位若卑而其人之徳行文學則主教者之副相也主教其人或下之非宜副相實賔師已故庠序不得賢主師得一賢賔師亦足以重學校也吾同年同知安慶公之子闗國用氏以明經擢第來監杭之臨安以守令治本莫先於學校毎朔望下學憫其教非所教養非所養弟子貟多闕乏人材無所成就大懼無以畣聖天子崇傅責効之意於是走吏不逺百里外捧檄幣於同門魏徳剛氏禮為庠序大學師徳剛戒行來别余求一言今盗起淮泗挻禍於天下郡縣為郡縣者方以募兵調賦造弓矢器械為急務奚暇治學哉而國用以書謂余曰天下不可一日而無教赩衣赤幘包城絡野翦以斧鉞而不勝者有司之教衰而禮義之維缺也吾其可以廢學校一日之教哉魯邑絃歌不以劉項攘搶而暫廢今盗狗䑕爾吾又可以魯邑絃歌之俗棄其民也哉余既喜而復其書於魏生之行也必叙以送之且期其納民於禮義而還太平於今日當自臨安始送司農丞杭公還京詩序余友曹文炳過余次舍談大司農丞杭公之履歴行事公當儒塗世家鍾峨眉之秀負殊才遇今主上開國金陵以青年經術取法史以法史取郡邑牧以郡邑牧取相幕賔踰月而御翰親除今職不十年自下史至九卿進取捷速才之不負人也如是出使吳松經理僧道故官田土曽無苛詧徼僥以話言為期㑹訖不刑一箠而事集於兩月之間今還京報命郡人士贈言未有當公意者望吾子一言出庸衆人右且不為投之暗也余復之曰農國本也少昊氏以扈設正蒼姬氏以稷開國秦漢以來曰治粟曰大農曰春卿曰司稼皆所以崇本也今稽古建官以大司農首列九卿可謂知天下之本矣而杭公方以才諝當御選之筆言聽計從非農之福耶其經理而歸也輿人誦之考功書之吾又何敢以老羸而辭於一言遂為序而又係以古風人之辭曰十年農星晦無光太史昨夜占五潢國家大本重糓禄曰奎曰胃明天倉中書垣次司農署秩列九卿尊大府春耕籍畆冬藏氷六十五官分九扈杭公均輸少卿屬賦足國家民亦足農田漕運一時了文如錦繡人如玉歸來奏議帝曰俞詔書寛大賜民租太平治象今日見不用再講貞元宰相均田圖又代馮縣尹送序司農在周官為太府掌九賦九貢秦為治粟内史屬官兩史屬官兩丞漢有司農丞謂之中丞唐置丞六人今主上開國金陵他府寺有未遑立而農正司先之蓋以錢糓金帛委積所在天子籍田耒耜京師百官禄廪朝㑹祭祀賞賚之所給其務農重榖實為富國强兵之本故職司者非康成之文學牟融之逹務不以授之元年冬十月大司農丞杭公仲玉奉命來淞經理田賦功成冊上無漏無溢其用法不礉馭下不煩不越三月而事集郡縣稱美其人曰無杜中立繩吏之急而有鄭荘千里不齎糧之効嘻其治行可知矣抑余有告於仲玉者主上新收浙地官民田土夙有成籍然佃人租額嵗為地主有增無減阡陌日荒庄佃日貧至於今蓋窮極無所措手足矣農丞之秩上亞大卿而司吾庶土之生者歸覲主上主上問吳氏疾苦倘有以言之三吳之農幸矣是為序送淞江同知李侯朝京序有明受天新命開基金陵百辟効職百將効忠實君臣千載一時之㑹所以刼大業臣妾天下皆國家善於用人也寶定李侯浩字師孟材足以任重智足以撥亂淞歸附初奉命來為二守蓋以股肱心腹之舊授以勞來安集之寄歴政甫期賦役髙下以均倉庾出内以平功過黜陟以明利害興除以當闗梁啓閉以嚴獄訟審録以寛淞士庶拜頌為古循吏今年春中使銜命下郡取為機近法從侯不稅冕行郡士民攀挽不可得乃什什伍伍相與餞之西闗之郊舉爵於余乞一言為贐余舉爵酌侯曰天子任股肱心腹之臣如侯者不幾也侯慎之再酌曰侯歴民間徃當以生靈之憂為己憂以荅天子之大寵命三酌曰海㝢尚有未賓服者願侯佐天子平定之無久勞金革為也侯反爵謝余曰某不武敢忘先生之規己而上海祝大夫持縹軸來求書為餞於是乎書送檢校王君蓋昌還京序士生亂世不以窶而茍售必遲遲堅忍俟其人焉而後興此非志之逺識之卓毅然大丈夫不能若今中書檢校王君盖昌者是已余歸老淞學君與富春吳毅桐廬章木㑹稽張憲山東馬成吳門楊澂咸在髙才生之列時秦郵張氏據有六州奸佞朋進欋椎盌脫謡於市者弗可計或有率君徃者君曰咄哉醜爾秦郵豈王郎之主哉顧仕有時吾方慎俟其人也已而君辭余客泗水轉徙下邳艱苦窮阨人有所不堪君方彈鋏自哦泰然無幾㣲見顔面皇明受天明命君自賀曰天下定矣仕有吾主矣徐守臣薦其所有於相國見主上於謹身殿敷奏頃上偉其儀度礧其論裁大器之特授中書檢校嘻非其慎仕待時訖於真主之遇其能戾契致是哉吾謂志之逺識之卓者非其人歟今以使事至淞首謁大成宫釋奠先聖繼訪余草𤣥邸次展師友拜留若干日行郡守盛昇醼之泮堂諸客咸賦詩為君侈且為淞學校侈又必推余為首叙余重舉酒祖之曰宰相佐天子以治天下者也檢校拾遺舉缺又贊宰相以治天下者也天子倚治於相相資失於檢校相之弼友也任重矣哉任重矣哉以為序送馮侯之新昌州尹序二首余曩過田野見父老四三人聚首相與言縣令馮侯之賢者或泣或歎扣其故則曰自侯下車將二期民沐其福者不可枚計其馭事也簡其調役也均其徴賦也仁其理獄也雪而明民聽其令無有捍格自公自平若出鈞石之制者二期所行殆如一日而執臬者以毛髪細故裁之吾民疾苦顛連無告者三月不啻失父母余聞其言而識之今年春天子遣使行各道覈郡縣吏名實審侯之行為至忠績為上最使復於上上曰馮公者出吾御選宜其政之不負吾法也於是嘉其功陞新州守民又咸涕泣曰吾以侯為吾大官㑹府中今不可得天何敓吾父母恩以恩彼人哉吾嘗論吏之良否為民之戚休得一良則一郡喜失之則一郡憂故漢吏重良二千石今侯自縣陞郡推華亭之治為新昌之政吾知其為中朝良二千石矣異日復來甦吾民余日生望之又華亭為松江望邑貢稅財賦當浙之什伍編户至百萬迄乎兵燹向之繁富者百不一二為邑者亦難乎其治矣丁未春烏江馮侯尹是邦以勞徠安集為己任流離者返之瘡痍者起之閲兩期而邑始成署所民欣然如痿者之起行執熱者之濯清風行役者之歸故鄉見父母也是年夏四月海宼作詿誤逮華亭者幾百數侯誓死力辯於統兵曰華亭素善地古二陸文物之邦民非畔法軌而從人於逆者統兵允其請而郡之生靈更生於聖代者皆馮父之力也民為建生祠頌其徳不忘其愍民之窮凡可為氏所者無不為上聞其人識其姓氏以為可吾之良二千石者遂陞守新州民父老幼穉奔餞於西闗之外遮馬首而泣曰吾田之賦侯均之吾丁之役侯節之吾訟之欝而不平者侯伸以理之今去也均吾節吾而伸以理吾者將誰望歟其皇皇之情不啻子之失慈父而立於顧無人之境余為解之曰杜甫氏有言元使君得結軰如十公落落參錯天下為邦伯萬物吐氣今使馮使君軰參錯天下列郡豈有萬物不吐氣者哉新昌之生息皆鋒鏑之餘吾想民流未復地荒未闢者望吾侯父母之至如望嵗然將見頌聲作其田里而無嘆息愁恨之聲者真我朝良二千石之慶也他日秩滿歸贊中書政堂其澤天下者可勝計哉吾民其俟之又復何憾送楊明歸越覲親序二月八日仕與親孰重曰親仕有時乎為親則仕非重乎曰禄足以逮親則仕禄不足以逮親則仕無愈乎啜菽飲水之為親樂也仕又何重乎宗姪子明辭烏府檄而歸里為堂有埀白之母也身雖居闕下心耿耿乎定省之前東睡斗山之北白雲之思常在心目今年春自白下理舟楫過淞謁余草𤣥閣次急以别告問何之曰白雲之思日夕在倚門之廬矣今乃行請翁一言以為教余以明在閭里時十嵗以孝悌稱洎長豪爽不覊倚親强徤又孝婦善事姑遂起宦情欲伸所抱兵變備渉險患志不直遂而親且老矣庭前風木寧不有感乎宜且歸之晚也於其歸也序以送之又係之詩曰天西白雲天東飛烏臺春之烏依依髙堂㳺子歸未歸堂前春草生春暉行行舟發彭郎磯勿遣霜霜露露沾人衣送斷事官李侯序大梁李侯文彬氏以世居執法有决讞才簡知於今天子天子親賞拔為中書斷事轉都督斷事克於其職凡邉民有詿誤郡牧有不白案出使推覆咸以平允取信朝廷今年奉㫖以田􅀢覆實事至淞旬浹間得成帳報於上淞官吏父老喜侯勾檢得失不苛擾而一辨羣來乞言於㑹稽楊維禎維禎聞侯任天子耳目寄者已期年大明之古遺直也則為之言曰斷事在古為士官周為㓂晉為理秦漢為廷尉今為大理斷事天下事有不平者平於君君以平於斷事斷事之寄不輕也較然矣獄必以果而斷斷必以明而審明果俱至又必不為上所敓旁所撓則其法始伸職斯䆒矣有其明有其果而又無其旁撓上敓者其稱譽比古漢于張用是占侯之峻躋華要内中書郎外部使者郡二千石不俟龜蔡證矣吾與天下之民共望之洪武二年九月十日序東維子集巻二欽定四庫全書東維子集巻三元楊維楨撰

body:
  text: 序鄒氏遺訓序吳常熟鄒君玉氏自旌徳宦逰歸理故園以老焉其􅂷訓子孫嚴其顜畫者凡若干件來謁余於姑胥邸次曰某髪已種種懼一旦捐子孫去故述誠若干件雖話言拙直使奉成規行之亦不致畔名教隳門地且將勒石位置奉先之宫幸得子言重引之庶吾後之人知所警也已吾聞傳曰名門右族成立如升天覆墜如燎毛何難易之相縣遽絶甚如此葢剏者勞而守者安剏者儉而守者奢剏者畏而守者驕也為祖父者慮焉故有身後之誡雖古先哲王不能無之書之竹帛琢之盤盂以遺乎後之人蓋懼耳聽口㖟者易為滅絶而託諸竹帛盤盂者可不刋而􅂷無盡也君玉氏之遺訓著于金石非竹帛盤盂之意乎為其子者幸得諸耳提靣誨子子孫孫又幸得諸示無窮者則鄒氏後人續初繼業雖百世而可也雖然子弗祗服厥父事此無先之訓也恐無先之訓故吾重告之使之恒有其先庶畔名教隳門地者免矣夫李參政倡和詩序淇上野逸李以世澤起身十年至叅大政江浙行垣未幾惠冠文江南端其所建白有不合即引去退處白沙日與布衣士談文字為樂其來江浙時孤舟疋馬絶無左右之孚以奸政其舟所載又絶無他長物不過隨身所讀書籍耳其下交無雜賓而天台蔣常翁廼以詩人獲登其門相與倡和流布人間嘻公以八位之貴不以下交寒素為厭蒋常翁以一介之㣲不以上交公相為抗等此季世僅見之事而議者猶以公進布衣為術者吾不知其說己常翁装潢其詩成巻非已侈自遇實以表著賢公卿下士之猶有古風也故余為叙其巻使世之登樞要隔寒㣲者見之宜於此焉耻矣漁樵譜序詩三百后一變為騷賦再變為曲引為歌謡極變為倚聲制辭而長短句平仄調出焉至於今樂府之靡雜以街巷齒舌之狡詩之變葢於是乎極矣嘉禾素菴老人過予雲間邸次出古錦樸一帙曰漁樵譜者凡若干闋雖出乎倚聲制辭而異乎今樂府之靡者也吾嘗求今辭於白石夢窗之後斤斤得寄間父子焉遺山天籟之風骨花間鏡上之情致殆兼而有之葢風骨過酋則隣於文人詩情致過媟則淪於諢官語也其得體裁亦不易易嗣餘響於寄間父子後者今又得素菴云夫譜之云者音調可録節族可被于絃歌者也詩三百曷無一不可被于絃歌吾不知亦先有譜後有聲邪先有聲後有辭耶寄間分譜於依永之殊其腔有可度不可度者則何如敢于素菴乎質焉素菴齤然而咲曰噫吾忘律吕於漁樵欵乃中烏知所謂聲依永律和聲許事㦲雖然擊轅之歌野人之雅也吾譜殆亦自當楚雅乎素菴名抱素字子雲裔出吳越王有起進士第號竹鄉翁家置萬巻堂者其曾王父云牡丹瑞花詩巻序余讀后山氏叢譚載廣陵芍藥曰金帯圍者無宿種而出出則羣吏有應其瑞居台揆者如韓魏公琦王岐公珪荆公安石皆應其瑞為不誣也於乎山木無知何預人事哉蓋徳􅏒草木草木化焉非偶然也江浙省檢校孛术魯子升之庭有牡丹雪中作花其大如斗其色如魏家紫者人咸謂孛术氏之瑞也夫牡丹芍藥類也芍藥有當其瑞者子升不當牡丹之瑞耶明年子升繇檢校除淮幕憲府其瑞亦不誣矣庸詎知異日子升不躋人臣極品耶吾固有俟於子升矣抑吾於牡丹有感焉者世有花工如宋單父者能變木芍藥為千種姿亦能使不令而華人力奸化工廼爾或謂子升之冬花烏知不有人力奸造化者乎茅山外史張公雨神仙人也能頃刻而開花者也特為子升賦花屬之天瑞為異時衫色之䜟吾讀其詩信為子升氏之䜟也人又何疑於是花云子升出其詩并圖巻一通求余叙於是乎書花之開至正九年十二月某日也丞相梅詩序至正二年春江浙行省丞相闕公以清靜寧一之治報于上上召入宰天下公拜命且行顧瞻後庭有手植穉梅一本俾移植于明慶寺之殿陽邦民聚觀載抃載舞咸手加額曰丞相棄我去是足以係吾人之思己見梅如見丞相焉於是僧古源采民之言以永歌之邑之人士從而和之凡若干什昔召伯相周布政南國舍於甘棠之下後之人思其徳愛其樹而不忍傷此甘棠之詩所以作也召伯之教明於南國而甘棠之詩作丞相之徳布于江浙而手植梅之詩作若古源者謂得古詩人之性情非歟丞相去今幾十年而是梅輪囷扶踈碩大繁茂有加于昔邑民于是有所瞻仰公卿于是有所感慕後之人於是有所興起而想見其形容一木之植千載之情繫焉吁草木有託於人者固不在地之有厚薄而在徳之有久近也信矣而况䕶持之力又出於金僊氏者乎丞相氏之徳以栽之金僊氏之力以培之吾見斯梅與孔老氏之植檜同無朽矣不然南門之栢有大四十圍者一蕭欣能伐之可不懼哉古源以詩来屬余序余為之言如此夫思其徳而愛其樹者人之情也愛其樹而永歌以頌美之者詩人情性之正也序詩人之意而不忘乎戒懼者亦文人忠厚之至也是為序送經理官成教授還京序前濟寜郡教授成君彦明氏以文墨長才為今天子録用洪武元年春遣使行天下經理田土事而成君在選中分履淞之三十八都二百一十五圍閲嵗終魚鱗圖籍成父老咸喜其清明果决竿尺有凖版帳不欺積七不毛之土并附以見裝潢手巻來拜草𤣥閣次求余言以為贐千萬因成君致意萬一大農下問先生之言亦有取藉年云予悼唐宇文融為括田使時開元之治已久天下戸口未嘗有所升降也而融括籍外之田得客戸八十餘萬美田稱之徃徃出於州縣希㫖多張虚數以正田為羡編户為客民抱寃者無所於訴今天子招徠南北流移天下土田於廢棄之餘非襲融之敝迹也而成君之所履又皆得屯耕有亡之實可以助明天子均田之政豈開元斂臣可同日語哉於其行也書此為序姑蘇知府何侯詩巻序清明之朝吏仁厚不仁厚無以興其治昏亂之世吏沓虐不沓虐無以趣其亡而守牧之係為最焉守牧號民父母非上下疾痛相闗如出肺腑不可稱父母元末藩鎮赴仆守牧寄於戎行大偏小校民望素不厭惟與珥筆胥槖嚢縱羣不逞啓告訐門羅織善良以朘削創罷司察於民牧者又以墨敗紀吾民將孰從而號呼也哉蘇民羅張氏之阨如芟草獮禽殆絶生理大明龍興天子選守牧勞來安集於板蕩之餘而侯實應選民拜更生如脫焦火乃者京師起發遷徙蘇為甚雍容處决民不知擾金谷事暇即以庠序為務祀殿論堂廢如逆旅舍公一新之絃誦鳴兩廡如承平時嘗以勞民事稽怠奔命闕下將以戎律加之請忍死一言曰殺一郡牧以活萬生靈某含咲入地矣上仁其言貰刑為賞秩吁若公者可以稱民之父母矣天子仁明方選天下賢守牧入政堂與大臣講治欵公蕳知既有素吾將聽公之大用而為天下之民之慶豈直一郡而已哉吾徒朱敏裒郡人士之詠歌不逺數百里求余文引諸首故書為序送祝正夫赴召如京序吳元丁未春番祝正夫知淞之上海縣明年以治狀稱最海㓂之變不四三日轉蹀血為衽席地民為建生祠君子有勝殘去殺之頌又明年司臬者毛責細故停其治三月士庶老稚日夜號泣如襁脫慕父母於是什什伍伍不逺千里走闕下慟哭為侯請天子驚曰祝挺者出吾特選俾卧治海邦而司臬者敢忘之覆罪司臬侯復峻用天日朗明羣情闓悅於其行也會稽楊某餞之以言曰昔聖人稱宓不齊曰子賤君子也覇王佐也單父之宰屈以小試也吾於祝正夫既脫州縣勞亦以王佐之才屬之惟正夫自任焉正夫書座右之言曰天下事見得理便做弗計死生禍福觀是言也正夫知自任也不待余言之嘱矣送陳錢趙三賢良赴京序皇明龍興之一年天子思與天下之賢人共圖天下之治事於是遣南北訪賢使凡若干人而浙士之拔等者曰陳睿錢某趙某人以治才與學術兼屬之使者採諸輿論内幣起之三人者受不辭會府令與計偕為浙士舉首其行也來别東維先生請一言為警教先生酌之酒而告之曰代以試經藝舉於鄉者至三四千人會於春官第其可取者然後上名於天子天子賜出身吏部授之官不能二百人其為選也艱矣士有窮經老死而不得與於選者吏部或以旁恩及之其為情也亦苦矣今三人名一聞於使者不必試於鄉與乎四三千之數登於春官與乎二百之數可謂歩之驟而其選不艱也得之易而其情不苦也雖然三人者朝奏即暮召矣天子逰心於經史有顧問焉厲精於政事有試可焉此非誠抱天人之學民社之具鑿鑿乎天子任耳目股肱之寄為名九卿才六部良二千石躋民於㤗和而措邦家於㤗山之安則其膺選而去也已不誦愆人不議忝不然却而慮也心亦寒已哉二三子避席謝曰幸先生警教徳甚大重酌之酒曰士窮而約易守逹而汰易遷易守則徳人之忠言易汰則隂黜之矣二三子母陽徳吾言而隂黜吾忠吾將慶二三子之有成也徃矣勉之申年十一月十五日送松江師黄公入吳序松師黄公彦美以疾謝職於淮吳大府手不執兵戰不衛戸金鼓不振馬不駕凡百曰大府以詐疑力疾而徃辭始獲允未幾大府􅀈以飬疾吳門召幸其疾瘳大用之寮將而下及淞郡官市老野叟方外之民無不抃手交慶以為賢傑用大則惠益大矣各執壺漿牲具張於西門外以伸頌禱老客鄉會稽楊公就舉爵以規不以頌曰黄公之報所事於西夏侯義亦至矣臺平去聲不曰幾死讒譎幸公論反平丹書雪志又伸矣丈夫事畢矣他復奚望哉公聞規起作長跪禮復爵維禎曰先生言議入肺肝凛若沃氷雪所不解甲服經居廬西夏侯墓者有如皎日予曰韙矣哉遂行送三士會試京師序至正己亥夏四月江浙省試吳越之士吾門弟子在其選者三人焉南士曰忻忭色目曰寶寶曰何生三人者擇日赴春官來别曰先生何以教我余既期其大對為漢晁董而又勉其大器以宋李廸也三人請廸故廸葢從於种放先生者業成試京師种先以書見栁先生開開留廸客門下出題與門下共賦廸賦出諸生右開驚曰君必魁天下且為宰相異時果然余同年李中丞稷今之柳先生也三人者以余言見之并以文為贄中丞當以廸故事待三人并以文之占三人顧魁多士為太平宰相三人者誰先惟三人焉勉之勿多讓廸刑統賦釋義序古者帝王恃以治天下者大經大法而已未所謂律也世道既降巧偽横生法家者流始制律以鉗釱天下之民奸日滋則律日煩亦時使然也葢律令起於秦定於漢律法刑統遂大著於唐宋而傅霖氏為之賦刑統以便律學之誦習夫繩墨陳而天下之曲直不能逃規矩設而天下之方圜不能越律固捄弊之繩墨規矩夫潁濱蘇子曰讀書萬巻不讀律致君堯舜終無術君子於其言可以占世變矣我朝混一海宇承平百年方以儒道理天下士徃徃繇科第入官凡讞一獄斷一刑稽經援史與時制相叅未有吏不通經儒不識律者也保定梁公彦舉蚤嵗為宗正府掾嘗從府使者及省部官讞獄河南江北閲案愈多而審律愈精人咸服其明允後司泰州筦庫遂著刑統賦釋義一編上探經傳律疏史鑑有可證者而又折之以己意推諸苛宻而歸諸仁厚蓋傳霖氏之忠臣矣今年維禎備員杭課提舉幸與公為同寮平市之暇嘗論及古典及今之通制且出此編以示余始嘆公不惟精於法家之律而又明於儒者之經史也豈非時之通才也哉嗚呼鄭子産鑄刑書叔向氏譏之懼民棄禮而質之於書也故曰先王議事以制辟不知後世又有㣲於書而不竟者律其可廢乎賦刑統者既舉律而約之釋義者又即賦而精之俾後之蒞政者有所稽而凖焉足以權衡世變扶植世道而致其君於堯舜之上蘇子之所感論者豈誣我哉公自童年即以吏事起身至老而求諸經史以文其律家之學葢知所本哉余三復其編而深有所取且僭為之首序云監憲决獄詩序自軍興來民不幸兵死者無所愬其諸誤繫諸有司者幸而有愬已有司又付之不理訖與叛人戮死蓋殺民者殆狗豕之不若官以李為職亦莫之卞已嗚呼民之塗炭也極矣余讀杭㧞官朱蓮峰君誌監憲公平反寃獄事為之慨嘆不已其言有曰求獄不於其情而欲以筆札求之乎是言也平獄之本也若監公者真神明人哉使今握兵在邊執法在廷者皆如監憲公之處心菑其不有弔寃其有不白而枉死者哉於乎孝婦銜寃天為亢旱鄒衍繫獄六月降霜天之於寃人報應如此今旱暵甚矣監公之决獄人人不自以為寃吾見隨車之霔至矣杭大夫士咸作歌詩以美之而推予為叙首予樂為之書至正己亥秋八月既望序東維子集巻一欽定四庫全書東維子集巻二元楊維楨撰

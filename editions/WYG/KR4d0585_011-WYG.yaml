  hash: sha256:6f47a97d45b03124f1d03c53deceed3aa01689a5e20ba55b84a8a76683bac1fd
body:
  text: 贈杜彦清序余曩遊海上之小金山泊舟赤松溪上午夜月明如水聞水東歌聲纍纍乎如貫珠已而又聞紫鸞聲穿起林杪如雲端仙人挾笙鶴而去異而問其人則曰真定杜清氏之轉喉引商聲之歌間以湘竹之龍鳴也余明發開舟不及識其人今年秋冄遊海上道過赤松而清來相見為余作慢辝古調及秦樓三弄遂出楮求一言以别昔賈充在洛㑹夏統氏之客舟充以㑹稽土地間曲叩之統為歌大禹氏朝㑹之歌及五胥小海之唱其音莭慷慨激裂天風雲雨為之響應又掀髯作一悲嘯沙塵烟起止之而後已也吾後日舟還溪上約吾竹西老人當重叩爾土地間曲如仲御氏之不忘其鄉者豈無龍山朝㑹萬國授化之遺音乎竹西當為余恊調于欏桫之檀而發余鐵龍之不平者夢寐以之周月湖今樂府序士大夫以今樂府鳴者竒巧莫如闗漢卿庾吉甫楊淡齋盧踈齋豪爽則有如馮海粟滕玉霄醖藉則有如貫酸齋馬昻父其體裁各異而宫商相宣皆可被於絃竹者也繼起者不可枚舉徃徃泥文采者失音莭諧音莭者虧文采兼之者實難也夫詞曲本古詩之流既以樂府名編則宜有風雅餘韻在焉苟專逐時變競俗趨不自知其流於街談市彦之陋而不見夫錦臟繡腑之為懿也則亦何取於今之樂府可被於絃竹者㢤四明周月湖文安美成也公之八葉孫也以詞家剰馥播於今日之樂章宜其於文采音莭兼濟而無遺恨也間嘗令學子呉毅輯而成帙薫香摘艶不厭其多好事者又將繡諸梓以廣其傳也不可無一言以引之故為書其編首者如此至正七年十一月朔序李庸宫詞序大厯詩人後評者取張籍王建而建之宫詞非籍可能也宫掖之事豈外人所能道㢤建雖有春坊才非其老璫宗氏出入禁闥知史氏之所不知則亦不能顓美于是本朝宫詞自石田公而次亡慮數十家詞之風格不下建者多而求其善言史氏之所不知則寡矣東易李庸仲常為宫詞四十首流布縉紳間不特風格似建間有言史氏之所弗知如金合草芽胡僧扇鼓漢記琵琶興隆巢笙内苑籍田室蚕繰事是已盖仲常以能詩客于館閣諸老者且十有七年矣其吏于徽政及長信得聞見宫掖者亦熟矣然則代之善為宫詞者豈直慎怨興象之似建為得哉觀是詞者尚以是求之至正戊子八月甲午序沈氏今樂府序或問騷可以被絃乎曰騷詩之流詩可以絃則騷其不可乎或有曰騷無古今而樂府有古今何也曰騷之下為樂府則亦騷之今矣然樂府出於漢可以言古六朝而下皆今矣又况今之今乎吁樂府曰今則樂府之去漢也逺矣士之操觚于是者文墨之㳺耳其以聲文綴於君臣夫婦仙釋氏之典故以警人視聼使癡兒女知有古今美􅁖成敗之勸懲則出於闗庾氏傳竒之變或者以為治世之音則辱國甚矣吁闗雎麟趾之化漸漬於聲樂者固若是其班乎故曰今樂府者文墨之士之㳺也然而媟雅邪正豪俊鄙野則亦隨其人品而淂之楊盧滕李馮貫馬白皆一代詞伯而不能不遊於是雖依比聲調而其格力雄渾正大有足傳者邇年以来小葉俳軰類以今樂府自鳴徃徃流於街談市諺之陋有漁樵欵乃之不如者吾不知又十年二十年後其變為何如也呉興沈子厚氏通文史善為古歌詩間亦㳺於樂府記余數年前客太湖上賦鐵龍引一章子厚連和余四章皆傚鉄龍體飄飄然有凌雲氣心已異之今年余以海漕事住呉興者閲月子厚時時持酒肴與今樂府至至必命呉姓度腔引酒為吾夀論其格力有楊盧滕李馮貫馬白諸詞伯之風而其句字無小葉俳軰街談市諺之陋闗庾氏而有傳子厚氏其無傳吾不信也已書成帙求一言以引重因為論次樂府之有古今為沈氏今樂府序至正十二年夏四月十四日序沈生樂府序張右史甞評賀方囘樂府謂其肆口而成不待思慮雕琢又推其極至華如遊金張之堂冶如攬嬙施之袪幽潔如屈宋悲壯如蘇李具是四工夫豈可以肆口而成㢤盖肆口而成者情也具四工者才也情至而此賀才子妙絶一世而文章鉅公不能擅其塲者情之兩至也我朝樂府辞益簡調益嚴而句益流媚不陋自踈齋酸齋以後小山局於方黒劉縱於圓局於方拘才之過也縱於圓恣情之過也二者胥失之松江沈氏耑甞從余朔南士間聼於音徃能吹余大小鐵龍作龍吟曲十二章遂遊筆樂府積以成帙求余一言重篇端披其帙見其情發於成於才者亦似矣生益造其詣以小山之拘者自通黒劉之恣者自撙生之樂府不美於賀才子者吾不信已生讀書强記有誌晉人帖南唐人畫樂府特其餘耳有求生之才者勿以是掩之瀟湘集序余在呉下時與永嘉李孝光論古人意余曰梅一於酸鹽一於醎飲食鹽梅而味常得於酸醎之外此古詩人意也後之得此意者惟古樂府而已耳孝光以余言為韙遂相與唱和古樂府辭好事者傳於海内館閣諸老以為李楊樂府出而後始補元詩之缺泰定文風為之一變吁四十年矣兵興来詞人又一變徃徃務工於語言而古意寖失語彌工意彌陋詩之去古彌逺吾不意得瀟湘集於四十年後尚有古詩人意也瀟湘為洮陽唐升氏字伯眘自湖湘流離越江漢歴閩嵪抵金陵過錢唐上㑹稽周流幾萬里無居與食然不肯少貶事王侯覔知已頋容與於吟咏求海内知言以質其所能此升之見余草𤣥閣也其詩多傷賢人君子不得志而不肖者合於世也其樂府古風謡平易不迫非有所託不著至憤頑嫉惡慷慨激烈者聞之足以戒而言之無罪矣三百篇以六義見諷刺瀟湘詩人不合於古風人者寡矣於是賞㑹之餘為之評㸃使覽者知我朝之詩如瀟湘者亦可刻金石流管絃豈非吾儕遺老之至望㢤至正丙午三月望日序苖氏備急活人方序醫莫切於對證證莫切於對藥藥投其對牛溲馬渤癩狗之寳能擅功於一時不然黄金水銀鍾乳琅玕沅之沙婆律之腦蛇之黄中無益其貴也餘姚醫學錄苖君仲通論著備急活人方㑹萃諸家所載祖父所傳江湖所聞及親所經驗者茟成一編世有竒疾醫經所不備醫流所不識獨得於神悟理㑹而著為竒中之方此其難也夫人不幸抱竒疾至於醫經不備醫流不識遂謂無藥可治使病者待期以盡不亦可悼也哉妄庸者亂投藥餌以探疾重不幸速其斃是醫殺之也是書一出備醫經之未備識醫流之未識使天下不幸抱竒疾有對疾之證對證之藥不重不幸為妄庸醫之所殺是不大可慶歟昔甄權不著方書其言曰醫者意也不可以著書權盖以意得者自秘非淑後之仁也君推其獨得喜與天下後世共其用心廣狹何如㢤鋟諸梓而過徴余序於是乎序杏林序江陽許守中氏業醫已十數世至守中名愈大施愈廣入以疾邀者無分貴富賤貧輙徃徃輙効而例不求施鄙宋清之施藥受劵為市醫而切慕董杏林之為人淞謝侯伯照嘗俾工畫者圖杏林以為贈而又求言於予予惟杏自托吾聖人為壇緇帷之林而六經之教始及天下澤覃於萬世無止噫杏之盛也蔑加此已神仙者流如董奉氏亦托杏為施成林於盧山五老之間其施雖隘杏之惠猶未絶也其不愈於羯鼓催花驕兒婦人以造化立坊碎錦侈客於午橋之㳺衍者乎若托之卯金之帝有曰實大如梨文頳如橘食其味者可以辟榖而上仙則吾未之信而奉之杏也即嵩山之杏耳將無信乎嵩之杏以萬計其民遇飢年皆頼杏為命而奉之以杏一器易榖一器以贍飢者藉杏以為施仁亦至矣又何必神辟榖之杏乎吁此奉狡獪術也守中氏以其施為心而不藉狡獪以為神杏之植多植寡吾曾不計而况計粟之易多易寡乎此其為仁近吾聖人之仁而非狡獪之仁也使守中有計較心又何愈於宋清乎守中聞余言而謝曰擴予仁者先生之教也贈醫士莫仲仁序淞之張涇有醫術過人名於士大夫者曰莫仲仁氏予来淞未識其人仲仁首謁余扣其術莫能對頋相視一咲耳從者曰仲仁氏病聾余恠聾若是何以聰於五聲之醫乎易其人且疑其術異而鄰有以其病召之即療若神者始驚其術且又介馮生淵持㢧謁文生為件狀曰邑人某病蠱衆醫莫療仁仲氏以峻劑吐蟲若干升生立愈又某病寒逾九日讝口發狂隂且縮法死仲仁氏徐以常藥理之而平又某病噤痢不食餘七日氣始絶仲仁氏投以湯飲即内食飲而起又大官某氏病瘵醫衆争進藥期勝仲仁氏望之而走曰雖扁鵲不可醫已出門而斃諗爾則仲仁氏聾於耳未嘗聾於心與目也乗君教扁鵲者以飲上池而使之視其五臟若神鏡見膽耳故鵲兄弟三人皆善醫長兄神於視色仲兄神於視毫毛醫固不貴於聰聼而貴於明視也諗矣余聞古至人者有明而不視聰而不聞盖飬明於不視而無不視盖飬聰於不聞而無不聞若仲仁之聾其飬聰者非歟不然聾者視明瞽者聴聰絶利一原用師十倍仲仁氏聾於耳宣其聰於心與目者非妄庸師之可及也今之妄庸師有推而為國師衣繡驅良從者後先以出入於王公貴人之門遇疾則雜投藥石以希倖中中輙繳美譚於文章家以登載其能不中不以咎之也若是者曷可勝算而仲仁氏覆以病聾見遺於野是戢勁翮於鷁之退蔵逸蹟於駿之伏者也其求余言與夫衣繡驅良飾繆陋以繳美譚者異故予樂畀之以言至正庚寅春王三月有二日拜手書無聲詩意序雲間陶叔彬氏有畫帙題曰無聲詩意皆錄代之名畫也請予文序其端東坡以詩為有聲畫畫為無聲詩盖詩者心聲畫者心畫二者同體也納山川草木之秀描寫於有聲者非畫乎覽山川草木之秀叙述於無聲者非詩乎故能詩者必知畫而能畫者多知詩由其道無二致也叔彬名畫以詩意不惟知畫且知詩矣詩之弊至宋末而極我朝詩人徃徃造盛唐之選不極乎晉魏漢楚不止也畫亦然吁此豈人性之有異㢤世運否泰之異耳苐未知叔彬所蓄之畫繇宋而唐者幾何繇唐而晉魏者又幾何求之勤而蔵之夥他日使余見之某畫顧長康陸探㣲張僧繇也尚有以卜余論之不誣人㢤是為序圖繪寳鑑序雲間義門夏氏孫名文彦字上良集歴代圖繪寳鑑凡若干巻由史皇封膜而下訖于有元凡若干人其詳博補郭若虚之所遺其用亦勤持矣其子大有持其編謂予草𤣥閣曰鄧椿有言其為人也多文雖有不曉畫者寡矣其為人也無文雖有曉畫者寡矣先生海内知文人與歐陽文忠東坡山谷後山宛丘淮海内岩漫仕龍眠諸公等聲價敢乞一言標其端予曰書成於晉畫盛於唐宋書與畫一耳士大夫工畫者必工書其畫法即書法所在然則畫豈可以妄庸人得之乎宣和中建五嶽觀大集天下畫史如進士科下題掄選應詔者至數百人然多不稱上㫖則知畫之積習雖有譜格而神妙之品出於天質者殆不可以譜格而得也故畫品優劣闗於人品之髙下無論侯王貴戚軒冕才賢山林道釋世胄女婦茍有天質超凡入聖即可冠當代而名後世矣其不然者或事模擬雖入譜格而自家所得於心傳神領者則蔑矣故論畫之髙下者有傳形有傳神傳神者氣韻生動是也如畫猫者張壁而絶鼠大士者渡海而滅風翊聖真武者叩之而響應寫人真者即能奪其精神若此者豈非氣韻生動機奪造化者乎吾顧未知寳鍳中事模擬而得名者士良亦能辨之否乎雖然梁武作歴代書評米元章作續評非神識髙者不能吾欲作歴代畫評以繼蕭米士良父子當有以賛予之品藻也而吾所屬大有圖畫紀詠則當亟成以繼寳鍳云是為序送寫神葉清友序古今稱傳神者晉之顧長康氏長康寫照非徒得人之形似而併以其情性精爽者得之此古今之妙稱也其寫裵叔則頰上益以三毛而裵之神明見寫謝㓜與置之岩石之裏而謝之情性知傳神而不得其精爽情性徒求規規之形似其去土木之偶奚逺㢤天台葉清友昬其父可觀覲京師嘗寫天顔被命為提舉梵像監清友紹其家傳嘗為予寫鹿冠吹笛之象于五湖之間談者謂非徒得予形骨而又得予神明不在長康氏之下也予嘗論傳神如長康氏可謂絶古今之妙矣抑律之在古殷之畫工則長康氏又有所不能也髙宗夢賢於野俾畫工以象求之得諸傳説惟肖説以夢交於畫工也吾不知畫工何以而得肖於君之象也畫工之神盖有隂敓造化之妙者矣聖天子方寤寐求賢版築之下亦有其人或俾圖像予試以畫工之神於商者神於今也長康氏之稱妙者又何足為清友道㢤送周仙客談祿命序予嘗於談祿命者為之言曰徳勝命者昌命勝徳者亡推祿以命孰愈推祿以徳因舉古徳二事五代正延政守建遣一部將報事軍前後期當斬歸語其妻連氏連氏急遺逃之且資之金部將潜投江南李主𨽻查丈徽麾下徽攻延政部將領師城業䧟下令曰有能全連氏一門者賞連氏急告曰將軍不活建民妾請先死誓不獨生部將為之戢兵全城不殺至今連氏為建大族世食祿位官至卿相宋王方贄上遣均兩浙田税錢氏時毒歛畒至三斗贄陡减二斗使還上責陡减田額贄對曰畒賦一斗此天下之通法兩浙既為王民豈宜復循偽國弊政上喜可其奏至今浙田著為令贄之遺澤也官驟升右司諫至京東轉運鹽使生五丈夫子臯凖覃鞏罕凖子珪官至宰相夫㠯一將婦一税使存心仁厚其福身福家㠯覃其子孫之慶者如此今食祿貴人任人家國事不肯出一言立一政㠯利天下惟務全身保妻子以為福人能事而身或有不全妻子或中走其門者無虚日仙客談祿必先警其凶吝更宜推古徳事以啓之如連王氏之福身福家以覃其慶於子孫者仙客之術將有古君子之教也故䟽以告之送楊懋昭占數序自星命之學代神蓍而易之數荒矣天地之大不逃乎數而况於萬物乎天地有定數則寒暑乗除有定筭書曰先其筭命逸書今之數家有筭術而可以推歩人之吉凶悔吝亦神蓍之余靈已乎西蜀楊懋昭筭數以决人事人推為神筭非其筭過於蓍蔡者乎吾觀世之術數亦衆矣必據人之生年月日時否必傳聲傳字畫而後數可依也懋昭不然占人意於㝠交黙接之中而數生焉數生而卦象士焉卦象出而易之繇灼見於休咎之應吁亦神矣故曰筭過於蓍蔡而知大易前民之用者未亡也雖然卦爻數也有理焉理制於數而理之順亦足以役數嚴遵以易占人而必依數言理與人子言依於孝與人臣言依於忠盖約數以理也邴吉以隂徳延齡貢禹以守莭愈疾非理之順者足以役數乎懋昭言人以數盍亦參之以理庶先天後天之道備而易之教行矣懋昭韙余言書其説以去送何心傳序世之非相地者曰古之葬者授地扵百司無相地之術也昔之聖人仰觀俯察求利於吾人至於農獵之賤無不推其利害以詔於人使相地之術果信何其教不在農獵後也余甞辨之曰卜其兆或以為藏者安不不可無也卜其脉絡形勝以為生者貧賤富貴夀夭賢昏之辨則未必有也詩云既景乃岡相其隂陽則岡之隂陽亦有係於相宇之便不便者詩云卜澗水東瀍水西惟雒食則之東西亦係於遷邑之利不利也已然擇丈尺之窆以覬福於百年之腐骨使人之愚子孫藏其祖考十年五年不即土者則狐首指蒙之書之過也天台何心傳宋大學慱士𤓰隱先生之孫也家有六宜樓以延海内之名師傅講習之餘有傳其師玉平山人相地之術將挾是以逰京師求余一言以自儆余謂京師有公劉之相宇姬旦之遷邑子之術亦有應於詩書者不乎不然以狐首指蒙之書占一柸之土以虚喝旤利以售其術於人之愚子孫吾固未之予也玉平之師之曰悟流峙之法以闡何洛之閟藏探動靜之機以識乾坤之妙用此隂陽者流之上術也心傳有傳於此則吾之所未予者其知免矣夫至正八年九月十日序贈相士孫徳昭序戰國以来聖人之道不行士之急功利者變而為逰説為滑稽為刑名然以三寸舌簧鼔天下之向背者則異甚於從衡捭闔之術也漢有天下風俗稍一被從衡捭闔者知其伎之窮則又轉時為談天相人之術敗君誤世者徃徃有焉而明昭徃史亦不少也唐以後習相人術者益紛紛焉挾是以為食則其售於人者急而㒺於人者宜無所不至揣摩臆度言與其術自兵而有弗計也嘻以相求相者將有利於已之貴富慶祥以相相人尤將有利於人之貴富慶祥耳故相人者言慶言祥則求相者喜言妖言禍則求相者怒相人者將以為利也又安得言妖言禍以犯人之怒而絶已之利㢤毋恠其揣摩臆度之説與其術自兵而有所弗計也雲間孫得昭氏於金陵山中得異人相術其授受不茍其談相於人也善則云善惡則云惡善不善也由乎人利不利也由乎天而吾所首之術不明由人由天者有所改也所謂士之仰不愧俯不怍者歟相術而有人若是盖亦近乎道以君子之論有所弗惜也因其乞言遂書以為序至正九年夏五月十四日送陳生彦髙序藝必貴乎積積而后化化而后神師曠氏之鼓琹也奏清徴而𤣥鶴集奏清角而風雲猝變者非其精而化化而神之効若是歟君子論古樂之人而動物者必曰琹而筝􅀢􅌙篌有所不預焉於乎大雅之音無聞也則知今之樂有精而化化而神如師曠氏之琴也獨不動物乎松陵陳生彦髙慱學多才藝尤邃於音律余嘗於三泖水雲之區聼其鼔十三絃之操作商聲調林籟激發轉徴音而魚龍悲嘯緣情而鼓欲樂則樂欲悲則悲故喜者或墯淚戚者或起舞所謂藝之動物者非欲歟抑余聞晉謝仁祖喜筝歌秋風一詞而受遇扵桓温亟引歸府生嘗東逰甌越逹官貴人有以温之引祖仁者引生矣今且洽事漕府將有祿位於民上矣吁非其藝之動物而遇於人者至是乎吁一藝之精尚耳而况藝之上於生者乎因其請言故為藝説以竒生之遇而嘆儒人遇有不生如者非藝之罪也藝之精而至於神者未至於生也至正庚寅三月十五日序朱明優戱序百戱有魚龍角觝髙縆鳯凰都盧尋潼戯車走丸吞刀吐火扛鼎象人恠獸含利潑寒蘇莫等伎而皆不如俳優侏儒之戱或有闗於諷諫而非徒為一時耳目之玩也窟􅓓家起於偃師獻穆王之伎漢戸牖侯祖之以觧平城之圍運機闗舞埤間閼支以為生人後翻為伶者戯具其引歌舞亦不過借吻角咇唧聲未有引以人音至於嬉咲怒罵備五方之音演為諧諢嚥咂而成劇者也玉峰朱明氏世習窟􅓓家其大父應俳首駕前明手益機警而辨舌歌喉又悉與手應一談一咲真若出於偶人肝肺間觀者驚之若神松帥韓侯宴余偃武堂明供羣木偶為尉遲平㓂子卿還於降臣昬辟之際不無諷諫所係而誠非茍為一時耳目玩者也韓侯既賚以金諸客各贈之詩而侯又為之乞吾言以重厥伎於是乎書以遺之時至正二十六年三月二十有三日也優戱錄序侏儒竒偉之戱出於古亡國之君春秋之世陵轢大諸侯後代離拆文義至侮聖人之言為大劇盖在誅絶之法而太史公為滑稽者作傳取其譚言微中則感世道者深矣錢唐王􅈌集歴代之優辞有闗於世道者自楚國優孟而下至金人玳瑁頭凡若干條太史公之㫖其有槩于中者乎予聞仲尼論諫之義有五始曰譎諌終曰諷諫且曰吾從者諷乎盖以諷之效從容一言之中而龍逢比干不獲稱良臣者之所不及也觀優之寓於諷者如漆城瓦衣兩税之類皆一言之微有囘天倒日之力而勿煩乎牽裾伏蒲之勃也則優戱之伎雖在誅絶而優諫之功豈可少乎他如安金藏之刳膓申漸髙之飲酖敬新磨之勉􅓍疲今楊花飛之易亂主於治君子之論且有謂臺官不如伶官至其錫教及於彌侯觧愁具死也足以愧北面二君者則憂世君子不能不三唶於此矣故吾於􅈌之編為叙之如此使覽者不徒為軒渠一噱之助則知􅈌之感太史氏之感也歟至正六年秋七月序東維子集巻十一欽定四庫全書東維子集巻十二元楊維楨撰記新建都水庸田使司記天地位而水為之脉絡運而天地之功成古者水病民神禹氏治之功與天地等代之職水者雖小大不侔其得一日廢耶此周之匠人稻人漢之水衡水司空之官所由著而今之都水使者之司所由立也大德初司置平江曰行都水監㤗定年改庸田遷松江以置不常人視為郵舍故棟其署寄署于它所至正元年重置司平江秩隆三品轄江東浙東西道官與風紀重臣交調御兼行工部事掾属亦皆視司臬吏遴選郡縣守令咸受節制司之權崇勢重視昔有加八年都水使者闕公來謂今聖天子切切焉以東南租稅之出重在三呉而三呉水國也故署都水司平江而官吏寄署他所事體弗稱先是請於朝得給官錢四萬緡仍得撥地羣治西財賦府故基若干畝於是鳩工庀材經始於是年十月八日不三月告完中堂􅊼敞掖室静宻幕司曹舍鱗次翼張旁為繚垣前為崇閎氣勢突兀䂓模備具呉父老咸杖藜仰瞻嘖嘖稱賛以為不自意垂白復見是司之新也既而羣工竣事長貳率僚属位正新守相與舉酒落成幕元僚沙君來請于維禎願有以記維禎考中呉水患自宋李兵部韓殿省郟亶父子經營規畫亦詳矣其溧陽五堰江隂十四瀆宜具大呉等瀆松江曰塘曰浦者凡一百三十有二志籍尚可稽也然未若我朝知力足以興除其利害而德足以消其震盪漂忽之變也大德間三江陻塞平章闕氏濬治功成民到于今稱之邇者洪河暴央折而西北流天子一念動坤載遣使沈璧而河復故道吁官都水者上以聖天子之心為心下以闕氏之功為功三呉之民尚有昏墊而無訴者乎抑相水之職本諸順天之理世未有順於理而利不興亦未有逆諸理而害能除者孟子曰禹之行水也行其所無事也行其所無事者順理也鯀之反是則以方命命者何即理也以水為職者職與理應雖湯湯可又不則天下之治水者皆鯀也可不慎哉左公字廷憲居憲府使雲南岩岩有風采奮髯之頃奸膽盡落到官視民飢溺猶已是年十二月除浙東閫帥大使尚公有用字繼賢是年九月九十於官副使闕字質卿康公若㤗字魯瞻是年五月除國子監司業僉事官闕公字國賔是年十二月除福建憲僉事王公仲温字輔卿照磨李嘏字公錫分事董者掾史錢璛奏差蔡琳李報也繫之辭曰邈哉法象頖𤣥與黄坎德流長雷雨在上江河在下吐内隂陽維坎之徳惠廸維吉從逆惟殃帝憫下上具區芒芒忽焉震盪周官稻人漢司水衡利脩干農叶爰設司存保彼東方臬臣之良為天子使材貞且幹不呉不揚相彼天時以順地理恩肥海邦水居其壑土反其宅昆蟲墊蔵畊食鑿飲男樂其作女修其紅叶年榖屢登順成八方其蜡悉通叶職臣報功曰我水庸長發農祥作郎反常湖等處茶園都提舉司記禹貢九州方物而茶不在列盖古之茶在藥品而未為食品也至唐茶飲始盛不惟華人嗜之囬鶻氏亦驅馬相市言利者不得不與鹽筴同科故始稅於趙賛增於王播𣙜於王涯茶遂為

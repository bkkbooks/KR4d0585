body:
  text: 神道碑元故中奉大夫浙東尉楊公神道碑公諱瑀字元誠姓楊氏系出漢震後五世祖某自婺遷杭遂為杭人祖榮祖宋承信郎鎮江都統司帳前提舉父昌宋邳州萬戸府經歴今贈奉議大夫樞宻院判官驍騎衞追封錢唐縣子公生而警穎長而玉立長身紫髯如畫天歴間自奮如京師受知於中書平章政事沙刺班大司徒之父文貞王偕見上於奎章閣論治道及藝文事因命公篆洪禧明仁璽文稱旨使備宿衞署廣成局副使特賜牙符珮出入禁中寵遇日渥擢中瑞司典簿繼改廣州路清逺縣尹上愛其亷慎有深沈之思留之嘗謂廷臣釋迦班曰楊瑀有謀事必咨之行時秦王伯顔柄國一日挾太子縱獵上林上黙旨竄陽春惟資公密謀禁近臣皆不預聞拔去大憝如剔朽蠧朝端動色至求識其面以為異人以功超授奉議大夫太史院判官繼升同僉院事賜金帶一貂鼠袍一公在史院曺局有以景星見請上聞公持不可曰使天下共見則為不欺越九日太白經天奏衆始服其有見上嘗從容詢公南土所居公對以西湖葛嶺之勝為洒宸翰書山居字未幾給告以樹勑賜贈考樞密公墓碑即日歸歸山掃迹城府者十年人不堪其淡泊而自裕如至正乙未中書奏公舊勞起公行宣政院判官時江東浙西盜羣嘯乃改建徳路總管建徳古嚴州州在萬山中屬邑淳安又連歙境賊由歙闚我界而還者疑長樂鄉民為盜諜者執以歸諸獄連數百家民益洶主師者謀徃捕公不可曰虚諜者知倘因疑枉鼔衆亂賊得乗釁突來悔焉及我請撫之果不測當任其咎遂肩輿從數𨽻直抵淳安邑人嘗厄官軍抄掠已皇皇散匿山谷間公載米二百石聲言賑濟使縣令馳以諭明日帥調兵來公禁止之使待命乃動擅動者如軍法長樂去邑二百里令至布公意民皆歡呼持牛酒來拜公公喜曰吾固知民不吾負即日偕帥者還公蒞郡視之如家民亦視公如父母自江淮驛廢嚴為通道窘於供頓公信今晝之用給而人不擾將戍過軍之跋扈者皆服公信令田里不聞呌呼隳突於是像而祠碑而頌者凡十有四所前良二千石未有也時公年已七十有三累請老丞相達識公數使勞之公卒謝事去是年行省承制已浙東師起公辭去居淞江之鶴砂行省最公功上中書升浙東道都元帥進階中奉大夫公不起則以半俸優老焉所著有山居新話山居要覽行於世公生於至正乙酉四月某日殁於至正辛丑七月十八日公長物琴劒書外無銖金斗粟貧無以為葬閱八月六日兩浙漕使夏公敦友義力賙其喪獲返柩杭之葛嶺先塋之次公娶某氏次娶髙麗氏子男六人長埴次坰垍培墀垓垓先公卒女三人長適鄉貢進士應才次適瞿彦俊次適懐逺大將軍同僉江浙等處行樞密院事俞忠孫男六人孫女四人某於公為同姓昆弟詳其出處行實諸孤哀衰詣邸次泣拜請銘義不容辭銘曰人疑弗決我以籌人懼弗前我以趨叶彼爭前競決我止我紏去權奸如贅由由兮物洎乎其不留於乎今之人古之求我銘其人孰與儔墓碑故處士殷君墓碑殷子姓以國氏逮宋避宣祖諱别族太史為戴氏者君之先也及君而宋亡遂復姓殷氏諱澄字公原華亭人宋朝請君某之孫節幹君某之子司法君某之弟也君家素饒財節幹君用好施著於其鄉每大雪淫雨必載薪米遍乞寒餒人死無所歸者為具衾槥􅉎之衆目之曰殷佛子娶鄉邑迮氏女得丈夫子二君其季也君狀貌魁梧美鬚髯性介特平生無宿諾人有急不一計親疎周之惟恐後衆有所爭來直於君得一言明曲直即謝去不復詣吏有田若干畮終嵗所入盡以賙人事茍涉大義雖委身不問至元間天兵下江南將軍號楊掃地者帥偏師入華亭君時避地南錢南錢猶保聚未肯下楊怒業以兵殱之君奮曰我其可無一言而死乎我死今日否亦今日遂扣軍門求見大言曰夫民猶水也水順則流逆則激民順則寧逆則亂矧郡縣新附民心未安將軍獨不能撫綏招徠以稱上神武不殺之德顧欲盡𠞰斯民何辜楊怒甚手劒斥君君復正色曰殺我一人活千萬人我死猶生也語益激烈動人其禆將有感君語者起而沮之而楊亦慴服於時民全活者以萬計咸涕泣羅拜曰公於我生死而肉骨也願嵗時伏臘祀公於社以報事聞丞相巴延公義之遂用便宜授君華亭軍民都總管使守其地君即棄去曰大宋氏亡吾以親不亡獨不能逸乎遂服野服隠居胥浦上時時領客放浪九峰三泖間忼愷懐古日夕忘返慕其人者目為泖南浪翁君聞知曰甚善名我因亦自謂泖南浪翁云嗚呼代之强仁慕義者不少也而多逸於野太史氏又缺焉不書是為善者終無以勸也君沒㡬五十年而未有表白其事者猶幸其概在人耳目者卓卓未泯余因著諸所聞為論次之使後有過其墓者得以知君之為人若此庶幾為强仁慕義者之勸哉君娶㑹稽俞氏女賢而無子先君一年卒又娶永嘉陳氏女生子四人曰實曰厚曰誠曰諲側室生一人曰某孫男五尚質尚節尚白尚功尚賢生女五壻曰吴郡顧諟吴興沈斯干宋諸王孫宜樞同邑倪乗吴郡章禮曾孫男八陞奎壁堂埜塾堅塈女七𤣥孫男二君生於宋紹定己丑六月二日享年七十有七卒於國朝大德乙巳九月某日葬於華亭縣胥浦鄉五保謝家原合祔俞夫人之封後十四年而葬陳夫人於其城又三十二年諲乃樹石墓門而㑹稽楊公為叙而銘之其辭曰仁之言利既博叶仁之行聞卓卓矢一死貿萬殤棄爵秩不以償北强以兵叶南義剛若斯人者殆南方之强非歟嗚呼斯人吾言不亡改危素桂先生碑信之龍虎山為漢天師張氏之學者恒千餘人其卓犖瑰竒之士亦間見其間若桂先生者是己先生諱義方字心淵世為信貴溪人母生先生時夢李淳風寄宿因名李寄長從上清宫熊尊師學元貞元年從天師張公朝京授蘄州道官歸而散其衣資飄然有逺志周覽名山由武至匡廬夜宿太平興國宫龍出屋後無犯先生居蜿蜒辟易而後去數飛躡層崕與豹同行好事者莫能蹤跡之樵人有見之山南同日又有見之山北者山中人酒熟曰顧安得桂先生飲之俄先生至欣然就飲所飲者家以為吉徴尊官顯人過江上者咸願見先生先生見不見人莫測也江州守某乞詩惟書一閑字與之踰月以事去官先生率意成詩書座右銘類多儆世絶俗語有金蓬頭者居聖井山先生致書封題甚謹登之白紙耳金大嘆曰至此果無説説矣道士吴李誠作渾淪菴迎先生居之先生嘆曰明年吾當歸矣明年至正元年正月朔翛然而逝越三日山南北道士奉遺蛻葬諸聖治峰麓道士方從義為予言先生之族有公武者號抱甕先生得仙術卒葬分嶺中夜家閭有聲詰旦視之但空棺耳有仲勛者號閑閑子通内外典與丞相陳福公為布衣交先生之兄與信號㸃㸃子學道終南山緘口不言升座而化三日容色不變豈其山川之所鍾然也耶予昔游潯陽見先生聴其言無過髙難行之論吁有道之士哉銘曰柱史度闗騎青牛五千遺言増隠憂更秦逮漢習益瘉燕齊方士相呀道人隠居恒内脩漆園尚友天同游一朝委蛻去莫留太史作銘表其丘墓誌銘故忠勇西夏侯穆爾古蘇公墓銘君諱穆爾古蘇字善卿西夏人也曾祖烏呼訥祖伊實滿俱不仕父布格蘇宦於杭生君自幼有竒氣善撃搏技既而自悔曰伎勇有敵聖賢之學無敵也遂從師通詩易二經以詩登進士第官紹興錄事長槍氏市馬紹興挾苖兵為佐白取餘食市間不問苖真偽咸拘囚之傳其爰上省李官時苖長虐令如火莫孰何又有省府千夫長與郡攝帥者根株為奸利抱苖長文告鉗結東徒大姓家且縱苖白日什伍鈔民君下約民曰人怖狼狼亦怖人狼弗殺食人爾録長無玉帛狗馬身及赤口四耳誓以家徇殺根株鈔民者民皆俯地雷應曰惟錄長君命夜交乙君躬率民兵殺苖不遺一噍盜起婺牧溪洞君以大夫命領所部抵洞賊問官軍姓曰邁某也皆倒戈伏罪君牧撫之不血一刃府命據蕭邑私聚民粮黷民貸敓民土田聞君到邑怖而匿去又明年西冦犯浦江君率兵至諸稽冦望風遁嶺臺命守諸暨臺借糧於民下令㑹府民無受令者君班師郡城諭以文告民輸糧者繦屬不絶攻無堅敵字民如子令無不行被旨經歴江東憲府事瀕行民哭泣擁馬首不得行時海冦勢横甚虎踞娥江君奮不顧身為士卒先追迫其人於數百里外大卿在南端覆右海勢佯浮宴君隂畜健兒户下袖金博囉撃死之屍瘞戒珠僧院民皆麻衣跣慟從以萬計贈官中大夫僉江浙樞密院事謚忠勇封西夏侯君嘗語曰吾死使君子題其冡曰義烈墓文必賴直筆者傳傳無出㑹稽抱遺先生也若識之今不幸陷死地先生嘗以其人入鐵史編收吾名足矣予為之泫然隕涕曰天將滅乎狂醜也使長城君也生天未滅乎狂醜也長城君溘先其死死又非地也天之生才其有以乎無以乎吾無從而叩也悲哉銘曰吁嗟乎善卿生也者吾不知胡為而生死也者吾不知胡為而死生不􅕊音集年仕不四年而名長萬紀嗚呼獬豸折角兮麒麟踣趾豕突西嶽兮鯨飜東海已乎善卿爾果胡為而生又果胡為而死故翰林侍講學士金華先生墓誌銘先生諱縉字晉卿姓黄氏其先自宋太史庭堅之後父昉繇雙井家浦江後遷義烏遂占籍焉曰伯信者先生之髙祖也曰夢炎淳祐進士仕朝散大夫行太常丞兼樞密編脩官者曾祖也曰愕以進納恩補承節郎今以推恩贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯者大父也曰鑄今贈中奉大夫江淛等處行中書省參知政事追封江夏郡公者父也中奉公元出朝散公外孫女王氏歸丁應復之後嘉議公疾廢育之為子也妣童氏追封江夏郡夫人夫人姙先生時繡湖水清歴世有四日夜夢大星煜煜然墜於懐公始生至元十四年之冬十一月日也比成童不妄踰户閾授以書矢口即成誦年十三屬文作弔諸葛武侯文為鄉先生劉公應龜所竒因留受業大德五年舉教官舉憲史已而復棄之多忤上官去延祐元年貢舉法行縣大夫以先生充賦古賦以太極命題古賦以極命題塲屋士不能為獨先生以楚聲為之遂冠塲明年奉大對授徵仕郎寧海縣丞江浙省臣承制遷石堰塲監運事秩滿陞從仕郎諸暨州判官至順初用薦入為翰林應奉進階儒林郎丁外憂去秩服闋轉承直郎國子博士閲六年請補外换奉政大夫江淛儒學提舉時先生年始六十有七不俟引年以侍親疾絶江徑歸俄有旨預修遼金宋三史丁内憂不赴服除以中順大夫秘書少監致仕久之又被上旨落職致仕仍舊階除翰林直學士至京中書傳旨擢兼經筵官召見慈仁殿洊陞中奉大夫侍講學士同知經筵事明年歸田里不俟報而行上聞遣使者追復前職又明年始獲南還閱七年而薨享年八十有一葬縣東北三里東埜之原娶王氏將仕郎桂之女封江夏郡夫人先一年卒男梓用應入官忠顯校尉同知餘姚州事女清適惠州學正陳克讓先生位至法從蕭然不異布衣時又寡嗜欲年四十即獨榻於外給侍左右者兩黃頭而已遇佳山水竟日忘去形於篇什多沖淡簡逺之情然性剛中觸物或弦急不可犯少時即泮然無復停礙與同鄉柳太常貫為文友風節文章在柳上人呼黄柳其論著依據義例考援的切在禁林三史惜以憂輟其脩后妃功臣傳士類服其精當經筵處講文皆切於治道之大者晚年喜為浮圖亦研極其閎盪之説請者盈門猒亦麾之去其為文表箋書叙傳記贊説誌銘凢若干篇曰損齋藁若干巻義烏志若干巻賦若干首於乎我朝文章雄唱推魯姚公再變推蜀虞公三變而為金華兩先生也五峯李孝光嘗與予為兩先生評余曰柳太常如東魯社翁課閭閻子弟言言有遺事黄太史如獨繭遺絲初不諧衆響至趣柱縆弦激絶之音出於天成者亦非衆音可諧也孝光以吾言為然太史攷文江浙時余辱與連房巻有不可遺落者必決於予在杭提學時謁文者填至必取予筆代應且又不掩於人曰吾文有豪縱不為格律囚者此非吾文乃楊亷夫文也自京南歸時予見於天竺山謂予曰吾老且休矣吾子文絶辨己白於禁林宋三百年綱目屬之子矣嗚呼今亡矣吾終不得為公史臣徒矣悲夫因其鄉生浙西道亷訪司僉事鄭公深出其徒宋濓狀求余銘遂忍而銘且悼喪亂未得諡於朝與其徒私諡曰文貞先生銘之詞曰大之星煜煜兮繡之水穆穆兮文之毓兮大星翳兮繡水㙪兮文之逝兮惟文之鳴兮大音在廷爾鏞爾筦兮我瑟我笙鼓之淵兮磬之鏗兮氣一并兮有元氏之聲兮吁嗟今黙黙兮孰見古人之渢渢洋響以上駝兮膏吾車其曷從有元文靜先生倪公墓碑銘代歐陽先生作𤣥聞房山髙公充恭在南端時薦天下士五人曰敖公繼翁鄧公文原陳公康祖倪公淵姚公式天下謂之五儁鄧公官至法從敖與姚卒官文學倪公晚始以縣大夫引年然皆以文行相髙論五儁者不以位之崇卑優劣焉𤣥慕五儁如慕古人而倪公之孫璨奉公之門生鄭汝原所狀行來謁銘其墓𤣥沗論選之職銘公何慊抑何幸哉公諱淵字仲深其先浚儀人出漢御史寛裔五世祖南金以武弁仕宋從其君南遷因家錢唐四世祖某又從家烏程故今為湖州人曾祖俊民弗仕祖椿年路分兵馬監押父守貞自號愛山處士以公貴贈承務郎松江府判官母濮氏贈恭人公生而卓異精敏絶人讀書過目輙成誦嘗則前人之勤以自課命其書舍曰經鋤長遂通五經尤精於易三禮初用薦者言為本郡學録及髙公以五儁並薦於朝未報而行省調公杭州儒學正江淛巴勒噶岱平遣子從公受學且移文中書舉公可教國子而中書已擬臺章所薦五儁各補郡文學乃升公為杭教授在杭學復田之曾没於勢家者若干畝新學舍造祭器撤上丁俗樂訪得宋太常樂工兩人俾以雅樂教諸生胄監聞之因招致兩樂工為國子樂師今諸郡學皆作登歌樂者實自公倡之中書左丞髙公昉又舉公編脩官以親老辭乃授本郡教授以便養未上丁外艱服除在湖學倣安定舊規列經義治事齋以惠來學者人為立生祠公移文止之不得躬徃撤之用累攷入流得當塗縣主簿時長官皆以故免去獨公理縣事縣版籍不明公手為分劃編次瞭若指掌二稅始如期而集嵗旱民告灾縣長斥去所上狀公曰錢穀國計民生國本理末而撥其本可乎語不合投劾去闔府駭然遣吏遮留之一以檢覈委公民賴以蘇縣前􅆜沮格久之公攟得舊田立復田為塘和州民有田在縣境猾民與交易劵成而負其直訟則執劵折之官莫能下至是越江來訴公探得猾者情始懼卒以直歸之民立異姓為後者所後父母殁且十年有同姓而非族者依倚前官牟其産至給帖者左驗民直於公公白按摘其誣者數事盡反所奪部使者元公永貞至郡亷公徳政曰吾按太平池州得良吏僅當塗主簿而已遂薦公可上縣令而公已無復仕進意告老而歸受加恩承務郎杭州路富陽縣尹致仕既老於家杜門罕與人士接益潛心於易著易集説二十八巻圖説叙列各一巻病革之夕猶置易几案諷誦之語其子曰死期至矣夫復何言須臾脩逝至正二年夏六月二十九日也年七十有八娶鄭氏先十八年卒贈恭人子男三人長驤已卒次駿松江府儒學教授次駪女二長適楊福孫亦已卒次適陸元瑾孫男六長璨用公􅄻為紹興路錢清務副使次璛琰璋瑛瓚女三曾孫男二女二公昆弟四人伯叔季俱早世叔有遺孤甫四嵗撫而教之踰于己子伯季皆無嗣則以駿駪為之後駿等遵治命以其年冬十月某日奉柩烏程縣徳政鄉毗山先墓之次學者私諡曰文靚先生韓子曰位不稱徳者有後公盛年以俊稱於時而官僅佐下邑非位不稱徳者歟知其後之必大無疑也銘曰先生之氏自漢御史經鋤有堂探易諏禮吁嗟先生早有令聞五儁同稱爭翔競奮宜位館閣歌唐頌虞大道甚夷先生徐徐白首窮經覺我後覺晚佐一縣亦展所學鄭公註禮註律益精焦氏治易治盜有聲位不滿徳時人所惜君子處之惟謙故益益不在身在其子孫史氏有撰貽厥後昆亡兄雙溪書院山長墓誌銘君姓楊氏諱維翰字子固自號方塘越之暨昜人曽大父文􅁱號佛子子朱子為常平使道楓川聞其名請見與談論竟日及遇異人移所患瘤安易韓先生某為述私傳大父宓父寧皆有隠徳鄉里推長者母同里劉氏君生至元甲午正月二十日父嘗目之曰是子生有神氣長必大吾宗時伯父實以倉使歸老於家禮聘名儒若東泉陳先生某桐西馮先生某為之師從父山隂縣封宏叔父賀皆喜讀史君與維楨攻學無寒暑抵夜以漏分為度睡則以水沃面君於經子能以疑難詰其師㑹其解而後已辯史至綮節連柱兩叔父長作文嗜三蘇字帖喜雙井黄氏每讀上韓太尉書撃節慷慨曰不讀此無以發人浩然之氣朝廷貢舉法行維禎中進士第君以文過髙屢為有司枉遂筮仕郡文學初帥府檄為慈溪邑校在職不事瑣屑惟推經術贊縣長為治后遷天台邑校先是維楨尹兹邑稱弟子者安普氏許廣氏君至尤以作人為任時安許氏皆擢第歸事君猶師焉遣子弟及邑俊彦傳經者百餘人邑士語曰小楊君政不忘大楊君教重光考滿陞饒之雙溪山長郡守韓公鏞素聞其人一見即器重稱其文議論髙古有氣燄可畏尤愛其詩有大歴體無幾保薦於江東分憲業用而以病卒官舍時至正辛卯正月十三日也君素肆直無表暴衣不事兼副被服恒如寒儒未嘗少降詞色希恱於人所居州里有公議句論裁可否不合申辯不休不為權力屈時人稱曰古之遺直者晚年游戲墨蘭竹石極精妙興至即揮洒侍筆札者給弗之暇人求者無貴賤悉為作時監辯博士柯九思自以為弗及推曰方塘竹云尤好覽天文及天下名山川形勝有所得則述為歌詩人爭誦之號光嶽集攷經有穉穧錄書畫有藝㳺畧君男一善孫男二樹河女孫一君嘗戒善曰女父玷校官女叔掇上第女母鄉先生虞雷氏之孫也女弗學振吾家聲吾弗子幸今善苦學有志操吾期其有成克應先訓君年五十有八死一千里外善能不逺水陸力䕶柩歸舍以是年十二月甲辰克葬於長寧鄉馮山祖塋之次從先志也越明年某月日善至吾錢唐官次泣且請曰先君不幸制竒數年不周六甲官卑無治狀其器業文藝又不得善文言者為之章顯地下重不幸善重不孝代之善立言者善未聞幸叔父勿讓銘吾先君維禎為悽然感涕叙其概而銘之曰千將不斷堅不以稱不利騏驥不馳逺不以稱不力於乎伯也言為世格行為世則不大祿食以放厥職於乎伯也窮居大行蔑損與益吾與伯也講之白矣吾又何計位卑與崇夀遲與迫耶故義士吕公墓誌銘公諱良佐字輔之姓吕氏世居淞之吕港大父徳謙父允恭字菜翁皆隠德不仕公早穎悟讀書輒强記了大義長儀宇魁梧器識才幹尤係人望咸以公輔器期之以其出太公望望嘗釣得璜又䜟其港曰璜溪號公曰璜溪處士性至孝奉母謝氏養以禮不旦暮衰母疾身不脫帶者三月久不瘳禱以自代母卒哀毁終喪制闋邦大夫挽之仕弗起然政有不決者必咨之郡飢有司申明發粟公笑曰必俟明降而賑民莩矣宜先假粟富民俟降以償則富者無費粟饑者獲全生郡善之貢舉法行聘碩師教子復出厚幣為賞試曰應奎文㑹貧時好學者建義塾收而教之金華黃太史縉嘗記其事兵興來總兵淞者聞公才傑至枉駕公廬與語大説即板授公華亭令公請以白衣議事却板授總兵益賢之署曰義士俾自集白甲保障其境時公己散財收死士三千餘人適斥鹵羣不逞乗亂起烏合揺毒甚公徒釋掤走不勤官徒一鏃苐指授白甲用水火舸取其魁如利獺取鯔羣從盡戢竟賴以安者數千家總兵北向竒功公曰醫恃銕砭理疾而小巫用精籍亦理覆進其魁桀於兵曰天下之物莫毒於鷄毒而醫家珍而用之總兵是其言轉無俾為精兵不尠淮兵難渡主師者辟公幕下力拒不就繼取其子恂判海鹽時浙垣首相以承制除拜遂敇授令佐鄉郡又力辭私謂其子曰時平庸才髙枕而有餘時危豪傑運籌而不足非蕭鄼侯曷治漕韓淮陰曷調兵而魯連子曷出没亂世而裕如也吾願學連子而已耳又喟然曰日月剥矣昭然有不紊者江河壅矣浩然有不竭者孺子其俟之公好義出天性里有飢周之婚喪助之四方大夫士歸之者嵗無虚燕來贐徃靡厭勌得美譽湖海間呼為淞上田文獨不賢異端之學緇黄者接其人而不談其實術其髙情曠識獨立物外者人又莫能窺罹世難虞謙亨自若與知己飲酒率過丙夜振起自舞考鼓吹笛復飲不亂平生少疾臨終無一語及後事但曰吾年六十有五不夭已幸又不死叵測復何憾生至元乙未殁至正己亥娶髙氏征東萬戸宣武公孫女也子二長恒次恂女三孫五充閭復亨恒子也宗齊宗嶽宗望恂子也冬十月辛酉葬瀆之北原先逺日恒衣衰抵予杭次舍泣而舍杖拜曰先子不樂仕無治狀而義行在鄉善言在家在邦者又不得名能文屬比於志不孝在後嗣奚贖先生恒師而先子大賓也幸哀而賜之銘吾為位哭抆淚以銘念古衞公叔文子之諡君子韙其貞惠今淞人飢而夫子有賑粟不貞乎具二善而不祿命宜諡曰貞惠云銘曰踣車無仲尼覆舟無伯夷義以勇卒全以歸曰貞曰恵匪諡予私於乎噫嘻莫尊乎野而位者覆卑璜之滸栗之埀有過其墓而慕其人者語吾銘詩巴延元卿墓銘元卿名巴延呼圖克國族也泰定四年阿都齊榜賜進士出身授某官二十年官至江浙省宣政院判其為人有氣節在官以亷直稱遇事善持論裁人倚為平擢第後盡舍所為文博極經史諸子百家古詩離騷選樂府歌行出語務追古人至正壬辰紅巾冦起江南元卿官嵗滿以本省檄起總制浙之三闗理戎職巖巖有風采蘄賊有藏草間者必游徼得之必劓殄俾無育於邑安集邑遺民民倚之為藩衞歸之如父母閱三年忽以謗去官過杭見余無幾病風竟不能出語卒卒於台某所踰月其子武童與其門吏始訃余草葬台某山徵墓銘余與元卿同年也不得辭銘曰十夫揉椎屢至投機一語所畏無翼而飛卒至於犇而病病而喑喑而死也吾於元卿乎何悲歐陽彦珍墓銘君諱公瑾字彦珍其世出廬陵宋文忠公脩今翰林承旨𤣥功從弟也祖某封某官父某不仕君自幼警穎長通經術旁及書數兵刑之法試藝於有司不售憲府才其人舉為司書不數年掾行中書考滿都事浙東帥府在掾時執政者多任己喜怒不以民害利為事君抱巻執議未嘗少阿法當而人利者必累請必行後已不當雖受怒罵必格音閣事有它掾不遑行止者必行止於君其在帥幕建議以伏海冦當以長伎久算不宜試小計規小利以為功又某官恃文事徃喻冦君力言不可喻幸小順乃大豢不順即不順喻者必死為大國辱己而果然嘗建平海策若干言主帥者不能用請辭職歸養太夫人不可鬱成疾未幾以太夫人憂去職執喪如禮法制闋遊淞中得疾友家歸卒於杭君娶閩王氏宣文檢討餘慶女弟也子三人長太平次某女四人皆妻名士臨終謂其子曰吾結貴交多市道惟㑹稽楊某為古道且為古文名東南汝徃請銘平服縗來以遺命泣而請銘曰在家温温在官墳墳墳墳有法温温有文故家為孝子官為幹臣幹曰必了不了嫁婚幸終其親其又何寃趙公衞道墓誌銘公趙氏諱棨字衞道號素軒居越之姚江宋燕懿王徳昭之十二世孫曾祖希秦宋朝議大夫知衢州軍州事贈大理寺丞祖與宜宋朝散郎溧水縣尉父孟佀宋朝散郎慶元路沿海制叅贈太府寺簿母恭人董氏先係五世祖太師諱師龍長孫孟尊之第三子也寺簿無子螟之公博學於書無不讀讀必有論裁學成無所於試大徳己亥江淛儒司舉為昌化教諭轉桐廬教諭由年勞陞饒之長薌書院長復長温之宗晦書院元統甲戌受牒命教授温州越五年教授常州在處學校有濫給廩給者必首汰之以其膳膳儒之老病殘疾及貧無依者早年散家貲結交先達凢工文與琴畫律歴醫藥隂陽者家皆館食西廡不以嵗月計士友告急度家即盡如所請與之致空囊不問酒灌量能倍斗酣次為古歌詩聨章沓韻對客可待嘗與友飲大醉梅花樹下曰梅花獨不能飲乎急呼酒用大白海澆其根且為問梅詞又為代答詞平生所為詩無慮數百什名素軒集若干巻公生於某年卒於至正四年六月五日享年七十有一明年葬於姚江雙雁鄉之原孤子礬持其叔叙狀詣門泣道遺命求予銘予以早嵗託公忘年交義不得辭遂銘曰王之孫降皂閽君為孫而文詩英酒聖交有神大樹勸汝海白樽歸大樹羅之村南容教授杜公碣銘祭統云銘者論著其先徳之善功烈慶賞聲名於天下予友裴貢士曰章嘗將其友杜子直來謁曰此南容教授曾孫其仲三而續文脉南容者直也閲三年直以南容公行狀謁予松江次舍曰吾祖仕不大無功狀爵名可書然徳善在鄉有足示後者直大父父不獲登先生門直獲登焉而先生賜銘曾大父大父父晦先徳者庶直足以贖之予閱狀證之以鄉父兄之言則知南容長者也人至以三杜姓其村其教澤淑於人者淺而義行範於人者逺也初季父某無後螟莫姓子齒幼復以公為後季父殁俟螟齒長以家産歸之而復冠娶待之不異同氣皇慶間其族困於里徭公倡率義役嵗儲粟若干給之隣里姻友不能嫁娶喪葬周之各有差渇道有漿斷津有梁凢濊於急義即勇為者類此予因喟然曰吾周遊東南大族甲姓優為此者不足多公以中産為之難也淞有饒貲家利酤𣙜兼兄弟戕死里氓者不顧吁鄉父兄之談南容長者之不去口有以哉此宜得銘也公諱英發字俊卿早年遊京師以才名得學正建寧年勞升南容教授未幾即棄官歸隠於淞之西霞自號西霞道人嵗延碩師教子弟裴貢士嘗客其所娶某氏男一孫一曾孫三友直友諒友聞生於宋己巳卒於今至正庚寅享年八十有二葬青龍之原祔祖塋預思菴之右銘曰彼戕同氣我友螟以義彼併連阡我給征以田吾知南容義且仁出於性覃於人澤及後昆至今鄉之人襲杜固姓其村白雲漫士陶君墓碣銘天台陶孝子宗儀死其親己三年制闋猶衷衰來拜予雲間次舍泣而曰今日奮起風雲附王公大臣者其聲光赫矣然有身没名著者必託之名能文家否則與腐草同盡先子官卑志則大粗見於歴官者無名能文書之儀坐不孝先生名能文言又足信萬古敢以墓辭不獲按遂昌鄭元祐狀君姓陶氏諱煜字明逺自號逍奥山人又更號白雲漫士從鄉先生周公榮學學成遊京邑王公貴人竒其狀貌言議傾下之已而翩然來歸曰燕趙多竒士今所見仍爾家貧親且老遂屈身就祿試吏蘭溪州陞補江隂州州民有劉鐡者欲犯屠人妻屠訟鐵鐵抵罪怒縛其妻卒犯之屠捉刀刺鐵君議奸殺非故比屠免之君平反部使者審讞一如君所言又豪民朱管坐戮死籍没兩家田歸丞相府相以無賴少年為爪牙縱暴陷民財民被榜掠死者無算有訴於府者府從風指莫孰何君進白府曰朝廷命公尹是邦忍坐視赤子殞命於餓虎之吭耶無賴者覆詭文移省為遣使至府府賞以幣以年勞除杭州東北録典史有畏吾人與其妻生女已十嵗一朝為省行人即别娶抑賤正妻且墐一室囚之婢引女訴主母枉録長不敢受詞君曰此婢去三人俱死矣遂受詞伸理行人坐黜退果遷湖州歸安時湖州已陷賊君從主兵者劃計策遄復湖州乏糧君為檄文走一介召諸艘具至無時刻違録功中書不報調紹興上虞縣嘆曰吾懐抱利器不後於今之人而浮沈六寮不得與今之攬權力者比年已莫死期將至矣尚何言哉遂卒於郡都昌坊之寓舍享年七十有三戊戌九月二十七日也配趙氏故宗室諱孟本女也子三人長宗儀宗傳宗儒女三人銘曰其貌魁如其論魁如考功千吏秩乎不可誣用不能大卒老死簿書噫嘻乎自古才而仕仕而漫者豈惟是夫兩浙轉運司書史何君墓誌銘君姓何氏諱宗實字誠甫其先曾大父直方繇東平徙杭大父徳遂占籍為杭人父祥娶周氏皆樂善好施君微時遇善相者曰此子神清骨秀他日樹何氏門戸者必此子也既長善讀律能權衡世事料後成敗如蓍見性鯁直弗尚外矯為義不讓人遇不義退處如怯夫尋試吏下邑以能聲著陞杭州府史明年秋郡當慮囚檄君典獄案君窮爰書底訊鞫論報發其留白李官悉決遺枉者昭雪不以嫌避囚有法當劓時犯者皆阽死君曰劓雖著令民迫不得已耳上方施仁政恤肉刑鼻可以死地棄哉君以墨限劓當法而已咸謂如其仁如其仁後竟為故事格當調調者咸購大郡有賢守將足矣郡奚擇於大小卒調毘陵居無何進曰郡守行仁政必自鰥寡孤獨始矧舊制立養濟院惠民局以濟窮察病今院概非窮民處局又弗核實鰥寡孤獨何利哉郡守下其議郡轄一州邑賦役號難治田畝多為勢匿郡守選君土其地均之君詢髙年究畝瘠肥及核户豐約繇賦役均榖祿平為鄰郡最尋富民妄訴田有灾君詰之詞窮要以賄君曰吏當守法農當守耕爾以豐為歉詒縣官我以法覈實奚敢以賄敗我法卒黜之郡守賢其人呼必以字户部尚書秦公為兩都運使道過毘陵詢能吏於郡守以君對秦公亦素聞其能因訪以鹽筴君疏上利病大竒之㑹丁母憂事輟服除起復為掾是年儐運判李公分漕嘉興君立條告先輸者賞後者罸民詿誤禁者出怙者必刑時天積雨盆不成鹽君齋沐露禱明日雨止鹽賦告足咸以為何君至誠能感神明年典戸曺君樹格殊常式四方商旅來者如市賦用倍盈事聞上錫酒旌官吏勞官曰何掾服勤宜先我酌君以為吏箠楚民之賦羨而受上賞後必有甚焉者遂解去郡邑大夫髙之日造其廬與評事君辭不可遂隠居玉泉山自號一懶翁君素仁孝慈愛所得俸奉母外以覃於族母疾晝不出夜衣不解帶母於朔朢夜嘗露香禱天曰富貴非吾願願吾孫事吾子亦若子事我也杭城灾四止成墟君室廬獨巋然存人皆以為孝感所致兄宗茂同居無間言怡如也妹一人適戴氏戴殁君給養其家子女為嫁娶隣婦有哭甚哀者君微之喪其良人貧無以治棺即賻之他日婦至請傭以償直君曰周汝急豈望報乎婦謝而去君當屬纊神裁不變召其子敏及兄子敬於前命之曰凢子之事親生事以禮死葬以禮爾慎毋為異端惑語終奄然而逝君娶沈氏勤儉有家法生子一人敏是也又賈氏生女在穉敏力學不勌有司辟為浦城縣學教諭未上而君卒君生於前至元甲午夏五月十日卒於至正十三年正月十有九日享年六十嵗是年三月壬申葬於錢唐北山玉泉松義里之原敏樹石丙舍哭位來乞銘銘曰展矣何君如其仁刑有劓與死淪君平施之復生存風灾屋廬無間鄰君一室奉親人莫與京而獨得于天叶嗚呼何君如其仁年不踰甲祿不享夫身尚嗣爾後人東維子集巻二十四欽定四庫全書東維子集巻二十五元楊維楨撰

body:
  text: 序送鄒生奕會試京師序漢儒明經貴不倍其師説能不倍其師説者上召用之髙下其材為博士郎大夫部刺史馴至九卿丞相御史者不少也吾是以知漢士之近古也其為術也有師宗其為行也有操尚未始以經術自進為售利禄之具也去古日逺則下之干進者以經術而上亦以是設科而取之然今日得之明日棄之矣視前日之所業者不啻象龍芻狗物也尚欲責其不倍師説於終身而不弃者可得乎吳郡鄒奕𢎞道其大父為士表吾之友也士表樂善好客教子孫尤切切不重千金費逺延碩師居其家此奕所以經之明而材之達也今年秋江浙鄉試以詩經充赴有司者凡七百人中式者僅十人而已而奕又為其魁蓋其得於祖父師之講明有素者可知已將如京師以余為大父執行也拜而乞言故余為陳漢士之近古者望之况今天子既復科以取士又且掄選經術之老者侍講筵進士之有經術者固將以次召用如漢之九卿丞相御史者不難也奕之得於祖父師之講明其可一日而忘去乎奕勉之大父不及見矣異時果於無負所學也豈惟慰望扵其師實慰汝祖扵地下也至正丁亥冬十一月初吉序送强彦栗逰京師序孔子曰士而懐居不足以為士知古人君子未嘗不逰也而世之逰者漫矣志無以自信貿貿焉行四方以萬一乎詭其所遇取盈而復以菑其身以累其人往往是也若乃君子之逰延陵君子之不幸生於東徼也志不有其國而獨志於上國之逰以歴見夫華産之人物先帝王之遺風善政以廣其耳目之陋意氣之隘約而反之於中有合不合斯逰之不可已也嘉定强彦栗生於延陵君子之鄉曩嘗勇不自禁出吳關歴毗陵句曲拆而上金陵遂絶大江而北涉洙泗以翺翔乎闕里過涿野以蹈厲燕趙之俗而遂達乎京師以觀天子之光京師窮貴人有竒其才挽置於􅀫衛而彦栗徑决去不暫留是其志不在區區利達而所存者大矣今有不憚數千里行役如曩時過吳門别余曰余行李如京不能與子久處已余壯其逰不難而其志又不苟也知其逰似昔君子上國之逰而非代之漫焉而詭其所遇者類也他日歸復見予吳門聽子之言議覘子之心胸有以驚異予者而後知子之逰不可以已者如是顧吾在吳栖其困滯如退羽之鴻不能以丈尺奮飛於子之行也其不投袂而起乎謝生君舉北上序上饒謝生鈞從余逰者十年通春秋五傳學其才日茂不已自㓜博行孝睦人無間言往嘗以行藝書于黨正連試有司弗售不一咎有司而咎其學未至也益進修弗勌今年秋來别余曰鈞辱先生教而未有仕路以行先生學也辱在泥塗鈞耻之先生耻之幸吾鄉應奉張公有以挾鈞京國之行謹造請先生幸先生賜一言以警鈞余為之喟然曰才弊於無先行衰於寡黨此古今之士之通患也士負才行有不幸老死于三家之村千室之邑者不尠矣往往思借交青雲之士卒而奮焉尺長斗滿皆得以伸所有而况於才之茂行之卓者乎生往哉吾聞張公大相府之賔卿也相府以好賢聞天下張公以賢薦相府生患才之不懋行之不卓耳不患無其先與其黨者矣吾見張公之不以嫌而避賢也吾見生之賢不以次而進也傳曰大夫將昌以其得士張公以之又曰庶人將昌以其得子謝氏父以之又曰線因鍼入不因鍼急女因媒成不因媒貞生以之送吳子照逰閩序雲間吳生照將逰閩以四明臧彦誠之書來乞序其行具言生年少負邁往之氣加以博學好古慕先生之竒文章如慕太史公蓋將歴覽形勝結交豪傑于以開豁其心胸發舒其意氣或者有所資以成其才也乞先生一言申其志余謂古百越地在禹貢揚州之域物之貢聞天下而人才之出未多見豈山川磅礴之氣未發泄歟抑王者徳化之所未覃也漢以來封疆之郡縣之覃以詩書禮樂之澤然後人才軰出與中州文章道義之士等至我朝涵飬樂育之既久士之擢髙科躋膴仕者磊磊相望官於其地者弗以冒嶮􅇖犯瘴癘為難其山川足以豁心目人才足以取師友生之往也登覽或遇隱君竒士有相識者或未識而已相知者詢及於余即啓行槖出余鐡笛傳及史鉞絶辦凡若干言必有以竒我者竒生矣他日歸吳尚有以徵吾言張先生南歸序淛士多無恒經治亦往往不顓有一年輙更或半年纔更而竊中科以故士之經愈不顓且又視經師之利不利為嚮坫意學經將已明道也豈計利不利哉以科利而學經則科一利而經復棄矣終亦必亡而已矣嘉禾張生汝霖獨於經治有專習曩余在錢唐時首以父命來受春秋五傳學更鄉舉者三而藝未競生不以咎有司而咎經術之未至益恒若力所習經有加無己坐誦行思恒若無誨者故又負笈不逺水陸尋余九山之澤以終其業焉非其學經志於明道而不計科之利不利者歟吾義其不畔吾門又竒其性之有恒而志之必有成也嘉禾之野其得遺其人也哉吁春秋主斷之書志成者及之也明其道不計其功者又春秋之教也若生之志蓋已得春秋之斷而其道已得春秋之敎矣他日推之任也天下之治孰禦焉彼習經以利科科一利而經復棄終亦必亡而已者又何議為送韓奕逰吳興序同里生韓奕從余受詩春秋學行日脩才日茂其為文如雲興鳥仚未見其止也今年從予吕氏塾輙思汗漫為神京逰余止之復有請曰奕從先生學幸知經史行墨然聞先生竒氣多發於東西洞庭大小二雷七十二弁之峰今將訪先生舊逰魚龍虎豹風煙林壑之音遇以擴所見而終所業焉幸先生賜一言以警敎奕也余嘉其志曰人之學猶海也水沿河溯以弗至于海不止海集衆流而后為百谷王也學其可以小自滿哉洞庭之西有蔣氏義門劉范世家在焉巽毅鳯麟皆從余㳺者也皆好學不勌而知學之不可以小滿也又當不逺數百里尋余􅍩之鄉而卒業焉奕往哉與之洞庭上讀書然後繇洞庭而浮大江度洪河上北嶽以盡天下之大觀吐而為書以獻萬言干明天子也蓋發軔乎此行已奕勉哉至正十年三月三日序送齊易岩序太極理也一隂一陽生焉教之所出也尸物如天地而不能逃乎十二萬九千六百之紀而况於萬物乎周與秦合不能逃乎五百一十六之數伯而王又不逃乎十七之記而况於一身乎聖人作易前數之用於蓍龜神矣然未聞一語一畫為之兆也兆於一語一畫之微而㨗乎蓍龜之著數之用益神矣此先天之學在魯為梓慎鄭為禆竈齊為國甘公漢為眭京晉為管郭唐為袁桑宋為邵子元為傳氏初菴菴之宗為齊氏易岩也易岩之言曰初菴之傳得之建昌廖學海學海得之於蜀杜可大可大得之於王天悦天悦實受之邵子也天悦之學幾絶塟其書玉枕中蜀㓂發塚出秘書可大賄盗之人不能傳而學海以直言得罪配軍籍漢陽道遇可大可大已知其姓名曰吾數當傳子為偕見郡將出軍籍館諸道宫為弟子國初有聞于世皇世皇將召之學海業已語其女曰我若干日死死若干日朝廷命來我已死且索我書我書當傳者傳氏立名人也其人在某所某日來異日官極品汝頼之官且賜田若干頃矣已而果然初菴之没三年而易岩始生初菴埀死謂其徒曰汝曹口耳之學徒得吾膚淑吾書而得吾髓者其齊氏某乎易岩生四嵗知讀易長於河洛七緯太乙九宫之數及星算鳥占嘯風鞭霆之術㒺不洞究故於初菴之學峻躋峰極非一時儔軰可㡬也予嘗異天人之學父子不相授也其授於人者亦有數焉則其觀於物者可知已易岩之觀天者吾不識之其觀物者吾見其於一語一畫得知者衆矣雖然予於易岩有問矣道之難傳甚於數也堯以是傳之舜者舜以是傳之禹禹以是傳之湯湯以是傳之文武周公而及於孔子孟軻孟軻死不得其傳焉嘻道之傳者其亦有數乎無數乎軻之後其可無傳已乎易岩曰道之傳天也亦人也是隂陽大極之説也易岩去予而之京師也請書以為序送何生序何生伯翰氏其先西夏人也祖息簡禮嘗録僧事于杭因家焉父益憐質班早喪翰生五嵗依舅氏舅氏因以母姓姓之母素賢通文史既寡以節自誓教翰有法日出就外傅夜歸課其業年十六嵗受經於予通春秋五傳毛氏詩尤長於易遭時喪亂士以弓刀之習易鉛槧翰獨負郭闢圃奉菽水于母暇則退處小室理故書收緝予平生遺落文草遂補注吳復所編予古樂府集行于時人稱其學該識廣復不能過之今年夏文闈􅀈開翰就試先三月靈鵲巢其書舍木見其扶梁啓離戸占者知其為中雋之兆而不知其學有素也将㑹試春官同門友為賦詩供張西門之外求予為叙遂為書其世出行藝之槩于巻首云送李志學還吳序太尉府僚友官以百數惟右轄李公椎魯少文可以屬大事叅左右轄官者亦以百數惟軍諮李君雍容諷議可以贊大功故占東諸侯之後事者亦不於其兵强弱馬壯敝而以其叅諮幙府者得人與不得人也今之所謂閭里豪乗時而奮類鴆於安鄙於肉食鳴呼菜傭而欲倚之以集事亦誤乎必其雄才卓識負王伯畧可以登公輔之器者然後可與成大事立大功若今李君者殆其人矣乎吾聞河間多禮法士而李君者殆其人矣乎吾聞河間多禮法士而李君者夙抱其節承教詔於賢母如嚴師傅當戎馬猾夏時節即慨然有平河洛志而况太尉府得知已乎雖然西虞之㧞冗以進將以伺吾釁也未足為吾憂忽又無故而退無以乗吾間也未足為吾喜君歸太尉府太尉問君西虚實狀吾攻守利害何如君必有以對對必有御戎要畧為太尉規者慎勿為閭里豪鴆而鄙者談也至正乙亥夏六月壬申序送劉生入閩序古公卿等絶卑賤其與圖事必有取於卑賤之士士之竒特鯁正亦願畣之以所有上下至於交相得而後事可圖已漢叔孫通有兩生不能取項籍有韓生齊王信有蒯生不能用鮑生為蕭何取陸賈為陳平取王生為釋之取吳公之取賈生田延年之取尹翁歸暴勝之之取雋不疑之六君子負守將之尊執臣之貴而未嘗挾以自尊貴必有取於大人者以其竒特鯁正可與圖事者也今公卿不取士久矣吾始於貢公見之公以戸部尚書入閩天子益以理財贍兵者責焉四方士待公行者幾何人而錢唐劉生獨以過人之才及其骨鯁風裁為公所知公取生惟恐失之生亦愿荅以其所有惟恐不逮吾見貢公之出遐方王事確乎其有成算恢乎其有成功也已夫召陸諸生不失其所矢而六君子之道益光生思畣於貢公而益光於貢公者其不得自行召陸諸生子哉生嘗以茂才被肅政使丑的公之薦授校官不就今樂知於貢公而起也其以畣知已較然不自欺也諗矣杭人能詩者歌之君信其人序之生名中字庸道世山東人送王公入吳序王者人才得於鄉三物之所取是也戰國人才得於客四豪之所飬是也兩漢人才得於薦公卿之相推轂是也唐人才得於科懷牒以自試是也士之興至於唐宋之科其去王道也逺矣今取士不免於科軍興來科亦廢不幸又不得於薦則得於客耳三吳之㑹為今淮吳府也客之所聚者幾七千人吾求客於戰國得孔伋焉孟軻焉荀况魯連焉毛遂馮驩焉牛畜荀忻徐越焉而秦儀軰妾婦爾不足以客進也淮也吳之客七千異於妾婦者幾人有所謂越乎忻乎畜乎驩乎遂乎連况乎連况不可况軻乎伋乎哉或曰淮吳有王明氏者澄不清撓不濁有俞賢氏者言中倫行中構有用仁氏者㢘範乎靡俗治幾乎循吏有陳敬氏者納言骨鯁風裁古也有姜儀氏者人倫臧否氷鑒美也淮吳之客何劣於戰國哉縉雲王生時以儒科廢於古文學有年將挾之以入吳别予於杭湖上求一言以行予方疑論淮吳之客而生將客焉往哉吾將卜淮吳之客於生也諗有五人者五人引其類以進生不為今遂驩其為畜忻越矣茍妾婦也其歸矣哉吳氏歸本序錢唐吳觀善字思賢自杭之淞謁東維先生曰善之外髙祖徐防禦氏在宋為小兒醫贅壻曰范防禦氏范無子又贅宋四門教授吳氏子從明字公亮承其家而嗣其業南渡後自汴徙家杭之東青門從明生徳誠提領平江毉學德誠生仁榮杭州路毉學録仁榮生四子長即觀善也善通經史學不顓工岐黄氏之書嘗讀文正范公傳公㓜隨母適朱而未嘗一日敢忘其本生卒復范姓君子反本之道也善隨外甥氏宗于范今將反本於吳禮也已作堂先廬之東名以歸本丐先生大手筆一志庶吳氏子姓有以知水木本源之義也吾悼秦法子壯則出贅世襲以為風父道不正遂不子其子而子其壻致宗祀不明氏族亡辨有司詔民者又不以釐而正之至使一門沓著户籍其壞倫紀也甚矣善能反本於徐范二宗之外而亟歸正於吳非讀書達禮篤正之君子其能若是乎哉鐡史筆之故吾樂與之文使代之不肖子姓蹈秦風之痼弊者有所儆也夫送于師尹㳺京師序士有學周孔之藝者不幸不薦于有司而其志不甘與齊民共畊稼則思自致于京師不幸其藝又不偶始不免資小道干王侯以冀萬一之遇者十恒八九若星風之占支干之歩色鑑骨靡以及瞽巫妖祝驅丁役甲丹沙黄白水火之術凡可以射人隱簧人惑一詭所遇者無不屑為焉而其近儒道為貴官徹卿心敬而身禮者則無出於岐黄氏之伎也蓋岐黄氏之伎司人死生命而百家衆伎之莫能尚也髙自奬其道者且曰上醫毉國吾嘗在京師視岐黄氏之流封閟笈中藏擁侍女從百金馬王侯庭中或出入禁掖無所頋忌小則要金千賚大則要暴位顯要不以一旦踈賤為嫌也嘻若是者豈吾道之左使然耶抑公卿不樂扵正薦士之所致耶先生曰讀至此不一唱三嘆非知言已天台于師尹與其兄舜道嘗從余㳺舜道以經學中進士第而師尹連不得志于有司今不逺萬里逰京師來丐予言以别予曰師尹懐才藝不耦于時何分扵中外彼此哉師尹曰儒伎不利吾旁㣣者岐黄氏之伎也不耦於此将有耦於彼乎予悲其藝成而未利而壯其志之必有成也於是乎序送沈均父序予友漕使拙齊公為予談太末有竒士曰沈平氏字均父自號自量宋少師某之七葉孫也其為人斬斬有風操人有過面折之疾浮屠氏如糞蛆明經試有司弗售即焚棄舉子伎以岐黄術自隱至正中境有桀民弄兵者守將莫孰何君起率鄰邦大俠合劵甲用淛垣摠戎令禽之若狐兔盡夷其穴巢一邑頼以安又龍邑令翟某者貪呇與豪斷民相根株齫齚其民無屬饜君件其狀走部刺史白之翟與根株連坐徙實邊人稱快佗墨吏見君曰此白衣言事生也吾聞而異其人無幾何君㳺淞相見視其貌若荏而中精悍無敵質所行為不誣宿留九山月餘别去淞人士能詩者歌以餞之而以首屬余余以士有匹夫而任人倫世教之重一言一動切於救時如負禄位者謂非毅然豪杰之士不可如魯仲連郭林宗石徂徠其人是已世降以還士氣不作代果無若人乎吾於均父見士氣之猶古也嘻世有任人之言責往往為瘖蟬伏馬而吐不平者乃在巾澤之士世道不幸亦世道之幸歟後之求均父者於吾文有徵其得以詭托者信為扁倉流乎是為叙東維子集巻八欽定四庫全書東維子集巻九元楊維楨撰

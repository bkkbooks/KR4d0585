front:
  text: 楊維楨撰
  hash: sha256:2b92ed2af507517689bdfbb41a498f4a0fdff8ae59ab25986b23b9803c70d00f
body:
  text: 碑兩浙監使司同知茂巴爾斯侯善政碑至正十三年春正月杭之監檢校官劉某將監商嚴峻等来見余東門次舍請文以記使司同知茂巴爾斯侯之善政余驚疑曰當朱鬒氏冦亂之餘而監漕官有政可紀非官之祥也歟余嘗官於海濵矣見歲之分漕官挾捍吏二傔㚢一校卒數十至分所必先震刑威而以售沓墨於其後下視亭民吏如圈置兎狼殘隼虐無毫毛隱痛其啖噬滿然後民吏始得埀展手足官給工楮大亭與亭吏必撙捐過其半謹而儲之以俟分漕為故常若輸公租奉公養者吁民其有不病乎朝廷憫之為減額數三之一署監漕者皆輟以臺憲老臣及州郡之良二千石今沙侯之同知兩浙監漕事其應是選歟峻曰自侯下車即攬轡慨然有激揚志分漕嘉禾先問亭黎老貧艱孤苦聴以狀聞取其損數與大亭埀除之豪民故犯推與吏作奸市鈞逮富人及仇家不論情實侯一理已犯弊立革桀吏舞文敗吾法誅其尤而餘皆有儆任指使者皆恂恂然謹行於冥恒若侯視聰之及亭工楮毫釐皆到民無異時撙捐民咸抃手呌嚾以為非工楮之惠沙使君之惠也故在嘉禾未嘗一箠及亭之民服力歲課不啻如子職比還司而漕使長且驅馳兵事亭之商散轉漕之利幾格侯於此時兼伯長之政招徕客商不減平昔先是倉史與網兵相為奸雜監以偽惡侯申令禁止又其所藏監悉多累年不彂較常數虧十之三四侯驗商人所給數俾新間故以與之且不使强有力者越先後次不數月商舶狎至流運不絶足課於常數以充軍國之需於此是侯之才有大過人者無負國家選用之科矣吾聞君子論祥以政不以物商人談侯之善政如此亭家被其澤者可知已非吾所謂官之祥也歟是宜書其蒞官行事刻諸真石永示後軌侯西夏人字某平章某公之孫也記銘曰惟海殖利利民利邦謹政厥筴懼民有創法苛亭困法慢困商官不理法墨敗我常爰選才徳以量漕綱惟我沙侯良二千石下車求言民我休戚指使循良抉去蟊蠈刑罰不乖爾亭我力關石不頗爾商我役惟侯治法亷厚秉心其履怛怛其徳愔愔展我謳歌易爾呻吟昭然氷鏡溉若旱霖轉運大利出納弗僣君子論祥以政以徳矧丁冦亂官失守職我侯守官乃建成績盍踐公輔以禎王國我作銘詩昭示政則長興知州韓侯去思碑呉之長興范元禮致其州父兄之言曰州之良二千石為韓侯侯起身濮陽同知州事厯汝同知州事得民譽甚四命為今職長興呉壯邑也其地邉具區農艱食其土俗浮啙好盤遊大家喜氣勢多訐爭素號難理雖老財詧者病弗遑惟侯之来也本之以仁明決之以剛而行之以直也盡刮去舊時積螙話焉為令筆焉為畫一出予奪是非之公長貳或以各意爭予敓侯既以正持大綱其中雖上下有矛盾其不順而治者寡矣民始有弗便安其為者形諸誹謗侯聽之未幾則咸識其意樂其利而歌其休也邑役素不均由資産弗辨也侯下令産漏資匿者許若干日自陳即不陳許人撿没焉不三月得列簿帳役無不平曩貧兇視戒石􅀈因去之侯至作新石益大書其詞且名其紀令書曰不欺天云由是大家悉無敢奸以私者白烏鄉者悖弟周福斫死其兄而誣訴於他日者侯得其情出他寃反厥坐下箬寺僧某為仇人誣奸狀中傷吏右仇相為根株僧某下獄室幾死侯辨其衣物差牙即伸其枉民情大悦服其明決類此侯奉太夫人且八十矣太夫人教侯仁且賢侯朝出視民事歸必告其母事當理喜而飲即否不飲食且愠見於色故侯政之休者多出母教也侯視事朞月繇賦平奸慝屏流離還關市通墾闢廣而庠序之教興矣民讙然誦之為良二千石徃者未嘗有也今秩滿去吾民有什百為相與涕泣遮馬首於東門不聴去者願子體民意畀之以文刻諸州亭之石不惟使民懐徳不忘庶繼侯来者亦有所述也予客呉興者二年諗侯之政與州父兄言不誣故為之序而且繫之詞侯名約字彦禮愽齋其自號真定人其家世勛望有家乗在茲不復詳也長興雖湖州之支邑曰呉長城悍若易闢義亦易興惟民師師慎簡其人其人伊何曰剛且仁侯来自西維父維師且視其民夕奉母慈母訓爾聴子民爾政俾爾民康寧俾爾無爾病惟牧保民若保赤子我哺我衣惟恐子駭汝疇汝闢汝蠶汝職勿奪汝時矧廹汝役汝有痛生我其恤之汝有枉罰我其出之政用大和臬用不辜若旱得澍若渇得甦侯今去我誰與活我廹我寃我誰復拔我惟湖有石其石漸漸刻侯去徳後来具瞻富陽縣尹曹侯惠政碑皇帝踐祚既久念海内外土地之廣生齒之繁仁義禮樂之澤有所未周乃召丞相議政化之得失繫於郡縣之寄由是簡牧伯以惠黔愚多用儒術為理仁厚循良之吏徃徃得以紓其藴抱而窮山異谷之民皆沭其惠休若富陽之有曹侯亦其一也前守有不期月而去者侯獨留五年而民惜其去去之日邑士民馮某等来謁余錢唐乞文以紀侯之惠績馮之言曰富陽杭支邑當東南要衝枕山帶江無沃土美植以當大府之需故民勞而貧俗訐而澆侯下車首以敦本厚俗為先務屬孔子廟壊乃捐圭田之入率士籍之優饒者以建立為事廟既成又為之聘名師招俊民而教養之不數月弦歌禮讓之風達於郊鄙繼新三皇氏之宫社稷之祀壇壝皆煥然可觀下至郵驛河梁百廢具興而民未嘗以勞告巡行畎畝躬説桑田畊深條柔而民無失時惰事之罰阡陌既闢民食其土而庭無盜賊獄訟之聲良由賦役均一而徵科弗亂吏無並緣之奸而民始知以有生為樂也歲六月不雨禾將稿死侯走祈山川甘雨隨注馬山有虎白晝傷居人侯投檄山靈虎尋遁若受告詔而去者侯之感於鬼神禽獸有如此者公退輒閉戸讀書或行山水間時為歌詩以紓其清曠超越之懐其自治有如此者其為政也明而決其下士也恭而禮其馭吏卒也嚴以恕葢侯以兼人之質以承其家學有尚書誰一郡侯運使通議公為之祖州伯奉議公以為父其忠君惠民之教耳熟而心飫之故其設施章章如是前倅湘潭録嘉興既去而民思之今見於富陽者吾民之思葢過之予聞儒之為徳和平而靖深寛簡而粹宻故彂之於事業多惠愛子諒非徒長裾濶帶以取侮於庸妄者為也若曹侯者其亦古之循良吏也歟誠無負吾君與吾相畀予之重矣曹侯徃焉日躋顯庸展其才以施天下益信夫儒者之有為非世之俗吏所能輩行也余也蚤以儒術食君之禄而老與時違聞曹侯之風未嘗不彂愧焉故重馮之請而樂書之侯名忠字惟良燕人云於潛縣張侯禦冦碑有厖眉叟數人来自於潛山谷間偕其邑大姓曰章和徐瑀等若干人言其縣令張公傑之為保障有狀至元乙未夏五月賊起安吉東扺縣外境謀縣署所宅之縣以兵守者先遁初侯慮賊以義結民為伍乗法民無窮富老穉皆樂受命修門隍理器械立旗色號凡若干伍侯以主帥自命矣于民田令今日與民共死生吾死若輩偷生令以五乗法殺若輩吾偷生若輩亦以五乗法殺令即夜統衆二千人跡賊所經搗賊虚殺其魁一人從十人賊望風崩潰越明年春正月賊又自徽突昱嶺䧟昌化昌化去縣治僅三十里所居民皆荷擔謀徙侯餔牛酒呼民復以五乗法矢如初賊素聞侯名且有兵畧皆迂去冦他邑句縣訖按堵如故仍調鄉夫守禦四門晝理縣事夜巡縣境以為常民之倚侯葢柱石矣夏四月淫雨窮晨夕不止凡十日二麥垂稔而腐且過半侯疏詣岳祠痛自責者三而天大霽民之倚侯又神明矣他如分振窮敬教勸學飱老疾宥孤寡此又收人心以助皆可書者吁若張侯者非今之保障臣哉侯丞楊子縣有治聲邑民為樹碑著善績令尹吾於潛捍灾禦患力政益過之潛父兄亦將樹石西門以為吾人紀去之思聞吾子文足以傳後自有以第而登諸石予嘗以紅冦滋熾徃徃易吾官軍官軍覆不敵者以主兵者無能主兵無能以五乗之法亡也誠便小而長千夫大而統六師者能守古伍乗法如張侯者吾未信兵不利冦不殄也吁秣陵之潰武丘之潰視主將如塗人非惟棄甲而去或有倒戈而仇者誠誰咎哉吾宜有述以諷主兵之不如張侯者庶有瘳乎余未識侯跡其治行若是不啻如心交其人也於是乎書侯名傑字漢臣濟南濵之世家云至正十六年春正月七日記重建海道都漕運萬户府碑海漕古未有也古者天子中千里而都公侯中百里為都天子都漕而入者地不過五百里公侯都漕而入者地不過五十里禹貢所載入渭亂河乃節級轉輸之次其輸止於方貢之物葢是時兵未有餉仕未有廪何有於漕運哉春秋時國各有兵事則始講求其法亦不過師行之餉國都之漕猶未講也秦罷侯置郡令天下飛芻輓粟負海之郡轉輸北河率三十鍾致一石漕之為役始勞而汎海之漕亦未講也國家定都於燕控制萬里外軍國百司之調度皆仰給於江之南漢仰漕山東唐仰漕江淮皆無道里遼絶之阻也今京師去江南相望水陸數千里而軍國百司之調度欲朝夕供億如取諸左右吁使無良法以致之則民勞國弊又可勝言也哉此江南海道漕運之法開實天運之所啓也廼至元十有二年天兵下江南丞相白顔公悉收庫藏圖籍上之京師屬將朱清張瑄自崇明徑海達於燕而海道實開於此繇是東南入餫者浮游大舶絶海而行發陵倉踰成山厯菜洋入界河扺直沽以灌於天庾海若受職祥飈送順龍驤北指僅旬日程耳茲非曠古以来所未有之大利㨗便乎故曰漕運之開天運之啓也越裳氏謂海無烈風意中國之有聖人也證之于今不信已乎初漕之署開三府于平江置萬夫長六員僚屬若干人虎符金節兼㸃軍旅秩數視他萬夫長府弗得儷其華且重焉大徳癸卯併府歸一長貳及幕僚凡九員𨽻屬凡八所糧餫歲増至三百餘萬每起漕必行中書官親臨督調吁漕運之功大則漕府之職隆勢使然也至正丁亥夏萬戸買木丁公来視府治庳陋土木潰壊無以副朝廷設司授職之重廼謀諸僚友副萬户鄭公洎定僧公恊乃心力各出俸金以率僚屬助以營運子本之贏明年九月某日始獲徹弊而新規制視昔益宏而壯閱三月某日告及幕元僚孫君来謁記且謂自剏府来七十有餘年未有名言埀諸金石惟子其言之予既為推言海漕之關於天而又有名於人者天既啓之人克佐之斯萬世萬全利也不然萬一魚龍之國阻為巢穴天有不可恃君子之所慮者亦逺矣居是司者知天人交應之道則知其責愈不薄也已可不勉哉買木公字永錫西夏人起身宿衛連佐省臺有風節今以資善大夫為府之監鄭公用和字彦禮三衢人定僧字平叔浚儀人皆以近侍輟居漕選經厯孫震知事鄧繪照磨衛權董役者千户楊元正府吏湯文脩馮謙章復也銘詩曰朔方聖人啓中天天府之國宅幽燕帝車廽旋統幅員南海北海無中邉海陵餫饟主領顓龍驤萬斛誰開先神人手執鯨鯢鞭朝彂扶桑暮咸淵清明風生五兩縣不周風起人南還砲雲不作颺不顛神燈在天大珠圓帝曰開府具區堧出臺入省居才賢將軍来自西于闐高門大屋重翬鶱十風五雨熟大田天倉如泉積萬千武夫翼艘挾飛仙天人交贊利萬全漕臣奏功帝曰然囷星煌煌千萬年大中祥符禪寺重興碑秀郡庠西个有古伽藍曰大中祥符主僧曰曇師持寺之重興狀来謁於庠次曰寺之棟宇象設其来久矣廢興紀録敢以請子之名能文庶後有攷且以壽吾教按狀剏於東晉興寧間哀帝詔剡山法師潛講般若禁中師還山道由檇李舍于安撫大卿魏公某知其有道行遂舍地為寳坊延之至梁普通盛行水陸法事故稱水陸院廢于唐之㑹昌大中天子復天下寺院寺徳故宋大中祥符元年改賜今額羣疏于朝作銜前崇奉所至今寺之坊字曰華封云獲賜城西蕩田若干畝元豐間有市民魯性忠者裂地五丈充寺之河歲令祝聖放生者是也建炎寺燬紹興乙卯主僧法瑜募有力者建佛殿山門兩廡及五鳯樓縣鍾有虡庋經有藏沙門先者繼成無量壽佛殿三聖等像二十五年太守林衡奏改禪院乾道辛卯大府丘某奏賜華亭没官田九百畝籍入寺我朝王林琪公始領寺事又置新田若干畝寺之養稍贍絶照光公来理法堂鑑湖澄公繼之適颶仆後殿三聖像之存若有神䕶者未及興復而寂梅屋常公至僇力經理僅成明樓及歸雲寮至元戊寅江浙相府舉叢林碩徳充各寺法席而我曇師在選中顧寺頹圮狼籍如逆旅舍寢食遑安遂盡棄鉢資及募諸檀經營者十餘年始克鼎建後大彌陀殿中嚴無量壽佛像左右十八應真仍翻理前殿左右廡裝靈山㑹境方丈寢室咸就嚴邃下及庖庫圊湢一一完美寺之前後廢興若此余惟寺之廢興以人不以時而人之興也不以土木之績而以碩徳高風也若肇基者之潛師與今曇師之復興者是已然則碩徳高風又豈在於禪哉水陸法事哉吁象教化濁世而後有水陸法事良可悼也佛法離而有禪禪益離而有南北教可悼已吾怪今之言禪者不根祖始隱語以相蒙誕言以相勝使其徒悵悵然捕聲索影訖無自而入大雄氏之道則徃徃徂狂而失守吾喜曰雲師師身禪而心則儒嘗與吾論道已以性善為法喜以敬尊愛親為上義以安貧居易為極樂以作善降祥為因果以言師百代行師千種為不壊身殆有與吾儒合者非禪門氏率其徒於悵悵然捕聲而索影者也栁子曰吾於浮屠氏之言取其與吾儒合者吾於師亦云師周姓字竺􅀢郡之儒家子嗣於淨慈之靈石芝禪師其銘曰大道支九流渫西鹿興華軌跲禪亦奇道益愜各戸牖示鈍㨗盪真桂執忘涉一既離萬曷攝秀之西宫嶪嶪般若宗登載牒改禪奥訌異諜惟曇師我道恊南之車渤之檝推離宗返伽葉咨後人廣白業我立言厯萬劫𤣥妙觀重建玉皇殿碑呉興𤣥妙觀在子城西北一百五十步為郡官寮祝釐禱雨晹之所本梁大同二年所建𤣥風觀也唐神龍改龍興天寳改開元宋初改元通大中祥符改天慶我朝改今名崇建聖殿以居昊天玉皇之帝至正六年殿灾主觀飾聞人得人攬其敗瓴斷礎不無愴然者廼與其徒施道心壹乃心力勇發𢎞願既各竭已資且募檀施得里之大家葉徳榮劉道坦等又久捐若干緡錢於是首建聖殿經始於七年秋越明年夏六月告成肥楹傑棟翬飛岳峙繚以朱闌覆以重櫩規制雄大氣象森寒凡幕帟供帳之具黄金丹砂璀璨芬郁之飾視昔有加若天上烟雲幻出人世川祗地媪咸大懽喜奴𨽻婦女瞻仰贊歎誠足以侈廟貎昭神休矣工徒竣事士民相與共落之䆉稏在野歌舞在塗休氣布濩無有災害人康物阜薫為太和則又相與伐石以紀其成知觀事者錢道元介萬戸教化公来謁記予悼吾儒之教岐而為老釋釋氏以滅絶倫理示人以險絶之機而生生之道幾熄惟老氏之道原乎大易大易吾聖人憂患之作也老氏者其無憂患乎閔文法之煩稱也機譎之互角也百疾俱作萬怪横生晝冥宵光夏霜冬雷罔不繆盩故其立教以自然為宗以無為為有本返治古於容城氏時田不侵畔漁不爭隈撫嬰兒於巢上棲餘粮於畮首虎豹可尾蛇虺可蹍而不知為之者此老氏㫖也宗其教者又隆以昊天止帝之居巍巍觀闕與時王等而王法無所於禁亦以廣好生之仁充𤣥黙之化也得為其徒者將推其教以極衰世之苦則祖師之望又豈直祝釐以壽皇圖宫闕壇墠之崇又豈徒靡吾民力以侈外觀而已哉方今聖天子追治道於黄唐之上好生之徳與天同流瘳痍煦殘以恬以熙民有含哺而嬉鼓腹而遊老死而不知帝力之加於我者老氏之教可以因之而廣矣既叙其事復為銘詩曰神鰲載弁浮青紅水晶宫闕神人宫金鋪雕礎固且崇參差珠閣當天中仰瞻宸扆天人容天威咫尺下地通白雲之鄉帝乗龍翩然大荒靈下䧏彩烟綺霧陛九重靈鶴萬舞来從東五方之人叩吉凶帝愍下土叩輒從物不疵癘歲屢豐十日一雨五日風聖人體天上帝同好生之徳天同功祝聖人壽生聰聰倥侗至徳還古蒙彌千萬年天無終杭州龍翔宫重建碑龍翔宫繇宋理皇潛邸改沂靖惠王府為之以奉感生帝山門曰龍翔中門曰昭符殿曰正陽咸淳間又改命南真之館南斗殿曰壽元土曜曰景緯鐘樓曰如應經樓曰近真之章藏殿曰琅函寳藏凡宫門扁掲皆宸翰也撥賜免糧土田山蕩若干頃淳祐六年賜元靜先生一菴胡公住持宫事不有粟道院在湖西栖霞之北天台葉公台某分主之寳祐初又撥賜長洲崑山縣田以贍不足承之者為古泉胡公我朝崇重𤣥教璽書䕶持今公執以奉修祀典不幸翔僧璉陵轢教門改宫為寺公力於匡復有詞于上獲歸土田者半殿宇不可復則有私貲置宋楊和王府基在今城西北隅大徳丁酉剏造殿宇門廡倉庫以次而舉田有三庄在仁和平江湖州大徳己亥公被㫖授白麻命給提㸃所印章公為一庵猶子仙風道貎拔塵俗又以役丁甲之法呼雨退潮致宰官之敬故其成功速而有以光前徃裕後来也乙巳天師留國公主領宫事後有石田鄭公某松瀑黄公某鴈蕩林公某相繼而出皆有功於教事者而林公又克寛展隘途増廣聖殿創建道域於霞山元統癸酉天師太𤣥公選請洞霄史公景仁提本宫事席未温而隣燎延宫公前反曰右泉已夢下於我矣我不興復天其厭之郡與副宫陳徳安止座李㓜榮壹乃心力議土木事副宫朱慶申都監毛君錫監宫貝景元為之佐而太𤣥公亦施金助工木費繇是大殿法堂山門之制度益窮而大廊廡庫庾道堂客館凡若干楹無不一一完美三清聖像莊嚴雄偉父老瞻仰嘖嘖稱慶以為前此未有也公又捐私貲建大方丈疊石為山鑿泉為沼蒔花種木鶴飛鹿走恍若世外扁之曰小蓬山翰林陳公旅嘗為之記後至元丁丑被㫖𤣥真人住持同領本路諸宫觀公字元甫號𤣥圃美丰儀其氣岸凝重時貴人皆屈膝禮之葢有公輔之望而左為山林之主者也暮年舉太乙宫黄公崇大以自代遂告老公當戎馬劻勷之際扶植教門安於按堵亦可謂善守成者追念史公於宫門有再造功而廢興歲月未有紀遣監宫葉文誠備事狀顛末屬余為文既為約狀書之又繫以辭曰二馬渡江一馬龍東邸觀闕森開張穆將祀余感生皇渡以熛怒威靈卬十一景緯生寒芒天人南下南斗傍朝與龍飛暮龍翔翠蓬三度黄塵揚靈宫特立天中央湖眉海眼東西望地柱不傾天乳長黄須仙伯古冠裳龍腦寳藏聲琅琅上清淨掃赤尾􅀈六龍在天天下昌山君海孤紛来王南極上壽日重光銘寳儉堂銘有序寳儉堂者雲間吕輔之氏之祖室也或謂輔之去其祖之剏家不逺祖之剏家由儉得之草衣蔬食汙尊抔飲之所為也故輔之命堂以寳儉云楊子辯之曰不然也昔子華子嘗與晏子論古昔聖人之儉不以堯之居土階舜之不用塗髹之器為儉也而以儉在内不在外推其至極于心居中虚以治五官精氣動薄而神化為潏節其所受而嗇其所以出然後神宇泰定而精幹不揺此聖人之所以為儉而為聖人之室也然則輔之者傳其先之儉也將以草衣蔬食汙尊坏飲之為乎抑將以聖人之節所受出取嗇神宇泰定而精榦不揺者之為乎輔之求聖人之道者也將有擇於斯矣不然計口而食視入而去操贏而制餘以庾氏商賈子之所為之寳儉也則子華子之所斥矣輔之聞辯曰善哉先生之言吾儉也㣲先生吾為夷貊之人烏得造聖人之域也且請銘之曰草衣蔬食儉之粗嗇出節受儉之精叶疽我思古人居中以虚五官既治萬物受奴是為大寳金玉弗如小夫之志不出里閭又何拔異乎計口而食操盈而制餘者乎彀齋銘有序孟子之言彀致知力行之律令也射命中致知事志於彀力行事也致知力行為兩輪車不得偏而廢也唐處敬甫命其子之淳修業之室曰彀葢以知行並進之功鞭之求銘於鄉先生楊維禎為之銘曰一拙失百巧廢知不可以不厲也百中滿一中闕力不可以不竭也巧之精貫虱力之滿引石豈惟飲石彎弧落日於唐生彀其率裘生裼齋銘有序古者衣制凡裘必有裼裼以抑裘之露而見乎美者也裘而無裼與反衣狐白者等犬羊之裘不裼以其無文也則裼主有文飾之事故曰君在則裼謂施於君所也吾門裘生某韜晦於一室而以裼名齋母乃不類歟葢有志於事君之文者矣雖然裼非徒表文也表敬也敬有二父也君也而體異也子於父以質為敬故父母之所不裼臣於君以文為敬故君之所裼某人父母俱蚤亡質之以為敬者痛無所於施而文之以為敬者將移之於君焉耳抑又聞裼必象裘文裘狐白則裼以錦之素裘狐青則裼以綃之方喻諸内也有大人之文則大人文裼之有細人之文則細人文裼之由中達外各以象比不可誣也然則裼也者其又由外以卜内之徴歟君無輕肆其裼也銘曰錦而絅非文之屏惟絅而後文益炳裘而裼非文之的惟裼而後文彌穡惟的日亡惟穡日章惟裼齋氏敬之勿忘自然銘有序雲間沈仲參氏名其燕處之室曰自然又以自然道人自號也乞言於逍遥叟逍遥叟曰老耼談自然以理有至分物有至定而莊生推之為逍遥篇小大任小大長短任長短而物無不得其所其然者皆莫知其所以為自然也心無為者與化為體上知造物之無物下知有物物之自造也非此無以明自然故老莊祖自然使世之沓婪躁妄一安乎自適而詣乎定極此自然雖然知効一官徳徵一國者亦有自然故堯舜與許由雖異其得於自然一也參由自然而得堯舜於塵垢粃糠之外其詣極如􅀢姑射之神人則可使戎之人脱出疵癘而躋乎春臺含哺而怡鼓腹而嬉國忘乎忠烈家忘乎孝慈子之自然者至矣參曰吾方有志於是願從先生逰庶見堯舜於塵垢粃糠之外予無所事戎事為逍遥叟信其志為之銘曰理無小大物無長短理與物付物與我忘推其極也物不疵癘我不夭殤子不信者謂吾言狂子將信者吾將與汝訪四子於􅀢之椒汾之陽也莊子逍遥篇克治天下之民平海内之政徃見四子藐姑射之山汾水之陽甕牖銘有序隴西耕者李中其先宋三省幹之後中去其先之高門閭退築草堂松之七里涇為耕讀室室凡十楹蓽戸繩樞北東西垣皆甕牖中每風起引東方明於甕次讀古先聖人遺書書已出理耕事日為常有過而哂者曰中弗光先廬而甘為甕牖繩樞之子歟中聞而益喜遂自號繩樞子仍以甕牖命其室介其友錢鼒来見曰古者戸牖必有銘今辭弗古若不足以起儆幸先生有以銘予異其人曰繩樞子今之人而有古之道者歟士幸生華夏有宫室之後又幸生高門縣薄之家而逺返古初甕牖是居非悠然有得遺物而立於獨者不能一日安於自如惟其然故豨韋氏之囿軒轅之圃有夏氏之宫湯武氏之室彼且能使我忻忻然而足歟不也世之傾宫室危臺榭直昧者逆旅焉耳豈徒逆旅府怨階禍雖滅身覆族不寤豈不哀哉此甕牖之可銘也銘曰隴之耕兮草之堂甕之牖兮朝之陽暾之入兮煌煌月之燭也陽􅀈天之刑民兮峻宇雕墻天之牖民兮虚室之白泰宇之光心太平銘有序予自壬辰兵興来遭罹死地者凡四五然今年以淞府長顧公之招客予于府庠退處一室顔之曰心太平人怪之顧公是之曰昔香山居士之詩自謂我是羲皇代先從心太平居士嘗厯險難身獲太平而心未獲平先生厯險難身不太平而心實平焉予謝之曰他人有心予忖度之子之謂也因銘室曰嘻割爭絶揖讓爾一身天地長心獨游在羲上委順齋銘有序杭之城東隅有鄭老人號虚原年八十餘時過予談諸子百氏最研極乎漆園氏之㫖故其燕處室曰委順屢徵予文漆不能不委而況於人乎又曰安時處順哀樂不能入也此吾人之委順也敷其㫖為銘曰地不洛橘天不逢蓮順不吾委違地違天順一吾委萬物自然初齋銘為復初鄭茂才作水初惟清濁焉以撓木初惟直屈焉以拗水復其初其清可澄木復其初其直可繩維榮易子反求厥初旁岐勿惑下流勿居上智下愚天淵遼分理欲之隔不能以寸止齋銘為至善王茂才作兩生皆俞參門士忠以事君孝以事父朋友有信長幼有序各極其止是曰至善舉類以推其則不逺惟文中氏明爾明徳爾修必精爾踐必力書曰安止詩曰敬止繇敬而安希聖在是不心不佛銘有序予嘗與師論心師曰儒以道言心又以人言心是二心也不如吾釋氏言心以法吾曰汝祖言即心是佛又何有法師曰吾祖又云非心非佛則心亦無有天台師不云乎任汝非心非佛我只即心即佛吾曰天台尚與佛二我固曰任汝即佛我却不心不佛師因時起曰銕冠長老於我祖具一隻眼遂命其禪所曰不心不佛而俾予銘之銘曰佛莫名心莫名與道冥冥無名我曷銘近浮屠有以左道鼔世俗號天界某者士大夫安其志而不之攻勢且稱緇相國師危坐至前元嘑某師在一人上者此不可不杜其漸也不心不佛師疏於上必斥絶而後已故吾以師廣長舌有回天之力奚止昔人推倒回頭趯翻不化者也陸道士息踵齋銘南華真經謂真人之息以踵取其息者深而細也深而細者必從根極中出踵是也此古真人心齋郊也方伎之流習閉氣為胎息者末矣圓覺經云息調心淨葢亦得南華㫖者茅山外史弟子陸中氏以是名燕處之室鐵笛道人為之銘曰氣導和體引柔心貞白息靖幽盎焉春淒焉秋一喜一怒四時游是曰真人流惟踵之求尚徳齋銘為胡道士浮休子作爾祖著經尊九流一徳授受長春丘長春丘後為計籌柱南谷計籌弟子今浮休𤣥牝有得天同游五千之言俱贅疣函關相見西青牛東維子集巻二十三欽定四庫全書東維子集巻二十四元楊維楨撰

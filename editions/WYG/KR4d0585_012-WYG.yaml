front:
  text: 財賦之原而後之為國者不能去矣宋置𣙜務立交引法貼射法又或弛禁以均賦茶戸然有法無人則官與民反病矣我朝立轉運司於江西而江浙置提舉司三官與民無交病之弊則司以法存法以人舉耳常湖之司併平江而為一盖又御膳之所在體隆事大與他日異故號都司用四品印章增設監長一員幕司陞提控按牘曩昔時暑所痺陋至正七年副提舉嘉禾張公霆發來始拓其地增剏聼事後樓若干楹都提舉東平趙公深又買民地開門道建儀門二至正九年闕公又重脩東樓即宋清風樓也樓乃其額之舊棟宇翬飛瞻仰改觀司之署始雄而麗與事闕體稱三大役之賛成者提控按牘吕君天祐也闕公甞宴予清風樓上遂以記始末請夫奉辟玉食臣子事上之敬推恩庻食臣子及下之仁事上敢不慎厥職及下必承流於上方今聖天子眎民如傷神窮煦若未甞忘於一飲一食之頃其肯厲民以自飬乎居是職者有一豪之厲於下則畧大徳於上其得為奉法良吏乎予聞良長貳之為政察於下䝉恊於僚議得肅於胥徒之役凡属之吏効職而復期江之啇山之丁皆願出涂而服勤於其土宿垢剗刮大課流通盖事上之敬盡而及下之仁亦至矣宜并書為來勸闕公字景淵闕

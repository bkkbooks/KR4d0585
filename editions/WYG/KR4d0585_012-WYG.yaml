body:
  text: 憲監之嗣也趙公字伯淵婁歴䑓憲張公字彦榮亦由宣徽推擇而至云杭州路重建北門迎恩館記杭為宋行在所宋既内附以其地置行中書省行宣政院財賦都府肅政府轉運儒學軍醫金帛雜造諸司鱗比棋布嵗時朝廷遣使者頒詔㫖宣錫命金幣斧鉞裘貂上尊與夫名山大川古宫刹祠廟御香寳噐不絶於道使至之日省憲而下百司庻府之官無不奔走戒金苹儀仗聲妓部曲導前擁後以為郊迎之禮益偪以迎官寺則失諸慢曠以迎一舍一驛之外則過於勞故酌其地於郊關之外以為迎送之次此北門之館所由立也館剏於至元元年承恩之額書於右丞圖嚕公至正十二年秋七月紅巾冦杭燬館冦退越三月而監郡觀閭氏倡捐已俸命仁和縣属吏首起其廢為屋凡若干楹堂室㕔軒洎垣墉門宁更衣之亭治飪之厨凡坐卧飲食噐用之什無不完整且更書其顔為迎恩尊皇華之出也興工於是年十一月某日告成公遣仁和丞某來請記余謂周官之法凶禮無力政力政土功也杭城不幸罹朱鬂氏兵燹之餘而力政是舉非所謂時屈而舉贏者乎抑論之力政有緩急緩不得舉急不得廢迎恩之舘為皇華使者之賔送奉王制而尊天使臣子之敬也朝覲貢賦送徃而迎來又臣子之忠也執忠與敬臣道在兹而可以一日廢乎宜不得與時屈舉贏者律之也其費緡錢若干不書其廢興始末以為記然公之為政知所先後其興弊扵城郭殘破之餘者盖不止是出風教者先聖大成之宮砥礪死節者忠臣血食之廟及倉庫關梁之要害固已陸續而舉予又當附春秋義筆削焉以為民力重云至正十三年正月日記淛西憲府經歴司題名記淛西肅政司經歴闕公語予扵帥正堂曰凡官寺署所必有顯名非徒志嵗月著爵里編其名位於此將有辨名實於彼者可不畏哉吾幕府舊有石登載殆已徧今石承其後請予記以文予讀栁子中丞壁記曰由號觀實使後之居於斯者有以敬于事公之言盖知所敬者已予甞論朝廷選官莫難於法則之司而尤莫難於賔佐之寮也賔佐者得人其時義也大立節也貞執法也確議事也詳允一司之法則其有以私而撓者乎故憲幕府得一良經歴一道之政無不理三尺之法無不信職于兹者可不敬哉然則題名之誤也豈為金石美觀而已哉後之覧者當有知公之敬者敬其事如柳子之所言者也公字文卿河西人起身臺譯史性忠朗峻直有文武才畧以從大夫某公平冦有功升是選云至正癸已九月丙寅記海漕府經歴司記至正八年十二月甲子重建海漕府成初府理所就呉人漕萬户朱張氏之故居也歴六十餘年弊不可攴矣今始撤而新焉且􅝵其北而大之經歴司署所在􅝵内而常熟江隂千户所前三年而剏者在府東偏遂轉為經歴司仍治署所于城之東北隅常熟江隂土木功竟府長貳將其幕賔寮各正位卜序相與舉酒落其成而經歴孫公來謁予曰始憂府署役大弗即成今幸官不知損民不知勞訖有成功以及於幕署也中偏表裏同一華煥願子有以記之予謂春秋一門一闕之作必書謹王制重民力也今海漕之署制得為民力有遺焉幕署之痺陋併得轉其便而為之可不書乎議者有疑漕幕署無風紀所關刑名所寄軍旅賦徭繕脩之属金出納者一歳兩漕耳簿書期㑹一利刀筆掌之有餘也何足稽清選之才六品之秩哉曰非也魚龍之國去天千里逺武夫帆檣與文肌被髪之族鄰險易之相伏也利害之相乗也一幾弗􅊫一微弗防漕政之成敗國家之治忽係焉句稽情偽之辨不辨期㑹征役之當不當未論也居幕司而賛畫諾者其可無其人乎此吏部選其幕賔僚不减選於其府長貳也幕之長於經歴次曰知事照磨又夾輔幕元僚者也三人者各職其所當為以相其府長貳之所不逮其得以一日自是優閑之署而不知有大累賢勞者乎且異時公卿牧守之選由兹而起則知居是司者其人皆沛然有以周天下之用也尚矣併書為記使繼孫公而來者不徒思其署舍之勞而已也孫公名震字仲逺金陵人起青䑓書史歴憲延師閫至行垣属掾多獻可替否今輔漕政亷慎勤敏府署之成賛謀之力尤多知事鄧繪字元素金䑓人照磨衞權字衡甫洛陽人同寅協恭並有雅譽云海鹽州重脩學宫記至正六年夏六月松陽葉候繇守令重選為海鹽州下車之三日率僚吏及校官弟子員詣學行釋奠禮顧瞻學宫循就圮壊戚焉曰司千里之政化者長吏也為政化之所出者學校也今圮壊廼爾何以長吏政本哉於是與校宫吏議其所當葺理者捐俸金為之先發學廪見儲復征其宿逋計得中統鈔若干緍遂鳩工庀材計日竣事侯躬冐袢暑視其役不少惮大成殿素淺偪一遇祭奠則樂無所置更剏樂軒燕居閣肖聖象其上勢壓且不攴故役最艱費最大名脩而實則作也東西廡為從祀先賢之舍象設采色剥蝕者復章四齋室宿弟子員凉燠失宜者今且明敞深潔以至庖湢庫庾井匽無不完飭經始於是年之七月四閱月而訖工明年春州之士李桂朱克剛等以其事來請于維禎願有以述歳月併著侯績余聞海斥鹵之邦牢盆民去文肌卉服之夷不逺不易以禮義化也久矣侯不鄙薄其民不律以柱後恵文而以禮義之其用心仁矣皇元之興將百年子孫長治外夷嚮化者大抵學校維持之力耳予悼近之長民者方以操切為術急功赴利為能視學官為儒者迂務政化之所自出茫乎弗講故嘗論守令不識政體壹以操切為術功利為能者雖立學官與秦史燔書籍威學校者同科耳嗚呼若而人者不負學校明制守令重選哉侯不鄙海邦首務立綱陳紀為治法而不敢一日廢庠序之教可謂識治道循吏可以副學校明制守令重選豈非海邦之民之大幸哉抑侯之為政以崇學為先而承上以直臨下以蕳化通民和而争訟日息刑罰日省傳曰教者民之寒暑也不可不時事者民之風雨也不可不節若侯之政又可謂節事而時其教者也是宜書侯名彦中字大中甞以才敏有風操為江南行御史䑓架閣管勾所至皆有休績可紀助成者同僚闕同知劉塔失徐晟判官牛世安栗興祖教授黄棟也程工給使者州吏沈嗣昌徐士毅學吏徐志仁學直郭子傑也長興州重修學宫記余客逰呉興渉長城界見新田辟絃誦聲相聞入其境夜漁不取䱆篁葦間無嘯聚入郭挈壺氏之職謹孔聖之廟斥而新焉問為政則州長闕之化閱六年而成矣未㡬州庻老介吾學徒劉巽來謁學記曰長興呉夫槩王之城池也昔為縣令陞州學本邑人宋少傅劉公渉所建金人燹餘自縣東從今大平橋東縣令趙汝譢建㦸門杏壇藂桂堂張公明增建蔵書閣而學之規始具我朝至治間州長闕重脩禮殿而堂閣門宇廢而不立者有矣至正五年州長闕至朔望必眎學宣布教條凡繋風紀者與淳師老德講行之州之士以文學備采擇場屋者徃徃興焉然學之營繕事重民力未果十年夏六月侯始勸諸好義捐俸金為之倡知州韓公惟德因而和之董役者州吏俞文淵儒之趨事者劉坦呉鼎趙良珪也殿增而隆闕翼屋二中堂從廡及兩厦四齋靈星大成之門庖湢庾庫等渙然一新堂隂復創亭曰光霽閱三月告成廢興始末當有紀未得名能文者而幸遇吾子焉願有以書之余歎三代之衰庠序之教皆茍道也久矣漢為近古其教無聞蜀得文翁立學始變鄒魯之俗東都興北州之學者僅稱常山宓恭耳况其下乎烏乎三代而下學校之興廢固基乎循吏之得失也我朝州縣所在有學雖尸教有官作教之効則守令今非人而欲學校之教行亡矣學校之教亡而望風俗之變難矣朝廷以教化責守令今侯以教為治寛假歳年其効始著烏乎吾是以知循吏之効之急於得人也吾以庠序之化又必久於其道而後成也文宓而下不又有繼乎朝家設學之意不為勿負乎民之望於大夫士者不在是乎是可書已侯字得之世家北庭平章保闕公之適子也嘗逰成均兩膺鄉薦所至風采政事皆有可稱道者云長州縣重脩學宫記有元之天下自京師逹郡縣咸建學宫急教以為王化基也今天子文致太平􅀹以教飬人材為大務士徃徃以行藝興而學官益重以長洲由呉縣析也始以驛舍為孔子廟大德六年縣從移驛材搆治所而學幾廢矣至元再元之三年縣長元童以禮勸郡人陸得原新之閱未二十年而殿堂齋廡僅支風雨藩墉破盪徃來成蹊而况殿墀未墁泮池未鑿從祀未有像龕校官未有次舍講室未有丈席弟子員未有几憑師生交病非所以嚴學校之規也至正八年某月某日教諭王季倫始至顧瞻嘆曰此非創始之罪校官因陋之罪也且廉其嵗租皆乹沒於奸宄之徒非一日積矣廼白于監縣奄都刺使力陳于郡守蕭公黜其奸之尤者而租入稍還其舊由是制其出入取廪稍之贏起廢補缺而長洲之學始與他邑校同稱完美而克以財力相其成者則陸氏婿徐君某為首而郡人黄公某次之至正九年某月日起作明年四月某日告成而季倫年勞亦書滿矣扁舟道淞上尋余三泖澤中請書其事予聞孟子論教必先於足食食不足教無所於施長洲地下而水悍嵗賦五十萬頑民避其役不啻如猛虎而暇治禮義哉司教於其縣者恝乎其難矣而况學之入又從而盗焉學政不舉固也予曩在姑胥熟知季倫氏有文有學又有治事才天不廢斯文於長洲而季倫氏以史館脩寫勞來為其縣師予親見其施設有方田之據於浮屠者復之欺於佃者履其畝而政之然後汰其不學無行濫於籍者三十餘人而禮其知名之士以率上下焉宜其飬裕而教有成功也奄刺侯崇師重道盖不下元童氏而蕭公於士實有擇敬而季倫獲其敬且信為獨至一時臣家豪右又樂勸相之於是亦可以知季倫氏之為師儒者矣邑之士來㳺來歌者尚率聖人之教以副師儒之望并無忽其前功又將葺于後者無窮也季倫字季倫番陽人故宋職方郎仁允之孫云至正十年五月十六日記紹興新城記至正十二年秋九月越人築新城明年春三月告成郡高年余文昌等謁余錢唐次舍以記請且道其事始末曰城本宋南渡蘄王韓世忠之所築闢而廣之周垣凡四十五里入我朝七八十年馴至圮廢淮夷梗化挺禍于大江之南狼籍州郡如無人之境守封疆者始思城郭之所恃而我紹興距築唐僅百里近錢唐既䧟越人皇皇焉挈㓜扶老走山浮海以遁不知長林大數賊之烏合鳥鈔者尤甚則又犇播來歸户以數計者萬又五千時則浙東肅政府分鎮于越而僉事闕公勞徠吾民者寔有以為之倚也既而集父老喻之曰城池大役也豈易勞吾民然勞于始而利厥終錢唐大方面賊直抵行垣者以城池之廢也始蘇界常湖賊越門而去者以城池之新固也汝民所自聞幸相與懲茍且思經乆之圖民始難之公又為條告其貲力先輟俸金率郡縣吏及郡之民饒於財者不足則以田為之賦粮二十石上出若干緡錢築若干丈尺四十石上數倍之三石五石助貲辦各有差無田者傭工而就食民乃恱來如子聼父事量功命日不期月落其成城為趾厚凡四尋為身盡尋有四尺面凡七尺外銅鍵石而又壘辟四尺為埤堄戍有木譙衞有校聨藺石渠荅之具無不整備城為趾門凡五水門者六四門又各為甕城唯趾為重門以代甕城門皆梁石為洞上各置望樓又倚北之蕺山為伐虎之亭城既新門亦稍更舊名東五瑞水曰朝宗東南稽山今曰㑹稽水曰東門西常喜今曰常橲水曰澄清西北西郭今曰承恩水曰拱辰北曰昌安今曰㤗安水曰永定南水曰植利今曰興利役大事重非名文家無以書吾子郡人也幸有以属比其事干石不唯識廢興歳月且俾越之人萬子孫知有金湯不㧞之固興民社相永永也余惟春秋城内與外者凡二十有九聖人一一書之謹王制重民力也而城虎牢之書責鄭有而不守覆棄為冦資則知城築興於要害者固亦春秋之所許也而况於越襟大海肘長江申禹氏之廵邱句踐氏之伯基有國者之雄藩也其得與荒城野郭夷而眎之乎吁一方之役小四海之繫大一時之勞蹔萬世之利永也雖然城之掌固者不易城之守固者尤不易守非直三廵三鼜之戒也忠義為之維道德為之維道德為之塞衆心為之憑守固之上也職於是者尚思有以勵已德結人心攄卧薪之忠憤以無忘昔人執仇之義以雪吾大國之耻其可也不然守政不脩舟人皆敵國也雖有金湯吾為此懼是為記公系出國族通文史嘗為南㙜監察折獄辨訟扶樹名理嚴嚴有丰采云重脩西湖書院記厲人臣之風化者曰忠曰清其推風化於綱常之地者又寔繫乎六經之道聖賢以之而立教時王以之而致治嘻斯亦尚矣杭之西湖書院故宋鄂王之第也宋季更國子監入我朝建書院祠三賢三賢者處士林公逋郡守白公居易蘇公軾也岳以精忠死國其大節無異議者處士以潔身獨善合乎道之清蘇白皆志忠鯁有遺愛寔禆於風化而無忝於六經之道以祠之不可廢者至正十有六年春浙省丞相金紫逹公浙西監憲丑公各捐俸金新之比明年大閱募兵益衆聚廬益隘軍棲於寺觀演於庠序院之新者隨毁平章光祿張公諗其故長院者白之明日令下驅部伍徙營翼院之缺者補之弊者易之弱不支者壯之三賢諸像彰施粉繪六經版籍重加脩補白堊黑黝煥焉􅈌焉視舊觀為有加於乎庠序風化之所出况是院也孤臣之精忠三賢之清節闗於風化者不細故光祿公惕焉神㑹而於戎馬之隙振斯文於既徃起清風於後來使岳林蘇白四君子之澤與六經之道同於不朽其功於名教豈曰淺哉工既畢山長應子尚承公命徴余文於雲淞之上勒石以紀歳月且使後之人知光祿公之休武而脩文者類此故余不辭為之書至正二十年四月八日記華亭胥浦義冢記塟不得埋曰棄不得其屍曰捐衣以周身棺以周衣槨以周棺土以周槨禮也自佛氏陀林之教行始有畔先王之禮而忍棄其親者人心之䧟溺也乆矣吁可憫哉淞之民類不以禮塟其親者人謂無邱陵之地則有付之水火亦勢使之然也仲尼觀延陵季子塟其子其坎深不至於泉淞之塟也獨無坯土可窽乎此華亭夏君尚忠義冡之所以作也得不食之地于胥涇之東周垣一里所為之封域名義冡使藏無地者歸焉什伍曹其子孫氏各樹識表而有異日展享之托又規地一隅為精舍俾浮屠者主之以掌其籍焉其有貧不克塟者又出資力以助之於乎君之用心亦仁矣文王更塟朽骨而天下恩之宋世良賀蘭祥軰収瘞暴骸而境旱得雨夏君之仁其不有感於天人乎吾聞君之先人清潤處士嘗憫人積䘮不入土者捐金粟至千斛緡弗計義冡之舉其又不為善繼先志者乎余固樂書其事而况君重有請也於是乎書君郡之義門敦武公孫字士文承直郎鎮江路府判官棄而歸隐益讀書習禮文事又剏立夏黄書院以祔享其外祖橘隐公其好古崇禮類此睦州李侯祠堂記侯諱士龍字士龍姓李氏世客汴之亳州祖某繇世將轉郡守侯生而有膂力身不滿七尺精厲𦂳悍其膊腕彊硬上可用甲指搯行蝨自㓜憙角觝戱長投石㧞距絶等倫後誦孫武子書志萬人敵淛帥某聞其人聘致帳前試其弧矢伎走馬逺垜二百歩馬上反臂連五發連五中衆大譟以為特竒試犀劔光指牛領限尺寸位数一擊領㫁不差分􅁵又工老君拐法雙股連環百斤鉅刀上下舞如木爿鋒氣薄人毛髪竪立歙寂金鈴氏恃驍武無敵侯生禽之復縱以利械又禽之以功自千夫長陞徽州判官同知睦州兼民兵總制在職撫農閱兵民仰之如父倚之如堅城時淛帥升樞閫于睦飬士至數十萬梟將凡十有八部獨稱侯為巨擘曲兵過城樞命侯出關迎送西兵毫革無動金倉氏入冠桐埠樞集諸將議侯建上中下䇿樞不用上用其下衆潰將皆擁主遁侯獨乘奔雷馬挾歩卒数十人乘丙夜􅊳戰敵不備被傷甚衆又乗銳取其敵將首縣馬項底出萬人中萬人皆辟易莫與抗渴奔錦沙泉取所佩藥視從者云吾報主盡矣勿令敵斫吾頭遂飲藥倚馬而逝時至正丁酉十月四日也年二十有五閱若干日示夣睦老人曰吾死巳作神矣尚能扞菑剟惡以利吾睦人明年春睦人為立祠錦沙墓所請余文為志昔魯御縣賁先死職魯君誄而表之侯死職其職烈未上聞司文事者盍有志故吾為志諸祠且係之誄曰於李侯生力士兮於李侯死厲鬼兮辟吾惡兮􅄐吾祉兮誄吾以文立忠軌兮􅄐去聲二陸祠堂記唐人詩稱陸敬輿為華亭人君子論三代以下王佐人物仲舒孔明後即及敬輿是敬輿足以重地靈於是邑矣闕者未之建白余謁淞學合釋奠禮以祀者乃有二雋焉問之庻老則曰陸士衡士龍也二陸自昭侯遜來世為華亭人今縣西二十五里有華亭谷谷之傍有山曰崐陸氏之先塟焉機雲之生時人以玉出崐崗比之因名山山之北又有機雲兩山亦以兄弟得名邑士曹君繼善於山之隂剏屋若干楹祠二陸像其中名二陸祠堂且曰崑之隂其故宅其懐鄉詩有婉孌崐山隂聲如鍾少有異才文章冠世雲六歳能属文與機齊名中州之人號曰二雋末節仕成都王皆遇害嗚呼文章至東京之秀敝矣建安諸子傑然角立而士衡兄弟乃得以名文盖世中州之人見之如景星慶雲誠可謂一時之雋矣獨惜其急於功名至末途猖蹶豈非文章擅名者得夫間氣之所鍾而去就弗是者皆未知聖賢之學歟至今士之入呉者咸仰二高之遺風而未嘗不悼華亭夜鶴不勝清唳之悲也堂以詞之盖邑人不忘其鄉故而祭之以社之義以為人物之凖君子之論缺如也然崐秀傑之氣代未嘗絶華亭秀傑之士亦代未嘗無即余之論以其未得夫間氣之鍾者益自勉以其未得夫聖賢之學者益自儆豈非曹氏建堂之意乎名世者作果符吾言吾於士人失敬輿之祀之嘆殆亦免矣夫魚浦新橋記至正十三年秋八月蕭山縣魚浦新橋成浦耆老許士英來謁予錢唐曰浦之西北距淛江東南明越抵台婺啇旅提擕樵蘇負荷者胥此乎道焉晨出莫返奔渡拏舟不無蹴蹋覆溺之患縣主簿趙君某領帥檄來鎮于兹兵事既飭大恊民望爰集耆老而告曰是浦為民渉之病盍易舟而梁乎浦民咸響應無忤辭橋不三月而底于成長凡五百尺洞十有五洞楹十有六隄其兩旁棧板欄干亘其長吁昔無而今有剏實功之難也橋出沒于潮汐之險又難也先是紅㓂䧟杭君方蒞政浦之西南依山徼羣惡少乘隙虐民民相挻觧散君盡按捕之一境頼以安今橋成又免民於險阻即向者弭盗安民之心復推其効扵是橋也愿子誌以文且為趙君頌余曰出事於昔人之所難而得於今日之所易非浦之不可以橋扵昔也惠而知為政者尠也若趙君之不難於是橋謂惠而知為政者非歟鄭子産春秋惠人也至捐一車則人皆以為笑彼溱洧之可渉民猶病之况是浦之難奚啻十倍長吏以民者可以不知為政乎西門豹鑿十二渠渠各有橋至漢長吏以橋絶馳道相比不便欲合三渠為一橋鄴父老確弗從以為西門君法式不可更長吏終聼之惠政之及人者至今照耀史冊程子曰一命之士茍存心扵利物扵人必有所濟趙君之存心得之矣浦民歌誦當不减鄭輿人之頌君之法式當與鄴父老同一確守豈非百世之利也哉浦父老復以橋名請於是顔其橋為惠政吁君之惠政不惟是也君名誠字君實世家于漷公銘曰江水湯湯界浦之疆渉浦作渡民病于杭趙君為政惠而有方誰謂浦廣不可以梁惟彼梁也西門之光也德之長也民之不能忘也東維子集巻十二欽定四庫全書東維子集巻十三元楊維楨撰

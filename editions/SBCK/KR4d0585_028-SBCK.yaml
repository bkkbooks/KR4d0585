  text: 東維子文集卷之二十八
  hash: sha256:6c2c347176f7ac33aae1024fd8ebec9321ee4cd42ed45ba47c3c5b7a5be1f2fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_028-1a}
body:
  text: 㑹稽鐵厓楊維楨廉夫著傳麴生傳麴生酒泉人也名不一或曰醇或曰盎曰需曰耳或又以其善􅅭勾顔状呼之曰鬯曰是曰霸曰差有嫉之者則斥曰离一本自醇下名皆作酒邊皆人好惡之辭非生本名也生􅀄降精于星乃子于䴯母媒句師造于夏人儀狄氏或曰陶唐時已尊生于衢器堯禄之千鍾舜器重生亦酌之以泰尊其人嘔嘔温雅凡冠昏朝聘燕享禮無預號爲通才尤善導引辟榖之術故其人最善壽飲其德者可千日不食人薫漸其化無不晬靣陶出其性真然以為剛則悍怒者化柔則訥者􅀝之有言愞者狭有之始生徒儀狄氏進禹時先自荅其繇曰得醴于泉得禄于天實用禮節其爵世延勿用甘言至于流倫則用不顛坐得由不往狄强之禹見生于食前果惡之曰麴生之言甘後世必有以之亡國者廼與狄斥絶之五子遂述禹戒以作歌至商武丁舉傅說以生自喻而期説為蘗生者生名始重後受不道為深池位生時伴食生者三千人商用是亾君子始信禹誠之不人妄也商亡入周監商轍使正掌之大酋監之周旦又以戒成王王亦以誥康叔生後逰魯㡬以薄德陷公于楚生名稍減退放肆市聞而先民獻酬之禮􅂽矣秦興苛律禁生羣聚民間漢高皇賤時常就生民間飲王娼武員家逮定天下生在上所羣臣皆􅀝生宴見上至甘爭上罪生申用秦作三人以上無故飲生者罰金四鍰文帝時始賜生於民脯三日武帝晚年耗用又俾生辜搉民間利豪析不遺雖博陸侯苐私蔵生致京兆吏斧関推鑿鑪罌以捕漢法衰生隨好事者時時主楊子雲家以問竒為事生将隐去矣曹操枋國以年饑復罪生表上禁錮法􅀅作大匠孔融力爭之不從君子悼生之行禮與頤養民者迺終以榷與錮敗哉生歴晋唐名復盛陶處士潜家無貲劉始成送錢二萬潛即轉生生受不為汰唐諫議大夫陽城所得俸錢計鹽米外餘悉送生所生亦不辭生迹􅀂嗜貨心實倪盪無校計以故不問人賢否貴賤老穉皆􅀗與接顧獨卻交老釋氏與衰服之士其人或潜至生往者生輒能形見之其去就辭受非人取量􅀂此惟性過和順雖樂君子宴娛亦貪與婦人俱漢司馬相如竊卓氏至臨卭人不得窺抉生得狎之壚頭晋阮公籍柬隣有美婦亦與生狎至招王安豐軰時時過生所借生執卧婦側未與王永安婦交掌娱人則法士所羞談也今上起生責州從事上見其貌古而中粹然問壽何對曰臣自農皇時至于今二萬五千四百二十有八甲子矣問壽何術對曰臣不知他術惟不死天和耳上方有亊南郊及養老錫㓛一採生古禮生定一代儀稱上㫖升從事秩􅂬伯又加爵醉鄉公食若干户後歸老于鄒莫知􅀁終太史公曰余嘗疑䴯生之為人稱聖矣而溺之者亡國殺身則斥曰狂然交神明揖遜爼豆又何其唯唯耶然則生一入顧用者何如耳論者良􅀅伏一簞投河上而三軍為之死一䧟反間則宵遁為敗軍之􅀅此其用善不善效也􅀚其生之用而卜成敗雖千世可知已冰壺先生傳宋蘇易簡欲􅀅冰壺先生傳而不果宻溪清上人請余補之且屢奉蔓菁供遂為援毫傳曰先生姓蘇名􅉁字受辛始祖出蔡其後分旺蜀者蔓菁知名于諸葛武侯亮亮嘗稱其有六利蜀子孫名于唐者曰金城土蘇先生金城後也性甚清淡生不嗜羶腥㓜時在金城遇相者曰蘇生負濟民具苦無食􅁏相異日徒以三百罋黄為其科錢耳然士大夫欲命世者不可一日不接其㫖論先生學殖滋長時出其根苗三千貴人鼎自臣薦吾用能使歳不饉不然民有吾色且能咀得吾本者曷事不理貴人斥之曰賣菜傭槁項黄馘􅀋古野逸雖釋老氏精戒行者亦與接飲食惟太學生交最宻嘗相誓苟富貴母朝夕忘人有誚者曰太學生腹彭亨五經笥實菜罌五僕食客曰淳母氏䍧氏摩氏等凡八人咸謂席上珍八賓或取厭于主者必召先生與俱生人甘豢餘􅀂醉若寐間先生至即爽徤起立時先生振其族種聫如至終不與八人者争進故八人亦無媢之者後豪侈家有想聞其風采而不可得輒呼帳下兒趣庾氏即菹及中年今苗用大先生其風味終不似也先生嘗雪夜有故人痛飲生夜半吻燥甚不可當亟呼先生清淡淡皆有根依齒牙嚼嚼成宫角巳而爽入臟腑清冰瀉玉壺也故人俟曰今夕啟沃之樂雖金盤瑞露無以尚此顧無以謝德厚死謚先生為冰壺從而歌曰我心􅀆如醉彼美人􅀆獨醒載歌曰美人贈我菁琼英何以報之玉壺冰後先生以齒終于家門人啚易名先生舍冰壺無當者遂相與謚曰冰壺先生云史臣曰東海疎姓分二族居涉鹿山者走足為東居蔡者如草為疎束後有罕有聞而疎族蔓天下至先生世次莫詳聞其先薦進楚惠主以蛭事疎去漢有多乎者從華陀方葯吐烟􅀂蛇人以為竒先生邁種徳而以相者言不仕然殁謚冰壺天下名士大夫至今宗不衰豈以禄食哉冰壺先生蓋蔓菁連根虀者是也蘇公周曰連咀數根其義可推予嘗於霜夜酒渴超詣中厨覔木鼻觀忽觸寒虀香則悞蔓菁在瓶次取啖其根渴隨解而酒俱消矣時惟歌簡齋冰壺先生當立傳之句與蘇公同一適而傳則同一久事後見鐵厓先生為蘓公補􅀓文中􅀁謂咀吾本所謂連茹至終所謂言必有根依者於冰壺為是録非惟補蘇公之遺實有以慰余心又缺云中具孟潼書􅀓後白咸傳白咸其先河内人河内曰鹽在后時有居青州者歳貢上國未入官至周子孫有曰苦曰飴曰虎者始入官共祭􅂎賓客膳羞事周末子姓昌熾在齊東海島間環水以自國習夙沙氏術日以隂陽水火煉修為事其冣功者名成金筦子笑言與齊大夫管夷吾交獨宻遂進筴夷吾介之通齊君自賛吾筴用可使齊富强天下夷吾力諫侯曰齊國貧且飢而使成舍抱遺利不用是仲不智也知而不言是仲不仁也仲為君得利師惟君法為齊侯喜用安車禮聘之馭千里驥服其錙裝益闢土海濱鑿并築灶益茆比比若拂廬然使頻煉修其中民摇乎觸禁不得犯不一年㓛地沙上皆成白銀抱利充然而齊霸天下矣繇是齊侯請扵王賜爵鼎侯封其國田海王俾世子孫食邑凡若干戸咸去鼎侯丁世廷曰潤下與母富氏娼禱于灶得咸漢􅌌龍壬戍生月丁未日考推曰咸水命曰㝡旺火伏壬戍大海水本月入庚伏運一轉實能賛國家關石成為人魯重賞自負為席珍與庾嶺梅處士氣味同酸醎結為伯仲交而世未薦進于上者㑹吳王濞取士于魚鹽東海人遂以咸充賦王見咸膚玉雪星星然笑曰咸􅀁謂江漢濯而秋陽暴暠乎尚者用之吴富遂甲他諸侯然濞因是以橋已則亦咸有罪也武帝元封間咸用齊東郭咸陽薦職到大農其族屬名官者二十有九文徒應前未有官時雒陽賈人桑􅀪羊南陽大治孔僅皆併白附咸議得罷幸咸自謂遇不减鼎祖然國未富而民先病笑咸在官若干年徒縻牢廪而績用弗成廷臣有欲烹其黨􅀪羊者帝晚年亦悔用咸猶未罷遣又學士羣議咸失皆願罷咸而後化可興咸自是稍引退云太史公曰白氏本出炎帝後戰國時有圭者最喻於利我嘗見闢孟軻氏成一志利民覆民是病古之利民不民之利而民自利利莫大焉咸通異是故自齊營民能用白氏斤斤使其君羈後之得其利者或寡矣嗟乎當咸遇大漢使勸其君除苛令調齊衆喊而無德之者庶幾鼎鼐之佐哉璞隠者傳為海虞繆仲素譔隐者䈬氏名􅀇玉璞隐自號也上世徂徠人戰國有仕齊即墨大夫又為即墨人其始祖曰爅氏􅄺者隐徂徠山得煉形術初煉体赤再而青三而􅀇其面老可鑑文有五龍章􅹛初生時筮之繇曰震水其相離火其光非青州黄􅀇斯用章水石摩盪吸隂吐陽以相四日天下文昌厄􅃝尨氏古用皴􅜙文塞而敞與勝氏同傷孰愈璞隐卒退于洪家叶尨俊捏相倉頡氏制字太吴氏著三墳五典八索九丘煥乎其有成章皆浬子姓也秦氏有由即墨隐泰山始皇東封泰山遇其人爵為五大夫及坑焚旤作殃及大夫􅏷子在宫襲封松滋侯惟用于刑俾議黥劓事時上愚視民曰黔視松滋上黔耳炊滋之後曰瑜麋在溪賴尚書令僕薦引與管城子頴同升道亦不行蜀人揚雄氏居家習􅀇學退而依雄雄上長楊賦非藉麝為客則不能見翰林主人故推始終以客卿呼之糜遂隐于蜀子孫不聞有顯者聞浮提國有分泒曰金胡氏汁洒地能幻文成字晋有九子者與二陸為文字交然亦不利人人多利隂陽婚家時祝辭曰九九子子生之松滋宜爾子孫蟄如螽斯至宋紹興而􅀇玉始以璞隐自祕不知生父氏自云繆公子稱知已繆築軒居之旦以其姓姓􅔴權貴人諧蒲軒爭欲致璞隐璞隐終不起且曰吾祖由蒼頡氏召用佐功文明文極而僿夫厭僿火嬴氏况又僿嬴後者乎予不隐其有不以吊滕氏者品蒲成此予璞隐亦應祖繇晚年得道自詫曰吾用物積多吾壽可以敵堅木矣入水不濡入火不爇矣得吾道者盖鮮矣李廷珪墨可以䚯沐人水火不壞天史公曰上古有黑鹵氏涅出爅氏其黑鹵支乎中古抵竹君亦由召氏改墨氏至璞隐又昌蒲去墨氏其先雖爵顯于秦賤興黔等孰與無赫赫名帝皇世而功煥然在天下嗚呼璞隐用不用孫天下取舍不幸殘于􅀧鈴窮于雕􅂐点伸矣乎始繇之見也􅀂璞隐者謂之隐無用文者非歟竹夫人傳夫人竹氏名茹字珍瓏自號抱節君其先為􅀌竹君之子曰智諌武王伐紂不聽遂不貪周粟餓于首陽山且死召其族告曰吾不食死百年後當有不食飲者為吾女氏以捄世之濁熱然未嘗如鎻子婦之􅈥其節也越􅀂干世為宋之元祐年果生夫人夫人生而瘠如篾器成􅀅作匠之羅織巧慧其中玲瓏空洞無他賜又善滑稽圓轉雖與人狎其情邈亦如木偶氏誚夫人者無螽斯分而善之者則無内􅂽長舌之禍也嘗見聘趙氏子充家奴畜之豫章黄太史庭堅聞其人作詩雪之以為憩臂體膝辱夫人而况又奴之乎夫人亦犯而不校夫人自以家世素青節終恥屈身于人鉛華縣枲弗之御矣荆􅁫棘簮之微一皆弃斥由王后娦妃下至公卿百執事無不器重之召亦無不往然所在抱節終身未嘗少汚其潔光是得長生久眎術扵羿娥氏用能辟榖遵引以應鼻祖氏之言其蹤跡詭秘當炎而出方秋節遁去囊括其身自比維有甕人或謂尸觧不知其終史氏曰荘周稱姑射山有神人肌膚􅀂冰雪綽約􅀂處子夫人豈其流亞歟惟其辟榖不食飲故老不死人疑為女仙後人有見於葛陂者與壷丈人同蛻去云學圃文人傳文人出蕭史氏生龍虎之阜髙居會稽之陽丈人生而機悟絶人長而慷慨偉風度有治天下之才而不奸于仕晚乃弃儒衣冠入道研窮至理又自理于畔以老圃為事抱甕握臿不自以為築亭圃中既以字之人且以學圃父人目之怪而扣者曰孔子大聖嘗吏乗田荘周大賢嘗吏漆園未聞以老圃為事如小人之樊而見絶于聖人之門文人勃然曰有是哉彼有雖絶卿相桔橰于園幾于近各攻治陳言腐滅歳絶不窥于園几于喪真吾幸免乎二者之累園公圃吏為社為隣人無識我我亦無識于人烏知我不如老圃與古光之至人扣者懣然欲退丈人復止曰汝以予為圃人乎計告君以圃道也理圃者理天下之範也圃而蔬茹出焉藥果實焉材木出焉凡地産之利無窮屈焉一日不治則利盡廢可不慎乎哉噫吁嘻北客焉踐圖而漆室女之為􅁨者長也扣者再拜謝曰始吾以丈人為鈕丁不知其為有道人也野吏銕篴道人為録其詞為傳而又贊之曰樊須氏之儒叛教自愚子陵子之卿盜廉自汚吾非斯人之徒與其列禦㓂之居列子隱名曰圃四十年漢番之徒也歟魯鈍生􅀓魯鈍生不知何許人或曰東魯人也六歳善讀書日記萬餘言十歳能為古歌詩長明春秋經學状貌竒古人以為偉兀氏魯鈍生􅀏曰使余氏而域用法科才魁天下士一日之長耳不幸生江南為􅀌雋落魄湖海間以任縱自廢浙憲使者嘗辟生為書史生拂然也抱成案與俗胥離立大官前非吾業亦非吾志遂郤余嘗解後生西湖之西東湖之東與之登天日歴七十二弁之峰題詩絶壁工間逢山中異人讀之成撃節以為人間竒才也生酒餘必歌詩詩之餘索余莫邪􅅇作君山古弄弄闋呼山童出拖凡錦囊中宣和賜墨研銅雀甀瓦作涪州秃翁古木石及中嶽外史雲嶠圖自謂在古無上人欲以貴富勢得之弗能或遇江海竒士不需而乞與之生剛果廉直見人過不能容或面折之有一善則又稱道不已其是非曲直之性頗與余同故余在三吴山水間多與之逰晚年著書自號全馬子有太平萬言書約余北上共余三史統辨陳天子之庭而予未果也今年春忽自葛峰來㑹余雲間曰吾􅀅挾吾人為太史逰遇偉人問余為誰余嬾自陳請子作魯鈍生傳故余為之􅀓云楊先生曰全及海内竒士屈指不能四三人其一曰茅山外史張公雨其一曰火癡子黄公望二人老矣晚得魯鈍生生殆明經不肯冒西俗舉性正矣及遇避又不肯諂事貴官盖高矣樂從余逰山水間適酒後吹鐵􅅇和古歌章􅀂狂矣而晚􅀅獻天子書陳天下利病成敗其䍒狂者乎慧觀傳慧觀東越婦也家世業儒未笄時大父異其警悟授以五行書長而益深其學推人貴賤禍福往往竒中中年家祚落從其夫游江海間天亦儒家子得妻之術相與簾市肆售其術問者則皆之慧觀氏慧觀清而弱日推言數人得錢給薪米即謝客過其門者莫不目而駭之余嘗與之語而吴其人蓋非婦人也慧觀之言曰吾不幸形婦人以生生而不能以婦人自處又其不幸也厘不幸而以生月日為人言貴賤禍福是特以生吾之生不知生吾之生者果何言取乎不然形吾累也然天固假我以形而實無形也􅂥我以言而實無言也以言求吾猶索日于影况形乎且吾之為吾亦非吾之所得吾也吾特吾之耳又不知吾之見者有以吾之不吾者觀吾否乎然則世之罪我者固不少於生我者也楊子曰婦人之言有是哉􅀚乎􅀚乎可以婦人目之乎吾聞藐姑射之山在北海中有仙人居焉肌膚若冰雪綽約若處子乗雲龍御飛龍而遊于四海之外火浸稽天而不溺大旱金石流山土焦而不􅀬不知溺我者人有所謂水火者焉觀室處者也千里而逰蓋無一日而不在水火中也不為其溺且熟其椉氣御飛龍而逰乎四海之外不自千里者始乎􅀚乎􅀚乎吾以姑射之仙望之矣居北海之中者彼何人哉葉政小傳政字克明姓葉氏淮隂人自㓜警悟知讀書自奮拔既冠以幸櫝充浙省幕史善建白論裁常依名節上官竒之至正辛卯隨左丞孛羅帖木兒討海㓂壬辰侍平章伯顔帖木征湖廣克池陽銅陵破蘭溪渠魁徐真一砦削平蘄水賊巢屢􅀗賞給丹陽縣富民來章輸漕至蘭溪見政與語莫逆即以兄禮事之未㡬起粮赴􅃆陽泣别曰弟今濟大江涉重地死生未可知兄平生篤信義願以資囊相托政固辭弗􅀗俾章手絾藏之逾月章郷友朱讓率其奴來曰章不幸入蓮臺湖遇盗死矣請其資囊政曰汝遇物于章章未嘗語我我受托章義必質束氏明以付汝未以政匿為已有銜之明政抵京口㑹束朱氏父子坐丹陽驛門啓囊緘得錢二百五千緍黄金五十兩白金五十兩珠八千粒衣帛有差歸之木又得錢五十緡黄金五兩白金五十兩珠五粒歸之朱二氏盛其酒食以謝政不荅而去政居軍中凡五年志心金榖遇有功輒驗格言諸上官上官以其致力匡匛移文薦之授其官父季實從又蟾心前生元俱奉詔入覲季實授行宣政院都事蟾心授翰林直學士有文集傳于家小鴉傳小鴉者錢唐人姓張氏名訥字近仁其父某鄉校君性鯁直面折人過無忌憚人呼爲老鴉舌訥性如其父又又呼爲小鴉游吳出長紙書一通斧􅃏黄葉蔡偽王張氏欲官於􅀪文竟拂衣去大明天子遣使浙河招異等材訥在選中凡二十五人至京師見天子謹身殿各實封獻所言訥笑曰汝輩封櫝上眠爲爛紙語不􅀂訥櫝在尺喙中竟取决於天咸咫尺下從則留不則還山也他言者出訥獨後留上間留故訥曰請與主詳言首言太廟次千步廊成丁勞死事上首肻之杦後丁生還者若干人授官㫁事張氏偽官沈善夏昱除官憲府訥聞即走奉天門下白上曰沈夏亡國俘而置之風憲非惟辱法臣辱朝廷甚矣上韙其論即黜退連百餘人銓吏嫉之調訥山東縣令上嘑銓者爲曰汝輩雞狗忌訥在左側耶復改授御史後以言中傷臺長請歸天目山上弗從令轉諌議官云雪篷子傳雪篷子葉氏名以清字子􅊹雪篷其自號也其先京口衣冠之冑宋未大父懋地華亭父鍈遂家焉篷貧而尚氣節有古義侠風德清尉劉昶者聞其義聲訴以三喪不舉蓬貸錢五千緡資之監黟縣伯顔調兵昱領顔行囑要子曰戰死母且老當往依華亭葉子􅊹顔果死一夕篷夢顔曰老㓜難中請以為托越二日其妻子果奉母来歸篷老其母􅀂已母㓜其子􅀂已子淮兵入蘇守淞苗帥禁遁苗帥史宋炳以鄭煥尹郡鄭欲火巨室黨苗者篷素與鄭交白以大義而免持金帛詣篷謝者旁午悉拒不取鄭避篷尹葉亭紿以父病辭及鄭以賂拜逮辜者六十餘人篷獨免初鄭􅀗苗遺米與蓬一大舟不受轉以賑乏絶無斗开及已時避地依篷者􅀂建德尹楊瑀平江尹貢師泰建德道守毛景賢篷待之知平時男女踰室家期者為擇配瑀卒囊無一錢篷殯􅁙如禮同門友胡方養疴同郡謝氏館方無從歸篷其為粥踰月弗救具棺槨會親友籍方遺物咸歸其弟妹􅀜西趙反道逆旅來歸篷解衣推食閱四載病期月餽藥弗怠浙省員外王國賢以囊橐留篷􅀁國賢死篷以完封歸其妻子凡此皆近古豪侠之為也淮南左丞史父辭篷諮議不起江浙辯章王公以省檄辟幕府亦不起應南京天使訪賢人丘淞首聘其人終於不應事母極孝母亡哀毁骨立晚年搆草堂萧之津躬耕在田公墾老圃以自食其力不入城府者若干人當路重臣識與不識皆暴之如古之云銕史曰漢􅀽􅁝析安陵富人之言曰天下緩急所望者獨季心劇盖耳王嫚罵安陵曰陽従車􅀐來一旦緩急不可恃吁義使之係于天下者如此太史民俠􅀓􅀁由作也淞之大姓民武斷其里者主之後之靡耳烏有緩急所恃如心孟者乎若篷者亦淞之人負氣俠而亦庶乎心孟之流乎故予特傳之陶氏三節􅀓三節者天台陶明元氏之子婦王氏淑盂女宗媛季女宗婉也淑從夫宗儒爵封宜人至元丁未秋兵入台淑屬于於􅀓姆曰汝以歸其父吾誓不兵辱即赴井死年二十八宗媛適里中杜思絅思絅中流矢卒時姑喪在淺土夫又未克􅁙忍死䕶兩棺為游軍􅀁執媛不受廹辱兵加刄脅之大罵曰吾􅀂畏殺吾已去久矣諸速殺吾遂遇害年四十宗婉適里中固本歸未一月兵至持一婢走池滸阽溺一卒突至引其􅅂曰妻我免死念無以自脱指其婢曰可先妾之侯卒擁婢不爲備婉即投池死年二十二銕史曰方氏據􅆓海郡十年所陽浮受明命隂禁民母送任台陷日忿兵肆戬大姓女婦辱而驅之􅀂狗豕三節乃獨聚于陶氏一門貞白一志從客白刄之下丈夫士有不能焉吾聞明元氏嘗官有元閩檢校衣冠奕世以忠孝廉直爲家行配之元人出宗宗女趙氏也宜其教漸於􅆼宨諸淑者若此余傳之使来東國之風者得之足以光彤簡云跋䟦君山吹􅅇圖華亭沈生瑞嘗從余逰得畫法于大癡道人此幅蓋為予作君山吹􅅇圖木石幽潤山水清逺人物器具點綴于豪未者纎妍可喜瑞年未三十而運筆如此加之歳月其則不在一峯丘壑者幾希矣抑余有感于是者予往年與大癡道人扁舟東西泖間或秉興步海底小金山道人出所製小鐵􅅇令余吹洞庭曲道人自歌小海和之不知風作水横舟楫揮舞魚龍悲嘯也道人已先去余猶隨風塵澒洞中便􅀂此竟與世相隔今􅀅􅀞棄人間亊追逰洞庭儻老人歌紫藟如道人者出􅅇懷裏間吾取其與明猗相樂者引樂數杯據牀三弄遂與紫藟者終隐十二峯瑞能􅀙之否至至正已亥秋八月中秋日東維子文集卷之二十八

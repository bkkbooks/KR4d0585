body:
  text: 會稽鐵厓楊維楨廉夫著記建德路重修兜率寺記寺在􅇿治西二百步按圖志建於唐神龍初名中興景龍元年改龍興開元中改開元宋大中祥符元年始改名今人呼陳尊宿道場者唐未有僧道明居之一時緇素居重加性尊宿太守陳操師尊之事見傳燈宋南渡紹興五年虜宿兵于寺寺燬十七年郡守蘇公簡至天中節齋禱歳必岀郊詣烏龍寺昕夕靡便遂呼寺僧祖照者經畫土木事十九年寺復興事見龍圖學士羅汝楫記距今幾二百年幸脫冦焚而妄庸者居之視逆旅舍不翅支房別院盡化艸莽惟大佛殿與宿鐘之樓僅有風雨至正十五年鳳山僧真如師來主寺席嘆曰予不遇蘇使君五百年尊宿道埸其過遂廢已乎力以起廢為已任坐役逺近大家善散其宿居以相吾成績經始是年之冬越二年春告成大殿鐘樓因舊之外山門兩廡法堂戒壇與夫庖庫圊湢皆出鼎建荘嚴三佛大像傔侍者六湧壁金翠供張之具一一完整師介予友童原謁文為記予方悼世梗化者伏尸至數十百里割膾醢肉餧鴟鴉狗鼠者皆基於衆生一念之烈師以梵化行三吳吳人爭歸之貧者投力巧者投技貴富者投金粟土木之輸盡良材宻石金碧之區遂為一方冠可為師之化制能也而又有大者焉吾聞法王妙利延被有情不嚴而威不疾而速我朝所以殖西教配黌廟也遲去聲其効於必世百年之乆而未得也何師䏻以大法王力圖融一切法性成就一切福德消惡氛於江表除青癘於海澨使萬年皇圖有以繫中興治綂非徒以兜率之龍光亦師之道有以振本教矣師聞言曰善哉大哉請勒諸石以為記師名儒氏乎自㓜讀書神解過人長從五結山佛日禪師講道要禪師每屈且嘆曰吾道東矣繫之偈曰佛現諸王身身住百佛刹建無萬化利普遍河沙界悟此化利者是為大知識一念生豺狼父子化敵國霄光晝晦㝠生齒盡凋耗兜率世教師佐我國王化山木與魚鱉咸歸大佛道無有一兇孽非我王衆生無有一衆生非我佛眷屬而况讓國者山君與海王我誦一切法皆隨有應現窮樓與廣殿如降兜率宫供張與飲食迺至種種有金帛競走犇天龍互旋繞我若過天險天險自然安我􅀂遇劫火劫火自消滅一切大功用乃至不可議我偈非强説得之毗沙尸㮷首兜率尊證我説真諦􅇿安寺重建佛殿記吳興郡安禪寺在子城東北按圖志剏於唐光啟中刺史李師悦國郡人舍地而建乾寕中賜額居尼宋南渡嘉泰中廢澧恭惠王趙師揆徙之郡城東北至紹定而燬主僧清復建入國朝為至元二十一年又燬時例主僧梁漢師始買寺之南距一百步吳氏廢宅轉為寺已而無咎師來法堂興僧廬粗完而大佛寳殿實未建也至正七年法真師來當徭煩逋積之餘齋魚不鳴法龍不吼比丘尼徒有持鉢而去者師乃力振清規大樽浮費又不憚數百里艱苦持疏于蘇秀雲門之間而檀施以歸既而郡吏民咸有助一椽一瓦朝累暮以至周足遂經始於是年之秋越明年春落成殿宇凡若干楹土木丹漆備極壮麗金資寳相以及供張之具一一完好復以餘力展山門之隘起庫樓之缺山門左右重翼雨廡凡前所未及者至是而完矣師以同姓府判公由辰爲其父之婭而府判嘗謂予同仕于台遂介判府孫桐生來求記辭不可則爲之言曰釋之爲教本以勸愚俗匹夫匹婦逃租徭以入浮屠者不難也而其世家鉅族有投笄落采脱洗染著以歸於究竟非其真智正覺的􅀂有所見其􅀎安於是乎不則滅倫裂紀不能免世教之儀予聞師笄年即有禪性蓋善根之宿植也二十遂辭親岀世挿艸爲宫講第一義悟衆生之於餘聞者莫不悲喜踊躍如弱喪有歸遂能大勸于時而化瓦礫為寳坊其不難也夫佛之為言覺也􅀅以覺羣生沙門之言息也􅀅以息欲而歸于見性師演其教悉能啟羣迷為正覺轉惑為見真智而無吾世教滅倫裂紀之議若爾非有功於象教者乎請以是言復於師俾刻諸石為記師本郡趙氏子傳心於天池信元翁悟菴其自號云至正十年十月初吉雞足山安定蘭若記去桐廬縣東三十里有山自孫天子象峯南下蜿蜒盤礴為岷為嶼嶼曰鷄籠髙不過百㣼蟠不過一牛鳴地中突仙人座東龍西虎關鍵重疊蓋桐廬之甲勝也至正甲申松峰禪師憶過此怱啞而笑曰西毒國迦葉師座地有至復此耶吾自水頂趺之猶以未愜髙勝吾舍是何之遂駐錫此山還名雞足結茅四寒暑學佛者歸之如市檀施日不乏絶里人孫道富子蘭片地以歸鍾文周寕李郁孫引又相與力成之由是起建大殿方大有所講法有堂棲禪有室以及二門兩廡庫院庖湢厯不十年而以次悉舉鷄足之􅂽峨然象王一窟矣額曰定安取雞足一飛一止義也江浙平章慶童為之書􅀣石廡西􅀅有所紀必求文章家登載而未􅀗其人余客馮氏義門師介大馮君士頤徵記余聞古佛徒之開迹也􅀋以垢面毁體攻吾若敷淡為之本挿艸為宫擎鉢為食馴至蛇虎穴伏轉金碧之區鬼物悲嘯換鐘鼓之境此豈世之庸妄人所􅀎爲哉今之庸妄者托浮屠以規兔王徭志與吾民爭秋毫利髙至扵􅀣黨王公玉食而􅀐逰珍寳綺繡子女狗馬過於大姓名吁其於古佛初意何如耶求其人於古佛徒如憶者宜也以爲絶俗髙等之人吾徒君子亦所樂與也師􅀽州宜春人彭氏名法憶字無念號松峰初禮陜西藥佛山無極信復􅂙江西絶學和尚識而得其道云辭曰伊彼西人教及東土布五色雲如一味雨鷄足飛來身毒國所伽黎不懷火寒水暑迺樹法幢鷄足之剛鐘鼓孔殷梵言孔揚雲棟鱗輯風簷羽翔揭名定安赫有慧光猗無念佛為法出世我力精猛爾役聲勢然火智燈千光勿替上申固釐何千萬歳隆福寺重脩寳塔并復田記去華亭縣之北二舍近其聚為青龍鎮鎮之南曰隆福寺刱扵唐天寳間寳塔七級凡􅀂干尺造於長慶間其徒邵文知俞文富之所募縁也重修扵宋慶厤閱二百餘年風雨之所經兵燹之所更土水殆不支矣主僧普善覧其敗瓴斷礎不無愴然者廼發􅀪願白千里之大族宣慰使司任公仁發􅀗畣其請始損貲營建實大德之三年也致和元年公之子賢德繼厥志至正三年公之孫士質先述其事而後締搆之精荘嚴之麗日光霞景出雲雨上佛牙祕藏登崇寳輪人天鬼神瞻仰賛嘆力餘及扵大佛殿東西兩㢘皆徹而一新又假錢若干萬緡為復其所失田三千頃然後象説有所栖其徒有所食飲而寺之敝稍振舊􅀚薦復遂状顛未介其鄉士王元來請田寺塔為一郡推古佛牙之所􅀉蘇塗之顛時出光景現相載在寺紀今幸任氏三世經營而壞始復完願有言以侈之予惟先王之剙民宇也室奥以庇生窽竁以送死堅而為牆垣城郭而髙為臺榭覧觀之􅀁亾聞乎累浮屠之裂釋氏書謂佛滅後鐵輪王造塔八萬四千一日夜神役也中國倣之或以佛骨以舎利以金玉神像唐鳳翔法門寺塔有佛指骨在焉三十年輒一開開則歳豐人安天子為遣中使迎之今塔為佛牙所在吾不知若干􅀊可開開抑何應塔之成壞實有數靈物之開闔當有時塔之崇非徒靡吾民力以視外觀而已也余嘗悼象教之徒未有一毛利益人而􅃖􅃖焉惟抑於人以給吾氓之辛苦墊隘者望風而趨其徒益繁則仰扵人者益廣主其教者既有以假佛之化現堅固相出大光明也以崇厥居而復有以慮其仰給者而圖長其食工教由是而展布兹非其徒之不善於彼者乎若普善者是已吾聞普善攻苦敷淡業既成而行亦有以動乎人與古佛師躬勞辱而有成者相師法比今之避農賦佛逃以生偷者其賢不肖相萬萬已彼尸居素食務法其􅂽唐之説以為竟祖教而訖無益扵教之殿最人目之為髙吾居之普善之蠧而已耳書其説􅂌之使其人知所懼而且勿忘其居食之自則安知後人之無致力扵其所未備者如晋善施德扵􅀅來者如任氏云相其役者耆德曰寳曰秀曰慶曰福知事曰通曰吉曰喜曰俊也任君士賈元朴居家以孝義聞便利及人者不獨浮屠氏也至正九年九月八日記惠安禪寺重興記秀之惠安寺在郡治西二百夕十步按郡志梁蕭王捨宅為寺以居尼唐光化賜名興善世以夏臈主寺事宋祥符元年改今額紹興七年刺史王公浚明請於朝始更十方禪刹命立僧眉山道立者來具見信安劉阜民記我朝至正戊子寺以民火延燬赤地無餘髙昌觀師領寺事道風法器素為四衆依嚮悼法廷之地一旦化為葵麥虚之徒衆或浮􅀉他舍􅀚發􅀪誓以興復為已任不跡權貴之門不役耕作之力盡棄祖父所遺資是年之秋即經始法堂方丈芘風日地越三年而􅀅得不募而至者檀施如千鳩工治材而大佛寳殿山門雨廊備極雄麗齋房庖庫各以序為三聖寳相十八應貞䕶㳒大神之像莊嚴殊特所用供帳什伯之具一一完好規置堅定彼攘經營者凡厯七年而汔于成其徒某狀其寺之廢興本末及師履行介予老友潜居徐公來請記予為之喟然曰天下廢式摩那之教於惠安而觀汶起其廢也數豈偶然哉吁􅀚貴胄青閨之秀也一誓不轉作殊勝事若此使觀為丈夫身有禄位于世其扶危起仆功之書于筴者可勝道哉拆金聞金色女之教不以祝顔髪住阿蘭若為出家而以發大精進悟佛知見一切解脱究竟為出家蓋以法界為居大空為相而土木金石之區其成其壞關于世教者有不得涉吾無壞無成之舍矣余嘉觀之功能汶既廢之宫而又因其教以示佛覺之本庶有以振宗風於既往衍淨社扵􅀅來者不窮也觀字無相鑑空其號已吉安路達魯花赤忽都海牙公之孫安陸府同知蠻子海牙公之子㓜即有禪性不茹葷血元統元年授皇太后旨賜金欄袈裟落笄髪受戒具至正七年承行院劄至本寺法席嗣于本寺隐岩靜顯師云十三年秋七月大日記方丈室記儒之座云丈席釋之室云方丈仙之山亦云丈乎丈乎其二教之所度而則者乎東谷上人有室在治之惠因所而以方丈顔其名來見予姑蘇舍次出方丈圖請曰陸之天台與海之方丈並予出世幸在天台咒所居山有金鰲玉几之勝黄石仙之所留題宋髙皇之所託足已至今金鰲背上之詩爲􅒟因山川艸木之光故吾室以方丈名蓋不目知其逃佛而仙招仙而佛也西游誰吳且敷年一室之勝未嘗不笑其啚以行而未有列仙儒之言以志也先生愛予厚幸有以志而詠歌之方丈不在海嶠而在吾室不在吾室而在吾行槖矣予在台時嘗窮勝踐過惠因所時上人方脱胎九齡也今予髪已種種漂泊道路慨念宿竟不翅􅀂在弱流三萬外也上人歸其得無辭訊某山川之靈乎辭曰東萬山之羅絡􅀆縆赤城之盤紆瓊臺方廣鬰以出没􅀆聚仙佛之所廬東海之嵬岸􅀆架金梁之凌虚衰靈修之播遷􅀆來仙伯以導輿赤子􅀆如魚紛望思􅀆鼎湖嗟山川其如昨􅀆眇風景其愁􅀆予望海屋􅀆渠渠輓飛飈􅀆以為車上下風雨􅀆出入太初下視弱水􅀆黄塵滿區仙耶釋耶吾不知何誰􅀆􅆧從汝􅀆歸諸清溪亭記呉之東禪寺僧文友自號松岩道人喜讀吾儒書多識前言經行一時士大夫樂與之游嘗築亭寺之西偏臨水之濆蒔花竹其傍故士大夫過寺者必訪松岩而松岩設酒茗必之乎亭之所亭之賦詠且􅀅成卷矣然亭不以松岩名而必名清溪者蓋清溪其師正一之號也予未來呉時聞清溪君以吾儒􅀉迹墨氏而不縛墨氏律日與士大夫飲酒賦詩以風流自命非蔬筍衲流所􅀎窺也及來吳而清溪已逝及見其徒如松岩者􅀎不忘其師去之十餘年而號猶存扵新之亭非其學得於吾儒重本之義能􅀂是乎宜吾徒之樂交其人而華其亭以賦詠也抑又聞寺有宋南渡僧曰林酒仙者居院不事熏脩梵唄惟酒是嗜乎持鐵鍵搥日遊市間不問酒主名夜即卧酒壚底酒家争供以酒以爲聖師云若清溪之爲師弟子者得微猶有林望師之遺風乎嘻吾扵是而自感者已今之爲浮屠氏以絶倫屏葷酒􅀂槁項黄馘之流日誦經鈔若下萬言以爲得佛之道而不知去道益逺而脱解禪縛如林酒仙之徒乃得稱聖焉乎習浮屠氏之法者可以辯其要矣亭剏於至正丙戌夏成於是年之秋明年秋七月記竹雪齋記至正八年冬積慶至僧臻上人於顧野王讀書堆之南闢一室以燕居所環種以竹上人每讀書其中至雪夜見八􅈧玲瓏一室洞白上人必被五文衲戴白􅷓笠或徒􅀝竹下吟嘯自若遂名其居曰竹雪明年冬介友生馬琬尋予三泖之上以記請予曰竹者至剛至虚之物也剛則不屈扵物虚則其道扵體雪之為物又至清至白之所形也清不自蔽其惡白不受涅之繼也方天地閉塞時竹獨秉後凋之操而􅀇冥之靈特因焉雪與竹若相軋而不知其適相得也上人於二物者乂適相遭於一室宜其取諸物者有得於其剛與虚清與白也嘻竹微雪無以章其秀之物雪微竹無以比其清之敵吾聞上人貞而白者也微雪與竹則又何以表見其人哉竹雪之相軋庸衆人之所得而知竹雪之相資者非人工之協之而誰邪雖無即然扵有竹也入有於無雪也春至雷作作而萬角突至有扵無也金烏一睍而萬状立解無於有也無乃道之宗極之根也上人學浮屠浮屠氏之學以靜虚爲宗空無爲體上人心不爲欲回道不爲物損是能備竹之剛而虚嗷不自匿涅不是緇是􅀎備雪之清而白矣推而極之以至扵聲臭之汦然則靜虚空無者􅀅有得於二物之表上人以爲何如俾琬復上人書諸室爲記望雲軒記余逰海上得浮屠友三人曰靜菴鎮大明煜天鏡淨也淨修長書一通䞇余之見於靜菴所越三日又微致其􅀁主院淨土招提入其門門草莽立棟宇吾知其有才也升其室繙徒斤斤魚貫立詔以吾聖人之書知其有學也已而燕客望雲軒上求一言白其􅀁以望者叩其以則曰吾非王謌客之望於矣㑹者浄有白髪母在黄龍之滸宁先人故廬不得迎以待此望雲者即狄孝子之登太行而注射其目者也余聞而異之曰金仙氏之教超於萬有之外而浄之有其親扵天性者不滑以真無誣之吾又知真性之與吾儒合狄孝子之忠於國仁於民者孝之推也浄推其孝移忠於君移敬於長移義於宗族移任恤於婣友覃乎民社則望雲者又何異於狄孝㢤宋有稱緇衣相者曰慧琳氏權至杭時宰直假清虚以資燕譚且以誤人家國又何望凈扵琳也哉至正二十年夏五月四日半雲軒記有詩雲間鑑上人住胥浦之無住精舍受法於金陵休居叟禅師休君命其所居軒曰半雲集賢趙公雍為之書而又介吾徒尚賢謝君來見余黄溪書舍請一言以為誌余讀宋僧􅂋萬詩曰萬松嶺上一間屋老僧半間雲三更雲去逐行雨回頭不似老僧閑怪萬之有心於閑不如無心之閑也雲之卷舒晴雨皆出於無心故􅀨人間其施也沛然則為出山之雲雨足而其體也悠然則為在山之雲施也體也雲何容心於其間哉萬笑雲之出而以不出之閑驕於雲也萬豈知雲者哉今上人號古心而上無住之庵是契心迹於雲者也半雲之命於其師知古心之足以朋雲於賔主間也雲豈敢以勞恥於古心而古心又豈以閑驕其雲也哉余以是言復古心古心曰唯唯遂書為誌又繫之詩曰我有山中屋與雲相半之雲去何所去雲歸何所歸雲靜我心住雲動我意飛一動與一靜隂陽互根依是為古心法我儒不能非海屋記談海屋者以海上有山山上有金銀宫闕限以黑弱水三萬麻姑云東海三變為桑田則知海屋有時而廢及觀海屋丈人掌計籌海塵籌充陳兩閒敝丈人海墨乂最靈而夀者乎吁吹萬物皆省􅁦惟㓜無所與造亦無􅀁與􅁦故知夸仙談道不如浮圖氏之善言幻也九峰古鼎上人以海屋自命其文室人間九峯非海島又室非鮫室屋何贅字於海二人謂吾四大􅀚皆幻求吾屋必海如牛渚犀見登州臺􅀚殆老姏尼之見焉耳何以稱丈夫佛爲清逺􅀇虚之神乎晋許榮曰怫者逺清去淸之神今之求浮屠道以老姏尼之見雖吾戒麄法不能竟况欲造清逺􅀇虚之界乎詣極扵幻清逺􅀇虚庶矣君其不信吾􅀅與汝約淳芒與苑州臺􅀚光景魁磊非煙非塵謂之幻乎不幻乎會稽大瀛于聞其言而韙之曰海屋之幻豈上人然吾纍仙伯見已久矣上何見曰麟之屋殊之宫美人􅀆在中乗文魚以相從不知横波􅀆衛風此豈可與老姏尼輩道乎上人起作和南禮曰幸子䧺文録諸海屋以告迷而詰者已而上人呼三辰酒起戛赤金鉢自歌海屋之歌曰烟飛九􅀧三山覆搏桑吹􅁅􅀧􅀂水海籌甲子計瀛縮大􅈚不死尸不宿八柱靈波腐鼇足霞震旦東傾不動屋并録爲記小蓬萊記有詩按越椉鏡水之上有山曰卧龍如海湧鼇脊郡宅據其顛唐人居之以蓬萊自侈山水樓臺之勝竊比於真宫道院是以假􅀚求蓬萊者也霅水之上子城之中有道士宫曰􅀇好無玉崑丹丘醴泉餌艸之異聞人師居一軒其在而亦以小蓬萊自命此非假􅀚也而以真幻求乎蓬萊者也嘻東方生記蓬萊者幻十之竟云耳萬有形皆幻池以幻示幻􅀁以爲靈仙之教之神也子合神􅀚於馮閎乎方壺員嶠不啻几案物也又安有弱水三萬里之隔哉吾試與子言幻黄初平得仙金華山中之石皆羊也其兄初起眼眼未換因見石而未見羊初平叱石石皆起成羊數萬頭此非神幻之至也耶然見師之小蓬萊者惟初平能見之不者皆初起之見金華山白石者耳見羊者小可也大可也見石者大小無一而可也師曰唯請書諸軒為記使世眼覷予小􅅾萊者兹文為之大圜之鏡也且係師以詩曰蓬萊在何許渺在東海虚其廻五千里上有神人居山川異百奥風俗如三呉仙官示狡獪百丈神千軀世人尋地脉弱流墊輕壺徒聞羨門往漫役君房愚孰為靈仙府乃是尺寸廬燕坐吾玉几天游我非車揮斥九清表飄然隘中區豈蓬知大小識無真鳴鶴軒記道士徐中孚居錢唐宗陽之西廡嘗􅀙游邵菴虞先生先生名其軒曰鳴鶴蓋取諸易中孚之繇也而廬陵歐陽太史又為記之繇之義盡矣又復求余文余聞鶴之鳴亦多變也已其鳴之信則警夜分鳴之逺則閗九天鳴之竒則晝夜六時中律吕至其鳴之神則空中語纍纍之詩豈真鳴内和外見象中孚之義哉抑余有感鶴者不䏻不為中孚通也唐光和詩人嘗悼鶴以飽食易天真至爭腐雞鶩前狎羣鳥鳶之内東大夫軒遂有禄位則五音沉乎其無闐矣嗚呼利令昬非惟吾之物為然靈禽亦爾中孚於鶴其㓜飽之過而昬其霛也浮丘伯曰鶴一千六百年飲而不食與鳳凰且共鳴聖人之盛中孚學仙者果爾其有􅀅而見其鳴聖人之盛而余諗諸于六百年之後也中孚其能以長年訣㖟予􅀇霜臺記雲間劉煉師某築月臺于廬之西曰􅀇霜請扵箕尾叟曰幸先生費辭以記􅅱曰生物不射以􅆇天造化之母者吾􅂑夫太隂之精太隂天地交媾之先數也在卦隂含昜坎象也坎爲月中一畫真陽也萬物之生資此而後成故仙家指爲􅀇霜􅀇天也天地初交生物之始猶未離夫天故稱􅀇霜見霜也如􅀇露􅀄凝如綘雲漸積如瑞雲不流蓋元氣結成純乎生生之英結之爲霜化之爲液散於萬物賴以成賈是故木有三鑚則爲出紋之則爲水坎津也木得水以行曲宜之性無水則枯矣木有三滅則化土離象也真隂存乎其中水道也土無水則地脉竭矣金有三擊則爲火鎔之則成汁水象也金無水則不能從革矣天無天無水則不能雨地無水則不能雲人無水則神􅁦天下之物無一不資夫水水位扵坎高扵月象而爲􅀇霜非至精無以造是􅀇非至道無以凝是􅀇彼日繁霜則盡零炎霜夏飛損物以行肅者殺謂霜之名則可謂􅀇則不可故􅀇也惟太隂之精當之吾嘗登是臺薄筄上覆曲欄旁植空一􅈧以接太虚之境淡方寸以生魄之際化槁木之形如玉毫之相吾􅀅與汝蟬蛻穢濁而游子太清矣子能從之乎是為記東維子文集卷之二十

  text: 東維子文集卷之六
  hash: sha256:0341cefad687d43dd59f3f2e8ff7a88537d12467395944cb5f2a8b14141bdc9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_006-1a}
body:
  text: 維楨廉夫著序鹿皮子文集序言有高而弗當義有奥而弗通􅀂是者後世有傳焉無有也又况言厖而弗律義淫而無軌者乎自孔氏後立言傳世者不知幾人為其㓕没不傳卒於齊民共腐者亦不知幾人焉姑以唐人言之盧殷之文凡千餘篇李礎之詩凡八百篇樊紹述著樊子書大十卷襍詩文凡九百餘篇令皆安在哉非其文不傳也言厖義􅁋非傳世之器也自今觀之孔孟而下人樂傳其文者屈原荀况董仲舒司馬遷又其次王通韓愈歐陽脩周敦頤蘇洵文子逮乎我朝姚公燧虞公集吳公澄李公孝光凡此十數君子其言皆高而當其義皆奥而通也虞李之次復有鹿皮子者焉著書凡二百餘卷予殆讀其詩曰李長吉之流也又讀其賦曰劉禹錫之流也至讀其所著書而後知其可継李虞以逹乎歐韓王董以羽儀乎孔孟子蓋公生于盛時不習訓詁文而抱道太山長谷之間其精神堅完足以立事其志慮純一足以窮物其攷覧博大足以通乎典故而其超然所得者又足以達乎􅀑神天地之宜其文之所就可必行於人爲傳世之器無疑也予怪言厖而義􅁋者往往家自摹刻以傳布于世富者帖資以爲而貴者又怗勢以爲意􅀅輿十一經厯代諸子史並行而無敝不知屈氏而次彼雖欲不傳不得也必藉貴富以傳則貴冨滅而文亦滅矣嗚呼貴富者不􅁕怗以傳而後知文予之果足以傳世也文如鹿皮子而不傳吾不信也予以鹿皮子同鄉淛之東而未􅀗識其人其子季特文集來且􅀅其命曰序吾文者必㑹稽楊維楨也於是乎序鹿皮子陳氏名樵字君采金華人居周谷磵常衣鹿皮自號鹿皮子云留養愚文集序括之士以時文名於今日者有林君則氏葉見山氏徐景熹氏劉伯温氏項子華氏以古學名者則有鄭息堂公洪樂閑公葉壺谷公留萬石公時文古學使通能之則有不工者矣留君睿養愚仍萬石公之從孫也過余姑蘇所次出鉅冊一編視曰此睿之雜著也先生號知文幸為睿評而賜之序首焉予始讀異􅀓誌各一首客來輟之夜張燈繼讀之箴銘詩賦樂詞些語凡若干首皆聲毗法洽各適其職明日又讀其時文所攻尚書義􅀂干通又辭敷義鬯不謬夫古史氏􅀓心之㫖為之大異曰古學與時文不通能而何留君之通能乎予聞括為山州而留君所居山水為尤勝山有曰龍曰鶴曰文曰錦曰九樓溪有曰好溪名響石潭有曰神潭山川潤氣出為雨雲清明之英為日月之華小秀于草木而大秀于人留君其大秀者歟不然括士之不兼長者苗君不克兼也雖然學古而後文古也文之諧於古者必不諧於今韓子論時之文曰子大慚者人以為大好留君有志于今文為進取計則不可以不慚者為之矣以慚者為之則於古者不能不悖矣留君􅀅何以處此留君曰睿寕以古不慚者病於今毋寕以不大慚於今者病於古也遂書為序聚桂文㑹序秦漢之士無時文以其所陳説扵上者皆近乎古而未有立體製定格律以為去取如唐宋以來號為舉業者也韓愈氏病之以為大慚者大好則時文不可以傳世也諗矣我朝設科取士雖沿唐宋而其制則成周文則追古于唐宋之上故科文往往有可傳者然有司大比之所選者又不君師儒義試之所為取為􅄖也何者大比之所選僅一日之長而義試之所取則寛以歳月之所得也大比開而作者或有遺珠之憾則主司之負諸生也義試開之作者或無擅場之手則諸生之􅀒主司也嘉禾濮君樂閑為聚桂文會於家墪東南之士以文卷赴其㑹者凡五百餘人所取三十人自魁名呉毅而下其文皆足以夀諸梓而傳於世也予與豫章李君一初實主評裁而葛君蔵之鮑君仲孚又相討議於其後故登諸選列者物論公之士譽榮之即其今日之所選者莫盛于江浙而江浙之盛饒信為稱首者鄉評里校之㑹歳不乏絶也今饒信之盛移於嘉木嘉禾之賢守長實為集賢􅓸公顓務古文而崇化文士有名世者作不惟斯文増重而嘉禾之文風義俗從而振焉則文會之作固有補於司政者不少也斯文鋟梓濮君又來一言以敘首於是乎書曹士宏文集後序余生晚不及識廬陵曹先生及來錢唐􅀗覩與劉志善書書言劉光伯杜子美諸人之學不聞道王氏陸氏之學為無用之空談獨有志於述禮樂徴文獻余巳異其為人恨不得與之共世同里閈接其言議也未幾其子希顔以南陵遺藁來則知先生抱有用之才不見於世而見者惟此耳吁編簡零脱曽無幾矣詩凡若干篇文僅二十有九首皆津津焉善言世故綜之以往史而宿之以聖賢之理非代之學者謬悠無邊畔蕪澁險怪以為辭者之所可及也觀其翁彦揚之譲議則范史不無佚鴻子敓之悖李庚伯之孝紀則鄠人對亦不無忍薄之愧議之近於情而依理雖古之人懼焉况今之繆悠為學而蕪恠為文者邪先生之學之才如此而世不材其人利其道豈不媿當代君子乎予求生其人於今之所接者不能為愧蓋益甚矣孟子以誦其詩讀其書不知其人可乎是尚論其世也謹為之編次及正其脫訛而且志其尾以􅀉余尚反之心云王希賜文集序干􅀅之器列可刺鍾然其利之司於人者有當不當焉君子以禦㓂利也盜持以殺人亦利也文章大利器也而妄庸者䡖用之世無時分寸利而危至於殺人吁可不慎諸故司文者不以䡖屬妄庸戛戛乎難其人者誠以利器之雄偉不常而有推陷廓清之功者也自今求其人扵六籍而下斤斤鄒一人楚一人燕一人西漢三人唐二人通愈宋三人周程在焉今姚牧菴虞邵菴而次禾以數斷句之數人之文實代之利器而利之當於人者也皆雄偉不當而有摧陷廓清之功者也今之妄庸者蔓衍草積動自哆大曰吾文鄒楚而降之文也當有傳也布於今與後不必越五年十年其蔓衍草積者巳與糞土同腐􅀓何有乎括蒼王廉氏爲文凡􅀂干篇遭兵火而失者過半今拾遺稾及續爲文又若干㢧文子讀書二十年而始敢爲文蓋者則器之本其爲人磥砢有竒節又有利器之操者也知其利器不無周於世不無用於世則其􅀓於人與妄庸者異也必矣書以序之再序我朝文章肇變爲劉楊再變爲姚无三變爲虞歐偶宋而後文爲全盛以氣運言則全盛之時也盛極則亦衰之始自天厤來文章漸趨委靡不失於蒐獵破碎則淪於剽盜滅裂䏻卓然自信不流於俗者幾希矣吾嘗以近代律今之文僅得與曽鞏蘇轍王安石李清臣陳無巳之流相追逐相巳而中衰也已不得步武於陸游劉克荘三洪矧葉適陳􅀓良戴溪乎不得步武於葉適戴溪陳傅良矧晁張秦黄乎不得歩武於晁張秦黄矧二蘇歐陽乎時則舉子之伎與矣不惟代無作者而鑑識衡定為之先者無其人也亦乆矣吁吾於此求天篤於自信不為流俗所移者東浙之士斤四三人曰王廉氏其一也其為文不諧于人人則以鑑識衡定者屬於吾吾每為之起畏諗其追古作者則西京而上秦與燕也楚之騷也春秋之國語也班固崔駰而下弗論也􅀂是者其時於一已之獨不以一代之氣運盛衰為高下者也豈不偉歟吾使魏生鎮録其追於古者而告諸學古之友云楊文舉文集序文章非一人技也大而縁乎世運之隆汚次而􅀜乎家德之醇疵當世運之隆文從而隆家德之醇文從而醇士以文墨為䏻事幸而生乎昭運之代又幸而出乎明德之家􅀂吾宗又舉者非其人也乎文舉通徴先生之嗣也先生領臺檄主文淛闈時予實列同孝􅃪先生言議凛然為起立知先生之學出道江張氏張氏之學出紫陽朱子故其為議論文章不一於正不出也二十年來先生之宰樹共矣幸先生有後如文舉􅀗見予吳門次舍示􅀁著碑銘敘誌箴頌論賛凡􅀂干卷累日讀之喜其識職而备毗千律理營而其言沛如也子自居呉門閱今之名能文者無慮數十家􅀋未有及文舉者則知文舉之得其本於家而又本乎氣運之盛於國家者非庸衆人之所同也昭昭矣抑吾臨文有感也先生入翰死不兩月輒謝病歸高文大册不一二見諸史院而文舉之文亦多遐乃下邑之所撰録朱反銷張乎帝幾也嘻文舉之文豈遽盡於是編也哉夫蘭臺芸館文章之居編摩述作文章之職也居其居而書夫言職者或有矣顧有得其職而不居其居者吾不信也文舉尚以吾言俟之皇元一經業旦作矣文舉尚以吾言勉之至正戊子十二月序春秋左氏傳􅀋編序三􅀓有功於聖經者首推左氏以其所載先經而始亊後經以終義聖人之經斷也左氏之􅀓案也欲觀經之所斷必求􅀓之所紀事之本末而後是非褒貶白也然考經者欲於寸晷之際㑹其事之本末不無繙閲之厭於是􅀋編者欲出焉鉅鹿魏生德剛初授春秋經學於應君之邵應君殆又執經於吾吾於三􅀓有所考索必生焉是資其暇日以左氏所記本末不相穿貫者每一事各為始終其􅀋編之名曰春秋左氏􅀓􅀋編者鐸排虞卿輩各作左氏鈔撮其書蓋約言之編耳未知求經統要也生之是編豈鈔撮可以較小大哉予念其用工之勤俾繕寫成帙傳於同門之士生且求言以為序予於春秋諸家有定是之録凡十有二卷未敢傳於世也蓋經有不待􅀓而明者因􅀓而蔽者學者通其明祛其蔽而後聖人之經如日月之杲杲焉故協者雖三家大儒言之亦黙也生尚以予言有以定是於傳家則經之如日月者不患不明矣生勉之哉是爲序至正十四年秋七月朔序曹元博左氏本末序左丘明受經於仲尼故作春秋􅀓以爲聖經之按後之傳左氏者有鐸椒嘗作鈔撮八􅃃虞卿作鈔撮九卷是又有切於左氏者也惜其文無傳矣至漢張蒼賈誼復傳左氏河間王進於武帝至成帝時劉歆校祕書而好之始立左氏春秋和帝時遂立其學而左傳大著又其後晋杜預復表章之而傳有注釋夫左氏爲聖門弟子又身爲國史纂記本末考索惟精其文或先經以始事或後經以終義大抵有以原始而要終也後之言經者舍左氏無以爲之統緒故止齋陳氏謂著其所不書以見經之所書者皆左氏之功此章指之所由也雲間曹元博氏復按經以證傳索傳以合經為左氏敘事本末若干㢧􅀋之精訂之審以傳學者之􅀚覧其用心亦勤矣論者以左氏作傳為仲尼忠臣杜征南作注為左氏順臣非忠臣今元博序其本末抑為左民順臣乎忠乎蓋左氏之失工於言而拙於理好以成敗論人妖祥計事往往博過扵註元博既序其本傳復能􅁠衡其是非合乎筆削之大義是人愛而知其惡謂為丘明之忠臣也豈不偉哉元博尚以吾言勉諸春秋百問序六經皆有疑而莫疑於春秋疑而不决而欲得筆削之微者蓋寡矣此春秋之經有百問也予家藏是書凡六卷嘗授之無錫孟生季季成成又傳之於華亭曾君繼善之子元朴朴以其傳之不廣也特鐫諸梓而徴予為序是書也失其首辭乆不知為何人所著或以為萬孝先生又不知為何時人􅀚其設為問畣者往往與予補正之意合實有以釋是經筆削之疑予今孟生勿祕所授而未及板行于世今曹君父子能推所秘於人不遂吾之初心而賢於漢儒之私論衡於一已者乎雖然道學是講者謂説書不故慮學者不求諸心而惟口耳之是資夫百問之書探聖意之微而欲決之諸儒未決之論非見之卓思之精者能之乎謂資口耳之辨不可也學者於春秋茍讀而未有疑疑而未求釋于心而遽􅀚是書之廣傳也為病則􅀦存乎其人焉春秋定是録序柳子曰春秋如日月不可賛也然則髙自立論者皆誕也歐陽子曰春秋如日月然不為盲者明而有物蔽之者亦不得見然則􅀅以制肯而怯蔽則亦不能不暇於詞也經不待傳而明者十七八因傳而蔽者十五大明目者快其蔽而通其明則其如日月者杲杲矣余怪三家既有蔽焉而諸子又於其蔽者析宗而植黨争角是非不異訟牒使求經者必由傳而求􅀓者又必繇諸子是非紛紛莫適所從經之杲杲者晦矣世之君子既晦於求經復於諸子求異其説是添訟於紛爭之中惡物蔽自而又自投以医者也維楨自幼習春秋不敢建一新論以立名氏謹會諸儒之說而輒自去取之為定是録説協於經雖科舉小生之義在所不遺其不恊者雖三家大儒之言亦黜也吁于又何人敢以一人之見舉奪千載之是非何僭自甚亦從其杲杲者决之焉耳後之君子倘以録猶未是改而正諸豈敢諱乎褚氏家譜序褚氏之系出自微子宋共公子叚食采於褚號曰褚師因氏焉其在衡有褚師子申定子者蓋其族之仕於衛者也漢元成問有褚先生大以行顯嘗補司馬遷史記六朝以來褚陶褚褎皆以文學名至唐褚亮博學才敏預瀛洲學士之選其子遂良為碩命大臣遂良田河南徙錢唐其子孫所居號褚家塘後有徙居苕城者亦以褚姓其巷今聚族烏程之朱塢即自苕城來也其祖為世迢墓在朱塢後洪冢舍曰光逺菴云世超生世隆生大理評事琳淋生省幹溶溶生宋郎提幹大同大同生宋迪功郎淮安縣丞士登士登之子長宣教郎友龍次仲龍反龍無子以仲龍之子􅀅仕郎􅀦史實録院檢閲文字天祐為嗣焉天祐三子長錫珪善州教授次錫􅄾次錫瑜􅀩古學正善州四子嗣良嗣英嗣俊嗣賢錫􅄾無子以嗣英為其後自士登前凡十世皆以詩書起家由科舉入仕者代不乏人宋革故居遭兵燹子孫亡其實録嘉言善行不復可考矣嗣英於族叔祖桂岩公所訪得家譜令其子桂繕寫為冊冊成乞予序予謂君子之澤褚氏之澤巳踰十世而其來者尚未艾也桂之為伯仲者凡六人皆從碩師習舉子業里以衣冠之族稱焉歳大比郷大夫録以充賦者褚氏子孫居多吾卜褚氏祖之積者厚而嗣英之培其積者益至吾見褚氏之來者益衍而大以五世之澤論君子者又豈可以律于禇氏之澤哉褚氏子孫尚以予言勉之送朱女士桂英演史序錢唐為宋行都男女痡峭尚嫵媚號籠袖驕民當思陵上大皇號孝宗奉太皇夀一時御前應制多女流也􅀂碁待召為沈姑始演史為張氏宋氏陳氏説經為陸妙慧妙静小説為史恵英隊戲為李瑞娘影戲為王潤卿皆申二時慧􅃛之選也兩宫㳺幸聚景正津内園各以藝呈天顔喜動則賞賚無􅈫此太平朝野極盛之際今當壮力鳴鏑語時故家遺老或與退璫畸㜮談先朝故事未嘗不興感隕淚也至正丙午春二月予蕩舟娭春過濯渡一姝淡粧素服貌嫺雅呼長年艤燿歛袵而前稱朱氏名桂英家在錢唐世為衣冠舊族善記稗官小說演史於三國五季因延致舟中為予説道君艮嶽及秦太師事痤客傾耳茸知其腹笥有文史無烟花脂粉予竒之曰使英遇思陵太平之朝如張宋陳陸史輩談通典故入登禁壼豈乆居瓦市間耶曰忠曰孝貫穿經史於稠人廣中亦可以敦勵薄俗財吾徙號儒丈夫者為不如巳古稱盧文進女為女學士予扵桂英亦云東維子文集卷之六

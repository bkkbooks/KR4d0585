body:
  text: 東維子文集卷之十二會稽鐵厓楊維楨廉夫著記新建都水庸田使司記天地位而水為之脉絡運而天地之功成古者水病民神禹民治之功與天地等代之職水者雖小大不侔其得一日廢耶此周之匠人稻人漢之水衡水司空之官所由著而今之都水使者之司所由立也大德初司置平江曰行都水監泰定年改庸田遷松江以置不常人視為疣舍故棟其署􅀉署于它所至正元年重置司平江秩隆三品轄江東浙東西道官與風紀重臣交調御兼行工部事􅁺屬亦皆税司樂吏遴選郡縣守今咸受節制司之權崇勢重視昔有加八年都水使者左答納失里公來謂今聖天子切切焉以東南租税之出重在三吳而三吳水國也故署都水司平江而官吏􅀉署地所事體弗稱先是請於朝得給官錢四萬緍仍得撥地羣治西財賦府故基􅀂干畝於是鳩工庀材經始於是年十月八日不三月告完中堂􅀪敞挾室靜宻幕司曹舍鱗次翼張旁爲繚垣前爲崇閎氣勢炎兀規模備具吳父老咸扶黎仰瞻嘖嘖稱贊以爲不自意垂白復見是司之新也既而郡工竣事長貳率僚屬位正新守相與舉酒落成幕元僚沙君來請于維楨頤有以記維楨考中呉水患自宋季兵部韓殿省郟亶父子經營規畫亦詳矣其漂陽五堰江隂十四瀆宜具大呉等瀆松江曰塘曰浦者凡一百三十有二志籍尚可稽也然未若我朝知力足以興除其利害而德足以消其震盪漂忽之變也大德間三江陻塞平章徹里氏濾財賦之原而後之為國者不能去矣宋置權務立交引法貼射法又或弛禁以均賦茶户然有法無人則官與民反病矣我朝立轉運司于江西而江浙置提舉司三官與民無交病之􅁦則司以法存法以人舉耳常湖之司併平江而為一蓋又御饍之所在體隆事大與他日異故號都司用四品印章増設監長一員幕司陞提控按牘􅇮昔時署所痺陋至七年副提舉嘉禾張公霆發來始拓其地増剏㕔事後樓若干楹都提舉東平趙公深又買民地開門道建儀門二至正九年達魯花赤晋理翰笏禮公又重修東樓即宋清風樓也樓乃其額之舊棟宇翬飛瞻仰改觀司之署始雄而麗與事達魯花赤體稱三大役之賛成者提控按牘吕君天祐也晋公嘗宴予清風樓上遂以記始末請夫奉辟王食臣子事上之敬推恩施食臣子及下之仁事上敢不慎厥職及下必承流于上方今聖天子視民如傷神窮煦君未嘗忘于一飲一食之頃其肯屬民以自養乎居是職者有一豪之厲于下則畧大德于上其得為奉法良吏乎予聞良長貳之為政察于下􅀩協于僚議得肅子胥徒之役凡屬之吏効職而復期江之啇山之丁皆願岀除而服勤于其土宿垢剗刮大課流通蓋事上之敬盡而及下之仁亦至矣宜并書為來勸普公字景淵那海憲監之嗣也趙公字伯淵屢厯臺憲張公字彦榮亦由宣徽推擇而至云杭州路重建北門迎恩館記杭為宋行在所宋既内附以其地置行中書省行宣政院財賦都府肅政府轉運儒學醫金帛雜造語司鱗比棋布歳時朝廷遣使者須詔昔宣錫命金幣斧􅃏裘貂上尊與夫名山大川古宫刹祠廟御香寳器不絶于道使至之日省憲而下百司庶府之官無不奔走戒金革儀汶聲妓部曲導前擁後以為郊迎之禮益逼以迎官寺則失諸慢曠以迎上舍一驛之外則過子勞故酌其地于郊􅀜之外以為迎送之次此北門之館所由立也館剏于至元元年承恩之額書于右丞圖魯公至正十二年秋七月紅巾冦枕燬館冦退越三月而監郡觀閭氏倡捐已俸命仁和縣屬吏首起其廢為屋此若干楹堂室􅈦軒洎垣墉門宁更衣之亭治飪之厨凡坐臥飲器用之行無不完整且更書其顔為迎㤙尊皇華之出也興工於是年十一月某日告成公遣仁和丞某來請記余謂周官之法凶禮無力政刀政士功也杭城不幸罹朱鬂氏兵燹之餘而力政是舉非所謂時屈而舉贏者乎抑論之力政有緩急緩不得舉急不得廢迎恩之館為皇華使者之賓送奉王制而尊天使臣子之敬也朝覲貢賦送往而迎來又臣子之忠也執忠與敬臣道在兹而可以一日廢乎宜不得與時屈舉贏者律之也其費緡錢若干不書其廢興始末以爲記然公之爲政知所先後其興􅁦子城郭殘破之餘者蓋不止是出風教者先聖大成之宫䂡礪死節者忠臣血食之廟及倉庫關梁之要害圖已陸續而舉予又當附春秋義筆削焉以爲民力重云至正十三年正月日記淛西憲府經厯司題名記淛西肅政司經厯也憐帖木公語予于帥正堂曰凡官寺署所必有顯名非徒志歳月著爵里編其名位于此將有辨名實子彼者可不畏哉吾幕府舊有石登載殆已徧今石承其後請予記以文子讀柳子忠丞壁記曰由號􅀚實使後之居于斯者有以敬于事公之言蓋知所敬者已予嘗論朝廷選官莫難于法則之司而尤莫難于賓佐之寮也賓佐者得人其時義也大立節也貞執法也􅃀議事也詳􅁢一司之法則其有一􅀻而撓者乎故憲幕府得一良經厯一道之政無不理三尺之法无不信職于兹者可不敬哉然則題名之誤也豈爲金石美觀而已哉後之覧者當有知公之敬者敬其事如柳子之所言者也公字文卿河西人起身臺譯史性忠朗峻直有文武才畧以從大夫某公平冦有功升是選云至正癸已九月丙寅記海漕府經厯司記至正八年十二月甲子重建海漕府成初府理所就吳人漕萬户朱張氏之故居也厯六十餘年􅁦不可支矣今始撤而新焉且􅝵其比而大之經厯司署所在􅝵内而常熟江隂千户所前三年而剏者在府東偏遂轉為經厯司仍治署所于城之東比隅常熟江隂土木功竟府長貳將其幕賓寮各正位卜亭相與舉酒落其成而經厯孫公來謁予曰始憂府署役大弗即成今幸官不知損民不知勞訖有成功以及於幕署也中偏表裏同一華煥願子有以記之予謂春秋一門一闕之作必書謹王制重民力也今海漕之署制得為民力有遺焉幕署之痺陋併得轉其便而為之可不書乎議者有疑漕幕署無風紀􅀁􅀜刑名􅀁􅀉軍旅賦徭嬉脩之屬金出納者一歳兩漕耳簿書期㑹一利刀筆掌之有餘也何足稽清選之才六品之秩哉曰非也魚龍之國去天子里逺武夫忛檣與文肌被髮之族鄰險易之相伏也利害之相乗也一幾弗登一微弗防漕政之成敗國家之治忽保焉句稽情偽之辨不辨期㑹征役之嘗不當未論也居幕司而贊畫諾者其可無其人乎此吏部選其幕賓僚不减選於其府長貳也幕之長於經厯次曰知事照磨不夾輔幕元寮者也三人者各職其􅀁當為以相其府長貳之􅀁不逮其得以一日自是􅄖閑之署而不知有累賢勞者乎且異時公卿牧守之選由兹而起則知居是司者其人皆沛然有以周天下之用也尚矣併書為記使繼孫公而來者不徒思其署舎之勞而已也孫公名震字仲逺金陵人起青臺書史憲延師閫至行垣屬􅁺多獻可替否今輔漕政廉縝勤敏府署之成贊謀之力尤多獻知事鄧繪字元素金臺人照磨衛􅁠字衡甫洛陽人峝寅叶恭益有雅譽云海鹽州重修學宫記至正六年夏六月松陽葉侯繇守令重選為海鹽州下車之三日率僚吏及校官弟子員詣學行釋奠禮顧瞻學宫循託圯壞戚焉曰司千里之政化者長吏也為政化之􅀁出者學校也今圯壞廼爾何以長吏政本哉於是與校官吏議唭􅀁當葺理者捐捧金為之先發學廪見儲復征其宿道訃得中統鈔若干緡遂鳩工庀村計日竣事侯躬冐袢暑視其役不少憚夫成殿素淺偪一遇祭奠則樂無􅀁署更剙樂軒燕居閣肖聖象其上勢壓且不支扵役最艱費最大名修而實則作也東西廡為從祀先賢之舍象設采色剥蝕者復章四齋室宿弟子員凉燠失宜者今且明敞深潔以至庖偪庫庾井匽無不完飭經始扵是年之七月四閱月而訖工明年春州之士李桂水克剛等以其事來請子維􅍬願有以述歳月併諸著侯績余聞海斥鹵之邦牢盆民去文飢卉服之夷不逺不易以禮善化也久矣侯不鄙薄其民不律以枉役惠文而以禮義之其用心仁矣皇元之興􅀅百年子孫長治外夷嚮化者大抵學校維持之力耳予悼近之長成者方以操切為術急切功赴利為能視學官為儒者迂務正化之􅀁自出茫乎弗講故嘗論守令不識政俸壹以操功爲術㓛利爲􅀎者雖立學官與秦史燔書籍滅學校者同科耳嗚呼若而人者不負學校明制守令重選哉侯不鄙海􅀖首務立綱陳紀爲治法而不敢一日廢庠序之教可謂識治道循吏可以副學校明制守令重選以非海邦之民之大幸哉仰侯之爲政以崇學爲先而承上以直臨下以簡化通民和而爭訟日應刑罰日省傳曰教者民之寒暑也不可不時事者民之風雨也不可不節􅀂侯之故又可謂節事而時其教者也是宜書侯名彦中字大中嘗以才敏有風操爲江南行御之臺架閣管勾所至皆有休績可紀助成者同僚達魯花赤也先不花同知劉塔失徐晟判官牛世安栗興祖教授黄棟也程工洽使者州史沈嗣昌徐士毅學吏徐志仁學直郭子傑也長興州重修學宫記余客遊呉興涉長城界見新田辟統誦聲相聞入其境夜漁不取䱆篁葦問無嘯聚入郭挈壺氏之職謹孔聖之廟斥而新焉問為政則州長魯忽逺侯之化閱六年而成矣未幾州庶老介吾學徒劉巽來謁學記曰長興吳夫㮣王之城池也昔為縣令陞州學本邑人宋少傅劉公涉所建金虜燹餘自縣東􅀙今太平橋東縣今趙汝譢建義門杏壇藂桂堂張公明増建藏書閣而条之且規始具我朝至治間州長微都魯丁重修禮殿而堂閣門于廢而不立有矣至正五年長魯忽達侯至朔望必眎學宣教修凡繫風紀者與淳師老德譜行之州之士以文學備采擇屋者往往興焉然學之營繕事重民刀未果十年夏六月侯始勸諸好義捐俸金為之倡知州韓公惟德因而和之者州史俞文淵儒之趨事者劉坦吳鼎趙良珪也殿增隆翼屋二中堂從廡及兩厦四齋欞星大成之門庖然新堂隂復創亭曰光霽閱三月告成廢興始末當有未得能名文者而韋遇吾子焉願有以書之余歎三代之衰庠序之教皆苟道也久矣漢為近古其教無聞蜀得文翁立學始變鄒魯之俗東都興北州之學者僅稱常山宓恭耳況其下乎三代而下學校之興廢固基乎循吏之得失也我朝州縣所在有學雖教有官作教之効則守令今非人而欲學校之教行亡矣學校之教居而望風俗之變難矣朝廷以教化責令今以教為治寛假歳年其効始著烏乎吾是以知循吏之効之急于得人也吾於庠序之化又必久于其道而後成也文而下不又有􅁇乎朝家設學之意不為勿負乎民之望于大夫士者不在是乎是可書已侯字得之世家北庭平章保公之適子也嘗遊成均兩膺郷薦􅀁至風采政事皆可稱道者云長洲縣重修學宫記有元天下自京師達郡縣咸建學宫急教以為王化基也今天子文致太平尤以教養人材為大務往往以行藝興而學官益重以長洲由呉縣析也始以驛舍為孔子廟大德六年縣從移驛材搆治所而學始廢矣至元再元之年縣長元童以禮􅂆郡人陸得原新之閱未二十年而殿堂齋廡僅支風雨藩庸破盪往來成溪而况殿墀未墁泮池未俗從祀未有像龕校官未有次舍講室未有文序弟子員未有几憑師生交病非所以嚴學校之規也至正八年某月某日教諭王季倫始至顧瞻嘆曰此非創始之罪校宫因陋之罪也且厲其歳租皆乾没於奸宄之徒非一日積矣迺白于監縣奄都刺使力陳于郡守蕭公黜其奸之充者而租入稍還其舊由是制其出八取廪稍之嬴起廢補缺而長洲之學始於他邑枝同稱完羙而克以財力相其成者則陸氏婿徐君某為首而郡人黄公某次之至正九年某月日起作明年四月某日告成而季倫年勞亦書滿矣扁舟道淞上尋余三泖澤中請書其事予聞孟子論教必先於足食食不足教無􅀁於施長洲地下而水悍歳弑五十萬碩民避其役不啻如猛虎而暇治禮義哉司殷於其縣者懃乎其難矣而况學之人又從而盜焉學政不舉固也予曩在姑胥熱知季倫氏有文有學又有治事才天不廢斯文於長洲而季倫氏以史館修寫勞來為其縣師予親見其施設有方田之據於浮屠者復之欺於佃者􅂂其畝而政之然後汰其不學無行濫於藉者三十餘人而禮其知名之士以率上下焉宜其養􅁉而教有成功也奄刺侯崇師重道蓋不下元童氏而蕭公於士實有擇敬而季倫􅀗其敬且信為獨至一時臣家豪右又樂􅂆相之扵是亦可以知季倫氏之為師儒者呉邑之士來游來歌者尚率聖人之教以副師儒如之望并無忽其前功又􅀅葺子􅀙者無窮也季倫字季倫番陽人故宋職方郎仁􅁢之子孫云至正十年五月十六日記紹興新城記至正十二年秋九月越人築新城明年春三月告成郡髙年余文昌等謁金錢唐次舍以記請且道其事始末曰城本宋南渡蔪蘄王韓世忠之􅀁築闢而廣之周垣凡四十五聖入我朝七八十年馴至圯廢淮夷梗化挻禍于大江之南狼籍州郡如無人之境守封􅆠者始思城郭之所恃而我紹興距築唐即百里近錢既陷越人皇皇焉挈㓜扶老走山浮海以遁不知長林大藪賊之鳥合鳥鈔者尢甚則又犇播來歸户以數計者萬又五千時則浙東肅政府分鎮子越而僉事冩滿呫穆公勞徠吾民者實有以為之􅀝也既而集父老喻之曰城池大役也豈易勞吾民然勞子始而利厥終錢唐大方面賊直扺行垣者以城池之廢也始蘇界常湖賊越門而去者以城池新固也汝民所自聞幸相與懲茍且思經久之圖民始難之公又為條告其貲刀光輟俸金率郡縣吏及郡之民饒於則者不足則以田為之賦粮二十石上出若干緡錢築􅀂干丈尺四十石上數倍之三名五石助貲辨各有差無田者傭工而就食民乃悦來如子􅃪父事量功命司不期月落其成城為趾厚凡四尋為身盡尋有四尺面凡七尺外鍵銅石而又壘辟四尺為埤堄戍有木譙衛有校聨藺石渠荅之具無不整備城為趾門凡五水門者六四門又各為甕城唯趾焉重門以代甕城門皆梁石為洞上各置望樓又􅀝北之蕺山為代虎之亭城既新門亦稍更舊名東五瑞水曰朝京東南稽山今會稽水曰東門西常西喜今曰常禧水曰澄清西北西郭今曰承恩水曰拱辰北曰昌安今曰泰安水曰永定南水曰植利今曰興利役大事重非名文家無以書吾子郡人也幸有以屬比其事于石不唯識廢興歳月且俾越之人萬子孫知有金湯不㧞之固與民社相永永也余惟春秋城内與外者凡二十有九聖人一一書之謹王利重力也而城虎牢之書責鄭有而不守覆棄為冦資則知城築興於要害者固亦春秋之所許也而况於越襟夫海肘長江申禹氏之廵印句踐氏之伯基有固者之雄藩也其得與􅂽城野郭夷而眎之乎吁一方之役小四海之繫大一時之勞蹔萬世之利求也雖然城之掌固也者不易成之守固者尤人易守非直三廵三鼔蚤之戒也忠義為之維道德為之維道德為之基衆心為之憑守固之工也職於是者尚思有以勵已德結人心攄臥薪之忠憤以無忘昔人執􅄷之義以雪吾大國之恥其可也不然守政不修舟人皆敵國也雖有金湯吾為此懼是為計公系出國族通文史嘗為南臺監察折獄辨訟扶􅀣名理嚴嚴有丰采云重修西湖書院記厲人臣之風化者曰忠曰清其推風化於綱常之地者又實繄乎六經之道聖賢以之而立教時王以之而致治嘻斯亦尚矣杭之西湖書院故宋鄂王之第也宋季更國子監入我朝建書院祠三賢三賢者處士林公逋郡守白公居易蘇公軾也岳以精忠死國其大節無異議者處士以潔身獨善合乎道之清蘇白皆􅁖忠鯁有遺愛實禆於風化而無忝於六經之道以祠之不可廢者至正十有六年春浙省丞相金紫達公浙西監憲丑公各捐俸金新之比明年大閱暮兵益衆聚廬益隘軍棲於寺􅀚演於庠序院之新者隨毁乎章光禄張公諗其故長院者白之明日令下驅部伍徒營翼院之缺者􅀘之􅁦者易之弱不支者壮之賢三諸像彰施粉繪六經版籍重加修補句聖黒黝煥焉曄焉視舊觀為有加於乎庠序風化之􅀁出况是院也􅀌臣之精忠三賢之清節關於風化者又細故公惕神㑹而於戎馬之隙振斯文於既往起清風於後來使岳林蘇白四君子之澤與六經之道同於不朽其功於名教豈曰淺哉功既考山長應子尚承功名公命徴余文於雲淞之上勒石以紀歳月且使後之人知光禄公之休武而脩文者􅀋此故予不辭為之書至正二十年四月八日記華亭胥浦義冢記􅁙不得埋曰棄不得其屍曰捐衣以周身棺以周衣槨以周棺土以周槨禮也自夷鬼陀林之教行始有畔中國之禮而忍棄其親者人心之陷溺也久矣吁可憫哉淞之民􅀋不以禮􅁙其親者人謂無丘陵之地則有何之水火亦勢使之然也仲尼觀延陵季子􅁙其子其坎深不至於泉淞之􅁙也獨無坯土可窽乎此華亭夏居尚忠義冢之所以作也得不食之地子胥涇之東周垣一里所為之封域名義冢使藏無地者歸焉什伍曹其子孫氏各樹識表而有異可展享之托又規也地一隅爲精舍俾浮屠者主之以掌其籍焉其有貧不克􅁙者又出資力以助之於乎君之用心亦仁矣文王更􅁙朽骨而天下恩之宋世良賀蘭祥輩收􅄟暴骸而境旱得雨夏君之仁其不有感於天人乎吾聞君之先人清潤處士嘗憫人積喪不足土者捐金粟至于斛緍弗討義冢之舉其又不爲善繼先志者乎余固樂書其事而况居重有請也於是乎書君郡之義門教武公孫字文承直郎鎮江路府判官棄而歸隐益讀書習禮文事又剏立夏黄書院以祔享其外祖橋隐公其好古崇禮􅀋此睦州李侯祠堂記侯諱士龍字士龍姓李氏世客汴之亳州祖某繇世􅀅轉郡守侯生而有膂力身不滿七尺精厲􅂃悍其膊腕􅆠破硬上可用甲指掐行蝨自㓜憙􅊁觝戲長投石投距絶等倫後誦孫武子書志萬人敵淛師帥某聞其人聘致帳前試其􅓡矢􅇊走馬逺垜二百步馬上及臂連五發連五中衆大操以為特竒試犀劒光指牛領限尺寸位數一擊領斷不差分釐又工老君拐法雙股連環百斤鋭力上下舞如本月鋒氣簿人毛髮􅆆立歙寇金鈴氏恃驍武無敵侯禽之復縦以利械又禽之以功自千夫良長陞徽州判官同知睦州兼民兵摠制在職撫農閱兵民仰之如父􅀝之如堅城時淛帥升樞閫于睦養士至數十萬梟􅀅凡十有八部獨稱侯為巨擘曲兵過城樞命侯出關迎送西兵毫革無動金倉氏入冦相埠樞集諸􅀅議侯建上中下䇿樞不用上用其下衆潰􅀅皆擁主遁侯獨乗奔雷馬挾步卒數十人乗丙夜突戰敵不備被傷甚衆又乗鋭取其敵􅀅首縣馬項底出萬人中萬人皆辟易莫與抗渴奔金沙泉取所佩藥視従者云吾報主盡矣勿令敵斫吾顱遂飲藥􅀝馬而視逝時至正丁酉十月四日也年二十有五閱若干曰示夢睦老人曰吾死已作神矣尚能扞菑剟惡以利吾睦人明年春睦人為立祠錦沙墓􅀁請余文為志昔魯御縣賁父􅂮賁職魯君誄而表之侯死職其職烈未上聞司文事者盍有志故吾為志諸祠且係之誄曰於李侯生力士􅀆於李侯死厲鬼􅀆辟吾惡􅀆離吾祉􅀆誄吾以文立忠􅁤􅀆離去聲二陸祠堂記唐人詩稱陸敬輿為華亭人君子論三代以下王佐人物仲舒孔明後即及敬輿足以重地靈扵是邑矣兵未之建白余謁淞學舍釋奠禮以祀者乃有二雋焉問之庶老則曰陸士衡士龍也二陸自昭侯遜來世為華亭谷谷之傍有山曰崑陸氏之先􅁙焉機雲之生時人以玉出崑岡比之因名山山之北又有機雲雨山亦以兄弟得名邑士曹君繼善於山之隂剏屋􅀂干楹祠二陸像其中名二陸祠堂且曰崑之隂其故宅其懐鄉詩有婉孌崑山隂聲如鍾少有異才文章冠卋雲六歳能屬文與機齊名中州之人號曰已雋末節成都王皆遇害嗚呼文章至東京之秀敝矣建安諸子傑然角立而士衡兄弟乃得以名文蓋也中州之人見之如景星慶雲誠可謂一時之雋矣獨惜其急於㓛名至末還昌蹶豈非文章擅名者得名者夫間氣之􅀁鍾而去就弗是者皆未知聖賢之學歟至今士之入吳者咸仰二髙之遺風而未嘗不悼華亭夜鶴不清淚之悲也堂以祠之盖邑人不忘其郷故而祭之以社之義以為人物之凖君子之論缺如也然崑秀傑之氣代未嘗絶華亭秀傑之士亦代未嘗无即余之論以其未得夫間氣之鍾者益自勉以其未得夫聖賢之學者益自儆豈非曹氏建堂之意乎名世者作果符吾言吾於士人夫敬輿之祀之嘆殆亦免矣夫魚浦新橋記至正十三年秋八月蕭山縣魚浦新橋成浦耆老許呉來謁予錢唐曰浦之西北距淛江東南明越扺台婺商旅提攜樵蘇負荷者此乎道焉晨出莫返奔渡拏舟不無蹴蹴蹋覆溺之患縣主簿趙君某領帥檄來鎮于兹兵事既飭大協民望爰集耆老而告曰是浦為民涉之病盍易舟而梁乎浦民咸響應無忤詞橋不三月而底于成長凡五百尺洞十有五洞楹十有六隄其兩旁棧板欄翼亘其長吁昔無而今有刱實功之難也橋岀没于潮汐之險又難先是紅冦陷枕君方莅政浦之西南依山徼羣惡少乗隙虐民民相挻解散盡君按捕之一境賴以安今橋成又免民於險阻即向者弭盜安民之心復推其効於是橋也愿子誌以文且為趙君頒余曰出事於昔人之所難而得於今日之􅀁易非誦之不可以橋於昔也惠而知為政者尠也􅀂趙君之不可難於是橋謂惠而知為政者非歟鄭子産春秋惠人也至捐一車則人皆以為笑彼溱洧之可涉民猶病之况是浦之難奚啻十倍長吏以民者可以不知為政乎西門豹鑿十二渠渠各有橋至漢長吏以橋絶馳道相比不便欲合三梁為一橋鄴父老確弗從以為西門君法式不可更長吏終􅃪之惠政之及人者至今照耀吏冊程子曰一命之士苟存心於利物於人必有所濟趙君之存心得之矣浦民歌誦當不减鄭輿人之頌君之法式當與鄴父老同一􅃀守非百世之利也哉浦父老復以橋名謂於是顔其橋為惠政吁君之惠政不惟是也君名誠字君實世家于渤云銘曰江水湯湯界浦之􅆠涉浦作渡民病于杭趙君為政惠而有方誰謂浦廣不可以梁惟彼梁也西門之光也德之長也民之不能忘也維子文集􅃃之十二

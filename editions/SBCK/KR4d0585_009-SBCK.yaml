front:
  text: 東維子文集卷之九
  hash: sha256:36c105c3e097e30800e34ccc0ecbedbc0112b94ca2b0d40b7825129c5c498b67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_009-1a}
body:
  text: 㑹稽鐵厓楊維楨廉夫著序送周處士還山序余讀魯荘公之春秋未嘗不義曹劌之為人也􅲣非魯之在位大夫也又非魯之疇人鉅室也公􅀅與齊戰在位者亡言而劌出見公開説戰論劌豈懐利以要君盜名以奸世乎魯為齊弱誠不忍其君􅀅或北而其宗社之或傎也噫使魯在位君子皆如劌之􅁨為其君深謀而逺計魯有不霸乎長勺勝齊之後劌遂為大夫矣君子賀魯之有劌又賀劌之言効於魯非要君以奸世者也南州處士周靖氏當紅賊陷呉興上戰守之策於統兵主將將歸其言而未用参相楊公舉其人以為可以置之樞機之地薦章數上處士又拂衣而去夫處士豈有要於君奸於時者耶参相之力舉處士也亦豈有私於處士耶􅀅用劌於長勺之後也處壬不受薦辟至拂衣去則有信其非盜名懷利也諗也處士道過杭北門出所陳策見子子喜其言已達於時之君子也言之利不利不在已而卒返諸故山處士􅀅不得班於曹子乎一命之榮不足為處士賀子將賀其言有效於時之君子曹子之效於魯也於是乎書送鄭處士序朝廷選用文武吏於大小無位無以稱選則下詔丘園慮有慠世而去者求之如弗及獅山處士鄭子美氏隱居山中四十年言者聞朝廷用用起之中使詣門勸駕者至再而處士起就道所與游者自吳詢而下􅀂干人咸為歌詩以送之又屬㑹稽楊某為之敘某辭不􅀗則􅀅有詰於鄭子者嘻今之舉􅇣人非太平文典已國家夫太平五六年吏日不遑支民日不聊生也始急俊傑於在位之外鄭子挾何術往嘻淮之右江之左㓂之挻禍者不狹矣子䏻帶劍挺鈹出入戎馬轉鬪數千里使兵不知疲而敵不知禦乎曰未能也㓂無臣主阻山負海各據要害以稱􅀌長子能單􅀐其所談笑而道之使即投戈倒幟復為良黔首乎曰未能也哀哀生齒潞死鋒鏑復死征歛子能吊死存疾徠流亡安反側使復有更生之地乎曰未能也未能子與今在位吏畢爲廢物縣官責名􅀅不利處士鄭子栗然起曰贈吾言者盡頌未有如先生稱詞之危也幸先生有以教我於是舉酒申之以祝詞詞曰安危成敗料如蓍功過賞罸信名時主弗貳臣臣弗欺離以獨照驥不匹馳小人退􅀆君子以大來卟填九鼎豎四離狂流横漬􅀆仍東之持國是􅀆臣􅀁職叫知臣不職􅀆神􅃪之詞畢鄭子再拜酌酒酧軷而行曰􅀁不知規者有如軷送王􅄉易客南湖序軍興仕者弗由中出多由外便宐版授版授者不時禄食則陽陽而去矣其人也進無禄仕退又或失其生産生事眄眄焉不􅀗置其身於有所雖賤夫賈販富人相幹屑為又甚牙校櫂貴之貴依憑根穴以持郡縣短長武斷脇制而後可以格一身及一家之養吁此士下下之為也去盜寕幾哉髙等者無禄則歸畝爾畮無以歸卧山蹈海為魯連子為夷齊子爾有甚本􅀗巳挾技為門下客而技亦傳者之技也不然去賈幹而下又幾哉東州王子熙易有任才而無所於仕為貧而起則􅀅有版授之者又以虛役無􅅒食之及則去而挾其技為宛陵南湖之客南湖蓋今禮部貢公之所家也南湖給告歸休業又上覲王子之行出其招而往也顧未知王子執所技往何出王子曰噫吾技父師教吾以聖賢之技也􅀅使貢公相天子不欲食於農不資兵於盜不以物佔楮價於天下之民而已矣舍此求吾去賈幹而下者無幾吾為魯連子而已耳夷齊子而巳耳余偉其言與其執技遂敘以別且為告南湖曰南湖不舉客則已舉客當自王子始太師印譜序予嘗悼字有六書故戴侗而四目之文始鑿矣幸不鑿者存頡之十五篇字凡百四十為􅂐籀本又不幸為分韻所鑿字有剏入者矣如鎊鏟鋫鋸竈入鍾鼎泀􅟘溮䭀又續入圖經隐訣諸書四日氏之法至此誠一厄矣齊郡太史子􅀇氏傳古如子産識字如子雲嘗續注爰歴埤雅是編則漢魏晋唐官私印文也摹印在八體之一則是編去古為近然吾觀漢文多簡古雖􅂐亦與隸等無枝脚之蔓及􅀚唐文宋文皆有衍出於繆者豈漢之文去古尚近而唐宋去之日逺田繆耶抑漢士識字者多而唐宋識字者少耶吾於子􅀇問之子􅀇曰馬援武材也上書言伏波印文之説下大司空正郡國印章則先生云漢􅀓識字者多信矣雖然有呉延陵君子之墓孔子之書僅六而巳而四文剙入蓋又漢人益以方􅂐之體假聖文以欺後人耳予於漢人不􅀎無憾而於唐宋又何貴焉遂録以為太史印譜序􅒾山序東昜有􅃽君子者家在東晝水􅒾峴山之間家之西又闢地理泉石華竹曰沱曰谷曰屏曰洞曰亭壇臺圃其凡十有四􅀁總而命之曰􅒾山別墅君時時輿太夫人者燕游其中或與東閣西里仕而歸者飲酒賦詩以樂其樂也其􅄃物為詩凡􅀂干首自金華先生而次和其詩者又凡􅀂干首好事者遂圖其墅衰其詩而求一言於會稽楊子楊子曰嘻嘗品人地於西山吾有其論􅒾山有薇食周餓夫而餓夫之時立獨行師表百代者實無負於􅒾山周以降山出爽氣以納乎韻人之抱世以王馬曹拄頰當之然馬曹者不得為餓夫之清而徒清於譚焉亦事不料理髙視􅒾山曽無裨於典午氏宋社之廢西山負馬曹馬曹負􅒾山耶􅃽君子者有仕才而不仕蓋幸生承平之世與餓隐時異不敢詭髙於食薇顧行其素於西山耕穀璽絲足以養吾之身華草月露足以養吾之心職於孝者以事親職於義者以奉賓視􅒾山之為晴為雨為霏為爽皆吾之四時朝暮披吾聲歌者一草一木咸有德色是又君子之素不心强同於拄頰者之云嘻持吾論以品人地以􅒾山若􅃽君子者􅒾山何負於君子君子何負於􅒾山乎予未識君子繇金華先生識之未游其墅繇先生之詩若游之於是乎敘送如一翁歸曲江草堂序曲江錢如一翁自冠年工五字詩及七言大章嘗以詩經義領鄉薦而不償于禄仕人咸稱其詩詩以杜其平生艱窶窘阨亦近似之草堂錢塘即曲江也如一應辟藩閫者二十餘年仰給升斗孔子廟草堂亦荒矣少陵避亂于鄜轉秦州流落劍南蜀亂逃梓州再歸成都而草堂在浣花里者屢破矣其破也有三録事王司馬輩為之脩起至宋吕相鎮成都又為作草堂故址繪先生象於中翁數嘗冦亂今亂定獲歸錢唐苐未知草堂不為風雨􅀁破則為戎馬所躒躝果無恙不吾聞今浙垣大一辨章朱公方偃武事延致舊德碩儒爼豆於雅歌壺矢間太平有象於此乎見車􅀐虚左或過翁草堂問風雨無恙即有恙不有脩起於録事司馬者其不為弱重搆如成都吕相乎果爾相國之尊賢為不誣矣吾於如一之行卜之風月福人序白樂天晚年歸休洛中娯老者琴歌酒賦有鄧同韋楚元劉為唱和友蠻素容滿為樂酒具又有晋公為雅道主􅄖游庶境十有餘年身不陷甘露禍轍自謂福人然其詩有病與樂天相伴在春隨樊子一時歸則其懐抱猶有惡者吾未七十休官在九峰三泖閒殆且二十年􅄖游光景過於樂天有李五峯張句曲周易痴錢思復為唱和友桃葉栁枝瓊花翠羽為歌歈􅇊第池臺花月主者乏晋公耳然東諸侯如李越州張呉興韓松江鍾海鹽聲伎髙讌余未嘗不居其右席則池臺主者未嘗之也風日好時駕春水宅先生舫名赴呉越間好事者招致效昔人水仙舫故事蕩漾湖光烏翠望之者嘑銕龍仙伯顧未知香山老人有此無也客有小海生賀余為江山風月福人且貌余老像以八字字之又賦詩其上曰一十四考中書令二百六字太師衘伯顔太二句本師此句先注也不如八字神仙福風月湖山一擔擔天年直至九十九先生祖楊佛子享四世年九十九好景長如三月三先生嘗自言遇病遇喪亂不喪􅁨不憂遇病不是春也故自號禧春道人名其所居乱胷中四時長窩日春不老有嬉春小樂章一百篇小素小蠻休比似桃根桃葉尚宜男先生八十精力不衰璚翠尚有弄瓦弄璋之喜余和之云紅兠羅巾白􅷓衫金鑾致仕得頭銜家無檏滿誰從破世有鐵枷人自擔黄白未嘗􅀓八八陶八􅀓丹與顔真卿龍蛇奚用辨三三人間黄閣在平地付與西京委一男全不為有才力儉韻所縛先生嘗曰者韻愈險句愈竒也送朱生芾蒲溪授徒序余讀漆園􅅱論士有六好六好繫於巳亦係於時余丁時變且老矣無能為矣不䏻擬於朝廷士尊至強國者則亦願脩仁義為乎世教誨者之歸若刻意尚行髙論怨誹為亢如鮑焦介推由屠狄之仇決佛為巳吾門朱生芾與余固羅喪亂而得安於所好者負書劒來別曰某得七寳翟氏為西席主庶幾以學于先生者施于人敢求一言以為别吁芾以仁義為脩處亂世而得為平世之士遂其願於吾願之未能者非吾道之幸歟芾往哉益慎厥脩無効苟論陷厥亢送韓諤還㑹稽序安陽韓氏自宋魏公至今凡十世散處北南者代有賢子孫如諤者其一也諤不時以世家稱於人尤以好古博雅稱以清脩敏學稱其燕處之室曰讀易齋云入其室者不問可知其為文獻故家子姓也廼隐居西湖之上與伯雨張公為師友學益進行益脩重為之喜而畏焉雖視鄉之出而仕者離親戚棄墳墓􅀅以榮身及家也不知他變日可畏名一桂牒書者如桂臯籍錮而禁可也放而竄可也斧質而孥而族可也思一返其故郷非其君哀其老而􅉵􅉵而瀕於死乞與仕告則法亡得而去也今君道尊於身心泰於世進退自如駕一葉丹絶江如東也歸拜其鄉之父兄師友塗迎問候􅀗見風采者如見神仙吁其得個而秉之乎放而逐之乎斧質而孥而族而僇之乎於其歸也其不愯而慕之乎抑吾聞鄉之黎老人民非者巳過半而城郭亦非其舊矣君於風露之夕馭鶴於小蓬閣上賦海嶠之詩得無有同聲而􅀿過城頭話甲子詔時人以學仙而去者為我志之書者為何人夢道士而飛鳴者又為何人老鄉客楊某在由拳之􅀉􅀉巢書贈櫛工王輔序嘉定王輔世業七子技輔自幼機警聦記强識能誦余古歌行百十首介其鄉閬翁先生拜余草􅀇閣下自陳曰輔承周左轄公贈以櫛耕二大字入遂以櫛耕道人呼輔敢乞大人先作一言以􅀤之先生􅀏曰子以鑷代耒豈果知耕者乎雖然世以不耕為耕者多矣漁以鈞耕賈以籌耕工以斧耕醫以鍼砭耕卜以蓍蔡耕兵者以弓刀耕胥者以聿櫝耕伶者以絲莞耕游説者以頰舌耕浮屠氏以􅆊唄耕老子氏以步虚耕神仙方士以丹田耕高至於公卿大吏以禮樂文法耕耕雖不一其為不耕之耕則一也豈止輔之櫛也哉然余有詰扵輔曰爾櫛之耕耕於田􅅱野嫗而已耳亦嘗耕於薦紳苐一流人乎輔曰輔蟣蝨漢序鳥知苐一流人乎萬一大人指教之余曰代有中秉鈞軸外􅄃英俊納天下於太平之域者髪嘗一沐而三握之子以吾言往拜其履進爾櫛以握其所三握者為余祝曰中國有聖相越裳氏之雉其來矣輔再拜領言去陶氏菊􅇣序毗陵陶氏前朝文獻家也在宣和間有為翰林檢閲者某扈駕南渡其五世孫為澹圃君某仕常郡教授因家毗陵國初以宋遺老徴不起家延顧師竹山􅃽公教子弟時石田馬中丞公實􅀙學其家與其孫靖為同窗友馬在南端薦授之靖無任宦志乃法陶朱治生彦饒於資禮賢養客無􅀁爱悋親故有急者賙之死者棺槨之卿稱義士至是四世同居一家千有餘指孝反雍睦人無間言兵興毗陵陷其子澤與兄和者奉母孝徙居呉下知隐迹於燒墨澤亦托菊自號曰􅇣民司徒隴西公聞澤才行固起為参佐不􅀗已應命未幾辭以歸更折節下帷讀祖父書家無甔儲晏如也今東遊海上尋菊泉於谷洲訪余老圃更生及傳延年者酌酒賦詩為樂別去索語以贈為敘名節而又為賦詩菊􅇣之歌歌曰菊之澹􅀆北門之秋菊之靖􅀆栗里之丘菊之􅇣􅀆審夫去留老余圃􅀆海之陬飲菊泉􅀆谷之洲徴斯人􅀆吾誰與儔淮海處士夀冢募資序吾聞古不預撫墓後世有預撫者稱為達生􅀂夫作長室以燕客其中者范子敬也作夀蔵以圖前哲與之相主賓者趙臺鄉也是則預撫墓為幽宅計者非達生之士能爾乎然有達生而欲效范趙之為者力無及焉吾恐未先相率為囊引鍤埋之流也淮海處士錢子材先生以先隂為百代之過客齒且老矣而不以死為諱欲買不食之地豫營夀蔵非取資人不可也昔趙秋資人之不能藂者􅀗地日餅金貴富之報處士受施於垤土之思他日豈無結草之報乎吾貧無以贈故贈此以為仁人義士之告庶相與資之以成其達云葉山人省親序客有談金華葉山人之為差者音沱曰山人方士也善公孫娘舞器又曰山人方士也工鴻寳枕中又曰山人從衡士也少年嘗挾莢北走燕南走粤東西呉蜀也又曰山人義浹士也張呉氏以偽爵屢要之屡不應惠粟帛及門轉以散民之操乞瓢者有弟為兵􅀁殺又掠其子山人伏幼要於途而還之此客之議其差不得名其爲人也一日服道來謁東維先生於草􅀇閣次自陳某㓜從許先生門人遊長又􅀗登侍讀黄先生門遭時喪亂家窶慈母逝嚴親且老出山謀禄養而禄不可苟奸今五十其齒矣􅀅歸故山無以見其親奈何奈何幸先生賜一言爲某終身教予怪其人生訐黄之鄉承師友講習之素不爲無學者顧乃從焉無歸如弱喪者吁亡羊者多岐亡術者多學宜子之書劒弗成吏隐兩廢而徒取差者之議也吁壮士者傷秋孝子者愛日傷秋已往愛日方來之其亟歸庭前風木當有曽子之所侍者堂上菽水獨無子路之爲懽者乎子其亟歸勿復孟浪蹈差人之議也子居與金華爲隣邑異日聞烏傷山中有葉孝廉名應天庭之聘移孝作忠為大明名臣吾有望於山人山人以吾言勉之送琴生李希敏序先生作樂必有以動物而後有以協治也其本在合天下之情情合合而隂陽之和應隂陽之和應天下其有不治乎有虞氏之鼓琴之南風為之解愠而阜則師曠氏之作清角也􅀇鶴為之長鳴而迅舞聲之動物㨗矣至下鴻漸杜氏之奏羯鼓也猿鳥犬羊亦為之躑躅如其疾徐之節則其聦靈以為人而有聞樂不動者乎不然則其聲之感人者未至也余來吳中始􅀗􅃪泗水楊氏伯振之琴扵無言僧舍余為之三嘆不足至於手舞足蹈歸而求之尚覺余人之流通也吁亦至矣哉以予之有感於一日之琴者如此則知先主協治之音動扵物之捷也不誣矣後之以琴過我者然慮百數而未見有楊氏之至也晚得李氏希敏氏庶㡬其近之生自喜其工之至有􅀗予賞識也持􅃃來求言遂為書先生協洽之盛者語之抑聞先生之教琴必配琴以和隂陽也禮稱君子無故不徹琴瑟詩曰如鼔瑟琴又曰琴瑟在御知古之琴未嘗獨御也蓋琴統陽瑟統隂伯牙氏聲琴而株瓠巴山鼔琴而魚出􅃪魚隂物馬陽物也隂陽各從其􅀋應琴瑟毗而後隂陽和陽不可獨而無佐也今之士以琴自命考多而未有以瑟鳴者吾􅀅與子求海上師以學為庶不畔詩禮教而先生協洽之音其或可以見也歟送墨生沈裕序墨􅀇造之以色也蔵於晦而暴於乆者莫尚於􅀇而墨􅀇之用也然藝于是者有工拙焉二者􅀇之用也愈乆而愈通拙者反是此墨之藝有絶稱於世也其犀利可削本其清勁可入水火而不化天下傳為寳而賞鍳者隔物手之而可以知其為天下之精絶也吁藝于墨者其可以妄庸之工得之乎三衢沈生裕自其大父東臯子代為墨以絶藝繼古聞人之稱故俗􅀁傳若有心法之祕者非人之所䏻識也季氏父子墨近来為貴至乆而後黄金可得李氏父子墨不可得東臯之墨已不可得而欲所博欲以目前賤之也豈爲知墨者哉裕以所製蒼壁贈我且乞一言以發之故爲道其傳之逺二之絶者使人知裕不可以目前賤之其遊京師也且俾持余說見於同郷黄集賢同年趙禮部則沈氏之墨不俟乆而貴也必矣至正八年春二月序贈筆史陸穎貴序韓子爲筆作穎􅀓頴莫貴中山之毫漢制天子筆皆用兔􅀩恬以鹿毛爲柱羊毛爲被歐易通以狸毛爲主覆以兎毫則知穎穎獨貴於兔也宣刑諸葛氏􅀓筆有二等髙貴者栁公權求而與之又語其子以學士能書當留此筆不爾清退還未幾果退還即以常筆與之蓋髙貴者非右軍不䏻用也石晋時有竒士夜􅅞佳筆曉出闔户以竹筒衘壁外人置錢其中佳筆躍出筆其筆床曰穎擅名于館閣諸公者久矣至其孫遂以穎貴名焉常以豐狐之毫或麝毛須製以遺我且曰已銕史錢心穎也予用之勁而有力圓而善仕使舍其製而用它工則不可書矣故銕心之頴人罕得之而人亦不䏻用也其以頴自貴何以異於唐諸葛首竒士哉予舍其穎之可貴而又能自貴不以䡖信於人也故為序以贈使世之大手筆知其自負所貴非吾溢美之也至正甲辰夏五月朔序東維子文集卷之九

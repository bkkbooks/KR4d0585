body:
  text: 維楨廉夫著楨廉夫著序送鄒生奕㑹試京師序漢儒明􅀴貴不倍其師説能不倍其師説者工召用之髙下其材為博士郎大夫部刺史馴至九卿丞相御史者不少也吾是以知漢士之近古也其為術也有師宗其為行也有操尚未始以經術自進為售利禄之具也去古日逺則下之干進者以經術而上亦以是設科而取之然今日得之明日棄之矣視前日之所業者不啻象龍芻狗物也尚欲責其不倍師説於終身而不棄者可得乎呉郡鄒奕􅀪道其大父為士表吾之友也士表樂善好客教子孫尤切切不重千金費逺延碩師居其家此夹所以經之明而材之達也今年秋江浙鄉試以詩經充赴有司者凡七百人中式者僅十人而已而奕又為其魁蓋其得於祖父師之講明有素者可知巳􅀅如京師以余為大父執行也拜而乞言故余為陳漢士之近古者望之况今天子既復科以取士又且掄選經術之老者侍講筵進士之有經術者固􅀅以次召用如漢之九卿丞相御史者不難也奕之得於祖父師之講明其可一日而忘去乎奕勉之大父不及見矣異時果於無負所學也豈惟慰望於其師實慰汝祖於地下也至正丁亥冬十一月初吉序送强彦栗逰京師序孔子曰士而懷居不足以為士知古人君子未嘗不逰也而世之遊者漫矣志無以自信貿貿焉行四方以萬一乎詭其所遇取􅄹而以復菑其身以累其人往是也􅀂乃君子之遊延陵君子之不幸生於東徼也志不有其國而獨志於上國之遊以厯見夫華産之人物先帝華之遺風善政以廣其耳目之陋意氣之隘約而友之於中有合不合斯逰之不可巳也嘉定强彦栗生於延陵君子之鄉曩嘗勇不自禁出呉關厯毗陵句曲折而上金陵遂絶大江而北涉洙泗以翺翔乎闕里過􅃰野以蹈厲燕趙之俗而遂達乎京師以􅀚天子之先京師窮貴人有竒其才挽置於􅀫衛而彦栗徑決去不蹔留是其志不在區區利達而所存者大矣今有不憚􅁆千里行役如曩時過呉門别余曰余行李如京不䏻與子乆處已余壮其逰不難而其志又不茍也知其逰似昔君子上􅀦之逰而非代之漫焉而詭其所遇者􅀋也他日歸復見子呉門􅃪子之言議覘子之心胸有以驚異子者而後知子之逰不可以已者如是顧吾在呉栖其困滯如退羽之鴻不䏻以只尺奮飛扵子之行也其不投祛而起乎謝生君舉北上序上饒謝生鈞從余逰者十年通春秋五傳學其才日茂不已自㓜博行孝睦人無間言往嘗以行藝書于黨正連試有司弗售不一咎有司而咎其學未至也益進脩弗勌今年秋來別余曰鈞辱先生教而未有仕路以行先生學也辱在泥塗鈞恥之先生恥之幸吾鄉應奉張公有以挾鈞京國之行謹造請先生幸先生賜一言以警鈞余爲之喟然曰才􅁦於無先行衰於寡黨此古今之士之通患也士負才行有不幸老死于三家之村牛室之邑者不尠矣往往思借交青雲之士幸而奮焉尺長斗滿皆得以神所有而况於才之茂行之卓者乎生往哉吾聞張公大相府之賓卿也相府以好賢聞天下張公以薦言相府生患才之不懋行之不卓耳不患無其先與其黨者矣吾見張公之不以嫌而避賢也吾見生之賢不以次而進也傳曰大夫􅀅昌以其得士張公以之又曰庶人􅀅昌以其􅀅子謝氏父以之又曰線因鍼入不因鍼急女因媒成不因媒貞生以之送吳子照逰閩序雲間呉生照􅀅逰閩以四明􅆇彦誠之書來乞序其行其言生年少負邁往之氣加以博學好古慕先生之竒文章如慕太史公蓋􅀅厯覧形勝結交豪傑于以開豁其心胸發舒其意氣或者有􅀁資以成其才也乞先生一言申其志余謂古百越地在禹貢揚州之域物之貢聞天下而人才之出未多見豈山川磅礴之氣未發泄歟抑王者德化之所未覃也漢以來封疆之郡縣之覃以詩書禮樂之澤然後人才輩出與中州文章道義之士等至我朝涵養外徼如拆内士之擢髙科躋膴仕者磊磊相望官於其地者弗以冐嶮巇犯瘴癘為難其山川足以豁心目人才足以取生有師之往也登覧或遇隐君竒士有相識者或未識而已相知者詢及於余即啓行橐出於鐵笛傳及史􅃏絶辦凡若干言必有以竒我者竒生矣他日歸呉尚有以徵張先生南歸序淛士多無恒經治亦往往不顓有一年輒史或半年􅂊更而竊中科以故士之經愈不顓且又視􅀴師之利不利為嚮坫意學經􅀅巳明道也豈計利不利哉以科利而學經則科一利而􅀴復棄矣終亦必亡而巳矣嘉木張生汝霖獨於經治有專習曩余在錢唐時首以父命来受春秋五傳學更鄉舉者三而藝未競生不以咎有司而咎經術之未至益恒若力所習經有加無已坐誦行思恒若無誨者故又負笈不遠水陸尋余九山之澤以終其業焉非其學經忘於明道而不計科之利不利者歟吾義其不畔吾門又竒其性之有恒而志之必有成也嘉禾之野其得遺其人也哉吁春秋主斷之書志成者及之也明其道不計其功者又春秋之教也若生之志蓋已得春秋之斷而其道已得春秋之教矣他日推之任也天下之治孰禦焉彼習經以利科科一利而經復棄終亦必亡而巳者又何議為送韓奕逰呉興序同里生韓奕從余受詩春秋學行日脩才日茂其爲文如雲興鳥仚未見其止也今年從予吕氏塾輒思汗漫爲神京逰余止之復有請曰奕從先生學幸知經史行墨然聞先生竒氣多彂於東西洞庭大小二雷七十二弁之峰今􅀅訪先生舊遊魚龍虎豹風煙林壑之竒遇以擴所見而終所業焉幸先生賜一言以警教奕也余嘉其志曰人之學猶海也水􅆓河溯以弗至于海不止海集衆流而后爲百谷王也學其可以小自滿哉洞庭之西有􅃽氏義門劉范世家在焉巽毅鳳麟皆從余游者也皆好學不勌而知學之不可以小滿也又嘗不逺數百里尋余泖之鄉而卒業焉奕往哉與之洞庭上讀書然後繇洞庭而浮大江度浂河上北嶽以盡天下之大觀吐而為書以獻萬言于明天子也蓋發軔乎此行已奕勉哉至正十年三月三日序送齊易岩序太極理也一隂一陽生焉教之所出也尸物如天地而不能􅏉乎十二萬九千六百之紀而况於萬物乎周與秦合不能􅏉乎五百一十六之數伯而土乂不逃乎十七之記而况於一身乎聖人作易前數之用於蓍􅀛神矣然未聞一語一畫為之兆也兆於一語一晝之徴而㨗乎蓍􅀛之蓍數之用益神矣此先天之學在専為梓慎鄭為禆竈齊為國甘公漠為睦京晋為管郭唐為􅀽棄宋為邵子元為傳氏初菴菴之宗為齊氏易岩也易岩之言曰初菴之􅀓得之建昌廖學海學海得之於蜀杜可大可大得之於王天悦天悦實受之邵子也天悦之學幾絶􅁙其書玉枕中蜀㓂發塚出祕書可大賄盜之人不能傳而學海以直言得罪配軍籍漢陽道遇可大可大已知其姓名曰吾數當傳子為借見郡􅀅出軍籍館詣道宫為弟子國初有問于世皇世皇􅀅召之學海業已語其女曰我􅀂干日死死􅀂千日朝廷命來我巳死且索我書我書當􅀓者傳氏立名人也其人在某所某自來異日官極品汝賴之官且賜田若干頃矣已而果然初菴之没三年而易岩始生初菴垂死謂其徒曰汝曹口耳之學徒得吾膚淑吾書而得吾髓者其齊氏某乎易岩生四歳知讀易長於河洛七緯太乙九宫之數及星算髙占嘯風鞭霆之術罔不洞究故扵初菴之學峻躋峯極非一持儔輩可幾也予嘗異天人之學父子不相授也其授於人者亦有數焉則其􅀚於物者可知已易岩之觀天者吾不識之其􅀚物者吾見其於一語一畫得知者衆矣雖然予於易岩有間矣道之難傳甚於數也堯以是傳之舜者舜以是傳之禹禹以是􅀓之湯湯以是􅀓之文武周公而及於孔子孟軻孟軻死不得其􅀓焉嘻道之傳者其亦有數乎無數乎軻之後其可無􅀓已乎易岩曰道之傳天也亦人也是隂陽太極之説也易岩去余而之京師也請書以為序送何生序何生伯翰氏其先西夏人也祖息簡禮嘗録僧事于杭因家焉父益憐質班早喪翰生五歳依舅氏舅氏因以母姓姓之母素賢通文史既寡以節自擔教翰有法日出就外傅夜歸課其業年十六歳受經於予通春秋五傳毛氏詩尤長於易遭時喪亂士以弓力之習易􅉢槧翰獨負郭闢圃奉菽水于母暇則退處小室理故書收緝予平生遺落文草遂補往呉復所編予古樂府集行于時人稱其學談識廣復不能過之今年夏文闓復開翰就試先三月靈鵲巢其書舍木見其扶梁啟離户占者知其為中雋之兆而不知其學有素也􅀅會試春官同門友為賦詩供張西門之外求予為叙遂為書其世出行藝之㮣于卷首云送李志學還呉序太尉府僚友官以百數惟右轄李公推魯少文可以屬大事􅂙左右轄官者亦以百數惟軍諮李君雍容諷議可以贊大㓛故占東諸侯之後事者亦不於其兵强弱馬壮敝而以其􅂙諮幙府者得人與不得人也今之􅀁謂閭里豪乗時而奮􅀋鴆於安鄙於肉食嗚呼菜傭而欲􅀝之以集事亦誤乎必其雄才卓識負王伯畧可以登公輔之器者然後可與成大事立大功􅀂今李君者殆其人矣乎吾聞河間多禮法士而李君者殆其人矣乎吾聞河間多禮法士而李君者夙抱其節承教詔於賢母如嚴師傅當我馬猾夏時節即慨然有平河洛志而況太尉府得知已乎雖然􅒾虞之㧞冗以進􅀅以伺吾舋也未足爲吾􅁨忽又無故而退無以乗吾問也未足爲吾喜君歸太尉府太尉問君􅒾虚實状吾攻守利害何如君必有以對對必有御戎要略爲太尉規者慎勿爲閭里豪鴆而鄙者談也至正乙亥夏六月壬申序送劉生入閩序古公卿等絶卑賤其與圖事必有取於卑賤之士士之竒特鯁正亦願畣之以􅀁有上下至於交相得而後事可圖已漢叔孫通有雨往不能耿項籍有韓生齊王信有蒯生不能用鮑生爲蕭何取陸賈爲陳平取王生爲釋之取呉公之取賈生田延年之取尹翁歸暴勝之之取雋不疑之六君子負守􅀅之尊執臣之貴而未嘗挾以自尊貴必有取於大人者以其竒特鯁正可與圖事者也今公卿不取士乆矣吾始於貢公見之公以户部尚書入閩天子益以理財贍兵者責焉四方士待公行者幾何人而錢唐劉生獨以過人之才及其骨鯁風裁為公所知公取生惟恐失之生亦愿荅以其􅀁有惟恐不逮吾見貢公之出遐方王事確乎其有成算恢乎其有成功也已夫召陸諸生不失其所失而六君子之道益先生思畣於貢公而益光於貢公者其不得自行召陸諸生子哉生嘗以茂才被肅政使丑的公之薦授校官不就今樂知於責公而起也其以畣知已較然不自欺也諗矣杭人􅀎詩者歌之君信其人序之生名中字庸道世山東人送王公入呉序王者人才得於郷三物之所取是也戰國人才得於客四稁之所養是也兩漢人才得於薦公卿之相推轂是也唐人才得於科壞牒以自試是也士之興至於唐宋之科其去王道也遠矣今取士不免於科軍興來科亦廢不幸又不得於薦則得於客耳三呉之㑹爲今淮呉府也客之所聚者㡬七千人吾求客於戰國得孔伋焉孟軻焉荀况魯連焉毛遂馮驩焉牛畜苟忻徐越焉而秦儀輩妾婦爾不足以客進也淮也呉之客七千異於妾婦者幾人有所謂越乎忻乎畜乎驩乎遂乎速况乎連况不可况軻乎伋乎哉或曰淮呉有王明氏者澄不清撓不㻿有俞賢氏者言倫行中構有用仁氏者廉範乎靡俗治幾乎循吏有陳敬氏者納言骨鯁風裁古也有姜儀氏者人倫􅆇否冰鍳美也淮吳之客何劣於戰國哉縉雲王生時以儒科廢於古文學有年􅀅挾之以入呉別予於杭湖上求一言以行予方疑論淮呉之客而生又􅀅客焉往哉吾􅀅卜淮呉之客於生也諗有五人者五人引其􅀋以進生不爲今遂驩其爲畜忻越矣苟妾婦也其歸矣哉呉氏歸本序錢唐吳觀善字思賢自杭之淞謁東維先生曰善之外髙祖徐防禦氏在宋爲小兒醫贅壻曰范防禦氏范無子又贅宋四門教授呉氏子從明字公亮承其家而嗣其業南渡後自汴徙家杭之東青門從明生德誠提領平江醫學德誠生仁榮杭州路醫學録仁榮生四子長即觀善也善通經史學不顓工岐黄氏之書嘗讀文正范公傳公㓜隨母適朱而未嘗一日敢忘其本生卒復范姓君子反本之道也善隨外甥氏宗于范今􅀅反本於吳禮也巳作堂先廬之東名以歸本丐先生大手筆一志庶呉氏子姓有以知水木本源之義也吾悼􅁗法子壯則出贅世襲以為風父道不正遂不子其子而子其壻致宗祀不明氏族亡辨有司詔民者又不以釐而正之至使一門沓著户籍其壊倫紀也甚矣善䏻反本於徐范二宗之外而亟歸正於呉非讀書達禮篤正之思子䏻至是虖三此銕史筆之故吾樂與之文使代之不肖子姓蹈秦風之痼􅁦者有所儆也夫送于師尹游京序士有學周孔之藝者不幸不荐于有司而其志不甘與齊氏共畊稼則思自致于京師不幸其藝又不偶始不免資小道于王矦以冀萬一之遇者十恒八九􅀂星風之古支千之步色鑑骨摩以及􅮊巫妖祝驅丁没甲丹沙黄白水火之術凡可以射人隐簧人惑一詭所遇者無不屑為焉而其近儒道為貴官徼卿心敬而身禮者則無出於岐黄氏之伎也蓋歧黄氏之伎司人死生命而百家衆伎之莫䏻尚也高自奬妄道者且曰上醫醫國吾嘗在京師視歧黄氏之流封閟笈中藏雍侍女從百金馬王侯庭中或出入禁掖無所顧忌小則要金千賚大則要暴位顯要不以一旦疎賤為嫌也嘻􅀂是者豈吾道之左使然耶都公卿不樂於正薦士之所致耶先生曰讀至此不一唱三嘆非知言已天台于師尹與其兄舜道嘗從余游舜道以經學中進士第而師尹連不得志于有司令不逺萬里遊京師來丐予言以別予曰師尹懐才藝不耦于時何分於中外彼此哉師尹曰儒􅇊不利吾旁狹者岐黄氏之伎也不耦扵此􅀅有耦於彼乎予悲其藝成而未利而壮其志之必有成也於是乎序送沈均父序予友漕使拙齊公為予談太末有竒士曰沈平氏字均父自號自量宋少師某之七葉孫也其為人斬斬有風操人有過而折之疾浮屠氏如糞蛆明經試有司弗售即焚棄舉子伎以岐黄術自隱至正中境有桀民弄兵者守􅀅莫孰何君起率鄰邦大俠合券甲用淛垣摠戎令禽之􅀂狐兎盡夷其穴巢一邑賴以安又龍邑令翟某者貪呇與豪斷民相根㭑齫齚其民無屬饜君件其状走部刺史白之翟與根株連坐徒實邊人稱快佗墨吏見君曰此白衣言事生也吾聞而異其人無幾何君游淞相見視其貌若荏若荏而中精悍無敵質所行為不誣宿留九山月餘別去淞人士能詩者歌以餞之而以首屬余余以士有匹夫而任人倫世教之重一言一動切於救時如負禄位者謂非毅然豪􅇐之士不可如魯冲連郭林宗石徂徠其人是已世降以還士氣不作代果無􅀂人乎吾於均父見士氣之猶古也嘻世有任人之言責往往為瘖蟬伏馬而吐不平者乃在中澤之士世道不幸亦世道之幸歟後之求均父者於吾文有徵其得以詭托者信為扁倉流乎是為序東維子文集卷之八

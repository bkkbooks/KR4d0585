front:
  text: 東維子集序
  hash: sha256:e18fc894404dd506626f74bfb77e534e81bcdb1fdbb2c3b6db141a8a6ea591d7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_000-1a}
body:
  text: 華亭孫承撰粤自元化之運肇生賢哲理道之昌煥􅀤文章文章之係于世教也甚大自先秦兩漢而下逮建安盛矣寥寥數千載雖著述名家代不乏人而未聞有登班馬之堂列韓歐之林者則以風㑹之流大雅不作可慨也矧吾松首善之地為聖化之所先涵者乎宏武初天下文明聲教四訖于時鳳翥鸞翔以際風雲之會者不能悉數而南村陶宗儀東海袁景文徜徉雲水風節凝然其高品也余在館中又見楊廉夫東維子集讀其文想見其人有先秦兩漢之氣格焉方其歸田未滿七十而棲遲于雲間者殆二十餘年今草􅀇閣尚在夫廉夫産自會稽非松人也而獨于松焉是依何也葢氣之聚者其俗必敦文之㑹者其風必推亷失望九峰而陟其巔泝三泖而揚其波也習之矣在勝國時登進士入國朝不就聘放浪山水瀟洒自得雅好讀書以故富于文章其序記傳賦詩歌備諸家體博雅不羣當與宗儀景文相為後先而他日播之金石藏之名山俱稱不朽以是知賢哲攸歸可騐敦龎之俗而文章會聚尤徴風雅之宗我國家文治日隆理道永昌兩見之矣石湖呉君好古君子也欲廣其傳問序于余余嘉吾松本文獻之邦東維子又㩦文而來也已自能鳴于世固不假吾之言以爲重而余且因文之傳以為光矣僣為之引東維子文集校勘記卷一一葉前二行楨禎餘六卷同行顛顜十行盛成後三行受㖟六行抵祗二葉後九行曷篇十行之永三葉前六行白曰後三行朱宋四行了不人力人七力行識䜟八四葉後行同一行父久四行相柏六行未永七行孝厚五葉前五行羡後四田行戒戎怪惟五行著善六行羅罹十行􅂎祀六葉前三行乎收守五牧行宋朱後一行持特二行唆峻三行門闓七葉前五行徑經六行思恩若苦八後十行同一行拆抃八葉前四行冊丹六行經絰後五行二三九行而九葉前已一行誦刑後二行嘆九行益葢十葉前三行下卞八行曰白卷二一葉前十一行貴責後一行官上二葉前官七行婁妻十行已邑十一行亦赤後二行我􅆷三葉前三行右古儉憸八行史吏後三行鵠四葉前三行苻符後一行生王五葉前七行右者八行田曰九行叫吁後九行之乏六葉後七行吳昊乘粟十行與輿七葉前四行之足後一行取所三行朋册七行仰佃八葉前六行典興七行亡士後八行減咸九行明朋九葉前一行囍囏二行生主三行所其所九有行租祖後十一行思恩十葉前九行紀起十一行辨辯後五行四西八行頭顧十一葉前一行不流四行侯俟後六行遺遣十二葉前一行春奉四行客官九行郎外卷三一葉前六行坟墳後十行苟句二葉前三行逐遂四行丘且五行避過六行昇畀後五行披按九行連速三葉前七行次後七行切刀四葉前一行列别五行大都督大都督八使都督行元玄九行千干十一行侍特後三行術術衎九衎行忠中日五葉前一行今令二行維准招拓九行固國後一行妍奸六行爭事九行思忠六葉前三行二易三後一易行便使六行十室于里綆緩八行萬蓋臨九淄之民行走六六轉喻鞠走犬六博踰鞠聲轂十一行冠㓂七葉前一行徙徒二行奉舉三行君吾五行功仂無侯與十侯行武元十一行堅疑匠堅凝而有省後三行公八葉前三行實賓五行而面七行言有九行舊之賦田之賦十行之乏後六行衛衡子于十一行亾士九葉前二行理地五行陽和隂陽十一和行天將軍大將後四軍行戰㦸五行辨古辯舌九行遂逢十葉前四行千干六行干于後一行厲屬二行寄奇十一葉前七行子予後一行彈群二行上土三行穿穽十二葉前十一行此比後四行以恒格於恒格榮崇五行再􅀊或七八七行恒非以以八􅏒行利科為是致十是三葉前五行不能入不能六人行積櫝七行故儒櫝勞積八勞行劣十一行師閰帥後二閫行舶三行亡明閱七行以司八櫝行以十四葉前十一行辨辦後七行方力八行率流卷四一葉後八行得悍二葉前五行二三六行秩庫員未秩庳七員末行待持十行為衢頖官為衢州十一錄頖官行學益増學益優學益􅄖千于三葉前三行者省八行宫官貴責四葉前一行此比後九行又叉五葉後六行率卒六葉前三行土上後四行乎平七葉後五行帖阽八葉前五行久又後一行史吏九葉前三四行事有憂而有為事有憂焉憂而有十為行祿錄後五行榮勞十葉前二行􅀠棣四行具且師帥四五行師于海漕而去者帥于海漕也六前漕而去者行每舟萊粟八行惟推後二行今令十一葉前三行十于九行之疑其獄後四之疑行蕃藩六行恒垣七行在枉十二葉前二行願頤四行焉馬後六行儒之官師儒八之官行懣然懣懣十三葉然前一行者孝二行遺者遺七旨行二葉前五行特持後三行異其八行名石三葉後一行君若四葉前三行來求四行宏弘後十行列利刺刜五葉前十一行文子王子者則有後一利行周用六葉後三行又文十一行本丁七葉前二行乃方三行銷鋪後五行排椒九葉前二行曾曹八行故古後七行快祛十葉前一行蔽自蔽後十目一行以十一葉後二行申二中一十一行央宋卷七一葉前七行人人八人行摸模後二行右古六行體骼二葉後十行憂國愛三葉前國十行二千後一行一二行淵瀾三行鄭節四葉後四行譁謙情清六行得八行若不下若十一干行噴憤五葉前二行雲雪後三行足限六葉前二行二工七葉前二行英瑛五行又文後一行子予二行日百八葉前二行於君君親於君親四行扶挾十一行紀之什紀行十一葉之什前一行靜靖十二葉後一行乎瑞之五瑞行而尚九行思恩􅊌十行必心十三葉前四行壟襲七行此比後四行最是十四葉前十行詢詞錐錄十五葉前二三行荒之黄後六之行炎􅋓雖雄九行鍵鎪十六葉前一行凡几卷八此卷兼据明鈔本校二葉前四行往往後七往行只丈八行祛袂三葉後一行將子得子五六行其言具四葉前言二行拆圻六行以徴以徴八吾言行史更五葉後十行睦眭棄桑六葉前五行詣諸八行自日後一行髙鳥二行持時七葉前三行擔誓七行談該八葉後十行責貢九葉前十一行速連十葉前四行顓工鈔本無八工字行北鈔本十作壯行至鈔本作致沓着户籍鈔本下有浙民多雙後一姓者以此八字小註行思君三此銕史筆之故鈔本夾註此銕史筆三之深許吳孝廉十字行游京游京六師行于千七行没役九行徼徹十一葉前三行都抑六行令今後二行而面八九行若荏若荏若十二葉荏前四行中巾卷九二葉後五行名若三葉前二行櫂權五行本獲已不􅀗後九已行四日四四葉後目七行時特五葉前十一行以似後四行三王九行右左十行弱翁六葉前十一行烏島後三行一二三四行小註伯顔太二句本師此句先生也伯顔太師此二五行句本先生句也小註先生祖楊佛子享四世年九十九先生四世祖楊佛子享年九十九先生嘗自言遇病遇喪亂不喪憂不憂遇病不是春也故自號嬉春道人名其所居亂胸中四附長窩日春不老先生嘗自言遇憂不憂遇病不病遇喪亂不喪亂胸中四附長是春也故自號嬉春道人十名其所居窩曰春不老行委妄小註全不為有才力儉韻所􅅞先生嘗曰有才力三字七葉前在嘗曰下三行至主四行乎平敕教五行仇徒佛弗六行固羅喪亂而得同罹喪亂後而不得七行如桂臯籍如挂八葉前臬籍十一行作生後七行序耳九葉前七行卿鄉後十行先免十葉前二行地他三行垤坯十一行伏幼仗劔後六行計許十一葉前四五行合天下之情情情合合而隂陽合天下之情情合六而隂陽行鼓琴之鼓琴也則財九行則其聰靈則具後聰靈二行主王五行生王下六同行配琴配八瑟行聲鼓馬仰瓠十一行為焉生王十二葉前五行本木九行俗裕十行季李十一行博傳後二行二工八行頴頴獨頴不獨刑州九行以曰十行清請十三葉前三行已屯四行仕任卷十一葉後一行移侈二葉前一行鑑鏗五行拾於六行上工七行十才八行想懋曰日後六行聖雪三葉前二行干于六行林秣八行繩編露辭後八行端端端四葉前公二行人入四行某某其集十行别則後二行烺恨三行諾誥六行馳池八行水永十一行墨里五葉前五行其具六行次吹八行辨辯九行殷復後九行生主六葉前三行江竹四行結粳米如實結米如十粳實行不可以偽参也下有物不可後七以偽参六字行稱禰十一行扶挾七葉前三行硬哽六行祖欲穎髙欲祖七頴裔行于子後一行劉列七行送用上人西游序無此八葉前七字三行馭馴九葉前八行九元九行禆捭後一行日白四行重送精選重選十精進行主王十一行其知大識大知十葉後識六行止正十行墮隊十一葉前三行十數六行采宋七行僧後九行耳其十行來年十二葉後二行焉爲三行識職四行思忽七行瓢飄彭蠡十三葉前十行其道體證其後一道行賊滅二行虚信七行逐是九行受授十四葉前六行玄女八行抺抃後一行平守二行㓂魃跛魃搜插插三搜行千干十五葉前一行峋岣二行昔皆罕希三行孫姓後二行歸而求之錮而束之六行詰話卷十一一葉前六行卒穿八行殺聲後四行焉萬五行挱桫禮檀八行成府二葉前二行餞趨六行節音音後八節行徴徽父及間聞三葉前二行於有三行吳矣九行媟邪正媟雅後一邪正行今樂今樂三四府行古詩歌古歌五詩行速連六行往住九行閔關十行而為四葉前三行治冶四行益蓋七行而勻蓋蓋而句十益一行才於後二才行矣已八行得意者得此十一意者行寖矣寖失五葉前七行記託十行朝上空六葉後一格四行亦頳七行秦奉七葉前二行道過三行有首六行弓㢧七行衆異醫衆後一醫行聾於心聾於耳未七嘗聾於心行妄痛妄九庸行倖十一行融翮八葉前一行駮駿後三行勒勤九葉前三行丈大後二行亦士良亦無上九亦字行妙稱稱十一妙行規規十葉前規六行於象以後三象行熟孰五行政攻十一行務循為國復循十一葉偽國前一行无為二行呂㠯四行同六行凶吝維推後六行由繇丁於十二葉前九行雒後九行子予十三葉前五行接挾七行富貴貴富後四下同行不惜弗八惜行鳥鶴十四葉前二行灝瀨徽徴六行仁祖祖八仁行以其以後二竒行蘇木蘇五莫行信伶十五葉前六行為劇為大劇益盖七行謹譚十一行一諷以諷後七行三卷十二一葉後一行稅視樂臬四行地他五行羣郡八行炎􅋓十行頤願二葉前四行濾濬三葉前九行至七年至正十一七年行晉普下同後四行施庶六行屬厲九行子於十行除涂四葉前五行醫軍醫六行昔旨九行逼偪十行上一五葉前四行圖固後三行一私以私六葉前四行亭序六行燠煥十行嬉繕後一行子千六行不又寮僚八行累賢勞大累十一賢勞行書史憲書史七葉前厯憲二行獻知事知七事行託就九行捧俸十一行失大後一行於故五行水朱六行併諸著併七著行飢肌善義八行枉柱十行成民八葉前一行俸體七行應息十行之史後一行洽給史吏四行統絃九行義㦸十行条之且規始具學之規十一始具行微撤九葉前一行五年下有州字教修布教二條行譜講塲五行董役史吏六行増隆増兩隆七析廡行然新湢庫八煥然一新行紀能名名能韋幸十一行乎後二烏行尸三行守四行侯五行於以六行宅八行保保九保行有十一行一十葉前三行始幾三四行再元之年再元之六三年行俗鑿九行厲廉十一行充尤後六行弒賦七行殷教懃恝十一葉前三行臣巨四行吳矣六行子從于後七行子孫孫十行丈文後一行聖里三行即僅錢既陷錢唐既陷四行鳥合烏六合行子于冩滿呫穆䔍滿八帖穆行子于九行城池城池十一之行於則於十二葉財前二行辨辦三行司日四行鍵銅銅鍵八行代伐九行今㑹稽今曰㑹稽西喜喜後六行夫大印邱固國八行求永九行人不鼓蚤鼜十行基塞十一行工上十三葉前二行計記七行繄繫後六行賢三三賢句聖白八堊行又不公惕光祿公十四葉惕焉前四行指捐七行何付九行居君後一行可日又規也又七規行居君教敦八行字文字士十五文葉前三行投距拔四距行淛師帥淛五帥行及反七行銳鉅八行本月木爿簿薄九行禽之生禽之千夫良千後二夫行相桐五行金錦六行顱頭七行而視逝而十逝行縣賁父死賁職縣賁父十六死職葉前五行即及敬輿下有是敬六輿三字行兵者舍合七行華亭谷亭下有人今縣西二十五里後二有華亭十一字行已二末節末節五仕行末還昌蹶末途五六猖蹶行得名者夫閒氣得夫八閒氣行清淚勝清十七葉唳前一行夫失四行許吳許士六七英行蹴蹴踖蹴十踖行翼十一行又難又難後二也行盡君君五盡行誦浦六行不可難不十難行梁渠十八葉前三行非豈五非行渤云漷公此卷二葉前四行濾字下原有闕文二十行四字明刻本不闕今補録于后治功成民到于今稱之邇者洪河暴決折而西北流天子一念動坤載遣使沉璧而河復故道吁官都水者上以聖天子之心為心下以徹里氏之功為功三吳之民尚有昬墊而無訴者乎抑相水之職本諸順天之理世未有順於理而利不興亦未逆諸理而害能除者孟子由禹之行水也行其所無事也行其所無事者順理也鯀之反是則以方命命者何即理也以水為職者職與理應雖湯湯可乂不則天下之治水者皆鯀也可不慎哉左公字廷憲居憲府使雲南岩岩有風采奮髯之頃奸膽盡落到官視民飢溺猶已是年十二月除浙東閫帥天使尚公有用字㡭賢是年九月九日卒於官副使散竹字質卿康公若泰字魯聸是年五月除國子監司業僉事官音奴公字國賔是年十二月除福建憲僉事王公仲温字輔卿照磨李嘏字公錫分事董者􅁺史錢璛奏差蔡琳李報也繫之辭曰邈哉法象江河在下頖玄與黄吐納隂陽坎徳流長維坎之徳雷雨在上惠廸惟吉從逆惟殃周官稻人帝憫下土漢司水衡具區芒芒忽焉震盪利脩于農叶爰設司存保彼東方不呉不揚臬臣之良相彼天時為天子使以順地理材貞且幹恩肥海􅀖水居其壑男樂其作土反其宅昆蟲蟄蔵女修其紅叶年穀屢登畊食鑿飲順成八方其蜡悉通叶職臣報功曰我水庸常湖等處茶園都提舉司記長發農祥禹貢九州方物而茶不在列盖古之茶在藥品而未為食品也至唐茶飲始盛不惟華人耆之囬鶻氏亦驅馬相市言利者不得不與鹽筴同科故始稅於趙賛増於王播榷於王涯茶遂為卷十三一葉前十行臯辠遂至兵重不彌解曠􅀊月遂致兵連不十解彌曠􅀊月一行填為填後一委行明之智士明智之士鈴鈐二行墳憤三行子千恃特二葉前三行病疲四行合今令公七行目自八行微徴十行謂其詣某于后于石后法後十一法行為焉後一行乎平三行於五行塞津溢填塞六津隘行足宣足以九宣行持特十行親覲維雖十一行日目相切三葉前四行不公十一行馬守馬首行引佩刀引佩後二刀行興去樊不為椅旤興利去弊不為猜旤更吏三行小註凡尸七行皆死非義皆非八死義行竄鼠九行為謂下十一同行曰甲小註龍狄四葉前四行敗者敗者五外行義亦義六巳行姚園寺觀姚園七寺行素率十一行適遭後一行合命二行寮慕六行謨溪􅀒賢九行花化十行將道集而先霰道將集而十一霰先行晚睍五葉前一行至平三行千十九行大事樹大樹橋喬後三行短豆四行議謙五行相招六行主賴柱枉生神亦赤八行華華亭華亭穴以九行比此十一行蒼譽六葉前三行書諸書諸五軒行㙂坑八行赴哉後行一堂日燬去堂燬去讓護二行本先先貞力學貞力七葉前學一行舟之隱運舟之運逆送三行來六行不止不知九止行金今後三行江汪五行蘭溪縣州正蘭溪八州正行研極研極利害研極利害枌枋文大八九行守約也下有簡倫理削禮法土木形骸率往而徑發者又非守約也二十一字九行為約八葉前三行守之施六之行里昱七行立志焉烏何知何八樂行惟推為偽則其笑九為偽行曽張一咲咲十一行人不何河後三行救敝四行一笑母輕母輕八一笑行憩晚亭憩客晚亭九行木客􅀋木客赤松依裔赤松十一裔行海北波影海波九影葉前四行付封五行之萝又六夢行文似吾不境又似吾末境行客行若七行四而伎致九行與公後一子行其幻耳下有奚以異於雪之不可控摶者耶先言蘇雪之二悮於幻二十字行開閉四行幻云幻云何哉何哉幻云何哉幻云九何哉行寓雪坡萬雪十葉前於坡八行燕之處士燕之九室行藥樂後二行成咸七行清香之凝下有於一閣者不翅如道山風日穆然其舒且遲也君子觀凝香之凝九二十五字行矜於十一行闕闚呼吁十一葉前六行其其夀七行徳上也徳上八為也行也字十行室說後二行書詩三行不逮千里明師不逺千里七延明師行予言之予言十一勉之行朝朝十二散葉前二行係瑛孫三瑛行碑家廟碑於以五行父文後六行謙八行士八九行才已成才已顯宦已成十一行公不咸盛十三葉前一行挟恩炰六行不正必七正行正占射正者九占射行不可不恃可以後三恃行校放六行官宦七行判制九行上足以待禄養士禮體十行西偏於室西偏道過十一行貝聲樂酒中具聲樂十四葉酒事前一行大夫大夫三人行路踣八行亦以十一行卒老歸來得卒老于歸來卷十四一葉前六行說者其說七者行反及十一行皆發皆發後七之行于聖人之道教以聖人之教安要叨而十行母耳二葉前一行名居召三君行辦亦五行權變權度八也行世此九行合闔後三四行髙如如天髙如八天行於形九行甚焉甚三葉前也一行在是是八在行得志得九之行懿王之詩十訖於陳靈行詩亡春秋十作矣吁學行一上生學詩於春秋之先後二行有膾三四炙行貴乎知味之說生六行于以七行勉之授勉十一之行人大四葉前二行廢于一身廢于身五行皆春六行自其自八止行時特髙之髙五葉前足八行子於後一行梅晦三四行彦明者彦五明行月之弦月之十一弦者行予子六葉前四行鉅海之中鉅海五中行廵延八行間聞後二行從徙五行棄世仕棄十仕行曰白七葉前七行楊子義語楊子語吁嘻八行期朝十一行藥蔾後三行晚瞻四行吁嘻六行悼恨悼恨也吁嘻八行記紀八葉前六行東邱先生之後東邱之後後三行人伍六行古權魯古之九葉後椎魯六行點黜十一行和弘十葉前二行斯兹後七行日百十一行惟推彼被十一葉前一行上止四行漢嘆十行導尊不尚同不後二同行在李氏路在季路氏五行志伊尹志伊十二葉尹志前五行著置六行少以九行屯也十行孔聖孔後一老行俱皆三行推也化者推化者役後四行僕傑十三葉前五行家章衆六草行中鍾大太麗虖麗虖七天行氣之一剛一氣十之剛行捐軀之厯險捐軀十一厯險行稱孝忠稱後一忠行上立二行間見七行父天九行始宋竹始專十四葉於竹前一行落客二行喬挺挺四喬行成或春舂八行丁月清青九行忝無忝卷十五一葉前四行小註借借九字行胔十行以大於後十大一行予子二葉前六行古風裁古風裁聖今七行齡學有錦書室有書三葉室前二行田曰五六行束之峽匪之為渦束之為峽九匯之為渦行詐作後三行四幕羃八行淞隂淞之隂替賛九行紀臺臺四葉前紀五行嘗疇七行萊菜下八同行枯栝十一行喜嘻後二行松柳栗里松柳八行實賓十行幸戯戯五葉前幸五行承父名承九名行而必以貞固必於十貞固行曰以後一行顧碩十行㨂棟茶竈筆茶竈六筆床葉前二行余移攄據三行種柳種五四柳行羲義六行以於後一行納訥四行知則則六知行借戒七葉前三行竒絶絶四竒行以一草木一草六木行經後五行溺漪七行一三八葉前十行義蔑後二行古孝友之風下有吾知謝三氏風五字行易昜十行鍾鍤九葉前四行賢人六行搖淫九行仲桓也仲桓後一之行生還八行待得十行謚謐業葉十一行惟維十葉前九行道過十行渙十一行鳳夀倅作風濤後一猝作行入人不返不可二返行願余舟顧余之虚六舟行而爾十一行讀請十一葉後一行鐲燭二行易其名為下有五雲因悼兵革以來衣冠之士逃十二葉蘺解散至有遺失而獨忍二十三字前五行之澤之手澤後一行立􅁄棘九立行名命十一行談該十三葉前二行綱常之隆替下有為進退者吾之進退未甞必於天亦未甞必於天也天之所以二十四字與吾與四我行名命堂命堂卷十六一葉前六行養之論養氣後四之論行攝懾六行餒餒二葉前也九行諮懿後十行所祖所祖三葉後矣一行爾家曰爾九家行天之學天文十學一行予于四葉前七行集築後十行懸奉恩五葉前來六行九族驩鄉黨有媮衣親九族驩鄉黨七鄉黨有媮衣行笠篋十一行告失後二行舉譽八行氣之猖狂􅂔有六葉前猖狂四行尚金石而金後八石行葺泖茸泖物省物十有行大事子其大事于七葉前其先一行又所又取九行矣昊後三行顧碩四行而脩徳今老矣九而脩徳行軒一一八軒葉後一行于予七行齋禽九葉前三行奉舉六行廛塵八行者而久者清而十久者行棲凄後七行矣失十行易昜自因十葉前三行㝷敲六行不為有有也不為其八有也行啻翅後四行竹有於家家竹何有八於家行多都九行因憮嘆春春之逺因憮然嘆十春之逺一行了者者了後復十一葉前一行教聲三教行之足後一行眠眂四行超越漆海六行徴激若吾八行造適有者十一行隆漁十二葉前二行人在人在三船行天也天九耶行歎歟後五行文又六行間闠天夫七行吾方大佑五方十一大估行而玉白玉十三葉前一行黄塵市與黄二塵市行松松月者於松三月者行以素以素六行文丈聱聲七行衣木後二行父文四行之心五行於未林木豪濠六行揖捐七行卒平十四葉前二行窮竊五行施於物者施於七物者行通適卷十七一葉後二行若彼􅀂樂三彼行隱居隱二葉前君六行其某八行訣詰後二行非釋非仙五釋行㓜切堂豈七行子子十一行其館中奥其館三葉前中奥四行若也君子八也行承氷丸行術衛雖推十一行天夭後二行音者三行紳狎五行餘飲九行音吾四葉前四行之目者禮目者且旦十行鯀鯨少陵杜少後一陵行潤濶二行何可六行矣歟七行往在五葉前一行目命因十行命十一行客誥至船客詰後一主船行桀乘六葉前三行治沼十一行竹之於秋竹之後一於秋行恃特二行吾子吾六以行未必接下十行一行畫面盡晝七葉前四行且旦九十行無忘吾祖無忘角弓以無忘吾祖後一行中忠二行也已􅂙政􅂙政四公行畫面五行重重矣九行春舂八葉前四行于周子子周五子行而得而得七諸行若行風也若行者八是風也行極空十行時良時之後二至良行猶獨五行悔晦六行泰乎泰九葉前和三行尤多才賢尤才五賢行子予八行浮游後一行得清也得是四清也行品器十葉前五行徙湖長興徒湖之長興七行胡公古胡公八古愚行釋曰釋後四回五行之心竹之六心行甚其十一葉前九行􅇶秋􅇶於十一秋行山山小後二山行髙又目標榜又髙自標榜四行皆五子五十子行山陽山之陽久十二葉前一行去志九行相質劑日中與市者相質劑道遺十行雅訝後三行者昔四行走立六行落之之十落行脫􅆷十一行于干十三葉前十一行進題後六行聖法賢天法聖聖法天九賢法聖行義義十也行或惑十四葉前一行武州武七叔行所在惟琴瑟之存後一惟琴行有百及反四行斷新五行術衛也已六行舒十五葉前十一行已以後一行典與二行岩冰嵓八水行人之所之十六葉所前二行能倦三行讀續徳得得七木行睦陸後一行唳二行光先三行易昜無舞十七葉後八行難艱九行光子先十八葉于前五行獨猶今人不與人不七與行氏出仕出後七仕行間問十九葉前四行以治之名以之名十行遭世下有擾攘妻子流離拯死之不贍雖有後二東阿能一日居乎今生生於二十四字三行流觴有不必蘭諸流觴有東不必蘭渚何曰何必六曰行在陽山阿陽山阿二十葉前二行髙山山髙仰其仰其九峯行遥後九行悞悟侍􅀝十行思志白由十一行自日而歸而歸二十一葉者前三行也道道也子子五行今吾今吾七雖行也已八行禽畬二十二葉後二行序亭三行余舍六行情情逺情日七逺行人常人之九常行搆溝十一行乎手二十三葉前五行永墓永六慕行余祭舍今今七舍行敬散後十行恐思十一行于子二十四葉前一行根中出者根中出根中出者思根中出卷十八一葉後一行論談談七論行徳得十行竹之行二葉前之四行子重違予重違違三葉前九行而通而能後三通行據攄四葉前二行哉欲四五行予士衡予因十士衡行松紫招後四景行予于五行蒼翠几蒼翠入几十行如竹箭之下有有筠貫四時而不改柯易葉此禮君子又以竹之筠喻夫中貞二十四字韌十一行宜直五葉前三行不四行聚取八行凡今使凡後三今行慈幸幸六葉前慈六行有孝孝九有行丁膚身公之不幸後三丁虜身行徴微九行軒斬十行業叢七葉後九行樷散八葉前十行故放十一行秋杖後六行以夫樂以天九葉前樂五行窮竊六行坤之言文曰坤之文八言曰行待偫九行兵吳易昜顧碩後三行咸尚物無物十一葉字前二行湘潮三行可詩齋曰可五詩齊行君居七行讌落室讌而十一落室行敝敞後二行時將十二葉後二行異里十一行已巴十三葉後一行態熊二行所而四行漁渙五行通耳不通耳六行求書於晝求書八於書行太大十四葉前二行人入迢超八行大夫十一行今令後三行春秋之斷春秋之四斷以斷行故故五以行予以以予卷十九一葉前四行樓真賞真賞五樓行可百六行凡九後六行所往二葉前六行移而移後六春行是如如十是行餘飲三葉前二行不慎哉可不慎三哉行書齋書之五齋行行竹後三行天朝上空四一格行明天子上空五一格行爲記以爲四葉前記一行討計五行以於後四行於以十行有肖係之心源係諸五葉前心源一行治源治其四源行雖百雖百世後三行目自四行重薫六行君若六葉前五行雅推六行記春記熙十春行取地芥如取後一地芥行曰余白七葉前余五行之空中空翠中且旦十一行舒卷卷後六舒行養劵八葉前六行千九行于干􅇇貽十一行九几經史子經史九葉前子書八行過遇後二行筆以以三筆行又何又何有十葉前二行剛慎不齪齪剛愎不能齪齪九行沈潛克剛克髙宗柔克沈潛剛克九十髙明柔克行子過之子之過十一行剛二者則二者隨墮後二行剛復剛四愎行疚疢十一葉前三行筆聿六行驟􅇎所謂以應所以十二葉應後六行郡邵家冡十行下干十三葉前一行攵父三行以五行家冡後四行之孫子孫七行世之世八世行于子十四葉前九十行以是阻也以自後一粗也行雲􅏒雲之六􅏒行疏流卷二十一葉前六行名今今九名行中申後一行焚燹二行有支二葉前二行制利八行乎子後五行讓護三葉前五行國朝上空七一格行興與後五行判府府六七判行而其世家而世四葉前家一行其不難知其不難後一行至復復至趺之趺三足行片斥四行引􅀪十行攻吾􅀂敷淡攻苦五葉前軗淡二行工王四行也世後四行曰隆福寺寺曰隆福十行先光六葉前三行說設四行推堆七行而髙髙後三而行抑仰五行至主六行工土十行法治七葉前九行朝上空後一一格行延筵虚之之七虚行彼披八行師履行師之八葉前履行二行顔顱三行石碧五行覺學七行已也十行至主後二行二三五行咒况六行已也八行誰淮九行笑其函笈其九葉前圖二行某其後二行經往十葉前三行望聖五行下干十行至僧主後四僧行其道具道五行繼緇八行物特十行非人工非上十一人行雖無即然於有竹也雖然即無十一葉於有竹也前一行至立四行嗷毅九行微徼後二行矣吳五行滑得註誣吾儒合吾儒十二葉合也前五行無心無心之雲後九行陳棟敝􅁦墨屋十行省有幼幻十三葉前一行文丈二行二上四行小註逺清去清之神清逺玄五虚之神行清逺其清六逺行淳芒與苑下有風觀于東溟小白花之岩見金沙七婦出一幻相如牛渚犀見登二十四字行于子八行上何見上人曰十何見行衛衝後三行霞震旦震十旦行之三十一行池也十四葉前三行因肉七八行係師以詩係以後四詩行識無真不識無十五葉真無前二行東乘三行利令昬利令四昬行幼勿六行余諗惜余不七及諗行㖟予㖟予九不行楣十行天夫十一行媾搆後五行賈質出火八九行天無天無水則不能雨地無水則不能雲天無水則不雨十地無水則不雲行髙寓十六葉前一行者殺殺者卷二十一一葉前八行全主後六行滇填二葉前五行西胥六行債婿八行煩頌九行外甥舅氏外舅後一氏行往彼三行遺棄以遺六七棄行植弗天植植九弗夭行同罔三葉前一行惠惪四葉前九行築籞後一行亦並四行聽賦六行民其其九民行鸞者鸞鳳五葉後者一行書讀而不用讀而不用世卅八行書挂書十一梁上行一客一客曰六葉前三行果鬼七行操􅆭九行我夢我之後七夢行誠不仁誠不十誠行親視七葉後一行峰生八行自目八葉前三行雲云九葉後四行其某殷殁五行迄今于何所迄于十葉前何所八行以水後四行區漚十二葉前三行人久四行署箸此卷明刻本有書負蝂傳一首補錄于後書負蝂傳後可繼隼鷄錄縞凰議作一􅀋余讀柳子厚􅀒蝂傳而未見其人及讀元魏志胡太后幸絹蔵從者百餘人使人各稱力取之尚書令李崇王融􅀒之過重顛仆於地崇傷腰融損足太后奪其􅀒使空去若崇融二子非魏之􅀒蝂也耶若胡后者盖愚弄两蝂蟲豈非柳傳之明證哉予在睦見金倉氏破睦有李淵郁者首入睦庫腰􅀒白金若于錠過重交道上屢仆不能起人知其􅀒也遂斫腰敚其􅀒去吁若李氏者又柳傳之大癡蝂者與卷二十二一葉後八行不在聖人不在聖二葉前人也一行愛受二行矣夫四行舍余後五行音昔六行聞間八行未末十行閒恂四葉前十一行嘗觀嘗觀後三夫行再舟九行其道其道五葉前也一行狠根五行日自六葉前十一行口曰飾修後十行言古不見不可七葉見前四行盛君子盛世六君子行蘭芝芝後六蘭行生至十一行俠狹八葉前五行旬恂七行藝六六後一藝行斟尠思嘗六思行著之著文九葉前七行還說乎還有說乎於貢九於行鼓鼓後一也行也者十葉前三行柄枘後一行玉王十一葉前二行及反九行某其十一行竹孤孤後一竹行果之果十二葉至前三行水木六行偕階八行亡偽之物亡偽之十一物也行未木近後五行易昌九行木名名木十一行須渻十三葉前八行我吾十一行潔之之後一潔行無以無以也二行費弗三行仁為為義為仁為義也焉四行具且從徒六行錢銕十四葉前一行王玉五行大道至藏大道之七至藏行大之藏大道之十藏行未來後三行公承承公必心五行追兵夀坊安進兵夀安坊十一行其捕十五葉前三行文章文後三筆四行在體要而坊逸在上體要而四功逸行已癸五已行卜定十六葉前二行鐵鏺四行城賊五行拮㸵十行此陽浮慕此豈陽十一浮慕行重董後二行初七初九卷二十三一葉後九行叫嗺叫二葉前嚾四行且不便且不五使行押狎八行巴已後五行惜夕愔三葉前愔五行蟊螙七行有不便有弗便誹傷誹傷十行檢役檢後三没行有右九行謹讙十行群曹四葉前一行候後二行繁繋後四行周用十行圭五葉前七行蹎遁憂受後三行見富陽見於五富陽行庸妄者也庸妄者九十爲也行而未書之而樂書六葉前之五行邑色後十一行之七葉前一行淦塗六行千千里中千八里行謂渭九行木未後三行曹漕七行犀庫十行逆送八葉前四行筆華八行付副十一行配記後十一行至主九葉前三行子于十行予子後七行度庋十葉前三行願頽圯顧寺四頽圯行遥遑鉢棄棄後一鉢行風聲八行需儒十一葉後一行持恃二行慕帝幕六帟行滁涂九行機之之十機行作作也􅀇憂十二葉前一行其故故二其行天氏四行昊天上空六一格行聖望九行以後一行青浮浮三青行倍陪十行天萬千萬十三葉前六行召台十一行隔隅後一行語給七行及反九行止上十行凡元二工十一行廊廡庫廊㢘十四葉庫庾前一行麗嚴二行無未後五行頃傾十五葉前八行之者者十一之行徴微後一行其且十一行也十六葉前三行裼裼下十一同行家象後一行緇綃二行細人之文裼細人四文裼行徴十七葉前一行無爲者心無三爲者行通適六行治怡八行軍事後四行李氏中李十中行七士十八葉前一行德得後二行平太太平六行取最七行室委順室曰十九葉委順前九行清精十行之在後四行工二十行秗祅二十葉前四行郊效五行未末五六行得而旨得南辛脂十一行小註雅杜後一行小註客谷此卷明鈔本有尚夷齋銘一首補錄于後尚夷齋銘木以繩而正弓以擏而柔車以規而轉舟以窽而浮惟不夷也繩擏之在規窽之繇惟淑德優而況乎翰墨之游卷二十四一葉後八行如服始二葉前服一行至止乙未至正八乙未行正止後五行邑已七行伩優三葉後二行所用四葉前七行華亭都總管華亭軍民都總後八管行墊塾十一行二十二年三十五葉前二年二行天矢十行至廬至匡後一廬行好事好事十一者行聞閭六葉前七行噍後一行官宦三行搶槍五行文又六行束東七行勿弗七葉前三行召臺五行被首被後一旨行溳殞二行大天枉狂六行棄年方萬八葉前一行已也二行聘愕三行進追七行世丗後九行歸舊九葉前二行未先三行粹梓八行攷十一行閑閎後四行閨閫閭十閻行子吾十葉前子六行咸成七行㳯溯駝馳十一行戎式雋儁後二後九行同行輟輙十一葉前九行移正之移文止之窮躬後一行吉史慕告灾五幕行勢執七行父母父母殁年其産牟其八産行􅁅反十二葉前二行置易于几案置易後五儿案行註禮益精註律十一益精行反及十三葉前六行辨辯後一行大氏先尤二行博傳六行肄肆七行衣表八襮行千於十一行益監去云十四葉前二行濟穧後一行子干二行我職三行監益八行以輔期器之以公輔十器期之行養奉十五葉前二行解假三行廢費六行擾授七行葢益置署九行鋤鏃十一行銕鍼後一行莫毒于雞莫毐于四雞毒行乎平六行昌􅂚十六葉前一行兩丙五行宋宗六行于予十一行其具後六行以授七行合舍九行紅巾㓂亂紅巾十㓂行薪蘄十一行七必劃殄俾無肓邑得必劓殄俾無育於邑十七葉前三行同年同年八也行頴十行任在十一行仕任後一行必格下有音閣十八葉二字小註前四行兼燕六行宣宜侶佀十一行温之宗晦書院上有復後六長二字行梅澆海九十澆行持其叙叙伏詣門持其叙十九葉狀詣門前一行閽三行小註英其七行太大後二行徑徭十行妻娶十一行附袝二十葉前一行息思二行螟十一行曰白後三行仍乃七行隔䧟九行喫吭十行說詭二十一葉前三行去安六行大六八行孟本諱孟九本行女也接上行孟本孺儒後二行寔實八行說訊二十二葉前九行郡都後二行帖怙十行若子吾也􅀂子事二十三葉我也前三行色裁七行論諭八行夏正
  text: 東維子文集􅃃之十四
  hash: sha256:7daff3b765d92f285a91a53f38073a6d64054baf7515c9817ca2567eddb19cc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_014-1a}
body:
  text: 會稽鐵厓楊維楨廉夫著記内􅀚齋記浮屠氏嘗有内􅀚之偈矣其􅀁謂内觀者役心以􅀚心有說者遂謂以聰􅃪者聾􅀵以氣聽則嘿而有雷霆以明視者瞽反以神視則􅉂而有嵩華皆畔吾心學者也儒先生闕之儒先生􅀁謂内􅀚蓋聖人示人以自撿之幾也故其教法施諸弟子者往往發是幾是之返照返照而後有以自悟其􅀁學謂之内􅀚之教子使溙雕開仕問子貢與回也孰愈以從我于海屬子路皆發以内􅀚而使悟其􅀁自得者何如也至于顔子曾子則得于内􅀚者大矣曾子之言曰吾日三省吾身吾身孟子推之為守約他日竟以魯得聖人之道者此曽子内􅀚之大者也顔子之言謂瞻前忽後而獨有見其所立卓爾子貢推之為聞一知十曽子亦指之􅀂無若虚他日意以遇而得夫子之道者此顔子内􅀚之大者也學子吕恂以内􅀚名齋而請記于予故予示之于聖人之道教安之以顔曾之學叨戒之以浮屠氏之説云中定齋記道至于中而定母一越乎中譬之衡也首尾軒輊豈有定則乎道不適乎定則為仁兼愛也為義為我也為直證父也為㢘離母也為敬名居也為公賣友也為不義焚妻食子也其害道可勝言哉堯以天下傳之舜無佗言中之執而已舜之治天下也用是中而已然子莫辦執中也子莫執而無權是中而不知適乎定則者也故聖人立中之教曰君子而時中使人用中之有權變難然􅁠度未易精也權度未精中固未可定也中之何如宻于惟危惟微而安于無思無為萬物之紛起紛伏于前者不逃吾掌指而與之釋然于兩忘之間世吾􅁠度之至也若是雖乾坤之開合古今之往來亦不越吾一定之内耳矧萬物乎姑胥申屠生衡予既字曰權而又名其治業之齋曰中定衡遂始志齋故為志如此約禮齋記吳興􅃽生毅予既名其讀書之齋曰約禮生遂有請曰願先生賜一言書諸室以警教也志之曰聖人之道其高如如天其浩如海返而求之穹焉莫知其􅀁郎蕩焉莫知其􅀁之至于老死而不得者以無䋲尺為之約也禮者􅀁以為之䋲尺之所也此聖人以道教人而必正以禮所以約其歸也聖人之道髙且浩者若無紀極至約於禮則有極矣老荘氏善以閎闊之言言大道而聖人之徒無取焉於逍太髙而絶禮太甚焉聖門弟子稱顔子始焉求聖人之道仰之則彌髙鑚之則彌聖瞻之在前又忽焉在後已如有􅀁立卓爾者竟以約禮得之學顔子之學以求聖人之道在是生也生勉之學詩齋記吳興陳生魯從余于雲間學經業且曰某不敏未敢學先生之春秋而詩者實與春秋相表裏也願先生學詩而復及于春秋也且名肄業􅀁曰學詩齋請記一言以自朂孔子曰詩可以興可以􅀚可以羣可以怨之數者豈泥于章句文辭之末者所能得哉孟子論説詩者不以文害辭不以辭害意而以意逆志是為得志此孟子之善學詩也又曰詩亡然後春秋作蓋孔子録夷王之事而三綱五常有不忍言者矣故者誠未得于詩又烏能得于春秋也哉上亦有理哉雖然食魚而味者不知有食熊掌而味者不知人莫不飲食而知味者鮮矣故善學詩者不知有春秋善學春秋者不知有詩非謂二學不相通也學經也於詩知食矣食而飽矣而味不知則謂之善學詩不可也孔子固疾夫學詩而無知味之得者矣其曰誦詩三百授之于政不達雖多亦奚以爲生以予言勉之授他日授之政也雖蠻貊之邦行矣奚往而不達哉鈍齋記常城之西有家塾爲經鋤而世以詩禮傳家者爲倪用宣氏即其居之西偏顔之曰鈍齋者則用宣燕處之室也用宣之人父富陽公予之舉主用宣視予猶叔也遂以鈍齋請志于予且曰某不幸早孤稍長即承門䕃役于筦庫之賤者三年志不􅀗伸而養廢于親學廢于一身一旦勇自棄去題讀舊書以待吾豆觴母氏欲爲世之趨走縣簿站站焉效鷹大之役以圖躁競之進者吾不能已故名齋曰鈍云余疑用宣出紈綺家皆秋鼎茂宦軔之發如舟縱下水鴻迅順風而遽以鈍自其豈其情也哉惟其豊于用而局于地至于龍辱不驚遲速不較此非其學力之素則天資之時也余悼世之士峩弁髙之于連嶁列埒之間尋竒闖竇病于隴断􅀅一以捷于進也不知足一躓則没陷穽車不免爲人僇其捷何在哉回眎鈍齋之鈍􅄖游于水之陽山之北上有垂白之親下有舞褓之僮外有賢師良黨之交際樂其樂而不知世有崇髙􅁠貴炎冷榮悴之一去一來者其相越豈不霄壤哉用宣之師為張安國氏友為康伯齡氏以具獨到之資加之以師友之學用宣之光其先而載德乎其後者不可量已外物之一利一鈍又鳥足以計吾短長也哉則齋記吳興趙生名柯字仲則又目號其讀書之室曰則齋生以大父府判公與予同仕于台而其外舅府推吳叔巽氏又予之舉主也遂以則齋求説于予予惟生之則取義于伐柯之詩中嘗庸取是詩以證道之未嘗逺乎人也夫求柯于木其柯之則在此柯矣人猶惑于彼此晲而視之猶以爲逺也治人之道扵此取之未嘗逺也以爲逺者何異睨之爲惑者哉聖如孔子而曰君子之道四丘未能一焉故其治已也以求乎人者反于吾身而已生能以孔子之自謂未能者不敢不勉則其在是矣傳曰能爲人則不爲人下君子之欲上乎民者無是則其可乎故推是則扵身也則容止可􅀚進退可度矣推是則于民也則畏而敬之則而象之矣故曰君子動而世爲天下道行而世爲天下法言而世爲天下則子乎此則之極功而學之能是也生以是則勉之哉至正十年冬十月卄有五日記月山記月有山乎佛氏謂月中之景大地山河謂之月有山可也山有月乎趙知微登天柱峯得月于隂梅之秋謂之山有月可也夫月者水之精山者石之積也水與石不相入而未嘗不相入也此彦明氏得月之山以爲物之竒㑹也彦明者昔爲開化縣得此于金錢溪上􅀌峯特起如一弁今之顛有白章若月之􅁌彦明喜之若􅀗拱璧曰溪石金錢而溪之神不以錢凂我而以此月之山吾烏得不拜神休以爲竒也遂名之曰月山且繪爲圖出以示予請月山記余􅀏曰此月山之假耳圖益假余何記吾􅀅與子梯九節杖挾飛仙以遊于廣寒宫以俯􅄃乎海内外之名山又􅀅東上岱峰萬仭之頂看黄玉輪出九地底此全山之象全月之真恍乎惚乎得諸泰初之鄰庸衆人之烏覩者也予能從之乎彦明曰吾不能吾已得之月山之月云至正十年十一月三日記小瀛洲記神仙之説八方有鉅海鉅海之中有仙洲十瀛洲其一也漢武帝嘗廵東方朔曲室問十洲所在及方物之名謂瀛洲在東大海中地方四千里上生神芝玉石山髙千丈出泉如酒名玉醴泉飲之令人長生洲上皆仙家其山川風俗似吳中然其所也可聞不可到也故秦王開館選天下學士其中地位髙而人物勝天下比之登瀛洲云吳興楮夀之之居有水木花石之勝名其堂曰小瀛洲夀之宴于堂上以記請非徒以山川風俗似瀛洲也以其前之人有居瀛洲十八士之列也夀之之先出瀛洲學士亮亮子遂良居杭其後有􅀙湖之南潯朱塢庄者遂為湖州人夀之蓋瀛洲學士若干世之孫也夀之伯仲凡四人子姪凡十餘人自五世祖淮安縣丞由科第起身代以詩禮傳家夀之先府君棄世仕侍親夀之伯仲皆有仕才而不仕其學而仕而都清髙之地以繼登瀛之榮號者不在諸子乎予又喜諸子皆聰爽善學問諸父益輕金重名師之聘師有不憚千里而至者吾知禇氏子孫光繼祖亮者的的有人今日居小瀛不為異日登大瀛之階乎問其所者又何必指神芝醴泉曰玉之山乎而况山川風俗之美􅀋吳中者不在他此也書諸堂為志至正十年冬十一月序愛日軒記予讀楊子書至孝子愛日未嘗不掩卷為嘆嗟夫孝天誠之出也惟其自知日不足者吾知孝子之天之誠也吁樹欲靜而風不寕子欲養而親不待此孝子愛日有不能自已非有使而然也故曰孝天誠之出也愛日誠之至也錢唐市中有金孝子鑑者築室於舍之南以養其親顔之曰愛日取楊子義語也吁金孝子之養親殆出于天之誠之至也期于斯而省焉夕扵斯而定焉出于斯而告反于斯而面焉至于問所欲推所與承所欲以行無不一于是孳孳養親惟見其日不足也謂金孝子天誠之至非歟吁愛日之書蓋孝子天誠之托也昔者仲由賤食藥藿躬負米百里于親在之時其後累裀坐列鼎食而悼其親之弗及也吁是有愛日之誠而不能俟乎貴富以為養者也狄仁傑親在河陽登太行見白雲􅀌飛以為吾親舍其下而晚望弗及吁是有愛日之誠而有不能恒在膝下以為養者也金孝子者家有奉親之資又不肯輕仕以一日去其親盖不俟乎後時之貴富不在逺方之咨嗟而悼恨吁金孝子之養親豈非人子之大幸而能乎季路仁傑之所不能使愛日之誠始終無怠如大舜之慕其親者吾為記兹軒于後子孫耳後子孫皆以爾孝子之心為心是孝子一行純推為一家之政又使天下人聞其風而興起焉孝之子感子人而動以天下者不可勝用金孝子之行為世教之係者又豈小補哉魏生本信持其卷来于是乎書為金孝子愛日軒記脩齊堂記吾州諸暨有東西施家西家之秀鍾於苧羅美人而東家無聞焉至宋始為施宗聖者學行尊于里閈人稱為東丘先生東丘先生之後有鍔者紹興中進中興雅頌子姓由東而西多隐處吳門吾入吳得諸閶􅀜之外為仁傑氏其先蓋目越來者殆吾邑東丘之後已乎吾初未識仁傑氏呉中學子張守中年十四稱竒童能夜誦經史書數千百言日課大經義騷賦表章若干首貴官女及里中多田翁爭壻張氏子而獨為仁傑氏所先可以識其人矣仁傑嘗招致余于所居堂顧其題顔曰脩齊吳興趙魏公之所書也因擎觴拜以請記余視閶關之居皆貨財之亭而其人皆立方商賈之人也日出而蚤營日入而未息所與言者皆錐刀之未乾没之計也與之語身脩則曰衣被文繡耳與之語家齊則曰峻宇雕牆且烏知吾聖賢大學之道哉而仁傑乃獨㧞乎流以大學之學自律仁傑蓋古權魯長者也素孝友于家孟子推大學之教曰國之本在家家之本在身是知一身修一家斯齊矣一家齊一鄉斯善矣達而推之千里之治廣而充之四海之均不過一修齊而已耳大學之言曰一家仁一國興仁一家讓一國興讓感應之機其捷固如此脩齊之化行又豈獨善一家齊一家而已哉吾聞吳俗多好内而外尚勇有逞匹夫之闘而殘厥軀惑于兒婦之舌而亂厥家者聞施氏之風豈不有愧哉施氏之化行則吾之記斯堂庶不為空言也矣至正十年十二月十日記南樓記信都呉公僑居吳興築樓岸霅水北枕蒼弁金蓋玉几諸山拱在離嚮因命樓曰南且以自號置書萬卷樓上一時名士考經斷史及東南民事必客是樓余亦在客數而徴記于余余謂南樓在武昌于晋􅁃亮氏代之貴家富室髙甍峻宇偭陽而樓􅍥玉帛栖歌舞以都山川風物之勝者以萬萬數而亮後無名焉越數百年而吳公之名于吳興者繼之豈非樓􅀝扵地之靈而地又􅀝于人之傑也耶雖然亮非人傑也亮本荘老氏學善清談之士也識闇才短徒以周公親受重顧四海惻心奸臣肆志非賴二三方岳則未度之國幾至大􅁦未路之窮至欲竄山遁海不獲巳為蕪湖之出武昌之駐其在武昌也未聞有所經略顧欲任猜忌􅀧大臣諸左吏皆東閣之物又未聞雄特其中月色横陳秋思不淺南樓之登徒與浩輩談詠光景曽無裨于中州多故越雷池一步也其才不足與有為如此今公以方之學相家之英既出為天子耳目剟除奸惡登進忠良遭呉喪亂又出而身任城社之重而樓與門客寮友之所講白者皆經國之道和濟時艱之䇿也今日之吳興豈與昔日武昌同一秋月哉吁秋月無古今而人物有古今庸詎知天今人之不􅄖于古者也耶登斯樓者􅄃山川人物之勝又安知無善賦大夫飲酒山川之神以述大業頌隆乎以鄙浩輩之所談詠光景者哉書諸樓為記公名鈞字元播乎章冀國之季子御史中丞南囱公之仲氏云至正十三年夏五月記生春堂記嘉禾謝玉淵氏名其燕處之堂曰生春取靈運西堂詩句也京兆杜伯原父既為作小􅂐書之而又徴記于予予嘗過其家必讌予堂之上講春秋經學嘗扣玉淵曰聖人以春一言加王正之上者非史氏文也春秋第一義也傳經者盧周正非春則曰夏時冠周月吁寅正始春人所知也又豈知子止爲春之生之始乎論三統者以十一月乾之初九陽伏于地故黄鍾爲天統春之所由以生而爲萬物開闢之端也使聖人假寅正于子月是天時懸隔于王正者常兩月也何以示信于人乎生春之義莫深于春秋又豈汝家容兒吟弄草木者所能知乎玉淵避席曰謹受教予曰未也吾聞幽有谷也壌美而苦寒五穀不生日草不值工律者一吹而春氣應草木生人之相天時有如此者今深山窮谷豈無固隂沍寒厯春氣而不毛雖太陽仰煦而有不能及者使律氣均應不毛者皆生生而不已君豈無術乎郎生春者惟之物有彼其賜者矣母徙資之夢寐之間為吟哦之具而止也玉淵崇酒攜觴鞠而謝曰某不敏不惟受生春教且受春秋教也至正十三年七月十八日記尚志齋記余讀陳勝傳未嘗不漢士非志不立勝以燕雀待傭儕自待其志為鴻鵠勝之志在富貴後亦訖不誣吁勝人奴耳矧不為勝者乎聖門弟子如顔淵曾點季路公西華聖人必以志發之諸子之志無大于顔子顔子願得明王輔相之故其善適天下而無所伐勞過天下而無所施若顔子者所謂大人君子之志非歟孟子曰士尚志尚如尚服尚車之尚蓋導而主之之辭然尚一也而志有不尚同不可以辨也崑山吕子正氏名其燕處之齋曰尚志蓋其友張希顔來謁記予謂子尚易也弟未知子志安在子正曰中也學于聖門者徒切有志焉在李氏路之聞也顔何敢哉子謂之喟然曰予之志不鄙矣推是以往不為顔子也吾不信也顔子未違陋巷之人耳使違也則春秋之伊尹也學顔子學志伊尹吾不以望子正其誰望子正年方踰冠而好學不􅌒事承父以行其志未著也而所尚已如此異時秉志以奮吾知其無能禦者兵書齋為記至正八年夏六月記藍田山三一精舍記藍田山三一精舍者桐廬姚傑氏之所創也山去桐江北三十里北負鍾阜與周顒氏隐地伊邇其東香爐峭壁紫烟瀑布如白蜿蜒掉尾雲際西見天日南見髙龍冠停蓋佇江水帶其下如玉虹在地繚山而去此藍田形勝之會也宜有仙人􅇣士之所都而傑以三一精舎據其會剏于至正甲午落成于明年予過桐江欲抵其所而未遑傑乃圖山水状及其營造歳月介予徒章木求言以為記予詰三一則曰三者孔老釋也一者道之歸也其位著中聖人尊少文昌之殿釋左之老右之予疑三一者既推尊孔氏而孔氏之不左右不無徒也何敢老釋耶則又曰道之大者莫如吾聖人其岐而去者為老為釋吾􅀅約其岐而歸之大而正者此傑意屯近代縉紳大家廟制不講旁營三教之堂且以孔聖翼瞿曇之尊其侮聖教大矣傑也廼扵吾陵道夷之際挈而尊之彼二氏者􅀂在弟子之列化異端歸皇極使俱知有君臣父子之倫禮樂刑政之教民之秀而出者不没溺於虚無寂滅之歸豈非傑之用心􅀪而推也化者廣也故予樂為之書使詔諸里以垂諸役人不終為異端如周顒氏之惑也世教之補渠曰小哉公名僕字君用裔出唐之少監合年八十耳目精明結廬於雙柏間以文酒自娛其天年學者尊為柏庭老人其養徒之田世入主奉者凡若干畝砧籍見碑隂云松月軒記吳興東去􅀂干里其聚為南潯褚氏樂閒君之世家在焉至正甲午先廬遭兵燬其子質字彦之重刱別業朱塢溪上蒼松夾徑數百植林下石床雲磴􅄻以重軒時焚香讀易其下月夕則鼓琴或歌騷或與客嘯傲賦詩仰聴虚籟俯席凉影儼􅀂物外境也遂􅀰松月扁其軒不逺二百里走雲間請記於予予交其父兄幾二十年彦拜予為父行年祝之異姓姪義小可老懶辭夫蟠根錯節貌風霜心跌石閱歳寒而不與家章樹同腐者松之操也乾坤一氣之清中為大隂麗虖而與日代明以成七政之功者月之徳也彦取託於松月松月不在松月而在吾氣之一剛方寸之明矣爾祖瀛洲學士遂良任顧命之重當逆牝萌亂之時不以萬死懼抗顔而極諫厥忠盛矣彦為其雲耳音仍甲午諸兄罹不測之禍彦捐軀之厯險誓不與共天必復其仇而後已遂良稱孝忠彦氏稱孝嘻人之行莫大於忠與孝也使彦上人之朝當大任必䏻操大節又何忝爾祖哉吾所望於彦者在此其託物於剛與明者於松月間之豈果騷人墨客玩㺯草本者比哉彦作而謝曰某雖不敏敢畔先生之教請書諸軒以為記龍集已酉秋七月初吉書竹月軒記詩人以月配竹者目六朝無聞焉李謫仙有何處我思君父台緑夢月月􅀉於夢而不在竹也六一翁有顔侵風霜色病過桃李月月寄扵桃李而不在竹也老杜竹送清溪月月又兼以溪言也惟老坡明月浸踈竹始宋竹然坡得此景於方外之虚寂堂耳而未見於士大夫之家見扵士大夫之家吾今得於雲間義門夏公子益中之軒予嘗夜宿其軒少焉月出竹頂益中坐落其下仰見玉立數十喬挺秀疎朗􅀂空谷佳人􅀅儔挈侣訪至扵虚庭蹁躚盤礴不忍去而不知清夜之徂也已而主客相與酌酒盡醉脫巾掛疎枝成鼓琴或吹匏擊石與玉立君鏘璆相稱春應􅄜縣扵天而景散在地鈞韶鳴而龍鸞舞也是時主客頽然就卧忽不自知其身世在白玉闕中軟紅塵裡也席上客遂各賦詩明日連書諸軒主者因以竹月名軒而推余為竹丁志益中清年而才氣甚老尊師樂友化勢利之俗為禮義之鄉忝奕棄義門之後故藥為之書東維子文集卷之十四

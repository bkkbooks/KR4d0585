body:
  text: 會稽鐵厓楊維楨廉夫著記借巢記五十四借誰借得客有號鶴巢者自杭而蘇而松率假館以居予一日過其館改命曰借巢或有笑者曰鵠有巢而鳩借之鳩之拙也鶴不能營一巢而借亦拙甚矣乎楊子啞爾笑曰子亦知夫借乎人一身外為長物物皆借也吾試與子言借衣冠借以束身棺槨借以掩士石借以周郭山嶽借以積土天地借以奠岳極之以大則大靈借以闢天地何莫非借也近而言之琴筑借聲繡綺皆色芻豢借味鼎釜借烹刀刃借割壺豆借盛金玉借翫席借偃而策借扶也車借駕而馬借馳也旗幟借表而弧矢借威也印章借信而露布借令也􅁠貴借勢而封爵借名也逺而言之丹青借圖而金石借刻載書借誓冊府借史而聖人百家諸子之文借以寓道也又何往而非借也及其親也妻借齊子借嗣父母借生而吾六尺之軀亦借也吁借乎借乎何啻于一巢乎或者起謝曰淺矣乎吾之窺借也吾因子言借而知天地萬有之不有于我也楊子曰吾于天地萬有皆借也而有不借者在何在也曰以天地萬有之借為借者萬有之客也以天地萬有不借之借為不借者不客于萬有之客者也予徒知吾有借而庸詎知吾不借之借而不客于客者耶不客者誰曰問諸有物有物問諸有初有初問諸有無有無不可名全以各其巢居客起謝曰請書為記客為隴右邾經也營丘山房記贛之吕仲善氏早􅀌事母劉以孝聞長從鄉先生一静謝公逰通易經以其餘力屬文賦詩頗有古風裁聖天子一海宇招延俊乂善以異等才登選胄子齡有錦書室在錦川之陽陽坡之下貯書數百卷題其顔曰營丘山房示不忘其義于前聞人也出使于淞謁抱遺先生于草􅀇閣曰願先生一言以白吾志先生曰營丘在虚危分埜為今濟南地太公吕尚父之食邑也太公治齊舉賢而尚功至十四世為小白主覇以管仲富國匡天下而太公之澤益逺且大孔子曰微仲吾其左袵矣多其功也太史公曰太公尊賢智尚功能而其敝則夸奢虚許而不情傷其俗也善欲振其緒于營丘而又直明天子之登賢以圖治其以仲之富國匡天下者為勉而以俗之失不情者為戒則可謂善嗣營丘者矣善謝曰請善為記戊申冬十月朔戊辰記南漪堂記華亭葉生杞家有林塘之勝在黄龍浦西蕭公津上讀書之堂南臨之故名南漪􅂎謁予草􅀇閣求一言以為志至四三而不已為之言曰昔眉山蘇子嘗有是號矣而生之堂又襲之耶雖然襲其理之所得何嫌于襲耶善言漪者莫如易之渙其田風行水上渙此漪之極􅀚也説者以為風與水相遭不能不為之文也此漪之説文也予以為漪之所以為漪蓋有為之本者其可不知乎今夫水由地中行源深則流長其發岷峨越崖谷衝林莽傾折回直束之峽匪之為渦激之為湍瀑千變萬態不可踪迹然後達于江河以朝宗于海有本者如是哉苟為無本溝澮之水朝盈而夕涸求一漚之微不可得奚有千變萬態極􅀚于渙之漪者也􅂎也有意于漪其亦于本者求之否乎􅂎詐曰唯唯純白窩記用聖經代老荘獨為高出華亭縣北距六十里其聚為小萊其吳越裔孫為皐氏先廬燬皐復新作又於堂右个闢􅩲一所上結圓項下方四落皆垔為雪色泥竇牖六又以雲母片四幕之渾然氊穹廬也名之曰純白皐嘗宿余扵窩且徴純白誌賁之上九曰白賁無咎以其反本也天下之文莫文于白文之純又莫扵本反本也吾聞臯壮年通經史及國語間弧矢􅀐以義俠厠狐貉游徼問名貴人爭欲致門下盜壓竟臯呼鄉兵甲捍于淞隂鄉賴以安又以白衣􅂙諮替帥越者却冦酋復紀臺活遺黎數十萬今齒及莫矣功亦茂矣假亦可體矣故斂其神于反本之地此純白之所以名也臯有四子若孫者五皆玉立庭砌問􅀅有賦白華稱潔白于時者又知臯之反本貽世世亦無窮也臯氏子孫尚勉乎哉至正庚子夏五月蒲莭後三日寫薌林記淞之邑帶江枕海聚為山者曰笴曰雪曰神曰小崐小金地皆平嘗大陸呀淵疎川突而髙鬱而秀蟠而踞之者則喬木之林大姓之所宅也去邑之北五十里其川為蒲滙北反為小菜崖小菜古屋百十楹者九齡徐氏之居也去居左介一百步鑿池數十里池上植松柏枯檜桂椒梅橘桃杏草則芝蘭菊芷荃蓀薫茝鉤連彚列四時之生香未嘗一日斷也因額池塘曰薌林子過海上九齡榻予堂者數夕臨分岀楮筆曰先生海上還喜咲怒罵皆成文章醉墨所及一草一木有光于薌林獨無言乎予曰草木之香細矣因人而馨者大且逺矣哉松柳以處士香晋竹林以七賢香濂溪蓮以茂叔香羅浮村梅以蘇長公香草木不以物香而以人馨也信矣不然雖梓澤乎泉林木之綺交錦錯者不香也吾愛齡之人品魁壘操行極髙茂嘗與予論今人出處曰今之稱豪傑者彎弧運槊走戎馬間水出火入即可苟且頃富貴高者摇頰鼓舌閎聲髙議以驚動所事自謂陶王鑄霸以徼其所實而爲士之大􅂟不知大􅁨者在其踵觸羅踏穽卒自跲路而楇及其孥權不能庇勢不能掖嘻􅀂是者懵甚而悖亦滋甚予不卒扺囏幸戲極返故廬與一草一木同華而共實先人之賜先生之教也予聞其言韙之曰此吾子之德馨也馨之被於薌林草木者也故樂為誌薌林并録其語為學之信且悖者告也固齋記新經有鄉善士戴氏父者遣其子貞從予逰一日有請曰貞承父名於父承字於先生曰固而藏修之地未得齋號以自勵敢請予又字齋曰固且求志予吿之曰固非髙叟之固也亦非固我之固也乾之爻言不云乎貞固足以幹事貞不固不足以為貞固非貞亦不足以言固固而貞貞而固而後事之幹立焉故聖人許幹而必以貞固而不以亨與利也生學與齒俱進􅀅入于官而有亊于政已曰易之所固者植其本于不㧞本而幹幹而枝枝而花花而實伺之歳月不患其不茂且顧也生之貞母替于固也復有喻生于固者唐城南諸杜所居號居社固以其風氣所聚也宗祖所族也子孫所完也後為妬者鑿之血流者數日而固者崩矣杜抵固從而哀矣地不可以不固如是矧君子之操行乎生力完所固母自鑿也榆溪草堂記至正庚子夏四月余東逰鶴砂回舟順流下黄龍浦又東抵榆溪見大榆數百章皆百年物也雨餘新緑蓊鬱若屯旌擁握樹底構草堂一所堂主者陶中出迎客供茗飲床書充屋棟茶竈筆環左右又􅀅客步後圃花樹紅白刺人目折殿春玉桃花一枝供客是夜遂宿草堂明早干余記草堂之號周顒嘗搆諸鍾山杜甫亦搆諸浣花矣然鳴騶入谷而山靈見余脱巾攄床而幾不免禍天下草堂萬萬也而享有其身者尠矣唯爾祖靖節翁自彭澤來歸門種柳著傳以自况羲熙之節良史書之五柳之德色者厚矣今子孫不堂栁而堂榆榆視栁等也烏知異日不有傳榆溪先生在龍浦之東如傳晋處士以五栁者乎中曰某不敏烏敢望吾前人之請記為堂以為警槐隂亭記三槐見周禮有三公之象焉宋王祐氏手植三槐而三公之位應于其後文正公且君子謂王氏之槐種德之苻也海東王敏中氏為三槐子姪槐之樹之閭者亦三結亭樹間扁曰槐陰大􅂙周公􅄾爲作􅂐書之又介吾門管生納求余言爲志吁王氏之子姓何其祚之逺也祚之逺者德之長也晋大司馬府豈無手植之槐識者占其樹婆娑而生意盡知則司馬氏之槐不知文正氏之槐開其先者厚而䕃其後者長非尋常府寺之植可得而並稱也敏中席槐之隂思有以培槐之本則豈徒借剪伐如齊人之令仁以根其生義以幹其行忠信以要其成也盛德大業其有不光相門之植文正之堂虖敏中勉之有以徴余言之不誣也至正庚子秋記并書于挹清堂春草軒記有詩淞謝伯理氏於其正廬左个爲謻音移軒一所命曰春草本靈運語也請予為之記予疑靈運以詩名宋而猶附麗于人以覔句何也在西堂時詩思苦甚至假夢寐見惠連而後得池塘生春草句遂以為竒絶吁此三百篇後詞人以興趣言詩者也律以六義何有焉今人以一草木取以􅀧綴篇翰極于雕鏤之工詩道喪矣談興趣者猷以靈運語出於經辭直指如髙臺多悲風明月照積雪無俟雕刻而大巧存焉猶為去古未逺也伯理嘗與予論詩大惡凌胯大朝上探漢魏故于春草有得焉雖然伯理方􅀅以詩備理教及扵民豈必効永嘉詩人爭工扵句字間者具􅂟在堂上年俱髙矣朝朝下音潮焉有諭焉者夕夕焉有詰焉者于是家庭之教出焉倫理之化行焉家有悦親之堂不忍一日違其色養吏部以品推恩及其親自謂岡極莫之報時詠孟貞曜寸草春暉之句是春草所托又有關于倫理者惜永嘉詩人未之知也吾今以論見春之資于倫理者不獨在句字間也係之詩曰草生西堂下沱水含清溺皓髪在堂上逰子今已歸大兒佩紫綬小兒著緋衣嚴君親㖟禮慈母舊斷機春草承而露惟􅂲朝日晞願特此日意永報一春輝悦親堂記謝氏由陳㽞徙淞者代有文行為衣冠望族至德喜封君養髙弗仕主産益饒門苐益大至正丙申苗虜陷淞封君廬亦燬明年復新作之其子伯理率其二仲奉親于一堂晨昏于斯不使㭊處以一日去其堂予嘗名其堂為悦親今來杭遂以記屬予世之以為悦者無大于悦親矣子夏問孝于孔子孔子曰色難父母之色間見于幾微者孝子迎而順之為難迎而順之不難者必孝子有至敬至愛關于親者切若曽子之養志者是已孟子不云乎悦親有道反貝不誠不悦也誠者至愛至敬之謂也今天備羞水陸列伎聲色百拜上案于親者非悦也華服飾竒器金玉寒更燠換于親者非悦也鍾畝阡連子本泉溢歳上劵於其親者非悦也必悦之如曽子者而後可伯理事親尚友曾子悦親之道義有加于此矣雖然伯理方仕鄉郡出有民社之􅀉以其悦者身之昆弟循之而後國人因之所謂父子兄弟足法而后民法之矣理之弟曰恒曰鼎皆嘗從予逰恂恂然有古孝友之風教師于百世者有矣豈直國人一時之法哉異日和氣應孝之門吾見瓢水之易風山之隂有同穎之禾并柯之木産焉田氏三荆有不能嫓其美者吾過封君堂上尚能為子賦之至正已亥秋九月丙午記好古齋記鄉友俞瓛仲桓通經術自命其讀書之堂句好古來杭請記于予予為之喟然曰古之不諧于今者乆矣敦以古為好耶三代下嗜好百出好酒而鍾以隨好傳簊而牧以亡好勇而舉鼎以説臏好獵而隊車以隕首好游而賈害以利好詼諧而售辱以戲好書而汚髪以為顛好畫而􅀼封以為神好鍜而倨以取禍好石而拜以取喪好鶴而乗軒以取滅國所好不同而所失亦隨以異惟好古為聖賢之學俞好俞髙而入于聖賢之域而凡世之所好者不一足以動其志此好古効也今之人不古好覆以好古為野謑髁無任慆摇不道遂至毁綱裂常自謂行于今者横如也不知歩跲者在户限外吁亦足省矣蓋孔子嘗曰先進于禮樂野人也孔子之時已待古為野而孔子豈敢以野待古哉故曰我非生而知之者好古敏以求之者也仲桓也生後孔子幾二千年不溺于三代以下之偏好而獨追孔子以為古者而好焉非有聖賢之學不能仲桓今仕矣任氏社之責矣以其好古者行于仕也吾見民之生于古而毁綱裂常者無以容于今孰敢以野議好古之古哉桓起謝曰謹受教請書諸齋以諗夫議古之野者至正已亥冬十月初吉記尚朴齋記太樸一散勢不極于文不止也殷質特尚猶本乎朴至周又郁郁吾聖人不能不從時而救􅁦之僿則欲從先進之野至用四代禮樂則取殷輅亦貴其朴耳使聖人待位其不反朴于古吾不信也漢大臣師蓋公還治于清淨無効至寕謚三業之君又當率朴爲天下先幾致刑措此朴尚之効不可誣也惟楊周信甫以尚朴名其齊介松江守顧公謁記于予予未識周君而顧公稱周君篤厚古君子務以一朴存心而待物又以之佐太尉府収行簡之効則知周君傷時之僿欲返治于古其亦慕聖人從先進者歟其亦蓋公之可師于漢大臣者歟今天子法漢治文之太尉菲食惡衣以承天子之化周君又以朴尚賛大府之政一朴之係于天下者大矣朴名一齋固不得為周君私也故予不辭而為之記且俾淞之能詩者頌之如后云虚舟記平原生居九鳳之山以虚舟扁其一室客有道而詰之曰聖人取諸刳木為舟以利天下舟濟世之具也而子以虚名之亦有説乎生曰余族居海堧見鳳夀倅作佑客之舟兵入漕人之艦如山如雲胥溺没于蛟鼉之穴往者不返而來者未已也嘗作吊溺文哀之而願余舟孰得而溺乎客曰子之虚舟􅀅何載乎何適乎生曰吾舟本虚復何載吾舟本往復何適客訾之曰子之舟殆不如丈尺之朽槎乎槎神而能引客道天漢逰牛斗間子之舟何以自神乎生未知所對厓山鐵道人在座隘而笑曰客欲知天舟之神且大者乎天一氣也氣水也地一舟也地至重而浮游于一氣旋薄之中未嘗溺也非至虚而至神者能之乎客以丈尺之室視舟亦隘已以大地之大視舟則舟之虚者大虚無以尚之若是則果老之舟鐵務相之舟土絡南公之舟葉以之稱神者末矣客退往生出楮筆讀書為記生名曠姓陸氏雲間人也鐵道人泰定間李忠介公榜第二甲進士楊維楨也五雲􅌪記雲天地之靈氣其興也勃焉其滅也怱焉不可以色求而色之變出焉或以青以黄以赤以黑矞以同以三素以五采而名亦隨之變偽者談五雲有以望而知帝者之止占而知賢人之居夢而文章之進兆而知名進士之出又托而爲蓬萊仙境之求而未有命之于居者淞之璜溪吕希逺氏吾以五雲名其居則亦有說希逺當客杭從句曲外史張公遊思其親不置外史爲揭其寓曰白雲取狄公思親意已而歸耕溪上養母以孝聞且廬其先墓林薄間曾見非烟非霧蕭索輪囷具五采以鐲人者吁此五雲之瑞孝感之應也吾得諸璜父兄之言易其名為生存者若希逺氏之不忍一日去其親奉􅂬菽水于流離顛沛之秋此非人瑞而何有人瑞而後有天瑞或者徙以占俟夢寐賦詠山幼求生之五雲者未為知生者也余故著其説録諸窩為記文竹軒記潼川文同氏自館職乞外調屢厯郡守有治􅃺官至司封員外充祕閣校理其髙情曠度􅀋神仙人文章有丹淵集不在一時疇輩下顧以畫竹知名伎掩其人君子所惜在洋州時搆亭篔簹谷為游息地故於畫竹益工時作古槎老枅淡墨出神謂之墨林蓋非丹青家所能匹也評其妙者謂其胸有竒氣壓十萬丈夫者非繆雲間義門夏士良氏博雅好古蓄書萬卷外古名流迹墨舍金購之弗悋于文人才士之圖寫猶所珍重居之􅒾偏有肅客軒名之曰文竹者有文同氏墨君子之澤也士良蓄畫凡百十家而獨名文竹於軒非文氏之墨君可貴三百年之清風雅節可詠耳雖然簹谷多偃竹同特愛之嘗畫以遺予瞻氏曰偃竹數尺而有萬尺之勢其詩曰待􅀅一叚鵝溪絹掃取寒梢萬尺長偃竹有不可偃者如此與可以之子瞻以之士良之所藏作於簹谷不簹谷不問顧亦問只尺之素有方尺之勢不可偃者何如耳士良仕忠未伸必有得于此者不然軒之外林林然麻生而立􅁄者皆篔簹物耳何獨以畫為貴哉抑吾聞夏先人止知公有義荆圖兵餘圖與堂俱燬士良更命荆以侣竹則又弗隊其先緒云五檜堂記至正庚牛孟夏某日予過煮龍浦游海上觀三神山經南北蔡蔡之北者有大族婿者徐亨肅予至其家入其門則深庭別院舉木天也已乃覧其園池之勝林木蔚蓊水石聫絡逐燕一堂亨拜請曰堂未名惟先生名予視堂隂五檜者東軒老人之手植也因名之曰五檜堂又請曰堂既名不可無誌惟先生是誌吾聞東軒老人好修潔精于物理加之談博文史折節待海内士必延飲五檜下人問檜則曰槐之三顯之必於天者松之七隐之必扵人者栁之五又出天人顯之外而以綱常之隆替與吾者果不可必乎脱五乗化而盡五檜者鬱然于庭使後之人見之豈不求之于五檜七松之間耶是則予之名命堂以五檜或者東斬之人其有待余于㝠數者是檜也厯已百年皆森聳竒崛鬛而鱗癭而輪八臂九首而龍其身節甚貞氣甚清掌月而珠擎竅風而籟聲饕雪而鐵撑于以胚松柏之雲仍而要歳寒之盟者乎言未畢亨起謝曰是可與五檜寫神已請書為記東維子文集卷之十五

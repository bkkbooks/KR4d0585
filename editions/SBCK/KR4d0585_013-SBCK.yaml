  text: 東維子文集卷之十三
  hash: sha256:1cacc574f878fa71b22ae7e0095f7f12246c4a34465a982a42b96f2d74e96aa7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_013-1a}
body:
  text: 㑹稽鐵厓楊維楨廉夫著記平江路常熟州知州王公善政記聖天子居臨天下垂二十載周知物情以守令去民爲最近而不可以弗之重也乃下明詔嚴守令之選以作興治道職是者宜其讙忻鼓舞滌濯奮揚以副上德意夫何廉恥日衰奸偽日滋不幸一日有變民環視而起不受條令至殺長吏以應㓂而莫之能禁朝廷又大發兵而臯有不勝窮者遂至兵重不彌解曠歳月而民愈以病告弱者填爲講壑壮者從而汙染綿亘數千里地田萊爲蕪邑里為墟雖有髙才明之智士縮手鈴舌無救􅁦之術跡其􅀁從來皆守令不振職之過也吁民墳之積也久矣存千百於一二而特異於庸衆人職銓曹者無以旌別而司文墨者又無以表彰之嘻何以為世道􅂆邪知常熟州豫章王公其在任五載政平訟理民大和悦既而請老以歸則民懷其德為其立石誌云吏部侍郎貢公平糶記至正十三年春三月中書吏部侍郎貢公奉詔使江淛民陷賊者曲宥之刑殘之家免以土賦朝廷又慮餽餉不繼賑貸不給發内帑錢三十餘萬定俾公于稔地與民和糴公抵吳興諗民有儲粟者􅃪自陳糴凡六萬有竒于時直益其十之二先付直後納所直粟且下令曰朝廷以和為糴官不得齊刑史不得抱案差􅀂等以三吾與􅀂一以和為義官府始笑之曰民病乆矣悍卒扣門叫囂猶不即奉命合􅀂此事其可集耶令曰民為爾給儲多矣今誠待之彼亦以誠應我既而民果聽令相與議曰􅉨時物輸官而直不給雖給且垂橐而歸今公先與直豪髮不以干有司吾何幸也復與平斗斛使輸粟者目㮣司度不得髙下其手縣吏與豪民有假是以漁獵者公微得之皆置諸法父老以乎加額曰公之為政吾前未之聞也廼相與謂其求書其事于后以為平糴后法余惟管仲有輕重之權李悝有地力之教而平糴之法出為大要裒多益寡稱物乎施使民適足而已厯代祖之漢曰均輸曰常平唐始置和糴使宋有博糴便糴之科皆為美制而任之不得其人則亦無異强取也今公以内帑錢􅀂干不經有司之散歛親與民市告以信令民之􅃪之􅀂子聴父不三日飛艄輓舶塞津溢米積于地㮣不暇給未越月廪入于永寕㤗定民不知􅅰而粟已盈數蓋得和糴之本法而足宣上德意也豈非朝廷任得其人之效歟不然彫城瘵郭富家豪室轉在艸野救死且不瞻何所取則而云和糴哉此其事為可書也已漢耿夀昌以平糴便益賜持爵􅀜内侯公入親吾見公之得賜爵也維然賜爵一已利耳吾聞公有篋中書凡一綱二十日皆相扵議大政決大利害而天下資以為治者條陳于上實吏部獻内職也嘻此其利吾人者可一二計哉又南父老之至望也公名師泰字泰父宣城人起身胄監嘗為名御史云時江淛行省檢校李思義以省委事相糴事而郡監亦思哈不與有勞焉故併書之樊公廟食記至正十有二年秋冦自徽犯江浙政府􅂙知政事樊公􅀫衛于省省吏皆次弟引去獨公􅀍甲上馬率宿衛兵不滿伯什急出省攻賊從者心之公曰吾封疆之守不守而去是以私利廢臣道行至省坊口遇它遁􅀅以兵􅀌且散控其馬守返公怒行引佩刀斫其人曰城不守何適遂躍馬逆冦于天水橋巷戰以死公在江浙政府凡二年賛其首相與去樊不為掎旤更中格力以進賢退不肖為已任職雖􅂙實與提衡伯夷稱仁以􅀅軍􅁙首陽天下傷之不得全凡故云􅀅􅁙事見韓非子樊公稱仁以􅀅軍􅀅􅁙天水東南人傷之吁又豈知其自決扵義而之自畏愛有甚於生死者乎義既決雖碎首塗地无悔焉死不安於自决而出於有激出於無􅀗已皆死非義而義利之相去其間不能以寸几遭禍亂有首竄義利以奸法筴者不死司冦幸而死疑似吁何可以亡辨哉故伯夷死天下為之義樊公死天下為之忠與義不可以聲音笑貌掩而得之必決於忠安於素有而天下至尤之物不能易得也自昔死鳴曰雍門龍死狥劍楚囊死銜鬚漢温序死嚼齒張廵死嘔血陳死郢州黄􅀙龍潭州李芾􅀋皆若是吁若是始可與言封疆之臣社稷之鎮矣議者謂全節未必成功也吁節無増損功有成敗無増損者内有成敗者春秋録死節亦計其内而外有不計焉岐功與節以律天下之忠非春秋義亦公之死其僕曰田丁者亦殉生死人比春秋蒯瞶之僕􅀇去公之死兩期月姚園寺􅀚僧雪素杭之人為公立祠於天水院肖公之像歳時祀之樹名于門徵余文以書於是論次其死烈如此公名執政字時申獨航其自號也世為鄆人其世出仕厯見别傳云聽雪舟記陵陽劉尚賢氏適逢今天子龍興由儤直為浙垣胡公相府大賓僚自合其退公之室曰􅃪雪舟介吾徒金信氏致其詞云某於十年前寮先生之風於富春山中願一接見無由今幸軍旅事息鉦鼓之􅃪移於虚舟風雪矣幸先生屑一言為記余異之曰軒以舟名舟以雪􅃪此江湖漂治之竟也夜深郭索聲瑟瑟兩冰竅瘁不得熟寐非烟水之窮旅則草謨之寒漁耳尚負身服鞬櫜者十餘年值天子偃武尚文􅀅陟清階侍鈞天􅀁以􅃪九奏之樂矣其扵雪也奚暇為窮旅寒漁之􅃪哉抑有説聽雪以聲固不若􅃪雪以理者之為􅃪之深也今夫雪出􅀇而尚白似花藏於宻而散放六合似􅀅道集而先霰焉似幾隂涸而合晚而消似時匿瑕蔵疾似量元論髙下夷險一稱物而施似至治若是者雪之其德廣矣尚賢於其具德反諸已而有之則聲不在雪其取數於􅃪者不既乎多矣乎不則雪舟之􅃪窮旅寒漁耳信以是説復命越千日尚賢馳書來謝曰某不敏始識􅃪雪以聲不愈以􅃪雪以吾子之􅃪為至也請録諸軒為記大樹軒記烏江馮侯仲榮氏有先人之宅一區在霸王廟東自其大父某手植三槐今皆合抱為百年舊物侯益封培之扁其軒為大事樹侯來華亭治暇過余次舍談及故家橋木曰吾家節侯公軍次大樹軍中號大樹􅀅軍吾固不知其樹為何木木居何地今予家􅀣出於吾祖手植吾敬之亦呼大樹敢徴先生一言以為誌侯少時以戎行侍主上其説主以治殘理􅁈以成湯武之業與節侯意不殊其侍主晨夜草舍上聲止也或至飢疲與節侯之短粥麥飯亦不殊為人議退不伐亦似之節侯在􅀜中得軍民譽乃召言者咸陽王之譛賴帝曠度釋其􅀁疑侯亦以律外役櫝胥相執臬者劾主上簡知有素柱隨雪而生益大亦眉之平定安集􅀪農羣盜胥化為良鄧禹之不能者節侯能之上海之變脇以逮華華亭名在死籍人不敢任者侯穴百口任之轉死而生者殆萬齒比又節侯之􅀁不能為也取前胄之號以字今日之軒孰云不可侯今去州縣勞陟中書幙府位益高施益大蒼益彰又烏知不㧞於不次使秉鈞軸以贊聖主太平之治大樹之澤其必有振爾祖而大樹之號其不有先於節侯乎侯謝曰某也願力先生之言以赴先生之􅀁期也書諸為記知止堂記世之高士嘗比宦㙂為魚之逆􅂡笱也笱一入雖有具龍之體欲翔鱗㢠鬛以棹尾江湖之間烏乎難矣故淪得而没者滔滔是也恬而避者自陶䲭夷張赤松疎大夫陶處士而下曽幾人赴老子之經有警人者曰知止不殆其言也可與悟者道而難與淪胥者告也雲間老人夏謙齋氏為某監漕官年未致事也即勇退歸里名其燕處齋之堂曰知止是有味乎哉老氏之言哉老人去世已五十年兵燹來堂日燬去其四葉孫頤貞猶能力譲趙文敏􅀁言之顔登扵北山新堂不忘本也先貞力學有仕才丁時艱而不仕知進退出處也使其仕也宦之坑人者􅀎坑其六尺之軀哉今年秋貞讌予於堂以落其顔之新登者且請記於是乎書知止堂記愚者不知止沓者不知止達者知之知而不止興不達等陶朱汎五湖留侯從赤松知止也使不知止則革屍夷族為伍韓二子而已耳此謝公伯禮名堂之義非愚㳫者之所能識也謝為淞望族至伯禮始至仕籍顯官卿部至奉訓大夫年未五十即掛冠歸隐謂其子若孫曰若知夫馬與舟乎舟之隠運也滿風逆航捷若流矢千里可一息逮也貪捷不止則瞿塘灔澦在檣櫓犇突之間馬之馳也星流電掣快意􅀁可朝燕而暮越也貪􅇣不休則太行井陘在衘勒之下吾年未及致事而志已勌矣祖父之某丘某水足以耕釣師友賓客足以觴豆讌樂而一二家老足以主辨王賦苟不止漂蹶之患􅀅在我矣遂以知止命退處之室東藩大臣屢挽而不起至以疾謝免参政周公􅄾既為書其室而復求予記予為之喟然曰伯禮之賢於人也逺矣金之仕者惟患進不鋭升不高孰肯先幾於赤􅀻五湖之侣稱達人扵時乎扵乎上蔡之犬華亭之鶴貽悔其身及其子孫者㡬何人視謝氏之堂其亦少警乎書其説為記守約齋記淞江氏自其曽大父敦武公由棗陽從淮安王南度至其考君澤三世皆以武符襲􅀅門世澤至文裕始以學文換門廕教諭當塗毗陵兩邑升蘭溪縣州正􅀁在有教績自名其書齋曰守約夫世俗之約與聖門之約異服破褐衣飯脱粟飯儉薄其身而一毫不以利於人非守約也佯讓隂竸研極研極利害守鼠兩枌雖文義弗勇於應非守約也孟子嘗曰守約矣孟施舍之為不如曾子之約者以舍徒力於氣而曽子循諸理而持其要者也守約􅀂曽子可矣孟子之心學蓋出於此其功用柸於浩然之氣塞乎天地之間吁守至約而功至大此聖門能事也雖然曽子之約必自博始不博以文不約以禮不烏知曾子之守者哉文裕心學進扵是始知守之守者不足多其於三葉􅀅祖不大有光乎文裕以吾言勉之而已一笑軒記廬陵張里氏居南垣都司而命其寓軒為一笑求余言為立聖門言樂然後笑人不厭其笑余焉知張子之樂何知而必為張子惟笑為何笑乎張子無樂而笑為偽矣誰敢當曾子之笑乎荘子以開口一咲月中不過四五日此概常情而言魏宗室萇一生人笑宋包拯笑幾比何清一笑之難有如此者晋陵雲有笑疾梁王筠見人必笑一笑之易有如此者張子一笑不以樂必居一於此乎不然張子一笑吾不得而推也雖然陳希夷一笑而天下自此定季義父一笑而天下自此救笑哉笑哉可畏也哉吾􅀅質諸張子一笑毋輕三友堂記河間公子李志學氏蚤年讀書九華之山嘗結草堂扵山之陽今仕虎林開元戎府客堂一所為蔵修之地一日􅀅客渡錢湖入茅步登鷲嶺憩晚亭見有三人者草衣木形木客各以辭相提唱一客曰五鬛老仙赤松依裔青牛歸來已千歳仙客元是風雨師不識人間秦漢帝一客曰渭水龍孫􅀌竹種海北波影排􅃢瑚動一竿持􅀉蟠上公釣得雙璜六鰲重一客曰玉龍聲嘶五更了緑衣倒掛扶桑曉梅花仙相見大樹間棃花夢落春雲小三人者見公子各以辭就評公子異之曰赤松氏者蓋傲兀世變而不知有秦付者也􅀌竹氏者治􅀅矣任則蒼姬氏之治也梅仙者之夢覺人間世而􅀅脫履於蠻烟蜑雨之國也赤松似吾初莭􅀌竹似吾志梅仙文似吾不境也三客者行客異其歸一也吾􅀅尚四有之延􅇊於客堂遂命其堂曰三友而顔之其客鉄心道人志之道人者􅀅進三益於公子期與為歳寒交也因録三友辭而為之誌雪坡記淮陽謝公既得余雪坡文曰先生為余立言殆吾座右箴矣然余視今之取富貴者真幻耳亦有味哉請我終其説余曰投雪於爐以開堅者幻也至人者一體諸盈虚消息於雪也目擊衜存而訖亦􅁢􅀁客必於其間吁雪之資於衜者如是幻云幻云何哉何哉余聞淮海之傑五人焉公存中公自㓜喜讀書一遍即了大義年踰三十不屑為章句儒而慨然有澄清天下之志杭為南大都㑹加以師旅因以飢饉雖有大才智不能善其後公守􅀅於斯談笑而理之三軍無驕容百姓無菜色蓋必有度越今之大才智者人不得而識也吁觀其寓雪坡者則得已世之豪傑身罹喪亂私其托於礪京於金塢於狡兎穴自謂保固厥身至若子孫無止不知人境一易如大幻物適偕之以速斃吁可哀也哉惟高識之士得於盈虚消息之外於不可控搏者是托若雪坡者是也已其友俞字齋録吾文去曰知道於雪坡如先生者是為真知蘇雪堂之幻入扵道矣雪坡能味幻其何逺於蘇也哉凝香閣記光禄大夫平章政事張公分治江淛之三年築城堡脩倉􅁃廣亭臺闢田疇休兵息民於是詳延海内方聞之士談仁義講禮樂收東南遺書於賓賢之館而名燕之處士曰凝香徴記於客鄉㑹稽楊維楨維楨喜公之厭兵藥治也遂為之言曰善乎韋應物之詩曰兵衛森畫㦸燕處凝清香吾取其詩有文武道森㦸之兵不忘武也凝香之燕不厭文也文武脩而天下之事無不理矣今士有深山長谷而出者成曰吾聞光禄公善尊賢也善養士也善求善内諫也無不忻忻然相告曰南垣有賢相臣如此民其瘳矣乎光禄公下士如周公取友如仲山甫士友之在其席者有帷幄之籌也有樽爼折衝之道也廣厦細旃之廟謨也非是無以入其室者於是横經綸道之項投壺雅歌之餘清香之凝如大易之論鼎可以凝乎命也凝之㫖也逺矣哉光禄公上以佐天子之太平下以安黎民之永定吾矜凝香乎占之然則是香也五木百藴不論其侈矣瑞麟辟邪不論其貴矣鰲山數十仭􅋹沈沃甲聞數十里者適足以招弔民之闕也呼豈知吾凝之有其道哉豈知吾凝之有其道哉書諸室為記夀齋記論􅀅夀之道者有三李少君謂丹砂可化為黄金金成以為飲食之器則益夀此方技家之論夀也廣成子曰必靜必清母勞女形母揺女精乃可以長生此道家氏之論夀也孔子曰仁者夀子思子曰有大德者必得其此吾儒氏之論夀也方技以術道家以智儒家以德德上也淮隂湯公仁也夀之承㫖趙公嘗為書之於燕處之堂今年登八袠矣為其子者中書省宣使某與諸孫持酒以慶公之髙年宣使某又命座客劉仲威氏不逺數百里求公夀室於予􅀅以光其身而且垂慶於後人也予謂齒踰七十子孫目繫乎四世湯氏之福於夀也不誣矣顧未知其得夀之道出於方技乎道氏乎儒氏乎仲威曰湯公素以書禮教子孫不逮千里明師若劉正安之徒且􅀅捐田若干畝立義塾以淑及里中兒矣湯公豈方技氏道家氏之習乎夫德莫大於文王文王謂武王曰我夀百吾與爾三焉是夀不出於天而果出於德也信矣公之徳充則公之夀可以及其身而延子孫矣湯氏之祖若孫尚以予言之衍澤堂記太史公自敘司馬氏受姓􅀁従上起顓頊子孫宫居功烈文辭下反其身而上嘻世德子孫固不嫌於自銘也明㤗州孔希道氏自著宣聖五十六孫㤗州之􅂀實繇宋朝公端朝出守泰得賜田建家廟於州之東北地因名孔家堢朝散七葉孫瑛仕中山府教授希道瑛子也遭罹兵難挾碑渡江與温衢之派􅂙㑹不誣蓋於世德自重如此所以之舍又以衍澤二籀文顔之來淞首謁予草􅀇閣求言以為志予謂聖人殁千五百年自衍聖公襲封而下父子秀孫得試胄子監以表嫡氏者尠矣况散而四方墜在編戸稍知自㧞㳺庠序以為食或者又以譜裔不自遭黜者不免若希道氏為先聖仕裔欽欽乎恒懼世德之不嗣入吳執經於名師傳且􅀅試有司與胄監之士角庶聖澤千五百年之衍于我者未艾也吁聖人德厚其流光其澤隆萬世而不斬嗣其世者又克光其載德其載德其澤不益衍矣此係希道之自期而吾濟以期希道者吾聞君子談世澤者不在累名疊爵而在行應禮義希道行修而名至其衍澤也何以尚兹正心齋記淞江萬户侯石伯玉氏自顔其燕居之東室曰正心伯玉嘗予其所在客列者皆士之卿大夫之賢或雅頌投壺或鼓琴賦詩不知伯玉之爲武夫長也明日且請余文曰記正心余曰抱豪傑才而知聖賢之學亦寡矣而况才已成恐恐焉懼心之不正思求聖門切已之學者乎予觀代之萬户侯往往以少年子弟襲先爵伎以習武爲名懵公喻於學剛愎自用侈咸自驕又幸而生於太平之世武無所於用惟務臂鷹走馬弓矢爲畋逰已則恩羔擊鮮招無良狎徒酣歌舞爲事者比比也而豈有英年老志切切乎正心之學又求儒先生之言著之座右以爲警省如石侯者哉故爲之言曰人之􅀁以正者身也身之􅀁以正者心也心之􅀁以正者其道何繇敬而已矣請以射喻財者不正已而後發内志正外體直而後不史於其正鵠此非敬何恃哉文士之心正者占筆武士之心者正占射伯玉知射之不可以心不正也則凡臨事而懼有大於射者其不可不恃正心之法哉嘻􅁄門之戲不如細抑之肅飛􅀅車之縱不如程􅀅之狥此敬與不敬心心不正之效也伯玉尚以予言勉之歸來堂記予入呉首謁三高祠以其去國者非忘君還郷者非懐土而枝迹江湖者非方外敗教之士也呉人至今髙三人之高而未知其繼其髙者范張而後為何人也或曰上洋有章吉父氏殆其人已乎吉父少年以竒才為丞相府舍人未幾乗傳遽為宣使者遂通籍貫近官逰京師者三十年出貳尹江浙府適以内艱去判闋鎮撫海道裁數月即幡然歸曰吾髮種種矣大夫人之年且望耄矣城南有桑麻田若干頃上不知禮人謂我何人謂我何於是作歸來堂西偏遂雅志也余今年東逰道清龍江吉父之宅在江上延致于堂中具聲樂酒中為余驩因得奉觴為大夫夀明日吉父請文請文記歸堂吾嘗慨晋處士之歸来矣不知者以為恥五斗之折腰知之者以為典午氏􅀅路而不忍二姓之事人也今吉父生于盛時遭逢聖君聖賢相之明用於才也而吉父且以才選登要路年未及致事而即退然以歸則以母故而爱日之誠有不能已者處士之歸其歸以義吉父之歸其歸以孝孝義一道也歸以義非世道之幸歸以孝實風教之榮歸來名堂又豈蹈晋處士之迹亦自高而求報夫䲭夷子張季鷹之後者耶雖然吉父年未老示神爽峻而才識茂進賢者未肯輒遺於吉父也求忠臣於不孝門則已如以孝門則吉父其卒老歸來乎請以復吉父命書諸堂為記東維子文集卷之十三

body:
  text: 會稽鐵崖楊維楨廉夫著志讀書齊志醉李吳仲琚日幼穎悟長有竒氣而於詩書無所不讀求天未見書如不及題其室曰讀書自課早讀若干萬言莫記誦若千萬言蓋出則於書少輟入室則又手披而口吟矣妻子責不理㾏及不能廢居居邑則曰我業蓋是仲琚於書其穎若是而余最號不善讀書者也性未能寡欲其讀也不能靜且顓即顓又性猝急苟且聞即亟涉欲竟為常恨自課不能如仲琚而仲琚求余文以志室亡乃左乎重違其志則曰自瞽儒之説有臯夔無書可讀而天下之學幾廢不知何雒之文天下之至書也帝典以前有皇墳之書大道所寄善讀者稱左史倚相斷自唐虞以下堯以是傳之舜舜以是傳之禹其炳然見於書與二曜齊明不能滅也前聖既往後聖復起易也詩也書也禮樂春秋也皆聖人之書也善讀易者以知來善讀書者以辨事善讀詩者以正性善讀春秋者以知往善讀禮樂者以制行和德聖人其無餘藴矣學者幸而有聖人之書可讀則聖人之藴在我不在聖人然有不幸詁訓之溺詞章之隆也異端小道之亂也吁此非書之罪也讀書而不徹其藴之罪也讀書而不徹其藴則瞽儒之説勝也已斷輪扁有告于齊之君者曰臣不能以喻臣之子臣之子亦不能以愛之於臣行年七十老於斫輪古之人與其不傳者死矣君子之所讀其糟粕已矣吁兹非瞽儒之論也讀書而無有徹其藴之病也仲琚讀書二十年其於聖人之藴徹矣盈箱撁架者可以忘矣若舍之不善讀於扁方有愧焉韓非子曰慧者不以藏契書策知者不以言語詔豫願學而未能孟軻氏曰以友天下之士為未足讀其書以尚友乎古之書仲琚其似之鐵硯齋志硯之龍尾以其地名馬肝以其國名帝鴻銅雀以其古玉古瓦名竹漆以其靈植巧工名孔研非珍器也而以聖人之德名鐵研非珍器也而又以桑生之名志桑生為主司所忌有觀其不舉進士者生鐵鑄為硯自警之曰研弊則吾業改也卒舉進士及第吁志之不可已也如是吾未論其人而尚其志孟子曰士尚志士尚志士而無志尚足以為士哉雲聞吕生恂從余授春秋五傳學名其修業之齋曰鐵硯且鑄青州之鐵為淬頴之具生非尚其器尚音人之志也志不移吾見生之業成矣故曰志之所存雖逖而親雖缺而成強裂壞斷不吾聞也吾觀者間得於貧窶之人而貴富大姓之子弟未聞也間有者大率以名始厪而未忽卒於不能竟成非此師父之罪也子弟之志不立也今生年踰冠矣妻妾矣子女矣父兄將以門事委之矣而且乞歲月之暇於父兄曰間志無地嗜之惟在文藝耳使恂得卒業於其師者幸矣於是屏逐妻子敕斷家事而朝焉夕焉於是齋修其業不以祈寒盛暑少輟也生之志不有竟成而光于桑氏者乎桑不幸生五代雖擢巍科登相垣蓋無足觀者生際盛代志一成事業蓋將過之吁君子非學之難學而無立志之患非志之難志而無令名之患生勉之生之門友曰馮生濬吳生毅盍亦以吾言警諸心樂齋志喜怒哀樂愛惡欲人之七情也樂居情一而聖賢之教每樂言乎心何也孔子稱回也其心三月不違仁又曰回也不改其樂是是非樂不足以語仁人之心心得其樂凡哀怒愛惡無有失其節者益未嘗有以損吾之樂也世俗不知仁人之樂仁人之樂也內世俗之樂也外外者物而已矣求樂于物物益多而樂益不足惟樂於內而凡天下可樂之物舉無以尚之此心樂之至也雲間吕希顔有志於顔子之學以心樂名其燕處之室求豫言其樂豫曰心樂豈易言哉心樂非孔顔不能有也子夏孔子之髙第弟子也出見紛華盛麗而喜入見聖人之道而樂二者交戰于心而不能有以自決此心樂之未至也希顔非簞瓢之士也一日之間聲色接乎耳目便佞訷乎左右狗馬珠玉之好雜然以售乎前者不一一而足也其喜于中者與商之喜者似矣其于聖人之心樂爭彼此之勝負其亦有以自決已歟不然吾懼希顔之樂者商而已耳希顔得為顔之徒也哉希顔惕然避席曰甘言疾也苦言藥也先生之言某之藥也幸奉教於先生願書諸室以為志養浩齋志孟子戰國之士也而得稱代之大丈夫小六國之君相者一浩然之氣也是氣也天地至剛至大之物也人得其浩然者山嶽不足為其雄也風雷不足為其厲也羆熊乕兕不足為其勇也秋之肅肅不足為其清春之生生不足為其富也千歲之日至不足為其逺也蘇子所謂不依形而至不恃力而行不隨存殁而有亡者推其盛至於參天地關盛衰之運豈不誠浩然已乎然其浩也必有養也孟子曰我善養吾浩然之氣得其養則浩極其用與天地凖失則暴矣故又曰志一則動氣氣一則動志又曰其為氣也配義與道無是餒也至哉浩乎或暴也或餒也顧其養之善不善者何如耳此孟子之浩然獨稱善養也吾嘗觀艨艟之舟放于大水而致千里之逺者必乘載之人得其用舟之道又得其制載之具然後駕乎風清肆行千里而不虞乎溺不然制之之具苦用之之道踈舟不役於人而覆為再役也是覆溺道也故氣譬則舟也養則用舟之道一志配義則制舟之具也浩然之氣人是有之人欲以不學之才而覬其浩然者是乘舟不得用舟之道而無其制逺且有覆溺之患者也可不懼也哉雲間任子先好學不仕而尚友孟軻氏之為人名其燕處之室曰養浩禮部泰不花公既為書之而又求志於余余為推其浩之有失得其慮而養之者未備其道遺其説為記至正九年九月十日芳潤亭志君子論根源者莫大乎世澤之夀者莫大乎六藝之學也故得其學者猥固而芳菲源深而潤數前人以是始之後人以是終之芳之菲無時而歇潤之敷無峕而涸矣世之言芳潤者與是異曰爵以芳其身而其芳也朝榮而夕悴曰富以潤其屋而其潤也乍濡而忽稿豈知六藝之芳潤者逺且大哉吾來吳中得所見之家證其信者曰琴虞氏也虞氏日某公至宣慰使公用六藝之學厚仁根義不食其報者已若干也宣慰始克享有榮名五十餘年而其子若孫林立穎發出典大縣者三掾史院者一以經行應賢能之書者不一而止其為勞也彰矣潤渥矣此任氏講禮樂之亭而有名芳潤者非以林地華竹之勝世澤之元蹈也主是亭者為伯璋宣慰公之第五孫也伯璋齒方北惇行孝友又善尊師好學先于前人二時名卿賢大天皆折行輩交之吾知任氏之芳澤交全盛而未艾也不然何其子孫之多且賢歟吾不及識宣慰公而幸伯璋與吾逰嘗觴吾亭之上講求六藝之所深得且求言以為志吾于任氏之芳之潤益培而馥使世而彌章益疏而沃使物而彌天也實有望於伯璋故書竹西亭志客有二三子持竹西揚公子卷來見鐵崖道人者一辨曰大厦之西有嶰谷之竹斷兩節而吹之協夫鳳凰此吾公子之所以取號也一辨曰首陽之西孤竹之二子居焉清風可以師表百世此吾公子之所以取號一辨曰江都之境有竹西之歌吹騷人醉客之所歌詠此吾公子之所以取號也道人莞爾而笑曰求竹西者何其逺也哉伶倫協律于嶰竹未既竹之用也孤竹之子餓終于首陽亦未適乎中庸之道也廣陵歌吹又淫哇之靡竹之所嫌也地無往而無竹不必在淇在渭在少室在長石羅浮慈姥丈竹之所也公子居雲之澳滌蕩之所敷箇簵䇢之所蕞結亭一所在竹之右即吾竹西也奚求諸逺哉雖然東家之西乃西家之東也竹又何分於東西界哉吾想夕昜下春新月在庚閶闔從兌至公子鼓琴亭之所歌商聲岩出金石不知協律之有嶰谷餓隱之有西山騷人醉客之有平山堂也推其亭於免園莫非吾植椎其西於東南莫非吾美二三子何求西之隘哉三子者矍然失容惵然下意逡巡而退道人復為之歌明日公子來請曰先生之言善言余竹西者乞書諸亭為記歌曰望娟娟兮雲之篁結氤氲兮成堂百草棼而易蘦兮孰與玩遺芳口美人之好飾兮辟氛台而清涼豈大東之無所兮若稽首乎西皇虛中以象道兮體員以用方又烏知吾之所兮為西為東叶當芝蘭室志芝瑞草也非薰草孔子善人之論取以配蘭而言香何也蓋蘭有三秀如之者目曰芝蘭芝蘭非工物也之作蘭花則象山陸氏志故孔子以乏蘭對鮑為言晉人以芝蘭對玉樹言傳曰仲尼蘭鮑荀卿逢麻亦獨以蘭言也朱子蘭辨曰古之所謂香花葉皆香燥濕無變今之所謂蘭花雖僅香葉乃無氣質又脆弱豈古君子之可刈而佩者乎為之喟然曰古之善人吾不得而見之得也古之香斯可也言之香草亦不見則草木亦有隨時而變者乎離騷子悲於芳草豈可寓辭乎嗟未也而馬生者去偽以芝蘭命室來謁記庸詎知其寶之芝蘭皆孔子之所稱者乎抑朱子之所謂不可為君子之佩者乎生愀然變色曰離騷子悲芳草之變者傷亂世之君子某之名芝蘭之室者其與無世之君子居也盛君子某幸首得見某人某人者天下士也次得見某人某人者一國士也又次得見某者人一鄉士也十年不得見先生而今日見之非某之所謂之世芝蘭乎世蘭芝乎不幸有變者雖當吾門而必鋤况入吾室乎其不變者難在野而必來况在吾室乎豫聞其言而韙之為之歌曰芝蘭在野兮不以野而目傷芝蘭在室兮不以室而自慶叶遑世服艾以盈腰兮羌獨佩蘭以為常寫操兮歌吾商芳菲兮彌章虀甕志桐廬章木氏客處錢唐委巷中得一室陋而且隘自題曰虀甕既得待制杜公本書其題又移書雲間請豫志豫復以裨官之説寠士有三百甕為何神所請者子何樂以其請者自居乎章木曰士不可以一日而忘虀味人味乎鸞脯鳳臘者有而未有知虀味者十二日而不知虀味其道殆已豫又復之曰虀又從韭青齊奴作韭虀其味最天下生殺帳下奴之漏其術者子之虀亦有是乎章木曰此吾同名而異味者青州奴烏知虀味哉使知虀味金谷不墟二十四友不禽也豫韙其言遂為論次曰漢稱生眼空天下士謂荀彧差可語餘皆酒甕飯囊耳世以生民脂膏養天下之酒甕飯囊民亦不幸甚哉守道息食于虀甕而出而可天下生民飽食而廣居也子之甕其得自俠而人得而過陋哉隸之辭曰甕之室兮儒之宫一室之隘兮天下之容吾何隘乎兮甕而志乎髙臺大墉甕之虀兮士之茹一茹之苦兮天下之腴吾何醜夫虀而志乎龍肝鳳脯潄芳齋志雲間吕生旬名其新闢書室曰漱芳取陸士衡語也而有請於余曰吳俗嗜好尚權利次貨殖婦女狗馬及方伎服食之祕也恂賴大人廕雅知有義方又賴先生教顓習在藝大時時能伸筆引舌潄其餘芳足以自腴蓋不知俗有權利貨殖婦女狗馬服食之祕之嗜已願先生有以志諸室以警豫入吳雅有喜吕氏父之善教其子也又喜生之嗜好異于庸衆人而善承其教也而芳則難言也何也芳者大道之英至治之馨也世之泰其芳在天下世之否其芳在六藝天下之得之者斟矣離騷子思得之曰芳菲芳而彌章至於悼時不得則曰哀衆芳之蕪穢其所以自呾於萬三千言者則亦徒得諸齒吻之膏觚櫝之馥而已耳其能沾溉全楚之國哉然其芳不溉全楚而溉于天下後世也逺矣故得其芳者嚼然泥而不滓與日月爭光焉可也嘻騷之芳且爾況聖人六藝之芳乎陸氏子服膺儒術者著之三百篇蓋亦有志於芳矣而實未嘗得之使其得也其能去舊鄉姦新國甘即戎服敗河橋以遺華亭老鶴不勝之怨哉方今聖天子思至治之馨表章六籍以取士士有不在六藝科者不得姦時以進生於六藝能潄其芳之所獨得異於陸氏子也而又遭逢盛時以大科進焉則其芳也肯為離騷乎離騷不為也又肯為陸氏子乎生勉之父師之望生生之自期以畣父師望者不在是乎勿徒曰潄芳者自腴而已也異俗之嗜而已也至正九年夏五月十日蠢物志雲間李彬家有園池池有卧石一具狀類怪人題其顔曰蠢物彬嘗觴之所醉踞蠢物曰爾蠢烏知不有蠢如爾者乎彬曰爾不蠢吾蠢物還説乎余曰石氣之核也怪而以為用也於禹隕而以為警也書於春秋曰嘉曰肺以為乎疲而達杜也設於周官鼓聲於桐魚鏡也鑑于月林劍也利于昆吾憑也醒酒於平泉之墅鍊也或至於補天焦也或至於縮海及其幻而不常也至羊立而人言物之靈若是而謂之蠢可乎今夫具隂易五行之秀命之曰人與天地參而有冥頑弗靈非人類也詩曰蠢爾蠻荆書曰蠢兹有苗以其冥頑匪人類不可以王化率故詩人古史皆以蠢加之吁蠢有不蠢而不蠢者蠢也抑又有説人之逞知覺舞聰明蠢號曰道人曰知士曰巧宫及其窮也通覆不如塞智覆不如愚而大巧覆不如大拙也雖欲為蠢物不能然則彼謂不物于蠢而謂兹物于蠢者孰愈孰劣哉君病夫不蠢者之弗蠢物若也故以之號而警之乎不然蠢物不蠢也濯纓亭志有三客者會於霅溪之上濯纓之亭各陳所歌詩以白所志一客歌曰桃花一實三千歲不識人間漢秦世溪上漁郎何處來溪水東流復西逝一客歌曰荷為衣兮葉為裳飲沆瀣兮餐朝昜山蒼蒼兮水泱泱懷美人兮天一方一客歌曰我所思兮思故人堯舜之主臯夔臣箕之顛兮潁之濱飲牛豈棄巢由民又歌曰鑿則圖兮枘則方尺有所短寸有長文武之道一弛張龍伸蠖屈安厥常歌關以質於濯纓主人主人曰一客之辭逃世之士所志也二客之辭喪居之士之所思也三客之辭一隱一顯與時推移之士所為也如用之吾從三也歟三客者退録其辭者鐵崖道人會稽楊維楨主人者為中臺中丞公吳鐸也癡齋志余嘗疑顧愷之稱三絶而癡當其一癡者不慧之名也使愷之果癡尚能以才絶畫絶命世耶不知其癡黠所寄也桓溫謂其癡黠各半吁愷之之黠果可以無惠求之耶晉士大夫往往用癡飬慧如玉述王堪之流是也老子固嘗論辨與巧矣曰大辨若訥大巧若拙此晉人用癡道也錢唐盛生修齡自蚤年得癡名於人因此自命吾不生之癡果出于無慧耶抑愷之寄之也生嘗從余遊精悍堅確日讀書數千言默誦如流夜課詞章若干首不以祁寒劇暑少廢其吐言揚才若雷奮河決土墳而草木發也連試有司輒不利赴二千石辟為掌櫝吏志又不信則復理詞章試有司遂售其資其才與志若此而人以無慧之名名之生又以自命其果當乎不當乎雖然世貴曲通而生獨尚直世貴狎和而生獨尚介世貴巧辨偽容而生獨朴與誠也則有類乎癡而已矣抑豈知生之癡去俗為甚友而去道為甚近世務諧俗而不務道合者不少也又烏知其癡之杲為癡乎不癡乎今之人有聰明自任乃至育妄擲惟顛隕於汙壑陷穽招之而不及呼之而不覺終其身有形植物纍之憂者則其為癡也孰大焉生偕計上京師將有為政之日其母改乎類乎癡而未嘗癡者則其不為聰明不癡而永始不癡者的矣西齋志有詩有二客持吳興趙公子西齋卷來見會稽鐵崖道人志一客辨曰首陽之西有孤竹二子者居焉清風足以師表百世此吾公子所以取號于西也一客辨曰伏翼之西有小桃源者在焉某地如洞天邈不與世接此吾公子所以取號於西也道人莞爾而笑曰竹孤之子餓終首陽未適乎中庸道也桃源之在人間世有方外荒唐不經之説也公子雖習隱而好髙豈果之是哉吾知公子者公子素負竒氣有逺大之量思得明王以輔翼之而不果也遂宿其志于西吾相其夕陽下舂新月在庚閶闔從兌至公子與客鼓琴亭之上歌商聲若出金石無與和者而有懷夫西方之美人曾不知首昜有餓隱之髙而伏翼有仙都之勝也二客於公子何求西之野哉二客者失容逡巡而退道人復為之歌明日公子來請曰先生之言善言於西者乞書諸室為志而歌則吾將被之秋聲云歌曰物生於東城於西兮有信有屈物不齊兮彼向而笑傎為迷兮惟古有道物不羣兮大東之西孰我賓兮我所思兮西方之美人兮木齋志有詩吳下殷生奎天質古茂一言一動醇乎其無偽者也人以水歸之生遂以木名齋今禮部尚書泰不花公愛其為人為書齋額求余言志諸室世之置椎魯不聰者類曰木鄙為棄材亡所於用必多夫不木者曰便曰給曰機曰敬不知便給者蒙不仁之具而機警啓薄行之偕也孔子嘗論木矣必與剛毅者同稱曰近仁仁固可以木得之西不可以椎魯不聰棄之也夫大味不和大質不雕大朴不散其惟木也乎仁者至朴而亡偽之物故論仁惟木為近孔子之言豈欺我哉嘻木為聖人所器而論者棄之天下之能仁者寡矣抑論者之所棄則有矣士之為大有似焉而實非漢稱長者未之近仁者也惟勃近之而陽朴售至姦如周仁之流則大似而大非其為不仁也甚矣今聖人以深人治萬生使民剗偽還朴表民者類求長者吏若生之木固又今聖人之所器而又加之以聖賢之學使言仁者歸生生其不應表民之求乎吾聞生之王大父大父纍世忠朴如生所種殆出於一家風氣之厚也殷氏四世而未易其當昌在生無疑者故吾敘而期之而又為賦詩極木之所詣以率能詩者繼之詩曰七日混沌離穿鑿爭七竅碩果一失仁百體俱弗肖巧詐日橫生售朴至深溺周仁聖人憂世心世變若原燎安得至木資與世作津橋去聲學齋取木名衆巧不同調回愚與參魯入室得道要豈是灰稿人滅心比滅爝君看記須雞人方詆不鷂雪巢志雪一也而苦樂之情異焉何也清也寒也者不知其清今者不知其寒此苦樂之情之辨也上古未有室廬則民有縣巢而居者至陶唐氏之世尚有巢父之流以樹為窟與羽族同栖者吾想其巢當霰雪之集與木稼同冰是有雪之寒無雪之清者也後世乃有借光於竇者謂之雪囱致爽於髙者謂之雪樓而又有假屋於巢假巢於雪者謂之雪巢是有雪之清無雪之寒者也我所謂雪巢者崑之洪用氏治其棲客之室於雪鶮堂之隂者是也用居髙門縣簿者幾世矣而無華靡之習炎赫之勢堂號取於雪鶮蓋富而能清者也其名屋於巢名巢於雪固宜雖然居其清於主與客接物潔之也處巢於窮隂沍寒之際一念之擴衣吾衣以及人之卒歲無以食吾食以及人之朝夕費謀也此又及物之仁之義也子屢辱用觴於巢人固尚其潔已擴而仁為為義者或懼弗及也故因其請記而為之言具使賦雪巢者不從思於古之巢寒者也藏六窩志雲間錢子雲氏博學工文章才可用世而世不用也今老矣黃冠野服脫落世纍飄飄然有神仙致退而築一窩于鴛泊之上狀蓬蓬乎浮遊于澨若龜然於是命之曰藏六求豫一言以為志豫謂藏六本坡翁語坡以失言藏六子雲何失之可言哉嘻藏山於澤夜半有力者負之而走昧者不知也而况藏六於一甲乎見者不劂而刳則鑽扙而扣之矣是欲遁而不得其道者也是故珠假藏於蚌而蚌拆王假藏於璞而璞剖又况假藏於身者此甲之靈於人而不靈於已者驗也子雲學道者吾請與子言藏曜靈晝而忽夜日之藏虛魄望而倐朓月之藏萬物闓於春養於夏成於秋而閉於冬是天地之大藏也天地之藏必有道焉放於六合而無外卷於一密而無內是大道至藏也子雲學道而欲效失者藏其六也不既愚且勞乎子雲作而謝曰吾不敏吾將從子遊以闖夫大之藏也藏道何如曰藏于一故曰藏于一萬事畢俞同知軍功志杭自宋行都未歸服籍後生齒日愈繁無兵革災者幾三百年至正十二年七月十日庚辰強冦至自昱關紅巾赭服僭竊王號蹂躪我城池劫􅐁我府庫鈔掠我子女上抗天討其悖甚矣越壬辰肅政使孛蘭公親按重兵會行垣大臣戮力翦賊時俞侯亢以仁和縣尉公承令合哈必元帥部位破賊於吳山癸已伏兵六部嬌捷獲凶頑若干人掩殺其部士者過半奪馬騾旗鼓器械莫勝算甲午追兵夀坊安賊潰走追襲至明慶僧寺蓋焚其窟落孛公壯侯智勇視他賞資獨有㓛乙未沿井亭出衆安橋交賊鋒者三生禽渠魁一人及從黨若干人丙申追殺過北關復吾倉廪府庫之狼籍者若于所又生禽其掌記者二人獲所劫宣敕劄憑及偽命妖經之屬燒毁行寨拘截輜重賦盡北奔而杭城始復庚子復領哈必赤義兵西赴餘杭勦搏其殘孽八月辛丑朔遇賊西門交戰獲首賊某都帥某妖師某總統某賊大敗捷書至憲府憲府論功授賞遂擬侯為杭州路同知府事閭民市夫咸手薰爐拜侯之勞之德士之業文章者𫐠為歌章以頌侯德之美開元道士徐以正又厯疏其始未來求文以志于石豫惟絳帊帕頭此神禹氏之軍容也夫何小醜敢僭其儀漢賊黃巾張角晉賊絳帽李辰非不憑陵州郡煽行妖孽以冒姦天器皆亡不旋踵而皇甫嵩華宏之徒資為大功蠢爾獠蠻復逞左道以速鼎鑊俞侯之功又豈下於華宏皇甫嵩之徒歟宜其十有旬日位躋四品而人不以為過也自是侯將右肅政府為國家始終殄賊獻戎功於明天子天子將獲功賜秩見肅政府之善人用而侯為國家一時才人之盛也豈非杭人之望乎侯尚以豫言勉之侯名元字長卿世為錢唐人是歲十月初吉志王鎮撫軍㓛志鎮撫官古之軍正司律令軍中得其人則都督之在體要而坊逸部落之在下分立而情通不得人反是至正已春皇帝命江浙行省平章定卜沿大江以東調諸道兵討紅巾賊命至衰兵大閲謂都鎮談汝楫曰師行千里草木不靜所過郡縣士卒將有勵吾民者君為我選公勤廉威者治士卒勿譁汝楫曰唯唯乃舉前大府監器備庫使王君顯祖自代平章視其丰儀卓犖論裁殊庸人即版授都鎮撫首陳民情次兵機地里要害已而下令申約束士卒潛相戒曰軍中今有王鎮撫剛毅人也吾輩無譁譁者死律一張民用大協是夏分率戎麾抵池以便宜決事率先諸將與賊相還嘬鞣建德剜自面渡鐵木田罔掀湖口撇彭澤行􅝌盤陽城斬偽元帥者二磔賊將者二十有五從賊無算獲其廬帳輜重器械稱是明年餘城復冦東流君進謂平章曰東流糧道絶之危必死爭平章韙之遂引兵東下摽饒之石門拮東流大山三十餘戰深謀密計用之無遺算而一時卒咸樂為之用用能屢建竒功民之奔命歸明者以萬計吾所謂官用得其人則居上者體要而功逸為下者分立而情通非歟省憲論功聞于朝士民被恩歌于道大夫士又作為歌詩以美之軍中之通歌謡者從而和焉此陽浮慕者哉然而大功未褒勞君不以為枉致身為所事君不以為難重子曰明其道不計其功正其義不謀其利君子達此者此歟其徒葉一元以余為文章家司公論於當代且視信於後持其狀來求言於是乎言至正十四年七月初七日志東維子文集卷之二十二

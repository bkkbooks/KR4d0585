body:
  text: 跋東維子集後余嘗結廬城南日與柳風梧月竹韻松濤挈爲良友陶然長嘯若不知有人閒者雅好吟咏尤嗜袁景文詩業已刻而新之矣而楊廉夫又羨景文白燕諸作自以爲不及今讀其集博極羣書自成一家言想不在袁下第篇章零脫未鏡其金誠竊恨之辱承太冲袁老素號藏書工于製作一言相慨然見投慰我夢寐如獲珍寶維汗雨滛滛不妨校勘葢清時暇日與先輩表揚風雅自是樂事遂忘其勞也雖然摛辭吐句精會神流白雪陽春商彛周鼎作者苦心識者具眼倘遇知音千古一快哉兹因完刻以廣其傳漫識于此後學王俞書萬厤十七年已丑孟秋既望

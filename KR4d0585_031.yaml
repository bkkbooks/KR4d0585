front:
  text: 東維子文集卷之三十一
  hash: sha256:1bb2678e1a77994ed933f821a4f38eaa5e9b1928476d641c07609d632f00d9ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_031-1a}
body:
  text: 附録琅玕子來詩六絶句李杜文章萬大光並驅今見會稽楊幾時過我華陽洞鐵笛一聲吹鳯凰句曲山中張外史與君湖海結詩盟可憐遺劍隨長夜今日誰同並世名義熙處士歸來蚤千古髙風今尚存夫子風期正相似東山花下醉清尊問竒未到楊雄宅羽馭飊車總不靈會向山隂具舟楫載將肴酒過華亭嵇公蕭散七不堪彭澤歸來雪滿簮見説枋頭無直筆董狐太史在江南草罷玄經不美新萬言書已上楓宸新詩題遍琅玕所亦念丹丘有羽人學生徐固次韻新詩隨手寫銀光逺寄江南鐵史楊自説簫郎善吹笛不知孰與驂鸞凰徐固又次四絶一溪流水碧桃花云是茅山道士家我欲相從問丹訣赤城五色茹朝霞道人曉起天鼓罷石盆換水種菖楊詩成寫滿白籙紙春江人來能寄將不向正門曳我𥚑秋風江上釣鱸魚仙官乞與青黎炆夜照龜文緑字書鶯湖湖上琅玕所渾似浣花溪上莊風前起舞鐵如意雙鶴飛來秋滿床學生吳教次韻四絶三茅兄弟舊遊處萬箇琅玕隱者家雲氣團空圓蓋似丹光井出赤于霞與君别來十日強日日憶爾鳯山陽霜林橘子大如斗書尾須君逺寄將雪色吳綾栽道裾鵝黃美酒換金魚詩成連過沉東老不惜榴皮醉後書南泖津頭買野航鶯湖便是瀼西莊琅玕主者雅好客應遣麻姑掃石床羽儀和韻蠟色濤箋寫寄詩玉壺冰鑑識容儀法言願卒諸生業家學深慚帝者師江月夜涼聞鐵笛海雲秋靜捲朱旗文章絶似相如茟好為題詩諭逺夷玄霜子作衜人苦寒不可出焚香白晝高齋眠繁華過看不足惜造物戲人真可憐何如適興飲美酒未信服藥能長年人生天地一逆旅流光瞬息難留連魯隂饒介錢王城亂山青惟有江聲繞驛亭萬姓瘡痍勞撫字諸侯風化在儀刑圍别墅花連屋覔句芳池草滿亭汀座是東南待君久翩翩五馬不須停淮海秦約宛丘陳肅賦東南帝者之所都山川龍鳯相縈紆離宫别館三百區紫金鬱鬱今有無府中逶迤謝太守少年玉節黃金符民食在簞漿在壺飢餔渴飲歌咿嗚華車細馬左右趨使君歸來香滿途鐵鷂子一解鐵崖先生作黃將軍歌殆絶唱也絶唱不可和門生徐固賦鐵鷂子一解先生讀之曰可續吾貂僣書于卷鐵鷂飛犵猿披鐵鷂鳴牧犢平鷂栖在長城長城鎮南國渴飲長城水飢食長城粟獬豸不敢觸貔貅不敢蹴毒蟒何來吹黑風南國長城一朝覆鐵鷂怒裂眥毒蠎拆骨死朝食毒蟒心暮食毒莽髓嗚呼食蟒之髓心始已東海大鰌銜宿恥華陽巾歌鐵崖老仙冠華陽申制作竒古喜而為之歌鐵崖頭骨如鐵堅髙冠不肯著進賢華陽新巾制作古倒垂一幅披兩肩醉來箕踞松下眠白眼不受天子宣自稱臣是詩中仙掉頭來風頂忽露墊角得兩人爭傳有時錦袍淋墨涴寉􅌁冷看兜鍪帶血汚貂蟬賦歸來占叢竹下索笑長岸梅花邊狂歌擊節自有鐵如意何須白羽指使三軍前老夫緇撮上戴天與不老仙相周旋學生徐章次華陽巾歌鐵史文章金石堅鐵史法書草聖賢談遷父子未可稱筆削枋頭直筆當齊肩草玄亭上枕書眠不貴世間玉堂供奉之皇宣世人識不識盡呼鐵笛仙烏紗新製華陽傳七客聫翩冠似蟬或擕妓東山下或駕大舫西湖邊百年三萬太千日日日玉山醉倒春風前不知寉書在青天黃麻一道昨夜天東旋學生謝思順賦黑鈇龍氣如虎光如虹黃金意氣結國士句踐台上長城公黑鐵龍心推誓為國掃煙塵空長城何巍巍砥柱東南維龍兮龍號長城歸飢推食兮解寒衣日月龍繞長城飛光抱日月聫清輝維南有貓虓最怒夜冗長城翻赤土龍兮食貓如食巤維東有犢獷以奔日觸長城噓大雲龍兮食犢如食豚育老鳥啄人屋賣我長城殱我屬烏乎長城覆不可復黑鐵龍誓三為長城滅仇族玉笥山為我樹長城碑鑑湖水為我洗長城恥直欲聞之聖天子會稽先生楊鈇史跋忠勇西夏侯邁公墓銘跋曰春秋引天下之譽褒之賢者不敢私引天下之義貶之姦人不敢亂余讀鐵史邁古里思傳信民之以為賢賢之民以為姦姦之此鐵史之春秋也臺憲者天子之法臣也法臣不立法而鐵史立之嗚呼悕矣至正乙亥秋程文謹識東維子文集卷之三十一

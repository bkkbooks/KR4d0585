  text: 東維子文集卷之十
  hash: sha256:1e9d4db8b34b4e99dc290ae8a65c2744630f9c8f5a369a141cb92b5a52000018
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_010-1a}
body:
  text: 會稽錢崖楊維楨亷夫著序髙僧詩集序三山雷隱禪師豫以師友之者幾二十年其謝事歸隱于蓮峰也嘗以本朝詩僧之作委其選輯自端而下凡若干人時詩凡若干首持來徵序孔子論詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名夫以浮屠之教棄倫理而宗空無其為書又務為宏濶勝大之言無有興觀羣怨之事鳥獸草木之情而何有於詩然有吳興沙門晝以來不以空無為師而以詩文命世者代不乏絶錯以成章非徒移乎風雲月露而尤致君親之慕其與吾魁人碩士往來倡和因時以悲喜隨事以比興者風雅亦焉是其人雖墨也文則吾儒非墨而空無世之大夫士招而歸諸同文之代不為異也昔歐昜子序祕演之詩以為祕隱於浮屠與吾石曼卿隱於酒皆世之竒男子也苐未知雷所選之士孰為今之竒男子吾老矣於吾曼卿之輩未能見隱於浮屠者或見之吾將與雷從之遊冷齋詩集序曩余在錢唐湖上與句曲外史五峯老人輩詩推余詩為鐵雅詩雷隱震上人復原報上人傳余雅為方外別派繼又得祁川行已方上人齒雖少氣則盛才則宿也持所製見余曰鐵龍玉鸞二謡鑑然有金石聲余已竒之今年至祁上上人出冷齋全集求余評內有和余古樂府題其辭多警策余益竒之嘻可與震報同列吾派矣余觀上人之才蓄天地藏而又採諸厯代之載籍者日積而不已而終惜上人之才不用於邦國而用拾山林與二休輩爭篇什之工也雖然余聞太保劉公沙門出也大中欣公又以文字禪動黼座一言一行皆有禪於世主吾儒流偉之上十縃日想聲華曰大將簡知上所不得與二休輩較篇什工拙而與二賢者相頡頏于九天之上也余有待焉上人勉之以徴余言之不人妄也雲廬集序宋南渡後大夫無文章乃得於髙安上人圓至者方嚴陵有是言也始于怪其言之自薄及取至文覽之則於江子參寥輩誠有過之者其修辭有古作者法吾中國聖人與西方聖人有合不合者二之則不是一之亦不然則必推極初之母者言也善夫至之能文也至後未有接之踵者閲七八十年而得江在外史新上人余老友劉海持聖廬一編過我徴序言觀其修辭幾近至而諗道亦似之其曰佛以神道設教以輔國君治本使民從化不俟刑驅且贊今天子以西天佛子為帝者師所以崇其治本者耳善乎新之言佛道道之返其初於母也其勉人必以問學思辨以行其道而振其教則其文非穿空鑿幻務資口吻於人我者也於是命筆胥録其編凡若干首使與至文同梓於肆云至正丙午夏五月朔日抱遺道人書千雲鐵史藏室竺隱集序季代儒者談浮屠氏學十八九而未見浮屠談吾儒者自晉慧琳推吾白學貶裁其本教逮唐有衣冠外臣曰一行宋有上天子書曰契嵩我朝有筠溪牧潛之集曰至林陵蒲室之集曰欣厯千餘年堇堇四五人耳江左道上人有繩曰竺隱余喜其吐露運旨未嘗有本教濶大不經之言其雅頗近韓暢近歐而簡白近太史公求之浮屠文中駸駸乎爭駕牧潛而於蒲室也殆將過之此余較其格裁而言究其論道則其不合吾道者亦蓋寡矣道嘗以書來曰吾子執文柄呼鐵史寸善必賞不在人求不善而受議亦心服無憾故道亦不腆之文不自知其合道與否印子一言余自離亂棄官十餘年以觚簡著作為事絶交于勢要而一時方外有文句近古亦收而録之而况有文不畔吾道追古作者如竺隱編者乎樂為援筆而引計首不辭一漚集序雲間釋訓師受業郡之普照寺丞事天竺如庵真公玉岡潤公入徑山得直指于元叟端端洊謁大士鷹窠僧迦淮泗尋一有於毗陵姑胥末參獅林天如子今歸老故山之化城築别室為燕休所自命曰漚隱録其平日詩偈題曰一漚草者凡十卷求余一言傳諸其人且曰為人膾炙者元叟派外有吾錬雅派焉晚年詩律益嚴礉唱余和汝者與吾門八駿爭後先吾聞東山空法師有詩人陳黃派後自以為齊已貫休不得祖師圖者詩纍之也從而自諱焉余亦曰師有伽陀妙天下又何必詩詩又何泒自某某而觀之感化齊物傷今吊古背漚之醍醐甘露探其學則讀吾輩書多於貝葉鈔故其托物比興者吾風人之情而觸物悟身者其內典之教也姑舍勿論吾與師論漚旨漚之生何生滅何滅余嘗讀師海月祖象謂月之景光在月乎在海乎海月不在海而海且何在乎知海月之無在不在別知漚之在矣師起謝曰吾之漚可一而萬萬而一矣遂書為序使人知師之上祖師圖者固自有在三境圖論序余讀經子九流之書烺有未盡而身毒國之書鞮譯于不可諾者固有未暇杭之淨性寺主僧無為師觴余東塔院談出世法初聞其説婆內蘇迷盧外為七金水為四州東為弗菩提南為閻浮提西為瞿耶尼北為鬱單越地各袤數十萬由旬又曰持地山外為香山雪山寶山山上有馳名阿耨達東北山水至積石山潛流地下為黃河之源以吾聖元幅員之廣西極河源東盡震旦窮步章水不能萬由旬而此日月世界不知在鬱單越耶閻浮提耶又曰日琉璃寶廣二年四百有餘里天子天民居之月宫水晶寶城其廣如日天后天女居之不知二千四百有餘墨宫城之內誠有隂陽晝夜乎有則又孰為之日月乎又曰念棖君性之原即命也人天性地獄性一念別爾彈指頃見三十二億百千念念念成形形有識以吾天命之性未嘗有地獄不知一念為人天為地獄可為性原乎又曰牆壁瓦礫其有佛性瓦礫又有念念不乎又曰干物出後世却乃壞天地生滅在菩薩一次唾中未知菩薩之力有吹而成孰與不唾不滅使之為無生滅耶而又使之不能不滅於十二萬斯之後何也余時未辨所言耶默默別去明日師殷謁余邸次出所著三境圖論其論所演不出所言者其圖又曰因境生象因象生見生想生道余為披圖誦書蓋有不得其續師且過索余言為引重余孔子徒也言不相謀得非云者有非其徒所能決回必將決于言不相謀者邦夫茍合卦體於入佛之道者易之罪人也故余為録其言以啓折中者引于卷之端非苟合也抑余聞中土三寶有象四十二有章實身迦景摩騰竺法蘭始今三境有章又自師始也貪佛者欲不爭傳競習而得乎吁使三境者誠灼灼不誣其罔諸法度羣想出大允而優入乎四聖之琙者當無勝矣則是書非台祖之宗子外道之金城四十二章之羽翼驂乘歟師名益學自號無為子台盤石人脫白于杭之芝阜受天台者乎知先今主淨性寺云瑞竹圖卷序竹見于易於書于詩於周禮易言卦象書言地宜詩比德君子禮述器於樂也而未聞以瑞言者然竹心虛虛故靈故與人心往往有感應之機娥皇女英哭舜於三湘之野而湘江為之斑然漢文帝孝於母而子母筍生白虎殿唐隴西地飢而竹為結粳米如實民賴以活者百萬數蓋湘野之文義所感白虎之萌義所感隴西之實仁所感竹之靈若此謂非瑞應可乎雲間心海上人植竹於庭而有産雙莖並幹者雙莖並幹不常得于有竹之所則歸之海瑞應亦可也或曰心海為沙門之民不染于物者烏有所謂仁義孝節之所感乎豫曰人情物狀世容有偽惟天出之物不可以偽參也則不可以為動物于天出者其必有以也夫其徒虛碧氏為繪竹形來求豫言以記不朽上人髙德余未知而信其動物者故為志之且使其徒之物我之相感應於理者不可以離而去也至正十年十二月朔旦序毛隱上人序客有沙門以金錫杖荷青襆橐謁余雲間次舍者問其出吳興儒氏子也問其業縛筆也余怪縛筆非沙門事則曰余祖稱業余弗志其先也且自矜生而穎悟六歲善讀書史日記萬餘言長而善草隸詩書詘于父命為浮屠而俚浮屠推以習歌咀擊鐃考鼓利人死喪為事無所用吾菩書記者遂服先業自號毛隱蓋將附穎而逃吾浮屠氏之恥也且可扶以見世之賢人君子如閣老青城先生尚及見之而喜余之為且貽余以詩今幸願見夫子也竊嘗誦夫子三史統辨數千言至今日不忘余覆其流誦沛然若大江之奔決無少硬也于是異其人曰人生之初受魄于隂魄盛者多善記昌黎伯稱毛穎善記亦豈非以其明昧之裔奔月合太隂之精受䁛為尤甚故爾耶上人以毛隱自號非徒祖欲穎髙而又將傳穎心至於博纂洽記述為文章資世之賢人君子以文明昌天下乎不然何舍于浮屠事而復其先業于僕僕走文章家之門乎若是則上人之志有所鬱而未信可知巳用上人之伎者母徒用於字書官府市井貨泉之注記釋老巫覡之書鈔而巳也抑昌黎言毛穎有時而禿不任事遂以詩老退且有中書不中之議吾將還子顛毛返子儒衣冠萬一劉諸鴻生碩士聽受指畫俾兔冠之際母得以老退議子以為何如上人避席載操曰夫子倘有意佛試我我將加巾冠載筆以從至正九年十二月敘自跋曰余為此文后主人者遂憣然為賈浪仙故事言之不可巳也如此儒之才日衰折而入浮屠家如毛隱者多矣僅送用上人西遊序送用上人西遊序金􅋖氏之教上為坐次為遊下為誦習也滅去􅏒息歸于頑空坐而得之聞觸知覺會于真原遊而得之誦習者一出一入之學耳然其遊也不趨乎靈山勝水之聚求即夫大浮屠之神者耳目其聲光則亦僕僕與販丁役卒等爾四明用上人蓋有志乎浮屠氏之遊天台廬阜羅浮南嶽蓋嘗遍厯焉將自虎丘達金陵馭致乎五臺之山其徒自妙聲而下凡十餘人贈之言而去又持其卷來請子一言蓋上人由吾儒而學浮屠以為浮屠濶大之言以誘愚非以誘賢也故又非忘于吾儒之教蓋吾儒亦有遊矣孔子轍環天下太史公厯覽天下之名山大川孔子不遊無以成春秋太史不遊無以成史記吾嘗見浮屠氏之文史矣擴詩外學輔諸內典者曰橘洲曰石門吾誦之豫之大抵得諸遊耳上人之學得諸遊他日東歸有所見豫語言文字足以繼石門橘洲者不屬之上人誰屬乎不然僕僕乎與販丁役卒等者固汝教之所無取也上人尚以豫言勉之送照上人東歸序四明山水與天台並秀説者以比海之方丈蓬萊則其鍾為人物宜有清明俊傑者出以應時需也國家開鄉選法巳三十餘年而破送之荒者僅史駉孫氏程端學氏而來者無繼焉豈其人好隱逃浮屠而去者不少耶以余交浮屠南北之秀凡數十人而明亦寥寥無聞耶娩始得斷江恩師繼得照師覺元才之難也可知巳照且不以才自止從遊於吾門稱方外弟子連日夜記書數千言屬詩文若干首孜孜自課以為常故其行修業進今日與昨日之不等夷也獨惜其學成終歸無所於用不得應吾盛時賢良之選以接史程氏之躅君子不獨為明之才難惜也秋髙東歸來别曰照也有母焉久不覲心戚戚焉矧先生篤倫紀之教敢辭而歸于益歎照之性近於道而才足與有為也使照還鬚髮加冠巾有祿位民上其不篤吾倫紀之教以行先王之政者幾希以明得才之難而僅得如照者又逃於浮屠而未知其返也故三其去余甚惜之而申以告之送象九淑公住持南湖序豫嘗論浮屠之教足以禆闔宇宙玩㺯人世歆艷王公大人遂以法門位吾孔子之次非徒以閎濶不經之文亦其徒有異比丘至靈甚睿人仰之若古神明者得之皇帝既定南京奄有朔服以天下版籍不日浮屠氏脫兵而遺者十不一二微賤勤力疲于上農夫斃版築于萬萬計巳而髙望鴻德者示化顯神於不可蹤迹之中天子聞之為之動色太史氏録其人使有所考重送精選闍梨立大壇場設人天佛事主以天界大龍象教門阽仆而一日起立吁是孰使之然哉南湖在秀當兵車使驛之衝兵燹後穹殿湧堂巳入焦土其徒縮以痺蓋僅如逆旅舍住山者代難其人矣象元師由杭之大各輟以升兹座吾聞其人於元叟雪囱古鼎之間巳久顧今齒愈夙才愈老道愈神其於秀主勝地起廢補缺完而大之使文布述粲然如承平時是不難者至其妙通其知大識一言一動有以上贊大明之化靈迹異迹照著一時俾王公大夫仰之為古神明如前所稱則其教也當與吾孔子之教相表裏西方聖人之道誰得而廢之吾以勉象元而還以自勉青龍集戊申冬十一月草有一日序送蘭仁二上人歸三竺序余在富春時得山中兩生曰蘭曰仁天質機頴皆有用世才授之以春秋經史學兵興潛于釋來遊雲間别余曰釋氏有衡台派由北齊悟龍樹三觀法以授南嶽南嶽以授智者智者困悟法花之祕于是約五時張八教總括總括羣籍歸諸一宗復述止觀書教理既白觀行兼明以是傳之章安章安傳之法花法花傳之天宫天宫傳之荆溪而其道大修會昌之厄教帙亡去吳越王求其書於海國得諸髙麗觀師四明由之而中興三竺由之而弘演猶孔聖之道由河洛而大振由許李而大行儒釋盛衰實相倚伏今丁世變剎毁于兵經大劫厄甚會昌學者解散遺籍漫然莫從稽止某輩將參承故老由三竺始幸先生一言為指南余謂之曰文武之道具在方册人存政舉人亡政息汝佛之教亦也二子齒甚稚志甚宿學甚武能以宗乘與吾聖典合而為一以載諸行事以俟昭代之太平吁汝乘不墮則吾道其亦興矣乎送奎法師住持集慶寺詩序天子即位之元年於浮屠氏之教既立僧者以上賦奔命京城者以萬計而露殍者三千餘人髙德之寂而去者十有二人上命僧統曇師傳録之餘遺而得恩歸故山者十十人而會稽方舟奎師由旌德新領天竺之大集慶住持事於是薦紳士及其同袍莫不謂法社之得人豫聞主集慶者由采南峰佛光而下若元之無極宗周天岸諸公皆中大龍象而桂子山之蟾兔尚有光也今方舟踵其躅清標古韻之所及吾見桂子之山若增而髙蟾兔之窟若闢而朗也於其行也書以贈之同盟之士歌以餞者係諸後云送儀沙彌還山序海內兵變三教之厄浮屠氏為甚壇塔資為烽燎幸存者宿為戊舍沙門之桀至有易廬改服以從山臺野色毁去幾與會昌之厄等其能卓然自立不忍僨其法門者百無一二大阿蘭若力扶象教又以徭賦同瘦編户其暇拔漏身談覺路越濁悟昏以為教乎驪峰余客富春舊遊地也方外友雪舟尊者月一招致至則為宿留旬浹而後去時沙彌儀年甫十二三侍師左右應對進退一一中軌則余山中所為文三過即能背誦去之十餘年驪峰兩罹兵燹而雪舟亦隔世矣寺之徒日解散儀獨結茅為蓋守耳故址而不去今來不逺四百里謁余雲間談山中往事恍如雷比丘夢競三日告别索一言歸為山靈重吁浮屠氏遭兵不改業又不自僨其法門如儀者能幾何人於其來也不無感也其歸也不無望焉吾老未木尚及見驪峰宿革復還舊觀吾復大書歲月出窟鍾以落之有日斯也儀勉之耳同袍之曰仁曰蘭在雲間者當詩以繫吾卷琦上人孝養序韓子曰人有儒名而墨行墨名而儒行者可以與之遊乎曰揚子雲稱在門牆則退在夷狄則進蓋儒焉而行墨者退可也墨焉而行儒者進可也浮屠文暢以慕吾道周遊天下必有請於縉紳先生之教故為韓子所進焉夫彼之教以蔑君親之倫而吾之道以有人倫為教今有人焉宗浮屠之教而又一旦燔然自外其説以還吾道君子臣文之懿也又豈非君子之亟豫乎琦上人吳之儒氏也自幼落髮焉浮屠天平山中壯遊四明雪竇見石室禪師深器之俾識記室後浮遊淮湘間以肆其輕世之志未幾丞相府以東上名宿所推俾主毗陵龍興禪寺留不期月思自唶曰出家以能脫俗而去使俗髙而慕之以為不可及也奈之何又挂名官府罷送迎道路覆為俗所厭邪且余母耋矣即瓢然戒􅊶笠尋先人舊廬於彭澤之上而先廬敝矣今將築屋一區以養其母而終其天年計未知所出首以其事告豫蓋上人嘗以儒行為余友者也今又還天倫之懿職其孝於母以風􅏒其儔輩吳人多孝親而義於成人之盛事聞上人之風其不有勇棄金粟如棄執鉢俘屠以佞土木偶者吾不信也己上人出豫言以往吾明年至蠡上將覩子之室突如化成堂上之親無恙且當為子奉豆觴為壽云至正八年秋七月序抹撚氏注道德經序道之不明也知者過之愚者不及也聖人載道於言未嘗不簡易著明白非不愚之極皆可得而白也故曰道若大路然老氏道與吾聖人之道本無二也引以為異者私知求之之過也于是乎有真無之論要非老氏之本也金人抹撚氏仲寬以吾聖人之學注老氏之書深諱儒者以虛無以絶滅禮樂以慘刻術數言老子而必欲其道體以同吾聖人蓋其讀老之見有獨至而自信者篤矣觀其十一章首闢虛實之論與夫真無妙有之談十三章深折賊生脫患之説二十二章極其至精於真實虛驗三十七章以天下之事相生相代為理之必至五十三章為備論修齊治平之道八十章為厯敘至治之化以還淳返朴望於後聖之怡于此見老氏之學非虛無之祖而老氏之道非機謀術數者之所為也坦乎其言實訓詁諸家之所未見也吾于逐感無極翁之論無即老子有生于無之旨而惜鵝湖諸子之疑于無者未見抹撚氏之論也其髙第弟子為四明董自損嘗受師旨為同歸論今將板行其師所注老氏經若干卷持其編來見豫錢唐丐一言以引首豫頗是其説故為之序云至正六年冬有十月望序送鄧煉師祈雨序洪武二年夏旱松陵太守陳府公初下車首詣翟曇祠求雨十日不降守怒欲焚曇象浮屠氏拜以免六月二十日壬午移禱于鄧煉師法壇明日移壇公宇守自製心詞一章告天曰下民六月之旱無伸所求上天三日之霖有感斯應鄧為奏章上帝然後役五雷丁甲呼吸鬼物是日少玄風從西北起迅霆一聲振屋瓦大雨如注一日雨二日雨三日大雨足松民咸抹手相慶曰此府公方寸中雨而非鄧之法力則亦無以成其誠感之速也守命屬吏於琮乞一言於東維先生為鄧之勞先生為敘其事而又侈之以歌曰東海水枯沃焦神工無處尋天瓢松陵太平守閔民苦疾呼鄧師誅寇妖誅跛妖役丁甲蚩尤鼓風旗倒搜插龍龍走白龍潭迅霆夜擘千將匣於乎縣令不積薪將軍不拜井爐煙一穗達丹誠三日甘霖雲萬頃君不見漕家糧船星火急瓜州渡頭河水澀蒼天蒼天不悔禍海民盡作枯魚泣鄧師鬼工煩叱訶稻田粒粒真珠多松陵太守報新政和氣化作擊壤堯民歌送鄉人韓道師歸會稽序安昜韓氏自宋魏公至今凡十世教處北南者代有賢子孫如會稽道師致用父者其一也致用不持以世家稱于人尤以好古博雅稱以清修敏學稱其燕處之室曰讀易所蓄書有先秦之祕文有峋嶁篆刻桐棺隸迹有古器皿漢司馬坡谷諸名公手書帖昔代之故家所罕有入其室者不問可知其為文獻故家子孫也求文獻之後如致用之博雅之清修而又敏學不倦殆亦難其人巳而致用不用於世延為道壬錢唐吾始甚惜之別去數年與朝昜薛公伯而張公為師友學益晉行益髙道益大也重為之意而畏焉顧視鄉之出而仕者離親戚棄墳墓將以大榮身及家也不知世變者可畏名一挂牒書者如牒臬籍錮而禁可也放竄可也斧質而奴而族可也思一返其故鄉非其君哀其老而憊憊而瀕於死乞與休告則法亡得而去也今致用道遵於身心泰於世進退自如駕一葉舟絶江而東也歸拜其鄉之父兄師友塗迎門候獲見風采者如見神仙吁其得歸而求之乎放而逐之乎斧質孥族而僇之乎於其歸也其不􅋏而慕之乎抑吾聞鄉之稚老人民非者已過半而城郭之一新者亦非舊矣致用於風露之夕馭鶮於小蓬閣上賦海嶠之詩得無有同聲而應過城頭詰甲子詔時人以學仙而去者為我志之漆書者為何人夢道士而飛鳴者又為何人至正十三年青龍集癸已七月七日老鄉客楊維楨在由卷之寄寄巢寫東維子文集卷之十

front:
  text: 東維子文集卷之七
  hash: sha256:fc055d47b6c105cbb059c5b0c561a2701e413cbf3c9e673d43765e86cb354cde
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0585_SBCK_007-1a}
body:
  text: 會稽鐵崖楊維楨廉夫著序吳復詩録序古風人之詩類出於閭夫鄙隸非盡公卿大夫士之作也而傳之後世有非今公卿大夫士之所可及則何也古者人有士君子之行其學之成也尚已故其出言如山出雲水出文草木之出華實也後之人執筆呻吟摸朱擬白以為詩尚為有詩也哉故摹擬愈逼而去古愈逺吾觀後之撫擬為詩而為世道感也逺矣間嘗求詩於摹擬之外而未見其何人富昜吳復見心持詩來讀其古什凡若干首決非摹擬而成者知學有古風人之旨矣吁使復達而有位為朝廷道盛德製雅頌復之作不為右公卿大夫士之作乎吁又使人人如復不以摹擬為詩古詩不復作者吾其無望於後乎復益勉之以徴吾言焉可也趙氏詩録序評詩之品無異人品也人有面目骨體有情性神氣詩之醜好髙下亦然風雅而隆為騷而降為十九首十九首而降為陶杜為二李其情性不野神氣不羣故其骨骼不庳面目不鄙嘻此詩之品在後無尚也下是為齊梁為晚唐季宋其面目日鄙骨骼日庳其情性神氣可知巳嘻學詩於晚唐季宋之後而欲上下陶杜二李以薄乎騷雅亦落落乎其難哉然詩之情性神氣古今無間也得古之情性神氣則古之詩在也然而面目未識而得其骨骼妄矣骨骼未得而謂得其情性妄矣情性未得而謂得其神氣益妄矣吾友宋生無逸送其鄉人趙璋之詩來曰璋詩有志于古非錮於代之積習而弗變者也是敢晉于先生求一言自信余既訝宋言而覆其詩如桃源月蝕頗能力拔于晚唐季宋者它日進不止其於二李杜陶庶亦識其面目識其面目之久庶乎情性神氣者併得之璋父勉乎哉母曰吾詩止於是而巳也至正丁亥九月望在姑蘇錦秀坊寫李仲虞詩序刪後求詩者尚家數家數之大無止乎杜宗杜者要隨其人之資所得爾資之拙者又隨其師之所傳得之爾詩得於師固不若得於資之為優也詩者人之情性也人各有情性則人有各詩也得於師者其得為吾自家之詩哉天台李仲虞執詩為贄見豫於姑蘇城南且云學詩于鄉先生丁仲客氏明旦則復謁出詩一編求豫言以序豫夜讀其詩知其法得于少陵矣如五言有云湛露仙盤白朝陽虎殿紅詔起西河上旌隨斗柄東西北干戈定東南杼軸空置諸少陵集中猝未能辨也蓋仲虞純明篤茂博極文而多識當朝典故雖在布衣憂君憂國之識時見于詠歌之次其資甚似杜者故其為詩不似之者或寡矣吾求丁公之詩似杜者或未之過則知仲虞之詩到乎家數者不得于其師而得于其資也諗矣雖然觀杜者不唯見其律而有見其騷者焉不唯見其騷而有見其雅者焉不唯見其騷與雅也而有見其史者焉此杜詩之全也仲虞資近杜矣尚于其全者求其備云至正戊子九月丙辰序張北山和陶集序詩得于言言得於志人各有志有言以為詩非迹人以得之者也東坡和淵明詩非故假詩于淵明也具解有合于淵明者故和其詩不知詩之為淵明為東坡也涪翁曰淵明千載人東坡百世士出處固不同氣味乃相似蓋知東坡之詩可比淵明矣天台張北山著和陶集若干卷藏于家其孫師聖出其親手澤求余言以傳世蓋北山宋人也宋革當天朝收用南士趨者淵倒徴書至北山北山獨閟關弗起自稱東海大布衣終其身嘻正士之鄭其有似義熙處士者歟故其見諸和陶蓋必有合者觀其胸中不合乎淵明者寡矣步韻倚聲謂之迹人以得詩吾不信也雖然世之和陶者不止北山也又豈人人北山哉吾嘗評陶謝愛山之樂同也而有不同者何也康樂代山開道入數百人自始寧至臨海敝敵焉不得一日以休得一於山者粗矣五柳先生斷轅不出一朝於籬落間見之而悠然若莫逆也其得於山者神矣故五柳之詠南山可學也而於南山之得之神不可學也不可學則其得於山者亦康樂之役於山者而巳耳吾于知陶而不陶者亦云至正八年夏五月六日剡韶詩序或問詩可學乎曰詩不可以學為也詩本情性有性此有情有情此有詩也上而言之雅詩情純風詩情雜下而言之屈詩情騷陶詩情靖李詩情逸杜詩情厚詩之狀未有不依情而出也雖然不可學詩之所出者不可以無學也聲和平中正必由於情情和平中正或失於性則學問之功得矣或曰三百篇有出于匹夫匹婦之口而豈為盡知學乎曰匹婦無學也而遊於先生之澤者學之至也發於言辭止於禮義與一時公卿大夫君子之言同録於聖人也非無本也我元之詩虞為宗趙范楊馬陳揭副之繼者疊出而未止吾求之東南永嘉李孝光錢唐張天雨天台丁復項炯毗陵吳恭倪瓉蓋亦有本者也近復得永嘉張天英鄭東姑蘇陳譁郭翼而吳興得郯韶也韶詩情麗而溫重無窮愁險苦之態蓋其強力于學未止深其本之所出極其作之所詣蓋得騷之聲雅之情則雅之聲矣又豈直在元詩一人之數追逐李張丁項輩而止乎韶勉之而巳其成帙者若不下卷兩浙作者序曩余在京師時與同年黃子肅俞原明張志道論閩浙新詩子肅數閩詩人凡若干輩而深詆余兩浙無詩余噴曰言何誕也詩出情性豈閩有情性浙皆木石肺肝乎余後歸浙思雲子肅之言之冤聞一名能詩者未嘗不窮候其門採其精工往往未能深起人意閲十有餘年堇堇得七家其一永嘉李孝光季和其一天台項炯可立其一東昜陳樵君采其一元鎮其二老䆁氏曰句曲張伯雨雲門思斷江也昔王劉二子能重河朔矧七家者不足以重兩浙乎惜不令子肅見之嘗論詩興文一技而詩之工為尤難不専其業不造其家冀傳于世妄也蓋仲容季和放乎六朝而歸凖老杜可立有李騎鯨之氣而君采得元和鬼仙之變元鎮軒輕二陳而造乎晉淡斷江衣鉢乎老谷句曲風格風宗大曆而痛釐去纎艷不逞之習七人作備見諸體凡若干什目曰兩浙作者集非徒務厭子肅之言實以見大雅在浙方作而未巳也若其作者繼起而未已也又豈足七人而止哉衛子剛詩録序余人淞見世家子弟凡十數人能去裘馬之習以文墨為事者蓋寡矣城西衛子剛蓋山齋別駕公之孫也首贄詩見余既而復出敬聚齋詩稿一編讀其古詩如秋夜曲白苧詞其排律如九山宴集五言律如江水深深碧梨花淡淡明九農勞畚插三泖足風波七言律如亞夫舊是將軍子賈誼初傳太傅官玉人嬌列錦步陳銀筆醉諷金縷衣醉吹銀笛五老洞聞拾瑶草三神山其絶句如消寒圖一首音節興象皆造盛唐有餘地非詩門之顓主者不能至也昔人論詩詩窮苦之詞易工歡愈之詞難好子剛之二不得於窮苦而得於歡愈可以知其才之髙出等輩不得以休戚之情限也子剛之年未踰壯而其詞之工已如此使復益之以春秋才愈老茂而詞愈髙古又豈止今日所覩而已哉至正九年夏四月草有九日序玉山草堂雅集序昆山顧仲瑛裒其所嘗與遊者往還唱和及雜賦之詩悉鋟諸梓編帙既成求余一言以引諸首余來吳見吳之大姓家友於人者往往市道耳勢要耳聲色貨利耳不好聲利而好雜流者寡矣矧好儒流乎不好儒流而好書數者集則亦有得其為人者焉仲渶讀書之室曰玉山草堂故集以之名其自著有玉山英稿玉山樂府行于時云至正九年夏五月十有二日郭羲仲詩集序詩與聲又始而邪正本諸情皇世之辭無所述問見于帝世而備於三百篇變于楚離騷漢樂歌再變于琴操五七言大變于聲律馴至末唐季宋而其弊極矣君子於詩可觀世變者類此古之詩人類有道故發諸詠歌其聲和以平其思深以長不幸為放臣逐子出婦寡妻之辭哀怨感傷而變風變雅作矣后之詩人一有嬰拂或飢寒之迫疾病之楚一切無聊之窘則必大號疾呼肆其情而後止間有不然則其人必有大過人者而世變莫之能移者也子在錢唐閲詩人之作無慮數日家有曰古騷辭者曰古樂府者曰古琴操者談何易易習其讀獨其果得為古風人之詩乎不也客有語豫詩之學則曰有三百篇楚離騷漢樂歌之辭生年過五十不敢出一語仰末唐季宋語懼其非詩也以此自劾而又以之訓人人且覆誹我則有未嘗不悲今世之無詩也幸而合吾之論者斤斤四三人焉曰蜀郡虞公集永嘉李公光東陽陳公樵其人也竊繼其緒餘者亦斤斤得四三人焉曰天台項炯姑胥陳謙永嘉鄭東昆山郭翼也翼蚤歲失怙中年失子家貧其屢病宜其言之大號疾呼有不能自遏者而豫每見其所作則皆悠然有思淡然有旨興寄髙逺而意趣深長讀之使人翛然自得且爽然自失而於君君親臣子之大義或時有發焉未嘗不嘆其天資有大過人者而不為世變之所移也豫在婁江時翼持所作詩來謁序今年學子殷今又扶其編來杭申前請于是乎書翼字羲仲東郭生其自號也至正十一年十二月草有二日雲間紀遊詩序詩者為紀行而作者乎曰有北風其􅋽雨雪其滂惠而好我㩦乎同行此民之行役遭惟亂世相㩦而去之作也黍離曰彼黍離離彼稷之苗行邁靡靡中心搖搖此大夫行役過故都宫室倣徨而不忍去之作也後世大夫士紀之什則亦昉乎是幸而出乎太平無事之時則為登山臨水尋竒拾勝之詩不幸而出于四方多事豺虎縱橫之時則為傷今思古險阻艱難之作北風黍離代不乏已錢唐莫君景行自壯年棄仕泊然為林下人然好遊而工詩不巳雲間有逰所厯名山巨川前賢之宫隱士之廬名勝軒亭之所一一紀之以詩蓋非北風黍離之時則非北風黍離之詩固依灼時之治亂以為情之慘舒者也莫君此集好事者且傳為尋竒拾勝之作鋟梓以行莫君何幸也集凡若干首來謁豫序豫方被命為錢唐關令目有官勞無隙略及文墨自况海隅失太平者三四年方將有大夫行役之艱而不能如景行之從容嘯歌於山水之樂也因觀是集感慨係之至正十四年秋八月十有四日書為序金信詩集序言工而弗當於理義窒而弗達於辭若是者後世有傳焉無也又况言龎而弗律義淫而弗軌者乎自三百篇後人傳之者凡幾何人屈賈蘇李司馬楊雄尚矣其次為曹劉阮謝陶韋李杜之迭自名家大抵言出而精無龎而弗律也義據而定無淫而弗軌也下此為唐人之律宋人樂章禪林提唱無鄉牛社丁俚之謡詩之敝極矣金華金信氏從余逰於松陵澤中談經斷史於古歌詩尤工首誦余古樂府三百輒能遊泳吾辭以深古風人之六義又自賀曰吾入門峻矣大矣吾詩降而下吾不信也一日便為吾詩評曰或議鐵雅句律本屈柳天問某曰非也屬比之法實協乎春秋先生之詩春秋之詩歟詩之春秋歟余為之喜而曰信可與言詩巳於是絶筆於近體所為詩有春草軒所編如古琴操趙壁詢荆卿篇博浪椎月支王頭飲器歌其氣充其情激其詞鬱以諧吁信之詩有法矣此豈一朝一夕之致耶其素所畜積蓋至今二十有餘年矣今天子制禮作樂使行天下采風謡人國史東州未有應之者吾將以信似之蕉囱律選序詩至律詩家之一厄也東坡嘗舉杜少陵白曰五更鼓角聲悲壯三峽星河動影搖五夜漏聲催曉箭九重春色辭仙桃是後寂寥無聞吾亦有云露布朝馳玉關寨捷書夜報甘泉宫令嚴鍾鼓三更月野宿豼貅萬竈煙為近之耳余嘗竒其識而韙其論然猶以為未也余在淞凡詩家來請詩法無休日騷選外談律者十九余每就律舉崔皓黃鶴少陵夜歸等篇先作其氣而後論其格也崔杜之作雖律而有不為律縛者惜不與老坡參講之上海蕉夢生釋安者集有元名能詩家自虞馬而下律之唐者凡三百餘首帙成命曰蕉囱律選㩦以索金引梓行海均以警詔骫骳怗滯之音選中多有雄渾合坡舉似者第軼出崔杜上頭者未見一二編末過取余放律矹硬排奡者凡十餘蓋安學詩於吾門亦有日矣是宜所取雅合余所講者是集行則皇朝風雅之選于賕者君子有所不遺梧溪詩集序世稱老杜為詩史以其所著備見時事子謂老杜非直紀事史也有春秋之法也其旨直而婉其辭隱而見如東靈湫陳陶花門北鵑東狩石壕花卿前後出塞等作是也故知杜詩者春秋之詩也豈徒史也哉雖然老杜豈有志於春秋者詩亡然後春秋作聖人值其時有不容巳者杜亦然梧溪集者江隂王逢氏遭喪亂之所作也子讀其詩悼家難憫國難採托貞操訪求死節綱羅俗謡與民謳如帖木侯張武略張孝子費夫人趙氏女丙由紀事月之初生天門行竹笠黃官栁場無家燕諸萹皆為他日國史起本亦杜史之流歟逢本山澤之士其淡泊聞靜是其本狀而有春秋屬比之教故豫亦云春秋之詩也採詩之官苟未廢也則梧溪之春秋得以私目託也不然何其屬比于册者班班乎其無諱若是也訂其格裁則有風流俊采豪邁跌宕不讓責介威武之夫者兼人之長亦頗似杜吁代之剿故碊餘欲傳於世稱為作人而逢詩不傳吾不信也至正十九年冬十一月初吉序齊藳序詩之厚者不忘本也先民情性之正異乎今之詩人曰某體亡朝體杜夔州孟襄昜李西崑也安識所謂推本其自者哉高唐盧升氏三盧相家莊惠公之孫也十三善為詩嘗從河東張生遊南來又相從余于分唐杖屨間集其所自為詩一編曰齊藳齊蓋其所出故以名示不忘其本腃焉故鄉邈若隔世升尚能對余畫地為山川及條其舊俗纖悉可終宜其詩之特也乎原今觀其詩多協古詩人比興風容色澤類揖遜乎先生之世卿大夫周行也此豈今人妄一男子談漢魏六朝夔州襄昜西昆者耶吾是以器而重之今聞虛之􆀣退吾將約升循海而南迹師尚文所封之履登泰山日觀厯數山河之舊河西善謳者吾無間將以尋小白君臣之霸烈而滅威之貴風尚在述為制作當唱豫而和汝孫氏瑞蓮詩卷序淞之東曰黃浦浦之東曰橫溪溪之上孫善之家焉家有園池之勝至正七年五月溯日池上出瑞蓮一茄而雙花逺近聞者爭覩曰蓮之層曰瑞菡蓞雙而茄獨者亦曰瑞既而善之會賓友燕池上皆舉酒為善之貨觴餘各賦詩凡若干首裒而成卷因豫友許君如心來乞序余謂凡天地間物産之異若人不以為怪必以為瑞然怪非自怪因人而怪瑞非自瑞亦因人而瑞人有怪之微物雖瑞而瑞猶怪人有瑞之微物雖怪而怪猶瑞芝中産于商顔之隱瑞也見于元封虛耗之君覆怪矣嘉禾産于若和之時瑞也見于赤烏搶攘之年覆怪矣吾聞善之纍世家風孝友善之又倜儻有竒節慕義而強仁瑞蓮之産非其邁種德之驗乎德有瑞驗花有瑞苻謂蓮非孫氏乎瑞乎吾不信也善之益藝而學益種而德天之生祥下瑞為孫氏顯章殆未艾也嘻蓮無一茄而雙花間有則人稱以為瑞物人無纍葉而不分聞有則人不以為瑞人乎唐史曰天瑞五色雲人瑞䣐八表此瑞人説也善之勉焉而有以膺此稱也夫詩史宗要序詩之教尚矣虞廷載賡君臣之道合五子有作兄弟之義章關雎首夫婦之匹小辨全父子之思詩之教也遂于鄉人來于國史而被諸歌樂所以養人必厚天倫移風易俗之具實在于是後世風變而騷騷變而選流雖云逺而原尚根于是也魏晉而下其教遂熄矣求詩者類求端序于聲病之末而本諸三綱逺之五常者遂棄弗尋國史所資又何采焉及李唐之盛士以詩命世者始百數家尚有龔六代之敝者唯老杜氏慨然起攬千載既墜之緒陳古諷今言詩者宗為一代詩史下洗哇媱上薄風雅使海內靡然沒知有百篇之旨議論杜氏之功者謂不在騷人之下噫此世末學咸知誦少陵之詩矣而弗求其旨義之所從出則又徇末失本與六代之弊同余為太息者有年龍江殷生謁余錢唐次舍袖出手編目曰詩史宗要觀其編什首君臣終朋友一根極于倫理表端分節顯要正訛或有宗趣炳然而日星列沛然而江漢注挈焉而領張洞焉而鑰啓千百五篇之大旨博而約之于一帙之中其忠君孝友之至情鵙鳩鶺鴒之餘韻使習其讀者油然而有感衰得此弗覺病懷灑然若能言吾之所欲言者後學小子操最嘉量以廣品諸作又何騷雅之弗近而聲詩之教不還於古哉生重以序請遂書其卷首如此生名惟肖字起巖汝南人嘗從遊於余與海內名士李光張公天雨假公天祐為忘年詩友云至正十三年九月十日在分塘之五柳園亭寫曽氏雪齋弦歌集序女子誦書屬文者史稱東漢曹大家氏近代易安淑真之流宣徽詞翰一詩一簡類有動於人然出于小聽挾慧拘於氣習之陋而未適乎情性之正比大家氏之才之行足以師表六宫一時文學而光父兄者不得並議矣豫居錢唐聞女士有曹雪齋氏以才諝稱於人嘗特所著詩文若干篇介為真師者丘公其見自陳幼獲晉于酸齋貫公恕齋班公而猶未及見先生也幸先生賜一言以自勵今年豫在吳興復偕乳母氏訪豫洞庭太湖之上為豫歌詩鼓琴以寫山川荒落之悲引關雎朝雉琴操以和白雪之章豫然諗雪齋氏之善人倫風操述作又其餘爾吁大家氏之後不為猶有人乎子聞詩三百篇或出于婦人女子之作其詢皆可被於弦歌聖筆錐而為經律諸後世老於文學者有所不及其得以硜硜女人棄之乎若雪齋氏之述作也本之以天質者而達之以學發之於咏而協之以聲律使生于三百篇之時有不為賢筆之所録者乎故上下刪取其所作能追古詩人之風與其琴調善發貞人壯士之趣者為曹氏弦歌集他日太史氏或有採焉截其過而適之中約其偏而合之正則王道之事畢矣豈直大家氏之後猶為有人之慶哉至正五年十一月序富春八景詩序富春自嚴子陵耕釣後至今一草一木與客里俱高豫觀烏龍金華諸山如奔猊渴驥夾江而下與越之千巖萬壑吳之龍飛鳳舞者會而同盡于海其中朝潮夕一往一來耀人耳月者又天下之竒觀山川鍾秀間世而起者孫中謀之稱孤江左葉中書入相本朝他如名臣韻士仙蹤梵迹不可一二殫紀昔栁之愚溪僻在荒服而見來柳子荒之赤壁鞠為戰畼而見賦坡公遂皆有以表見於世富春品題獨未表見于若人豈造物者之有待于後人乎至正乙未余遊富春與其邑人馮正卿及豫韓魏二三子相與品題時八景先是吾里人張世昌有其大詠其詞未傳要之比興體製非徒求工於景物兼欲道其人物名節之盛必有待乎能言之士使後日如李翰林之嘆出皓于黃鶴樓閻都督之竒王勃于洪都府則富春山水當與愚溪赤壁感柳蘇之遇者同一德色品題之竒其可苟也哉余唱詩八首二三子者和之而豫序之如此鐡雅先生拗律序附先生嘗謂律詩不古不作可也其在錢唐時為諸生請律體始作二十首多竒對其起興如杜少陵用事如李商隱江湖陋體為之一變然於律中又時作放體此乃得於類然天縱不如有四聲八病之拘其可駮愕如乖龍震乕排海炎嶽萬物立辟易無地觀者當以神逸悟之不當以雖強險厄律之也句曲張伯雨嘗曰無老鐵力者便墮落盧馬後大蟲且故今裒此物體凡若干首先生見之且令某評之如何太極生頓首曰真色脫塗抹天巧謝雕鍵太初生曰健有排山力工無剪水痕安曰先生拗律自是水犀硬弩未屠鐵捶人見之昂然有不可犯之色然其中自有翕張妙法此先生拗律體也先生擊凡賞之以為二三子知言併録為序釋安謹序東維子文集卷之七

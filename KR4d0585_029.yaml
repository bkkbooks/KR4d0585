body:
  text: 東維子文集岺之二十九會稽銕厓楊维楨廉夫著詩送薛推官詩四言三章有序吾友姑胥富子明來言杭州推官鄆城薛公之人曰薛公起身國子伴讀負特名公卿間連厯縣尹掖城寕晋得民譽甚三命為今職惟杭實江以南太府也其俗啙薄喜訐爭獄市滋起大家氏關節迂變事情奸偽百方出竒獄訟有他比所不傳雖老財察者病弗遑理推官號難職而於杭號尤難者薛家之來也斷某獄平亭疑法咸一一當蓋廉為治本又明射之恕以出之惟亷不淫明不惑而恕無文深之過故臬不頗民用不冤自時府中事無間大小咸咨薛公府長吏接之如賓師事有隔其省閲必舛差顛僨一時僚友有坐畔法事者而薛公獨歌休聲於民此其賢否攸劣之較然者也今将代去丞相府與御史章交上其陟清署以耳目天朝者必矣杭士歌詩鄙腐不足以侈而餞也願邀于詩予宻子明言不誣爲賦詩三章一章𫐠其善于職也二章惜其去三章期敡清要以副杭人士之望也詩曰第四句五言有淵有清又静且平有照斯應孰有撓有澄我有疑臬伊誰質之我有往罰伊誰出之孰奪我美心如失之雖奪我美其用則邇何以用之驄馬御史維驄馬史犀吏之師四方之紀壽豈詩四言二章有序人情莫不欲壽而富貴人得之者少賤且窶者多得焉何也天之授人以五福固不兩完也肰賤窶者之壽而樂豈又少矣古之賤窶壽而樂者吾聞榮啟期而樂之以三固未知所樂也此壽而豈之不易易也中吳瞿惠夫氏家崑之韓涇至惠夫益斥大其門閭而名其事親之堂曰壽豈寥斯之斯人敬祝頌之詞曰令徳壽豈蓋代之壽者不難而壽而豈者之爲難也壽而豈者非令德之人曷及爾哉謂夫世徳之家也有華宅可以居有負郭之田可以食二親皆具享遐耄惠夫朝夕率其仲上食堂上既有以樂之壽而又有以自樂焉豈之樂固非榮期之賤而窶得之賤者比矣夫惠夫之所得惠者豈非詩人所謂令德者歟惠夫求子詩故予序之而係之詩二章曰有橋有諼云有撟洋洋在堂之陽豈弟君子令德不爽文文如璊璁衡其鏘酌以㫖酒以燕樂我父兄瞿叔孝友壽豈孔臧有諼奕奕在堂之北豈弟君子令德有赫飲御我族以及我賔客瞿叔豈弟班裳赤舄壽且樂康田爾令德送康司業詩四言有序至正七年秋天子以成均司業之乏山東康公若泰以憲僉亊轉是職未幾台評奪職副庸田司使不三月轉湖南憲使未行而中書以國學公論又立挽於司業其行也吴之士大夫咸贈以言有諗于維楨者曰廉訪使天子執法之臣也司業文墨官下盖殿最者也天下執法臣得一人焉勝百件守令文墨官得百什焉亡愈執法臣一人今康公累遷廉訪使者執法之得其人者也而成均徒以文墨使官使其人無乃非天下利乎維禎曰不然惟我世祖皇帝屬統垂業于後之人不在吏待文法而在傳臣之扶植倫理也故設官分職司業爲國子師民氏天子内長之非天下不居故其人得侍間于天子時賜清宴以問道即有所建白澤流四海非尺寸之細也國有不是師弟子得逕上聞捷于執法移文符以關說差次者其育才養能一適而賢賢臯陶伊尹之徒往往發迹于是其爲國利也厚矣簿其㓛豈在執法左哉嗚呼司業之人也文豈徒取其官亾盖殿最哉今天子承明經成尊師氏之位不卑于執法臣故康公之屢煞風紀以移是職也良有以也哉故余裒次吴士大夫之詩帙以送之而又序之如此復自繋詩凡五章詩曰赫赫冑監禮樂攸司祭酒長之師氏貳之明天子作我民極何以播教師氏有職惟明天子惟烈祖是因烈祖始受命肇立成切天子戾止作爾多士多士濟濟惟天子使曰若康公穆穆雍雍多士濟濟惟言來從夫子問道其言如鍾天子廣化其徳如風維禎作頌配於樂王題逸樂子卷五言律煙水風塵外先生一草堂干時無戰䇿却老有丹方蒲葉鈔書短松花釀酒香有時歌欵乃小艇在滄浪夜坐一首五言律日落群動息張燈坐草堂浮生百年事清坐一爐香謀拙憐人嘆幽栖世慮忘吟詩不知寐華月自流光舟過黄店五言律水㑹魚鹽市霜清蟹稻天高橋十字港新刹四邊田樹老鳥銀英花開白玉顔老翁誇樂歳斗米直三錢緑隂亭詩五言十二句公子邁流俗淡然薄世榮華亭入幽邃水日有餘清高梧羅前庭修竹被兩楹重隂祕清晝好鳥時一鳴佳辰展芳燕艮㑹欣合并清歌發綺席鼓瑟更吹笙群公盡詞客列座敬塵纓言笑遂真性觴咏暢幽情清隂與日轉不知月東生送趙季文都水書吏考滿詩五言二十句有序江浙粮賦居天下中九而蘇一都又居浙十五然蘇國也田皆枕湖藉江因水進退為凶慶使歳恒陽則窪下皆以鍾畝之利告一有淫澇之虞颺風猝作挾波浪破隄防連阡接町淪為臣浸此朝廷都水營田之所由立也其職専以水利為務遴選重臣有才幹者居之而所調官吏遂與臺省相參盖朝廷視水利為重故待其官守重宜也吴時官守或非其人其貽民害覆有暴于水而民益困者然則居是職者其不可不慎選其人也必矣書史者其官之贊也吏不得人而欲其官之得職也亦難矣真定趙君季文蓋才而有風操者也往嘗為浙中司臬史有能稱故今都水使府點函以書史辟于沙河尉次宜其克相其官有成也君自奉職來隄塍盖脩溝渠益浚水還故道而民受庸田之惠者君之功為多書滿例增秩七品佐二郡縣為近民之官矣以君興除水利害之心推之吾民撫字之日民其有不受賜者乎其行也吴人士咸歌詩以餞之推予為序首而復係以詩云勾吴水為國桑田水相爭水大連陂湖水小吞泖涇高廬或凡墊下土孰容畊吳萌罹患乆都水置司平治水亦多術害利始興侃侃趙公子為吏有能聲棄流截高岸蕪塞開通塍都府資治畫課最上農鄉遷官到州縣穡事語田更推此澤物志聖化相流行送謝太守五言排律四十句湖季今曰郡循良第一人武林非復舊文化要圖新海嶽東南會湖江左石隣曽開天水國直問尾箕津府大同京尹居崇吴國賓提封家萬户易俗力千鈞惜也承乎夕於焉值亂頻煙華餘故市風物感殘民今日懷匡濟乗時好拊循念君多意氣滿腹貯精神别地梅凝曙寒江柳孕春過船沙没屐駐斾雪埋輪黽勉猶無及窮憨不敢嗔贈言知而赧取醉寄情真勿袖烹鮮手須間牧犢身推誠歸簡孙植善息頑嚚亂後無家世漁中有隐淪千年黄寉返萬里白漚親莫學張京兆應如召信臣貂蟬從岳牧圖畫可麒麟賦春夢㜑七言絶句楚香雖老尚能歌听夢道人樂府予因呼為眷夢㜑黄栁城邊風雨多白頭宫女有遺歌東坡哨遍無知已賴有人間春夢㜑小香一場春夢不湏忙䞉買春風又幾場一文花開紅玉蝶小香何日比花長寄沈秋淵四絶句大将軍誥入酒市貴公主鏡落田家不知有客琅玕所獨自吹笙醉碧霞句曲己無張外史道士今有沈東陽裁雪剪月三千首獨虎仙官不取将鹿皮之冠崔􅌁裙軍前不肯帶銅魚花猫望鹿拜履下知有祝中黄石書鸚鵡水深蓮葉航書來約過百花庄醉披錦袍上船去倩得小姫連笛庄送貢尚書入閩繡衣經略南來後漕運尚書又入閩萬里銅塩開越嶠千艘升斗資蕃人香薫茉莉春醒重葉捲檳榔曉饌頻海道東歸閑未得法冠重載髪如銀八月初四日雪坡太守周門柘入雲居山中復度嶺飲于水月尼寺賦詩書似太守及蘇州刺史周義卿文章太守早休牙五馬傳呼處士家好客新分朱露酒題詩近在白雲窩山中子落千年桂海上人歸八月槎水月樓頭横玉笛誤猜萼緑是韶華用顧松江韻復理貳守并柬雪坡刺史仙客歸來隘九州身騎黄寉記南逰烏衣故國江山在銅柱荒臺草木秋起舞劉琨空有志登高玉粲不勝愁問君蔗境今何在袛憶當年顧虎頭送謝太守朝廷遣使航東海萬里南來送璽書著屐登山良不悪分符典郡復何如白蘇亊業千年後呉楚封疆百戰餘今日飬民方急務肯将徴算及舟車答倪生德中來韵綺山才子才庸峭素色成文似邵綾待詔歸來金馬客題詩寄云碧桃僧畫眉誰問張京兆多病深憐馬茂陵昨夜西堂安夢好惠連春思又新增八月五日偕錢唐王觀海昌李勛大梁滑人過湖赴瑪瑙山主之招題詩雙松亭十年不踏瑀瑙石今日重登口子峰外湖水繞玉螮蝀裏湖水浸金芙蓉雀老題詩欲招鶮生公説法善降龍浮雲富貴眼前見從此道人輕萬鍾感時一首壮志凌雲氣食牛少年何事若淹留狂歌鳴鳯聊自慰舊學屠尨良已休臺閣故人俱屏迹閭閻小子盡封侯愁來按劍南樓坐寥落江山萬里愁至正庚子重陽後五日再飲謝履齋光漾亭履齋出老姬楚香者侍酒之餘與紫霄生賦詩滿城風雨送重陽雨後花開重舉觴仙客新來殷七七佳人老出楚香香于時懶上平蠻策度世惟求辟榖方光漾亭中詩易老不須春夢到西堂與姜羽儀詩六韜人去無家學獨說吾鄉有羽儀太尉府中招處士湖州幕裏看賓師座分雨露黄封濟門䕶風雲赤羽旗湖上老夫詢出處扁舟一葉似鴟夷主之約詩用宇文韻我尋三十高僧閣還有支郎第一流湖上風煙留晚照山中草木帶邊秋水晶宫開碧菡蓞金粟堆呼黄栗留馬題詩寺行人有比峴山遊寄秋淵沈錬師琅玕種得三千箇箇箇琼台玉樹齊秋靜雙鳬責泖曲夜寒一虎大苑西長葺不著花猫獵深竹時聞翠羽啼老我所須惟鐵杖不須太乙乞青藜十月六日席上與同座客陸宅之夏士文及主人吕希尚希逺聫句新潑葡萄琥珀濃酒逢知已量千鍾犀柈筯落眠金鹿鴈柱弦鳴應玉龍紫蟹研膏紅似橘青蝦剥尾緑如葱彩雲吹散陽臺兩知有巫山第幾重八月五日喜雨初陽臺上作𫾣門空過太史宅曳权却上初陽臺雷從葛仙井底起雨自黄妃塔上來官軍捷報銅鉈陌山人酒㵼白螺林憑誰得知詩句好山東李勛今有才十七日過無住菴因留題鑑上人半雲軒我訪東山丞相譜因過南墅半雲尞雉栖薜荔都蒼墓鰲補天容大士橋萬歳藤枝神蜕杖三花樹子癭為瓢老僧好亊兼好客時作逺公蓮社招用蘇昌齡韻賦李紫篔白雲􅙘紫篔之篔篔滿林白雲之雲雲復深忽見南山有真意時聞好鳥流清音盆翻玉女當囱雪棋款仙樵石几隂為子朗歌成古調寫以老鉄斛盧琴題夏氏槐夢軒何人覔得大槐國國在人間人不識五馬既赴南柯侯千金史選東床客金鷄一聲叫東方蝴蝶飛來春一場君不見緑林周虎郎匍匐尚拜蚍蜉王寄雨道原詩二首信公令住竹林寺曽寄吳鹽道起居戴家泊上收秣米淩湖門外好鱸魚緇衣宰相日給告清客道人新著書若問西湖湖上伴竹枝零落柳枝疎老人畸町延何如聞移車霅上居甕口新包竹葉酒船頭學釣桃花魚雄文曽罵六國印綺語更著三家書兩家道郎我所爱何啻林間見二疎聫句書桂隐主人齋璧至正已亥冬十月四曰子偕吳興桃庭美義興高玉囱夏長祐吳郡張學湖西張吉富春吴毅東海徐子貞陽羡高瑛雲間謝思盛同逰淞之顧庄酧橘隐老仙墓因過郁聚學聚齊見桂隐主人供茶設醴席上與諸客聧七字句成一十韻十有八句書于齋之壁予為會稽抱遺叟楊九鳯山湯漂瀆隂十年曾記此登臨仙人一去􅰁破斗小山重招花作金勺水研池圓洗㫜老蕉書葉倒抽心瞿曇像現雪生壁木客詩成風滿林白馬胡僧經寫具貴烏方士石旋針大花雪舞昆吾劍一索珠縣斛律琴出柙怒號斑額獸鎮龍解語雪衣禽掀髯自作蘇門嘨抱膝誰歌梁甫吟聫得彌明詩句就内中韶濩有遺音題朱運峯夢逰仙宫殿明日偕見西辨章進凝香閣詩青蓮老人青珮環自言昨夜夢逰海上天梯山天梯之山三萬八千丈琼臺雙闕開天關赤藤飛上最絶頂千樹琪花散晴影通明前殿上覲玉虚翁左面長眉瞳炯炯玉翁无是太極仙手㺯兩丸日月族天扃地户司啓閉玄牝一鑰開天光青蓮老人南極裔㤗華開花一千歳大人賦奏馬文園玉藕如船澆渴肺殿前作詩明月光光彩下徹下土中書堂明朝冩得凝香章蝴蜾飛來七寳床凝香閣詩凝香閣者光禄大夫平章政事張公闢之以待四方賢士即漢平津侯之東閣也客卿鐵崖楊子名之曰凝香本韋蘇州語子讃楊子記云休兵息民又云厭兵圖治引周公仲山甫為辭天兵不為攻城乃森㦸於左右者詎非休兵乎燕寝凝香與賢者共之豈非圖治乎周公東征成王迎歸天廼反風起未此休兵効也仲山甫祖齊宣王賴其補衮出納王命此圖治効也楊子之進規者至矣杭庠典教朱庭規敷揚子之記復為歌以頌云有兵不若森于庭發矢不若荘于棚汗馬不若係于營休兵要待民力生平章政事光禄卿閣下萬卷清香凝書生香徳生馨况復爇鼎相熏蒸緑烟一縷風度􅎉光椂燕寝寝不驚蝴蝶飛来窺枕屏周公入夢話東征山甫依稀亦言并天既及風示稼登告以補衮垂鴻名楊子進䂓為座鉊有客如比真賢郷廪人飽粟庖人饋鯖燕昭臺上千金輕錢博士起相慶有如十八學士登蓬瀛東維子文集卷之二十九
